  text: 儀禮疏卷第十七
  hash: sha256:8ea0be70d5e61a30f6001b08fa8734c35131046167687270565a149a8e090e02
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_017-1a}
body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彥等撰賔以虛爵降釋曰自此盡西序東面論賔酢主人之事注賔南至受者釋曰知者以經云主人北面明凡授爵鄉所受者鄉飲酒鄉射獻酢酬皆然故云凡謂南面授與所受者也賔降至東面注既受至安盛釋曰以堂上為盛故降下下文於酬賔降筵西東南面立注云不立於序內位彌尊燕禮注云位彌尊禮彌卑是未酬巳前禮盛者也注命公至之序釋曰知公命者命由尊者出故也云東西牆謂之序者爾雅釋宫文主人至于公注象觚至於燕釋曰自此盡于篚論主人獻公之事云取象觚東面者鄉公為敬故也云不言實之變於燕者燕禮云實之主於飲酒此云酌不云實之主於射略於飲酒故也公拜至肆夏注言乃至於賔釋曰言異者賔及庭奏此君受爵乃奏是其節異故也云乃者緩辭也注人君左右房釋曰以人君左右房故云左房對大夫士東房而巳故云東房不言左以無右所對故也注凡異至於賔釋曰言異者使庶子授肺不拜酒立卒爵之等皆異於賔也更爵至答拜注更易至為受釋曰自此盡于篚論主人受公酢之事主人至答拜注媵送至作騰釋曰自此盡南面立論主人受賔爵之事注辭者至酬也釋曰上文公飲立卒爵此則坐飲故以公決之云此於正主酬也者謂於鄉飲酒鄉射是正主酬賔之節也主人至薦東注遂者至舉也釋曰云不北面也者此決鄉飲酒鄉射賔北面坐奠觶于薦東注皆云酬酒不舉引曲禮君子不盡人之歡不竭人之忠以全交也注賔不至彌尊釋曰案鄉飲酒注云位彌尊禮彌卑引雜記一張一弛此對酬時立于西序之時不降于下禮稍卑位稍尊此在席西東面位彌尊禮彌卑也小臣至命長注命之至則卑釋曰自此盡反位論將為賔舉旅使二大夫媵爵之事云命之使選於長幼之中知不取卿大夫之年長者以其下作大夫不取年長又知不取臣中位長者以其不取卿故鄭云卿則尊士則卑故不取之而取下大夫尊卑處中者注既酌至君舉釋曰言亦者亦前酬酌自飲時相左於西楹之北時後者南相東向先者北相西向向西階右旋北面待後至降也今此二人先者於尊西東面酌訖於東楹之北東向向公前奠之右旋於東楹之北北畔西過後者亦於樽西東面酌訖於東楹之北南過東向於公前奠之是亦交於楹北相左也云奠於薦南不敢必君舉者凡舉者於右不舉者於左今奠於薦左是不舉之處故云不敢必君舉也注反及門右北面位釋曰但大夫初與卿在門右北面得揖少進中庭北面今當反庭中位而立云門右北面位者大夫雖得揖少進仍是門右北面位少進而巳故鄭還以門右北面言之公坐至成拜注公起至成然釋曰自此盡復位論為賔舉旅下及大夫之事云小臣長辭變於燕者燕禮直使小臣辭亦是燕主歡此射禮辨尊卑故使小臣長辭異於飲酒禮故云變於燕也公坐至稽首注不言至下拜釋曰自此巳下皆云公答拜不言再拜燕禮皆言公答再拜不同者燕主歡不用尊卑故公拜皆再拜此射禮主辨尊卑故直云答拜答一拜此一拜者正禮也故周禮大祝辨九拜一曰稽首首至地臣拜君法二曰頓首頓首平敵相拜法三曰空首君答臣下拜復不為再拜即七曰竒拜是也云下亦降也者此非訓下為降故以發端言降拜因上事言下拜直因降有上文即云下也經云公卒觶賔下拜者公尊不拜既爵賔降拜若為君拜既爵也注賔在右相飲之位釋曰賔位在左而在大夫之右者是相飲之位非賔主之位也注言更至禮殺釋曰上注云不相襲者於尊卿更自敵以下言易此賔於卿是自敵以下當言易今言更者尊卿尊則卑賔禮殺也大夫至復位釋曰言復位者亦如上復門右北面位即庭中北面位也主人至階上注酬賔至於酬釋曰自此盡無加席論獻公卿之事司宫至東上注言兼至房來釋曰上文設席之下注云唯賔及公席布之也其餘樹之於位後耳者以至獻卿乃布之若然此云兼卷者不謂始卷之直是鋪設之時兼卷而設之也乃薦至折俎注卿折至禮尊釋曰云卿折俎未聞者以燕禮卿無俎故云未聞又云蓋用脊脅臑折肺者案鄉射記云賔俎脊脅肩肺主人俎脅臂肺又獲者之俎脊脅肺臑彼注云臑若膞胳觳之折以大夫之餘體以此言之則此賔俎亦用脊脅肩肺君俎亦脊脅臂肺前體有肩臂臑後體有膞胳觳尊卑以次用之故卿冝用臑若有公公用臑卿冝用膞也云卿有俎者射禮尊者對燕禮不辨尊卑故公卿等皆無俎也注陳酒至之意釋曰案燕禮不在射亦不啐者彼為臣有功君與之燕恩及於卿故卿不敢啐也卿有無俎者自然不嚌也小臣至于篚注命長至優暇釋曰自此盡奠于篚論舉旅之事注於是言至尊卑釋曰案燕禮為卿舉旅言若賔若長唯公所酬燕禮主於飲酒此言所賜是以決之也主人至復位釋曰自此盡就席論獻大夫之事注大夫至備禮釋曰此注云大夫卒爵不拜賤不備禮燕禮注云禮殺者兩注相兼乃足對公卿拜既爵此不拜此獻卿後是禮殺亦是賤不備禮也辨獻至就席注辨獻至席也釋曰既言辨獻大夫遂薦之後乃云繼賔以西東上以下云云者上揔言獻大夫辨乃一時薦之下文更明布席位次就席之儀故云辨獻乃薦略賤也略賤則是獻訖降階獻辨擯者乃揔升之就席就席訖乃薦之乃席至四瑟注工謂至衆也釋曰自此盡西面北上坐論作樂及獻工之事云六人者大師少師各一人上工四人皆據文而言也云禮大樂衆也者對燕禮工四人而言也僕人正至上工注徒空至貴賤釋曰云僕人正僕人之長師其佐也者以正為長師為衆故僕人正為長僕人師為佐也云士其吏也者以其在僕人之下故知僕人之吏吏則府史之類云天子視瞭相工者見於視瞭職文云大師少師工之長也者周禮春官大師下大夫二人小師上士四人鄭注云凡樂之歌必使瞽矇為焉命其賢知者以為大師小師是樂工之長也云杜蒯曰曠也大師也者禮記檀弓文引之者證大師為樂工之長也云於是分別工及相者射禮明貴賤者對燕禮主歡不明貴賤故不分別工貴及相賤後者徒相入注謂相至出入釋曰上列官之尊卑此陳先後之位亦是以明貴賤者上列官之尊卑謂先言僕人正與大師後言僕人士與上工是列官尊卑也此陳先後則上工與瑟在前大師少師在後是先後之位既據入時行位亦據升堂坐之先後亦依此也云凡相者以工出入者欲見入時如此出時亦然小樂正從之注從大至師也釋曰云從大師也後升者變於燕也者燕禮樂正先升又不使小樂正者彼主於樂此則略於樂故也坐授瑟乃降注相者至之北釋曰鄉飲酒注云降立于西方近其事以取近其事故在西縣之北也小樂至階東注不統至在此釋曰云不統於工明工雖衆位猶在此者決燕禮工四人樂正升立于工之西在西階東不統于工此雖六人衆於彼猶統于階而云西階東不變若使小樂正通之於工恐工位移近西故猶統于階也乃歌鹿鳴三終注鹿鳴至咨事釋曰云主於講道略於勞苦者據四牡勞使臣此不用之云與咨事者謂皇皇者華有咨謀咨度咨詢之事亦略之也主人至左瑟注工歌至節也釋曰云洗爵獻工辟正主也者案鄉飲酒鄉射云大師則為之洗謂君賜之樂者其餘工不為之洗是正主法今此工六人皆為之洗故云辟正主也必知同洗者以其更無別獻之文故知同洗也云獻不用觚工賤異之也者燕禮大射獻賔獻卿大夫皆用觚而獻工用爵故云異之鄉飲酒鄉射獻同用爵者變於君故也云大師無瑟於是言左瑟者節也者上言獻工下云一人拜受爵則六人皆在工內而云工不興左瑟於是明大師亦入左瑟中故須云大師無瑟於是言左瑟者以其六人揔當獻酒之節故揔入左瑟文不謂有瑟也一人拜受爵注謂大至於席釋曰云謂大師也言一人者工賤同之也者鄉飲酒鄉射云大師則為之洗則知此一人謂大師不言大師對君工賤不異其文故同之而云一人也主人至脯醢注輒薦之變於大夫釋曰案上文云辨獻大夫遂薦之此工得獻不待辨輒薦之故云變於大夫也使人相祭注使人至祭酒釋曰知祭薦祭酒者此文承一人受爵薦脯醢之下明二者皆祭也若下文衆工直祭酒不祭脯醢也大師至于後注鼓北至六寸釋曰知鼓北是西縣之北者以其下文大師少師始遷向東明此降者降在西縣之北可知云言鼓北者與鼓齊面餘長在後也者案前列樂縣之時鼓在鎛南今不言在鍾磬之北遙據鼓而言之者欲取形大又面向東工亦面向東故遙取鼓面也言餘長在後者欲見鼓長六尺六寸工面與鼓面齊鼓有餘長在人後矣言此者工與鼓前面齊後面不齊之意也云羣工陪于後三人為列也者大師少師二人上工四人今若立時三人為列大師後有工二人少師後亦有工二人故云三人為列也云於是時小樂正亦降立於其南北面者亦約遷樂於東方工西面樂正北面言亦者亦東方也云工立僕人立于其側坐則在後者亦約遷樂東方時面位得知也云考工記曰鼓人為臯陶長六尺有六寸者彼云韗人為臯陶先鄭云韗書或為􅕦玄謂􅕦者以臯陶名官􅕦即陶字從革今云鼓人者誤當作􅕦人􅕦人掌鼓後人誤言鼓鼓人自在地官掌教六鼓矣云為臯陶者鼓木之名其穹隆二十版謂鼓木長六尺六寸賈侍中彼解為晉鼓引之者證鼓東西長工齊前面於後有餘之義也乃管新宫三終注管謂至之中釋曰云管謂吹簜者此云管上云簜故鄭合為一事解之云其篇亡其義未聞者以其堂下詩故與由庚之等同亡但上由庚由儀之等有序無詩同云有其義而亡其辭此則辭義皆亡故云其義未聞云笙從工而入者案燕禮云笙入立于縣中有笙入之文此上下不見笙入之文故知笙從工而入也上云簜解為竹謂笙簫之屬竹即管也今此經云管巳解簜為管復云笙從工而入者燕禮記云下管新宫笙入三成則吹管者亦吹笙故兼言笙欲見笙管相將也云立于東縣之中者燕禮笙入立于縣中則於此縣而言此辟射位故知立于東縣之中也卒管至上坐注不言至其南釋曰工人前不即遷于東者為管笙所作不以無事亂有事故待卒管大師乃東坫西面北上坐不言去堂逺近當如鄉射遷工阼階下之東南堂前三笴西面北上云不言縣北統於堂也者上云鼓北不統於堂者彼權立非正位故也擯者至司正注三爵至法也釋曰自此盡北面立論將射立司正察儀安賔之事注奠觶至多也釋曰燕禮及此君禮司正不以觶升而奠之於地比鄉飲酒及鄉射為顯其威儀多自此巳後還與二鄉同也司射至鉤弦注司射至作接釋曰自此至于次論射事將至誓射者及比三耦之事云司射射人也者案燕禮射人告具注云射人主此禮以其或射又云射人納賔又云射人請立司正公許射人遂為司正則射人司正一人也又云乃薦司正與射人一人注天子射人司士皆下大夫二人諸侯則上士其人數亦如之又曰若射則大射正為司射注大射正射人之長此篇云射人告具又曰大射正擯自此以後皆止云擯擯者自阼階下請立司正公許遂為司正則此篇司正與大射正為一人也下云公就物小射正奉決拾以笥大射正執弓注云大射正舍司正親其職乃薦司正注云司正大射正是也云耦次在洗東南者此無正文案鄉射記云設楅橫奉之南面坐奠之南北當洗此下云三耦出次西行拾取矢又當北行向楅則次在洗東南矣云方持弦矢曰挾者以矢橫為方鄉射記云凡挾矢於二指間橫之是也自阼至請射注為政至射禮釋曰云為政謂司馬也者案大宰云四曰夏官其屬六十掌邦政是為政謂司馬也云司馬政官主射禮者其屬有射人主射事故司馬政官主射禮也遂告至大夫注因告至為于釋曰云不足則士侍於大夫與為耦也者是以曲禮云君使士射注謂以備耦是也遂適至射器釋曰命謂司射命之也言有司則前文司士戒士射與贊者注云謂士佐執事不射者是也鄉射西階前西面命弟子納射器此言東面者君在阼冝向之故東面右顧者以其有司是士士在西階南東面是以右顧向之射器至而俟注中閭至作待釋曰云中閭中算器也者鄉射記云於郊則閭中據此大射故知閭中中所以盛算故云算器也云司射矢亦止西堂下者下文云司射卒誘射遂適堂西改取一個挾之是也若然司射有矢無弓在堂西有弓者誤或則據司射將獻釋獲者適阼階西去撲適堂西釋弓脫決拾是時弓在西堂下也工人至蒞之注工人至之長釋曰知工人士與梓人皆司空之屬能正方圜者冬官雖士不知官屬之號見今考工記有三十官有梓人之官此工人士又與梓人同事故知冬官未亡時屬司空也云能正方圜者以工巧之能知也繢人職云火以圜土以黃其象方梓人職張五采之侯之類是知方圜也云一從一橫曰午謂畫物也者則上文橫與距隨是也但未知從者橫者若為用丹若為用墨或科用其一云午十字謂之先以左足履物右足隨而並立也云度尺者即鄉射記從如笴三尺橫如武尺二寸是也卒畫至階下注掃物至堂下釋曰知工人梓人司宫位在北堂下雖無正文南方不見有位其人升降自北階明位在北堂下太史至聽政注中未至東面釋曰注引鄉射者欲見太史位之所在在此也司射至許諾注誓猶至作辭釋曰卑者尊者射不異侯言此者以其誓云君射大侯大夫射參侯士射干侯恐與尊為耦亦各射已侯故覆言此賔與君為耦同射大侯士與大夫為耦同射參侯以其既與尊者為耦不可使之別侯別侯者則非耦類故也遂比三耦注比選至東面釋曰云不言面者以下云面故決之云大夫在門右北面士西方東面者仍依朝位以其設朝之班位以來其位未改明知司射命誓及比次須還依舊位司射面皆向之而比次也若耦及侯數天子大射賔射六耦三侯畿內諸侯則二侯四耦畿外諸侯大射賔射皆三侯三耦但諸侯畿外畿內各有一申一屈故畿外三侯逺尊得申與天子同三耦則屈畿內二侯近尊則屈四耦則申若燕射則天子諸侯例同三耦一侯而巳以其燕私屈也若卿大夫士例同一侯三耦略言之數備禮記射義也三耦至北上注未知至為立釋曰云未知其耦者下經始命之故云未知其耦若然此經巳言面位者三耦雖未知與誰為耦要知為三耦故立於此司射至于次注取弓至蔽處釋曰云取弓矢不拾者次中隱蔽處者對鄉射堂西顯露之處拾取矢也司射至誘射注搢扱至誘人釋曰自此至東面論司射誘射之事此射人誘射與鄉射同但鄉射往階西取弓矢此則入次取弓矢為異然此云入次搢三挾一個則巳前皆挾乘矢不改鄉射亦然引論語者彼夫子教弟子學問事司射教人射事雖不同同是教法故引為證也注不南至背卿釋曰案鄉射誘射射卒南面揖者彼尊東或公或卿大夫位同不別故司射不特尊之此大射辨尊卑尊東唯有天子命卿其餘小卿及大夫皆賔西故特尊之不背之也注撲所至之西釋曰云於是言立著其位者案鄉射司射先立所設中之西南三耦從之立於西南司射却就之搢三挾一個乃誘射此則誘射卒乃始來就位者由此有次就次取弓矢射訖無事乃於此立故云於是言立著其位也引鄉射記者此不言司射倚弓矢之處引之證此與彼記文同也司馬至負侯注司馬至為旌釋曰自此盡而俟論司馬師命服不負侯之事也引天子服不氏下士一人徒四人者欲見諸侯亦三侯亦使服不氏與徒為獲者也云折羽為旌周禮司常文司射反位釋曰此不言先反位者為三耦始出次未有次前位無所先故不言先也注上射至間也釋曰云上射在左便射位也者鄉射亦云上射在左不云便射位者彼東面位上射在北故在左不取便射位之義此次北西面位亦上射在北居右故上射須在左以其發位並行及升北面就物位皆言居左履物南面上射乃在右故云上射在左便射位也注視侯至十尺釋曰弓二寸以為侯中參侯七十弓故侯中十四尺干侯五十弓故侯中十尺司馬至去侯注司馬至物間釋曰云司馬正政官之屬者非大司馬大司馬之下屬大司馬故云司馬屬案天子有大司馬卿一人小司馬中大夫二人此雖諸侯禮亦應有小司馬號為司馬正也知適下物由上射後東過也者案鄉射司馬命去侯時由上射後過至下射西西南面揚弓命去侯故引鄉射證此亦在物間西南面也負侯至聲止注宮為至為磬釋曰云宫為君商為臣樂記文云聲和相生者宫生徵徵生商而云相生者雖隔徵亦是相生之義也云聲和者宫數八十一商數七十二彈宫則商應故云聲和也引鄉射者彼臣禮下云諾聲不絶不言宫商引之證與此不同之意授獲至而俟注大侯至非也釋曰云大侯服不氏負侯徒一人居乏相代而獲者上注引周禮服不氏下士一人徒四人是以鄭分之於三侯之上大侯尊故使服不氏與一徒居乏自餘徒三人分之於二侯徒以少一人不得相代也引鄉射者此文不具冝與彼同司馬至反位注拾遂至之南釋曰引鄉射者於此司馬不言位冝與鄉射同故引為證獲而未釋獲注但言至為舍釋曰云但言獲未釋算者鄭注鄉射云但大言獲此注不言大省文也上射至反位注上射至皆袒釋曰云上射降三等者諸侯階有七等言三等者欲明下射中等是降一等之上下下射過向西畔由右故上射至地待之乃得二人並行上射於左也云與升射者相左交于階前者降射者仍南行故得階前交往來也云上射於左由下射階上少右乃降待之者此鄭解在階下而上射得在左之意由下射階上少右向西畔乃降上射於地待之故並行時得上射在左也云凡射皆袒者案鄉射命三耦各與其耦讓取弓矢拾三耦取弓遂至卒射云脫決拾襲而俟于堂西南面此則前遂命三耦取弓矢于次不言袒至此亦言襲故須言凡射皆袒決在此不見袒亦袒可知也三耦至反位釋曰云司射去撲倚于西階西適阼階下北面告于公者案鄉射司射去撲倚于西階之西升堂北面告于賔曰三耦卒射注云去撲乃升不敢佩刑器即尊者之側此不升堂而在阼階下而亦去撲者尊公故也司馬至相左注出出至適次釋曰自此至興反位論取矢設楅云出於次也袒時亦適次者以此而言則袒時入次今更出次知不在位上袒而入次取弓者凡袒襲皆隱處鄉射無次司馬適堂西袒執弓矢不在位此大射有次明入次袒不在位可知注此出至降之釋曰此出于下射之南還其後而降之者鄉射文此亦然故引為證也小臣至為畢注畢所至東肆釋曰云畢所以教助執事者以畢是助載鼎實之物故司馬執弓為畢以指授若周禮執殳以為鞭度然引鄉射禮文者證經設楅故亦當洗司射至于公注倚撲至聞之釋曰自此盡未降請君行第二畨射并命耦之事云倚撲者將即君前不敢佩刑器也者上以去撲告君不注至此乃注者彼告在阼階下逺君故不注至此升堂乃注義與彼同也上不升者以告以三耦射射卒事緩故在下此告欲諸公卿大夫遍聞也故升但升者是其正故鄉射升堂大射告公故前在堂下此升者欲公卿聞之故也司射至北上注適次至面立釋曰云告于大夫曰請降者以諸公卿在上故請大夫降鄉射降告主人與賔為耦遂告于大夫又曰賔主人與大夫皆未降注云言未降者見其志在射大夫未降者彼臣禮主人與賔皆卑故大夫未降與此異也云適次由次前而北西面立者上云司射等適次謂入次中此適次者大夫降自西階東行適次所過向堂東西面立因過次為適次非入次也司射至為上注為上至之上釋曰云為上居羣士之上者若是士與大夫之尊者為耦故居羣士之上也鄭云羣士之上者既為上射恐在大夫之上故云羣士之上是以下注云士雖為上射其辭猶尊大夫也若然國皆有三卿五大夫三耦六人而巳而云使士為耦者卿大夫或有故或出使容其不足使士備耦之法也注言未至在射釋曰言未者後當降故云未也若終不射不得言未是以鄉射記云衆賔不與射者不降注不以無事亂有事是不射不得云未也遂命至挾之注此命至未訖釋曰自此盡襲反位論命拾取矢之事鄭知此是命入次之事者上來未有三耦入次袒決遂之事又下文乃云一耦出明此是命入次之事若然司射命訖當反位不言者以其三耦入次出乃當作取矢待作取矢即是事未訖故不言反位也仍未知令入次之後未出之間且在西方位且在階下位二者雖無文以事緩急言之三耦入次出則作之宜在階下位於義可也又鄉射云司射反位者司射反位則有三耦位得言反位此曰射位在西方去次逺又曰射位若階下去次亦逺不得言反故不言也上射至面揖注橫弓至為阻釋曰云左還反其位母周右還而反東面也者母周者左還行至位即位右還而反東面是還不周也云君在阼還周則下射將背之者上射左還巳還背君而據下射而言者上射去君逺故據下射而言以其下射若右還周為背君若左還向東覆即右還西面是不背君周即背故也下射至面揖注橫弓至便也釋曰云橫弓亦南踣弓也者謂南踣弓以左手仰執弓裏以覆右手於弓表向下取矢亦便也上射下射俱南踣弓者取背君向南為順故也兼挾至面揖注內還至可也釋曰云不皆右還亦以君在阼嫌下射故左還而背之者若上下俱向內是相向為順若上射左還是不故背君若下射右還背君少亦左還初時面向君轉身南向背君多似故背君故不左還也云上以陽為內下以隂為內因其冝可也者上射東面左還時以左手還取東相陽方為內下射西面右還時以右手還取西相隂方為內隨其隂陽得左右相向是因其冝也揖以至於左注以猶至東面釋曰云言以者耦之事成於此意相人耦也者揖不須言以今云以者必有義意故鄭云言以者耦之事成於此謂成於此拾取矢以其取矢後一畨了更無事故云成於此人意相存耦也云上射轉居左便其反位也者位在次北西面是以上射居左至次北右還西面便也云上射少北乃東面知不少南者以其次在楅東南北面揖時巳在次西面故知上射少北乃東面得東當次也大史至而俟注先猶至南末釋曰此不見執算之人案鄉射命釋獲者釋獲者執鹿中一人執算以從之彼臣禮官少釋獲者自執中設之尚使人執算況國君官臣多大史不自執中豈得自執算明亦使人執之云小臣師退反東堂下位者其位以見篇首也引鄉射者證算以南末為順也司射至不與注離猶至作魁釋曰中謂中侯注不言可知云離猶過也獵也者謂矢過獵因著維與綱二者云侯有上下綱其邪制躬舌之角者為維者案梓人云上綱與下綱出舌尋縜寸焉注綱所以繫侯於植者也上下皆出舌一尋者亦人張手之節也鄭司農云縜籠綱者維持侯者若然則綱與維皆用繩為之又以布為縜籠綱然後以上個下個邊綴著縜兩頭以綱繫著植維者於上個下個上下躬兩頭皆有角又以小繩綴角繫著植故矢或離綱或離維也云或曰維當為絹絹綱耳者鄭更為一解絹則維也云絹綱耳者以絹為綱耳離著絹也云衆當中鵠者大射鵠則梓人云張皮侯而棲鵠是也唯公至皆獲注植中至釋獲釋曰云中三侯皆釋獲則離維綱及揚觸梱復亦釋之不言者以中為主也注傳告服不釋曰據在大侯而言告服不則參侯干侯告可知舉逺見近司射至反位注貫猶至作關釋曰案上文離維綱公則釋獲言之則此云不中不釋算者據除君而言也儀禮疏卷第十七
