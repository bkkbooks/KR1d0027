body:
  text: 云三帛二牲一死摯即士摯雉今此亦是士禮恐用死鴈故云不用死也云皮帛必可制者可制爲衣物此亦是敎婦以誠信之義也腊必至殽全注殽全至剥傷釋曰腊用鮮者義取夫婦日新之義云魚用鮒者義取夫婦相依附者也云殽必全者義取夫婦全節無虧之理此並據同牢時也女子至稱字釋曰女子許嫁謂年十五巳上至十九巳下案曲禮女子許嫁纓有笄兼有纓示有繫屬此不言纓文不具也云醴之稱字者猶男子冠醴之稱字同是以禮記喪服小記云丈夫冠而不爲殤婦人笄而不爲殤是其義同也注許嫁至其禮釋曰知許嫁巳受納徵禮也者以納采問名納吉三禮雖使者往來未成交親故曲禮云非受幣不交不親鄭據納徵唯未行請期親迎也二者要待女二十爲之云笄女之禮猶冠男也使主婦女賔執其禮者案雜記云女雖未許嫁年二十而笄禮之婦人執其禮鄭注云言婦人執其禮明非許嫁之笄彼以非許嫁笄輕故無主婦女賔使婦人而巳明許嫁笄當使主婦對女賔執其禮其儀如冠男也又許嫁者用醴禮之不許嫁者當用酒醮之敬其早得禮也祖庿至宗室注祖庿至之家釋曰此謂諸侯同族之女將嫁之前敎成之法經直云祖廟鄭知女髙祖爲君者之廟也以有緦麻之親者以其諸侯立五廟大祖之廟不毀親廟四以次毀之經云未毀與巳毀是據髙祖之廟而言故云祖廟女髙祖爲君者之廟也共承髙祖是四世緦麻之親若三世共曾祖曾祖小功之親若共祖大功之親若共禰廟是齊衰之親則皆敎於公宫今直言緦麻者舉最䟽而言親者自然敎於公宫可知也云敎以婦德婦言婦容婦功者昬義文鄭彼注云婦德貞順也婦言辭令也婦容婉娩也婦功絲麻也云宗室大宗之家者案喪服小記繼别爲宗謂别子之丗適長子族人來宗事之者謂之宗者收族者也髙祖之廟旣毀與君絶服者則皆於大宗之家敎之又小宗有四或繼祖或繼禰或繼曾祖或繼髙祖此等至五代皆遷不就之敎者小宗卑故也問名至乃降注受鴈至女名釋曰此亦記經不具者案經直云問名如納采之禮納采禮中無主人西靣對事故記之也知受鴈於兩楹閒南靣者納采時賔當阿東靣致命主人阼階上北靣再拜又云授于楹閒南靣問名如納采之禮故亦楹閒南靣授鴈於彼唯不云西靣故記之也云還于阼階上對賔以女名者此即西靣對與拜時北靣異處也祭醴至反命釋曰云祭醴者謂賛醴婦之時禮成於三其爲三祭之時始祭醴云初故始扱壹祭後祭醴又扱爲再祭也云賔右取脯左奉之乃歸者經直云降筵北靣坐取脯不言用左右手故記之也云右取脯左奉之者謂先用右手取得脯乃用左手兼奉之以降授從者於西階下乃歸執以反命注反命至壻父釋曰知反命是此問名納吉納徴請期者以下云凡使者歸反命曰某旣得將事矣敢以禮告言凡非一則知四者皆有反命也以納采與問名同使親迎又無使者故據此四者而言也納徴至在南釋曰案經直云納徴玄纁束帛儷皮如納吉禮則授幣得如授鴈之禮至於庭實之皮無可相如故記之注攝猶至位併釋曰執皮者相隨而入至庭北靣皆以西爲左一手執兩足毛在内故云内文云左首象生者案聘禮執皮者皆左首此亦執皮而左首故云象生與執禽者同故引曲禮執禽者左首爲證必象生者取婦人生息之義云隨入爲門中阨陜者皮皆橫執之案匠人云廟門容大扃七个注云大扃牛鼎之扃長三尺每扃爲一个七个二丈一尺彼天子廟門此士之廟門降殺甚小故云門中阨陜故隨入得並也云西上中庭位併者俱北靣西上也賔致至東壁釋曰此亦爲經不見主人之士受皮之事故記之也云釋外足者據人北靣以足向上執之足逺身爲外受之則文見故釋外足見文也云士受皮者取皮自東方出于後者謂自東方出於執皮者之後至於左北靣受之故云自左受也云逆退者二人相隨自東而西今以後者先向東行故云逆退也注賔致至由也釋曰云賔致命主人受幣庭實所用爲節者以其上經納徴授幣如納吉之禮其目巳具今言之者爲執皮者釋外足見文及士受皮時節不見故云賔堂上致命時庭中執皮者釋外足見文主人堂上受幣時主人之士於堂下受取皮是其庭實所用爲節也云士謂若中士下士不命者但諸侯之士國皆二十七人依周禮典命侯伯之士一命子男之士不命命與不命國皆分爲三等上九中九下九案周禮三百六十官皆有官長其下皆有屬官但天子之士上士三命中士再命下士一命與諸侯之士異若諸侯上中下士同命今言士謂若中士下士不命者據上士爲官長者若主人是中士則士是下士若主人是下士則士是不命之士府史之等此不命與子男之士不命者别彼雖不得君簡䇿之命仍得人君口命爲士此則不得君命是官長自辟除者也案旣夕宰舉幣是士之府史則庭實胥徒爲之云自由也者謂由執皮者之左受之也父醴至房外注女旣至女也釋曰此亦前經不具故記之云女旣次純衣父醴之于房中南靣者見於上文云葢母薦焉者舅姑共饗婦姑薦脯醢故知父母醴女亦母薦脯醢重昬禮故母薦也云女奠爵于薦東立于位而俟壻者案士冠禮子與醮子及此篇禮賔禮婦皆奠爵于薦東明此亦奠薦東也云壻至父出使擯者請事者見于上文云母出南靣房外示親授壻且當戒女也者並參下文而言也女出至不降釋曰此記亦經不具以母出房戸之西南靣女出房西行故云出于母左父在阼階上西靣故因而戒之云母戒諸西階上者母初立房西女出房母行至西階上乃戒之也注必有至不忘釋曰云託戒使不忘者謂託衣笄恒在身而不忘持戒亦然故戒使不忘也下文父母及庶母重云戒者並與此文相續成也此士禮父母不降送案桓公三年經書九月齊侯送姜氏于讙榖梁傳曰禮送女父不下堂母不出祭門祭門則廟門言不出廟門則似得下堂者彼諸侯禮與此異以其大夫諸侯天子各有昬禮故不同也婦乗以几注持几者重愼之釋曰上經雖云婦乗以几不見從者二人持之故記之也此几謂將上車時而登若王后則履石大夫諸侯亦應有物履之但無文以言今人猶用臺是石几之類也婦入至加勺釋曰經中唯置酒尊不見徹幂以下事故記之注屬注至尊中釋曰經云酌玄酒三注於尊謂於外器中酌取此涗水三度注於玄酒尊中禮成於三故三注之也云玄酒涗水貴新者案郊特牲云明水涗齊貴新也又云凡涗新之也是禮有貴新也今昬禮事至乃取之故云貴新也若然禮有玄酒涗水明水三者各逐事物生名玄酒據色而言涗水據新取爲號其實一也以上古無酒用水爲酒後代雖有酒用之配尊不忘本故也明水者案周禮秋官司烜氏云以隂鑒取明水於月郊特牲云其謂之明水也由主人之絜著此水也注云著猶成也言主人齊絜此水乃成可得也配尊之酒三酒加玄酒鬱鬯與五齊皆用明水配之郊特牲云五齊加明水三酒加玄酒不言鬱鬯者記人文略也相對玄酒與明水别通而言之明水亦名玄酒故禮運云玄酒在室彼配鬱鬯五齊是明水名爲玄酒也以其俱是水故通言水也若天子諸侯祭祀得鬱鬯與五齊三酒並用卿大夫士祭直用三酒與玄酒無五齊與鬱鬯又明水若生人相禮不忘本亦得用以其用醴醴則五齊之中醴齊之類也笲緇至徹笲釋曰上經雖云笲不言表裏加飾之事故記之也婦席薦饌于房注醴婦至薦也釋曰此亦於經不見故記之但醴婦時唯席與薦無俎其饗婦非直有席薦并有俎俎則不饌于房從鼎升于俎入設于席前今據醴婦時同有席與薦饌于房中者而言也饗婦姑薦焉釋曰經直言舅姑共饗婦以一獻之禮時同自明不言姑薦故記之也婦洗至靣盥釋曰經唯言北洗不言洗處及篚故記之也注洗在至隅閒釋曰房與室相連爲之房無北壁故得北堂之名故云洗在北堂也云所謂北洗者所謂經中北洗也云北堂房半以北者以其南堂是戸外半以南得堂名則堂是戸外之稱則知此房半以北得堂名也知房無北戸者見上文云尊于房戸之東房有南户矣燕禮大射皆云羞膳者升自北階立于房中不言入房是無北壁而無戸是以得設洗直室東隅也云洗南北直室東隅者是南北節也云東西直房戸與隅閒者是東西節也婦酢舅更爵自薦釋曰謂舅姑饗婦獻時舅姑薦今婦酢舅婦自薦之嫌别人薦故記之也不敢至拜洗釋曰此事當在婦酢舅之上退之在下者欲見酬酒洗時亦不辭故也此對士冠郷飲酒之等主與賔爲禮皆辭洗此則不敢也此事於經不見故記之也凡婦人相饗無降注姑饗至在上釋曰本設北洗爲婦人有事不下堂今以北洗及篚在上故不降經不言故記之也言凡者欲見舅姑共饗婦及姑饗婦人送者皆然故言凡也婦入至祭行注入夫至祭也釋曰此據舅在無姑或舅没姑老者若舅在無姑三月不須廟見則助祭案内則云舅没則姑老者謂姑六十亦傳家事任長婦婦入三月廟見祭菜之後亦得助夫祭故鄭云謂助祭也此亦謂適婦其庶婦無此事亦以經不見故記之也庶婦至不饋注庶婦至適也釋曰不饗者以適婦不醮而有饗今使人醮之以醮替饗故使人醮之不饗也云酒不酬酢曰醮者亦如庶子醮然知亦有脯醢者以其饗婦及醮子皆有脯醢故知亦有脯醢也云其儀則同者適婦用醴於客位東靣拜受醴賛者北靣拜送今庶婦雖於房外之西亦東靣拜受醮者亦北靣拜送故云其儀則同也云不饋者共養統於適也者謂不盥饋特豚以其共養統于適婦也昬辭至某也注昬辭至壻名釋曰鄭知昬辭是擯者請事告之辭者以其言吾子有惠貺室某也是使告主人之辭明知是擯者出門請事使者告之辭也知吾子謂女父者使人告擯者稱前巳有惠貺其妻於壻某申明是女父乃得以女許人故知吾子女父也云明下逹者此擯者稱有惠貺室即壻家舊巳有辭下逹女家見許今得言貺室也故引上文下達以釋此也引子謂公冶長可妻也者證以女許人稱貺室室猶妻也某有至納采注某壻至名也釋曰此亦是使者門外通連上語告擯者之辭也以其使者稱向主人擯者故知上某是壻父下某是使者名也對曰至敢辭注對曰至能字釋曰鄭知對曰者擯出納賔之辭者以其上文賔告擯者辭下經致命主人明此是中閒擯者出領賔告者辭下經致語入告主人擯者又領主人此語以告使者知也致命曰敢納采釋曰此使者升堂致命於主人辭若然亦當有主人對辭如納徵致命主人對辭不言之者文不具也問名賔在門外請問名主人許無辭者納采問名同使前巳相親於納采許昬訖故於問名略不言主人所傳辭也是以於此直見賔升堂致命主人之辭也自此巳下有納吉納徵請期之等皆有門外賔與擯者傳辭及升堂致命主人對或理有不須而言或理須辭而文不具以情商度義可皆知也注某使至之女釋曰知某使者名也者以使者對主人稱某旣受命明是使者之名也云誰氏者謙也者以其下達乃納采則知女之姓矣今乃更問主人女爲誰氏者恐非主人之女假外人之女收養之是謙不敢必其主人之女也且本云問名而云誰氏者婦人不以名行明本不問女之三月名此名即姓號之名若尚書孔注云虞氏舜名舜爲謚號猶爲名解之明氏姓亦得爲名若然本問名上氏姓故云誰氏也對曰至敢辭釋曰云吾子有命者正謂行納采問名使者將命來是已有命來擇即是且以備數而擇之也注卒曰至之女釋曰云卒曰某氏者主人終卒對客之辭當云某氏對使也云不記之者明爲主人之女者若是他女當稱女氏以荅今不言之者明是主人之女容舊知之故不對是以云明爲主人之女也注貺賜至父名釋曰知某是壻父名者以其云命某加諸卜是壻父卜故知某是壻父名對曰至敢辭注與猶兼也釋曰云我與在以其夫婦一體夫旣得吉婦吉可知故云我兼在名吉中也納徵至承命釋曰吾子有命以下至請納徵是門外向擯者辭也云致命曰某敢納徵者是所升堂致命辭也云對曰者是堂上主人對辭也請期至吉日釋曰云某旣申受命矣者申重也謂前納采巳後每度重受主人之命也云惟是三族之不虞使某也請吉日者今將成昬須及吉時但吉凶不相干若值凶不得行吉禮故云惟是三族死生不可億度之事若值死時則不得娶及今吉時使某請吉日以成昬禮也注三族至嫁子釋曰鄭知三族是父己子三者之昆弟者若大功之喪服内不廢成禮若期親内則廢故舉合廢者而言以其父昆弟則伯叔及伯叔母己昆弟則己之親兄弟子昆弟則己之適子庶子者皆己之齊衰期服之内親故三族據三者之昆弟也引雜記者見大功小功之末旣葬則可以嫁子娶妻經云三族不據之矣今據父之昆弟期於子小功不得與子娶妻若於子期於父小功亦不得娶妻知今皆據壻之父而言若然已父昆弟於子爲小功而言此三族者己及子皆爲服期者亦據大判而言耳注某吉日之甲乙釋曰云曰某日者是使者付主人吉日之辭云某吉日之甲乙者謂以十日配十二辰若云甲子乙丑丙寅丁卯之類故鄭略舉甲乙而言之也注告禮所執脯釋曰知禮是所執脯者上文禮賔賔皆北靣取脯降授從者今此云歸以反命故知禮是所執脯也父醮子釋曰女父禮女用醴又在廟父醮子用酒又在寢不同者父禮女者以先祖遺體許人以適他族婦人外成故重之而用醴復在廟告先祖也男子直取婦入室無不反之故輕之而用酒在寢知醮子亦不在廟者若在廟以禮筵於戸西右几布神位今不言故在寢可知也勗帥至有常注勗勉至徽音釋曰云以敬其爲先妣之嗣者謂婦人入室使之代姑祭也詩云大姒嗣徽音者大雅文王詩大姒者文王妃嗣繼徽美也娶大姒所以繼先妣美音也引之者證敬其爲先妣之嗣也賔至至承命注賔壻至來迎釋曰云命某某壻父名者以其經有二某命某者是壻自稱之以對擯者也經云使某者是壻名故不言也父送至違命釋曰上送女之時父母俱戒訖今此記人又云此戒者當同是送女時并有此戒續成前語庶母所戒亦然以前後語時不同故記人兩處記之但父戒之使無違舅命母戒之使無違姑命故父云命母云戒也然若此注有云命舅姑之敎命有姑字者傳寫誤也云古文母爲無不從者以許氏說文母爲禁辭故從經今文母爲正也宫事釋曰則姑命婦之事若内宰職云后敎六宫婦人稱宫故也庶母至衿鞶注庶母至行之釋曰云男鞶革女鞶絲者内則文男女用物不同故并引男子鞶革於經無所當也云所以盛帨巾之屬爲謹敬者案内則云箴管線纊施縏袠鄭云縏袠言施明爲箴管線纊有之是鞶以盛帨巾之屬此物所以供事舅姑故云謹敬也云不示之以衣笄者尊者之戒不嫌忘之者前文父戒以衣笄此經母施衿結帨庶母直示之以衿鞶不示以衣笄故鄭決之也云視乃正字今文作示俗誤行之者案曲禮云童子常視母誑注云視今之示字彼注破視從示此注以視爲正字以示爲俗誤不同者但古文字少故眼目視瞻與以物示人皆作視字故此注云視乃正字今文作示是俗人以今示解古視故云誤也彼注云視今之示字者以今曉古故舉今文示而言兩注相兼乃具也宗子至命之注宗子至命之釋曰云宗子者適長子也者案䘮服小記云繼别宗繼禰者爲小宗大宗小宗皆是適妻所生長子也云命之命使者者謂納采巳下至請期五者皆名使者也云母命之在春秋紀裂繻來逆女是也者案隱二年經書秋九月紀裂繻來逆女公羊傳曰裂繻者何紀大夫也何以不稱使昬禮不稱主人何休云爲養廉逺恥也又云然則曷稱稱諸父兄師友宋公使公孫壽來納幣則其稱主人何辭窮也辭窮者何無母也休注云禮有母母當命諸父兄師友稱諸父兄師友以行宋公無母莫使命之辭窮故自命之自命之則不得不稱使又云然則紀有母乎曰有有則何以不稱母母不通也休注云禮婦人無外事但得命諸父兄師友稱諸父兄師友以行耳母命不得達故不得稱母通使文所以逺别也服注亦云不稱主人母命不通故稱使婦人無外事若然直命使子之父兄師友使命使者不自親命使者此注云命之命使者似母親命者鄭略言之其實使子父兄師友命使者也云躬猶親也親命之則宋公使公孫壽來納幣是也者成八年文義取公羊傳如向說舉納幣其餘使親命之也云言宗子無父至不及者案曲禮七十曰老而傳注云傳家事在子孫是謂宗子之父又王制云八十齊喪之事弗及也注云八十不齊則不祭也子代之祭是謂宗子不孤二者皆是宗子有父雖主家事其昬事則父命使者也支子則稱其宗釋曰云稱其宗者謂命使者當稱宗子以命之以大小宗皆然也弟則稱其兄注弟宗子之母弟釋曰知此弟是宗子同母弟者以上支子謂庶昆弟稱其宗子命使者故知此弟宗子同母弟也若不至請覿釋曰上巳言親迎自此巳下至篇末論壻不親迎過三月及壻往見婦父母事也必亦待三月者亦如三月婦廟見一時天氣變婦道成故見外舅姑自此至敢不從並是壻在婦家大門外與擯者請對之辭注女氏至覿見釋曰女氏稱昬壻氏稱姻者爾雅釋親文所以別男女則男曰昬女曰姻者義取壻昬時往娶女則因之而來及其親則女氏稱昬男氏稱姻義取送女者昬時往男家因得見之故也主人至走見釋曰云某之子未得濯漑於祭祀者前祭之夕濯漑祭器以其自此以前未廟見未得祭祀故未敢相見也云請吾子之就宫者使壻還就家是欲往就見也注主人至曰辱釋曰云以白造緇曰辱者謂以絜白之物造置於緇色徳中是汙白色猶今賔至己門亦是屈辱故云以白造緇曰辱也對曰至賜見注非他至終賜釋曰此壻對擯者辭云非他故彌親之辭者上擯云得爲外昬姻是相親之辭今又云非他故是爲壻而來見彌相親之辭也主人至拜出注出門至雉也釋曰云出内門入大門者以大夫士迎賔皆於大門外故此決之也云婿見於寢者聘禮凡見賔客及上親迎皆於廟者聘禮敬賔客故在廟親迎在廟者以先祖之遺體許人故在廟此壻見外舅姑非賔非親迎故知在適寢也云奠摯者壻有子道不敢授也者凡執摯相見皆親授受此獨奠之象父子之道質故不親授奠之而巳云摯雉也者以其士執雉是其常也擯者以摯出請受注欲使至相見釋曰案聘禮賔執摯入門右從臣禮辭之乃出由門左西進北靣從賔客禮此亦然故知所請受者請退從賔客相見受之壻禮至送出注出巳見女父釋曰云受摯入者亦如聘禮受摯乃更西入也云出巳見女父者以其相見訖擬出更與主婦相見也見主至其内注主婦至左扉釋曰云見主婦者兄弟之道冝相親也者爾雅母與妻之黨爲兄弟故知主婦於壻者兄弟之道也故云冝相親也云闔扉者婦人無外事者婦人送迎不出門見弟不踰閾是無外事也云扉左扉者士喪禮卜葬云闔東扉主婦立于其内旣言東扉即是左扉故知是左扉也主人至無幣注及與至賔客釋曰訓及爲與者以主人與壻揖讓而入寢門升堂醴壻故訓及爲與也云無幣異於賔客者上冠禮醴賔酬之以幣昬禮饗賔酬以束錦燕禮大射酬賔客皆有幣此無幣故云異於賔客也儀禮䟽卷第六
