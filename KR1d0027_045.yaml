body:
  text: 重刻宋本儀禮䟽後序道光庚寅歳閬原觀察重刻所藏宋景祐官本五十卷賈公彦儀禮䟽自一至卅一又自卅八至五十旣成以千里平日粗涉此經命以一言綴於後千里思夫治經者期曉然乎經之意而巳經之意不易曉曉之必由注經注之意不易曉曉之必由䟽此讀䟽之所以爲治經先務歟讀賈公彦之䟽由之以曉經注之意者最多舉其一言之郷飲酒禮䟽曰鄭注郷射云昔大王王季文王始居岐山之陽彼兼言文王者欲見文王未受命以前亦得召南之化此不兼言文王者據文王徙豐受命之後專行周南之敎賈合郷飲酒郷射燕三篇之注周南召南者而䟽通其意也學子但讀此䟽則郷飲酒之注與燕同不兼言文王者可以曉然而郷射之注與郷飲酒燕不同兼言文王者亦可以曉然又何用如若膺大令待其晚年别讀詩序先王之所以敎鄭注而後始見其或不言文王或言文王有不合仍未述及賈公彦具有明文轉謂從前不能知此哉用是推之治經者必以讀䟽爲先務斷斷然矣今閬原觀察知所先後獨舉罕遘之本用餉學子可謂盛心千里轉慮此後得之較易而讀者通患習焉弗察爰附著之若乃是書流傳之緒美善之徵校刊之例此不具出者見觀察所自序中也元和顧千里撰
