body:
  text: 重刻宋本儀禮疏後序道光庚寅歲閬原觀察重刻所藏宋景祐官本五十卷賈公彥儀禮疏自一至卅一又自卅八至五十既成以千里平日粗涉此經命以一言綴於後千里思夫治經者期曉然乎經之意而巳經之意不易曉曉之必由注經注之意不易曉曉之必由疏此讀疏之所以為治經先務歟讀賈公彥之疏由之以曉經注之意者最多舉其一言之鄉飲酒禮疏曰鄭注鄉射云昔大王王季文王始居岐山之陽彼兼言文王者欲見文王未受命以前亦得召南之化此不兼言文王者據文王徙豐受命之後專行周南之教賈合鄉飲酒鄉射燕三篇之注周南召南者而疏通其意也學子但讀此疏則鄉飲酒之注與燕同不兼言文王者可以曉然而鄉射之注與鄉飲酒燕不同兼言文王者亦可以曉然又何用如若膺大令待其晚年别讀詩序先王之所以教鄭注而後始見其或不言文王或言文王有不合仍未述及賈公彥具有明文轉謂從前不能知此哉用是推之治經者必以讀疏為先務斷斷然矣今閬原觀察知所先後獨舉罕遘之本用餉學子可謂盛心千里轉慮此後得之較易而讀者通患習焉弗察爰附著之若乃是書流傳之緒美善之徵校刊之例此不具出者見觀察所自序中也元和顧千里撰
