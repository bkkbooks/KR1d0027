body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彥等撰既夕第十三鄭目録云士喪禮之下篇也既巳也謂先葬二日巳夕哭時與葬閒一日凡朝廟日請啓期必容焉此諸侯之下士一廟其上士二廟則既夕哭先葬前三日大戴第十五小戴第十四别録名士喪禮下篇第十三釋曰鄭目録云士喪禮下篇者依别録而言以其記下士之始死乃記葬時而揔記之故名士喪禮下篇也鄭又云先葬二日與葬閒一日者驗經云既夕哭請啓期告于賔明旦夙興開殯即遷于祖一日又厥明即葬故知是葬前二日與葬閒一日也云必容者請啓期在葬前二日中閒容朝廟一日故云必容焉鄭又云此諸侯下士一廟其上士二廟則既夕哭先葬前三日者以其一廟則一日朝二廟則二日朝故葬前三日中閒容二日故三日若然大夫三廟者葬前四日諸侯五廟者葬前六日天子七廟者葬前八日差次可知既夕哭注既巳至位時釋曰此經論既夕哭請啓期之事夕哭者是主人朝夕哭在殯宫阼階之下禮將請啓殯之時主人於夕哭訖出寢門復外位故鄭云謂出門哭止復外位時者鄭知復外位請者見上篇卜日禮云既朝哭皆復外位朝夕之哭其禮並同明知此請啓期亦在復外位時若然上篇卜日禮云既朝哭皆復外位此不於既朝哭而待既夕哭者謂明日之朝始啓殯又不可隔夕哭故於既夕請也但復外位之時必有弔賔來亦在外位故請期因告賔也請啓期告于賔注將葬至為開釋曰云將葬當遷柩于祖有司於是乃請啓肂之期於主人以告賔者鄭解時未至而豫前二日夕哭之後出於門外位請期者明旦須啓肂以柩朝于祖故有司於此時請啓肂之期告賔使知而來赴弔之事也夙興至門外注祖王至共廟釋曰自此盡階閒論豫於祖廟陳饌之事言夙興者謂夕哭請期訖明旦早起豫設盆盥於祖廟門外擬舉鼎之人盥手案小斂設盆盥在東堂下大斂設盥于門外雖不言東方約小斂盥在東堂下則大斂盥亦門外東方此下陳鼎如大斂奠則此設盥亦在門外東方如大斂也云祖王父也者案祭法云曰考廟曰王考廟此云王父王父之言出於彼云下士祖禰共廟者又祭法云適士二廟官師一廟鄭注云官師中士下士案下記云其二廟則饌于禰則此經所朝據一廟者而言設盥于祖是下士一廟祖禰共廟據尊者而言也陳鼎至如之注皆皆至之奠釋曰案上文殯後大斂之陳三鼎有豚魚臘在廟門外西面北上此陳鼎亦如之云東方之饌亦如之者彼大斂時云東方之饌兩瓦甒其實醴酒毼豆兩其實葵菹芋螺醢兩籩無縢布巾其實栗不擇脯四脡故今云東方之饌亦如之云皆皆三鼎也者以其言皆明非一鼎皆三鼎可知又不言外內即門外及陳于阼階下亦西面北上外內同云如殯如大斂既殯之奠者以其大斂於阼階即移于棺而殯之殯訖乃于室中設大斂之奠即大斂奠在殯後恐於殯時别有奠故明之云如殯如大斂既殯之奠也夷牀饌于階閒注夷之至此牀釋曰云夷之言尸也者遷尸於堂亦言夷尸盤衾皆依尸而言故云夷之言尸也云朝正柩用此牀者謂柩至祖廟兩楹之閒尸北首之時乃用此牀故名夷牀也二燭至門外注早暗至用蒸釋曰自此盡夷衾論啓殯及變服之事二燭者以其發殯宫二者下云燭入注云照徹與啓肂者故於此豫備之云燭用蒸者案周禮甸師氏云以薪蒸役外內饔注云大曰薪小曰蒸又案又案少儀云主者執燭抱燋鄭云未爇曰燋燋即蒸故云燭用蒸也丈夫至如初注為將至外位釋曰云為將啓變也者凡男子免與括髮散帶垂婦人髽皆當小斂之節今於啓殯時亦見尸柩故變同小斂之時故云為將啓變也云此互文以相見耳髽婦人之變者髽既是婦人之變則免是男子之變今丈夫見其人不見免則丈夫當免矣婦人見其髽不見人則婦人當髽矣故云互文以相見耳引喪服小記者證見未成服巳前男子免而婦人髽既成服以後男子冠婦人笄若然小斂之時斬衰男子括髮齊衰以下男子免不言男子括髮者欲見啓殯之後雖斬衰亦免而無括髮知者案喪服小記云緦小功虞卒哭則免注云棺柩巳藏嫌恩輕可以不免也言則免者則既殯先啓之閒雖有事不免以此而言先啓不免則啓當免矣又喪服小記云君弔雖不當免時也主人必免不散麻雖異國之君免也親者皆免注云不散麻者自若絞垂為人君變貶於大斂之前既啓之後也親者大功以上也注直言不散麻貶於既啓之後則主人著免不貶矣以此言之啓後主人著免可知若啓後著免亦是貶矣若然後至卒哭其服同矣以其反哭之時更無變服之文故知同也云婦人髽及婦人笄者若未成服之時婦人髽無笄故空云髽成服之後婦人髽即有笄故喪服斬衰婦人云箭笄檀弓云南宫縚之妻之姑之喪夫子誨之髽蓋榛以為笄是成服有笄明矣是以婦人成服云笄也云散帶垂者小斂節大功巳上男子皆然若小功巳下及婦人無問輕重皆初而絞之云如初朝夕哭門外位者但經直云即位如初知如門外位者以下經始云主人拜賔入即位袒明知此未入門在門外如朝夕哭位也婦人至位袒注此不至歡囂釋曰云此不蒙如初者以男子入門不哭者案上篇朝夕哭云主人即位辟門婦人撫心不哭主人拜賔旁三右還入門哭婦人踊此主人入門不哭婦人不哭不踊故不得蒙如初也云將有事者謂將有啓殯之事也商祝至命哭注功布至作絻釋曰云功布灰治之布也者亦謂七升以下之布也云執之以接神為有所拂㧍也者拂㧍猶言拂拭下經云商祝拂柩用功布是拂拭去塵也此始告神而用功布拂㧍者謂拂㧍去凶邪之氣也云三有聲存神也者案曽子問亦云祝聲三鄭云警神也即此存神也云舊說以為聲噫興者鄭注曽子問云聲噫歆不云舊說亦是舊說也燭入注照徹與啓肂者釋曰上云二燭此鄭云照徹與啓肂則一燭於室中照徹奠一燭於堂照開殯肂也祝降至于重注祝降至作名釋曰此祝不言商夏則周祝也燭既入室周祝從而入室徹宿奠降降時夏祝自下升取銘降置于重為妨啓殯故也云祝降者祝徹宿奠降也者謂昨暮所設夕奠經宿故謂之宿奠也此宿奠擬朝廟所用即下云重先奠從者是也此奠所徹所置之處雖不言案上篇大斂遷小斂奠于序西南此亦序西南可也云吉事交相左者則鄉射大射皆云降與射者交於階下相左是也云凶事交相右者此凶事不言交相左者以凶事反於吉明交相右可知交相右者周祝降階時當近東夏祝升階當近西是交相右也云今文銘皆作名者此銘及下陳明器云取銘置于茵二者皆名但銘書作名亦通一塗也踊無算注主人也釋曰下文云商祝拂柩則踊無算當知開棺柩之時以其踊為哀號之巳甚故知主人也商祝至夷衾注拂去至形露釋曰開柩巳出時是棺南首夷衾本擬覆柩故斂時不用今得覆棺於後朝廟及入壙雖不言用夷衾又無徹文以覆棺言之當隨柩入壙矣遷于祖用軸注遷徙至以龍釋曰自此盡由足西面論以柩朝廟之事云遷于祖用軸者謂朝廟之時從殯宫遷移于祖廟朝時用輁軸載之案士喪禮將殯云棺入主人不哭升棺用軸則遷于祖時亦升輁軸於階上載之挽柩而下若然未升饌陳之當在堂下是以下記云夷牀輁軸饌于西階東注云明階閒者位近西夷牀饌于祖廟輁軸饌于殯宫而言階閒明在堂下也云檀弓曰殷朝而殯于祖者殷人將殯之時先朝廟訖乃殯至葬時不復朝也云周朝而遂葬者周人殯于路寢至葬時乃朝朝訖而遂葬引之者證經將葬朝祖之事云蓋象平生將出必辭尊者曲禮云出必告反必面是也案聘禮大夫將出聘告于禰乃行介無告禰之事故不得象之云軸輁軸也者下記云夷牀輁軸是也云軸狀如轉轔者此以漢法況之漢時名轉軸為轉轔轔輪也故士喪禮云升棺用軸注云軸輁軸也輁狀如牀軸其輪挽而行是以輪為轔也云刻兩頭為軹者以軸頭為軹刻軸使兩頭細穿入輁之兩髀前後二者皆然云輁狀如長牀穿桯前後著金而關軸焉者此輁既云長如牀則有先後兩畔之木狀如牀髀厚大為之兩畔為孔著金釧於中前後兩畔皆然然後關軸於其中言桯者以其厚大可以容軸故名此木為桯也云大夫諸侯以上有四周謂之輴者大夫殯葬雖不用輴士朝廟用輁軸則大夫朝廟當用輴諸侯天子殯葬朝廟皆用輴但天子畫轅為龍謂之龍輴檀弓諸侯云輴天子云菆塗龍輴是也此輴皆有四周為輴故名為輴也重先至人從注行之至在後釋曰此論發殯宫鄉祖廟之次序柩之前後皆有燭者以其柩車為隔恐暗故各有燭以照道若至廟燭在前者升照正柩在後者在階下照升柩故下記云燭先入者升堂東楹之南西面後入者西階東北面在下是也云主人從者丈夫由右婦人由左以服之親疏為先後者經直云主人從者以主人為首者而言故鄭揔舉男子婦人并五服而言知男子由右婦人由左者以內則云道路男子由右女子由左鄭云地道尊右彼謂吉時此雖凶禮亦依之也云親疏為先後各從其昭穆者假令昭親則在先昭疏則在後就同昭穆之中又以年之大小為先後男從主人後女從主婦後云男賔在前女賔在後者謂無服者亦各從五服男子婦人之後為序也升自西階注柩也至阼也釋曰云猶用子道不由阼也者案曲禮云為人子者升降不由阼階今以柩朝祖故用子道不由阼也奠俟至北上注俟正柩也釋曰既升階當正之於夷牀之上北首既正乃設奠故云俟正柩也主人至即位注東方之位釋曰主人主婦從柩而升言婦人升東面不言主人西面舉主婦東面主人西面可知故下文云主人西面也云衆人東即位者唯主人主婦升自衆主人以下從柩至西階下遂鄉東階下即西面位正柩至夷牀注兩楹至北首釋曰云兩楹閒象鄉戶牖也者以其戶牖之閒賔客之位亦是人君受臣子朝事之處父母神之所在故於兩楹之閒北面鄉之若言鄉戶牖則在兩楹閒而近西矣故下記云夷牀輁軸饌于西階東饌夷牀俟正柩而言西階東則正柩于楹閒近西可知矣云是時柩北首者既言朝祖不可以足鄉之又自上以來設奠皆升自阼階今此下文設奠升降皆自西階下鄭注云奠升不由阼階柩北首辟其足以此而言此時柩北首明矣主人至如初注如殯宫時也釋曰主人主婦從柩升即當西面東面鄉柩主婦上文即言東面至此乃言主人西面者以其主婦東面位不改故從柩升因言東面男子在柩東西面既改西面位故待正柩訖乃言西面也其重依上文序從之時重先不先置者以其上待正柩訖乃置之云如初者亦如上篇三分庭一在南二在北而置之故鄭云如殯宫時也席升至西階注席設至風塵釋曰此論設宿奠於柩西云席設于柩之西直柩之西當西階也者知當西階以其柩當戶牖之南席北鋪之自然當西階之上云從奠設如初東面也者如初謂如殯宫朝夕奠設于室中者從柩而來此還是彼朝夕奠脯醢醴酒據神東面設之於席前也云不統於柩神不西面也者謂不近柩設奠若近柩則統於柩為神不西面故不近東統于柩知神不西面者特牲少牢皆設席于奧東面則天子諸侯亦不西面可知云不設柩東東非神位也者此亦據神位在奧不在東而言也若然小斂奠設于尸東者以其始死未忍異於生大斂以後奠皆設于室中亦不統於柩此奠不設于室者室中神所在非奠死者之處故也云巾之者為禦當風塵者案禮記檀弓云喪不剝奠也與祭肉也與據小斂大斂之等也有牲肉故不裸露故巾之以此宿奠脯醢醴酒無祭肉巾之者以朝夕奠在室不巾此雖無祭肉為在堂風塵故巾之異於朝夕在室者也主人至西面注設奠至房中釋曰云降拜賔即位踊襲者賔謂在殯宫看主人開殯朝祖之賔襲者從殯宫中拜賔入即位袒至此乃襲襲者先即位踊踊訖乃襲絰于序東云設奠時婦人皆室戶西南面奠畢乃得東面者知婦人戶西南面者案下記云將載柩祝及執事舉奠戶西南面東上則知此設之時婦人辟之亦戶西南面待設奠訖乃由柩足鄉柩東西面不即鄉柩東西面者以主人在柩東待設奠訖主人降拜賔婦人乃得東也若然云親者西面則大功以上相隨同西面也又云堂上迫疏者可以居房中者以其言親者西面明疏者小功以下不得堂上西面為堂上迫狹自然在房中西面矣薦車至北輈注薦進至中庭釋曰自此盡還出論薦車馬設遷祖奠之事薦車者以明旦將行故豫陳車云進車者象生時將行陳駕也者案曲禮云君車將駕則僕執䇿立於馬前巳駕僕展軨是生時將行陳駕今死者將葬亦陳車象之也云今時謂之魂車者鄭舉漢法況之以其神靈在焉故謂之魂車也云輈轅也者周禮考工記有輈人為輈輈亦謂之轅故云輈轅也云車當東榮東陳西上於中庭者此車既非載柩之車即下記云薦乘車道車槀車以次言之則先陳乘車次陳道車次陳槀車知東陳西上者下云陳明器于乘車之西明器繼乘車而西明乘車在上巳東有道車槀車故知三者西上也乘車既當東榮則三者不當中庭而云中庭者據南北之中庭不據東西為中庭也何者以下經云薦馬入門三分庭一在南馬右還出薦馬者當車南在庭近南明車近北當中庭矣質明滅燭釋曰自啓殯至此時在殯宫在道及祖廟皆有二燭為明以尚早故也今至正明故滅燭也徹者至西階注徹者至為䙝釋曰云新奠者謂遷祖之奠將設新故徹去從奠以辟新奠也云不設序西南巳再設為䙝者謂徹從奠不設于序西南為再設䙝黷故不設也其再設者未啓殯前夕時一設至此朝廟又設是再設也乃奠至西階注為遷至其足釋曰云為遷祖奠也者謂遷柩朝祖之奠也云如初者亦於柩西當階之上東面席前為之則同其饌則異以其上三鼎及東方之饌皆大斂之奠是也云奠升不由阼階柩北首辟其足者以前大斂小斂及朝夕奠皆升自阼階降自西階今此遷祖奠升不由阼階故云辟足辟足者以其來往不可由首又飲食之事不可䙝之由足故升自西階也若然徹時所以由足者奠畢去之由足無嫌也主人要節而踊注節升降釋曰云節升降者奠升時主人踊降時婦人踊由重南主人踊此不言婦人文不具也薦馬至牽之注駕車至在南釋曰薦馬并薦纓者纓為馬設故與馬同時薦之案下記云薦乘車又云纓轡貝勒縣于衡又云道車載朝服稿車載蓑笠注云道車稿車之纓轡及勒亦縣于衡也若然薦車之時纓縣于衡此薦馬得有纓者以薦車時縣于衡至此薦馬時又取而用之故兩見之也云駕車之馬者即上文薦車之馬也云每車二匹者下經云公賵兩馬注云兩馬士制也故知此車有三乘馬則六匹矣云纓今馬鞅也者古者謂之纓漢時謂之鞅故舉漢法為況也云諸侯之臣飾纓以三色而三成者以此下士薦馬纓三就則不依命數則大夫亦同三色知者案巾車上公纓九就侯伯纓七就子男纓五就諸侯之臣不得與子男同五就故知與士同三就此三色則如聘禮記三色朱白蒼也云此三色者蓋絛絲也者謂以絲為絛無正文故云蓋以疑之云其著之如罽然者鄭注巾車云玉路之樊及纓皆以五采罽飾之十二就其下金路九就象路七就注皆云五色罽飾之此則三采絲為絛飾之但著之則同故云其著之如罽然也云天子之臣如其命數者案典命云三公八命其卿六命大夫四命出封皆加一等命數雖卑於諸侯以王人雖微猶序諸侯之上故得與同依命數就依命數其色則無過五采罽以其金路以下與諸侯其飾與王同諸侯之臣既同三色明天子大夫巳上亦五采罽與諸侯同但天子之士三命以下不得依命少於諸侯之臣當同色與諸侯之臣同矣若然公之孤四命以降於天子大夫冝與三卿同三色也云王之革路絛纓者至革路木路不用罽而用絛絲為纓與此纓三色者同故引為證也云圉人養馬者案周禮校人職云乘馬一師四圉是圉人以養馬以其養馬故使之薦也云在左右曰夾者以車三乘馬則六匹每馬二人交轡牽之故云在左右曰夾云既奠乃薦者為其踐汙廟中者車馬相將之物前薦車在奠上今此薦馬在奠後者欲其既薦即出恐踐汙廟中故後薦之也云凡入門參分庭一在南者大判陳事在庭分為三分一分在北則繼堂而言一分在南則繼門而言此既繼門故云三分庭一在南又不言門左門右則當門之北矣御者至還出注主人至薦馬釋曰云主人於是乃哭踊者薦車之禮成于薦馬者以其車得馬而成故前薦車時主人不哭踊至薦馬乃哭是由車成於薦馬故也主人哭踊訖馬則右還而出右者亦取便故也賔出至祖期注亦因至始也釋曰自此盡屬引論祖時飾柩車之事此賔即上來弔主人啓殯者朝廟事畢而出主人送之云亦因在外位請之者上既夕哭訖因外位請啓期故云亦也此經不言告賔知告賔者若不告賔時至則設何須請期故知擬告賔故云當以告賔也云每事畢輒出者有司請期之禮每皆待事事畢因主人出在外位乃請之言每事者篇首云請期此云請祖期下文請葬期皆因出在外請之故云每事也云將行而飲酒曰祖祖始也者案詩有韓侯出祖出宿于屠顯父餞之清酒百壷又云出宿于泲飲餞于禰皆是將行飲酒曰祖此死者將行亦曰祖為始行故曰祖也曰日側注側昳至之時釋曰此主人辭以上文有司請主人祖期主人答之曰日側者􅉴是傍側亦為特義轉為􅉴者取差跌之義故從􅉴也云過中之時者則尚書無逸云文王至於日中􅉴􅉴即側也主人至束襲注袒為至此車釋曰云袒為載變也者將載主人先袒乃載故云為載變也云乃舉柩卻下而載之者卻猶却也鄉柩在堂北首今卻下以足鄉前下堂載於車故謂之為卻也云束束棺於柩車者案禮記喪大記云君蓋用漆三衽三束檀弓云棺束縮二橫三彼是棺束此經先云載下乃云卒束則束非棺束是載柩訖乃以物束棺使與柩車相持不動也云賔出遂匠納車于階閒謂此車者案下記云既正柩賔出遂匠納車於階閒此經不辨納車時節故鄭明之降奠當前束注下遷至後也釋曰卒束乃云降奠則未束以前其奠使人執之待束訖乃降奠之當束也云當前束猶當尸腢也者下記云即牀而奠當腢彼在尸東此在柩車西當前束亦當腢故取當腢而言也云束有前後也者以經既言前束則有後束可知故云有前後也商祝至無貝注飾柩至有貝釋曰此並飾車之事其柩車即周禮蜃車也四輪迫地其輿亦一狀如長牀兩畔竪軨子以帷繞之上以荒一池縣於前面荒之爪端荒上於中央加齊云飾柩為設牆柳也者即加帷荒是也云巾奠乃牆下記文鄭引之者以此經直云飾柩不言設牆時節故記人辨之以巾覆奠乃牆謂此飾柩者也云牆有布帷柳有布荒者案喪大記云飾棺君龍帷黼荒大夫畫帷畫荒士布帷布荒鄭注云布帷布荒者白布也君大夫加文章焉此注牆柳别案喪大記注又云在旁曰帷在上曰荒皆所以衣柳也則帷荒揔名為柳者案縫人云衣翣柳之材鄭注必先纏衣其木乃以張飾也柳之言聚諸飾之所聚若然對則帷為牆象宫室有牆壁荒為柳以其荒有黼黻及齊三采諸色所聚故得柳名揔而言之皆得為牆巾奠乃牆及檀弓云周人牆置翣皆牆中兼有柳縫人衣翣柳之材柳中兼牆矣鄭注喪大記云荒蒙也取蒙覆之義云池者象宫室之承􅋼以竹為之者生人宫室以木為承􅋼仰之以承􅋼水死者無水可承故用竹覆之直取象平生有而巳云狀如小車笭衣以青布者此鄭依漢禮而言云一池縣於柳前者案喪大記君池大夫二池士一池君三池三面而有大夫二池縣於兩相士一池縣於柳前面而巳云士不褕絞者案雜記云大夫不褕絞屬於池下䄖者依爾雅釋鳥云江淮而南青質五采皆備成章曰鷂絞者倉黃之色則人君於倉黃色繒上又畫鷂雉之形縣于池下大夫則闕之故云大夫則不褕絞屬于池下池下褕絞一名振容故喪大記云大夫不振容振容者車行振動以為容儀但大夫不振容池下仍有銅魚縣之士不但不褕絞又無銅魚故喪大記大夫有魚躍拂池士則無鄭注云士則去魚云左右面各有前後者柩車左右以有帷分兩相各為前後故云前赬後緇云齊居柳之中央者雖無正文以其言齊若人之齊亦居身之中央也云若今小車蓋上蕤矣者漢時小車蓋上有蕤在蓋之中央故舉以為說云以三采繒為之上朱中白下倉者案聘禮記云三采朱白倉彼據繅藉用三采先朱次白下倉此為齊用三采亦當然故取以為義也云著以絮者既云齊當人所覩見故知以絮著之使髙知元士以上有貝者案喪大記云君齊五采五貝大夫齊三采三貝士齊三采一貝鄭注云齊象車蓋蕤縫合雜采為之形如瓜分然綴貝落其上及旁是彼士為天子元士元士巳上皆有貝也此諸侯之士故云無貝也設披注披輅至為藩釋曰云披輅柳棺上貫結於戴者案喪大記注云戴之言值也所以連繫棺束與柳材使相值因而結前後披也此注云披柳棺上貫結於戴以此而言則戴兩頭皆結于柳材又以披在棺上輅過然後貫穿戴之連繫棺束者乃結于戴餘披出之於外使人持之一畔有二為前後披故下記云執披者旁四人注云前後左右各二人是也人君則三披各三人持之備傾虧也引喪大記者證披連戴而施之也云二披用纁者與戴所用異大夫與人君則戴與披用物同故喪大記云君纁戴六纁披六大夫戴前纁後玄披亦如之是其用物同也云今文披皆為藩者言皆者此文披及下文商祝御柩執披并下記執披者三字皆為藩今不從之也屬引注屬猶至之三釋曰引謂紼繩屬著於柩車云在軸輴曰紼者士朝廟時用軸大夫巳上用輴故并言之言紼見繩體言引見用力故鄭注周禮亦云在車曰紼行道曰引云古者人引柩者雜記乘人專道而行又云諸侯五百大夫三百皆是引人也言古者人引對漢以來不使人引也引春秋者案定公九年左氏傳云齊侯伐晉夷儀敝無存死之齊侯與之犀軒而先歸之坐引者以師哭之親推之三注云坐而飲食之此鄭略引之云坐引者亦謂飲食之而哭之亦以師哭之三者亦謂公親推之三也引之者證古者人引也陳明至之西注明器至北也釋曰云明器藏器者也自筲以下皆是藏器故下云器西南上綪又云茵注云茵在抗木上陳器次而北也則自包筲以下揔曰藏器以其俱入壙也引檀弓者案彼注成猶善也竹不可善用謂邊無縢味當作沫沫靧也又云琴瑟張而不平竽笙備而不和注云無宫啇之調又云有鍾磬而無簨虡注云不縣之也橫曰簨植曰虡云陳器乘車之西則重北者無正文上薦車云直東榮繼廟屋而言上注云中庭不得云近北明車近不在重今東陳於乘車之西明重北可知折橫覆之注折猶至面也釋曰云折橫覆之者鄭云蓋如牀則加於壙上時南北長東西短今經云橫明知以長者東西陳之言覆者謂善面則折加於壙時擬鄉上看之為面故善者鄉下今陳之取鄉下看之故反覆善面鄉上也云折猶庪也者以其窆畢加之於壙上所以承抗席若庪藏物然故云折猶庪也云方鑿連木為之蓋如牀而縮者三橫者五無簀者此無正文以經云橫覆之明有縱對之既為縱橫即知有長短廣狹以承抗席故為如牀解之又知縮者三橫者五亦約茵與抗木但於壙口承抗席冝大於茵與抗席故知縮三橫五也知無簀者以其縮三橫五以當簀處故無簀也知窆事畢加之壙上以承抗席者下葬時窆事畢云加折卻之加抗席覆之是折窆事畢加之壙上承抗席者也云橫陳之者為苞筲以下䋫于其北便也者鄭解折不縮者南北順陳而橫陳之意為折橫陳則東西廣是以苞筲陳之於北便也抗木橫三縮二注抗禦至掩壙釋曰云所以禦止土者以其在抗木之上故知以禦土也其橫與縮各足掩者以其壙口大小雖無文但明器之等皆由羡道入諸侯巳上又有輴車亦由羡道入壙口唯以下棺則壙口大小容棺而巳今抗木亦足掩壙口也加抗席三注席所以禦塵釋曰既陳抗木於折北又加此抗席三領於抗木之上知抗木不在折上者以抗木直言橫三縮二不言加明别陳於折北抗木之下而此云加加於抗木之上可知抗席之下而云加茵明又加於抗席之上此三者以後陳者先用故先陳抗木於下次陳抗席而後陳茵先用取後陳於上者便故也是以下文及葬時茵先入壙窆事訖加折壙上則先用抗席後用抗木是其次也若然折於抗席前用而不加於抗席之上者以長大故别陳於南用之仍在茵後其茵用之在明器前入而陳之於明器上者以其同葬具故與抗木同陳於上也但抗席茵相重陳者以其入壙時相當又皆是縱橫重纍之物故重加陳之也云席所以禦塵者上云抗木所以禦土此抗席云禦塵者以此二者在壙口以承土承塵但抗木在上故云禦土抗席在下隔抗木慮有塵鄉下故云禦塵是以釋之有異也加茵至橫三注茵所至作淺釋曰云加茵者謂以茵加於抗席之上此說陳器之時云用疏布者謂用大功疏粗之布云緇翦者緇則七入黑汁為緇翦淺也謂染為淺緇之色言有幅者案下記云茵著用荼實綏澤焉此鄭注云有幅緣之者則用一幅布為之縫合兩邊幅為袋不去邊幅用之以盛著也故云有幅也云茵所以藉棺者下葬時茵先屬引乃窆則茵與棺為藉故先入在棺之下也鄭云幅緣之者蓋縫合既訖乃更以物緣此兩邊幅縫合之處使之牢固不坼壞因為飾也云亦者亦抗木也者抗木云縮二橫三此亦縮二橫三故知亦者亦抗木也云及其用之木三在上茵二在下者上抗木先云橫三後云縮二此茵先云縮二後云橫三並據此陳列之時鄭據入壙而言故云其用之也木三在上茵二在下各舉一邊而言其實皆有二三云象天三合地二者渾天言之則地之上下外內周匝皆有天若然云木二則在下及其用之則茵三在下茵二在上以此而言木與茵皆有天三合地二也云人藏其中焉者亦謂渾天而言上下俱有天地人尸柩藏其中故說卦云參天兩地又云立天之道立地之道立人之道為三材也器西南上綪注器目至反之釋曰云器目言之也者器與下為目即下文苞以下是也茵注茵在至北也釋曰茵非明器而言之者陳器從此茵鄉北為次第故言之故鄭云茵在抗木上陳器次而北是也苞二注所以至之肉釋曰下文既設遣奠而云苞牲取下體故知苞二所以裹奠羊豕之肉也筲三黍稷麥注筲畚至觳也釋曰案下記云菅筲三則筲以菅草為之筲三各盛一種黍稷麥也云筲畚種類也者舊說云畚器所以盛種此筲與畚盛種同類故舉以為況也云其容蓋與簋同一觳也者案考工記瓬人為簋實一觳又云豆實三而成觳案昭三年晏子云四升曰豆豆實三而成觳則觳受斗二升此筲與簋同盛黍稷知受一觳斗二升約同之無正文故云蓋以疑之也罋三至疏布注罋瓦至作密釋曰云罋瓦器者以罋與甒等字從缶瓦故知是瓦器云其容亦蓋一觳者聘禮記致饔餼云罋斗二升則此罋約同之故云蓋以疑之也知屑是薑桂者以其與內則屑桂與薑同云屑故引內則為證也甒二至功布注甒亦至作廡釋曰謂二者所盛須繼罋三而陳之言亦瓦器亦上罋三也皆木桁久之注桁所至異桁釋曰云皆木桁久之者則自苞筲以下皆塞之置於木桁也若然既皆久塞而罋甒獨云幂者以其苞筲之等燥物冝苞塞之而無幂罋甒濕物非直久塞其口又加幂覆之云久當為灸灸謂以蓋案塞其口者此亦如上設重鬲亦與之同故讀從灸也云每器異桁者以其言皆木桁故知每器别桁也用器至南流注此皆至為桙釋曰謂常用之器弓矢兵器耒耜農器敦杅食器盤匜洗浴之器皆象生時而藏之也無祭器注士禮至器也釋曰知大夫以上兼用鬼器人器也者案檀弓云宋襄公葬其夫人醯醢百罋曽子曰既曰明器矣而又實之注云言名之為明器而與祭器皆實之是亂鬼器與人器以此而言則明器鬼器也祭器人器也士禮略無祭器空有明器而實之大夫以上尊者備故兩有若兩有則實祭器不實明器宋襄公既兩有而并實之故曽子非之有燕樂器可也注與賔至器也釋曰言可者許其得用故云可也云與賔客燕飲用樂之器也者則升歌有琴瑟庭中有特縣縣磬也役器甲胄干笮注此皆至矢箙釋曰此役器中有干笮無弓矢示不用故不具上用器是常用之器故具陳之也云甲鎧胄兜鍪者古者用皮故名甲胄後代用金故名鎧兜鍪隨丗為名故也但上下役用之器皆粗沽為之故下記云弓矢之新沽功注云設之冝新沽示不用弓矢云沽餘雖不言皆沽可知也但此笮是送死之具下記云薦乘車鹿淺幦干笮革靾者是魂車所載象生者與此别也燕器杖笠翣注燕居至翣扇釋曰云燕居安體之器也者以杖者所以扶身笠者所以禦暑翣者所以招涼而在燕居用之故云燕居安體之器也云笠竹􅡓蓋也者􅡓竹青之皮以竹青皮為之徹奠至而踊注巾席至久也釋曰自此盡入復位論還車為祖奠之事此徹遷祖奠者為將還遷車更設祖奠云巾席俟於西方祖奠將用焉者以下經云祖還車還車訖布席設祖奠則布此巾席也故巾席俟祖奠在西方也云節者來象升丈夫踊去象降婦人踊者案上篇徹小斂大斂奠時皆升自阼階丈夫踊降自西階婦人踊仐奠在庭無升降之事直有來往經云要節而踊明來象升丈夫踊去象降婦人踊但此經直云主人要節知有婦人亦踊者以下經徹祖奠時云徹者入丈夫踊設于西北婦人踊注云猶阼階升時也徹設於柩車西北亦猶序西南是男子婦人並有踊文則知此要節踊內亦兼婦人也云徹者由明器北西面既徹由重南東者凡奠於堂室者皆升自阼階降自西階奠於庭者亦由重北東方來陳由重北而西徹訖由重南而東象升自阼階降自西階也但設奠於柩車西而東面則徹者由奠東而西面徹之也云不設于序西南者非宿奠也者以其大斂小斂奠及夕奠乃皆經宿故皆設之於序西南為神馮依此遷祖奠旦始設之今日側徹之未經宿即徹故不設于序西南也袒注為將祖變釋曰下經商祝御柩乃祖是將祖故此主人袒袒即變也商祝御柩注亦執至為節釋曰云商祝御柩者謂居柩車之前却行詔傾虧使執披人知其節度云亦執功布者下經商祝執功布以御柩執披故此亦如之故執布乃祖注還柩至行始釋曰商祝既執功布為御乃還柩車使轅鄉外也祖者始也為行始去載處而已也踊襲至前束注主人至東南釋曰前袒為祖變今既祖訖故踊而襲云主人也者前袒是主人則此襲亦主人也經云少南鄭云則當前束南者以其東未還之時當前束近北今還車亦當前束少南婦人至階閒注為柩至東上釋曰婦人降者以柩還鄉外階閒空故婦人從堂上降在階閒云為柩將去有時者去有時即明旦遣而行之是時也今此為行始也云位東上者以堂上時婦人在阼階西面統於堂下男子今柩車南遷男子亦在車東故婦人降亦東上統于男子也婦人不鄉車西者以車西有祖奠故辟之在車後祖還車不還器注祖有至南上釋曰祖還車者為載時鄉北今為行始故須還鄉南故鄭云祖有行漸車亦冝鄉外也不還器者鄭云器之陳自巳南上南上者即上文茵下注云茵在抗木上陳器次而北是也祝取銘置于茵注重不至茵上釋曰初死為銘置于重啓殯祝取銘置于重祖廟又置于重今將行置于茵者重不藏擬埋于廟門左茵是入壙之物銘亦入壙之物故置于茵也是以鄭云重不藏故於此移銘加於茵上也士無廞旌唯有乘車所建攝盛之旃并此銘旌而巳大夫以上有廞旌通此二旌則皆備三旌也二人還重左還注重與至便也釋曰云重與車馬還相反由便也者以車馬至中庭之東以右還鄉門為便重在門內面鄉北人在其南以左還鄉門為便是以二者雖相反各由其便布席至而踊注車巳至祖奠釋曰云主人要節而踊者祖奠既與遷祖奠同車西又皆從車而來則此要節而踊一與遷祖奠同云車巳祖可以為之奠也者奠本為柩設其柩未安不得設奠今車巳還名之為祖尸柩巳定可以為奠也云是之謂祖奠者下記云祝饌祖奠于主人之南是謂彼祖奠薦馬如初注柩動至之也釋曰上巳薦馬今又薦馬者以柩車動而鄉南為行始冝新之故薦馬如初也賔出至葬期注亦因在外位時釋曰云亦因在外位時者亦上啓期祖期事畢在外位故此亦因事畢出在外位時請葬期也入復位注主人至內位釋曰云主人者以其送賔據主人入今送賔訖入復位明主人也云自死至於殯自啓至於葬主人及兄弟常在內位者自死至於殯在內位在殯宫中自啓至於葬在內位據在祖廟中處雖不同在內不異故揔言之云在內位者始死未小斂巳前位在尸東小斂後位在阼階下若自啓之後在廟位亦在阼階下也儀禮疏卷第三十八
