body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彥等撰喪服第十一案鄭目録云天子以下死而相喪衣服年月親疏隆殺之禮不忍言死而言喪喪者棄亡之辭若全存居於彼焉己亡之耳大戴第十七小戴第九劉向别録第十一釋曰案禮器云經禮三百曲禮三千鄭云經禮謂周禮也曲猶事也事禮謂今禮也禮篇多亡本數未聞其中事儀三千若然未亡之時有天子諸侯卿大夫士之喪服其篇各別今皆亡唯士喪禮在若然據喪服一篇揔包天子以下服制之事故鄭目録云天子以下相喪衣服親疏之禮喪服之制成服之後冝在士喪始死之下今在士喪之上者以喪服揔包尊卑上下不專據士故在士喪之上是以喪服為第十一喪服所陳其理深大今之所釋且以七章明之第一明黃帝之時朴略尚質行心喪之禮終身不變第二明唐虞之日淳朴漸虧雖行心喪更以三年為限第三明三王以降澆偽漸起故制喪服以表哀情第四明既有喪服須明喪服二字第五明喪服章次以精粗為序第六明作傳之人并為傳之意第七明鄭玄之注經傳兩解之第一明黃帝之時朴略尚質行心喪之禮終身不變者案禮運云昔者先王未有宮室食鳥獸之肉衣其羽皮此乃伏羲之時也又云後聖有作治其絲麻以為布帛養生送死以事鬼神此謂黃帝之時也又案易繫辭云古之葬者厚衣之以薪葬之中野不封不樹喪期無數在黃帝九事章中亦據黃帝之日言喪期無數是其心喪終身者也第二明唐虞之日淳朴漸虧雖行心喪更以三年為限者案禮記三年問云將由夫患邪淫之人與則彼朝死而夕忘之然而從之則是曽鳥獸之不若也夫焉能相與羣居而不亂乎將由夫修飾之君子與則三年之喪二十五月而畢若駟之過隙然而遂之則是無窮也故先王焉為之立中制節一使足以成文理則釋之矣然則何以至期也曰至親以期斷是何也曰天地則巳易矣四時則巳變矣其在天地之中者莫不更始焉以是象之也鄭注云法此變易可以期也又云然則何以三年也注云言法此變易可以期何以乃三年為又云曰加隆焉爾也焉使倍之故再期也注云言於父母加隆其恩使倍期也據此而言則聖人初欲為父母期加隆焉故為父母三年必加隆至三年者孔子答宰我云子生三年然後免於父母之懷是以子為之三年報之三年問又云三年之喪人道之至文者也夫是之謂至隆是百王之所同古今之所一也未有知其所由來者也注云不知其所從來喻此三年之喪前丗行之久矣既云喻前丗行之久則三年之喪實知其所從來但喻久耳故虞書云二十八載帝乃殂落百姓如喪考妣三載四海遏密八音是心喪三年未有服制之明驗也第三明三王巳降澆偽漸起故制喪服以表哀情者案郊特牲云大古冠布齊則緇之鄭注云唐虞巳上曰大古又云冠而敝之可也注云此重古而冠之耳三代改制齊冠不復用也以白布冠質以為喪冠也據此而言則唐虞巳上吉凶同服唯有白布衣白布冠而巳故鄭注云白布冠為喪冠又案三王以來以唐虞白布冠為喪冠又案喪服記云凡衰外削幅裳內削幅注云大古冠布衣布先知為上外殺其幅以便體也後知為下內殺其幅稍有飾也後丗聖人易之以此為喪服據此喪服記與郊特牲兩注而言則鄭云後丗聖人夏禹也是三王用唐虞白布冠白布衣為喪服矣第四明既有喪服須明喪服二字者案鄭目録云不忍言死而言喪喪者棄亡之辭若全存於彼焉己棄亡之耳又案曲禮云天子曰崩諸侯曰薨大夫曰卒士曰不祿庶人曰死爾雅曰崩薨卒不祿皆訓死也是士以上為義稱庶人言死得其揔名鄭注曲禮云死之言澌精神澌盡又案檀弓孔子云喪欲速貧春秋左氏傳魯昭公出居乾侯齊侯唁公於野井公曰喪人其何稱是喪棄亡之辭棄於此存於彼是孝子不忍言父母精神盡澌雖棄於此猶存於彼以此鄭義言之其喪字去聲讀之人或以平聲讀之者雖不與同義亦通也死者既喪生人制服服之者但貌以表心服以表貌故禮記間傳云斬衰何以服苴苴惡貌也所以苴其內見諸外斬衰貌若苴齊衰貌若枲大功貌若止小功緦麻容貌可也下又云斬衰三升三升半齊衰四升以下是其孝子喪親以衣服表心但吉服所以表德凶服所以表哀德有髙下章有升降哀有深淺布有精粗不同者也第五明喪服章次以精粗為敘者案喪服上下十有一章從斬至緦麻升數有異異者斬有二義不同為父以三升為正為君以三升半為義其冠同六升三年齊衰唯有正之四升冠七升繼母慈母雖是義以配父故與因母同是以略為節有正而巳杖期齊衰有正而巳父在為母與為妻同正服齊衰五升冠八升不杖齊衰期章有正有義二等正則五升冠八升義則六升冠九升齊衰三月章皆義服齊衰六升冠九升曽祖父母計是正服但正服合以小功以尊其祖不服小功而服齊衰非本服故同義服也殤大功有降有義為夫之昆弟之長子殤是義其餘皆降服也降服衰七升冠十升義服衰九升冠十一升大功章有降有正有義姑姊妹出適之等是降婦人為夫之族類為義自餘皆正衰冠如上釋也繐衰唯有義服四升半皆冠七升而巳以諸侯大夫為天子故同義服也殤小功有降有義婦人為夫之族類是義自餘皆降服降則衰冠同十升義則衰冠同十二升小功亦有降亦有正有義如前釋緦麻亦有降有正有義皆如上陳但衰冠同十五升抽去半而巳自斬以下至緦麻皆以升數升數少者在前升數多者在後要不得以此升數為敘者一則正義及降升數不得同在一章又繐衰四升半在大功之下小功之上鄭下注云在小功之上者欲審著縷之精粗若然喪服章次雖以升數多少為前後要取縷之精粗為次第也第六明作傳之人又明作傳之意傳曰者不知是誰人所作人皆云孔子弟子卜商字子夏所為案公羊傳是公羊髙所為公羊髙是子夏弟子今案公羊傳有云者何何以曷為孰謂之等今此傳亦云者何何以孰謂曷為等之問師徒相習語勢相遵以弟子却本前師此傳得為子夏所作是以師師相傳蓋不虛也其傳內更云傳者是子夏引他舊傳以證己義儀禮見在一十七篇餘不為傳獨為喪服作傳者但喪服一篇揔包天子巳下五服差降六術精粗變除之數既繁出入正殤交互恐讀者不能悉解其義是以特為傳解第七明鄭玄之注經傳兩解之云鄭氏者北海郡髙密縣人姓鄭名玄字康成漢僕射鄭崇八丗孫也後漢徴為大司農而不就年七十四卒於家云注者注義於經傳之下辨其義意若傳不釋經者則注在傳上以釋經若傳義難明者則在傳下以釋傳又在傳下注皆須題云玄謂以別傳若在傳上注者不須題玄義可知或云注或云傳出注述者意耳或有解云前漢以前云傳後漢以後云注若然王弼王肅之等後漢之人云傳此説非也喪服至屨者釋曰題此二字於上者與此一篇為揔目言斬衰裳者謂斬三升布以為衰裳不言裁割而言斬者取痛甚之意知者案三年問云創巨者其日久痛甚者其愈遲雜記縣子云三年之喪如斬期之喪如剡謂哀有深淺是斬者痛深之義故云斬也若然斬衰先言斬下疏衰後言齊者以斬衰先斬布後作之故先言斬疏衰先作之後齊之故後云齊斬齊既有先後是以作文有異也云苴絰杖絞帶者以一苴目此三事謂苴麻為首絰要絰又以苴竹為杖又以苴麻為絞帶知此三物皆同苴者以其冠繩纓不得用苴明此三者皆用苴又喪服小記云苴杖竹也記人解此杖是苴竹也又絞帶與要絰象大帶與革帶二者同在要要絰既苴明絞帶與要絰同用苴可知又喪服四制云苴衰不補則衰裳亦同苴矣云冠繩纓者以六升布為冠又屈一條繩為武垂下為纓冠在首退在帶下者以其衰用布三升冠六升冠既加飾故退在帶下又齊衰冠纓用布則知此繩纓不用苴麻用枲麻故退冠在下更見斬義也云菅屨者謂以菅草為屨詩云白華菅兮白茅束兮鄭云白華巳漚名之為菅濡刃中用則此菅亦是巳漚者也巳下諸章並見年月唯此斬章不言三年者以其喪之痛極莫甚於斬故不言年月表創巨而巳是以衰設人功之疏絰又言麻之形體至於齊衰巳下非直見人功之疏又見絰去之麻狀貌舉齊衰云三年明上斬衰三年可知然此一經為次若此者以先喪而後服故服在喪下又先斬後乃為衰裳故斬文在衰裳之上絰杖絞帶俱蒙於苴故苴又在前經中絰有二事仍以首絰為主故絰文在上杖者各齊其心故在絞帶之前冠纓雖加於首以其不蒙於苴故退文在下屨乃服中之賤最後為冝聖人作文倫次然注者者至用布釋曰云者者明為下出也者周公設經上陳其服下列其人此經所陳服者明為下人所出故服下出者明臣子為君父等所出也案下諸章皆言者鄭君一解餘皆不釋義皆如此也云凡服上曰衰下曰裳者言凡者鄭欲兼解五服案下記云衰廣四寸長六寸綴之於心揔號為衰非正當心而巳故諸言衰皆與裳相對至於弔服三者亦謂之為衰也云麻在首在要皆曰絰知一絰而兼二者以子夏傳要首二絰俱解禮記諸文亦要首並陳故士喪禮云要絰小焉故知一絰而兼二文也云絰之言實也明孝子有忠實之心故為制此服焉檀弓云絰也者實也明孝子有忠實之心故為制此服焉案問喪云斬衰貌若苴齊衰貌若枲之等皆是心內苴惡貌亦苴惡服齊苴惡是服以象貌貌以象心是孝子有忠實之心若服苴而貌美心不苴惡者是中外不相稱無忠實之心者也云首絰象緇布冠之缺項者案士冠禮緇布冠青組纓屬於缺鄭注云缺讀如有頍者辨之頍緇布冠之無笄者著頍圍髮際結項中隅為四綴以固冠也此所象無正文但喪服法吉服而為之吉時有二帶凶時有二絰以要絰象大帶明首絰象頍項可知以彼頍項為吉時緇布冠無笄故用頍項以固之今喪之首絰與冠繩纓别材而不相綴今言象之者直取絰法象頍項而為之至於喪冠亦無笄直用六升布為冠一條繩為纓與此全異也云要絰象大帶者案玉藻云大夫以下大帶用素天子朱裏終裨以玄黃士則練帶裨下末三赤用緇是大帶之制今此要絰下傳名為帶明象吉時大帶也云又有絞帶象革帶者案玉藻韠之形制云肩革帶博二寸吉備二帶大帶申束衣革帶以佩玉佩及事佩之等今於要絰之外别有絞帶明絞帶象革帶可知案士喪禮云苴絰大鬲要絰小焉又云婦人之帶牡麻結本注云婦人亦有首絰伹言帶者記其異此齊衰婦人斬衰婦人亦有苴絰以此而言則婦人吉時雖云女鞶絲以絲為帶而無頍項今於喪禮哀痛甚亦有二絰與絞帶以備喪禮故此絰具陳於上男女俱言於下明男女共有此服也云齊衰巳下用布者即下齊衰章云削杖布帶是也若然案此經凶服皆依舊名唯衰與絰特制别名者案禮記檀弓云有以故興物者鄭云衰絰之制以絰表孝子忠實之心衰明孝子有哀摧之義故制此二者而異名見其哀痛之甚故也傳曰至無時釋曰云斬者何問辭以執所不知故云者何云不緝也者答辭此對下疏衰裳齊齊是緝此則不緝也云苴絰者麻之有蕡者也案爾雅釋草云蕡枲實孫氏注云蕡麻子也以色言之謂之苴以實言之謂之蕡下言牡者對蕡為名言枲者對苴生稱也是以云斬衰貌若苴齊衰貌若枲也若然枲是雄麻蕡是子麻爾雅云蕡枲實者舉類而言若圎曰簞方曰笥鄭注論語云簞笥亦舉其類也下傳云牡麻者枲麻也不連言絰此苴連言絰者欲見苴絰别於苴杖故下傳别云苴杖後傳牡麻不連言絰此苴連言絰者彼無他物之嫌獨有絰故不須連言絰也云苴絰大搹左本在下者士喪禮文與此同彼此皆云苴絰大搹連言苴者但經連言苴絰絰中有此二言絰大搹先據首絰而言也雷氏以搹扼不言寸數則各從其人大小為扼非鄭義據鄭注無問人之大小皆以九寸圍之為正若中人之迹尺二寸也云左本在下者本謂麻根案士喪禮鄭注云下本在左重服統於內而本陽也以其父是陽左亦陽言下是內故云重服統於內以言痛從心內發故也此對為母右本在上輕服統於外而本隂也云去五分一以為帶者以其首絰圍九寸取五寸去一寸得四寸餘四寸寸為五分揔二十分去四分餘十六分取十五分五分為寸為三寸添前四寸為七寸并一分揔七寸五分寸之一也云齊衰之絰斬衰之帶也者以其大小同故疊而同之也云去五分一以為帶者謂七寸五分寸之一也中五分去一為齊衰之帶今計之以七寸中取五寸去一寸得四寸餘二寸寸分為二十五分二寸合為五十分餘一分者又破為五分添前為五十五分亦五分去一揔去一十一分餘四十四分在又二十五分為一寸餘十九分在齊衰之帶揔五寸二十五分寸之十九也云大功之絰齊衰之帶也去五分一以為帶者就五寸中去一寸得四寸前二十五分破寸今大功百二十五分破寸則以十九分者各分破為五分十九分揔破為九十五與百二十五分破寸相當就九十五分中五分去一去十九餘七十六則大功之絰五寸二十五分寸之十九帶則四寸百二十五分寸之七十六又云小功之絰大功之帶也去五分一以為帶者又就四寸百二十五分寸之七十六中五分去一前百二十五分破寸今亦四倍加之以六百二十五分破寸然後五分去一為小功帶又云緦麻之絰小功之帶去五分一以為帶則亦四倍加之前六百二十五分破寸今則三千一百二十五分破寸五分去一取四以為緦麻之帶絰帶之等皆以五分破寸既有成法何假盡言然斬衰有二齊衰有四大功小功成人與殤各有二等緦麻殤與成人章又不别若使絰帶各依升數則參差難等是以子夏作傳五服各為一節計之似周禮掌客云羣介行人宰史各以爵等為牢禮之數鄭云以命數則參差難等略於臣用爵而巳此絰亦然也士喪禮云苴絰大鬲下本在左要絰小焉鄭注云絰帶之差自此出焉謂子夏言絰帶之差出於士喪之絰故鄭指而言之也但斬衰之絰圍九寸者首是陽故欲取陽數極於九自齊衰以下自取降殺之義無所法象也云苴杖竹也削杖桐也者傳意見經唯云苴杖不出杖體所用故言苴杖者竹也下章直云削杖亦不辨木名故因釋之云削杖者桐也若然經言苴杖因釋削杖唯上下二章不通於下是以兼釋之至於絰帶五服自明故不兼釋然為父所以杖竹者父者子之天竹圎亦象天竹又外內有節象子為父亦有外內之痛又竹能貫四時而不變子之為父哀痛亦經寒溫而不改故用竹也為母杖桐者欲取桐之言同內心同之於父外無節象家無二尊屈於父為之齊衰經時而有變又案變除削之使方者取母象於地故也此雖不言杖之粗細案喪服小記云絰殺五分而去一杖大如絰鄭注云如要絰也鄭知如要絰者以其先云絰五分為殺為要絰其下即云杖大如絰明如要絰也如要絰者以杖從心巳下與要絰同處故如要絰也云杖各齊其心者杖所以扶病病從心起故杖之髙下以心為斷也云皆下本者本根也案士喪禮下本注云順其性也云杖者何爵也者自此巳下有五問五答皆為杖起文云者何者亦是執所不知以其吉時五十巳後乃杖所以扶老今為父母之喪有杖有不杖不知故執而問之云爵以爵答之以其有爵之人必有德有德則能為父母致病深故許其以杖扶病云無爵而杖者何問辭也庶人無爵亦得杖云簷主也者答辭也以其雖無爵無德然以適子故假取有爵之杖為之喪主拜賔送賔成喪主之義也云非主而杖者何問辭也輔病也答辭也鄭云謂衆子雖非為主子為父母致病是同亦為輔病也云童子何以不杖者案此子夏之問辭有不同或云者何或云何以或云何如或云孰後或云孰謂或云何大夫或云曷為有此七者答有義意凡言者何皆謂執所不知故隱元年公羊傳云元年者何何休云諸據疑問所不知故曰者何即此問杖者何是也稱何以者皆據彼決此即下云父為長子何以三年據期章為衆子期適庶皆子長子獨三年是據彼決此也此即公羊傳云何以不言即位何休云據文公言即位隱不稱即位是也云何如者問比類之辭即下傳云何為而可為人後者同宗則可為人後是其問比類也云孰後者不問比類依不杖章子夏傳云孰後後大宗禮有大宗小宗故問誰為後云孰謂者亦是問比類但舊君有二等一是待放之臣二是致仕之臣俱為舊君是以齊衰三月章云舊君傳曰為舊君者孰謂也仕焉而巳者也由其有二等故問比類也即公羊傳云王者孰謂謂文王是也云何大夫者亦是據彼決此即齊衰三月章云大夫為舊君傳曰何大夫之謂乎言其以道去君而猶未絶也由其大夫有致仕者有待放者不同故舉何大夫之問也言曷為者亦是據彼決此故不杖章云大夫曷為不降命婦也云謂據大夫於姑姊妹出嫁冝降不降故舉曷為之問也今云童子何以不杖問辭也不能病也答辭也此庶童子非直不杖以其未冠首加免而巳故問喪云免者以何為也曰不冠者之所服也言何以者據當室童子及成人皆杖唯此庶童子不杖故云何以決之也知當室童子杖者案問喪云禮曰童子不緦唯當室緦緦者其免也當室則免而杖矣謂適子也案雜記云童子哭不偯不踊不杖不菲不廬注云未成人者不能備禮也此獨云不杖餘不言者此上下皆釋杖故言杖不云餘者其實皆無直有衰裳絰帶而巳又云婦人何以不杖亦不能病也者此亦謂童子婦人若成人婦人正杖知者此喪服上陳其服下陳其人喪服之下男子婦人俱列男子婦人同有苴杖又喪大記云三日子夫人杖五日大夫丗婦杖諸經皆有婦人杖文故知成人婦人正杖也明此童子婦人案喪服小記云女子子在室為父母其主喪者不杖則子一人杖鄭注云女子子在室亦童子也無男昆弟使同姓為攝主不杖則子一人杖謂長女也許嫁及二十而笄笄為成人成人正杖也是其童女為喪主則亦杖矣若然童子得稱婦人者案小功章云為姪庶孫丈夫婦人之長殤是未成人稱婦人也雷氏以為此喪服妻為夫妾為君女子子在室為父女子子嫁及在父之室為父三年如傳所云婦人者皆不杖喪服小記婦人不為主而杖者唯著此一條明其餘不為主者皆不杖此説非何者此四等婦人皆在杖科之內何得不杖又禮記諸文説婦人杖者甚衆何言無杖也云絞帶者繩帶也者以絞麻為繩作帶故云絞帶也王肅以為絞帶如要絰馬鄭不言當依王義雷氏以為絞帶在要絰之下言之則要絰五分去一為帶但首絰象頍項之布又在首要絰象大帶用繒又在要故須五分去一以為帶今絞帶象革帶與要絰同在要一則無上下之差二則無粗細可象而云去要絰五分一為絞帶失其義也但絰帶至虞後變麻服葛絞帶虞後雖不言所變案公士衆臣為君服布帶又齊衰巳下亦布帶則絞帶虞後變麻服布於義可也云冠繩纓條屬者喪用繩為纓屬著也著之冠垂之為纓也云外畢者前後兩畢之末而向外攝之也云鍛而勿灰者以冠為首飾布倍衰裳而用六升又加以水濯勿用灰而巳冠六升勿灰則七升巳上故灰矣故大功章鄭注云大功布者其鍛治之功粗沽之則七升巳上皆用灰也云衰三升者不言裳裳與衰同故舉衰以見裳為君義服衰三升半不言者以縷如三升半成布三升故直言三升舉正以包義也云菅屨者菅菲也外納居倚廬者周公時謂之屨子夏時謂之菲案士喪禮屨外納鄭注云納收餘也王謂正向外編之居倚廬孝子所居居在門外東壁倚木為廬故既夕記云居倚廬鄭注云倚木為廬在中門外東方北戶又喪大記云凡非適子者自未葬以於隱者為廬注云不欲人屬目蓋廬於東南角若然適子則廬於其北顯處為之以其適子當應接弔賔故不於隱者若然此下有臣為君則亦居廬案周禮宮正云大喪授廬舍辨其親疏貴賤之居注云親者貴者居倚廬疏者賤者居堊室又雜記朝庭卿大夫士居廬都邑之士居堊室見諸侯之臣為其君之禮案喪大記云婦人不居廬若然此經云居倚廬專據男子生文云寢苫枕塊既夕文與此同彼注云苫編藁塊堛也彼又云不説絰帶鄭注云哀戚不在於安若然在中門外者哀親之在外寢苫者哀親之在草故也此之衰三升枕塊據大夫巳上若士則大夫適子為士者得行大夫禮若正士則枕草衰則縷三升半成布三升雜記所云齊晏平仲為其父粗衰斬枕草是也但平仲謙為父服士服耳云哭晝夜無時者哭有三無時始死未殯以前哭不絶聲一無時既殯巳後卒哭祭巳前阼階之下為朝夕哭在廬中思憶則哭二無時既練之後無朝夕哭唯有廬中或十日或五日思憶則哭三無時也卒哭之後未練之前唯有朝夕哭是一有時也云啜粥朝一溢米夕一溢米者孝子遭父母之喪當為父母致病故喪大記云水漿不入口三日之後乃始食必三日許食者聖人制法不以死傷生恐至滅性故禮許之食雖食由節之使朝夕各一溢米而巳也曽子有母之喪水漿不入于口七日者失禮之法故子思非之云先王制禮過之者俯而就之不至者跂而及之故君子執親之喪水漿不入於口者三日杖而後能起是禮之常法也云寢不説絰帶者案雜記孔子云少連大連善居喪三月不解鄭注云不解倦也又案既夕文與此同鄭注云哀戚不在於安絰帶在衰裳之上而云不説則衰裳在內不説可知此據未葬前故文在虞上既虞後寢有席衰絰説可知也云既虞翦屏柱楣者案王制云天子七月而葬諸侯五月而葬大夫士三月而葬又案士虞禮既葬反日中而虞鄭注士喪三虞云虞安也葬時送形而往迎魂而反反哭之時入廟中上堂不見入室又不見乃至適寢之中舊殯之處為虞祭以安之禮記檀弓云葬日虞不忍一日離也是日也以虞易奠是也依公羊傳云天子九虞諸侯七虞大夫五虞士三虞今傳言既虞謂九虞七虞五虞三虞之後乃改舊廬西鄉開戶翦去戶旁兩廂屏之餘草柱楣者前梁謂之楣楣下兩頭豎柱施梁乃夾戶傍之屏也云寢有席者案間傳云既虞卒哭柱楣翦屏苄翦不納鄭云苄今之蒲蘋即此寢有席謂蒲席加於苫上也云食疏食水飲者未虞巳前朝一溢米夕一溢米而為粥今既虞之後用粗疏米為飯而食之明不止朝一溢夕一溢而巳當以足為度云飲水者未虞巳前渴亦飲水而在既虞後與疏食同言水飲者恐虞後飲漿酪之等故云飲水而巳也云朝一哭夕一哭而巳者此當士虞禮卒哭之後彼云卒哭者謂卒去廬中無時之哭唯有朝夕於阼階下有時之哭喪服之中三無時哭外唯此卒哭之後未練之前一節之間是有時之哭故云而巳言其不足之意云既練舍外寢者謂十三月服七升冠男子除首絰而帶獨存婦人除於帶而絰獨存又練布為冠著繩屨止舍外寢之中不復居廬也云始食菜果飯素食者案喪大記祥而食肉間傳云大祥有醯醬中月而禫而飲醴酒始飲酒者先飲醴酒始食肉者先食乾肉曲禮云父母之喪有疾飲酒食肉疾止復初皆為不以死傷生也云哭無時者此三無時哭中謂練後堊室之中或十日或五日思憶則哭大記云祥而外無哭者禫而內無哭者皆在哭無時之限也注盈手至異數釋曰云以五分一為殺者象五服之數也者鄭五服之內升數至多若絰帶象升數降殺參差難等若五服服為一節則降殺易明故鄭云象五服之數也云爵謂天子諸侯卿大夫士也者案白虎通云天子爵號又夏殷之士無爵周之道爵及命士卿大夫自然皆爵也是天子以下皆曰爵也云屬猶著也通屈一條繩為武垂下為纓著之冠也者案禮記云喪冠條屬以別吉凶若然吉冠則纓武別材凶冠則纓武同材是以鄭云通屈一條繩為武謂將一條繩從額上約之至項後交過兩相各至耳於武綴之各垂於頥下結之云著之冠者武纓皆上屬著冠冠六升外畢是也云布八十縷為升者此無正文師師相傳言之是以今亦云八十縷謂之宗宗即古之升也云今之禮皆以登為升俗誤巳行久矣者案鄭注儀禮之時古今二禮並觀疊古文者則從經今文若疊今文者則從經古文今此注而云今之禮皆以登為升與諸注不同則今古禮皆作升字俗誤巳行久矣也若然論語云舊榖既升升亦訓為成今從登不從升者凡織絍之法皆縷縷相登上乃成繒布登義強於升故從登也引雜記者證條屬是喪冠若吉冠則纓武異材云三年之練冠亦條屬者欲見條屬以至大祥除衰杖大祥除喪之際朝服縞冠當纓武異材從吉法也云右縫小功以下左者案大戴禮云大功巳上唯唯小功以下額額然孝子朝夕哭在阼階之下西面弔賔從外入門北面見之大功以上哀重其冠三辟積鄉右為之從隂隂唯唯然順小功緦麻哀輕其冠亦三辟積鄉左為之從陽弔賔入門北鄉望之額額然逆鄉賔二者皆條屬但從吉從凶不同也云外畢者冠前後屈而出縫於武也者冠廣二寸落頂前後兩頭皆在武下鄉外出反屈之縫於武而為之兩頭縫畢鄉外故云外畢案曲禮云厭冠不入公門鄭注云厭猶伏也喪冠厭伏是五服同名由在武下出反屈之故得厭伏之名檀弓云古者冠縮縫今也衡縫故喪冠之反吉非古也是吉冠則辟積無殺橫縫亦兩頭皆在武上鄉內反屈而縫之不得厭伏之名云二十兩曰溢為米一升二十四分升之一者依算法百二十斤曰石則是一斛若然則十二斤為一斗取十斤分之升得一斤餘二斤斤為十六兩二斤為三十二兩升取三十兩十升升得三兩添前一斤十六兩為十九兩餘二兩兩為二十四銖二兩為四十八銖取四十銖十升升得四銖餘八銖一銖為十參八銖為八十參十升升得八參添前則是一升得十九兩四銖八參於二十兩仍少十九銖二參則别取一升破為十九兩四銖八參分十兩兩為二十四銖則為二百四十銖又分九兩兩為二十四銖則九兩者二百一十六銖并四銖八參添前四百六十銖八參揔為二十四分直取二百四十銖餘二百二十銖八參在又取二百一十六銖二十四分分得九銖添前分得十九銖有四銖八參四銖銖為十參揔為四十參通八參為四十八參二十四分分得二參是一升為二十四分分得十九銖添前四銖為二十三銖將二參添前八參則為十參則十參為一銖以此一銖添前二十三銖則為二十四銖為一兩一兩添十九兩揔二十兩曰溢云楣謂之梁所謂梁暗者所謂書傳文案喪服四制云髙宗諒暗三年鄭注云諒古作梁楣謂之梁暗讀如鶉䳺之䳺暗謂廬也廬有梁者所謂柱楣也即此柱楣者也云舍外寢於中門之外屋下壘墼為之不塗墍所謂堊室也者今至練後不居舊廬還於廬處為屋但天子五門諸侯三門得有中門大夫士唯有大門內門兩門而巳無中門而云中門外者案士喪禮及既夕外位唯在寢門外其東壁有廬堊室若然則以門為中門據內外皆有哭位其門在外內位中故為中門非謂在外門內門之中為中門也言屋下壘墼為之者東壁之所舊本無屋而云屋下為之者謂兩下為屋謂之屋下對廬偏加東壁非兩下謂之廬也云不塗墍者謂翦屏而巳不泥塗墍飾也云謂所堊室者間傳云父母之喪既虞翦屏期而小祥居堊室彼練後居堊室即此外寢故鄭云所謂堊室也云謂復平生時食也者此食為飼讀之不得為食讀之知者天子巳下平常之食皆有牲牢魚臘練後始食菜果未得食肉飲酒何得平常時食明專據米飯而言也以其初據一溢米而言既虞飯疏食食亦米飯也此既練後復平生時食食亦據米飯而言以其古者名飯為食與公食大夫者同音也云斬衰不書受月者云云凡喪服所以表哀哀有盛時殺時服乃隨哀以降殺故初服粗至葬後練後大祥後漸細加飾是以冠為受斬衰裳三升冠六升既葬後以其冠為受衰裳六升冠七升小祥又以其冠為受衰裳七升冠八升自餘齊衰以下受服之時差降可知然葬後有受服有不受服案下齊衰三月章及殤大功章皆云無受正大功章即云三月受以小功衰即葛九月者今此斬衰章及齊衰章應言受月而不言故鄭君特解之案雜記云天子七月而葬九月而卒哭諸侯五月而葬七月而卒哭大夫三月而葬五月而卒哭士三月而葬是月而卒哭是天子巳下虞卒哭異數尊卑皆葬訖反日中而虞天子九虞諸侯七虞大夫五虞虞訖即受服士三虞待卒哭乃受服必然者以其大夫巳上卒哭在後月虞在前月日巳多是以虞即受服不得至卒哭士葬月卒哭與虞同月故受服待卒哭後也今不言受月者喪服揔包天子以下若言七月唯據天子若言五月唯據諸侯皆不該上下故周公設經沒去受服之文欲見上下俱含故也儀禮疏卷第二十八
