  text: 儀禮疏卷第四
  hash: sha256:174cf871c05dafb709049fd5234e768be3e4b1c4ac37d9413ae38f65ab05b4ae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_004-1a}
body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彥等撰士昏禮第二鄭目録云士娶妻之禮以昏為期因而名焉必以昏者陽往而隂來日入三商為昏昏禮於五禮屬嘉禮大小戴及别録此皆第二釋曰鄭知是士娶妻之禮者以記云記士昏禮故知是士娶妻鄭云日入三商者商謂商量是漏刻也名故三光靈曜亦日入三刻為昏不盡為明案馬氏云日未出日沒後皆云二刻半前後共五刻今云三商者據整數而言其實二刻半也昏禮至用鴈釋曰從此下至主人許賔入授如初禮陳納采問名之禮云下逹者謂未行納采巳前男父先遣媒氏女氏之家通辭往來女氏許之乃遣使者行納采之禮也言下達者男為上女為下取陽唱隂和之義故云下逹謂以言辭下通於女氏也是以下記昏辭云吾子有惠貺室某也注云稱有惠明下達謂此下達也云納采用鴈者昏禮有六五禮用鴈納采問名納吉請期親迎是也唯納徵不用鴈以其自有幣帛可執故也且三禮不云納言納者恐女氏不受若春秋納納之義若然納采言納者以其始相采擇恐女家不許故言納問名不言納者女氏巳許故不言納也納吉言納者男家卜吉往與女氏復恐女家翻悔不受故更言納也納徵言納者納幣帛則昏禮成復恐女家不受故更云納也請期親迎不言納者納幣則昏禮已成女家不得移改故皆不言納也其昏禮有六尊卑皆同故左氏莊公二十二年經書冬公如齊納幣穀梁傳曰納幣大夫之事也禮有納采有問名有納徵有告期四者備而後娶禮也公之親納幣非禮也故譏之彼無納吉者以莊公在母喪內親行納幣非禮之事故關其納吉以非之也注達通至廉恥釋曰鄭云必先使媒氏下通其言女氏許之乃後使人納其采擇之禮者欲見納采之前有此下逹之言也案周禮地官有媒氏職是天子之官則諸侯之國亦有媒氏傳通男女使成昏姻故云媒氏也云用鴈為摯者取其順隂陽往來者案周禮大宗伯云以禽作六摯卿執羔大夫執鴈士執雉此昏禮無問尊卑皆用鴈故鄭注其意云取順隂陽往來也順隂陽往來者鴈木落南翔冰泮北徂夫為陽婦為隂今用鴈者亦取婦人從夫之義是以非禮用須引詩者證須媒下達之義也云昏必由媒交接設紹介者詩云匪媒不得是由媒也其行五禮自納采巳下皆使使往是交接設紹介也云皆所以養廉恥者解所以須媒及設紹介者皆所以養成男女使有廉恥也使媒通之媵御沃盥交之等皆是行事之漸養廉恥之義也主人至右几釋曰此女將受男納采之禮故先設神坐乃受之注主人至首尾釋曰云筵為神布席也者下文禮賔云徹几改筵是為人設席故以此為神席也云戶西者以户西是賔客之位故為尊處也必以西為客位者以地道尊右故也知受禮於襧廟者以記云凡行事受諸襧廟也云席西上右設几神不統於人者案鄉射燕禮之等設席皆東上是統於人今以神尊不統於人取地道尊右之義故席西上几在右也云席有首尾者以公食記蒲筵􅍉席皆卷自末是席有首尾也使者玄端至注使者至緇裳釋曰云使者夫家之屬者案士冠贊者於中士下差次為之此云夫家之屬亦當然假令主人是上士屬是中士主人是中士屬是下士主人是下士屬亦當是下士禮窮即同也云玄端士莫夕之服又服以事其廟者此亦如士冠禮玄端士莫夕於朝之服也但士以玄端祭廟今使者服玄端至亦於主人廟中行事故云又服以事其廟也云有司緇裳者案士唯有三等之裳玄裳黃裳雜裳此云緇裳者即玄裳者矣以其緇玄大同小異也然士有三等裳今直言玄裳者據主人是上士而言案士冠云有司如主人服則三等士之有司亦如主人服也擯者至入告注擯者至慎也釋曰云擯者有司佐禮者案士冠禮有司並是主人之屬及羣吏佐主人行禮之人故如此擯者亦是主人有司佐禮者也在主人曰擯云請猶問也禮不必事雖知猶問之重慎也者案論語云無必故云不必事也以其前巳有下達之事今使者來在門外是知有昏事也而猶問之重慎也主人至揖入釋曰案士冠禮主人迎賔於大門外云主人西面賔東面此及鄉飮酒鄉射皆不言面位者文不具耳當亦如士冠也注門外至盛禮釋曰知門外是大門外者以其大夫唯有兩門寢門大門而矣廟在寢門外之東此下有至于廟門明此門外是大門外可知也云不答拜者奉使不敢當其盛禮者此士卑無君臣之禮故賔雖屬吏直言不答拜不言辟若諸侯於使臣則言辟是以射禮擯迎入門公拜賔辟不答拜公食大夫主為賔己故賔答拜稽首亦辟乃拜之以其君尊故也至于至三讓注入三至碑揖釋曰凡入門三揖者以其入門賔主將欲相背故須揖賔主各至堂塗北面相見故亦須揖至碑碑在堂下三分庭之一在北是庭中之節故亦須揖但士冠注云入門將右曲揖將北曲揖當碑揖此注至內􅋼將曲揖既曲北面揖當碑揖文不同者鄭舉二文相兼乃足也三者禮之大節尊卑同故鄉飲酒鄉射聘禮公食大夫皆有此三揖之法但注有詳略耳主人至再拜釋曰賔則使者也禮之通例賔主敵者賔主俱升若士冠與此文是也若鄉飲酒鄉射皆主尊賔卑故初至之時主人升一等賔乃升至卒洗之後亦俱升唯聘禮公升二等賔始升者彼注云亦欲君行一臣行二也覲禮王使人勞侯氏使者不讓先升者奉王命尊故也主人阼階上北面再拜者主人不言當阿則如鄉飮酒主人當楣再拜注阿棟至為庪釋曰案鄉飲酒聘禮皆云賔當楣無云當阿者獨此云賔當阿故云示親親也凡士之廟五架為之棟北一楣下有室戶中脊為棟棟南一架為前楣楣前接簷為庪鄉射記云序則物當棟堂則物當楣鄭云是制五架之屋也鄉大夫射於庠庠則有室故物當前楣士射於序序則無室故物當棟此士之廟雖有室其棟在室外故賔得深入當之也授于楹間南面注授於至授也釋曰楹間謂兩楹之間賔以鴈授主人於楹間者明和合親好令其賔主逺近節同也凡賔主敵者授於楹間不敵者不於楹間是以聘禮賔覿大夫云受幣于楹間南面鄭注云受幣楹間敵也聘禮又云公側襲受玉於中堂與東楹之間鄭注云東楹之間亦以君行一臣行二至禮賔及賔私覿皆云當東楹是尊卑不敵故不於楹間也今使者不敵而於楹間故云明為合好也云南面並授也者以經云南面不辨賔主故知俱南面並授也賔降至老鴈釋曰授鴈訖賔降自西階出門主人降自阼階授老鴈於階立待後事也注老羣吏之尊者釋曰大夫家臣稱老是以喪服公士大夫以貴臣為室老春秋左氏傳云執臧氏老論語云趙魏老禮記大夫室老行事皆是老為家臣之貴者士雖無君臣之名云老亦是羣吏中尊者也擯者出請注不必至有無釋曰此主人不知賔有事使擯出請者亦是不必賔之事有無也賔執至初禮釋曰此之一使兼行納采問名二事相因又使還須卜故因即問名乃還卜之故共一使也云主人許者擯請入告乃報賔賔得主人許乃入門升堂授鴈與納采禮同故云如初禮也注問名至為醴釋曰言問名者問女之姓氏不問三月之名故下記問名辭云某既受命將加諸卜敢請女為誰氏鄭云誰氏者謙也不必其主人之女是問姓氏也然以姓氏為名者名有二種一者是名字之名三月之名是也一者是名號之名故孔安國注尚書以舜為名鄭君目録以曽子為姓名亦據子為名皆是名號為名者也今以姓氏為名亦名號之類也鄭云將歸卜其吉凶者亦據下記文也擯者至醴賔注此醴至厚之釋曰此下至送于門再拜主人禮賔之事云此醴亦當為禮者亦士冠禮賔為醴字彼巳破從禮故云亦此以醴酒禮賔不從醴者以大行人云上公再祼而酢侯伯一祼而酢子男一祼不酢及以酒禮之用齊禮之皆不依酒醴為名皆取相禮故知此醴亦為禮敬之禮不取用醴為醴之義也秋官司儀云諸公相為賔及將幣賔亦如之注云上於下曰禮敵者曰儐聘禮卿亦云無擯注云無擯辟君是大夫巳上尊得有禮儐兩名士以下卑惟稱禮也賔禮辭許注禮辭一辭釋曰禮賔一辭許者主人禮賔之常法鄉巳行納采問名賔主之情巳通矣故略行一辭而已主人至房中釋曰徹几改筵者於戶西禮神坐徹去其几於後授賔改設其筵設側尊甒醴在東房之中以禮賔也注徹几至之設釋曰經云東上者統於主人注云鄉為神今為人者為神則西上為人則東上不同故辨之云側尊亦言無玄酒者醴糟例無玄酒配之以其醴象大古質故士冠與此昏禮之等皆無玄酒也鄭知此亦有篚有籩豆如冠禮者此下云贊者酌醴加角柶明有篚盛之又云贊者薦脯醢則有籩豆可知但冠禮尊在服北南上則此尊與篚等亦南上故云如冠禮之設也主人至答拜釋曰云主人迎賔于廟門外揖讓如初升者如納采時三揖三讓也云主人北面再拜者拜賔至此堂飲之是以公食大夫燕禮鄉飲酒鄉射大射皆云拜至並是拜賔至此堂也但燕禮大射公食大夫皆云至再拜先言至者欲見賔至乃拜之是有尊卑不敵之義餘皆言拜至至在拜下者體敵之義也若然此為禮賔有拜至者前雖有納采問名之事以昏禮有相親之義故雖後亦拜至也聘禮享禮及禮賔不拜至者聘禮不取相親之義故不拜至是以彼鄭注云以賔不於此始至也云主人拂几者此拂几雖不言外拂內拂又不言三案有司徹主人西面左手執几縮之以右袂推拂几三二手橫執几進授尸于筵前注云衣袖謂之袂推拂去塵示新云拂者外拂之也則此亦外拂之三也凡行敵禮者拂几皆若此卑於尊者則內拂之故聘禮云宰內拂几三奉兩端以進鄭云內拂几不欲塵坌尊者是也若然冠禮禮賔無几者冠禮比昏為輕故無几鄉飲酒鄉射及燕賔賔輕故無几聘賔及公食大夫賔重故有几也云授校者凡授几之法卑者以兩手執几兩端尊者則以兩手於几間執之授皆然是以聘禮宰夫奉兩端以進有司徹云尸進二手受于手間注云受從手間謙也雖不言兩手兩手授之可知又案聘禮云公東南鄉外拂几三卒振袂中攝之進西鄉賔進訝受几于筵前以此言之公尊中執几以一手則賔以兩手於几兩端執之也而此亦賔主不敵授校者昏禮異於餘禮云拜送者此當再拜送君於聘賔則一拜故聘禮云公一拜送鄭注云公尊也是也此几以安體非己所得故賔受訖然後答拜下經受醴之時先拜乃受者彼是入口之物已所當得故先拜乃受之云賔以几辟者以賔卑故以几辟聘禮賔卑亦云以几辟有司徹不云以几辟者尊尸故也覲禮不云以几辟者尊王使也凡設几之法受時或受其足或受于手間皆橫受之及其設之皆旋几縱執乃設之於坐南北面陳之位為神則右之為人則左之為異不坐設之者几輕故也注拂拭至為枝釋曰鄭知校几足者既夕記云綴足用燕几校在南御者坐持之故知校是几足也贊者至于房注贊佐至作擖釋曰云贊者亦洗酌加角柶覆之如冠禮矣者案冠禮云贊者洗于房中側酌醴加柶覆之此與冠禮同故知如冠禮矣主人至拜送注主人至食起釋曰經唯云主人西北面知疑立者鄉飮酒云主人阼階東疑立明此亦然也几主人將授酒醴於筵前待賔即筵前乃授之此鄭云即筵謂就筵前與下賔即筵別也是以冠禮禮子及下禮婦皆於筵西受禮然禮賔進筵前受醴是不獵席之事也云賔復位於西階上北面明相尊敬此筵不主為飲食起者但此筵為行禮故拜及啐皆於西階也贊者至答拜釋曰此經云坐奠觶遂拜言遂者因事曰遂因建柶興坐奠觶不復興遂因坐而拜冠禮禮子并醮子及此下禮婦不言坐奠觶遂者皆文不具聘禮賔不言拜者理中有拜可知也注即就至停也釋曰鄭云祭以右手出于鄉射也云凡祭於脯醢之豆間者謂祭脯醢俎豆皆於豆間此及冠禮鄉飲酒鄉射燕禮大射皆有脯醢則在籩豆之間此注不言籩直言豆者省文公食大夫及有司徹豆多者則言祭於上豆之間也云必所為祭者謙敬示有所先也者案曲禮云主人延客祭注云祭祭先也君子有事不忘本也此云謙敬示有所先先即本謂先丗造此食者也云啐嘗也嘗之者成主人意者主人設饌望賔為美之今客嘗之告旨是成主人意也賔即至人辭釋曰此奠於薦左不言面位下贊禮婦奠于薦東注云奠于薦東升席奠之此云奠于薦東升席奠之明皆升席南面奠也必南面奠者取席之正又祭酒亦皆南面並因祭酒之面奠之則冠禮禮子亦南面奠之聘禮禮賔賔北面奠者以公親執束帛待賜已不敢稽留故由便疾北面奠之也鄉飲酒鄉射酬酒不祭不舉不得因祭而奠于薦東也燕禮大射重君物君祭酬酒故亦南面奠云降下也自取脯者尊主人之賜將歸執以反命者案下記云賔右取脯左奉之乃歸執以反命是也賔降至再拜注人謂至出去釋曰鄭知人謂使者從者者以其此脯使者將歸故授從者也又知授於階下西面然後出去者以其賔位在西授脯文在出上故知西階下西面授之然後出去也納吉至采禮釋曰案上文納采在前問名在後今此不云如問名而去如納采者問名賔不出大門故此納吉如其納采也注歸卜至是定釋曰鄭知義然者案下記云納吉曰吾子有貺命某加諸卜占吉使某也敢告凡卜並皆於禰廟故然也未卜時恐有不吉婚姻不定知納吉乃定也納徵至吉禮釋曰此納徵無鴈者以有束帛為贄故也是以孝經鉤命決云五禮用鴈是也案春秋左氏莊公二十二年冬公如齊納幣不言納徵者孔子制春秋變周之文從殷之質故指幣體而言周文故以義言之徵成也納此則昏禮成故云徵也注徵成至作熏釋曰云用玄纁者象隂陽備也束帛十端也者周禮凡嫁子娶妻入幣緇帛無過五兩鄭彼注云納幣帛緇婦人隂也凡於娶禮必用其類五兩十端也必言兩者欲得其配合之名十象五行十日相成也士大夫乃以玄纁束帛天子加以穀圭諸侯加以大璋雜記云納幣一束束五兩兩五尋然則每端二丈若彼據庶人空用緇色無纁故鄭云用緇婦人隂此玄纁俱有故云象隂陽備也案玉人榖圭天子以聘女大璋諸侯以聘女故鄭據而言焉玄纁束帛者合言之陽竒隂偶三玄二纁也其大夫無冠禮而有昏禮若試為大夫及幼為大夫者依士禮若五十而爵改娶者大夫昏禮玄纁及鹿皮則同於士餘有異者無文以言也請期至徵禮釋曰請期如納徵禮納吉禮如納采禮案上納采之禮下至主人拜送於門外其中揖讓升降及禮賔迎送之事此皆如之注主人至告之釋曰壻之父使使納徵訖乃下卜婚月得吉日又使使往女家告日是期由男家來今以男家執謙故遣使者請女家若云期由女氏故云請期女氏知陽唱隂和當由男家出故主人辭之使者既見主人辭遂告主人期日也是以下記云使者曰某使某受命吾子不許某敢不告期曰某日注云某吉日之甲乙是告期之辭故鄭云辭即告也期初至扃幂釋曰此文下盡合卺一節論夫家欲迎婦之時豫陳同牢之饌也云陳三鼎于寢門外東方北面北上者謂在夫寢門外也言東方北面是禮之正但數鼎故云北面北上則此及少牢皆是也特牲陳鼎於門外北面北上當門而不在東方者辟大夫故也今此亦東方不辟大夫者重昏禮攝盛也鼎不言北上直言北面士冠所云是也凡鼎陳于外者北面為正阼階下西面為正士喪禮小斂陳一鼎於門外西面者喪禮少變在東方者未忍異於生於大斂大奠及朔月奠既夕陳鼎皆如大斂奠門外皆西面者亦是喪禮既夕變也士虞陳三鼎于門外之右北面北上入設于西階前東面北上不在東者既葬鬼事之反吉故也公食陳鼎七當門南面西上者以賔是外人向外統之注期取至作密釋曰云期取妻之日者此陳同牢之饌下云親迎之禮其中無厥明之文明是娶婦之日也云鼎三者升豚魚臘也者即經文自顯也云寢壻之室也者命士以上之父子異宫自然别有寢若不命之士父子同宫雖大院同居其中亦隔别各有門戶故經總云寢門外也云合升合左右胖升於鼎也者以夫婦各一故左右胖俱升若祭則升右也云去蹄蹄甲不用也者以其踐地穢惡也云舉肺脊者食時所先舉者案下文贊者告具揖婦即對筵皆坐祭祭薦黍稷肺即此祭肺也下又云贊爾黍稷授肺脊皆食以湆醬皆祭舉食舉也即此舉肺脊也祭時二肺俱有生人唯有舉肺皆祭今此得有祭肺者禮記郊特牲論娶婦玄冕齊戒鬼神隂陽也故與祭祀同二肺也據下文先用祭肺後用舉肺此經先言舉肺後言祭肺者以舉肺脊長大故先言是以特牲少牢入鼎時舉肺脊在前云肺者氣之主也周人尚焉者案禮記明堂位云有虞氏祭首夏后氏祭心殷祭肝周祭肺鄭注云氣主盛也但所尚不同故云周人尚焉云脊者體之正也食時則祭之者對祭肺未食時祭也云飯必舉之貴之也者但一身之上體揔有二十一節前有肩臂臑後有肫胳脊在中央有三脊正脡橫脊而取中央正脊故云體之正凡云先以對後案特牲舉肺脊後食幹骼注云肺氣之主也脊正體之貴者先食啖之所以導食通氣此不言先食啖之從彼可知也云每皆二者夫婦各一耳者釋經多之義云凡魚之正十五而鼎減一為十四者據特牲記云魚十有五注云魚水物以頭枚數隂中之物重數於月十有五日而盈少牢饋食禮亦云十有五而俎尊卑同則是尊卑同用十五而同鼎也云欲其敵偶也者夫婦各有七也此夫婦鬼神隂陽故同祭禮十五而去一若乎生人則與此異故公食大夫一命者七魚再命者九魚三命者十有一魚天子諸侯無文或諸侯十三魚天子十五魚也云臘兔臘也者少牢用麋臘士兔臘可知故曲禮云兔曰明視也云肫或作純純全也凡臘用全者此或少牢文案少牢臘一純注云純猶全也凡牲體則用一胖不得云全其臘則左右體脅相配共為一體故得全名也特牲少牢亦用全士喪大斂與士虞皆用左胖不全者喪禮略云今文幂皆作密者鄭以省文故兼下綌幂揔疊之故云皆也饌于至皆蓋注醯醬至春時釋曰鄭知以醯和醬者得醯者無醬得醬者無醯若和之則夫妻皆有是以知以醯和醬也云生人尚褻味者此文與公食皆以醯和醬少牢特牲不言之故云然也引周禮釋敦皆有蓋者飯冝溫比春時故也大羹湆在爨注大羹至作汁釋曰湆與汁一也知大古之羹無鹽菜者左傳桓二年臧哀伯云大羹不致禮記郊特牲云大羹不和謂不致五味故知不和鹽菜唐虞以上曰大古有此羹三王以來更有鉶羹則致以五味雖有鉶羹猶存大羹不忘古也引周禮者證大羮須熱故在爨臨食乃取也尊于至南枋注墉牆至作柄釋曰云禁所以庪甒者士冠云甒此亦士禮雖不言甒然此尊亦甒也庪承於甒云禁者因為酒戒故以禁言之也云玄酒不忘古也者古謂黃帝巳前以禮運云汙尊而抔飲謂神農時雖有黍稷未有酒醴則神農以上以水為玄酒也禮運又云後聖有作以為醴酪據黃帝以後雖有酒醴猶是不忘古也尊于至合卺注無玄至曰爵釋曰云無玄酒者略之者此對上文夫婦之尊有玄酒此尊非為夫婦故略之也云夫婦酌於內尊其餘酌於外尊者據上文玄酒知之云一升曰爵者韓詩外傳云一升曰爵二升曰觚三升曰觶四升曰角五升曰散是也主人至前馬釋曰此至俟于門外論壻親迎之節注主人至照道釋曰云主人壻也者以其親迎向女家女父稱主人男稱壻巳下皆然今此未至女家仍據男家而言故云主人是壻為婦主故下親迎至男家壻還稱主人也云爵辨而纁裳者下爵辨亦冕之類故亦纁裳也云玄冕之次者鄭注周禮辨師云一命之大夫冕而無旒士變冕為爵辨故云冕之次也云大夫以上親迎冕服者士家自祭服玄端助祭用爵辨今爵辨用助祭之服親迎一為攝盛則卿大夫朝服以自祭助祭用玄冕親迎亦當玄冕攝盛也若上公有孤之國孤絺冕卿大夫同玄冕侯伯子男無孤之國卿絺冕大夫玄冕也孤卿大夫士為臣卑復攝盛取助祭之服以親迎則天子諸侯為尊則衮矣不須攝盛冝用家祭之服則五等諸侯玄冕以家祭則親迎不過玄冕天子親迎當服衮冕矣是以禮記郊特牲云玄冕齊戒鬼神隂陽也將以為社稷主以社稷言之據諸侯而説故知諸侯玄冕也其於孤卿雖絺冕以助祭至於親迎亦用玄冕臣乃不得過君故也云冕服迎者鬼神之鬼神之者所以重之親之者郊特牲文云纁裳者衣緇衣不言衣與帶而言袘者空其文明其與袘俱用緇者鄭言纁裳者衣緇衣言緇衣即玄衣大同故也上士冠陳爵辨服云緇衣緇帶此文有緇袘無衣帶二字故云空其文以袘著緇者欲見袘與衣帶色同故云俱用緇也云袘謂緣者謂純緣於裳故字從衣云袘之言施者義取施及於物故作施也云以緇緣裳象陽氣下施者男陽女隂男女相交接示行事有漸故云象陽氣下施故以衣帶上體同色之物下緣於裳也云從者有司也乘二車從行者也者以士雖無臣其僕隸皆曰有司使乘二車從壻大夫巳下有二車士無二車此有者亦是攝也云墨車􅃮車者案巾車注云棧車不革挽而漆之則士之棧車漆之但無革為異耳案考工記云棧車欲其弇鄭云無革挽又云飾車欲其侈鄭云革鞔則大夫巳上皆以革挽則得飾車之名飾者革上又有漆飾士卑無飾雖有漆不得名墨車故唯以棧車為名若然自卿巳上更有異飾則又名玉金象夏篆夏縵之等也云士乘墨車攝盛也者案周禮巾車云一曰玉路以祭祀又云金路同姓以封象路異姓以封革路以封四衛木路以封蕃國孤乘夏篆卿乘夏縵大夫乘墨車士乘棧車庶人乘役車士乘大夫墨車為攝盛則大夫當乘卿之夏縵卿當乘孤之夏篆巳上有木路質而無飾不可使孤乘之禮窮則同也孤還乘夏篆又於臣之外特置亦是尊尊則尊矣不欲攝盛若然庶人當乘士之棧車則諸侯天子尊則尊矣亦不假攝盛依巾車自乘本車矣玉路祭祀不可以親迎當乘金路矣以攝言之士之子冠與父同則昏亦同但尊適子皆與父同庶子冝降一等也婦車至有裧注亦如至有蓋釋曰婦車亦墨車但有裧為異耳云士妻之車夫家共之者即此是也云大夫以上嫁女則自以車送之者案宣公五年冬左傳云齊髙固及子叔姬來反馬也休以為禮無反馬而左氏以為得禮禮婦人謂嫁曰歸明無大故不反於家經書髙固及子叔姬來故譏乘行匹至也士昏皆異據士禮無反馬蓋失之矣士昏禮曰主人爵辨纁裳緇袘從者畢玄端乘墨車從車二乘執燭前馬婦車亦如之有裧此婦乘夫家之車鵲巢詩曰之子于歸百兩御之又曰之子于歸百兩將之國君之禮夫人始嫁自乘其車也何彼襛矣篇曰曷不肅雍王姬之車言齊侯嫁女以其母王姬始嫁之車逺送之則天子諸侯女嫁留其車可知今髙固大夫反馬大夫亦留其車禮雖散亡以詩論之大夫以上至天子有反馬之禮留車妻之道反馬壻之義髙固秋月逆叔姬冬來反馬則婦人三月祭行故行反馬禮也以此鄭針膏肓言之則知大夫巳上嫁女自以其車送之若然詩注以為王姬嫁時自乘其車針膏肓以為齊侯嫁女乘其母王姬始嫁時車送之不同者彼取三家詩故與毛詩異也凡婦車之法自士巳上至孤卿皆與夫同有裧為異至于王后及三夫人并諸侯夫人皆乘翟車案周禮巾車王后之五路重翟厭翟安車皆有容蓋又云翟車輦車鄭注云詩國風碩人曰翟蔽以朝謂諸侯夫人始來乘翟蔽之車以朝見於君成之也此翟蔽蓋厭翟也然則王后始來乘重翟受又詩序云王姬下嫁於諸侯車服不繫其夫下王后一等以此差之王后始來乘重翟則上公夫人用厭翟侯伯子男夫人用翟車若然巾車安車次厭翟在翟車之上者以其安車在宫中所乘有容蓋與重翟厭翟有屈退之在下其實安車無翟飾不用為嫁時所乘也三夫人與三公夫人當用翟車九嬪與孤妻同用夏篆丗婦與卿大夫妻同用夏縵女御與士妻同用墨車也其諸侯夫人姪娣及二媵并姪娣依次下夫人以下一等為差也云裧車裳幃周禮謂之容者案巾車職重翟厭翟安車皆有容蓋鄭司農云容謂幨車山東謂之裳幃或謂之潼容後鄭從之衛詩云漸車帷裳是山東名幃裳也云車有容則固有蓋者巾車云有容蓋容蓋相配之物此既有裧之容明有蓋可知故云固有蓋矣至于門外注婦家大門之外釋曰知是大門外者以下有揖入乃至廟廟在大門內故知此大門外也主人至右几注主人至布席釋曰以先祖之遺體許人將告神故女父先於廟設神席乃迎壻也儀禮疏卷第四
