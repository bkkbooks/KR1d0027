body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彥等撰主人至一拜注拜于至為一釋曰自此盡賔降論主人獻長賔巳下井主人受酢之事云拜于門東明少南就之也者以其繼門言之明少南就之云言三拜者衆賔賤旅之也者案周禮司士職孤卿特揖大夫以其等旅揖注云特揖一一揖之旅衆也大夫爵同者衆揖之此云旅之者旅衆也衆人共得一拜云衆賔一拜賤也者以賤不得備禮故云賤也云純臣也位在門東者此對特牲記云公有司門西北面東上獻次衆賔私臣門東北面西上獻次兄弟此賔皆在門東故云純臣者指北面時也得獻訖在西階下亦不純臣故下經云獻私人于阼階上注云私人家臣已所自謁云獻私人于阼階上注云私人家臣己所自謁除也大夫言私人明不純臣也若然大夫云私人見不純臣士言私臣不言人者大夫尊近君若言私臣則臣與君不異故名私人士卑無辟君臣之名不嫌故名私臣注羊骼至為胳釋曰云設俎者既則俟于西序端者案鄉飲酒司正升相旅受酬者降席司正退立于序端然則先事既設後事未至其退立之位當在於序端知此不降者下文賔執祭以降宰夫執薦以從司士執俎以從無升文明此不降退立於序端可知注成祭至脯肺釋曰云取祭以降反下位也反下位而在西階西南巳獻尊之者凡言反位者或反初位或上下位異亦為反此則初位在門東今得獻反在西階南與主人相對巳獻尊之故也若燕禮士得獻位于東方亦是尊之者也云祭脯肺者案經云取脯取肺祭之明祭是脯肺注既盡至不拜釋曰云長賔升者以次第升受獻者知不直次上賔後一人為衆賔長時受獻必以長幼次第受獻者以其下文云宰夫贊主人酌若是以辨鄭云每獻一人奠空爵于棜宰夫酌授於尊南是奠爵故以長幼次第受獻也辨受至儀也注遍獻至為議釋曰即薦謂若燕禮三卿巳上得獻即薦大夫遍獻乃薦亦其類云亦宰夫薦司士脀者此約上賔此衆賔亦同此二人為之云儀者尊體盡儀度餘骨可用而用之尊者用尊體卑者用卑體而巳者以其言儀取尊卑得其儀但尊體既盡就卑體之中度尊卑之儀而用之不可辨其尊體故鄭以意解之尊者用尊體卑者用卑體而巳也云亦有切肺膚者案特牲用離肺知此衆賔用切肺膚者以其侑用切肺不敢殊於尸明衆賔亦不敢殊於侑若然不儐尸者亦用切肺者亦是不敢變於儐尸禮也乃升至在左注主人至敢酢釋曰特牲主人獻長賔訖即酢此辨獻乃酢者主人益尊先自達其意特牲主人獻內賔辨乃自酢注云爵辨乃自酢以初不殊其長也則此大夫尊初則殊其長故也宰夫至答拜注宰夫至為爵釋曰自此盡于薦左論主人酬長賔於堂下之事也云宰夫授主人觶則受其虛爵奠于篚者謂上主人受賔之酢爵今宰夫既授觶訖因受取酢之虛爵降奠于篚也知然者上文主人受爵訖賔降主人無降文即云宰夫授觶主人受之明主人手中虛爵宰夫受之奠於篚可知若然知不待酬賔虛觶受之奠於篚者以其下文賔之虛觶奠於薦左故知非賔虛觶其賔奠薦左者後舉之以為無算爵也主人至以辨注兄弟至待之釋曰自此盡其衆儀也論主人獻兄弟於阼階之事云兄弟長幼立飲賤不別者案特牲云獻長兄弟于阼階上如賔儀者士卑長兄弟為貴殊貴賤故云如賔儀長賔坐飲也此大夫禮長賔坐飲衆賔立飲至於大夫貴兄弟賤兄弟長幼皆立飲不得如賔儀故立飲賤不别也云大夫之賔尊於兄弟宰夫不贊酌者兄弟以親昵來不以官待之者決上文大夫賔貴使宰夫贊酌今兄弟酌不使宰夫贊酌者為兄弟是親昵不以官待之故兄弟雖賤於賔不得使人贊酌而親之也辨受至其位注亦辨至私人釋曰云既云辨矣復言升受爵者為衆兄弟言也者以上經云兄弟之長升拜受爵嫌衆兄弟亦升拜受爵是以此更云升受爵直為衆兄弟不拜受爵而言鄭即云衆兄弟升不拜受爵也若然上賔拜受爵又拜既爵衆賔拜受爵不拜既爵長兄弟得與衆賔同衆兄弟又不拜受爵是其差也云先著其位於上乃後云薦脀設於其位明位初在是者初位謂經云其位在洗東西面北上是先著其位於上乃云升受爵者謂發此位升堂受爵又云薦脀設於其位者謂受爵時設薦脀於其東西面位是先著其位於上乃後云薦脀設於其位明位初在是也故先云洗東位以此而言則衆賔亦先有位在門東北面繼上賔後獻訖亦薦脀於位皆是先有位不繼於門東而在西階西南者彼謂巳獻薦之故也云位不繼於主人而云洗東卑不統於尊者案特牲主人卑故兄弟助祭之位得繼主人於阼階下南陳又得辟大夫不敢自尊也此以大夫尊故兄弟之位在洗東不繼主人卑不統於尊故也云此薦脀皆使私人者上獻賔長及衆賔使宰夫設薦司士設俎又使宰夫贊酌至於此獻兄弟為親昵不以官待之主人親酌明亦不以官使私人薦脀可知注先生至之折釋曰知先生是長兄弟者以其文承長兄弟之下故知先生非老人教學者知折是豕左肩之折者以上初亨牲體明侑俎豕左肩折注云折分為長兄弟俎是也主人至答拜注內賔至左人釋曰自此盡亦有薦脀論主人獻姑姊之等於房中之事知內賔是姑姊妹及宗婦者約特牲記而知也云獻於主婦之席東主人不西面尊不與為賔主禮也者案特牲獻內兄弟於房中如獻衆兄弟之儀主人西面答拜此大夫禮主人南面拜故決之不與為賔主之禮也云南面於其右主人之位恆左人者謂人在主人左若鄉飲酒鄉射之等於西階上北面主人在東賔在西此南面則主在西賔在東故云恆左人也坐祭至薦脀注亦設至北上釋曰云亦設薦脀於其位者言亦者亦上先生之等引特牲記者欲見內賔設薦之位處主人降至薦脀注私人至位定釋曰自此盡主人就筵論主人獻私人之事云私人家臣己所自謁除也者此對公士得君所命者此乃大夫自謁請於君除其課役以補任為之云大夫言私人明不純臣也者大夫尊近於君故屈己之臣名為私人云士言私臣明有君之道者士卑不嫌近君故得名屬吏為私臣也云北上不敢專其位者以其兄弟北上今繼兄弟之南亦北上與兄弟位同故云不敢專其位云兄弟位定者與上衆兄弟云其位在洗東西面北上升受爵其薦脀設于其位注云先著其位於上明位初在是此不先著位於上俱言繼凡獻者是據獻位為言則未獻時在衆賔後矣案特牲記云私臣位在門東北面是衆賔後也云凡獻位定則是凡獻以前非定位也尸作三獻之爵注上賔至自舉釋曰自此盡降實于篚論舉三獻之爵賔長又獻侑并致爵之事云上賔所獻爵者若然三獻是上賔不言上賔而言三獻者以其主人主婦并此賔長備三獻因號上賔為三獻是以事名官者也云不言三獻作之者對特牲云三獻作止爵故決之下大夫不儐尸自作爵者順上大夫為文作其爵者以神惠均於庭訖欲使尸飲此酒但此一節之內有四爵行事四者尸作三獻之爵一也獻侑二也致爵於主人三也受尸酢四也注不羞至之殺釋曰云不羞魚匕湆略小味也者對羊豕牲之大有匕湆之等魚無以魚為小味故略之也云隆汚之殺者以有者為隆盛無者為殺少也注司馬至於尸釋曰上文尸使司士羞魚此侑使司馬羞魚故云變於尸也注賔拜至就之釋曰就之者賔於禮當在西階上今在東楹之東以主人席在於阼階是以賔拜於東楹東就之也注既致至賔意釋曰遂賔意者賔雖不言其意欲得與主人抗獻酢之禮今尸見致爵於主人訖即酌以酢賔是遂達賔之意二人至皆降注三獻至尸侑釋曰自此盡及私人論旅酬從尸及上下無不遍之事云三獻而禮小成者以此獻為正後仍有舉奠加爵之等終備乃是禮之大成故云小成也云使二人舉爵序殷勤於尸侑者飲酒之禮酬與無算爵乃盡歡心故以旅酬及無算乃為殷勤於尸侑也案鄉飲酒及鄉射特牲等皆一人舉觶為旅酬始二人舉觶為無算爵始今儐尸乃以二人為旅酬始者此儐尸別一禮與彼不同以其初時主人酬尸尸奠之侑未得酬故使二人舉觶侑乃得奠而不舉即與亦奠一爵一爵遂酬於下是以須二人舉觶兄弟之後生者舉觶於其長為無算爵者以其賔長所舉奠酬亦為無算爵以此二觶者皆在堂下故為無算爵尸不與無算爵故舉堂下觶為無算爵其為旅酬皆從上發尸為首故特牲等使一人舉觶為旅酬與賔長所舉薦右之觶此賔不舉旅酬皆從尸舉故所奠者為無算一爵亦是異於特牲注尸拜至禮殺釋曰決上文尸酢主人主人東楹東北面拜受爵尸西楹西北面答拜是各各於其階今尸酬主人同于阼階故云禮殺也注言就至待之釋曰言立待之者以其不言適阼階上酬主人明主人不去立待之可知注酬不至侑也釋曰此決上主人酬賔賔奠之也注遂旅至呼之釋曰知者若不贊呼之則當如上文衆賔長升兄弟之長升拜受爵故知有贊呼之也注私人至飲之釋曰私人位在兄弟之南今言下飲之則私人之長一人在西階下飲之其餘私人皆飲於其位故下經云卒爵升酌以之其位相酬辨是也卒飲至于篚注末受至猶飲釋曰凡旅酬之法皆執觶酒以酬前人前人領受其意乃始自飲此私人末受酬者後雖無人可旅猶自飲之訖乃實爵於篚以其酒是前人所酬不可不飲故也乃羞至私人注無房至宗婦釋曰此經論無算爵時羞庶羞於賔及兄弟之等事云此羞同時羞則酌房中亦旅者旅酬之下云乃羞庶羞內賔羞在私人之上私人得旅酬則房中內賔亦旅可知兄弟至其長注後生至作觶釋曰自此盡爵止論後生舉觶於長兄弟主人酬兄弟之事注長在左辟主人釋曰凡獻酬之法主人常左人若北面則主人在東今長兄弟北面云長在左則在西故辟主人注拜受至待也釋曰云儐尸禮殺者案特牲兄弟之後生舉觶於其長為旅酬又兄弟弟子舉觶於其長為無算爵拜送皆北面此云東面決上儐尸禮殺也云長賔言奠兄弟言止互相發明者上文主人酬賔奠爵于薦左是長賔言奠此言爵止是兄弟言止長賔言奠明止而未行此言止明亦奠薦左故云互相發明也云相待也者酬賔雖在前及其行之相待俱時舉行故下文云賔及兄弟交錯其酬皆遂及私人爵無算是也若二人舉觶于尸侑侑奠于右不舉尸即酬主人主人酬侑侑酬長賔至于衆賔遂及兄弟遂及私人依次第行遍不交錯所謂旅酬也賔長至不止注如初至者也釋曰此一經論衆賔長加為爵數多與上賔異何者上賔獻侑致爵於主人時皆有湆魚從今無湆魚從故經云無湆也云爵不止者上賔獻尸時亦止爵待獻堂下畢乃舉觶今尸不止爵即飲故云爵不止云賔長者賔之長次上賔者非即上賔者以其上賔將獻異之言上賔此不異其文明非上文上賔為賔長者故以為次上賔者也經云無湆爵不止文在如初之下不蒙如初之文則知與上異故文在如初下也云不使兄弟不稱加爵大夫尊也者此決特牲云長兄弟為加爵又衆賔長為加爵不言獻此言獻者尊大夫若三獻之外更容有獻故云大夫尊也云不用觚大夫尊者此亦決特牲云長兄弟洗觚為加爵此用爵爵尊於觚故云大夫尊者也賔一至於下注一人至發明釋曰此一經論次賔舉觚于尸更為旅酬如上旅酬之事但前二人舉觶於尸侑尸舉旅酬從上至下皆遍飲今亦從上至下故云亦遂之於下云上言無湆爵不止互相發明者上經云爵止與上賔奠爵云互相發明今此又與上文無湆爵不止相發明是以二文皆在如初之下賔及至無算注算數至數也釋曰自此盡有司徹論堂下行無算爵禮終尸侑出主人送於廟門外之事云長賔取觶者是主人酬賔觶云長兄弟取觶者是兄弟之後生者舉觶于其長之觶也尸出至不顧注拜送之釋曰儐尸之禮尸侑賔也故孔子亦云賔不顧矣有司徹注徹堂至不徹釋曰云徹堂上下之薦俎也者案上文堂上有尸侑之薦俎堂下有賔及兄弟之薦俎皆徹之也云外賔尸雖堂上婦人不徹者案特牲云宗婦徹祝豆籩入于房徹主婦薦俎此篇首云有司徹鄭注云徹室中之饋及祝佐食之俎為將儐尸故使有司徹之下大夫不儐尸改饋饌于西北隅云有司官徹饋饌于室中西北隅至篇末禮終云婦人乃徹注云徹祝之薦及房中薦俎不使有司者下上大夫之禮然則此篇首云有司徹別無婦人也下大夫有司饌陽厭婦人徹之篇末云徹室中之饌注云有司饌之婦人徹之外內相兼禮殺此戶外儐尸亦禮殺嫌婦人亦徹之故云雖堂上婦人不徹婦人必不徹者異於下大夫也堂上儐尸猶如堂內之陽厭故鄭注篇首云賔尸則不設饌西北隅以此薦俎之陳有祭象而亦足以厭飫神是也若不賔尸注不賔至之矣釋曰自此盡牢舉如賔論下大夫不賔尸之事云不賔尸謂下大夫者從尸飲七巳前皆與上大夫賔尸者同巳後則以此祝侑續之是儐尸之禮故云不賔尸謂下大夫也云其牲物則同不得備其禮耳者謂不備儐尸禮也引曽子問者破舊說案彼上云若宗子有罪居于他國庶子為大夫其祭也祝曰孝子某使介子某執其常事攝主不厭祭不旅不假不綏祭不配注云皆辟正主厭厭飫神也厭有隂有陽迎尸之前祝酌奠奠之且饗是隂厭也尸謖之後徹薦俎敦設于西北隅是陽厭也此不厭者不陽厭也不旅不旅酬也假讀為嘏不嘏不嘏主人也不綏祭謂今主人也又云布奠於賔賔奠而不舉是也云而此備有似失之矣者謂此不儐尸者不厭巳下皆有則非如舊說使昆弟攝者故云似失之矣則祝侑亦如之注謂尸七飯時釋曰案上篇尸食七飯告飽祝西面于主人之南獨侑不拜侑曰皇尸未實侑是也尸食注八飯釋曰上巳七飯故知此當入飯也乃盛至皆牢注盛者至體焉釋曰案特牲尸食訖乃盛今入飯即盛者大夫禮與士相變若然此先言臑者見從下起不言盛肩肩未舉舉乃盛不言骼骼已舉先在俎有司徹不盛俎者更無所用全以歸尸故也云盛者盛於肵俎也者以特牲云盛肵俎俎釋三個故知盛於肵以歸尸故也云此士體羊豕者以其五鼎下有魚臘膚又不升故唯羊豕也云其脊脅皆取一骨也與所舉正脊幹骼凡十矣者案上篇載時皆二骨以並今但盛一骨不云正脊長脅者先舉一骨故不序也凡骨體之數左右合為二十一體案少牢注云肩臂臑肱骨也膞骼股骨鄉飲酒注前脛骨三肩臂臑也後脛骨二膞胳也又後有髀觳折特牲記云主婦俎觳折注云觳後足也昏禮不數者凡體前貴於後觳賤於臑故數臑不數觳是以不升於鼎又以髀在肫上以竅賤正俎不用又脊有三分一分以為正脊次中為脡脊後分為橫脊脅亦為三分前分為代脅次中為長脅後分為短脅是其二十一體也云而俎猶有六體焉者謂三脊三脅皆取一骨盛於肵各有一骨體在俎不取以備陽厭也故云而俎猶有六體焉也魚七注盛半至而巳釋曰云魚十有五而俎者案少牢載魚鮒云十有五而俎云其一巳舉者謂尸食時巳舉其一唯有十四在云必盛半者魚無足翼於牲象脊脅而巳者案中候云魚者水精隨流出入得申朕意鄭注引春秋緯琁璣樞曰魚無足翼紂如魚乃討之是也紂雖有臣無益於股肱若魚雖有翼不能飛若然此注云魚無翼者亦從彼文魚雖有翼不能飛云象脊脅者六體十二骨盛六是半魚無足象牲脊脅亦盛半盛半相似數則不同以其牲之脊脅則六魚之半則七也臘辨無髀注亦盛至作脾釋曰云亦盛半者謂除尸舉其餘兩半亦似魚十四盛七為半必知盛半者以其此臘在魚下明盛半與魚同此臘亦盛右體知者以其牲用右故此亦盛右體知脊屬焉者案上篇少牢云臘一純而俎脊不折直為一假代脅長脅短脅各一骨左右三脅脅骨合為六體并脊為七通肩臂等十為十七體與牲體同如臘肩尸食既舉而俎唯有十六在言盛半明脊屬又且凡牲載體者脊皆屬焉下經云乃托于魚臘俎俎釋三個其餘皆取之明不盡盛可知若然案士虞禮升臘左胖髀不升實于下鼎注云臘亦七體牲之類又特牲記云臘如牲骨鄭注云不但言體以有一骨二骨者以此言之臘與牲體設骨多少盡同而云臘脊脅皆一骨者以其左右盡升欲使祝及主婦巳下俱取於此臘體故下云祝主人之魚臘取于是注云祝主人主婦俎之魚臘取於此者大夫之禮文待神餘也三者各取一魚其臘主人臂主婦臑祝則骼也今若復分一骨二骨則數多於特牲祝以下俎無臘體不升臘右胖故云臘如牲骨與右胖同皆祝俎所不用上篇少牢雖祝俎有臘兩髀屬竅上大夫禮又異於此士虞禮祝以下亦無臘體故鄭注士虞禮臘亦七體牲之類鄭注云凡臘用純者據上下大夫以上祭祀及士之嘉禮士祭禮則臘不用純辟大夫云言無髀者云一純而俎嫌有之者案上篇少牢載臘云一純而俎不云髀不升故此明之而云臘辨無髀也案上篇少牢祝俎云臘兩髀在祝俎不升於鼎不在神俎已自明矣今此更明之者以少牢陳鼎上下大夫皆同今此下大夫不儐尸其祝俎臘骼不云無髀何以明之注不言至于尊釋曰案少牢云設俎羊在豆東豕亞其北魚在羊東臘在豕東特膚當俎北端今托魚臘冝在魚俎東而繼羊俎言之以羊尊為主也乃托至以出注個猶至為摕釋曰知魚托四枚臘托五枚者以魚盛半其俎猶有七個在故托去四枚釋三個臘盛半而俎猶有八體在托去五枚釋三個皆為改饌西北隅也云臘則短脅正脅代脅魚三枚而巳者以臘右體巳盛脊又屬焉唯有左在下文云主人臘臂主婦臘臑祝則骼所釋者故知脅又牲體所釋者是脅脊此臘脊巳在盛半限故知所釋唯有三脅耳祝主至于是注祝主未聞釋曰案特牲士禮不待神餘故王人主婦祝皆無臘上大夫之祝當有臘俎至於儐尸臘為庶羞又不載於俎與此異此下大夫待神餘故祝主人主婦皆有臘體也云其臘主人臂主婦臑祝則骼也與者主人用臂主婦用臑見於下經祝無文而知用骼以其骼無正文故云與以疑之也云此皆於鼎側更載焉者上托時共在一俎以出及下設時主人主婦及祝各異俎又不同時故知更載俎云鼎側則不復升鼎也云不言主婦未聞者下有主婦俎臘臑則主婦用臘可知此經直云祝主人不云主婦未聞其義或轉寫者脫耳尸不至三飯注凡十至五飯釋曰上篇士禮九飯少牢上下大夫同十一飯士大夫既不分命數為尊卑則五等諸侯同十三飯天子十五飯可知主人洗至如儐釋曰自此盡薦脀皆如賔禮論主人獻尸祝及佐食之事此主人獻有五節主人獻尸一也酢主人二也獻祝三也獻上佐食四也獻下佐食五也注肝牢至為㨎釋曰云綏皆當作挼者案經唯有一綏而云皆者鄭并下佐食綏揔破之故云皆也云讀為藏其墮之墮者讀從周禮守祧職云既祭則藏其隋必讀從之者義取隋減之事也主婦至如儐注自尸至上篇釋曰自此盡入于房論主婦亞獻尸及祝并獻二佐食之事此一節之內獻數與主人同唯不受嘏為異云與儐同者經既云如儐而注復云與儐同者為事在上篇而發也主婦至反位釋曰此設籩實繼在少牢室內西南隅隂厭神饌也注棗饋至爵位釋曰案周禮籩人職云饋食之籩棗㮚桃乾䕩榛實羞籩之實糗餌粉餈又加籩之實菱芡㮚脯是鄭據籩人職而言也云雜用之下賔尸也者案上儐尸者䵄蕡白黑糗餌之等朝事之籩羞籩之實各用之而不雜也案上賔尸主婦亞獻尸設籩直有脯修二籩下大夫之禮主婦亞獻有四籩者賔尸之禮主人獻尸主婦設四籩䵄蕡白黑故至主婦獻時直設糗餌與脯修二籩通前四籩六籩此主人初獻如上篇無籩從故至主婦亞獻設四籩猶自少於賔尸兩籩注自主至于賔釋曰上篇主婦伹有獻而巳無籩燔從之事此篇首儐尸主婦亞獻尸乃有籩餌之事其物又異唯糗同耳故云此異于儐也上注云自尸侑不飯告飽至此與儐同者在上篇此注云此異于賔者上注云至此與儐同者皆與儐禮同在上篇故注云至此也此自卒爵下至答拜與儐同在上篇自祝受加于肵以上至主婦反籩儐尸異所得相決鄭所以不在卒爵上注而在尸答拜下注者取終一事故也注主婦至曰酌釋曰案特牲主婦獻尸不夾爵拜上篇上大夫賔尸主婦獻尸夾爵拜此下大夫既不賔尸主婦冝與士妻同今夾爵拜者為不賔尸降崇敬故夾爵拜與上大夫同言降謂降賔尸之禮也注自尸至上篇釋曰經無尸卒爵之文鄭注云尸者以經有卒爵之文多故言尸以別之也注內子至于賔釋曰案特牲主婦設籩者士妻卑也案上尸與主人籩皆主婦設之至此祝不使主婦而使宰夫設籩故云祝賤使官可也案禮記注內子卿妻引春秋趙姬請逆叔隗以為內子證卿妻為內子今此下大夫妻得稱內子者欲見此下大夫妻於祝不薦籩兼見上大夫妻亦不薦籩故變言內子也或可散文下大夫妻亦得為內子也云自宰夫薦至賔羞燔亦異于賔者少牢主婦獻祝亦無籩燔從一事此有籩燔從者亦異于賔也賔長至爵止注尸止至待之釋曰自此盡庶羞在左論賔長獻尸祝佐食并致爵之事此一節之內凡有十爵獻尸一也主婦致爵於主人二也主人酢主婦三也尸作止爵飲訖酢賔長四也賔獻祝五也又獻上佐食六也又獻下佐食七也賔致爵於主人八也又致爵于主婦九也賔受主人酢十也云賔戶西北面答拜者案上少牢正祭賔獻與此篇首賔長獻皆云拜送此特言答拜者下大夫故也言拜送者禮重云答拜者禮輕主婦至設席注拜受至士也釋曰此下大夫夫婦致爵之禮祭統云夫祭有十倫之義七曰見夫婦之别焉又曰尸酢夫人執柄夫人受尸執足夫婦相授受不相襲處酢必易爵彼據夫婦致爵而言又詩既醉序云醉酒飽德謂見十倫之義志意充滿是天子諸侯皆有夫婦致爵之事但少牢上大夫受致不酢下大夫受致又酢不致士受致自致是上大夫尊辟君受致不酢下大夫與士卑不嫌得與人君同夫婦致爵也云拜受乃設席變於士也者案特牲禮未致爵巳設席故云異於士其上大夫正祭未致爵至賔尸尸酢主人設席以有尸賔故設席在前也案周禮司几筵云祀先王昨席亦如之鄭注云謂祭祀及王受酢之席彼受酢時巳設席與大夫禮異也鄭注周禮司几筵又云后諸臣致爵乃設席與此禮同者士卑不嫌多與君同故也注臂左至牲體釋曰知是左臂者右臂尸所用故知左臂也云特牲五體此三者以其牢與臘臂而七者以經云臂脊脅皆牢牢謂羊豕也既羊豕臂脊脅俱有是六也通臘臂而七是以牲體唯有三也云牢臘俱臂亦所謂臘如牲體者臘如牲體特牲記文案彼云臘如牲骨骨即體也故以體言之以其上臘托五枚左肩臂臑肫骼今主人不用肩而用臂者以其羊豕皆用臂故臘亦用臂是以鄭云臘如牲體但此臘臂直一骨無並故須云臘如牲體也主人至爵拜注無從至托也釋曰云無從者變於士也者案特牲主婦致爵於主人肝燔並從此無肝燔從故云變於士也注自酢不更爵殺釋曰此決上主婦受酢時祝易爵洗酌授尸尸以醋主婦今自酢又不更爵故云殺也注作止至於賔釋曰云作止爵乃祭酒亦變於士者特牲賔三獻如初燔從如初爵止無祭酒之文至三獻作止爵尸卒爵亦無祭酒之文知特牲祭酒訖乃止爵者以經云燔從如初乃云爵止鄭注云初亞獻也亞獻時祭酒訖乃始燔從則三獻燔從如初始云爵止明是祭酒既訖乃始止爵今大夫作止爵乃祭酒故云變於士云自爵止至作止爵亦異於賔者此篇首賔尸禮賔長獻尸奠爵又云尸作三獻之爵不解以為與賔同云異者賔尸止爵在致爵後其作之在獻私人後欲神惠之均於庭此止爵在主婦致爵前作之在致爵後欲神惠均於室中與特牲燔從如初爵止同少牢上篇所以不致爵者為賔尸賔尸止爵者欲室中神惠均於庭故止爵也特牲再止爵者一止爵欲神惠均於室中一止爵者順上大夫之禮也注北堂至南上釋曰云東面者變於士妻者案特牲記宗婦北堂東面北上注云宗婦冝統於主婦主婦南面此東面故云變於士妻云內子東面則宗婦南面西上者此無正文鄭以意解之何者宗婦位繼於主婦今主婦准特牲在宗婦位易處則宗婦位亦易處在主婦位南面西上可知云內賔自若東面南上者亦約特牲記文注席北至為下釋曰案特牲宗婦東面北上今主婦在宗婦之位東面鄭以北為下者若宗婦之衆則北為上今主婦特位立則依曲禮席東鄉西鄉以南方為上因於隂陽故北為下注豕折至而五釋曰云豕折骨也者謂不全體就體骨中折之故云折骨云不言所折略之者謂不言所折骨名是略之引特牲主婦觳折者證略而不言骨名其折是觳折也云豕無脊脅下主人者主人於上文有脊脅也云羊豕四體與臘臑而五者上主人牢與臘臂而七此五是其略也注自賔至於賔釋曰異者謂賔獻及二佐食以下至此奠于篚異於少牢賔長獻直及祝不及佐食故鄭彼注云不獻佐食將儐尸禮殺是也主人降至人辨注自乃至庶羞釋曰此一經論主人獻堂下衆賔兄弟下及私人并房中內賔皆與上大夫禮同之事賔長至于篚注致謂至佐食釋曰此經論次賔長獻尸巳下之事以其上賔長上巳獻尸訖明此是次賔長為加爵也云不言如初者爵不止又不及佐食者謂不言同上文云賔長獻于尸如初無湆爵不止注云如初如其獻侑酌致主人受尸酢也無湆爵不止别不如初者此文不與彼同者為經不可如一故鄭注彼此各申經意賔兄至算爵注此亦至此篇釋曰此一經論堂下賔及兄弟行無算爵之事此堂下兄弟及賔行無算爵似上大夫無旅酬故鄭云此亦與儐同者在此篇若此經兼有旅酬鄭不得言與儐同案特牲尸在室內亦不與旅酬之事而堂下賔及兄弟行旅酬又使弟子二人舉觶為無算爵者下大夫雖無儐尸之禮堂下亦與神靈共尊不敢與人君之禮同既與神靈共尊故闕旅酬直行無算爵而巳特牲堂下得獻之後與神別尊故旅酬無算爵並皆行之士賤不嫌與君同故得禮備也利洗至奠之注利獻至於賔釋曰此一經論佐食事尸禮將畢為加爵獻尸及祝之事云利獻不及主人殺也者此對上文賔長為加爵及主人此不及主人是殺也又云此亦異於賔者案上少牢無利獻賔三獻尸即止此篇首儐尸之禮佐食又不與故無佐食獻故云異也釋曰云自主人出至此與賔雜者也者謂有同有不同故上少牢直云祝告曰利成此云祝告于主人曰利成上少牢云祝入尸謖主人降立于阼階東西面此云祝入主人降立于阼階東西面尸謖彼云祝先此云祝前彼云祝命佐食徹肵俎降設于堂下此云祝反復位于室中祝命佐食徹尸俎佐食乃出尸俎于廟門外有司受歸之故云雜云先𧃊徹主人薦俎者變于士者特牲既餕祝命佐食徹阼俎此餕前徹阼薦俎故云變於士引特牲者證徹阼薦俎所置之處也卒𧃊至用席注官徹至作茀釋曰自此下盡篇末論餕訖改饌於西北隅為陽厭之事云官徹饋者司馬司士舉俎者經云官徹則司馬主羊司士主豕明還遣此二人舉俎可知即上經云司馬刲羊司士擊豕是之云宰夫取敦及豆者以其宰夫多主主婦之事此敦及豆本主婦設之今云官徹明非婦人知是宰夫為之也是以上文云宰夫羞房中之羞又上主婦獻祝宰夫薦鄭注云內子不薦籩祝賤使官可也以此言之則宰夫代主婦設籩豆及敦可知云當室之白孝子不知神之所在庶其饗之於此所以為厭飫者此言雜取曽子問郊特牲祭義之文案曽子問說陽厭之事云當室之白尊于東房鄭云得戶明者也郊特牲云索祭祝于祊不知神之所在於彼乎於此乎尚曰求諸逺者與祭義云勿勿乎其欲饗之是鄭所取陽厭及祊祭求神之事云不令婦人改饌敦豆變於始也尚使官也者此決少牢初設饌主婦薦兩豆宗婦一人贊兩豆主婦設一敦宗婦贊三敦是其始時婦人設之今使宰夫徹豆敦者尚使官故也注掃豆至階東釋曰引舊說者案曽子問凡幣帛皮圭為主命埋之階閒此豆閒之祭案舊說埋之西階東以神位在西故近西階是以鄭亦依用也注拜送至賔也釋曰此決賔尸時尸出侑從主人送于廟門之外拜尸不顧拜侑與長賔亦如衆賔從鄭注云從者不拜送也言從者不拜送則此云拜送者拜送長可知不言長者下大夫賤無尊賔故不别其長也注徹祝至之禮釋曰云不使有司者下上大夫之禮者決上大夫祭畢將賔尸有司徹賔尸禮終亦有司徹今婦人徹故云下上大夫之禮也注有司至禮殺釋曰云有司饌之婦人徹之外內相兼禮殺者此徹室中之饌者於上經有司徹饋饌于室中西北隅者今使婦人徹之故云外內相兼外者謂有司官改饌西北隅內者謂今婦人徹饋故云相兼也儀禮疏卷第五十計肆拾柒萬伍阡捌伯肆拾捌字宣德郎守大理寺丞國子監直講賜緋魚袋臣崔偓佺校定通直郎守太子洗馬國子監直講騎都尉杭州監雕印版臣王煥校定諸王府侍講承奉郎守尚書屯田貟外兼國子監直講賜金魚袋臣孫奭校定承奉郎守尚書屯田貟外郎直集賢院騎都尉臣李維校定朝散大夫行尚書職方貟外郎祕閣檢理上柱國臣舒雅校定朝請大夫尚書虞部郎中崇文院檢討閣護軍臣杜校定南宫朝請郎中守大理寺丞臣文再校朝奉郎守國子博士騎都尉臣李慕清再校翰林侍講學士太中大夫守尚書工部侍郎兼國子監祭酒權同句當官院事柱國河閒郡開國侯食邑一千户食實對四伯戶賜紫金魚袋臣邢昺都校大宋景德元年六月日朝散大夫給事中參知政事柱國太原縣開國伯食邑八百戶食實封二伯戶賜紫金魚袋臣王欽若朝散大夫守尚書刑部侍郎參知政事柱國琅琊郡開國侯食邑一千戶食實封四伯戶賜紫金魚袋臣王旦推忠協謀佐理功臣光祿大夫尚書右僕射兼門下侍郎同中書門下平章事監修國史上柱國隴西郡開國公食邑三千八伯户臣李沆推忠協謀翊戴佐理功臣特進守司空兼門下侍郎同中書門下平章事昭文館大學士上柱國東平郡國公食邑五千七百戶臣吕蒙正
