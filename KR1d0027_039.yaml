  text: 儀禮疏卷第四十五
  hash: sha256:a083b6c1bffe6532eb00ea95338d0591a346c6cd114cac2e20ae3748afa2f49e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_039-1a}
body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彥等撰主人至戶內注祝先至南面釋曰自此盡稽首論主人主婦及祝與佐食陳設隂厭之事云主人從西面于戶內注引少牢者證主人戶內西面其時祝北墉下南面之事以其未有祝行事之法直監納祭而巳下文乃云祝在左為孝子釋辭乃有事也注及與至用兔釋曰鼎在門外北上東為右人西為左人右人尊入時在鼎前左人卑入時在鼎後又盡載牲體於俎又設俎于神坐之前主人升乃以東為主今在堂下主人在右故云統於東也云主人與佐食者賔尊不載者以賔主當相對為左右以賔尊不載牲體故使佐食對主人使賔為右人而使執事在左而載也宗人至南面注畢狀至心義釋曰云畢狀如叉者下引舊說有他神物惡桑叉之言故以叉而言云蓋為其似畢星取名焉者案詩云有救天畢載施之行無正文故云蓋以疑之也云主人親舉宗人則執畢導之既錯叉以畢臨匕載備失脫也知義然者以經言宗人執畢先入是導之也又知既錯叉以畢臨匕載備失脫也者以經云當阼階南面明鄉主人執畢臨匕備失脫可知也云今此朼用棘心則畢亦用棘心者案下記云棘心匕刻是也知畢亦棘心者以雜記匕畢同用桑據喪祭今吉祭匕用棘心則畢亦棘心也云舊說云畢以御他神物神物惡桑叉舊說如此又引少牢士虞巳下破舊說之意也云此無叉者乃主人不親舉耳者揔解士虞少牢二禮云少牢大夫祭不親舉者大夫尊主人不親舉云虞喪祭祭也主人未執事者對吉祭主人執事有畢彼無也云祔練祥執事用桑叉者以其虞時主人不執事則祔巳執事執事用桑叉則雜記所云是也云自此純吉用棘心叉者除祥後則禫月及吉祭用棘心也案易震卦彖辭云震來􅊒􅊒笑言啞啞震驚百里不喪匕鬯鄭注云雷發聲於百里古者諸侯象諸侯出教令能警戒國內則守其宗廟社稷為之祭主不亡其匕鬯人君於祭匕牲體薦鬯而巳其餘不親為也若然諸侯親匕牲體大夫不親者辟人君士卑不嫌得與人君同親匕也注贊者至北面釋曰云其錯俎東縮加匕東柄者少牢云俎皆設于鼎西西肆又云匕皆加于鼎東枋則此加匕於鼎東柄可知云既則退而左人北面也知者以其俎從於鼎西其人當北面於其南載之便是以昏禮亦云北面載執而俟是也注肵謂至作密釋曰知肵謂心舌者下記云肵俎心舌皆去本末午割之實於牲鼎載心立舌縮俎是也引郊特牲者見敬有肵俎送于尸前注卒巳至加焉釋曰主人匕牲體宗人以畢助之主人匕事訖加之於鼎則宗人既事亦加於鼎可知注入設至以正釋曰知載人設俎者以其經卒載下即云入設不見別人明是載者設之可知云臘特饌要方也者案經豆在神坐之前豕俎入設於豆東魚俎又次其東若臘俎復在東則饌不得方故臘俎特于俎北取其方故也注宗婦至菜也釋曰案少牢主婦設金敦宗婦贊三敦以其多故使宗婦贊此士祭祀二敦少故不使宗婦贊主婦可親之也若然案少牢佐食贊鉶宗婦不贊鉶此不以佐食決之而并云宗婦者此決有司徹故有司徹云主婦洗于房中出實爵尊南西面拜獻尸尸拜于筵上受主婦西面于主人之席北拜送爵入于房取一羊鉶坐奠于韭菹西主婦贊者執豕鉶以從主婦不興受設于羊鉶之西又下至主婦致爵于主人主婦設二鉶與糗修如尸禮皆是也注酌奠至奠之釋曰引少牢者案少牢祝酌奠遂命佐食佐食啓會乃奠者彼大夫禮與此士禮相變是以與此奠乃啓會異也注稽首至尚饗釋曰引少牢祝祝巳下者欲見迎尸之前釋孝子之辭也祝迎尸于門外注尸自至尸次釋曰自此盡反黍稷于其所論隂厭後迎尸于正祭之事云尸自外來代主人接之者下注云主人不迎尸成尸尊故也云就其次而請不拜不敢與尊者為禮者凡平賔客皆在門西主人出門左西面拜今此經直云迎尸于門外不言祝拜尸答拜是祝出就次尸乃出次迎之而入門是不敢與尊者為禮引周禮者證門外張尸次之事也注主人至為厭釋曰云主人不迎尸成尸尊者案祭統云君迎牲而不迎尸別嫌也尸在廟門外則疑於臣在廟中則全於君君在廟門外疑於君入廟門則全於臣全於子鄭云不迎尸者欲全其尊也尸神象也鬼神之尊在廟中人君之尊出廟門則伸此士禮雖無君道亦尊尸主人不迎迎之尊不成不迎之則成尸之道尊也云尸所祭者之孫也者禮記云孫為王父尸是也云祖之尸則主人乃宗子者以其祭祖兄弟來助祭故知宗子小宗大宗五宗皆然書傳云宗子將有事族人皆入侍也云禰之尸則主人乃父道者禮記祭統云夫祭之道孫為王父尸所使為尸者於祭者子行也父北面而事之所以明子事父之道也此父子之倫也注云祭祖則用孫列皆取於同姓之適孫是其禰之尸則主人乃父道也云事神之禮廟中而已出迎則為厭有出廟門主人有君是是厭臣之義故不迎也注侍盥至門左釋曰引少牢者見上經陳盥在門右今尸入門左尸尊不就盥槃匜巾等鄉門右就尸之義也尸至至人從注延進至人從釋曰云在後詔侑曰延者案士虞禮尸謖祝前鄉尸鄭注云前道也祝道尸必先鄉之為之節彼祝居尸前道之此則在尸後詔之故云延也云禮器所謂詔侑武方者彼注武無也祝詔侑尸無常謂若檀弓子事父母左右就養無方今祝延尸道尸亦無常也引少牢者見祝從尸主人又從祝入之事尸答至如初注饗勸至薦之釋曰云其辭取于士虞記則冝云孝孫某圭為孝薦之饗者但喪祭稱哀吉祭稱孝故士虞記卒哭饗尸辭曰哀子某圭為哀薦之饗此既吉祭冝云孝孫某圭為孝薦之饗以其改哀云孝故曰冝云也引舊說者證圭為潔明之義也祝命至豆閒注命詔至於醢釋曰云挼祭祭神食也者鄉者設饌未迎尸隂厭厭飫神今尸來升席而挼祭祭訖當食神餘引周禮而云墮與挼讀同則二字通用云今文改挼皆為綏不從今文引古文者欲見㨎下有祭無醢故疊之而不從也云㨎醢者染於醢從經為正也注肺祭至享之釋曰知肺祭是刌肺也者下記刌肺三鄭注為尸主人主婦祭明是刌肺非舉肺也注鉶肉至能亨釋曰云鉶肉味之有菜和者此即公食大夫牛藿羊苦豕薇之等是也以其盛之鉶器因號羮為鉶故云肉味有菜和者引曲禮者證鉶羮有五味調和不合絮調之義故告旨若大羮不調以鹽菜無絮調之理也設大羮湆于醢北注大羮至為汁釋曰云醢北者為薦左案公食大夫昏禮大羮湆皆在薦右此在左者神禮變於生人士虞禮大夫羮湆設于鉶南在右與生人同有不忍異於生故也云不和貴其質者案桓二年左氏傳云大羮不和以鹽菜是貴其質也云不為神者隂厭時未設尸來始設為尸故士虞記云無尸則禮及薦饌皆如初不挼祭無大羮湆胾從獻有尸即有大羮湆從獻縱有亦不祭不嚌是不為神為尸非盛者也引士虞禮曰大羮湆自門入者證迎尸後乃從獻來也乃食食舉注舉言至連肉釋曰乃食謂食肺云食舉謂骨體正脊從俎舉鄉口因名體為舉凡牲體或七或二十七皆據骨節而言今言食不可空食骨以體皆連肉也注肵俎至其先釋曰云肵俎主於尸者以其入後乃設之故知主於尸主人親進者敬尸故也前神俎使載者設之者欲得尊賔嘉客以事其先故也注幹長至牲同釋曰云長脅文出下記也云獸臘其體數與牲同知者亦見下記云臘如牲骨是也注庶衆至䋫也釋曰案公食大夫云旁四列西北上膷以東臐膮牛炙炙南醢以西牛胾醢注云先設醢䋫之次也此四豆有醢則不得先設非䋫之次故也又復一醢不得與胾炙相對相對之法炙在南醢在北胾在北醢南如此見得䋫故少牢云韭菹醓醢葵菹螺醢韭菹在南葵菹在北注云葵菹在北䋫又云羞胾兩瓦豆有醢亦用瓦豆設于薦豆之北注云四豆亦䋫羊胾在南豕胾在北此皆有醢亦得䋫者以其四豆胾醢具相對故鄭皆云䋫也注不復至次也釋曰云舉先正脊後肩自上而卻下䋫而前終始之次也者先舉正脊自上也次舉脅即卻也後舉骼即下䋫也終舉肩即前也前者牲體之始後者牲體之終故云終始之次也注佐食至讀然釋曰云俎釋三個為改饌於西北隅遺之所釋者牲臘則正脊一骨長脅一骨及臑也知者案下記云尸俎右肩臂臑肫胳正脊二骨橫脊長脅二骨短脅今以舉正脊一骨長脅一骨及骼脊脅各一骨在前腳三節後腳二節各舉其一訖前腳舉肩訖冝次盛臂後腳舉胳訖冝次盛肫前後各一節以歸脡脊以其次正脊故也前腳唯有臑在并脊脅各一骨為三也注尸授至俎豆釋曰經直云肺脊加於肵俎鄭知尸不自加而授與佐食佐食受而加之者約少牢云上佐食受尸牢肺正脊加于肵鄭注云受者尸授之也是云肺脊初在菹豆者上文云尸實舉于菹豆是也主人至酳尸注酳猶至為酌釋曰自此盡入復位論主人獻尸及祝佐食之事知是獻尸者下有主婦洗爵獻尸并賔長獻尸故知此是主人酳尸也云不用爵者下大夫也者此決少牢云主人降洗爵酳酒乃酳尸用爵不用角也云因父子之道質而用角角加人事略者既辟大夫不用爵次當用觚而用角者因無臣助祭父子相養之道而用角者父子是質角加人事略得用功少故也尸拜至肝從注肝肝至無長釋曰此直言肝從亦當如少牢賔長羞牢肝用俎縮執俎肝亦縮進末鹽在右此亦不言者文不具也注醋報至作酢釋曰云祝酌不洗者尸當酢主人冝親洗爵酌酒不親洗酌尸尊故也授代酌由祝代酌故不洗也注退者至作挼釋曰云挼祭亦使祭尸食也者前祝命尸挼祭祭神食今命主人祭尸食亦如尸祭神食故云亦也云其授祭亦取黍稷肺祭者亦如上佐食取黍稷肺祭授尸尸祭之相似故云亦也佐食至主人注獨用至有焉釋曰案少牢云祝與二佐食皆出盥于洗入二佐食各取黍於一敦上佐食兼受摶之以授尸尸執以命祝卒命祝祝受以東北面于戶西以嘏于主人但少牢不親嘏者大夫尸尊又大夫禮文此親嘏者士尸卑禮質故也云其辭則少牢饋食禮有焉者案少牢云祝以嘏于主人曰皇尸命工祝承致多福無疆于女孝孫來女孝孫使女受祿于天冝稼于田肩壽萬年勿替引之是也云獨用黍者食之主者案上文云爾黍于席上不云爾稷者以稷雖五穀之長不如黍之美故云食之主是以喪大記云君沐粱大夫沐稷士沐粱士喪禮士沐稻諸侯之士鄭注云差率而上天子沐黍是黍為穀之貴也注詩猶至作卦釋曰云挂袪以小指者便卒角也但右手執角左手挂袪以小指不于左手言便卒角者飲酒之時恐其遺落故挂以小指故云便卒角也主人至籩受注變黍至成功釋曰案少牢云主人出宰夫以籩受嗇黍主人嘗之納諸內此大夫尊不似有入房直見大夫出宰夫以籩受此主人寫嗇于房祝以籩受以其士賤故也云變黍言嗇因事託戒欲其重稼嗇者以黍者五穀之名非農力成功之稱故以黍為嗇欲其重稼嗇故少牢鄭注云秋斂曰嗇是用農力之言也注行神至設俎釋曰此汝佐食以佐食接尸故後獻之祝接神先獻之云菹醢皆主婦設之佐食設俎知者前獻尸時菹醢主婦設之亞獻及致爵於主人籩豆亦皆主婦設之則此設菹醢亦主婦可知又知佐食設俎約少牢主人獻祝佐食設俎故此亦佐食設俎可知祝左至復位釋曰云主人答拜受角酌獻佐食者案上獻祝有俎此獻佐食不言俎者上經云執事之俎陳於階閒二列北上鄭注云執事謂有司以佐食亦在有司內者下記云佐食俎觳折脊脅也又下經賔長獻節鄭注云凡獻佐食皆無從人之北西面與內子同賔三至爵止注初亞至待之釋曰自此盡卒復位論賔長獻尸及佐食并主人主婦致爵之事此一科之內乃有十一爵賔獻尸一也主婦致爵于主人二也主人酢主婦三也主人致爵于主婦四也主婦酢主人五也尸舉奠爵酢賔長六也賔長獻祝七也又獻佐食八也賔又致爵于主人九也又致爵于主婦十也賔獻主人酢十一也云初亞獻也者知不初獻者以主婦亞獻丞初獻後賔長又丞亞獻後故知如亞獻不得如初獻也又面位及燔從皆如亞獻也云三獻禮成欲神惠之均於室中是以奠而待之者謂尸得三獻而禮成言其實飲三爵祝與佐食亦得三獻主人主婦各得一酢而已未得獻是神惠未均奠而待之者待主人主婦致爵乃均也案下文衆賔長為加爵如初爵止鄭注云尸止爵者欲神惠之均于在庭止得一獻亦言均則不以爵數為均直據得一獻則為均也注主婦至酌爵釋曰云主婦拜拜於北面也者約有司儐尸於堂主婦致爵于主人主人致爵于主婦北面于阼階上答拜是也注初贊至面也釋曰上主婦亞獻時但云宗婦執兩籩又云祝贊籩祭無豆此云贊豆如初明贊豆之時與贊籩同故得言如初知東面者以主人西面故知也俎入設注佐食設之釋曰知佐食設之者見有司下大夫不儐尸者主婦致爵於主人時佐食設俎彼室內行事與士禮略同故鄭約之知佐食設之也注絶肺至作說釋曰引少儀者彼注云提猶絶也不絶中央少許者引之證離肺長而不絶故須絶之云忖肺不挩手者以不斷絶取祭之不須以手絶之故不挩手也注於席至示均釋曰此決上主人獻尸賔長以肝從主婦獻尸兄弟以燔從今一酌而肝燔從則與尸等故云亦均亦者亦上酒均於堂內注主人至為受釋曰云主人更爵自酢男子不承婦人爵也者案上主婦獻尸尸酢主婦不易爵鄭注云辟內子致爵于主人則易爵也若然案下記設洗篚在洗西實二爵鄭注云二爵者為賔獻爵止主婦當致也此賔長所獻爵尸奠之未舉其篚唯有一爵得云易者上主婦亞獻洗爵洗爵于房中則房中有爵又主婦獻祝及佐食訖以爵入于房後主婦致爵于主人還是房內爵後主人致爵于主婦者是下篚之爵主婦飲訖實于房中之篚主人更取房內之爵以酌酢酢訖奠于下篚云主人更爵者謂酌酢爵與房內爵相更鄭注下記云主婦當致者謂主人致爵於主婦則用下篚內爵也注洗乃至為受釋曰此決上文賔獻尸獻祝及佐食皆不洗今致于主人洗故決之也案下篇不儐尸洗爵致于主人注云以承佐食賤新之此云為異事新之注不同者但為異事異事則是承賤承賤後則事異言雖不同理則一也云燔從皆如初者如亞獻及主人主婦致爵者謂如上主婦亞獻尸及祝皆燔從此言皆燔從如初故云如亞獻及主人主婦致爵雖云如初則無肝從故經釋云燔從皆如初云凡獻佐食皆無從者謂主人主婦及賔長獻佐食皆無從故云凡鄭言此者以經獻祝及佐食洗爵致于主人主婦燔從皆如初在獻佐食下嫌獻佐食亦然有燔從故鄭辨之若然佐食得獻與祝得獻同亦得如初但無從為異云其薦俎獻兄弟以齒設之者以上佐食得獻時不見有設薦俎之文下記云佐食於旅也齒於兄弟故佐食薦俎亦與兄弟同時設之也主人至初洗注拜賔至拜者釋曰自此盡實爵于篚論獻賔及衆賔之事也賔辭至答拜注就賔至無洗釋曰云就賔拜者此禮不主於尊也者案鄉飲酒鄉射賔主獻酢各於其階至酬乃同階此因祭如初賔非為尊之所尊者謂尸也又賔是士家有司卑不得專階故就之使不得專階也對鄉飲酒鄉射得專階也云主人在右統於其位者以其賔得在西階上北面以東為右主人位在阼階故云統于其位鄭言此者主人就西階異於飲酒主人在右則與飲酒禮同以言主人常居右也薦脯醢設折俎注凡節至設之釋曰案下記云賔骼鄭云骼左骼也賔俎全體尊賔也折骨而曰折俎明凡節解牲體皆曰折升于俎故名折俎與臑折同名其折義則異彼折骨云不言其體略云折俎非貴體也者案下記云賔骼骼是牲體此經云折俎者亦用骼非貴體故略云折俎若然經尸俎祝佐食及主人主婦俎體皆不言之而鄭注獨云賔俎不言體者尸祝等經不言牲體亦不言折以其體貴故也此賔俎不言牲體而言折明非貴體也云上賔骼衆賔儀者案下記唯云賔骼其衆賔巳下皆殽脀不言儀者鄭見有司徹主人獻賔儀司士設俎羊骼一又云衆賔長拜受爵其脀體儀也注云儀者尊體盡儀度餘骨可用而用之尊者用尊體卑者用卑體而巳是也云公有司設之者此即有司徹云司士設俎羊骼一衆賔脀體儀是也此下文云公有司在門西則此設俎者也注主人至其意釋曰云賔不敢敵主人主人達其意者以其實是士之有司之中以卑不敢與主人為敵酢之是以主人酌以自酢達賔意故也若鄉飲酒鄉射賔皆親酢主人以其賔尊行敵禮故也注位如至之與釋曰以賔位在西階下東面今受獻於西階上經云執祭以降西面奠于其位又言位如初明復西階下東面位可知也尊兩至如之注為酬至在下釋曰自此盡揖復位論堂下設尊酬賔之事云行神惠不酌上尊卑異之者決上文獻賔及兄弟皆酌上尊者獻是嚴正故得與神靈共尊至此旅酬禮褻故不敢酌上尊案司尊彞職四時之祭云皆有罍諸臣之所酢少牢上下大夫堂下皆無尊者士卑得與人君同大夫尊辟人君故也云兩壷皆酒優之者設尊之法皆有玄酒今兩壷皆酒無玄酒優之也案玉藻云唯饗野人皆酒鄭云飲賤者不備禮與此注無玄酒為優之異者此士之祭禮欲得尊賔嘉客以事其先非賤者故以皆酒為優之彼饗野人野人是賤者故以不備禮解之也云先尊東方示惠由近者東方主人位西方賔位今先設東方乃設西方者見酒由主人來故云示惠由近為始也引禮運者彼注澄為沈齊酒是三酒酒所以飲諸臣證此壷尊亦飲在下者也注西面至東北釋曰以經云主人對卒洗酌西面賔北面拜主人西面授賔北面答拜明主人之得南過於賔故鄭以義言之云立於西階之前賔所答拜之東北也注奠酬至飲酒釋曰以其神惠右不舉生人飲酒左不舉今行神惠不可同於飲酒故奠於左與生人相變故有司徹云二人舉觶酬尸侑侑奠觶于右鄭注云奠于右者不舉也神惠右不舉變於飲酒是也此酬奠於薦左下文賔舉為旅酬以其神惠故也言不可同飲酒者謂不可同於鄉飲酒故鄉飲酒記云將舉者於右奠者於左其義與此别此下文奠觶於薦南明將舉以初在北飲酒將舉奠於薦南便其復舉賔坐至復位注還東至將舉釋曰云揖復位者則初奠時少南於位可知云還東面者則初賔坐取觶薦東西面可知故鄭注云還東面就其位薦西也主人至賔儀注酬賔至之與釋曰自此盡如衆賔儀論主人獻長兄弟及衆兄弟之事云酬賔乃獻長兄弟者獻之禮成於酬者以其獻賔之禮以酬副之乃禮成故冠禮云乃禮賔以一獻之禮鄭注云獻酢酬賔主人各兩爵而禮成又鄉飲酒獻及酬賔訖乃獻介又此文獻賔即酬賔乃獻兄弟故鄭注獻之禮成於酬也云亦有薦脀設于位者以經云獻長兄弟于阼階上如賔儀則長兄弟初受獻于阼階上時亦薦脯醢設折俎於阼階上祭訖乃執以降設於下位皆當如賔儀鄭下注云設薦俎於其位者據執祭以降及其位而言也言亦者亦賔鄭必知有薦俎者見於下記云長兄弟及宗人折是也云私人為之與者私人者即私臣下記云私臣門東北面西上是也以賔薦公有司設之則兄弟薦俎私人可知以無正文故言與以疑之也注獻卑至明矣釋曰云此言如衆賔儀則如獻衆賔洗明矣者以其上獻衆賔時雖不言洗此云洗獻衆兄弟如衆賔儀明獻衆賔洗可知不言之者舉下以明上省文之義故也洗獻至之儀注內兄至受爵釋曰自此盡入復位論主人獻姑姊妹及宗婦之事云內賔宗婦也者此揔云內兄弟下記云內賔宗婦案彼注云內賔姑姊妹宗婦族人之婦若然兄弟者服名故號婦人為兄弟也云其位在房中之尊北者案下記云尊兩壷于房中西墉下南上內賔立于其北東面南上宗婦北堂東面北上是也云不殊其長略婦人者決上文獻賔於西階上獻兄弟於阼階上皆殊其長此不殊故云略之引有司徹者欲見此內賔受獻時亦南面拜受爵故下注云內賔之長亦南面答拜言亦者亦前受獻時前雖無文約有司徹內賔之長亦南面答拜注爵辨至答拜釋曰云爵辨乃自酢以初不殊其長也者對上賔與長兄弟不得獻衆賔衆兄弟遍主人先自酢也云內賔之長亦南面答拜者獻時不殊其長酢時猶如賔及兄弟殊其長與男子同男子婦人衆賔以下皆無酢也長兄至無從注大夫至主婦釋曰此一經論士三獻之外為加獻尸之事云如初儀者如賔長三獻之儀但賔長獻十一爵此兄弟之長加獻則降唯有六爵以其闕主人主婦致爵并酢四爵及獻佐食五唯有六在者洗觚為加獻一也尸酢長兄弟二也獻祝三也致爵於主人四也致爵於主婦五也受主人酢六也云大夫士三獻而禮成者天子大祫十有二獻四時與禘唯有九獻上公亦九獻侯伯七獻子男五獻卿大夫士略同三獻而祭禮成也是以多之者為加若生人飲酒禮卿大夫三獻士唯一獻而巳祭禮士與大夫同者攝盛葬奠亦與大夫同少牢五鼎又乘車建旜亦與卿大夫同也衆賔至爵止注尸爵至在庭釋曰庭賔及兄弟雖得一獻未得旅酬其巳得三獻又别受加爵故停之使庭行旅酬是以云尸爵止者欲神惠之均於在庭也儀禮疏卷第四十五
