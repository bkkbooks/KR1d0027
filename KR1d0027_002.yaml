body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彥等撰陳服至北上釋曰自此至東面論陳設衣服器物之等以待冠者喪大記與士喪禮服或西領或南領此東領者此嘉禮異於凶禮故士之冠特先用卑服北上便也爵辨至韎韐釋曰此所陳從北而南故先陳爵辨服注此與至作熏釋曰士禮玄端自祭以爵辨服助君祭故云與君祭之服也云爵辨者冕之次者凡冕以木為體長尺六寸廣八寸績麻三十升布上以玄下以纁前後有旒其爵辨制大同唯無旒又為爵色為異又名冕者俯也低前一寸二分故得冕稱其爵辨則前後平故不得冕名以其尊卑次於冕故云爵辨冕之次也云其色赤而微黑如爵頭然或謂之緅者七入為緇若以纁入黑則為紺以紺入黑則為緅是三入赤再入黑故云其色赤而微黑也云如爵頭然者以目驗爵頭赤多黑少故以爵頭為喻也以緅再入黑汁與爵同故取鍾氏緅色解之故鄭注鍾氏云今禮俗文作爵言如爵頭色也玄此言亦者對文為赤若將緅比纁則又黑多矣故淮南子云以涅染紺則黑於涅況更一入黑為緅乎故巾車云雀飾鄭注云雀黑多赤少之色是也云其布三十升者取冠倍之義是以喪服衰三升冠六升朝服十五升故冕三十升也云纁裳淺絳裳者絳則一染至三染同云淺絳詩云我朱孔陽毛傳云朱深纁也故從一染至三染皆謂之淺絳也云朱則四入與者爾雅及鍾氏皆無四入之文經有朱色故鄭約之若以纁入黑則為紺若以纁入赤則為朱無正文故云與以疑之也然上注以解玄緇故引鍾氏染黑法此注解纁故引爾雅染赤法也云純衣絲衣也者案鄭解純字或為絲或為色兩解不同者皆望經為注若色理明者以絲解之若絲理明者以色解之此經玄衣與纁裳相對上玄下纁色理自明絲理不明則以絲解之昏禮女次純衣注云絲衣以下文有女從者畢袗玄色理自明則亦絲理不明故亦以絲理解之周禮媒氏云純帛無過五兩注云純實緇字也古緇以才為聲納幣用緇婦人隂也以經云純帛絲理自明故為色解之祭統云蠶於北郊以共純服絲理自明故鄭亦以色解也論語云麻冕禮也今也純儉以純對麻絲理自明故鄭亦以色解之是況有不同之事但古緇䊷二字並行若據布為色者則為緇字若據帛為色者則為䊷字但緇布之緇多在本字不誤䊷帛之䊷則多誤為純云餘衣皆用布者此據朝服皮辨服玄端服及深衣長衣之等皆以布為之是以雜記云朝服十五升布玄端亦服之類則皮辨亦是天子朝服深衣或名麻衣故知用布也云唯冕與爵辨服用絲耳者祭統云王后蠶於北郊以共純服爵辨服是冕服之次故知亦用絲也云先裳後衣者欲令下近緇明衣與帶同色者衣在上冝與冠相近應先言衣今退衣在裳下者若衣與冠同色者先言衣後言裳今爵辨與衣異故退純衣於下使與帶同色也云韎韐緼韍也者此經云韎韐二者一物故鄭合為一物解之也云士緼韍而幽衡者玉藻文言幽衡者同繫於革帶故連引之也云合韋為之者鄭即因解名緼韍之字言韐者韋旁著合謂合韋為之故名韐也云士染以茅搜因以名焉者案爾雅云茹藘茅搜孫氏注一名蒨可以染絳若然則一草有此三名矣但周公時名蒨草為韎草以此韎染韋合之為韐因名韍為韎韐也云韍之制似韠者案上注巳釋韠制其韍之制亦如之但有飾無飾為異耳祭服謂之韍其他服謂之韠易困卦九二困於酒食朱韍方來利用享祀是祭服之韍也又案明堂位云有虞氏服韍夏后氏山殷火周龍章鄭云後王彌飾天子備焉諸侯火而下卿大夫山士韎韋而已是士無飾則不得單名韍一名韎韐一名緼韍而已是韍有與緼異以制同飾異故鄭云韍之制似韠也但染韋為韍之體天子與其臣及諸侯與其臣有異詩云朱芾斯黃鄭云天子純朱諸侯黃朱詩又云赤芾在股是諸侯用黃朱玉藻再命三命皆云赤韍是諸侯之臣亦用赤韍易困卦九二云困於酒食朱韍方來利用享祀鄭注云二據初辰在未未為土此二為大夫有地之象未上值天廚酒食象困於酒食者采地薄不足已用也二與日為體離為鎮霍爻四為諸侯有明德受命當王者離為火火色赤四爻辰在午時離氣赤又朱是也文王將王天子制用朱韍故易乾鑿度云孔子曰天子三公諸侯同色困卦困于酒食朱韍方來又云天子三公大夫不朱韍諸侯亦同色者其染之法同以淺絳為名是天子與其臣純朱諸侯與其臣黃朱為異也云冠辨不與衣陳而言於上以冠名服耳者案此文上下陳服則於房緇布冠及皮辨在堂下是冠辨不與服同陳今以辨在服上井言之者以冠辨表明其服耳不謂同陳之也云今文纁皆作熏者纁是色當從糸旁為之故疊今文不從熏從經文古纁也皮辨至素韠釋曰此皮辨服卑於爵辨故陳之次在爵辨之南上爵辨服下玄端服皆言衣此獨不言衣者以其上爵辨服與爵辨異故言衣下玄端服但冠時用緇布冠不用玄冠既不言冠故言衣也今此皮辨之服用白布衣與冠同色故不言衣也注此與至象焉釋曰案玉藻云諸侯皮辨聽朔於大廟又案鄉黨說孔子之服云素衣麑裘鄭云視朔之服視朔之時君臣同服也云皮辨者以白鹿皮為冠象上古也者謂三皇時冒覆頭句頷繞項至黃帝則有冕故丗本云黃帝作旒冕禮運云先王未有宫室又云食草木之實鳥獸之肉未有麻絲衣其羽皮鄭云此上古之時則此象上古謂象三皇時以五帝為大古以三皇為上古也若然黃帝雖有絲麻布帛皮辨至三王不變是以下記云三王共皮辨鄭注云質不變鄭注郊特牲云所不易於先代故孝經緯云百王同之不改易也案禮圖仍以白鹿皮為冠故云以白鹿皮為冠象上古也云積猶辟也以素為裳辟蹙其要中者經典云素者有三義若以衣裳言素者謂白繒也即此人之等是也畫繢言素者謂白色即論語云繢事後素之等是也器物無飾亦曰素則檀弓云奠以素器之等是也是以鄭云以素為裳辟蹙其要中也知皮辨之衣亦用十五升布者雜記云朝服十五升此皮辨亦天子之朝服故亦十五升布也然喪服注云祭服朝服辟積無數則祭服皮辨皆辟積無數餘不云者舉皮辨可知不並言也唯喪服裳幅三袧有數耳云其色象焉者謂象皮辨之色用白布也以此言之論語注云素用繒者彼上服裼衣用素也玄端至爵韠釋曰此玄端服服之下故後陳於皮辨之南陳三等裳者凡諸侯之下皆有二十七士公侯伯之士一命子男之士不命不同一命不命皆分為三等故服分為三等之裳以當之上下經三等之服同用緇帶者以其士唯有一幅裨之帶故三服共用之大帶所以束衣革帶所以珮韠及珮玉之等不言革者舉韠有革帶可知故略不言耳三裳之下云可也者欲見三等之士各有所當當者即服之故言可以許之也注此莫至爵韋釋曰云此莫夕於朝之服者當是莫夕於君之朝服也案玉藻云君朝服以日視朝於內朝夕深衣祭牢肉是君朝服朝服夕服深衣矣下又云朝玄端夕深衣朝時不服與君不同故鄭注云謂大夫士也則彼朝玄端夕深衣是大夫士家私朝也若然大夫士既服玄端深衣以聽私朝矣此服注云莫夕於朝之服是士向莫之時夕君之服必以莫為夕者朝禮備夕禮簡故以夕言之也若卿大夫莫夕於君當亦朝服矣案春秋左氏傳成十二年晉郤至謂子反曰百官承事朝而不夕此云莫夕者無事則無夕法若夕有事須見君則夕故昭十二年子革云夕哀十四年子我亦云夕者皆是有事見君非常朝夕之事也云玄端即朝服之衣易其裳耳者上云玄冠朝服緇帶素韠此玄端亦緇帶彼云朝服即此玄端也但朝服亦得名端故論語云端章甫鄭云端諸侯視朝之服耳皆以十五升布為緇色正幅為之同名也云易其裳耳者彼朝服素韠韠同裳色則裳亦素此既易其裳以三等裳同爵韠則亦易之矣不言者朝服言素韠不言裳故須言易彼言素韠此云爵韠於文自明故不須言易也云上士玄裳中士黃裳下士雜裳者此無正文直以諸侯之士皆有三等之裳政還以三等之士記之但玄是天色黃是地色天尊而地卑故上士服玄中士服黃下士當雜裳雜裳者還用此玄黃但前陽後隂故知前玄後黃也云易曰者是文言文引之者證此裳等是天地二色為之云士皆爵韋為韠其爵同者三裳同云爵韠故知三等之士同用爵韋為韠也其爵韋者所引玉藻文是也云不以玄冠名服者是為緇布冠陳之者今不以玄冠表此服者此為冠時緇布冠陳之冠既不用玄冠故不言也云玉藻者案彼注云此玄端服之韠也云韠者與下君大夫士為揔目韋者又揔三者用韋為之言君朱大夫素士爵者韠之韋色也云君朱者見五等諸侯則天子亦朱矣韠同裳色則天子諸侯朱裳士言爵則此經爵韠亦一也以其裳有三等爵亦雜色故同爵韠若然大夫素裳則與朝服不異者禮窮則同也緇布至同篋注缺讀至曰篋釋曰云缺讀如有頍者辨之頍者讀從頍辨詩義取在首頍者辨貌之意也云緇布冠無笄者案經皮辨爵辨言笄緇布冠不言笄故云無笄也云著頍圍髮際者無正文約漢時卷幘亦圍髮際故知也云結項者此亦無正文以經云頍明於項上結之也云隅為四綴以固冠也者此亦無正文以義言之既武以下別有頍項明於首四隅為綴上綴於武然後頍項得安穩也云項中有􅕒亦由固頍為之耳者此亦無正文以義言之頍之兩頭皆為􅕒別以繩穿􅕒中結之然後頍得牢固故云亦由固頍為之也云今之未冠笄者著卷幘頍象之所生者此舉漢法以況義耳漢時男女未冠笄者首著卷幘之狀雖不智知既言頍圍髮際故以冠之明漢時卷幘亦以布帛之等圍繞髮際為之矣云頍象之所生者漢時卷幘是頍之遺象所生至漢時故云頍象之所生也云滕薛名蔮為頍者此亦舉漢時事以況之漢時滕薛二國云蔮蔮卷幘之類亦遺象故為況也云纚今之幘梁者亦舉漢法為況耳幘梁之狀鄭目驗而知至今久逺亦未審也云纚一幅長六尺足以韜髮而結之矣者人之長者不過六尺纚六尺故云足以韜髮既云韜髮乃云結之則韜訖乃為紒矣云有笄者即經云皮辨及爵辨皆云笄者是有笄也云屈組為紘者經緇組紘纁邊是為有笄者而設言屈組謂以一條組於左笄上繫定繞頥下右相向上仰屬於笄屈繫之有餘因垂為飾也云無笄者纓而結其絛者無笄即經緇布冠是也則以二條組兩相屬於頍故經云組纓屬于頍也既屬訖則所垂絛於頥下結之故云纓而結其絛也云纁邊組側赤也者纁是三入之赤色又云邊則於邊側赤也若然以緇為中以纁為邊側而織之也云同篋謂此上凡六物者緇布至屬于頍共為一物纚長六尺二物皮辨笄三物爵辨笄四物其緇組紘纁邊皮辨爵辨各有一則為二物通前四為六物云隋方曰篋者爾雅無文此對笥方而不隋也隋謂狹而長也案周禮辨師云掌五冕而云玉笄朱紘則天子以玉為笄以朱為紘又案祭義云天子冕而朱紘諸侯冕而青紘諸侯之笄亦當用玉矣又案辨師韋辨與皮辨同科皮辨有笄則二者亦有笄矣又為笄者屬纓不見有緌則六冕無緌矣然士緇布冠無緌故下記云孔子曰其緌也吾未之聞也若諸侯亦以緇布冠為始冠之冠則有緌故玉藻云緇布冠繢緌諸侯之冠也鄭注云尊者飾其大夫紘案禮器云管仲鏤簋朱紘鄭注云大夫士當緇組纁邊是也其笄亦當用象耳櫛實于簞注簞笥也釋曰鄭注曲禮圎曰簞方曰笥笥與簞方圎有異而云簞笥共為一物者鄭舉其類注論語亦然蒲筵二在南注筵席也釋曰筵二者一為冠子即下云筵于東序少北是也一為醴子即下云筵于戶西南面是也云在南者最在南頭對下文側尊一甒醴在服北也鄭注云筵席也者鄭注周禮司几筵云敷陳曰筵藉之曰席然其散言之筵席通矣前敷在地者皆言藉取相承之義是以諸席在地者多言筵也側尊至南上注側猶至作廡釋曰云側猶特也無偶曰側置酒曰尊側者無玄酒者凡禮之通例稱側有二一者無偶特一為側則此文側是也又昏禮云側尊甒醴于房中亦是無玄酒曰側至於昏禮合升側載聘禮云側襲士虞禮云側尊此皆是無偶為側之類也一者聘禮云側受几者側是旁側之義也云服北者纁裳北也者此上先陳爵辨服之時纁裳最在北向南陳之此云服北明在纁裳北可知也云篚竹器如笭者其字皆竹下為之故以竹器言之如笭者亦舉漢法為況也云勺尊升所以㪺酒也者案少牢云罍水有枓與此勺為一物故云尊升對彼是罍枓所以㪺水則此為尊枓㪺酒者也云爵三升曰觶者案韓詩外傳云一升曰爵二升曰觚三升曰觶四升曰角五升曰散相對爵觶有異散文則通皆曰爵故鄭以爵名觶也云柶狀如匕以角為之者欲滑也者對士喪禮用木柶者喪禮反吉也云南上者篚次尊籩豆次篚知然者以經云尊在服北南上則是從南北向陳之以尊為貴次云篚後云籩豆故知次第然也云古文甒作廡者此甒為酒器廡是夏屋兩下故不從古文也爵辨至東面釋曰此一節論使有司三人各執其一豫在階以待冠事賔未入南面以向賔在堂亦以向賔言升則東面據終言之也注爵辨至作襜釋曰云爵辨者制如冕而黑色但無繅耳者巳於上解訖今復言之者上文直舉冠以表服其冠實不陳故略言其冠至此專為冠言之是以注并引皮辨以下之事案辨師言冕有五采繅玉皮辨有五采玉璂象邸玉笄下云諸侯及孤卿大夫之冕韋辨皮辨辨絰各以其等為之鄭注云各以其等繅斿玉璂如其命數也但上文巳言上公之法故此諸侯唯據侯伯子男是以鄭云冕則侯伯繅七就用玉九十八子男繅五就用玉五十繅玉皆三采孤繅四就用玉三十二三命之卿繅三就用玉十八再命之大夫繅再就用玉八藻玉皆朱緑韋辨皮辨則侯伯璂飾七子男璂飾五玉亦三采孤則璂飾四三命之卿璂飾三再命之大夫璂飾二玉亦二采辨絰之辨其辟積如冕繅之就然庶人弔者素委貌一命之大夫冕而無斿士變冕為爵辨其韋辨皮辨之㑹無結飾辨絰之辨不辟積彼經文具言之今此注略引以證士皮辨無玉以象為飾之意不取於韋辨辨絰及依命數之事故不具引之云緇布冠今小吏冠其遺象也者但緇布冠士為初加之冠冠訖則弊之不用庶人則常著之故詩云臺笠緇撮是庶人以布冠常服者以漢之小吏亦常服之故舉為況云匴竹器名今之冠箱也者此亦舉漢法為況云執之者有司也者則上云有司如主人服有司不主一事故知此亦有司也云坫在堂角者但坫有二文一者謂若明堂位云崇坫亢圭及論語云兩君之好有反坫之等在廟中有之以亢反爵之屬此篇之內言坫者皆據堂上角為名故云堂角云古文匴為纂坫作檐者皆從經今文故疊古文也主人至西面釋曰上文巳陳衣冠器物自此巳下至外門外論賔主兄弟等著服及位處也云玄端爵韠者主人之服與上所陳子加冠玄端服亦一也云立於阼階下者時欲與賔行禮之事也云直東序者直當也謂當堂上東序牆也注玄端至之序釋曰案特牲士禮祭服用玄端此亦士之加冠在廟故與祭同服故云士入廟之服也云東西牆謂之序者爾雅釋宫文兄弟至北上釋曰此論兄弟來觀禮之服也注兄弟至均也釋曰云兄弟主人親戚也者既云兄弟故是親戚云袗同也玄者玄衣玄裳也緇帶韠者以其同玄故知上下皆玄云緇帶韠者緇亦玄之類因士有緇帶故韠亦言緇實亦玄也云位在洗東退於主人者主人當序南西面洗當榮兄弟又在洗東故云退於主人也云不爵韠者降於主人也者爵辨同色主人尊故也兄弟用緇韠不同爵韠兄弟卑故云降於主人也擯者至東孰釋曰擯者不言如主人服別言玄端則與主人不同可知主人與兄弟不同故特言玄端與下贊者玄端從之同言玄則此擯者是主人之屬中士若下士也故直舉玄端不言裳也注東孰至北面釋曰知者擯者是主人擯相事在門內故知在門內東堂負之北面向主人也將冠至南面注采衣至為結釋曰將冠者即童子二十之人也以其冠事未至故言將冠者也云緇布衣錦緣者以其童子不帛襦袴不衣裘裳故云緇布衣以錦為緇布衣之緣也云錦紳者以錦為大帶也云并紐者亦以錦為紐紳之垂也云錦束髮者以錦為總云皆朱錦也者童子之錦皆朱錦也云紒結髮者則詩云總角丱兮是也以童子尚華飾故衣此也賔如至之外注外門大門外釋曰云賔如主人服者以其賔與主人尊卑同故得如之贊者皆降主人一等其衣冠雖同其裳則異故不得如主人服故別玄端也若然此冠兄弟及賔贊皆得玄端特牲主人與尸祝佐食玄端自餘皆朝服者彼助祭在廟緣孝子之心欲得尊嘉賔以事其祖禰故朝服與主異也擯者告注告者出請入告釋曰出請入告者告主人也主人至答拜注左東至為右釋曰出以東為左入以東為右據主人在西出則以西為右入則以西為左也主人至先入注贊者至隨賔釋曰云贊者賤揖之而已者正謂贊者降於主人與賔一等為賤也云又與賔揖者對前為賔拜訖今又揖者為主人將先入故又與賔揖乃入也云贊者隨賔者後不見更與贊者為禮故知隨賔入也每曲揖注周左至又揖釋曰周左宗廟者祭義與小宗伯俱有此文對殷右宗廟也言此皆欲見入大門東向入廟云入外門將東曲揖者主人在南賔在北俱東向是一曲故一揖也至廟南主人在東北面賔在西北面是曲為子揖故云直廟將北曲又揖也通下將入廟又揖三也至于至三讓注入門至碑揖釋曰經直云入門揖鄭知此為三揖者以上云每曲揖據入門東行時此入廟門三揖是據主人將右欲背客冝揖將北曲與客相見又揖云當碑揖者碑是庭中之大節又冝揖是知三揖據此西言也案昏禮注入三揖者至內霤將曲揖既曲北面揖當碑揖及聘禮鄉飮酒入三揖注雖不同皆據此三節為三揖義不異也主人至東面注主人至相鄉釋曰此文主人與賔立相鄉位定將行冠禮者也主人升堂不拜至者冠子為賔客故異於鄉飲酒之等也贊者至南上注盥於至作浣釋曰此賔者之贊冠者不在堂升即位於房中與主人贊者並立者以其與主人贊者俱是執勞役之事故先入房並立待事故鄭云近事也云盥於洗西由賔階升也者贊者盥於洗西無正文案鄉飲酒主人在洗北南面賔在洗南北面如此相鄉又主人從內賔從外來之便贊者亦從之又卑不可與賔並明在洗西東面及向賔階便知在洗西也云由賔階升者以與主人贊者在房並立恐由阼階故明之同於賔客也云南上尊於主人之贊者以其賔主贊者俱降一等兩贊尊卑同而云尊者直以主人尊敬賔之贊故云尊於主人之贊又知與主人贊並立者以贊冠一人而已而云南上明與主人為序也主人至西面注主人至主人釋曰云主人之贊者其屬中士若下士者以主人上士為正故云其屬中士若主人是中士贊是其屬下士為之賔與贊冠者同云筵布席也者謂布冠者席也云東序主人位也者引冠義云適子冠於阼為證是也將冠至南面注南面至賔命釋曰知在房外之西不在東者以房外之東南當阼階是知房外者皆在房外之西故昏禮女出于母左母在房外之西故得出時在母左也云待賔命者以其下文有賔揖將冠則賔有命也贊者至南端注贊者至為節釋曰前頍項已下六物同一篋陳於房今將用之故贊冠者取置于將冠之席南擬用若然六者俱用不言纓紘等四物大略其實皆有可知不言櫛盛於簞今亦併簞將來置於席南端也服不將來置於席南者皆加冠訖冝房中隱處加服訖乃見容體也知贊者是其賔之贊冠者也者以其贊冠者主為冠事而來故知取笄纚是賔之贊冠者若非賔之贊者則云主人以别之故上云主人之贊者是也賔揖至設纚釋曰此二者勞役之事故贊者為之也賔降至人對釋曰云辭對之辭未聞者上筮賔宿賔之時雖不言其辭下皆陳其辭此賔主之辭下皆不言故云未聞也賔盥至初位釋曰云主人升復初位者謂初升序端也注古文一皆作一釋曰一一得通用雖疊古文不破之也賔筵至授賔注正纚至冠也釋曰云正纚者將加冠冝親之者以其贊者前已設纚訖今賔復出正之者雖舊設巳正以親加冠故纚亦冝親之也云下一等升一等則中等相授者案匠人天子之堂九尺賈馬以為傍九等為階則諸侯堂冝七尺則七等階大夫堂冝五尺則五等階士冝三尺則三等階故鄭以中等解之也知冠是緇布冠者以下文有皮辨爵辨故知此是緇布冠也賔右至者卒注進容至纓也釋曰知進容者行翔而前鶬焉者曲禮云堂上不趨室中不翔則堂上固得翔矣又云大夫濟濟士蹌蹌注云皆行容止之貌此進容是士故知進容謂行翔而前鶬焉云至則立祝者以經祝下乃云坐如初故祝時立可知云坐如初坐筵前者上正纚時筵前坐是初坐也云卒謂設缺項結纓也者下文皮辨贊者卒紘此謂緇布冠無笄紘直頍項青組纓屬於頍故卒者終頍項與結纓也若然經云右手執項謂冠後為項非頍項其下皮辨爵辨無頍項皆云執項故知非頍項也冠者至南面注復出至容體釋曰言復者對前出房故云復前出為待賔命此出為觀衆以容體也案郊特牲論加冠之事云加有成也故此鄭云一加禮成也云觀衆以容體者以其既去緇布衣錦緣童子服著此玄端成人之服使衆觀知故云觀衆以容體也賔揖至卒紘注如初至屬之釋曰此當第二加皮辨之節云即筵坐櫛者坐訖當脫緇布冠乃更櫛也云設笄者凡諸設笄有二種一是紒內安髮之笄一是皮辨爵辨及六冕固冠之笄今此櫛訖未加冠即言設笄者冝是紒內安髮之笄也若安髮之笄則緇布冠亦冝有之前櫛訖不言設笄者以其固冠之笄緇布冠無笄而皮辨爵辨有笄上文已陳訖今若緇布冠亦言設笄即與皮辨爵辨相亂故緇布冠不言設笄其實亦有也若然緇布冠不言設笄而言設纚皮辨冠言設笄不言設纚互見為義明皆有也其於固冠之笄則於賔加辨之時自設之可知云如初為不見者言也者上加緇布冠時有賔降主人降賔辭主人對賔盥卒一揖一讓升主人升復初位賔筵前坐之等相次此皆不見故設經省文如之而已故云為不見者言也云卒紘謂繫屬之者即上注云有笄者屈組以為紘仰屬之左相繫定右相􅕒繫擬解時易為繫屬之也興賔至南面釋曰興謂冠者加皮辨訖起待賔揖之也云適房服素積素韠者上陳服皮辨云緇帶素韠此不言緇帶者上唯有一帶不言可知故不言也注容者至益繁釋曰此對上加緇布冠時直言出房南面不言容此則言容以再加彌成其儀益繁故言容其實彼出亦是容故鄭注云觀衆以容體也賔降至之儀注降三至容出釋曰云降三等下至地者據士而言云他謂卒紘容出者以其自餘皆緇布冠見訖皮辨如之而以至卒紘容出唯皮辨有之故知他謂此二者也徹皮至于房注徹者至為之釋曰冠即緇布冠也不言緇布冠者可知故也皮辨具言者以有爵辨之嫌然不言爵辨者著之以受醴至見母兄弟姑姊訖乃易服故也云徹者贊冠者主人之贊者為之者以其贊冠者奠櫛主人之贊者設筵故知還遣之也筵于戶西南面注筵主至戶西釋曰知主人之贊者設筵者以上文筵於東序已遣主人之贊故知此亦主人之贊者也云戶西室戶西者以下記醮於客位在戶西醮醴同處故知戶西也贊者至面葉注洗盥至為擖釋曰云洗盥而洗爵者凡洗爵者必先盥盥有不洗爵者此經直云洗明盥手乃洗爵故鄭云盥而洗爵引昏禮房中之洗至北面盥者證房中有洗之事若然前設洗于庭者不為醴以房中有洗醴尊也云側酌者言無為之薦者謂無人為之薦脯醢還是此贊者故下直言薦脯醢不言别有他人明還是贊者也昏禮贊醴婦是贊者自酌自薦經雖不言側酌側自明也云葉柶大端者謂扱醴之面柄細故以為柶大端此與昏禮賔皆云面葉者此以賔尊不入戶贊者面葉授賔賔得面枋授冠者冠者得之面葉以扱醴而祭昏禮賔亦主人尊不入房贊者面葉以授主人主人面枋以授賔賔得面葉以扱祭至於聘禮禮賔宰夫實觶以醴加柶于觶面枋授公者凡醴皆設柶聘禮宰夫不訝授公側受醴則還面枋以授賔故面枋也賔揖至北面注戶東至為柄釋曰知室戶東者以其冠者在室戶西賔自至房戶取醴酌醴者出向西以授也冠者至答拜注筵西至主人釋曰云筵西拜南面拜也者上云冠者筵西南面知受觶拜還南面也知賔東面在西序者以上文與主人相對本位於西序也云東面者明成人與為禮異於答主人者案鄉飲酒鄉射賔於西階北面答主人拜今此於西序東面拜故云異於答主人又昏禮禮賔聘禮禮賔皆云拜送此云答拜不云拜送者彼醴是主人之物故云拜送此醴非賔物故云答拜也薦脯醢注贊冠者也釋曰上文云贊側酌醴是贊冠者明此薦亦是贊冠者也冠者至答拜釋曰云祭醴三興者三祭者亦如昏禮始扱一祭又扱再祭也云筵末坐啐醴建柶興降筵此啐醴不拜既爵者以其不卒爵故不拜也冠者至于母注薦東至闈門釋曰云薦東薦左者據南面為正故云薦左也云凡奠爵將舉者於右者謂若鄉飲酒鄉射是也此文及昏禮贊醴婦是不舉者皆奠之於左也云適東壁者出闈門也者宫中之門曰闈門母既冠子無事故不在門外今子須見母故知出闈門也云婦人入廟由闈門者雜記云夫人奔喪入自闈門升自側階鄭注云宫中之門曰闈門為相通者也是也母拜至又拜注婦人至俠拜釋曰鄭云婦人於丈夫雖其子猶俠拜者欲見禮子之體例但是婦人於丈夫皆使俠拜故舉子以見義也賔降至初位釋曰此將欲與冠者造字而迎之位也注初位至之位釋曰云初位初至階讓升之位者謂初迎賔至階讓升之位其賔直西序則非初讓升之位主人直東序西者欲迎其事聞字之言故也冠者至者對注對應至未聞釋曰云賔字之者即下文有字辭又有某甫之字若孔子云尼父之字是也云其辭未聞者下有賔祝辭不見冠者應辭故云未聞也案禮記冠義云既冠而字之成人之道也見於母母拜之據彼則字訖乃見母此文先見乃字者此文見母是正見彼見母在下者記人以下有兄弟之等皆拜之故退見母於下使與兄弟拜文相近也若然未字先見母字訖乃見兄弟之等者急於母緩於兄弟也賔出至門外注不出至醴之釋曰以下云請醴賔故云將醴之也請醴至就次注此醴至為之釋曰云此醴當作禮者對上文有酌醴受醴之等不破之此當為上於下之禮不得用醴禮即從醴字何者周禮云諸侯用鬯不云鬯賔明不得以醴禮賔即為醴故破從禮也云次門外更衣處也者次者舍之名以其行禮衣服或與常服不同更衣之時須入於次故云更衣處也云心帷幕簟席為之者案聘禮記云宗人授次次以帷少退于君之次注云主國之門外諸侯及卿大夫之所使者次位皆有常處又案周禮幕人掌帷幕幄帟綬之事注云帷幕皆以布為之四合象宫室曰幄云簟席者士卑或用簟席是以雜記諸侯大夫喪皆用布士用簟席為之次亦當然冠者至如之注見贊至賔出釋曰兄弟位在東方此贊冠者則賔之類故贊者東面也言贊者先拜冠者答者也知贊者後賔出者文於見兄弟下始見之明贊者後賔出也出亦當就次待禮之也入見至見母注入入至妹卑釋曰男子居外女子居內廟在寢門外入見入寢門可知不見父與賔者蓋冠畢則已見也不言者從可知也云不見妹妹卑者以其妹卑於姑姊故不見也乃易至先生注易服至仕者釋曰云易服者爵辨既助祭之服不可服見君與先生等故易服服玄端也云易服不朝服者非朝事也者此乃因加冠以成人之禮見君非正服之節故不朝服經直云玄端則兼玄冠矣今更云玄冠者以初冠時服玄端為緇布冠服緇布冠非常著之冠而弊之易服冝服玄冠配玄端故兼云玄冠也朝服與玄端同玄端則玄裳黃裳雜裳黑屨若朝服玄冠玄端雖同但裳以素而屨色白也以其但正幅故朝服亦得端名然六冕皆正幅故亦名端是以樂記云魏文侯端冕而聽古樂又論語云端章甫鄭云端玄端諸侯視朝之服則玄端不朝得名為玄端也云摯雉也者士執雉是其常故知摯是雉也云鄉先生鄉中老人為卿大夫致仕者者此即鄉飲酒與鄉射記先生及書傳父師皆一也先生亦有士之少師鄭不言者經云鄉大夫不言士故先生亦略不言其實亦當有士也乃醴至之禮注一獻至用清釋曰此醴亦當為禮不言可知也云一獻者主人獻賔而已即燕無亞獻者者案特牲少牢主人獻尸主婦亞獻為二獻此則主人獻賔而已無亞獻知即燕者鄉飲酒末有燕故知獻後有燕云獻酢酬賔主人各兩爵而禮成者主人獻賔賔酢主人主人將酬賔先自飲訖乃酬賔奠而不舉是賔主人各兩爵而禮成也必知一獻之禮禮備有酬酢者昏禮舅姑饗婦以一獻之禮奠酬得正禮不旅又曰婦酢舅更爵自薦是備酬酢也鄉飲酒亦備獻酢酬是其義也云特牲少牢饋食之禮獻尸此其類也者此賔主人各兩爵無亞獻彼主人主婦各一爵有亞獻雖不同得主人一獻義類同故云此其類也云士禮一獻者即士冠及昏禮鄉飲酒禮鄉射皆是一獻也云卿大夫三獻者案左氏傳云季孫宿如晉拜莒田也晉侯享之有加籩武子退使行人告曰小國之事大國也苟免於討不敢求貺得貺不過三獻又禮記郊特牲云三獻之介亦謂卿大夫三獻之介案大行人云上公饗禮九獻侯伯七獻子男五獻是以大夫三獻士一獻亦是其差也云禮賔不用柶者泲其醴者此有獻酢酬飲之泲者故不用柶冠禮禮子用醴不泲故用柶也云內則曰飲者鄭注云目諸飲也云重醴清糟者鄭云重陪也糟醇也清泲也致飲有醇者有泲者陪設之稻醴以下是也云凡禮事質者用糟文者用清者質者謂若冠禮禮子之類是也故於房戶之間顯處設尊也主人至儷皮注飲賔至為離釋曰主人酬賔當奠酬之節行之以財貨也此禮賔與饗禮同但為饗禮有酬幣則多故聘禮云若不親饗致饗以酬幣注云禮幣束帛乘馬亦不是過也又案大戴禮云禮幣采飾而四馬是大夫禮多與士異也案禮器云琥璜爵鄭云天子酬諸侯諸侯相酬以此玉將幣也則又異於大夫也下凡酬幣之法尊卑獻數多少不同及其酬幣唯於奠酬之節一行而已春秋秦后子出奔晉后子享晉侯歸取酬幣終事八反杜注云備九獻之儀始禮自齎其一故續送其八酬酒幣彼九獻之閒皆云幣春秋之代奢侈之法非正禮也云束帛十端也者禮之通例凡言束者無問脯與錦皆以十為數也云儷皮兩鹿皮也者當與射禮庭實之皮同禮記郊特牲云虎豹之皮示服猛也又覲禮用馬則國君用馬或虎豹皮若臣聘則用鹿皮故鄭注聘禮云凡君於臣臣於君麋鹿皮可也言可者以無正文若然兩說諸侯自相見亦用虎豹皮也贊者至為介注贊者至為介釋曰鄭知贊者衆賔者以其下别言贊冠者明上云贊者是衆賔也云介賔之輔者以其鄉飲酒之禮賢者為賔其次為介又其次為衆賔彼據將貢以為優劣之次也此雖不貢以飲酒之禮立賔主亦以優劣立介以輔也云以贊為之尊之者謂賔此贊冠者故遣為介也云飲酒之禮賢者為賔其次為介者取尊為義也賔出至賔俎注一獻至家也釋曰賔不言薦脯醢者案舅姑共饗婦以一獻有姑薦則此一獻亦有薦脯醢可知經有俎必有特牲但鄉飲酒鄉射取擇人而用狗此冠禮無擇人之義則不用狗但無正文故云其牲未聞也知使人歸諸賔家者以賔出主人送於門外乃始言歸賔俎明歸於賔家也儀禮疏卷第二
