  text: 儀禮疏卷第二十三
  hash: sha256:c43839df54ed39a4ee9bd06704b272306a45508b59b94870968170ffcde50f35
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_023-1a}
body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彥等撰君使至于館注玉圭至終也釋曰自此盡賔送不拜論主君使卿詣館還玉及報享之事云玉圭也者舉聘君之圭云君子於玉比德焉以之聘重禮也并相切厲之義並聘義文案聘義云天子制諸侯比年小聘三年大聘相厲以禮又云巳聘而還圭璋此輕財而重禮之義又云夫昔者君子比德於玉焉是其義也云還之者德不可取於人相切厲之義也者既以玉比德德在於身不取於人彼既將玉來似將德與己己不可取彼之德故還之不取德也既不得取而將玉往來者相切磋相磨厲以德而尊天子故用之也云皮辨者始以此服受之不敢不終也者始謂受聘享在廟時今還以皮辨還玉是終之也賔皮至以入注迎之至為率釋曰云帥大夫以入者大夫即卿卿亦大夫也云不純為主也者客在館如主人卿往如賔今不拜迎是不純為主也決上君使卿歸饔餼時賔拜迎是純為主人故也大夫至鉤楹注鉤楹至外也釋曰云不東面以賔在下也者決歸饔餼時大夫東面致命行聘時賔亦東面致命也云必言鉤楹者賔在下嫌楹外也若然不在楹外近之者以初行聘時在堂上楹內故今還在楹內也賔自至而立注聽命至南面釋曰云聽命於下敬也者此決賔受禮時公用束帛賔西階上聽命歸饔餼時賔阼階上聽命此特於下聽命故云敬也云自左南面右大夫且並受也者以鄉飲酒獻酢之時授者在右受者在左故右大夫也且並受者欲取如向君前然也云若向君前耳者謂於本國君前受圭璋時北面並受今還南面並受面位受不同並受一邊不異故云若向君前耳云退為大夫降逡遁者以大夫降為之逡遁而退因即負右房南面而立大夫士直有東房西室天子諸侯左右房今不在大夫廟於正客館故有右房也大夫至階東注大夫至面立釋曰云大夫降出言中庭者為賔降節也者以其大夫授賔圭訖降自西階將出門至中庭不止今云大夫降出中庭者大夫中庭賔乃降故鄭云為賔降節也云授於阼階東者欲親見賈人藏之也者賈人是上啓櫝者是掌玉之人此時無事在堂東待此玉故賔向阼階東得見之云賔還阼階下西面立者以其賔在館如主人在階下西面立是其常處立者以待授璋也注唯升堂至改也釋曰案上文云賔自碑內聽命升自西階是其升堂由西階也云凡介之位未有改也者以其賔唯升自西階明介猶在東方故上文授上介于阼階東也故言未有改賔裼至束紡注賄豫至至也釋曰此則未知何用之財若是報享之物不應在禮玉之上今言此束紡者以其上圭璋是彼國之物下云禮玉束帛報聘君之享物彼君厚禮於此此亦當厚禮於彼故特加此束紡是以鄭云相厚之至也云賄豫人財之言也者案下記云賄在聘于賄又云無行則重賄反幣鄭注周禮云布帛曰賄是賄為財物是與人財物謂之賄也云紡紡絲為之者因名此物為紡云今之縳也者鄭注周禮內司服亦云素紗者今之白縳也則此束紡者素紗也故據漢法況之禮玉束帛乘皮注禮禮至作醴釋曰云禮禮聘君也者此謂報享之物以其彼持享物來禮此主君此主君亦以物禮彼君故云禮禮聘君也云所以報享也者彼以物享此君此君亦以物享彼君曲禮云往而不來非禮也來而不往亦非禮也今以來而往是相享之法故云報享也云亦言玉璧可知也者上文聘賔行享之時束帛加璧束錦加琮今報享物亦有璧琮致之故云亦言玉璧可知此玉則琮也以其經言玉故以玉言之若然經言束帛兼有束錦矣案下記云賄在聘于賄又云無行則重賄反幣則此禮也公館賔注為賔至朝服釋曰自此盡賔退論明日賔將發主君就館拜謝聘君使臣來禮己國之事云公朝服者以其行聘享在廟之時相尊敬重故著皮辨此拜謝之禮輕故知著朝服賔辟注不敢至乃下釋曰云此亦不見言辟者君在廟門敬也者此言亦者亦勞賔時故上文賔即館卿大夫勞賔賔不見以其不見故遣上介聽命故知此賔亦不見凡言辟者將見而不見則謂之辟此本不見而言辟者以其君在廟門外雖不見而言辟故鄭云敬也云凡君有事於諸臣之家車造廟門乃下者以其卿館于大夫之廟此館則是諸臣之家案公食記云賔之乘車在大門外又曲禮云客車不入大門以此言之君車入大門矣大夫士有兩門入門東行則是廟門矣既至廟門須與賔行禮故鄭云造廟門乃下也上介聽命注聽命至之老釋曰云聽命於廟門中西面如相拜然也者案前受士介幣之時賔固辭公答再拜擯者出立于門中以相拜注云立門中閾外西面此中賔不見使介聽命明如相拜然取其視外便也必知在門中西面者以其君來如賔禮東面介西面向公可知云擯者每贊君辭則曰敢不承命告于寡君之老者以其君尊不自出辭以是故君之擯者每事贊君出辭則曰敢不承命者謂上介答君之辭知告賔云告于寡君之老者案玉藻云擯者曰寡君之老注云擯者之辭主於見他國君今上介當擯者之處故知告于賔稱告于寡君之老聘享至再拜注拜此至北面釋曰云聘享者謂賔聘君以圭享君以璧夫人聘享者謂賔聘夫人以璋享夫人以琮問大夫者問三卿及嘗聘彼國之下大夫送賔以登路云拜此四事者君禮一夫人禮二大夫禮三送賔禮四四事皆再拜云公東面者公如賔禮門西東面擯者向公向介故知北面為相而言也公退至于朝注賔從至之意釋曰云言請命者以己不見不敢斥尊者之意者案司儀云君館客客辟介受命遂送客從拜辱于朝此經不言拜辱而言請命凡言請者得不由君君聽則拜此下經直云公辭賔退不見拜文是君不受其謝故云請命者以己不敢斥尊者之意故不言辱而言請公辭賔退注辭其至行之釋曰云退還館裝駕者以明旦將發故裝束駕乘引周禮者證明日客拜禮賜遂行之事鄭彼注云禮賜者謂乘禽即此下文賔拜乘禽是也賔三至聽之注發去至不識釋曰自此盡送至于竟論賔介發行主國贈送之事云明己受賜大小無不識者以其乘禽是禮以細小尚記識而拜之況饔餼食禮之大者記識可知故云大小無不識遂行舍于郊注始發至展軨釋曰曲禮云巳駕僕展軨鄭注云具視也彼是君車故使僕展之此卿大夫故鄭云自展軨恐不得所故也公使至覿幣注贈送至為君釋曰所以好送之者來而不往非禮以禮來往皆是和好之事故云好送之也云言如覿幣見為反報也者以其贈之多少一如覿幣故鄭云見為反報也注不入至同節釋曰言不入無儐對歸饔餼入設而有儐此則不入無儐明賔去禮冝有巳云如受勞禮以贈勞同節者賔來勞之去有贈之皆在近郊禮又不别故言同節也使者至反命注郊近至得入釋曰自此盡拜其辱論使者反命之事知郊是近郊者以下文云朝服載旜鄭云行時稅舍於此郊今還至此正其故行服以俟君命敬也者初行云舍於郊斂旜今至此載旜而入故知近郊也云告郊人使請反命於君者以其使者至所聘之國謁關人明此至郊告郊人使請可知引春秋者案閔二年公羊傳云鄭伯惡髙克使之將逐而不納棄師之道也何休云使將師救衛隨後逐之彼無大夫文言大夫者鄭君加之也禳乃入注禳祭至災凶釋曰案春官小祝云掌侯禳禱祠之祝號鄭注云禳禳郤凶咎故鄭此云禳是祭名也乃入陳至皆否注皆否至從者釋曰云此幣使者及介所得於彼國君卿大夫之贈賜也者於君所得為公幣於卿大夫所為私幣賔之公幣有八郊勞幣一也禮賔幣二也致饔餼三也夫人歸禮幣四也侑食幣五也再饗幣六也夕幣七也贈賄幣八也此八者皆主君禮賜使者皆用束錦故曰公幣賔之私幣略有十九主國三卿五大夫皆一食有侑幣饗有酬幣皆用束錦則是十六有三卿郊贈則十九也其上介公幣則有五致饔餼一也夫人致禮幣二也侑食幣三也饗酬幣四也郊贈幣五也降於賔者以其上介無郊贈幣又無禮賔幣又闕一饗幣故賔八上介五也上介私幣有十一主國三卿五大夫或饗或食不備要有其一則其幣八也又三卿皆有郊贈如其面幣通前則十一也主國下大夫嘗使己國者聘亦有幣及之則亦有報幣之事其數不定士介四人直有郊贈報私幣主國卿大夫報士介私面士介私幣數不甚明云禮於君者不陳者謂賄用束紡禮用束帛乘皮不陳之者以經云公幣又云上介公幣他介皆否若禮於君者一統於賔不得云介之幣故知禮於君者不陳必禮於君不陳禮於己始陳者以其禮於君者是其正故不陳之禮於己者以其榮故陳之是以下注云不加於其皮上榮其多是其義也若然聘君以幣問卿而其卿不見報聘君之幣者以其尊卑不敵若執之嫌其敵體故也注不加至多也釋曰此決初夕幣時束帛皆加于左皮上今不言加於皮上者若加於皮上相掩蔽故不加於皮上榮其多也公南鄉注亦宰至南鄉釋曰此陳幣當如初夕幣之時管人布幕于寢門外使者北面衆介立于其左東上卿大夫在幕東西面北上宰告於君君朝服出門左南鄉是以鄭此注亦依夕幣而言之卿進至其左注此主至東上釋曰案上行聘禮之時上介屈繅授賔賔襲受之今此賔執圭垂繅賔則裼變於賔彼國致命時也上介執璋屈繅者變於賔故也必變之者反命致敬少於鄰國致命時故賔於君前得裼見美為敬也云士介亦隨入並立東上者此言亦者亦初行受于朝時君使卿進使者入衆介隨入北面東上此中雖不云士介入明亦隨入可知反命至再拜注君亦至辱命釋曰云君亦揖使者進之乃進反命也者亦謂亦受命於朝位立定時君揖使者乃進受命明反命亦然某君某國名者若云鄭國君齊國君云某宮若言桓宫僖宮者左傳有桓宫之楹宫是廟名其受聘享於廟故以宫言之但受聘享在大祖廟不在親廟四而云桓宫僖宫者略舉廟名而言也宰自公左受玉注亦於至便也釋曰此言亦者亦於出使初受圭時宰自公左授使者圭同面注云北面並授之凡並授者授由其右受由其左此中受由其右者因東藏之便故鄭云不右使者由便也受上至如之注變反至略之釋曰云變反言致者若云非君命也者君與夫人聘於鄰國君與夫人各有所當聘鄰國君受命於君今使者還反命於君聘於鄰國夫人當受命於夫人使者還反命於夫人但婦人無外事雖聘夫人亦君命之今使還反命不云反命於君變反言致命者若本非君命猶夫人之命然故變反言致也若然婦人既無外事而承君命聘鄰國夫人者以其夫婦一體共事社稷故下記云君以社稷故在寡小君拜是賔主相對之辭也云致命曰巳下聘夫人反命無文此鄭君依記上文反命於君之辭而言之云不言受幣於某宫可知略之者以其夫人受聘享皆因君聘享同時同宫故略之也執賄至授宰注某子至外也釋曰此賄幣者即上文賄用束紡是也云某子若言髙子國子者案閔公二年冬經書齊髙子來盟僖三十二年經書齊國歸父來聘左傳曰國子為政齊猶有禮者是也云凡使者所當以告君者上介取以授之者以上受上介璋是上介授賔明其餘皆上介取以授之云賄幣在外者以其上文云禮於君者不陳此賄幣即是禮於君前明在外也禮玉亦如之注亦執至皮也釋曰此即上云禮玉束帛乘皮鄭注云禮禮聘君也所以報享也云亦執束帛加璧也者言亦亦上文行享時束帛加璧者也云宰受之士隨自後左士介受乘皮者此約初行享之時公側授宰幣士受皮皆自後右客今執享皮幣玉宰受之可知言宰受之士隨自後隨宰自後謂自士介後其在東上者不須云自後其餘三人皆後乃得左之必左士介者取向東藏之便故也云上介出取玉束帛士介從取皮也者此亦初享之時賔奉束帛加璧是上介取以授賔明士介從取皮可知注禮幣至於贈釋曰云禮幣主國君初禮賔之幣也者謂從郊勞巳後至於贈賄八度禮賔皆有幣是自郊勞為初也云以盡言賜禮謂自此至於贈者此則郊勞也授上至再拜注授上至陳之釋曰云不授宰者當復陳之者此幣皆先陳之今賔執以告君賔釋辭君曰勤勞使於四方故授上介幣當拜答君言此幣不授與宰者當復陳之於本處此幣入於己者故不授宰也上賄幣禮君者反命訖皆授宰故以此決之若有至賜也注言此至孝也釋曰此獻物謂入賔者故下記云既覿賔若私獻奉獻將命注云時有珍異之物或賔奉之猶以君命致之則是賔亦言有私獻於彼君則彼君亦有私獻報賔則此獻者也云大夫出反必獻忠孝也者案下曲禮云大夫私行出疆必請反必有獻彼私行出疆反必有獻此以公聘出疆反亦有獻故云大夫出反必獻此以入已之物獻於君者忠孝也事君言忠事父言孝此獻君忠也而兼言孝者忠臣出孝子之門故連言孝也君其以賜乎注不必至己也釋曰言君其以賜乎者大夫所獻之物謙不必當君所須此物君其以賜臣下乎言乎者或當君意或不當君意故言乎以疑之云不拜者為君之答己也者士拜國君國君不拜士賤故也大夫拜國君國君即答拜大夫尊故也故云不拜者為君之答已拜若然自反命以來盡於賜禮之等或拜或不拜無答己之嫌獨此不拜為君之答己者自此以前皆是彼國報君之物賔直告事而巳君受之而無言故賔不拜君有言及己者乃拜之拜君言也此獻是彼國君賜與己理須拜送是以玉藻云凡獻於君大夫使宰士親皆再拜稽首送之又郊特牲云大夫有獻弗親不面拜為君之答己亦此類故鄭云獻不拜者為君之答己若然玉藻不親此親者此因反命故親獻也注士介至賤也釋曰鄭知旅答士介共一拜者君勞上介上介再拜稽首君答拜不言再拜則君答上介一拜矣勞士亦如之不言皆則揔答一拜矣勞賔君答再拜勞上介君答一拜對賔再拜巳是賤矣今此士介四人共答一拜故云又賤也此一拜答臣下則周禮大祝辨九拜七曰竒拜是也是以彼注云一拜答臣下也案曲禮云君於士不答拜此君答拜士者以其新行反命君勞苦之故答拜異於常也君使至稽首注以所至授之釋曰云禮臣子人賜之而必獻之君父不敢自私服也君父因以豫之則拜受之如更受賜也者案內則云婦或賜之衣服則受而獻諸舅姑舅姑受之則喜若反賜之則辭不得命如更受賜臣子於君父亦然言此者證此經君使宰以所獻之物反賜使者使者辭不得命再拜稽首受之如更受賜云既拜宰即以上幣授之者以其上文云執禮幣授上介者是執上幣不執下幣明知宰所執授之者是上幣可知乃退注君揖入皆出去釋曰知君揖入皆出去者初賔將行君前受命訖君揖入揖賔介出故知此君退者亦反命訖賔介出可知介皆至之門注將行至禮也釋曰云將行俟於門是出之禮初行之時介皆至賔門俟賔同行今行反又送至于門是入之禮故云與尊長出入之禮注再拜上介三拜士介釋曰上介是大夫與已同類故知再拜士卑與已異類各一拜故言三拜士介釋幣于門注門大至見也釋曰自此盡亦如之論賔上介使還禮門神及奠於禰之事知門是大門者以其從外來先至大門即禮門神故知門是大門也案特牲筮時云席於門中闑西閾外故知此亦席于闑西閾外知東面者神居東面為正故也云設洗于門外東方者以其廟在學設洗皆云洗當東榮故在門外亦在東方也云其餘如初于禰時者初出亦釋幣於行不如之者以其初出於廟禮文具設于行其文略故此云如禰時也言如者謂釋幣於祝先入巳下埋于西階東是也云出于行入于門不兩告告所以先見也者出時自廟出先見行即告行入時先見門故告門出入皆告一故云不兩告也乃至至脯醢注告反也薦進也釋曰云筵几于室者還以特牲少牢司宫設席于奧東面右几但無牲牢進脯醢而巳以告祭非常故也觴酒陳注主人至入也釋曰云言陳者將復有次也者但云主人一獻當言奠今不言奠而言陳者以其下仍有室老及士獻以備三獻故言陳陳有次第之言以其三時次第皆列于坐者也云先薦後酌祭禮也者以其特牲少牢皆先薦饌乃後獻奠于鉶南此與彼同故云先薦後酌祭禮也云行釋幣反釋奠略出謹入也者必略出謹入者出時以禱祈入時以祠報故不同也席于阼注為酢至於祭釋曰鄭知祝取爵酌者案特牲少牢尸酢主人祝取爵以酢主人但此無尸為異也不酢於室異於祭者此決特牲少牢皆於室內尸東西面受酢此乃於外行來告反故在阼不在室知與正祭異也又於正祭時有尸尸飲卒爵以尸爵酢主人此告祭無尸爵兼奠故別取爵以酢主人亦異也薦脯醢注成酢禮也釋曰此奠謂若特牲少牢主人受酢時皆席于戶內有薦俎此雖無俎亦薦脯醢于主人之前以成酢禮也三獻注室老至自酢也釋曰鄭注喪服云室老家相士邑宰知無主婦而取士者以其自外來主於告反即釋奠於禰廟故知主婦不與而取士備三獻必知有室老與士者以其前大夫致饔餼於賔時使老牽牛以致之鄭注云皆大夫之貴臣故知此亦貴臣為獻也云每獻奠輒取爵酌者此通三獻皆獻奠訖別取爵自酢故云輒取爵酌也别云主人自酢者對正祭有尸三獻皆獻尸訖尸酢主人主婦賔長今此無尸皆自酢獨云主人者主人為首正故舉前以包後一人舉爵注三獻至舉也釋曰云三獻禮成者大夫士家祭三獻特牲少牢禮是也云更起酒者此欲獻酬從者不得酌神之尊是以特牲人未告則反者聘使至關乃謁關人關人入告君君知乃使士請事巳入關自然入矣若關人未告君君不知使者又未入聞主國君死理當反矣不郊勞注子未君也釋曰案文公八年天王崩九年毛伯來求金公羊傳曰何以不稱使當喪未君也踰年矣何以謂之未君即位矣而未稱王也未稱王何以知其即位以諸侯踰年即位亦知天子之踰年即位也以天子三年然後稱王亦知諸侯於其封內三年稱子若然云子未君公羊傳文但彼據踰年即位後此據新遭父喪引之者以其同是子未君故也不筵几注致命至神之釋曰不筵几致命不於廟決正聘設几筵也就尸柩於殯宫者國君雖以國為體主聘其國但聘亦為兩君相好今君薨當就尸柩故不就祖廟也云又不神之者以其鬼神所在曰廟則殯宫亦得為廟則設几筵亦可矣但始死不忍異於生不神之故於殯傍無几筵也曽子問云君薨世子生告殯殯東有几筵者鄭云明繼體也然則尋常則殯東不設几筵當在室內矣不禮賔注喪降事也釋曰云不禮者謂既行聘享訖不以醴酒禮賔也主人畢歸禮注賔所至饗食釋曰知歸禮中兼有饗食者主人有故雖饗食亦有生致法故主人亦歸之且下文云賔唯饔餼之受明本并饗食亦歸賔乃就中受饔餼若本不歸饗食空歸饔餼何頓云饔餼之受明其時并致饗食也賔唯饔餼之受注受正不受加也釋曰饔餼大禮是其正自饗食之等是其加也不賄不禮玉不贈注喪殺禮為之不備釋曰云不賄者皆據上文謂不以束紡不禮玉者謂不以束帛乘皮以報享不贈者賔出至郊不以物贈之也遭夫至君喪注夫人至所降釋曰云夫人世子死君為喪主者案禮記服問云君所主夫人妻大子適婦鄭注云言妻見大夫以下亦為此三人為喪主也故云君為喪主既為喪主是以使大夫受聘禮不以凶接吉也云其他謂禮所降者謂不禮以下不贈以上皆闕之遭喪至以受注遭喪至義也釋曰此經揔説上三人死主君不得受命故使將命於大夫主人即大夫故鄭云此三者皆大夫攝主人也云長衣素純布衣者此長衣則與深衣同布但袖長素純為異故云長衣素純布衣也此長衣之緣以素為之故云素純也去衰易冠者謂脫去斬衰之服而著長衣脫去六升九升之冠而著練冠故云去衰易冠也云不以純凶接純吉者聘禮是純吉禮為君三升衰裳六升冠為夫人丗淺絳也者對三入為纁為淺絳云一染謂之縓者爾雅文案彼云一染謂之縓再染謂之赬三染謂之纁也云縓緣三年練之受飾也知者引檀弓云練衣黃裏縓緣注云練中衣以黃為內縓為飾為中衣之飾據重服三年變服後為中衣之飾也此公子為母在五服外輕故將為人初死深衣之飾輕重有異故不同也云諸侯之妾子厭於父為母不得申權為制此服不奪其恩也者諸侯尊絶期巳下無服公子被厭不合為母服不奪其母子之恩故五服外權為制此服必服麻衣縓緣者麻衣大祥受服縓緣練之受飾雖被抑猶容有三年之哀故也云為妻縓冠葛絰帶妻輕者以縓布為冠對母用練冠以葛是葬後受服而為經帶對母用麻皆是為妻輕故也傳曰至不服也注君之至而葬釋曰傳發問者怪親母與妻其服大輕故問之答云君之所不服者以尊降諸侯絶旁期向來所釋皆是主君始薨假令君薨踰年嗣子即位鄰國朝聘依吉禮受之於廟故成十七年經書邾子貜且卒十八年邾宣公來朝傳云即位而來見踰年可以朝他國他國來朝亦得以吉禮受之於廟矣雖踰年而未葬則不得朝人人來朝已亦使人受之於廟於夫人丗子亦然以其本為死者來故也聘君至則遂注既接於主國君也釋曰自此盡唯稍受之論聘者遭己君之喪行非常之禮事云接於主國者謂謁關人關人告君君使士請事是接於主國矣故入境則遂也赴者至于館注未至至作訃釋曰未至謂赴告主國君者也以其本國遭喪赴者有兩使一使告聘者一使告主國云未可為位者以其赴主國之使未至是以未可為位受人弔禮云衰于館未可以凶服出見人者對下經赴者至則衰而出云其聘享之事自若吉者下云受饔餼之禮故知先行聘享乃後受禮以其主國未得赴告故自若吉也受禮注受饔餼也釋曰上文遭主國之喪賔唯饔餼之受受禮亦饔餼之禮不受饗食注亦不受加釋曰上文遭主國之喪云唯饔餼之受注云受正不受加也加即此饗食也故此云亦不受加也赴者至而出注禮為至事也釋曰云禮為鄰國闕者案襄二十三年春秋左氏傳云𣏌孝公卒晉悼夫人喪之平公不徹樂非禮也禮為鄰國闕服注云鄰國尚為之闕樂況舅甥之親乎若然赴者至主國君使者衰而出則主國可以闕樂云於是可以凶服將事者謂主人所歸禮則賔可以凶服受之其正行聘享則著吉服矣故雜記云執玉不麻是也唯稍受之注稍稟食也釋曰禮君行師從卿行旅從從者既多不可闕於稍食案周禮每云稍事皆謂米稟以其稍稍給之故謂米稟為稍歸執至升堂注復命至亡同釋曰自此盡即位踊論使者喪還執圭還國復命之事云臣子之於君父存亡同者案禮記奔父母之喪升自西階此復命於殯亦升自西階法生時出必告反必面故云臣子於君父存亡同也子即位不哭注將有至哭位釋曰云不言世子者君薨也者案公羊傳君存稱世子君薨稱子某既葬稱子踰年稱君案上文稱世子此文單稱子是知其君薨故君不稱某而與此既葬同號者以其既不得稱世子略云子而巳故不言某其實正法稱子某是以雜記在殯待鄰國之使皆稱某云諸臣待之亦皆如朝夕哭位者但臣子一列上下文唯言子不言羣臣與子同知如朝夕哭位者案奔喪云奔父之喪在家者待之皆如朝夕哭位故知此亦然辨復命如聘注自陳至無勞釋曰言辨復命如聘者上文君存時使者復命自陳公幣巳下至賜告之等今復命於殯所亦盡陳之故言辨知無勞者勞主君出命今君薨不可代君出命故知無勞也子臣皆哭注使者至皆哭釋曰此據子在位哭亦兼羣臣故鄭云子與羣臣皆哭與介入北鄉哭注北鄉至朝夕釋曰使者升階復命訖不見出文而言與介入者以其復命之時介在幣南北面去殯逺復命訖除去幣賔更與介前入近殯北鄉哭鄉內為入故言與介入北鄉哭也云北鄉哭新至別於朝夕者朝夕哭位在阼階下西面今於殯前北鄉故云別於朝夕也出袒括髮注悲哀變於外臣也釋曰案奔喪云至於家入門左升自西階東面哭括髮袒於殯東是於內者子故也此使者出門袒括髮變於外者臣故也入門右即位踊注從臣至喪禮釋曰案奔喪云袒括髮於西階東即位踊襲絰於序東此門外袒括髮入門右即位踊亦當襲絰於序東故鄭云自哭至踊如奔喪禮也若有至饗食注私喪至不反釋曰自此盡從之論使者有父母之喪行變禮之事云不敢以私喪自聞于主國者解哭于館又云凶服干君之吉使者亦取不敢解之言衰而居謂服衰居館行聘享即皮辨吉服故不敢凶服干君之吉使也引春秋傳者案宣八年經書夏六月公子遂如齊至黃乃復公羊傳云其言至黃乃復何有疾也何言乎有疾乃復譏何譏爾大夫以君命出聞喪徐行而不反何氏注聞大喪而不反重君命也徐行者為君當使人追代之以喪喻疾者喪猶不還而況疾乎是也以此言之使雖未出國境聞父母之喪遂行不敢以私廢王事君使人代之可也以此言之明至彼所使之國雖聞父母之喪不反可知是以哭于館衰而居歸使至從之注己有至深衣釋曰云己有齊斬之服者以其私喪之內有為父斬為母齊衰故齊斬並言之也云不忍顯然趨於往來者解經並使衆介先衰而從之意經云歸據反國時兼云往者鄭意去時聞父母之喪不敢即反亦使衆介先衰而從之故往來並言云在道路使介居前者謂去向彼國時云歸又請反命己猶徐行隨之者此謂還國至近郊使人請反命君許入猶使介居前徐行於後隨介至國也云君納之乃朝服者以其行聘之時猶不以凶服干君之吉使而服吉服知此反命時亦不以凶服干君之吉使而服朝服如吉時反命矣云出公門釋服哭而歸者案雜記云大夫士將與祭於公既視濯而父母死則猶是與祭也次於異宫既祭釋服出公門外哭而歸亦云其它如奔喪之禮明此亦出公門釋朝服而歸但彼祭服不可著出故門內釋服此朝服可以著出門乃釋服為異也云其他如奔喪之禮者案奔喪云至於家入門左升自西階殯東西面坐哭盡哀括髮袒降堂東即位西鄉哭成踊襲絰于序東絞帶反位拜賔成踊送賔反位有賔後至者則拜之成踊送賔皆如初衆主人兄弟皆出門出門哭止闔門相者告就次於又哭括髮袒成踊於三哭猶括髮袒成踊三日成服拜賔送賔皆如初云吉時道路深衣者以其朝服之下唯有深衣庶人之常服既以朝服反命出門去朝服還服吉時深衣三日成服乃去之儀禮疏卷第二十三
