  text: 儀禮䟽卷第十一
  hash: sha256:f50f6add8080e3124a625db42ee277408e503852ba576c9bafa9d103c08db2cc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_011-1a}
body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彦等撰郷射禮第五鄭目録云州長春秋以禮會民而射於州序之禮謂之郷者州郷之屬郷大夫或在焉不改其禮射禮於五禮屬嘉禮大戴十一小戴及別録皆第五釋曰鄭云州長春秋以禮會人而射於州序者周禮地官州長職文也鄭引之者證此郷射是州長射法云謂之郷者欲見州長射得名郷射之意云州郷之屬者周禮大司徒職云五州爲郷是州屬郷故云州郷之屬云郷大夫或在焉者一郷管五州郷大夫或宅居一州之内則鄭注禮記云或則郷之所居州黨而郷大夫來臨此射禮是爲郷大夫在焉則名郷射又郷大夫三年大比興賢者能者訖而以郷射之禮五物詢衆庶亦行此州長射禮以詢之亦是郷大夫在焉故名爲郷射云不改其禮者雖郷大夫在其禮仍依州長射禮故云不改其禮案經郷大夫射於庠云堂則由楹外又云堂則物當楣又云大夫用兕中其禮與士射於序別而云不改者大判卿大夫士射先行郷飲酒禮及未旅而射爲不改其實亦有少異也鄭云射禮於五禮屬嘉禮者案周禮大宗伯云以嘉禮親萬民下有以賔射之禮親故舊朋友故知屬嘉禮也郷射至乃請釋曰自此至無介論州長將射先戒賔之事案大射前三日宰夫戒宰及司馬又射前一日樂人宿縣此不言日數則戒賔與射同日矣禮同郷飲酒也以其郷射先行郷飲酒郷飲酒戒賔與飲酒同日知此郷射戒賔與射亦同日也注主人至庶乎釋曰案郷大夫是諸侯郷大夫則此州長亦諸侯之州長以士爲之是以經云釋獲者執鹿中記云士鹿中是皆爲此州長射而言是諸侯州長可知若天子州長中大夫爲之若然記云大夫兕中者爲郷大夫詢衆庶而言也云郷大夫若在焉則稱郷大夫也者謂大夫來臨禮之時州長戒賔不自稱稱郷大夫以戒賔也云出迎出門也者謂出序之學門亦如郷飲酒出庠門皆有一門入門即至堂耳云不言拜辱者此爲習民以禮樂不主爲賔已也者對郷飲酒主人戒賔賔拜辱者彼爲賔也非爲習民以禮樂故也云不謀賔者時不獻賢能事輕也者還決郷飲酒獻賢能故須就先生而謀賔介禮重對此不獻賢能爲輕故不謀賔也云今郡國行此禮以季春者漢時雖無諸侯國而置郡爲守其王之子弟猶名國其君曰相故鄭注禮記云如令從太守相臨之禮是也引之者證時節與周異也云周禮至衆庶皆周禮郷大夫職文引之者證此郷射中兼有郷大夫行射禮故有射于堂及兕中之事云五物者案彼云一曰和二曰容三曰主皮四曰和容五曰興舞鄭注云和載六德容包六行也庶民無射禮因田獵分禽則有主皮主皮者張皮射之無侯也主皮和容興舞則六藝之射與禮樂與當射之時民必觀焉因詢之也是也鄭云和載六德者和是六德之下六德大故舉下以載上也容爲孝者人有孝行則性行含容故以孝爲容孝是六行中之大故舉上以包下故云容包六行也云主皮六藝之射者但六藝中射揔言諸射不專據主皮但三物敎萬民射唯有主皮此詢衆庶不兼士巳上故以主皮爲六藝之射以和容爲禮者禮之用和爲貴又行禮有容儀是以漢時謂禮爲容故以禮爲和容也以樂爲興舞者爲樂必興舞故興舞以表樂也若然六德與六行在身所有故可舉少以兼多六藝施於外非獨身所行不可舉一以包六但六者之中御與書數三者於施化民爲緩故特舉禮樂與射而言之鄭以主皮和容興舞非射及禮樂之正名故云乎以疑也注退還至射事釋曰射宫者郷庠州序是也知省録射事者即下文云乃張侯之等是也下言飲酒之事知不爲飲酒事者以飲酒者止爲射事故以射爲主也無介注雖先至禮略釋曰鄭云雖先飲酒者自此巳下先言飲酒獻後乃射以是禮記射義云古者諸侯之射也必先行燕禮卿大夫士之射也必先行郷飲酒之禮是也但郷飲酒之禮有介一人以輔賔此無介者主於射序賔之禮略故無介以輔賔也乃席至東上注不言至於序釋曰自此以下至羮定論將射預前設席位尊罍樂懸及張侯之事也云不言於戸牖之閒者此射於序者決郷飲酒在庠以其序無室庠有室此據州長射於序以其無室無戸牖設席亦當戸牖之處耳言東上亦主人在東故席端在東不得以曲禮席南向北向西方爲上因隂陽解之也衆賔至而西注言繼至殊別釋曰甫始也言始欲習衆庶未有所殊別此決郷飲酒三賔之席不屬殊別彼有德之人故各自特不繼有所殊別尊於至東肆注斯禁至陳也釋曰云斯禁禁切地無足者也者案州長是士應言禁制不言者其中兼有卿大夫禮故舉大夫斯禁與郷飲酒同云設尊者北面西曰左尚之也者經云左玄酒據人設尊北面故以西爲左若據酒則以南面爲正地道尊右以西爲右玄酒在右故云尚之若然云左據設尊又云尚之據酒尊也注此縣至無鍾釋曰云此縣謂磬也者對大射縣鍾磬鎛具有也云縣于東方辟射位也者此言決郷飲酒無射事縣于階閒也云但縣磬者半天子之士無鍾者案周禮小胥職云半爲堵全爲肆鄭云鍾磬者編縣之二八十六枚而在一虡謂之堵鍾一堵磬一堵謂之肆半之者謂諸侯之卿大夫士也諸侯之卿大夫半天子之卿大夫天子之卿大夫判縣者東西各有鍾磬爲肆諸侯之卿大夫判縣者分一肆於兩廂東縣磬西縣鍾若天子之士特縣者直東廂有鍾磬二虡爲一肆諸侯之士分取磬而巳縣於東方爲特縣故云無鍾對大夫及天子士有鍾若然此旣兼郷大夫詢衆庶當爲判縣冝有鍾而揔云無鍾者方以禮樂化民雖大夫亦同士特縣也若郷飲酒方賔卿人之賢者從士禮也其天子諸侯鍾磬鎛具卿大夫天子士巳下亦無鎛知者以其諸侯卿大夫士半天子卿大夫士若有鎛添鍾磬爲三半不得故知卿大夫巳下皆無鎛也乃張至地武注侯謂至數焉釋曰此巳下論預張侯之事鄭知侯用布案下記云獸侯大夫士皆言布侯則餘賔射大射其侯皆用布此郷射采侯二正亦用布可知云綱持舌繩也者周禮梓人云上綱與下綱出舌㝷縜寸焉注云綱所以繫侯於植者也故云綱持舌繩也云武迹也中人之迹尺二寸者無正文蓋目驗當時而言似云中人定扼圍九寸也漢禮云五武成歩歩六尺或據此而言也云侯象人者案鄭注梓人云上下皆出舌一㝷者亦人張手之節也以其張侯之法下兩舌半上舌兩頭綱皆出一㝷即是上廣下狹象人張足六尺張臂八尺故云象人也云綱即其足也者謂經下綱象足云是以取數焉者以下綱象足張之六尺是取數於武也不繫至束之注事未至也釋曰案下記云東方謂之右个注云侯以向堂爲面也則此左下綱以西畔而言云中掩束之者案記云郷侯一丈倍中以爲躬躬二丈倍躬以爲左右舌舌四丈兩舌各出一丈又云下舌半上舌則左右各出五尺今將此五尺與下綱不繫者中掩左廂向東待將射乃解之故云事未至也乏參至五歩注容謂至三丈釋曰乏參侯道者謂三分侯道云居侯黨之一者黨旁也謂在侯西北邪向之故以旁言之其居旁之一者謂侯道内三分之居一分之地十丈也云西五歩者據侯之正北落西有五歩即三丈也云容謂之乏者案周禮射人職云王以六耦射三侯三獲三容五正彼據王三侯有三容容者以革爲之可以容身故云容也云乏者謂矢於此匱乏不去故云乏也云獲者御矢也者謂唱獲者恐矢至身故云獲者御矢也云侯道五十歩者記云郷侯五十弓弓之下制六尺與歩相應故鄭云歩也云此乏去侯北十丈者五十歩計之歩六尺五十歩則三十丈三分取一爲十丈云西三丈者經云西五歩五六三十故云三丈也逺近如此者一得避矢一得去堂二十丈聞唱獲聲是其節也羮定注肉謂至可食釋曰云謂狗孰者此與郷飲酒同亨狗於東方是也主人至再拜釋曰自此至當楣北面荅再拜論主召賔從已之事此主人與賔俱朝服案郷飲酒賔主俱不言服者以彼賔禮重故戒與速賔俱朝服故不言此習禮輕是故戒時玄端召時乃朝服故須言之也必此戒時玄端者見公食大夫云賔朝服即位于大門外如聘注云於是朝服則初時玄端冝與彼同皆是戒時不言服後速時朝服故知此亦戒時玄端矣且郷飲酒戒速俱不言服知皆朝服者下記云郷朝服而謀賔介是也云今郡國巳下引之者欲見與周異也賔及至再拜注相主至命者釋曰郷飲酒云賔及衆賔皆從之彼兼介故云皆此無介故不言皆也云主人一相出迎于門外注與郷飲酒同此亦主人自迎而言一相者使之傳賔言兼相禮也揖衆賔注差卑禮冝異釋曰此賔與衆賔同是郷人無爵者而云差卑者唯據立爲賔者尊衆賔即不爲卑不論有爵無也云禮冝異者賔則拜之衆賔則揖之是其異也主人至先入注以猶至西面釋曰云以猶與者案左氏傳云蔡人以呉子與楚人戰于伯舉彼以者能東西之曰以以謂驅使前人之稱此言嫌有驅使之稱故以爲與謂主人與賔是以爲平敵之義故須訓之云先入入門右西面者此注亦與郷飲酒同以其賔入東面故西面待之賔厭至少進注引手至衆賔釋曰此經亦與郷飲酒同此云賔少進彼亦冝然不言者文不具也主人至賔升注三讓至難也釋曰言皆行者賔主旣行衆賔亦行故云皆行郷飲酒亦皆行不言者文略也知主人先讓於賔者以其主人之法先升導賔賔後升進冝難禮之常法故知主人先讓賔也此先升一等禮之常燕禮君升二等者尊君故也注主人拜賔至此堂釋曰知拜是拜至者郷飲酒義云拜至拜洗公食亦云當楣北嚮再拜故知拜是拜至主人至以降注將獻賔也釋曰自此至主人阼階上荅拜論主人獻賔之事凡取爵于篚以降者皆是上篚郷飲酒不言上者文略也賔對注對荅釋曰郷飲酒注云賔主之辭未聞此不注從可知注疑止至之色釋曰郷飲酒注疑讀爲疑然從於趙盾之疑疑正立自定之貌此言疑止也有矜莊之色二注相兼乃具也注進酒至曰獻釋曰云凡進物曰獻者欲見此賔乃是郷民而巳無尊卑上下猶言獻者此獻直是進物而言獻進之也案周禮玉府注云古者致物於人尊之則曰獻彼據尊敬前人雖卑亦曰獻若齊侯獻捷於魯之類義與此别也注少退猶少辟也釋曰郷飲酒文與此同注云少退少辟又下文云賔少退注云少退逡巡義亦與此同注賔升降由下也釋曰凡席升由下降由上下文降席不由上者以主人在東敬主人不得降由上又於席西拜便使升降皆由下故云賔升降由下也注卻左至爲末釋曰鄭皆約郷飲酒知之也賔以虚爵降注將洗以酢主人釋曰自此至賔西階上荅拜論賔酢主人之事郷飲酒不言虚爵直云降洗此直云虚爵降不言洗互見爲義相兼乃具也注從賔至東序釋曰皆郷飲酒文也注賔北至外來釋曰對主人自内出南面是也上文主人坐取爵適洗南面是也注反位至洗進釋曰云反位從降之位也者即上東序之西南面位云主人辭洗進者經直言反不言進鄭以言反位由前進乃反位故鄭却本之主人辭洗進也賔卒至初升釋曰言如初則亦一揖一讓也注自由至便也釋曰鄭知義然者亦約郷飲酒得知也主人坐奠爵于序端釋曰奠爵于序端此擬下獻衆賔故云取爵于序端與郷飲酒同也主人至以降注將酬賔釋曰自此至當西序論酬賔之事注以將酌已釋曰鄭言此者前不辭洗主人自飲至此辭洗以將酌已故辭也注賔辭至酌已釋曰此射前獻時親酌已今復親酌已主人阼階上拜送注酬酒不舉釋曰郷飲酒注引曲禮不盡人之歡之事此不言亦從鄭注可知主人至壹拜注三拜至能並釋曰云三拜示徧也者衆賔無問多少止爲三拜而巳是示徧也云一拜不備禮也者衆賔人皆一拜是拜不備禮此亦荅大夫拜法以其此禮中含卿大夫法若荅士拜則亦再拜見於特牲也云獻賔畢乃與衆賔拜者自爾來唯與賔拜未與衆賔拜今始拜之故云敬不能並主人至三人注長其至有乎釋曰衆賔之長升拜受者三人此雖非賔賢能其衆亦三人在堂上與郷飲酒數同其堂上衆賔無定數故鄭云言三人則衆賔多矣云國以多德行道藝爲榮者案周禮大司徒以郷三物敎萬民一曰六德二曰六行三曰六藝此旣郷人則德行亦據六德六行道藝則六藝也此並與郷飲酒賔介與衆賔之類並來與在射中是以孔子射於矍相之圃觀者如堵牆彼亦據孔子爲郷大夫習人以禮樂之射至於誓之於後僅有存焉亦無常數之事也主人拜送注拜送至賔右釋曰知在衆賔右者約郷飲酒獻衆賔皆於西階上賔右知之也坐祭至復位釋曰此還上三人者降復賔南東面位衆賔至立飲注自第至彌略釋曰此謂堂下衆賔無數者故鄭云自第四以下云又不拜受爵禮彌略者三賔雖坐祭立飲不拜旣爵仍拜受此衆賔非直坐祭立飲不拜旣爵又不拜受爵故云禮彌略也每一至其席釋曰此還據堂上三人有席者故云薦諸其席謂席前也衆賔辯有脯醢注薦於其位釋曰還據堂下無席者故鄭云薦於其位不席也揖讓至就席釋曰自此以下至舉觶者降論旅酬之事一人洗舉觶於賔注一人主人之吏釋曰主人之吏亦謂府史以下非屬官也注不授賤不敢也釋曰以其是主人之吏旣賤故不敢親授奠之也注若親受然釋曰云若親受然者賔辭即坐取以興故云若親受然也舉觶至舉觶者降釋曰云反奠于其所者還於薦西以其射後賔北面舉之爲旅酬故不奠于薦東也大夫至門左注謂此至爲僎釋曰云大夫若有遵者言若者或無不定故云若也鄭知是當郷大夫者以其郷射旣與人行射禮而言大夫者當郷大夫可知云其士也於旅乃入者下記云士旣旅不入明未旅閒皆得入是以未旅而射其士皆在也知郷大夫士非郷人禮亦然者以其同是郷大夫士禮無異故也但異郷不助主人樂賔爲别也主人降注迎大至於賔釋曰鄭知迎大夫於門内者以其上文大夫入門左此經直云主人降不云出故知迎大夫在門内可知賔及至初位注不敢至東面釋曰知初位門内東面者上文賔厭衆賔皆入門左東面北上故知也主人至尊東注尊東至尊也釋曰上云尊於賔席之東則在尊西今大夫言席於尊東明爲賔夾尊可知云不言東上統於尊也者席於尊東繼尊而言又不言東上西上是以下云大夫降席東南面降由下故知西上統於尊也升不至加席注辭之至重席釋曰云升不拜洗者以大夫尊故不拜洗也云反位者大夫反西階上位云主人大夫之右拜送者謂在大夫之東拜送爵也云辭之者謙不敢以已尊加賢者郷射之禮郷人爲賔下記云若大夫與則以公士爲賔亦選賢者爲之故辭加席又不以已尊加賢者也云不去者大夫再重席正也者郷飲酒云公三重大夫再重故知大夫再重席禮之正也云賔一重席者郷人故一重縱公士爲賔亦一重也乃薦至荅拜注凡所至東方釋曰云凡所謂經中三事以其殺於賔若然上云不拜洗亦是殺於賔之類也云大夫升席由東方者以其大夫席西上升由下故知大夫升席由東方也大夫降洗注將酢至乃酢釋曰自此至皆升就席論大夫酢主人訖賔主皆升就席之事知大夫若衆則辯獻長乃酢者此經據一大夫而言故獻大夫即酢案有司徹主人洗爵獻長賔于西階上然後衆賔長升拜受爵宰夫賛主人酌若是以辯乃升長賔主人酌于長賔西階上北面賔在左注云主人酌自酢序賔意賔卑不敢酢賔尸與凡平飲酒禮同可以相叅亦是辯獻長乃酢也主人至人盥注盥者至不敢褻釋曰云盥者雖將酌自飲者以其下文大夫洗爵升受主人爵是主人酌以自酢故云雖將酌自飲云不敢褻者決有司徹主人自酌不盥是此爲尊大夫雖自酢亦不敢褻也揖讓至揖降注將升賔釋曰云主人坐奠爵於西楹南者前獻賔賔酢主人主人飲酢訖奠爵于東序端將後獻衆賔不得奠于篚中此受大夫酢不奠于篚者爲士於旅乃入擬獻士故奠爵于此也大夫至賔南注雖尊至正禮釋曰大夫尊在堂則席之于尊東特尊之今降而在賔下者欲使賔主相對行禮若在北北則妨賔主揖讓之正禮故云不奪主人之正禮席工至其西注言少至射位釋曰自此至告于賔論作樂之事云席工者謂爲工設席下文乃升席也云言少東者明樂正西側階者旣言席工于西階上少東則在西階東矣復云樂正立于其西則近席西其言從近故知樂正側近西階東則不欲大東辟射位大射亦同此注燕禮注亦然者燕亦容有射法郷飲酒工位與此同注不言者不射故也工四至乃降釋曰云四人二瑟則是二人歌可知經不言相歌二人者以其空相亦與瑟者同故不言直言瑟之難者也注瑟先至西方釋曰云瑟先賤者先就事也者案大射太師少師歌衆工瑟是知瑟者賤也凡工者皆先瑟後歌是賤者先即事故序亦在前若然得獻亦在前以隨其先後而取之故也云鼓在前變於君也者郷射與大射相對大射君禮而後首此臣禮前首故云變於君燕禮與郷飲酒相對是以燕禮面鼓又與郷飲酒後首相變云執越内弦右手相者案郷飲酒注云内弦側擔之者據瑟體而言燕禮注云内弦弦爲主者據弦體而說此言内弦右手相由便語異義同也云前越言執者内有弦結手入之淺也者瑟體首寛尾狹内越孔雖長廣狹亦等但弦居瑟上近首鼓處則寛近尾不鼓處并而狹側持之法近鼓持之入則近手入則深是以通與燕禮言面鼓則云執之手入淺也大射與郷飲酒言後首則云挎越手入深故也云相者降立西方者其相者是弟子位在西者是以下文云樂正適西方命弟子賛工遷樂于下故知此相工是弟子故降立還於西方也笙入至西面注堂下至西面釋曰云堂下樂相從也者案上文云縣于洗東北西面此云立于縣中明是堂下相從皆在東方也云縣中磬東立西面者謂在磬東當磬之東鄭知不在磬西西面者若磬西西面則笙者背磬不可故知在磬東西面也乃合至采蘋釋曰言乃者以其作樂之法先歌後乃合樂今不歌不笙不閒唯合樂故言乃以見非常故也注不歌至歌之釋曰據郷飲酒燕禮作樂有四節今不歌不笙不閒唯有合樂故云志在射略於樂也云合樂者周南召南之風郷樂也者上注巳云頌及大雅天子樂小雅諸侯樂此二南郷大夫樂但郷飲酒郷射是大夫士爲主人故大夫士樂爲郷樂者也云不可略其正也者二南是大夫士之郷樂已之正樂故云不可略其正者也云昔大王巳下於郷飲酒注巳說義具於彼此注略言之耳若然者燕禮與郷飲酒文同注又與燕禮不異者以其郷射與郷飲酒同是大夫士禮卿大夫士行射禮先行郷飲酒禮郷飲酒與郷射自爲首尾故郷飲酒注具於此略言燕禮是諸侯禮天子諸侯射先行燕禮則燕禮與大射自爲首尾是以燕禮歌笙閒合鄭亦具注之大射又略言之也工不至歌備注不興至略也釋曰言正歌者升歌也升歌鹿鳴是上歌諸侯樂非已正樂故以二南爲正歌也言備者凡作樂皆三終此備明亦三終也云不興者瞽矇禮略也者以工告樂正以卑告尊當興今以瞽矇無目不可責其備禮故不興者於禮略也樂正至乃降注樂正至北面釋曰言告于賔者作樂主爲樂賔今歌備故告賔言歌備也言樂正降者堂上正樂畢也者以其郷飲酒燕禮但升歌笙閒合樂皆是正歌今略去升歌笙閒三者唯有合樂於堂上故云堂上正樂畢也云正樂者對後無筭樂非正樂也下射雖歌騶虞亦是堂下非堂上故以堂上決之也云降立西階東北面者此無正文約堂上樂正位在西階東北面今降亦當在西階東北面也主人至之洗注尊之至大師釋曰自此至及升席論主人獻工笙之事但天子諸侯官備有大師少師瞽人作樂之長大夫士官不備不合有大師君有賜大夫士樂器之法故春秋左氏云晉侯歌鍾二肆取半以賜魏絳魏絳於是乎始有金石之樂禮也時以樂人賜之故鄭云君賜大夫樂又從之以其人謂之大師也賔降主人辭降注大夫不降尊也釋曰云大夫不降尊也者此賔降大夫若降直與賔共文今不言大夫降郷飲酒亦云賔介不言大夫降明大夫皆不降以其尊故也工不至受爵釋曰此言工不辭洗及一人拜受爵皆上大師也不言大師言工一人者欲見有大師則大師不辭洗拜受爵若無大師則凡工不辭洗拜受爵故變言工與一人假令大師左瑟先獻若歌則後獻亦先獻工一人是以鄭云一人無大師則工之長者以郷飲酒獻工時云一人不興受爵注云一人笙之長者也大師爲歌者未得獻先獻瑟工之長者也主人至相祭注人相者釋曰云人相者則弟子相之旣相工明祭亦相之可知工飲至不祭注祭飲至坐飲釋曰云工飲不拜旣爵者還是上一人拜受爵者雖不拜旣爵仍拜受也下衆工又對上一人拜受爵衆工不拜受爵也鄭云祭飲不興受爵坐祭坐飲者對上賔主坐祭立飲故云坐祭坐飲亦不拜旣爵可知也不洗至階上注不洗至洗也釋曰云衆工而不洗矣而著笙不洗者笙賤於衆工正君賜之猶不洗也鄭云此者欲見工在上貴君賜之大師爲之洗笙賤位在下正謂君賜之笙人猶不爲之洗況衆笙乎欲取賜笙人不爲之洗之意不取衆笙不爲洗也笙一至于篚釋曰此經揔獻笙人雖賤中亦有尊卑故一人升階受爵餘者不升不拜旣爵則同也反升就席注亦揖至皆升釋曰云亦揖讓以賔升衆賔皆升者謂亦前大夫若有遵者則入門左主人降賔及衆賔皆降主人共大夫行禮訖主人揖讓以賔升大夫及衆賔皆升就席相似故云亦若然上賔降時雖不言衆賔降衆賔卑從降可知故今從賔升也主人至南方注禮殺由便釋曰自此盡未旅論立司正之事也云禮殺由便者對上文主人受酢爵時禮盛故主人降席自北方啐酒於席末亦然今此立司正禮殺故降席自南方故云禮殺由便也側降注賔不從降釋曰側降猶特降故云賔不從降也作相至荅拜注爵備至之史釋曰云爵備者謂賔及衆賔與尊者并工笙並得獻是爵備也云樂畢者合樂訖是樂畢以無升笙與閒故不言樂成而云畢而巳也云將留賔以事者下有射事射訖行旅無筭之事故須立司正以監之但中閒爲射繫變司正爲司馬射訖反爲司正以監察儀法也引詩者證監與正爲一物皆察儀法也主人至主人注洗觶至楹北釋曰云受命于主人者謂受主人請安賔之命是以下云請安于賔鄭注云傳主人之命也司正至少立注奠觶至退立釋曰此云北面坐奠觶郷飲酒亦然者此二者皆臣禮故北面奠觶燕禮大射皆司正南面奠觶者彼是君禮欲取還不背君故南面奠觶故大射云南面坐奠觶興右還北面少立坐取觶興坐不祭卒觶奠之興再拜稽首左還南面坐取觶洗南面反奠于其所北面立注云皆所以自昭明於衆也將於觶南北面則右還於觶北南面則左還如是得從觶西往來也必從觶西往來者爲君在阼不背之也又取威儀多此及郷飲酒在阼非君直北面奠觶又威儀簡故也與少至觶南注立觶至擯位釋曰云立觶南亦其故擯位者案上未有擯位此立擯位者案射禮云擯者退中庭是擯者在中庭有位燕禮大射皆擯者爲司正則此郷射及郷飲酒云作相爲司正相即擯者也故知觶南者中庭故擯位也未旅注旅序至終也釋曰旅衆也而言序者謂衆以次序相酬必於未旅而射者旅則醉禮終恐不得射故於未旅而射也此大夫士禮將射先行郷飲酒行旅酬而巳故射前未旅而射後乃始行旅酬燕禮大射國君禮故先行燕禮雖行一獻以其辨尊卑故行四舉旅大射主爲射故再拜訖即射燕禮主爲燕故三舉旅乃射彼皆與此不同也三耦至東上注司正至於此釋曰自此巳下盡樂正北面立于其南論三畨射事鄭知司正旣立司射即選弟子之中爲三耦俟事於此者經云俟於堂西明此時始選故知旣立司正司射乃選弟子使俟事於此也故記云三耦者使弟子司射前戒之注云弟子賔黨之少者也前戒謂先射請戒之司射至請射注司射至作接釋曰云司射取弓于階西兼挾乗矢者以其司射之弓矢豫陳於西階故司射於堂西袒決遂訖即取弓矢於階西是以下記云司射之弓矢與扑倚于西階之西是也云有司請射者此有司謂司馬故大射云司射自阼階前曰爲政請射注爲政謂司馬司馬政官主射禮諸侯之州長無司馬官直言有司請射以比司馬也云司射主人之吏也者大射諸侯禮有大射正爲長射人次之司射又次之小射正次之皆是士爲之則此大夫士禮不得用士故知是主人之吏爲之可知云於堂西袒決遂者主人無次隱蔽而巳者此對大射人君禮有次在東方不須適堂西也云袒左免衣也知袒左者凡事無問吉凶皆袒左是以士喪主人左袒此及大射亦皆袒左不以吉凶相反唯有受刑袒右故覲禮云乃右肉袒于廟門之東注云右肉袒者刑冝施於右是也云決猶闓也以象骨爲之者大射注亦然案繕人云掌王之用弓弩矢箙矰弋決拾鄭注云士喪禮決用正王棘若檡棘則天子用象骨與無正文故引士喪禮又言與以疑之若然諸侯及大夫生用象死用棘天子無問死生皆用象者蓋取其滑也云著右大擘指以鉤弦闓體也知者以右巨指鉤弦故知著於右大擘指也以右擘著極是以大射云朱極三注云以朱韋爲之三者食指將指無名指是也云遂射韝也以韋爲之以遂弦者也者大射注亦云遂射韝也以朱韋爲之著左臂所以遂弦也云其非射時則謂之拾拾斂也所以蔽膚斂衣也者此篇及大射將射云袒決遂射訖則云說決拾於公雖射亦謂之拾故大射云公就物小射正奉決拾以笥大射正執弓皆以從於物彼亦臨時而云拾以公射袒朱襦言拾以見斂衣故變文以見義也云所以蔽膚斂衣也者言蔽膚據士斂衣據大夫巳上是以下記大夫與士射袒薫襦燕禮記云君射袒朱襦若對君大夫亦與士同亦蔽膚也云方持弦矢曰挾知者下記云凡挾矢於二指之閒橫之是言其方可知引大射挾乗矢於弓外見鏃於弣是其方也若側持弓矢則名執故下文云司射猶袒決遂左執弓右執一个兼諸弦面鏃注云側持弓矢曰執面猶尚也并矢於弦尚其鏃是也云乗矢四矢也者下云司射搢三挾一个又詩云四矢反兮是四矢曰乗凡物四皆曰乗也引大射者欲見挾爲方持弦矢賔對至許諾注言某至巳下釋曰二三子謂衆賔以下者謂除三耦之外通射者而言故云謂衆賔以下也若然投壷禮賔固辭乃許者彼因燕而爲之再辭乃許此爲衆習禮不專爲已故一辭即許大射不請者彼爲擇士而射故不須云許直告射節而巳此爲衆庶習禮故云爲二三子許諾亦一辭而許也司射至射器注弟子至西面釋曰鄭知弟子是賔黨之年少者以其賔黨西方東面今以西面命之明是賔黨是以鄭云賔黨東面主人之吏西面也言弟子故知少者知射器弓矢以下者並案下文所陳用者知之也云賔黨東面主人之吏西面者案投壷賔黨及主黨皆爲弟子皆得與投壷者彼燕法主歡心故皆與今此射與郷人習禮郷飲酒同上下經文黨皆不與也乃納至其上注上堂至北括釋曰云賔與大夫之弓倚于西序矢在弓下北括衆弓倚於堂西矢在其上者以其序在堂上故矢在弓下堂西矢在堂上隨其弓在堂下隨其所冝而巳云上堂西廉者以其在堂西故矢在上者還在堂上之廉稜也云矢亦北括者其在堂上西序者北括故知堂下者於上亦北括也主人至序東注亦倚至北括釋曰上賔大夫弓矢在西序矢在北括此主人弓矢如上也司射至子射注比選至於子釋曰言遂以者司射因上階前令弟子納射器不釋弓矢遂比三耦因曰遂故云遂以也云比選次其才相近者也者才雖各自用乃因選其力相近爲冝也司正爲司馬注兼官至無事釋曰言兼官者若以諸侯對大夫大夫兼官諸侯具官特以諸侯對天子天子具官諸侯兼官各有所對故云兼官云由便也者使司正爲司馬不煩餘官也案射義云孔子射於矍相之圃射至於司馬使子路執弓矢出延射又使公罔之裘序點揚觶而語但此篇是州長春秋習射法兼士有郷大夫三年貢士之後以五物詢衆庶射於庠郷大夫五物詢衆而引孔子射于矍相之事則孔子魯之郷大夫也以其天子郷卿大夫爲之諸侯郷大夫使下大夫爲之是其差也但郷飲酒之禮二人舉觶爲無筭爵據此篇未旅先射射訖行旅酬酬訖乃始二人舉觶爲無筭爵未射時詢衆庶得使公罔之裘序點二人揚觶者揚觶實在射後一酬訖始行之今孔子詢衆庶之時借取無筭爵時於旅也語故使公罔之裘序點二人揚觶以詢衆庶此篇司射但執弓矢子路亦執弓矢則子路爲司射也射於矍相時云射至司馬此文又云司正爲司馬則使子路詢衆庶時當此節也司馬至下綱注事至也釋曰上張侯時不繫左下綱中掩束之今弟子說其束不致地遂繫左下綱於植事至故也司馬至侯中注爲當至名之釋曰案下記云司馬階前命張侯遂命倚旌以記言之司馬命張侯與命倚旌其事相因故云遂明同是西階前也云爲當負侯也者下云司馬命獲者執旌以負侯是也知獲者亦弟子者堂下位主人之黨在東賔弟子在西下云獲者由西方坐取旌倚于侯中言由西方是賔黨弟子可知亦上張侯者也云以事名之者以其唱獲故名獲者也弟子至上坐注笴矢幹也釋曰言如初入者亦如上升堂時相者亦在左何瑟面鼓内弦右手相如入升時也云笴矢幹也者案矢人注矢幹長三尺是去堂九尺也樂正至其南注北面至序也釋曰云不與工序也者工西面北上以南北爲序樂正北面則東西爲列故云不與工序也儀禮䟽卷第十一
