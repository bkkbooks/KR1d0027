  text: 儀禮疏卷第四十一
  hash: sha256:d7fbb298b499ee2ec0917bda45413da871f04e0975a844b622e61fac9aa3f05e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_035-1a}
body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彥等撰設棜至如之注棜今至角柶釋曰自此盡出室論陳大小斂奠記經不備之事云角觶四木柶二為夕進醴酒兼饌之也者以其大小斂之奠皆有醴酒醴一觶又用一柶酒用一觶計醴酒但用二觶一柶矣而觶有四柶有二者朝夕酒醴及器別設不同器朝夕二奠各饌其器也云豆籩二以併則是大斂饌者以其小斂一豆一籩大斂乃有二豆二籩故知二謂大斂饌云記於此者明其他與小斂同陳者鄭意大斂饌不在大斂節內陳之而在小斂節陳之者以其陳此籩豆之外皆與小斂同故就小斂節內陳之取省文之義也云同陳者謂多少同陳不謂大斂饌陳之亦在小斂節內也凡籩至巾之注籩豆至不巾釋曰云實具設皆巾之者謂於東堂實之於奠設之二處皆巾故云皆巾之云籩豆偶而為具具則於饌巾之巾之加飾也者此鄭指解大斂之實饌於堂東之時巾之加飾對小斂之實於堂東不巾不加飾云明小斂一豆一籩不巾者以其云籩豆具據大斂奠二豆二籩實與奠二處皆巾明小斂奠一豆一籩堂東饌時不巾若然小斂奠設于牀東巾之為在堂經久設塵埃加故雖一豆一籩亦巾之即禮記檀弓云喪不剝奠也與祭肉也與以其有牲肉故也觶俟至建之注時朝至逮日釋曰言此者記人恐饌時巳酌於觶故記云俟時而酌也引檀弓者謂時是朝夕之時必朝奠待日出夕奠須日未沒者欲得父母之神隨陽而來故也小斂辟奠不出室注未忍至去之釋曰云未忍神逺之也者釋奠不出室之義始死猶生事之不忍即為鬼神事之故奠不出室云辟襲奠以辟斂者以經云小斂辟奠故知辟襲奠只為辟斂也云既斂則不出於室設於序西南者又解襲奠不出室若將大斂則辟小斂奠於序西南此將小斂辟奠于室至於既小斂則亦不出於室設于序西南故言不出室若然奠不出室為既斂而言也云事畢而去之者斂事畢奉尸夷于堂乃去之而設小斂奠于尸東無踊節注其哀未可節也釋曰自死至此為節賔主拾踊有三者三有踊節而云無踊節者除三者三之外其間踊皆無節即上文踊無算是也云其哀未可節也亦謂三者三之外無踊節而言也既馮至布帶注衆主至以下釋曰小斂于戶內訖主人袒髺髮散帶垂經不云絞帶及齊衰以下布帶事故記者言之案喪服苴絰之外更有絞帶鄭注云絰象大帶又有絞帶象革帶齊衰以下用布齊衰無等皆是布帶也知衆主人非衆子者以其衆子皆斬衰絞帶故知衆主人齊衰以下至緦麻首皆免也大斂于阼注未忍至賔之釋曰經大斂時直云布席如初不言其處故記云大斂于阼阼是主人位故鄭云未忍便離主人位也云主人奉尸斂于棺則西階上賔之者喪事所以即逺斂訖即奉尸斂于棺賔客之故檀弓云周人殯于西階則猶賔之是也大夫至東上注視斂釋曰知視斂者以其文承大斂下故知大夫升為視斂也既馮至復位注中庭西面位釋曰知大夫位在中庭西面者上篇朝夕哭云主人入堂下直東序西面卿大夫在其南卿大夫與主人同西面向殯故知大夫位在中庭西面也巾奠至北東注巾奠而室事巳釋曰上篇大斂奠時直云乃奠燭升自阼階無執燭降由主人之北故記人言之云由主人之北東也云巾奠而室事巳者既巾訖是室事巳故執燭者出也既殯主人説髦注既殯至未聞釋曰自此盡乘車論孝子衣服飲食乘車等之事云既殯置銘于肂復位時也者案上篇云主人奉尸斂于棺乃蓋主人降拜大夫之後至者北面視肂卒塗祝取銘置于肂主人復位云復位者從西階下復阼階下位也凡説髦尊卑同皆三日知者喪大記云小斂主人即位于戶內乃斂卒斂主人馮之主人袒説髦髺髮以麻注云士既殯説髦此云小斂蓋諸侯禮也士之既殯諸侯之小斂於死者俱三日也是尊卑同三日也必三日説髦者案禮記問喪云三日而不生亦不生矣以髦是子事父母之飾父母既不生故去之云今文説皆作稅者此説及下經不説絰帶二字皆作稅凡釋今古之文皆在注後此在注中者以其釋經義盡者於注末言之以文更有義者釋今古字訖乃更泛説即此注巳解今古字訖更釋髦義是也云兒生三月鬋髮為鬌男角女羈否則男左女右者內則文彼注云夾囟曰角午達曰羈引之者證髦象幼時鬌之義故云長大猶為飾存之謂之髦所以順父母幼少之心是以舜年五十不失孺子之心者也云髦之形象未聞者案詩云髧彼兩髦鄭云髦者髮至眉子事父母之飾以其云髧髧者垂之貌又云兩髦故以髮至眉解之其狀未聞三日絞垂注成服至垂者釋曰以垂小斂日要絰大功以上散帶垂不言成服之時絞之故記人言之云成服日者士禮生與來日則除死三日則經云三日成服此云三日絞垂之日也小功緦麻初而絞之不待三日也冠六至屬厭注縪謂至伏也釋曰云冠六升者據斬衰者而言齊衰以下冠衰各有差降云縪謂縫著於武者古者冠吉凶皆冠武別材武謂冠卷以冠前後皆縫著於武若吉冠則從武上鄉內縫之縪餘在內謂之內縪若凶冠從武下鄉外縫之謂之外縪故云外之者外其餘也云纓條屬者通屈一條繩為武垂下為纓屬之冠者吉冠則纓武別材凶冠則纓武同材以一繩從前額上以兩頭鄉項後交通至耳各綴之於武使鄉下纓結之云屬之冠者先為纓武訖乃後以冠屬著武故云屬也云厭伏也者以其冠在武下過鄉上反縫著冠冠在武下故云厭也五服之冠皆厭但此文上下據斬衰而言也衰三升注衣與裳也釋曰經直云衰鄭兼言裳者以其衰裳升數同故經舉衰而通裳但首對身首為尊故冠六升衰三升衰裳同三升也是以吉時朝服十五升至於麻冕鄭亦為三十升布與服一倍而解之屨外納注納收餘也釋曰案喪服斬衰而言此則菅屨也云外納者謂收餘末鄉外為之取醜惡不事飾故也杖下至一也注順其性也釋曰案喪服為父斬衰以苴杖竹為母齊衰以削杖桐桐竹皆下本本謂根本鄭云順其性者謂下其根本順木之性但為父杖竹者義取父者子之天竹性自然圎象天父子自然至孝為母杖桐者義取桐者同也同之於父言至孝同之於父故喪服貶於父非自然之意也居倚廬注倚木至北戶釋曰知在中門外東方北戶者一釋案喪服傳云居倚廬既虞翦屏既練舍外寢鄭彼注云舍外寢於中門之外屋下壘墼為之不塗墍所謂堊室鄭以子夏傳以既練居堊室而言外外為中門外則初死居倚廬倚廬亦中門外可知也東方者以中門內殯宫之哭位在阼階下西面鄉殯明廬在中門外亦東方鄉殯是以主人及兄弟卿大夫外位皆西面云北戶者以倚東壁為廬一頭至地明北戶鄉隂至既虞之後柱楣翦屏乃西鄉開戶也寢苫枕塊注苫編藁塊堛也釋曰孝子寢卧之時寢於苫以塊枕頭必寢苫者哀親之在草枕塊者哀親之在土云苫編藁者案爾雅白蓋謂之苫郭云白茅苫也與此不同者彼取潔白之義此不取潔白故鄭因時人用藁為苫而言編藁云塊堛也者亦爾雅文不説絰帶注哀戚不在於安釋曰云不説絰帶者冠衰自然不説以其絰帶在冠衰之上故周公説經舉絰帶而言也哭晝夜無時注哀至至朝夕釋曰此謂殯後在廬中除朝夕入哭於廬中思憶則哭無時節故鄭云哀至則哭非必朝夕也非喪事不言注不忘所以為親釋曰喪服四制云不言而事行者扶而起言而后事行者杖而起庶人面垢而巳則天子諸侯有臣不言而喪事得行者喪事亦不言大夫士是臣降於君言而事行若然此士禮亦言而事行故於喪非喪事不言也孝經云言不文亦據大夫士也云不忘所以為親者則喪事也是以曲禮云居喪未葬讀喪禮既葬讀祭禮喪復常讀樂章喪事而言亦兼此也啜粥至菜果注不在至曰疏釋曰云不在於飽者案周禮廩人中歲人食三釜注云六斗四升曰釜三釜為米一斛九斗二升三十日之食則日食米六升四合今日食米一溢二升有餘是不在於飽又案檀弓云必有草木之滋焉以為薑桂之謂也彼薑桂為滋味此鄭以菜果為滋味則薑桂之外菜果亦為滋味也云粥糜也者案爾雅饘糜謂粥之稀者故鄭舉其類謂性不能食粥者糜亦一溢米同也云二十兩曰溢為米一升二十四分升之一者依算法百二十斤曰石則是一斛若然則十二斤為一斗取十二斤分之升得一斤餘二斤斤為十六兩二斤為三十二兩取三十兩十升升得三兩添前一斤十六兩為十九兩餘二兩兩二十四銖二兩為四十八銖取四十銖十升升得四銖餘八銖銖為十絫十升升得八絫則是一升得十九兩四銖八絫於二十兩仍小十九銖二絫則別取一升破為十九兩四銖八絫分十兩兩為二十四銖則為二百四十銖又分九兩兩為二十四銖則為二百一十六銖并四銖八絫添前得四百六十銖八絫揔分為二十四分且取二百四十銖分得十銖餘二百二十銖八絫在又取二百一十六銖二十四分分得九銖添前分得十九銖餘有四銖八絫四銖銖為十絫揔為四十絫通八絫二十四分得二絫是一升為二十四分分得十九銖二絫將十九銖添前四銖為二十三銖將二絫添前八絫則為十絫為一銖以此一銖添前二十三銖則為二十四銖為一兩以一兩添十九兩揔二十兩曰溢云實在木曰果在地曰蓏者案周禮九職云二曰園圃育草木鄭云樹果蓏曰圃案食貨志臣瓉以為在地曰蓏在樹曰果張晏又云有核曰果無核曰蓏則此云在木曰果在地曰蓏用臣瓉之義在木曰果棗栗之屬在地曰蓏瓜瓠之屬主人乘惡車注拜君至作堊釋曰云拜君命拜衆賔及有故行所乘也者以其主人在喪恆居廬哭泣非有此事則不行知義然也引雜記者證喪事上下同無別義以其貴賤雖異於親一也故孝經五孝不同及其喪親唯有一章而巳亦斯義也云然則此惡車王喪之木車者案巾車云王之喪車五乘發首云木車蒲蔽是王始喪所乘木車無飾與此惡車同故引之見尊卑同也白狗幦注未成至為幂釋曰案玉藻云士齊車鹿幦此喪車無飾故用白狗幦以覆笭云未成豪狗者爾雅釋畜文也蒲蔽注蔽藩釋曰藩謂車兩邊禦風為藩蔽以蒲草亦無飾也御以蒲菆注不在至作騶釋曰御謂御車者士乘惡車之時御車用蒲菆以䇿馬喪中示不在於驅馳云蒲菆牡蒲莖者案宣十二年楚雄負羈囚知罃知莊子以其族反之廚武子御每射抽矢菆納諸廚武子之房服注云菆好箭又云廚子怒曰非子之求而蒲之愛注云蒲楊柳可以為箭以此而言蒲非直得䇿馬亦為矢幹也犬服注笭間至為大釋曰云笭間兵服者凡兵器建之於車上笭間喪中乘車亦有兵器自衛以白犬皮為服故云以犬皮為之取其堅固也云亦白者幦用白狗皮明此亦用白犬皮也木錧注取少至為轄釋曰其車錧常用金喪用木是取少聲也約綏約轡注約繩至升車釋曰知約是繩者案哀十一年左傳云人尋約吳髮短杜注云約繩也故知此約亦謂繩也平常吉時綏轡用索為之今喪中取其無飾故皆用繩為之也木鑣注亦取至為苞釋曰平常用馬鑣以金為之今用木故知亦取少聲也馬不齊髦注齊翦至車與釋曰此注解文不於末者亦以釋不齊髦訖別記釋車義故也云齊衰以下其乘素車繅車駹車漆車與案巾車王之喪車五乘木車始死所乘素車卒哭所乘繅車既練所乘駹車大祥所乘漆車既禫所乘此士之喪車亦當五乘主人乘惡車齊衰乘素車與卒哭同大功乘繅車與既練同小功乘駹車與大祥同緦麻乘漆車與既禫同主人至卒哭巳後哀殺故齊衰以下節級約與主人同故鄭為此義也若然士尋常乘棧車不革鞔而漆之今既禫亦與王以下同乘漆車者禮窮則同故也主婦至布裧注裧者至垂之釋曰疏布裧在亦如之之下見不與男子同云裧者車裳幃者案衛詩云漸車幃裳注云幃裳童容又案巾車后之翟車有容蓋容則童容也若然則裧與幃裳及容一也故注者互相曉也云於蓋弓垂之者案巾車云皆有容蓋容蓋相將其蓋有弓明於蓋弓垂之也二車白狗攝服注二副至差飾釋曰依正禮大夫以上有二車士卑無二車但以在喪可有副二之車非常法則有兵服服又加白狗皮緣之謂之攝服云狗皮緣服差飾者對主人服無緣此則有緣是差也其他皆如乘車注如所乘惡車釋曰云其他者唯白狗攝服為異其他謂惡車白狗幦以下齊髦以上皆同主人惡車也朔月至奉之注童子至未用釋曰此盡下室論饋奠掃潔之事案曲禮掃地者箕帚俱執此直執帚不執箕者下文掃室聚諸窔故不用箕也云童子隸子弟者案桓二年左傳云士有隸子弟服注云士卑自其子弟為僕隸祿不足以及宗是其有隸子弟也知有內豎及寺人者士雖無臣亦有內外之言寺人奄者以通宫中之命也云示未用者用之則用右手也從徹者而入注童子不專禮事釋曰案論語憲問云童子將命先生並行注引玉藻無事則立主人之南北面皆不專以禮事故從徹者而入也比奠至而東注比猶至之窔釋曰案上文童子從徹者入及此經則從執燭者出者以其入則燭在先徹者在後出則徹者在先執燭者在後童子常在成人之後故出入所從不同也云室中東南隅謂之窔者爾雅釋宫文燕養至他日注燕養至其頃釋曰云燕養者謂在燕寢之中平生時所有共養之事則饋羞湯沐之饌是也如他日者今死不忍異於生平之日也云饋朝夕食也者鄭注鄉黨云不時非朝夕日中時一日之中三時食今注云朝夕不言日中者或鄭略言亦有日中也或以死後略去日中直有朝夕食也知羞四時之珍異者聘禮有禽羞俶獻聘義云時賜鄭云時賜四時珍異故知此羞亦四時珍異也引內則者證經進湯沐亦依內則之日數知下室日設之者言其燕食在燕寢又下經云朔月不饋食於下室明非朔月在下室設之也以其燕養在燕寢中設之可知云進進徹之時如其頃者一如其平生子進食於父母故雖死象生時若一食之頃也朔月至下室注以其至朝事釋曰云以其殷奠有黍稷也者大小斂奠朝夕奠等皆無黍稷故上篇朔月有黍稷鄭注云於是始有黍稷唯有下室若生有黍稷今此殷奠大奠也自有黍稷故不復饋食於下室也若然大夫巳上又有月半奠有黍稷亦不饋食於下室可知云下室如今之內堂者下室既為燕寢故鄭舉漢法內堂況之云正寢聽朝事者天子諸侯路寢以聽政燕寢以燕息案玉藻云朝玄端夕深衣鄭注云謂大夫士也則亦在正寢也筮宅冢人物土注物猶至營之釋曰自此盡不哭論筮宅卜日之事正經筮宅之事不物土故記人言之云相其地可葬者乃營之者凡葬皆先相乃筮之筮吉乃掘坎今直云營之不言筮宅者營之中兼筮故經云筮宅冢人物土是使冢人物土乃筮者也卜日至皆止注事畢釋曰正經直云闔東扉主人哭不云主婦升堂哭者皆止之事故記明之云卜日吉宗人告從于主婦主婦哭時堂上婦人皆哭主婦升堂堂上婦人皆止不哭啓之至不哭注將有至為開釋曰自上皆記士喪上篇事自此以下皆記此篇葬首將啓殯唯言婦人不哭不云男子故記以明之云內外男女不哭止歡嚻故也夷牀至階東注明階至為拱釋曰其夷牀在祖廟輁軸在殯宫以其西階東是同故并言之鄭云明階間者位近西也者以正經直云階間恐正當兩階之間故記人明之是以鄭云明階間者位近西以其柩當殯奠位之處故夷牀在西還當牖輁軸以候載柩故近西皆在西階東云其二廟者於禰亦饌輁軸焉者以其先朝禰故至禰廟一移柩升堂明旦乃移柩于輁軸上載以朝祖廟朝祖廟時下柩訖明日用蜃車輁軸不復更用不饌之故云二廟者於禰亦饌輁軸焉其二至乃啓注祖尊至共廟釋曰自此盡主人踊如初論上士二廟先朝禰奠設及位次之事云其二廟則饌于禰廟者以先朝禰後朝祖故先於禰廟饌至朝設之故也云如小斂奠者則亦門外特豚一鼎東上兩甒醴酒一豆一籩之等也云祖尊禰卑也者欲見上文朝祖時如大斂奠此朝禰如小斂奠多少不同之意也云士事祖禰者揔上士及中下之士而言云上士異廟據此經而言下士共廟據經而言中士亦共廟而唯言下士者略之其實中士亦共廟故祭法者案上經朝祖時既正柩設從奠訖主人降拜賔至於要節而踊故此如之也云不薦車不從此行者案上祖禰共廟者朝廟日即薦車此二廟明日於祖廟薦車馬以其從祖廟行故薦今此禰廟不從此行故不薦也祝及至適祖注此謂至無從釋曰自此盡不煎論至祖廟陳設及贈之事云此謂朝禰明日者以其下文朝祖之時序從如初中有燭若同日則朝祖之時巳自明矣何須更有燭也以此言之則此朝祖與朝禰別日可知故鄭云舉奠適祖之序也云此祝執醴先酒脯醢俎從之巾席為後者此禰奠與小斂奠同小斂奠時云夏祀及執事盥執醴先酒脯醢俎從此經亦祝及執事舉奠明此亦執醴先酒脯醢俎從之此經所云巾席為後云既正柩席升設設奠如初祝受巾巾之者上正經朝祖時正柩于兩楹間訖席升設於柩西奠設如初巾之以經直云巾之無祝受巾知受巾巾之者以上篇設小斂奠訖祝受巾巾之此與小斂奠同明設奠訖祝受巾巾之可知云凡喪自卒至殯自啓至葬主人之禮其變同者主人常在喪位不出唯君命乃出迎及送其變同則此日數亦同以其此二篇薦者啓日朝禰又明日朝祖又明日乃葬與始死日襲明日小斂又明日大斂而殯亦同日主人主婦變服亦同以其小斂主人散帶主婦髽自啓至葬主人主婦亦同於未殯也云序從主人以下者案上注云主人與男子居右婦人居左以服與昭穆為位是也薦乘至于衡注士乘至為膳釋曰此并下車三乘謂葬之魂車云士乘棧車者巾車之文云鹿淺幦謂車前式竪者笭子以鹿夏皮淺毛者為幦以覆式是以詩韓奕云鞟鞃淺幭傳云鞟革也鞃軾中也淺虎皮淺毛也幭覆軾也引玉藻者彼注云犆謂緣也士之齊車與朝車同引之欲證此鹿幦亦以豹皮為緣飾云旜旌旗之屬云云者案司常云孤卿建旜大夫士建物此士而用旜故云亦攝焉云皮辨服者視朔之服者案玉藻云諸侯皮辨以聽朔於大廟鄉黨孔子云素衣麑裘亦是視朔之服君臣同服是以此士亦載皮辨視朔之服也云貝勒貝飾勒者貝水物故以貝飾勒云有干無兵有箙無弓矢明不用者以其干與戈戟兵器及箙與弓矢皆相須乃用今有干無兵有箙無弓矢明死者不用故闕之也道車載朝服注道車至素裳釋曰知道車朝夕及燕出入之車者但士乘棧車更無別車而上云乘車下云稿車此云道車雖有一車所用各異故有乘車道車稿車之名知道車朝夕者案玉藻云朝玄端夕深衣鄭注云謂大夫士也私朝之服春秋左氏傳云朝而不夕據朝君於是有朝無夕若然云朝夕者士家朝朝暮夕當家私朝之車又云及燕出入者謂士家遊燕出入之車案周禮夏官有道右道僕皆據象路而言道又案司常云道車載旞鄭注云王以朝夕燕出入與此道車同則士乘棧車與王乘象路同名道云朝服日視朝之服者案鄉黨云緇衣羔裘是孔子所服鄭注云諸侯視朝之服是君臣同服故玉藻云諸侯朝服以日視朝士之道車而用朝君之服不用私朝玄端服者乘車既載孤卿之旜故道車亦載朝君之服攝盛也云玄衣素裳者士冠禮云主人玄冠朝服緇帶素韠注云不云衣衣象冠色則不云裳裳象韠色可知故云玄衣素裳也稿車載蓑笠注稿猶至衡也釋曰云稿猶散也者案上乘車道車皆據人之乘用為名不取車上生稱則此散車亦據人乘為號知散車以田以鄙之車者案司常云斿車載旌注云斿車木路也王以田以鄙謂王行小小田獵巡行縣鄙此散車與彼斿車同是遊散所乘故與斿車同解若然士亦與王同有以田以鄙者亦謂從王以田以鄙也若正田獵自用冠辨服乘棧車也云蓑笠備雨服者案無羊詩云爾牧來思何蓑何笠彼注云蓑所以備雨笠所以御暑而此并云備雨者非直蓑以御雨笠亦以備雨故都人士詩注云笠所以御雨喪事不辟暑是以并云備雨之服云今文稿為潦者案周禮輪人為蓋鄭云禮所謂潦車謂蓋車與若然彼注此文則為潦車者義亦通矣凡道車稿車之纓轡及勒亦縣於衡者以車三乘皆當有馬有馬則有此三者但記人舉上以明下乘車云纓轡貝勒縣於衡即此三者亦縣於衡可知將載至柩西注將於至設之釋曰經載柩時不云去奠設席之事故記人明之云將於柩西當前束設之者經雖先云舉奠後云降席要須設席乃設奠故云將於柩西當前束設之正經云降奠當前束是也巾奠乃牆注牆飾柩也釋曰正經直云降奠當前束商祝飾棺不云巾奠故記人辨之巾奠訖商祝乃飾棺牆即帷荒與棺為飾故變飾棺云牆也杭木刊注剝削之釋曰刊削也而云剝者木無皮者直削之有皮者剝乃削之故兼言剝茵箸至澤焉注荼茅至御濕釋曰茵內非直用茅秀兼實綏澤取其香知且御濕者以其在棺下須御濕之物故與荼皆所以御濕葦苞長三尺一編注用便易也釋曰言便易者葦草即長截取三尺一道編之用便易故也菅筲三其實皆瀹注米麥至為敬釋曰經直云筲三黍稷麥不辨苞之所用及黍稷生熟故記人明之是以云筲用菅草黍稷皆淹而漬之云未知神之所享者以其鬼神幽暗生者不見故淹而不熟以其不知神之所享故也云不用食道所以為敬者案檀弓云飯用米貝不以食道食道褻則不敬故云不用食道所以為敬也祖還車不易位注為鄉外耳未行釋曰案正經乃祖還乘車道車稿車不辨還之逺近故記人明之雖還車不易本位為鄉外耳還車未行者皆不易位上經未還奉車在階間婦人在堂上還車去階間婦人降堂下若然則是還車易位而云不易位者以其三分其庭為三位車雖去階間猶不離三分其庭一在北之位據大判而言不易位也執披者旁四人注前後左右各二人釋曰前後左右各二人者謂前之左右後之左右則一旁四人兩旁則八人上經鄭注云備傾虧也凡贈幣無常注賔之至所有釋曰正經云公賵用玄纁束帛是贈有常矣上又云賔賵奠幣如初直云奠幣如初不云物色與多少故記人明之以其賔客非一故云凡贈幣無常鄭云賔之贈也云玩好曰贈在所有者詩云知子之來之雜佩以贈之是贈在所有也凡糗不煎注以膏至非敬釋曰正經葬奠直云四籩棗糗栗脯不云糗之煎不故記人明之凡糗直空糗而巳不用脂膏煎和之是以鄭云以膏煎之則褻非敬故云不煎此篇唯葬奠有糗而云凡者記人通記大夫以上唯君至則否注不敢至于堩釋曰正經直云柩至邦門君使宰夫贈不云止柩之事故記人明之引曽子問者彼為日食此為君命雖不同止柩是同故引之證止柩之事車至至東上注道左至在東釋曰正經直云陳器于道東西北上統于壙以其入壙故也不云三等之車面位之事故記人明之以其不入壙故東上不統於壙也云道左墓道東者據墓南面為正故知道左是墓道東也當是陳器之南云先至者在東者以乘車道車稿車三者次第為先後先至謂乘車也必知此車是乘車之等者以其下有柩車故知此是三等者也柩至至載之注柩車至之冝釋曰正經直云柩至于壙屬引乃窆不云柩車斂服載之故記人明之云柩車至壙祝説載除飾乃斂乘道稿車服載之不空之以歸者此解説載謂下棺於地除飾謂除去帷荒柩車既空乃斂乘車皮辨服道車朝服稿車蓑笠三者之服載之於柩車示不空之以歸者也云送形而往迎精而反者禮記問喪文引之證此不空歸之義云亦禮之冝者形往則送之主人隨柩路是也精反則迎之主人隨精而反是亦禮之冝然也故云禮之冝也卒窆而歸不驅注孝子至在彼釋曰此文解上斂服載之下棺訖實土三孝子從蜃車而歸不驅馳而疾者疑父母之神不歸云孝子往如慕反如疑者亦禮記問喪文云孝子往如慕者如嬰兒隨母而啼慕反如疑者孝子不見其親不知精魂歸否故疑之云為親之在彼者謂疑精魂在彼不歸言此者解經不驅之事君視至卒事注為有至忌也釋曰君於士既殯而往有恩則與大斂既布衣君至奠訖乃出不辨不得終視斂之事故記人明之是以經二事皆見於禮而言云君視斂若不待奠加蓋而出者一為君有急事他故是以不得待奠云不視斂則加蓋而至卒事者亦是君有辟忌不用見尸柩是以加蓋乃來云卒事者待大斂訖乃出既正至階間注遂匠至曰輇釋曰正經不云納柩車時節故記人明之既朝正柩於兩楹之間當此之時遂匠納柩車於階間云遂人匠人也者以其周禮有遂人匠人天子之官士雖無臣亦有遂人匠人主其葬事云遂人主引徒役匠人主載柩窆職相左右也者案周禮遂人職云大喪帥六遂之役而致之掌其政令及葬帥而屬六綍及窆陳役注云致役致於司徒給墓上事陳役者主陳列之耳是遂人主引徒也又鄉師職云及葬執翿以與匠師御匶而治役謂監督其事又此遂人與匠人同納車于階間即匠人主載窆與遂人職相左右也云車載柩車者以其此云納車于階間正為載柩若乘車道車之等則當東榮不在階間故知此是柩車也云周禮謂之蜃車者案遂師職云大喪使帥其屬以幄帟先及蜃車之役注云蜃車柩路四輪迫地而行有似於蜃因取名焉是也云雜記謂之團或作輇或作摶聲讀皆相附耳未聞孰正者言或作輇或作摶者皆或禮記別本故云皆相附耳但未知孰正也云其車之輿狀如牀中央有轅前後出者觀鄭此注其輿與輴車同亦一轅為之云設前後輅者正經唯云前輅言前以對後明知亦有後輅云輿上有四周者此亦與輴車同云下則前後有軸以輇為輪者此則與輴異以其輴無輪直有轉轔此有輇輪引許叔重説者案許氏説文云有輪無輻曰輇證此輇無輻也祝饌至巾之注言饌至乃饌釋曰正經直云祖還車及還重訖乃奠如初不云饌處故記人明之祝饌祖奠於主人之南當前輅云則既祖祝乃饌者以其未祖以前柩車鄉北輅在主人之北今云饌于主人之南明知既祖還乃鄉饌之弓矢之新沽功注設之至作古釋曰自此盡篇末論死者用器弓矢粗惡之事以其正經直云用器弓矢不辨弓矢善惡及弓矢之名故記人明之設之冝新者為死者冝用新物云沽示不用者沽謂粗為之有弭飾焉注弓無至為飾釋曰案爾雅云弓有緣謂之弓無緣謂之弭孫氏云緣繫約而漆之無緣不以繫約骨飾兩頭是此弭也詩云象弭魚服是用象骨弓隈既用角明兩頭亦得用故鄭揔云骨角為飾亦張可也注亦使可張釋曰生時之弓有張耳此死者之弓雖不射而沽略亦使可張故曰亦也有柲注柲弓至作枈釋曰柲弓檠者案冬官弓人造弓之時弓成納之檠中以定往來體此弓檠謂凡平弛弓之時以竹狀如弓縛之於弓裏亦名之為柲者以若馬柲然馬柲所以制馬弓柲所以制弓使不頓傷故謂之柲引詩云竹柲緄縢者緄繩也縢約也謂以竹為柲以繩約之此經之柲雖粗略用亦如此故引之為證設依撻焉注依纏至為銛釋曰言依者謂以韋依纏其弦即今時弓􅲌是也云撻弣側矢道者所以撻矢令出謂生時以骨為之弣側今死者用韋云皆以韋為之者謂依與撻皆以韋為之異於生者也有韣注韣弓至為之釋曰知韣弓衣者案月令云帶以弓韣故知韣弓衣也鄭知用緇布為之者此無正文鄭驗當時弓衣用緇布而言也翭矢至短衛注翭猶至其一釋曰言候物而射之者案司弓矢鄭注云可以司候射敵之近者及禽獸鄭君兩注語異義同云骨鏃短衛亦示不用也者案上文沽功鄭云示不用故此亦之云生時翭矢金鏃者此亦爾雅釋器文案彼云金鏃翦羽謂之翭是也此言短羽即翦羽也云凡為矢五分笴長而羽其一者案周禮矢人上陳五矢下乃云五分其長而羽其一故云凡以廣之也案鄭彼注云矢笴長三尺五分羽一則六寸也謂之羽者指體而言謂之衛者以其無羽則不平正羽所以防衛其矢不使不調故名羽為衛志矢至短衛注志猶擬至輕也釋曰云志猶擬也者凡射志意有所準擬故云志猶擬也云習射之矢者案司弓矢鄭注云恆矢之屬軒輖中所謂志以此言之則此恆矢也在八矢之下知是習射矢者以其矢中特輕於習射冝也案六弓唐弓大弓亦授習射者則此矢配唐大也引尚書盤庚者證志為準擬之事輖􅜛者鄭讀輖從􅜛以其車傍周非是軒􅜛之􅜛故讀從執下至云無鏃短衛亦示不用者知此矢無鏃者上經翭矢言骨鏃此經不云鏃故知無鏃示不用也若然翭矢生時用金鏃死用骨鏃志矢生時用骨鏃死則令去之云生時志矢骨鏃者亦爾雅釋器文案彼云骨鏃不翦羽謂之志此志矢是也云凡為矢前重後輕也者案司弓矢鄭注云凡枉矢之制枉矢之屬五分二在前三在後殺矢之屬參分一在前二在後矰矢之屬七分三在前四在後恆矢之屬軒輖中若然前重後輕者據殺矢翭矢枉矢潔矢矰矢茀矢而言引之者證此志是恆矢􅋻矢無前重後輕之義但周禮有八矢唯用此二矢者以其八矢之內翭矢居前最重恆矢居後最輕既不盡用故取其首尾者也儀禮疏卷第四十一
