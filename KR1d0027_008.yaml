body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彥等撰鄉飲酒禮第四鄭目録云諸侯之鄉大夫三年大比獻賢者能者於其君以禮賔之與之飲酒於五禮屬嘉禮大戴此乃第十小戴及別録此皆第四釋曰鄭知此鄉飲酒是諸侯之鄉大夫獻賢能法者案春官小胥掌樂縣之法而云凡縣鍾磬半為堵全為肆注云鍾磬者編縣二八十六枚而在一虡謂之堵鍾一堵磬一堵謂之肆半之者謂諸侯之卿大夫士也諸侯之卿大夫半天子之卿大夫西縣鍾東縣磬士亦半天子之士縣磬而巳今此下唯縣磬而無鍾故以為諸侯鄉大夫也若然謂諸侯鄉大夫是大夫為之亦應鍾磬俱有而直有磬者鄭彼注方賔鄉人之賢者從士禮也故縣磬而巳若然天子鄉大夫賔賢能從士禮亦鍾磬俱有不得獨有磬也知諸侯之鄉大夫非士者案鄉射記云士則鹿中大夫則兕中又經有堂則物當楣序則物當棟則非直州射兼有諸侯鄉大夫以五物詢衆庶行射之禮則知諸侯鄉大夫是大夫為之可知也凡鄉飲酒之禮其名有四案此賔賢能謂之鄉飲酒一也又案鄉飲酒義云六十者坐五十者立侍是黨正飲酒亦謂之鄉飲酒二也鄉射州長春秋習射於於序先行鄉飲酒亦謂之鄉飲酒三也案鄉飲酒義又有卿大夫士飲國中賢者用鄉飲酒四也其王制云習射尚功習鄉尚齒還是鄉飲酒黨飲酒法鄉飲至賔介釋曰自此至介亦如之論鄉大夫與先生謀賔介并戒告之儀主人就先生而謀賔介者謂鄉大夫尊敬之先就庠學者若先生謀此二人道藝優者為賔稍劣者為介注主人至齒也釋曰云賔介處士賢者案玉藻云大夫素帶士練帶居士錦帶弟子縞帶鄭玄以居士在士之下弟子之上解為道藝處士非朝廷之士此處士亦名君子即鄉射禮云徵唯所欲以告於先生君子可也鄭亦云君子有大德行不仕者以其未仕有德自處故名處士君子也云賢者義取鄉大夫之興賢能者而言也云周禮至書數並大司徒職文故彼鄭注云物猶事也興猶舉也民三事教成鄉大夫舉其賢者能者以飲酒之禮賔客之既則獻其書於王矣知明於事仁愛人以及物聖通而先識義能斷時冝忠言以中心和不剛不柔善於父母為孝善於兄弟為友睦親於九族姻親於外親任信於友道恤振憂貧者禮五禮之義樂六樂之歌舞射五射之法御五御之節書六書之品數九數之計引此天子司徒者欲兼諸侯司徒亦使鄉大夫教民以三物教成亦使鄉大夫行鄉飲酒之禮尊之為賔客興舉之也云鄉大夫巳下至於王並周禮地官鄉大夫職文云正月之吉謂周之正月朔日也云受法于司徒者謂六鄉大夫皆於大司徒處受三物教民賔舉之法也云退而頒之于其鄉吏使各以教其所治者吏即州長黨正族師閭胥之等是也云以考其德行察其道藝者德行即六德六行道藝正謂民中有道藝者考察知其優者擬舉之也云及三年大比而興賢者能者大比謂三年大案比戶口之時而興舉之賢者即德行者也能者即道藝者也云鄉老謂三公二鄉公一人云及鄉大夫帥其吏者即帥其鄉吏州長巳下云與其衆寡者即鄉中之人也云以禮禮賔之者以鄉飲酒之禮禮而賔舉之也云厥明獻賢能之書於王者今日行鄉飲酒之禮至其明日獻此賢能之書于王王再拜而受之登于天府也云是禮乃三年正月而一行也者欲見彼是天子鄉大夫法諸侯鄉大夫無文以此約之故云諸侯之鄉大夫貢士於其君蓋亦如此云但無正文故云蓋以疑之也云古者年七十至學焉案略說云大夫七十而致仕老於鄉里名曰父師士曰少師以教鄉人子弟於門孰之基而教之學焉是也云賢者為賔其次為介又其次為衆賔而與之飲酒是亦將獻之以禮禮賔之也者謂據此經諸侯鄉大夫貢士之法亦如天子之鄉大夫貢法故云亦也若據鄉貢一人其介與衆賔不貢之矣但立介與衆賔輔賔行鄉飲酒之禮待後年還以貢之耳案射義云古者天子之制諸侯歲獻貢士注引舊說大國三人次國二人小國一人大國三鄉次國二鄉小國一鄉所貢之士與鄉同則鄉送一人至君所其國有遂數亦同其鄉并有公邑采地皆有賢能貢之而貢士與鄉數同不言遂與公邑采地所貢者蓋當鄉送一人至君所君又揔校德之大小取以貢之縱取鄉外仍准鄉數為定鄉大夫雖行飲酒禮賔之于君其簡訖仍更行飲酒禮賔之於王是易觀盥而不薦鄭注云諸侯貢士於天子鄉大夫貢士於其君必以禮賔之唯主人觀而獻賔賔盥而酢主人設薦俎則弟子也是鄉大夫及諸侯貢士皆行飲酒禮禮賔也云今郡國至之說然者鄭欲解此鄉飲酒貢士法彼漢時所行飲酒禮者是正齒位與此不同之意漢時巳罷諸侯之國而為郡郡有大守而封王子母弟者仍為國故云郡國也云十月行此飲酒禮者謂行此鄉飲酒禮也云以黨正每歲邦索鬼神而祭祀者則禮記郊特牲云蠟者索也歲十二月合聚萬物而索饗之周謂之十二月即夏之十月農功畢而蠟祭也云則以禮屬民而飲酒于序以正齒位者屬聚也謂當蠟祭之月黨正聚民於序學中以三時務農將闕於禮此時農隙故行正齒位之禮則禮記鄉飲酒義云六十者坐五十者立侍六十者三豆七十者四豆八十者五豆九十者六豆年長者在上是正齒位之法也云之說然者漢時十月飲酒禮取此黨正之文而然與此篇鄉飲酒禮異也云此篇無正齒位焉者以其此篇以德行為本而貢之無黨正正齒位法也云凡鄉黨飲酒必於民聚之時者此鄉飲酒必於三年大比民聚之時黨正鄉飲酒亦於大蠟民聚之時也云皆欲其見化知尚賢尊長也者尚賢據此篇鄉飲酒尊長據黨正鄉飲酒也但黨正飲酒以鄉大夫臨觀行禮或鄉大夫居此黨內則亦名鄉飲酒也云孟子者孟子公孫丑篇齊王召孟子不肯朝後不得巳而朝之宿於大夫景丑之家景子譏之曰禮云父召無諾君召不俟駕而行固將朝矣聞君命而遂不果冝與夫禮若不相似然對曰天下有達尊三爵也德也齒也朝廷莫如爵鄉里莫如齒輔丗長民莫如德惡有得其一以慢其二哉是也引之者證鄉大夫飲酒是尚德也黨正飲酒尊長尚齒也爵則於此無所當連引之耳主人至答拜汪戒警至有志釋曰云拜辱出拜其自屈辱至己門也者知賔出門者見冠禮主人宿賔賔出門左鄉射戒賔亦出門故知此亦出門云所為來之事者謂行鄉飲酒之禮也云不固辭者素所有志者不如士相見固辭此禮辭即許者以其主人與先生謀時賔巳知欲貢己又賔以學習德業擬為賔主情意相許是以不固辭為素有志也案冠禮主人先拜賔答拜此賔先拜主人答拜者彼冠禮主人戒同寮同寮尊又使之加冠於子奠重之故主人先拜此則鄉大夫尊矣賔是鄉人卑矣又將貢己冝尊敬主人故賔先拜辱也是以下注云去又拜辱者以送謝之也介亦如之注如戒賔也釋曰言如戒賔者亦如上主人戒賔巳下賔拜辱巳上之事謀賔介及戒亦言賔介意不言衆賔衆賔德劣但謀介時雖不言衆賔亦當謀之故上注兼言其次為衆賔至於戒速之日必當遣人戒速使知但略而不言故下云賔及衆賔皆從之是也鄉飲酒義云主人親速賔及介而衆賔自從之亦據不得主人戒速而為自從也乃席賔主人介注席敷至東面釋曰知夙興往戒歸而敷席不别日者下記云鄉朝服而謀賔介皆使能而不宿戒是同日也鄭知賔介與主人席位如此者案鄉飲酒義云主人者尊賔故坐賔於西北而坐介於西南以輔賔賔者接人以義者也故坐於西北主人者接人以仁以德厚者也故坐於東南而坐僎於東北以輔主人也又云賔必南面介必東鄉介賔主也鄉射云乃席賔南面席主人于阼階上西面以此故知賔主及介其位然也衆賔至屬焉注席衆至各特釋曰鄭知衆賔席在賔席之西者見鄉射云席賔南面東上衆賔之席繼而西此衆賔之席亦當然但此不屬為異耳云皆獨坐明其德各特者鄉射注云言繼者甫欲習衆庶未有所殊别此乃特貢於君故衆賔之席皆不屬焉明三物巳久其德各特故不屬續其席雖不屬猶統賔為位同南面也尊兩至兩壷注斯禁至陳也釋曰凡設尊之法但醴尊見其質皆在房內故士冠禮禮子㛰禮禮婦醴皆在房隱處若然聘禮禮賔尊於東廂不在房者見尊欲與卑者為禮相變之法設酒之尊皆於顯處見其文是以此及醮子與鄉射特牲少牢有司徹皆在房戶之閒是也燕禮大射尊在東楹之西者君尊專大惠也云設篚于禁南東肆者言東肆以頭首為記從西向東為肆則大頭在西也云斯禁禁切地無足者斯澌也澌盡之名故知切地無足昏禮冠禮皆云禁者士禮以禁戒為名卿大夫士並有禁名故鄭以大夫士雙言也是以玉藻云大夫側尊用棜士側尊用禁注云棜斯禁也大夫士禮之異也禮器云大夫士棜禁注云棜斯禁也謂之棜者無足有似於棜或因名云耳大夫用斯禁士用棜禁然則禁是定名言棜者是其義稱故禮器大夫士揔名為棜禁案特牲禮云實獸於棜注云棜之制如今大木輿矣則棜是輿非承尊之物以禁與斯禁無足似輿故丗人名為棜若然周公制禮少牢名為棜則以周公為丗人或有本無丗人字者是以少牢不名斯禁謂之為棜取不為酒戒特牲云壷禁在東序記云壷棜禁饌于東序注云禁言棜者祭尚厭飫得與大夫同器不為神戒也其實不用云棜禁不敢與大夫同名斯禁作記解注故云士用棜禁明與少牢棜同也若然士之棜禁大夫之斯禁名雖異其形同是以禮器同名棜禁也其餘士冠昏禮禮賔用醴不飲故無禁不為酒戒若天子諸侯承尊之物謂之豐上有舟是尊與卑異號也設洗至南肆注榮屋翼釋曰云南北以堂深者堂深謂從堂廉北至房室之壁堂下洗北去堂逺近深淺取於堂上深淺假令堂深二丈洗亦去堂二丈以此為度云榮屋翼者榮在屋棟兩頭與屋為翼若鳥之有翼故斯干詩美宣王之室云如鳥斯革如翬斯飛與屋為榮故云榮也羮定注肉謂至孰也釋曰云肉謂之羮者爾雅文言肉正謂其狗孰云定者孰即定止然故以定言之言此者以與速賔時節為限不敢煩勞賔故限之也主人至拜辱釋曰自此至皆從之論主人往賔門召之使來之事案鄉射云主人朝服乃速賔賔朝服出迎再拜彼云乃速賔此不云主人乃者彼戒速别服故云乃以閒之此戒速雖與彼同但此戒速同服故不云乃云主答拜還賔拜辱案聘禮云賔入境至近郊使下大夫至賔館下大夫遂以賔入賔送不拜又公食大夫禮使大夫戒賔大夫還賔不拜送遂從之鄭注云不拜送者為從之不終事皆不拜送此獨拜送者亦是鄉大夫尊賔卑又擬貢故特拜辱而送之異於餘者賔及至從之注從猶至中矣釋曰鄭云言及衆賔介亦在其中矣者上文戒及速皆言賔與介不言衆賔及從主人來即言賔及衆賔衆賔不戒不速尚從主人則介在從主人可知也主人至答拜注相主至命者釋曰自此至答再拜論主人迎賔入升堂并拜至之事云主人一相迎于門外者謂主人於群吏中立一相使傳賔主之命主人乃自出迎賔於大門外必非一相迎賔者案鄉飲酒義云主人拜迎賔于庠門之外明主人自迎若然主人輒言一相者欲見使一相傳命乃迎故云相主人之吏擯贊傳命者也若然士相見注異日則拜迎同日不拜迎者彼以摯相見法此自以賔舉賢能故與彼異也揖衆賔注差益至南面釋曰云差益卑者以上文主人迎賔而拜介是介差卑於賔今於衆賔不拜直揖之而巳故云差益卑也知拜介揖衆賔皆西南面者以其賔介衆賔立位在門外位以北為上主人與賔正東西相當則介與衆賔差在南東面明知主人正西面拜賔則側身向西南拜介揖衆賔矣主人揖先入注揖揖至西面釋曰此鄉大夫行鄉飲酒在庠學唯有一門即向階門內既有三揖故主人導賔揖而先入門至內􅋼西向待賔也賔厭至北上注皆入至無門釋曰主人入後賔乃厭介介厭衆賔相隨入門皆東面北上定位賔既北上主人西面相向揖訖乃相背各向堂塗介與衆賔亦隨賔至西階下也云賔之屬相厭變於主人也者以賔與介衆賔等自用引手而入故不揖是變於主人也云推手揖引手曰厭者厭字或作撎字者古字義亦通也云推手揖者案周禮司儀云土揖庶姓時揖異姓天揖同姓鄭以推手小下之為土揖平推手為時揖推手小舉之為天揖皆以推手為揖又案僖二年公羊傳荀息進曰虞郭見與獻公揖而進之何休云以手通指曰揖與此别者推手解其揖狀通指道其揖意也鄭則解揖體何氏釋其揖意相兼乃足也云引手曰厭者以手向身引之云今文皆作揖者鄭不從也云又曰衆賔皆入門左無門亦不從也主人至答拜注三揖至尊之釋曰云三讓主人升者主人先升賔後升故鄉射云主人升一等賔升是也云三揖者將進揖當陳揖當碑揖者爾雅陳堂塗也云楣前梁也者對後梁為室戶上云復拜賔至此堂尊之者案公食禮云公升二等賔升公當楣北鄉至再拜燕禮大射皆云主人升自西階賔右至再拜鄉飲酒義亦云拜至拜洗此不云至者略之是知此升堂拜亦是拜至可知凡拜至者皆是尊之也主人至降洗注將獻賔也釋曰自此至主人阼階上答拜論主人盥洗獻賔之節也云主人坐取爵于篚者篚在堂上尊南故取之乃降也注重以至曰辭釋曰主人獻賔乃是主人事故云重以已事煩賔也云事同曰讓事異曰辭者事同謂若上文主人與賔俱升階而云三讓是也事異若此文主人有事賔無事是事異則曰辭此對文為義若散文則通是以周禮司儀云主君郊勞交擯三辭車逆拜辱三揖三辭拜受注云三辭重者先辭辭其以禮來於外後辭辭升堂事同而云辭是其通也注賔主之辭未聞釋曰其辭未聞者謂若冠禮醮辭之等雖行事辭不見於後以次見辭此則無見辭之事故云未聞也主人至盥洗注巳盥至無奠釋曰案鄉飲酒義云主人盥洗揚觶所以致潔也拜至拜洗拜受拜送所以致敬也此經先言盥後言洗則盥手乃洗爵者所以致潔鄭取鄉飲酒義為言也若然盥手洗爵止是致潔拜受之等乃是致敬并言敬者鄭注兼拜至拜受而言耳賔進東北面辭洗釋曰案下經云賔復位當西序東面注云言復位者明始降時位在此者案鄉射賔進東北面辭洗彼注云必進者方辭洗冝違其位也言東北面則位南於洗矣是其賔𥘉降立至于序南東鄉至於主人洗爵乃東行故此得北面辭洗也云示情者賔進前就主人示謙下主人之情也主人至東面注言復至在此釋曰上經奠爵于階前者主人未洗見賔降即奠爵故在階前奠爵此即至洗將洗爵見賔辭故奠爵於篚興對故不同也云言復位者明始降時位在此者上始降時直云賔降不言處所於此見之是舉下以明上之義也主人至北面注沃洗至群吏釋曰知主人群吏者下記云主人之贊者西面北上不與注云贊佐也謂主人之屬佐助主人之禮事徹冪沃盥設薦俎是也卒洗至讓升注俱升釋曰知俱升者鄉射云主人卒洗一揖一讓以賔升明俱升可知若然上文主人先升賔乃升者以初至之時賔客之道進冝難故主人升導之至此以辭讓訖故略威儀而俱升也賔拜至降盥注復盥為手坌汙釋曰言奠爵遂拜者因事曰遂是以燕禮云賔受酬坐祭酒遂奠于薦東注云遂者因坐而奠不北面是其類也凡賔主行事相報皆言答此不言答省文也賔降至疑立注疑讀至之貌釋曰言揖讓升不言一揖一讓從上可知云疑讀為疑然從於趙盾之疑疑正立自定之貌者案宣公六年公羊傳云晉靈公欲殺趙盾於是伏甲于宫中召趙盾而食之趙盾之車右祁彌明者國之力士也仡然從乎趙盾而入放乎堂下而立何休云仡然壯勇貌鄭氏以仡然從乎趙盾而入放乎堂下而立不取何休注義以鄉射注云疑止也有矜莊之色自定其義不殊字義與何少異也主人至獻賔注獻進至於賔釋曰云西北面者賔在西階北面將就席受故西北面向其席故也賔進至少退釋曰云賔進者以賔西階上疑立今見主人西北面獻於己席前故賔進將於席前受之故也案鄉射云賔進受爵於席前復位此不言席前文不具也薦脯醢注薦進至有司釋曰知非主人自薦者案昏禮禮賔贊者薦脯醢周禮膳宰薦脯醢皆非主人故知此亦非主人是有司也賔升席自西方注升由至中席釋曰案曲禮云席南鄉北鄉以西方為上今升席自西方云升由下者以賔統於主人以東方為上故以西方為升由下也乃設折俎注牲體至在俎釋曰凡解牲體之法有全蒸其豚解為二十一體體解即此折俎是也是以下有賔俎脊脅肩介俎脊脅肫胳是體解也主人至脯醢注坐坐至右手釋曰知賔坐坐於席上者上文賔升席下文降席故知此坐在席可知云祭脯醢者以右手者此經左執爵明祭用右手是以鄉射亦云右祭脯醢奠爵至于俎注興起至嘗也釋曰奠爵於薦右者為取肺奠之將舉故奠於右禮記少儀云取俎進俎不坐是以取時奠爵興至加于俎又興也云肺離之本端厚大者此是舉肺刲者於下記文本謂根本肺之大端故云厚大云繚猶紾也者弗繚即弗紾一也云大夫以上威儀多者此鄉飲酒大夫禮故云繚祭鄉射士禮云絶祭但云繚必兼絶言絶不得兼繚是以此經云繚兼言絶也言大夫以上則天子諸侯亦繚絶兼有但禮篇亡無以可知也案周禮大祝云辨九祭七曰絶祭八曰繚祭注云本同禮多者繚之禮略者絶則祭之亦據此與鄉射而言也大夫巳上為繚祭燕禮大射雖諸侯禮以賔皆大夫為之臣在君前故不為繚祭皆為絶祭也云嚌嘗也者嚌至齒則嘗之也坐挩手遂祭酒注挩拭至作說釋曰案內則事佩之中有帨則賔客自有帨巾以拭手也坐挩手因事曰遂因坐祭酒故云遂也案鄉射坐挩手執爵遂祭此不言執爵省文也興席末坐啐酒注啐亦嘗也釋曰言席末謂於席之尾故云末鄉飲酒義云祭薦祭酒敬禮也嚌肺嘗禮也啐酒成禮也於席末言是席之正非專為飲食也此所以貴禮而賤財也注云祭薦祭酒嚌肺於席中惟啐酒於席末是也啐酒於席末者酒是財賤財之義也云啐亦嘗者亦前肺云嚌是至齒為嘗此酒云啐謂入口為嘗雖至齒入口不同皆是嘗也又肺於前用之不得言成禮酒後乃用故云成禮異於肺也降席至答拜注降席至美也釋曰賔拜告旨主人拜崇酒其節同義即異矣賔言旨甘主人之味啐則拜之主人云崇者崇充也謝賔以酒惡相充實飲訖乃崇酒先後亦同也賔西至答拜注卒盡至食起釋曰言遂拜者亦因奠爵不起因拜也云於此盡酒者明此席非專為飲食起者但此席為賔賢能起故謂在席盡爵於此西階上卒之也云不專為飲食者啐酒於席末兼為飲食之事故以不專言之也儀禮疏卷第八
