  text: 儀禮䟽卷第五
  hash: sha256:9b12188d7e02e79f0c4b8b3347aca5698aca519d90baabe21e51ff65f28752bf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_005-1a}
body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彦等撰女次至南靣注次首至非常釋曰不言裳者以婦人之服不殊裳是以内司服皆不殊裳彼注云婦人尚專一德無所兼連衣裳不異其色是也注云次首飾也今時髲也周禮追師掌爲副編次者案彼注云副之言覆所以覆首爲之飾其遺象若今歩繇矣編編列髮爲之其遺象若今假紒矣次次第髮長短爲之所謂髮髢言所謂謂如少牢主婦髲鬄也又云外内命婦衣鞠衣襢衣者服編衣褖衣者服次其副唯於三翟祭祀服之士服爵弁助祭之服以迎則士之妻亦服褖衣助祭之服也若然案内司服王后之六服褘衣揄翟闕翟鞠衣展衣褖衣素沙素沙與上六服爲裏五等諸侯上公夫人與王后同侯伯夫人自揄翟而下子男夫人自闕而下案玉藻有鞠衣襢衣褖衣注云諸侯之臣皆分爲三等其妻以次受此服公之臣孤爲上卿大夫次之士次之侯伯子男之臣卿爲上大夫次之士次之其三夫人巳下内命婦則三夫人自闕翟而下九嬪自鞠衣而下丗婦自襢衣而下女御自褖衣而下嫁時以服之諸侯夫人無助天子祭亦各得申上服與祭服同也云純衣絲衣者此經純亦是絲理不明故見絲體也云女從者畢袗玄則此衣亦玄矣者此鄭欲見旣以純爲絲恐色不明故云女從袗玄則此絲衣亦同玄色矣云袡亦縁也者上纁裳緇袘袘爲縁故云袡亦縁也云袡之言任也以纁縁其衣象隂氣上任也者婦人隂象隂氣上交於陽亦取交接之義也云凡婦人不常施袡之衣盛昬禮爲此服者此純衣即褖衣是士妻助祭之服尋常不用纁爲袡今用之故云盛昬禮爲此服云喪大記曰復衣不以袡明非常者以其始死招魂復魄用生時之衣生時無袡知亦不用袡明爲非常所服爲盛昬禮故服之引之者證袡爲非常服也然鄭言凡婦人服不常施袡者鄭欲見王后巳下初嫁皆有袡之意也姆纚至其右釋曰此經欲見女旣在房須有傳命者之義也注姆婦至婦禮釋曰云姆婦人年五十無子出而不復嫁能以婦道敎人者婦人年五十隂道絶無子乃岀之案家語云婦人有七岀不順父母出淫辟出無子出不事舅姑岀惡疾出多舌岀盗竊岀又莊二十七年何休注公羊云無子棄絶丗也淫佚棄亂類也不事舅姑棄悖德也口舌棄離親也盗竊棄反義也嫉妬棄亂家也惡疾棄不可奉宗廟也又家語有三不去曽經三年喪不去休云不忘恩也賤取貴不去休云不背德也有所受無所歸不去休云不窮窮也休又云喪婦長女不娶無敎戒也丗有惡疾不娶棄於天也丗有刑人不娶棄於人也亂家不娶類不正也逆家女不娶廢人倫也是五不娶又案易同人六二鄭注云天子諸侯后夫人無子不出則猶有六出其天子之后雖失禮鄭云嫁於天子雖失禮無出道逺之而已若其無子不廢逺之后尊如故其犯六岀則廢之然就七岀之中餘六出是無德行不堪敎人故無子出能以婦道敎人者以爲姆旣敎女因從女向夫家也云若今時乳母者漢時乳母與古時乳母别案喪服乳母者據大夫子有三母子師慈母保母其慈母闕乃令有乳者養子謂之爲乳母死爲之服緦麻師敎之乳母直養之而已漢時乳母則選德行有乳者爲之并使敎子故引之以證姆也云纚縚髮者此纚亦如士冠纚以繒爲之廣充幅長六尺以縚髮而紒之姆所異於女者女有纚兼有次此姆則有纚而無次也云笄今時簮者舉漢爲況義也云宵讀爲詩素衣朱綃之綃者引詩以爲證也云姆亦玄衣以綃爲領因以爲名者此衣雖言綃衣亦與純衣同是褖衣用綃爲領故因得名綃衣也必知綃爲領者詩云素衣朱綃詩又云素衣朱襮爾雅釋器云黼領謂之襮襮旣爲領明朱綃亦領可知案上文云女褖衣下文云女從者畢袗玄皆是褖衣則此綃衣亦褖衣矣女與女從襌黼領此姆以玄綃爲領也若然特牲云綃衣者謂以綃繒爲衣知此綃爲領者以下女從者云被顈黼據領明此亦據領也云姆在女右當詔以婦禮者案禮記少儀云賛幣自左詔辭自右地道尊右之義故姆在女右也女從至其後釋曰此是從女之人在女後爲尊卑威儀之事也注女從至常服釋曰知女從是姪娣者案下文云雖無娣媵先鄭云古者嫁女必姪娣從謂之媵即此女從故云女從者謂姪娣也云詩者韓奕篇引之證姪之義也云袗同也同玄者上下皆玄者此袗讀從左氏均服振振一也故云同玄上下皆玄也同者即婦人之服不殊裳也云顈襌也者此讀如詩云褧衣之褧故爲襌也引詩爾雅周禮者證黼得爲領之義也黼謂刺之在領爲黼文名爲襮故云黼領謂之襮云天子諸侯后夫人狄衣者案周禮内司服云掌王后之六服禕衣揄狄闕狄又注云侯伯之夫人揄狄子男之夫人亦闕狄唯二王後褘衣故云后夫人狄衣也云卿大夫之妻刺黼以爲領者以士妻言被明非常故知大夫之妻刺之常也不於后夫人下言領於卿大夫妻下乃云刺黼爲領則后夫人亦同刺黼爲領也但黼乃白黒色爲之若於衣上則畫之若於領上則刺之以爲其男子冕服衣畫而裳繡繡皆刺之其婦人領雖在衣亦刺之矣然此士妻言被襌黼謂於衣領上别刺黼文謂之被則大夫巳下刺之不别被之矣案禮記郊特牲云綃黼丹朱中衣大夫之僭禮也彼天子諸侯中衣有黼領服則無之此今婦人事華飾故於上服有之中衣則無也云如今偃領矣者舉漢法鄭君目驗而知至今已逺偃領之制亦無可知也云士妻始嫁施襌黼於領上假盛飾耳言被明非常服者對大夫已上妻則常服有之非假也主人至荅拜釋曰此言男至女氏之大門外女父出迎之事也主人至降送釋曰此言女父迎賔壻入廟門升堂父迎出大門之事也云賔升北靣奠鴈再拜稽首者此時當在房外當楣北靣知在房戸者見隱二年紀履緰來逆女公羊傳曰譏始不親迎也何休云夏后氏逆於庭殷人逆於堂周人逆於戸後代漸文迎於房者親親之義也注賔升至不參釋曰云賔升奠鴈拜主人不荅明主爲授女耳者案納采阼階上拜至問名納吉納徵請期轉相如皆拜獨於此主人不荅明主爲授女耳云主人不降送禮不叅者禮賔主冝各一人今婦旣送主人不送者以其禮不參也壻御至不受注壻御至人綏釋曰云僕人之禮必授人綏者曲禮文今壻御車即僕人禮僕人合授綏姆辭不受謙也婦乗至者代注乗以至作憬釋曰云乗以几者謂登車時也几所以安體謂若尸乗以几之類以重其初昬與尸同也云景之制葢如明衣者案旣夕禮明衣裳用布袂屬幅長下膝鄭注云長下膝又有裳於蔽下體深也此景之制無正文故云葢如明衣直云制如明衣此嫁時尚飾不用布案詩云衣錦褧衣裳錦褧裳鄭云褧襌也葢以襌縠爲之中衣裳用錦而上加襌縠焉爲其文之大著也庶人之妻嫁服也士妻䊷衣纁袡彼以庶人用襌縠連引士妻䊷衣則此士妻衣上亦用襌縠碩人是國君夫人亦衣錦褧衣則尊卑同用襌縠庶人卑得與國君夫人同用錦爲文大著此士妻不用錦不爲文大著故云行道禦風塵也壻乗至門外注壻車至門外釋曰云壻車在大門外者謂在婦家大門外知者以其壻於此始言乗其車故知也云男率女女從男夫婦剛柔之義自此始也者並郊特牲文云門外壻家大門外者命士巳上父子異宫故解爲壻家大門外若不命之士父子同宫則大門父之大門外也婦至至盥交釋曰此明夫導於婦入門升階及對席媵御沃盥之儀云主人揖婦以入者此則詩云好人提提宛然左辟是也云夫入于室即席者謂壻也婦在尊西未設席壻旣爲主東靣須設饌訖乃設對席揖即對席爲前後至之便故也注升自至其志釋曰云升自西階道婦入也者以㝷常賔客主人在東賔在西今主人與妻俱升西階故云道婦入也云媵送也謂女從者也即姪娣也云御當爲訝訝迎也謂壻從者也者以其與婦人爲盥非男子之事謂夫家之賤者也知媵沃壻盥於南洗御沃婦盥於北洗者以其有南北二洗又云媵御沃盥交明知夫婦與媵御南北交相沃盥也賛者至從設注執匕至載也釋曰案特牲少牢公食與有司徹及此昬禮等執匕俎舉鼎各别人者此吉禮尚威儀故也士喪禮舉鼎右人以右手執匕左人以左人執俎舉鼎人兼執匕俎者喪禮略也云從設者以從男之事故從吉祭法也公食執匕俎之人入加匕於鼎陳俎於鼎南其匕與載皆舉鼎者爲之特牲注云右人也尊者於事指使可也則右人於鼎北南靣匕肉岀之左人於鼎西俎南北靣承取肉載於俎士虞右人載者喪祭少變故在西方長者在左也今昬禮鬼神隂陽當與特牲禮同亦右人匕左人載遂執俎而立以待設也云匕所以别出牲體也者凡牲有體别謂肩臂臑肫胳脊脅之等於鼎以次别匕岀之載者依其體别以次載之於俎故云别岀牲體也北靣載執而俟注執俎至先設釋曰知俟豆先設者下文菹醢後乃云俎入設于豆東故知也匕者至西上注執匕至賤也釋曰云至此乃著其位略賤也者案士冠未行事陳主人位訖即言兄弟及擯者之位於此初陳鼎門外時不見執匕者位至此乃著其位故言略賤也注豆東菹醢之東釋曰醬與菹醢俱在豆知不在醬東者下文醬東有黍稷故知在菹醢東也賛設至醬南注饌要方也釋曰豆東兩俎醬東黍稷是其要方也設對醬于東注對醬至特俎釋曰壻東靣設醬在南爲右婦西靣則醬在北爲右皆以右手取之爲便故知設之當特俎東也菹醢至于北釋曰菹醢在其南北上者謂菹在醬南其南有菹有醢若壻醢在菹北從南向北陳爲南上此從北向南陳亦醢在菹南爲北上也云湆即上文大羮湆在爨者羮冝熱醢食乃將入是以公食大夫云大羮湆不和實于鐙由門入公設之于醬西是也又生人食公食大夫是也特牲士虞等爲神設皆爲敬尸尸亦不食也郷飲酒郷射燕禮大射不設者湆非飲食之具故無也少牢無湆者又不備有司徹有湆者賔尸禮褻故有之與少牢禮異也云設湆于醬北者案上設壻湆於醬南在醬黍之南特俎出於饌北此設婦湆於醬北在特俎東饌内則不得要方上注云要方者據大判而言耳云啓㑹卻于敦南對敦于北者取壻東靣以南爲右婦西靣以北爲右各取便也卻仰也謂仰於地也賛告至稷肺注賛者至菹醢釋曰知賛者西靣告饌具者以其所告者冝告主人主人東靣知西靣告也云薦菹醢者以其儀禮之内單言薦者皆據籩豆而言也賛爾至舉也釋曰云祭舉食舉也者舉謂舉肺以其舉以祭以食故名肺爲舉則上文云祭者祭肺也注爾移至作稷釋曰云爾移也者爾訓爲近謂移之使近人故云移置席上便其食也案玉藻云食坐盡前謂臨席前畔則不得移黍於席上此云移置席上者鬼神隂陽故此昬禮從特牲祭祀法云皆食食黍也者案特牲少牢祭舉食舉乃飯此先食黍乃祭舉相反者彼九飯禮成故先食舉以爲導食氣此三飯禮略故不須導也此先爾黍稷後授肺特牲亦然以其士禮同也少牢佐食先以舉肺脊授尸乃爾黍者大夫禮與士異故也然士虞亦先授舉肺脊後乃爾黍者喪禮與吉反故也云用者謂啜湆肺𠯗醬者以其大羮汁不用箸醬又不須以箸故用口啜湆用指𠯗醬也三飯卒食注同牢至禮也釋曰云同牢示親不主爲食起者少牢十一飯特牲九飯而禮成此獨三飯故云同牢示親不主爲食起三飯而成禮也賛洗至皆祭釋曰自此至尊否論夫婦食訖酳及徹饌於房節云主人拜受者壻拜當東靣酳婦亦如之者婦拜當南靣是以少牢云𧃊皆荅拜鄭注云在東靣席者東靣拜在西靣席者皆南靣拜故知婦拜南靣若賛荅婦拜亦於戸内北靣也云皆祭者祭先也注酳漱至内尊釋曰云酳漱也酳之言演也安也漱所以絜口且演安其所食者案特牲云主人洗角升酌酳尸注云酳猶衍也是獻尸也謂之酳者尸旣卒食又欲頥衍養樂之又少牢云主人酌酒乃酳尸注云酳猶羡也旣食之而又飲之所以樂之三注不同者文有詳略相兼乃具士虞亦是酳尸注直云酳安食也不言養樂及羡者喪故略之此三酳俱不言獻皆云酳直取其絜故注云漱所以絜口演安其所食亦頥養樂之義知酳酌内尊者以下文云賛酌于戸外尊故知此夫婦酌内尊也賛以至菹豆釋曰案特牲少牢獻尸以肝從尸嚌之加于菹豆與此同禮之正也主人與祝亦以肝從加於俎不加於豆者下尸故不敢同之也士虞獻尸尸以肝加於俎者喪祭故鄭云加於俎從其牲體也以喪不志於味但此云實不云加異於祭故也卒爵至如之注亦無從也釋曰卒爵皆拜賛荅拜者獻主處也云再酳如初者如自賛洗爵巳下至荅拜受爵也云亦無從也者三酳用卺亦如之亦自賛洗爵至受爵鄭直云亦無從用卺文承再酳之下明知事事如再酳以其初酳有從再酳如初無從三酳用卺亦無從故鄭以亦無從言之其實皆同再酳也賛洗至拜興釋曰言皆者皆夫婦也三酳乃酌外尊自酢者皆是略賤者也旣隔合卺乃用爵不嫌相襲爵明更洗餘爵也主人出婦復位注復尊西南靣之位釋曰直云主人出不云處所案下文云主人說服于房矣則此時亦向東房矣云復尊西南靣之位者婦人不冝岀復入故因舊位而立也乃徹至尊否釋曰經云乃徹于房中如設于室雖據豆俎而言理兼於尊矣故云徹尊不設有外尊明徹中兼尊也云尊否者唯尊不設于房中而言也知爲媵御餕之者下文云媵餕主人之餘巳下是也主人至授巾釋曰自此至呼則聞論夫婦寢息及媵御餕之事也云主人說服于房媵受婦脫服于室御受者與沃盥文同亦是交接有漸之義也疊今文爲稅不從者稅是追服之言非脫去之義故不從也御衽至北止注衽卧至作趾釋曰衽于奥主于婦席使御布婦席使媵布夫席此亦示交接有漸之義也云衽卧席也者案曲禮云請席何郷請衽何趾鄭云坐問郷卧問趾因於隂陽彼衽稱趾明衽卧席也若然前布同牢席夫在西婦在東今乃夫在東婦在西易處者前者示有隂陽交㑹有漸故男西女東今取陽往就隂故幼時纓也内則又云婦事舅姑子事父母衿纓綦屨注云衿猶結也婦人有纓示繫屬也是婦人女子有二時之纓内則示有繫屬之纓即許嫁之纓與此說纓一也若然笄亦有二等案問喪親始死笄纚據男子去冠仍有笄與婦人之笄並有安髮之笄也爵弁皮弁及六冕之笄皆是固冠冕之笄是其二也媵餕至酳之釋曰亦隂陽交接之義云酌外尊者賤不敢與主人同酌内尊也媵待至則聞釋曰不使御待于戸外供承夫婦者以女爲主故使媵待于戸外也夙興至俟見釋曰自此至授人論婦見舅姑之事云纚笄宵衣者此則特牲主婦宵衣也不著純衣纁袡者彼嫁時之盛服今巳成昬之後不可使服故退從此服也注夙早至異宫釋曰言昬明日之晨者以昨日昬時成禮此經言夙興故知是昬之晨旦也云興起也俟待也待見於舅姑寢門之外者因訓即解之也云古者命士以上年十五父子異宫者案内則云由命士以上父子異宫不云年限今鄭知十五爲限者以其十五成童是以鄭注喪服亦云子幼謂年十五巳下則不隨母嫁故知十五以後乃異宫也鄭言此限者欲見不命之士父子同宫雖俟見不得言舅姑寢門外也質明至即席注質平至作咎釋曰此經論設舅姑席位所在鄭知房外是房户外之西者以其舅在阼阼當房戸之東若姑在房戸之東即當舅之北南靣向之不便又見下記云父醴女而俟迎者母南靣於戸外女出於母左以母在房戸西故得女出於母左是以知此房外亦房戸外之西也婦執至于席釋曰此經論婦從舅寢門外入見舅之事也必見舅用棗栗見姑以腵脩者案春秋莊二十四年經書秋八月丁丑夫人姜氏入戊寅大夫宗婦覿用幣公羊傳云宗婦者何大夫之妻也覿者何見也用者何用者不冝用也見用幣非禮也然則曷用棗栗云乎腵脩云乎注云腵脩者脯也禮婦人見舅以棗栗爲贄見姑以腵脩爲贄見夫人至尊兼而用之云乎辭也棗栗取其早自謹敬腵脩取其斷斷自脩正是用棗栗腵脩之義也案雜記云婦見舅姑兄弟姑姊妹皆立于堂下西靣北上是見巳注云婦來爲供養也其見主於尊者兄弟以下在位是爲巳見不復特見又云見諸父各就其寢注云旁尊也亦爲見時不來今此不言者文略也注笲竹至授也釋曰知笲竹器者以字從竹故知竹器知有衣者下記云笲緇被纁裏加于橋注云被表也笲有衣者婦見舅姑以飾爲敬是有衣也云如今之筥蘆矣者此舉漢法以況義但漢法去今以逺其狀無以可知也云進拜者進東靣乃拜者謂從西階進至舅前而拜云奠之者舅尊不敢授也者案下姑奠于席不授而云舅尊不敢授者但舅直撫之而已至姑則親舉之親舉者若親授之然故於舅得云尊不敢授也舅坐至又拜注還又至俠拜釋曰云先拜處者謂前東靣拜處也云婦人與丈夫爲禮則俠拜者謂若士冠冠者見母母拜受子拜送母又拜母於子尚俠拜則不徒此婦於舅而已故廣言婦人與丈夫爲禮則俠拜降階至授人釋曰此經論婦見姑之事注人有至徹之釋曰云人有司者凡行事者皆主人有司也知舅則使宰徹者此見下記云舅荅拜宰徹是也賛醴婦注醴當至厚之釋曰自此至於門外論舅姑堂上禮婦之事云醴當爲禮者士冠内則昏義諸文醴皆破從禮者案司儀注上於下曰禮敵者曰儐又案大行人云王禮再祼而酢之等用鬱鬯不言王鬯再祼而酢而言禮則此諸文雖用醴禮賔不得即言主人醴賔故皆從上於下曰禮解之席于戸牖閒注室戸至靣位釋曰知義然者以其賔客位於此是以禮子禮婦禮賔客皆於此尊之故也側尊至席西注疑正立自定之貌釋曰云婦疑立于席西者以其禮未至而無事故疑然自定而立以待事也若行之閒而立則云立不得云疑立也賛者至脯醢釋曰云面枋出房者以其賛授故面枋冠禮賛酌醴將授賔則面葉賔受醴將授子乃面枋也此婦又拜并下經婦又拜者皆俠拜也注婦東至之禮釋曰云婦東面拜賛北面荅之變於丈夫始冠成人之禮者案冠禮禮子與此禮婦俱在賔位彼禮子南靣受醴此則東靣不同故決之彼南靣者以向賔拜此東靣者以舅姑在東亦靣拜之也婦升至門外注奠于至氏人釋曰鄭知奠者升席奠之者見上冠禮禮子禮賔皆云即筵奠于薦東降筵北靣坐取脯明此奠時升席南靣奠乃降北靣取脯降出授人云親徹且榮得禮者言且兼二事何者下饗婦之俎不親徹又自出門授人是且榮得禮下饗不親徹俎者於禮時禮訖故於後略之知人是婦氏人者以其在門外婦往授之明是婦氏之人也舅姑至女禮釋曰自此至之錯論婦饋舅姑成孝養之事云其他如取女禮者則自側載以下南上以上與取女異異者彼則有魚腊并稷此則無魚腊與稷彼男東靣女西靣別席其醬醢菹夫則南上婦則北上今此舅姑共席東靣俎及豆等皆南上是其異也注側載至作併釋曰豚載皆合升若成牲載一胖是常得云側此乃載胖故云側但周人尚右故知右胖載之舅俎左胖載之姑俎是以鄭云異尊卑也云並南上者舅姑共席于奥其饌各以南爲上者決同牢男女東西相對各上其右也云其他謂醬湆菹醢者以同牢時夫婦各有此四者今以饋舅姑亦各有此四物故云如同牢時也雖不言酒旣有饋明有酒在其他中酒在内者亦在北牖下外尊亦當在房戸外之東鄭不云者略耳婦賛至無從注賛成祭者授處之釋曰賛成祭者謂授之又處置令知在於豆閒也席于北墉下釋曰此席將爲婦餕之位處也婦徹至易醬釋曰婦徹設于席前如初西上者此直餕餘舅辭易醬者舅尊故也不餕舅餘者以舅尊嫌相褻言西上者亦以右爲上也注婦餕至淬汙釋曰言將者事未至以其此始言婦餕之至下文婦餕姑之饌乃始餕耳云辭易醬者婦嫌淬汙者以其醬乃以指𠯗之淬汙也婦餕至奠之注奠之奠于篚釋曰云御賛祭豆黍肺舉肺脊者御賛婦祭之也鄭知奠之於篚者此云如取女禮取女有篚明此亦奠之于篚可知也婦徹至之錯注古者至爲姑釋曰云古者嫁女必姪娣從謂之媵者媵有二種若諸侯有二媵外别有姪娣是以莊公十九年經書秋公子結媵陳人之婦于鄄公羊傳曰媵者何諸侯娶一國則二國往媵之以姪娣從姪者何兄之子也娣者何弟也諸侯夫人自有姪娣并二媵各有姪娣則九女是媵與姪娣别也若大夫士無二媵即以姪娣爲媵鄭云古者嫁女必姪娣從謂之媵是據大夫士言也云姪兄之子娣女弟也娣尊姪卑者解經云雖無娣媵先之義以其若有娣乃先媵即姪也云猶先媵容之也者對御是夫之從者爲後若然姪與娣俱名媵今言雖無娣媵先似娣不名媵者但姪娣俱是媵今去娣娣外唯有姪姪言媵先以對御爲先非對娣也稱媵以其姪娣俱是媵也云始飯謂舅姑者舅姑始飯而今媵餕舅餘御餕姑餘是交錯之義若媵御沃盥交也舅姑爲飯始不爲餕始俗本云與始餕之錯者誤也舅姑至奠酬注以酒至舉爵釋曰自此至歸俎于婦氏人論饗婦之事此饗與上盥饋同日爲之知者見昬義曰舅姑入室婦以特豚饋明婦順也厥明舅姑共饗婦鄭彼注云昬禮不言厥明此言之者容大夫以上禮多或異日故知此士同日可也此與上事相因亦於舅姑寢堂之上與禮婦同在客位也云共饗婦以一獻之禮者案下記云饗婦姑薦焉注云舅姑共饗婦舅獻姑薦脯醢但薦脯醢無盥洗之事今設北洗爲婦人不下堂也云姑洗于北洗洗者洗爵則是舅獻姑酬共成一獻仍無妨姑薦脯醢也云凡酬酒皆奠於薦左不舉者此經直云奠酬不言處所故云凡通郷飲酒郷射燕禮之等云燕則更使人舉爵者案燕禮獻酬訖别有人舉旅行酬是也饗亦用醴酒知者以云記云庶婦使人醮之注云使人醮之不饗也酒不酬酢曰醮亦有脯醢適婦酌之以醴尊之庶婦酌之以酒卑之是也若然知記非醴婦者以記云庶婦使人醮之明適婦親之案上醴婦雖適使賛不親明記醮庶婦使人當饗節也舅姑至阼階注授之至代已釋曰案曲禮云子事父母升降不由阼階是主人尊者之處今舅姑降自西階婦降自阼階是授婦以室之事也云授之室昬義文也歸婦俎于婦氏人注言俎至得禮釋曰案雜記云大饗卷三牲之俎歸于賔館是賔所當得也饗時設几而不倚爵盈而不飲肴乾而不食故歸俎此饗婦婦亦不食故歸也經雖不言牲旣言俎俎所以盛肉故知有牲此婦氏人即上婦所授脯者也故上注引此婦氏人證所授人爲一也舅饗至束錦注送者至爲帛釋曰此一獻與饗婦一獻同禮則異彼兼有姑此依常饗賔客法知送者是女家有司者故左氏傳云齊侯送姜氏非禮也凡公女嫁于敵國姊妹則上卿送之以禮於先君公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之以此而言則尊無送卑之法則大夫亦遣臣送之士無臣故知有司送之也云古文錦皆爲帛者此及下文錦皆爲帛不從古文者禮有玉錦非獨此文則禮有贈錦之事故不從古文也姑饗至束錦注婦人至速之釋曰左氏傳云士有隷子弟士卑無臣自以其子弟爲僕隷并己之子弟之妻妾但尊無送卑故知婦人送者是隷子弟之妻妾也云凡饗速之者案聘禮饗食速賔則知此舅姑饗送者亦速之也几速者皆就館召是以下云若異邦則贈丈夫送者以束錦鄭云就賔館則賔自有館若然婦人送者亦當有館男子則主人親速其婦送者不親速以其婦人迎客不出門當别遣人速之若異至束錦注贈送也就賔館釋曰案莊二十七年冬莒慶來逆叔姬公羊傳云大夫越境逆女非禮也鄭注喪服亦云古者大夫不外娶今言異邦得外娶者以大夫尊外娶則外交故不許士卑不嫌容有外娶法故有異邦送客也鄭知就館者贈賄之等皆就館故知此亦就館也儀禮䟽卷第五
