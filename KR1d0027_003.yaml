body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彦等撰若不至用酒注若不至爲禮釋曰自此巳上說周禮冠子之法自此巳下至取籩脯以降如初說夏殷冠子之法云若不醴則醮用酒者案上文適子冠於阼三加訖一醴於客位是周法今云若不醴則醮用酒非周法故知先王法矣故鄭云若不醴謂國有舊俗可行聖人用焉不改者也云聖人者即周公制此儀禮用舊俗則夏殷之禮是也云曲禮曰巳下者是下曲禮文也云君子行禮不求變俗者與下文爲目謂君子所往之國不求變彼國之俗若衛居殷墟者也云祭祀之禮者若郊特牲云殷人先求諸陽周人先求諸隂求諸陽者先合樂乃灌地降神也求諸隂者謂先灌地乃合樂若衛居殷地用殷禮則先合樂乃灌也云居喪之服者謂若檀弓周之諸侯絶旁期降上下殷之諸侯服旁期不降上下衛居殷墟亦不降上下也云哭泣之位者殷禮無文亦應有異也云皆如其國之故者謂上所云皆如其故國之俗而行之云是者依先王舊俗而行不改之事向來所解引曲禮據人君施化之法不醴不言禁醴非飲醉之物故不設戒也此用酒酒是所飲之物恐醉因而禁之故云因爲酒戒若然玄酒非飲亦爲禁者以玄酒對正酒不可一有一無故亦同有禁也云不忘古也者上古無酒今雖有酒猶設之是不忘古也洗有至南順注洗庭至上也釋曰知洗庭洗者上周法用醴之時醴之尊在房今醮用酒與常飮酒同故洗亦當在庭是以下云賔降取爵于篚卒洗升酌故知洗在庭也設洗法在設尊前此洗亦當在設尊前設之故此直云洗有篚在西不言設也若然上不言設洗者以其上云醮用酒即連云尊文勢如此故不言設洗云當東榮南北以堂深者上巳有文也云篚亦以盛勺觶者周法用醴在房庭洗無篚此用酒庭洗有篚故周公設經辯其異者但醴篚在房以盛勺觶此庭洗篚亦盛勺觶故云亦也云南順北爲上也者席之制有首尾者據識之先後爲首尾此篚亦云上者應亦有記識爲上下以其南順之言故北爲上也始加至升酌注始加至東房釋曰云始加醮用脯醢者此言與周別之事周家三加訖乃一醴於客位用脯醢此加訖即醮於客位用脯醢是其不同也但言始加醮用脯醢者因言與周異之意其實未行事是以下乃始云賔降取爵于篚也云加冠於東序醮之於戸西同耳者經不見者嫌與周異故辯之其經不言冠者醮之處即與周同故經不見也云始醮亦薦脯醢者以其經云醮用脯醢汎言若醮用酒未著其節故亦如上周家三加始薦脯醢云賔降者爵在庭酒在堂將自酌也者決周家醴在房賛者酌授賔賔不親酌此則賔親酌酒洗爵故有升降也云辭降如初如將冠時降盥辭主人降也者欲見用醴時直有將冠時賔降無賔降取爵以其酌在房故也今云如初者唯謂如將冠降盥之事也云凡薦出自東房者用醴時尊在房脯醢出自東房醮用酒酒尊在堂脯醢亦出自東房郷飲酒郷射特牲少牢薦者皆出東房故云凡以該之也冠者至如初注賛者至薦之釋曰此經略言拜受荅拜不言處所面位言如初者以其雖用酒與周異自外與周同故直言如初也是以鄭取上醴子法以言之故言如初以結之也云於賔荅拜賛者則亦薦之者經直云拜受荅拜如初亦不言出薦之時節故鄭別言之亦當如周家醴子時薦也凡醴子醴婦并昬禮禮賔面位不同者皆隨時之便故不同也冠者至筵西注冠者至之筵釋曰此經雖用醴酒不同其於行事與周禮醴子同但位有異彼一加訖入房易服訖出房立待賔容命此則醮訖立於席西待賔命爲異皆爲更加皮弁也云興筵末坐啐酒者爲醮於客位敬之故也昬禮禮賔與聘禮禮賔在西階上啐醴者昬禮注云此筵不主爲飲食起聘禮注云糟醴不卒故也冠子用醴拜此醮子用酒亦拜者以與醴子同是成人法拜啐故雖用醮亦拜啐也徹薦至不徹注徹薦至便也釋曰云徹薦與爵者辟後加也者案下文云加皮弁如初儀再醮攝酒其他皆如初酒則云攝明因前也除酒之外云其他如初明薦爵更設是後加卒設於席前也故知前云徹薦爵爲辟後加也加皮至如初注攝猶至爲聶釋曰云攝猶整也整酒謂撓之者案有司徹云司宫攝酒注云更洗益整頓之不可云洗亦當爲撓謂更撓攪添益整頓示新也加爵至于母注乾肉至甞之釋曰前二醮有脯醢更加此乾肉折俎言嚌之者嚌謂至齒甞之案下若殺再醮不言攝此經再醮言攝三醮不言攝則再醮之後皆有攝互文以見義也云取脯見于母者亦適東壁俠拜與周同案下文若殺巳下云卒醮取籩脯以降此亦取籩脯乾肉曰脯云乾肉牲體之脯也者案周禮腊人云掌乾肉凡田獸之脯腊鄭注云大物解肆乾之謂之乾肉若今梁州烏翅矣薄析曰脯捶之而施薑桂曰腵脩若然乾肉與脯脩別言若今梁州烏翅者或爲豚解而七體以乾之謂之乾肉及用之將升于俎則節析爲二十一體與燕禮同故緫名乾肉折俎也若殺至扃鼏注特豚至爲密釋曰上醮子用乾肉不殺自此至取籩脯以降論夏殷醮子殺牲之事殺言若者是不定之辭殺與不殺俱得云若也云載合升者在鼎曰升在俎曰載載在後今先言載後言升又合字在載升之閒通事之者欲見在俎在鑊俱曰合也云設扃鼏者以茅覆鼎長則束其本短則編其中案冬官匠人廟門容大扃七个注云大扃牛鼎之扃長三尺又曰闈門容小扃參个注云小扃膷鼎之扃長二尺皆依漢禮而知今此豚鼎之扃當用小扃也云特豚一豚也者此特若郊特牲之特皆以特爲一也云凡牲皆用左胖者案特牲少牢皆用右胖少儀云大牢則以牛左肩折九个爲歸胙用左則用右而祭之郷飲酒郷射主人用右體生人亦與祭同用右者皆據周而言也此云用左鄭據夏殷之法與周異也但士虞喪祭用左反吉故也云煑於鑊曰亨者案特牲云亨于門外東方西面北上注云亨煑也亨豕魚腊以鑊各一爨詩云誰能亨魚漑之釡鬵是鑊爲亨也云在鼎曰升在俎曰載者案昬禮云特豚合升又云側載特牲亦云卒載加匕于鼎少牢云司馬升羊實于一鼎皆是在鼎曰升在俎曰載之文但在鼎直有升名在俎則升載兩稱也故少牢云升羊載右胖升豕其載如羊有司徹亦云乃升注云升牲體於俎也是在俎升載二名也云載合升者明亨與載皆合左右胖者以升載並陳又合在二者之間故知從鑊至俎皆合左右胖也云離割也割肺者使可祭也可嚌也者凡肺有二種一者舉肺一者祭肺就舉肺之中復有三稱一名舉肺爲食而舉二名離肺少儀云三牲之肺離而不提心也三名嚌肺以齒嚌之此三者皆據生人爲食而有也就祭肺之中亦復有三稱一者謂之祭肺爲祭先而有之二者謂之忖肺忖切之使斷三者謂之切肺名雖與忖肺異切肺則忖肺也三者皆爲祭而有若然切肺離肺指其形餘皆舉其義稱也云今文扃爲鉉古文鼏爲密者一部之内皆然不從今文故疊之也始醮如初注亦薦至徹矣釋曰云始醮如初者此一醮與不殺同未有所加故云如初也再醮至栗脯注蠃醢至爲蝸釋曰此二豆二籩増數者爲有殺牲故盛其饌也案鄭注周禮醢人云細切爲虀全物若䐑爲菹作醢及臡者先膊乾其肉乃後剉之雜以梁麴及鹽漬以美酒塗置甀中百日則成矣是作醢及菹之法也云蠃醢螔蝓醢者爾雅文三醮至嚌肺注攝酒至脯醢釋曰云攝酒如再醮則再醮亦攝之矣者周公作經取省文再醮不言攝酒以三醮如之則再醮攝之可知故鄭云再醮亦攝之矣云加俎嚌之嚌當爲祭字之誤也者經有二嚌不破如初嚌之嚌唯破加俎嚌之字者以祭先之法祭乃嚌之又不冝有二嚌故破加俎之嚌爲祭也云祭俎如初如祭脯醢者以三醮唯祭俎之肺不復祭脯醢也若然前不殺之時一醮徹脯醢爲辭再醮之脯醢至再醮不言徹脯醢者以三醮上唯加乾肉不薦脯醢故不徹也今殷亦然一醮徹薦辭至再醮亦不徹薦直徹爵而已亦爲三醮以不加籩豆加牲俎是以祝辭一醮亦云嘉薦至三醮者直云籩豆有楚楚陳列貌是三醮不加籩豆明文也卒醮至如初釋曰此取籩脯見母與前不異上周法與不殺皆不云籩者上皆直薦脯醢不云籩豆此若殺云兩籩故云籩脯若然旣殺有俎肉而取脯者見其得禮而已故不取俎肉如若得束帛者不須取脯是以冠禮禮賔得束帛皆不取脯也若孤至戒宿注父兄諸父諸兄釋曰上陳士有父加冠禮訖自此至東塾北面論士之無父自有加冠之法也周公作文於此乃見之者欲見周與夏殷孤子同冠於阼階禮之於客位惟一醮三醴不同耳是以作經言其與上異者而已言父兄諸父諸兄者以其上文父兄非直戒宿而已故知此是諸父諸兄非已之親父親兄也冠之至於阼注冠主至作醴釋曰云主人紒而迎賔者即上采衣紒是也云拜揖讓立于序端者謂主人出先拜賔荅拜訖揖讓而入于廟門旣入門又三揖至階又三讓而升堂乃立于東序端賔升立西序端一皆如上父兄爲主人故作文省略緫云揖讓立于序端皆如冠主也云禮於阼者别言其異者也云今文禮作醴者鄭不從今文者以其言醴則不兼於醮言禮則兼醴醮二法故也凡拜至荅拜釋曰此亦異於父在者云凡拜者謂初拜至及啐拜之等賔主皆北面與父在時拜于筵西南面賔拜于序端東面爲異也若殺至北面釋曰云若殺者有則殺無則已故云若不定之辭也言舉鼎者謂於廟門外之東壁鑊所舉至廟門外之東直東塾二鼎豚魚腊鼎皆北向相重而列之也注孤子至門外釋曰案上文父在亦有殺法今鄭云孤子得申禮盛之者不爲殺起止爲陳鼎于外而言鄭知父在有鼎不陳於外者以上文若殺直云特豚載合升不辯外内孤子乃云舉鼎陳于門外類于上父在陳鼎不於門外也凡陳鼎在外者賔客之禮也在内者家私之禮也是在外者爲盛也今孤子則陳鼎在外故云孤子得申禮盛之也若庶至醮焉釋曰上巳言三代適子冠禮訖此經論庶子加冠法也周公作經於三代之下言之則三代庶子冠禮皆於房外同用醮矣但不知三代庶子各用幾醮耳今於周之適子三加一醴夏殷適子三加三醮是以下文祝辭三醴一而醮三皆爲三代而爲言至於三代庶子皆不見别辭則周之庶子冝依適子用一醮夏殷庶子亦依三醮三代適子有祝辭言庶子則無故下文注云凡醮者不祝注房外至不尊釋曰知房外謂尊東也者上陳尊在房戸之間案郷飲酒賔東則東則尊東明此亦於尊東也云不於阼階非代也者案下記云適子冠於阼以著代也明庶子不於阼非代故也云不醮於客位成而不尊者下記云醮於客位加有成也是適子於客位成而尊之此則成而不尊故因冠之處遂醮焉冠者至階下釋曰案内則云舅没則姑老若死當云没不得云不在且母死則不得使人受脯今言不在者或歸寕或疾病也使人受脯爲母生在於後見之也戒賔至之也注吾子至爲謀釋曰自此至唯其所當者周公設經直見行事恐失次第不言其辭今行事旣終緫見戒賔醮及爲字之辭也云某有子某者上某主人名下某子之名加布初加緇布冠也云願吾子之教之也者即此以加冠行禮爲敎之也云吾子相親之辭吾我也者謂自己身之子故云吾子相親之辭也云子男子之美稱者古者稱師曰子又公羊傳云名不若字字不若子是子者男子之美稱也今請賔與子加冠故以美稱呼之也注今吉至首也釋曰元首左傳曰先軫入狄師而死之狄人歸先軫之元是元爲首又尚書云君爲元首亦是元爲首也注爾汝至福也釋曰云旣冠爲成德者案冠義旣冠責以父子君臣長幼之禮皆成人之德云祺祥也者祺訓爲祥祥又訓爲善也云因冠而戒者則經棄爾幼志順爾成德是也云且勸之者即經云壽考惟祺介爾景福是也再加至爾服注辰子至重也釋曰上云令月吉日此云吉月令辰互見其言是作文之體無義例也云辰子丑也者以十幹配十二辰直云辰子丑明有幹可知即甲子乙丑之類略言之也注黃黃至疆竟釋曰爾雅云黃髮齯齒故以黃爲黃髮也云耇凍棃者爾雅云耇老壽也此云耇凍棃者以其面似凍棃之色故也醴辭至令芳注嘉善至香也釋曰謂脯醢爲善薦芳香者謂作之依時又造之依法故使芳香而善也注善父至不祝釋曰善父母爲孝善兄弟爲友者爾雅文不言善事父母善事兄弟者欲見非且善事兄弟而亦爲兄弟之所善者諸行周備之意也云凡醮者不祝者案上文前後例周與夏殷冠子法其加冠祝辭三節不辨三代之異則三代祝辭同可知也至於周醮之辭三等别陳之者以其數異辭冝不同故也若然醮辭唯據適子而言以其將著代重之故備見祝辭也此注云凡醮者不祝者言凡謂庶子也旣不出冠於阼又不禮於客位無著代之理故略而輕之也亦不設祝辭者曽子問注云凡殤不祭之類也其天子冠禮祝辭案大戴禮公冠篇成王冠周公爲祝辭使王近於人逺於天嗇於時惠於財其辭旣多不可具載其諸侯無文蓋亦有祝辭異於士也注湑清也伊惟也釋曰湑泲酒之稱故伐木詩云有酒湑我注云湑莤之文鳧鷖詩云爾酒旣湑注云湑酒之泲者是湑爲清也云伊惟也者助句辭非爲義也注旨美至之貌釋曰楚茨詩亦云籩豆有楚注云楚陳列之貌是用其再醮之籩豆不増改之故云有楚也注肴升至謂豚釋曰云折俎者即謂折上若殺之豚也字辭至爾字釋曰此字文在三代之下而言則亦遂三代字辭同此辭賔直西序東面與子爲字時言之也冝之至所當釋曰云伯某甫者某若云嘉也但設經不得定言人字故言甫爲且字是以禮記諸侯薨復曰臯某甫復鄭云某甫且字以臣不名君且爲某之字呼之即此某甫立爲且字言伯仲叔季者是長幼次第之稱若兄弟四人則依次稱之夏殷質則積仲周文則積叔若管叔霍叔之類是也云唯其所當者二十冠時與之作字猶孔子生三月名之曰丘至二十冠而字之曰仲尼有兄曰伯居第二則曰仲但殷質二十爲字之時兼伯仲叔季呼之周文二十爲字之時未呼伯仲至五十乃加而呼之故檀弓云五十以伯仲周道也是呼伯仲之時則兼二十字而言若孔子生於周代從周禮呼尼甫至五十去甫以尼配仲而呼之曰仲尼是也若然二十冠而字之未呼伯仲叔季今於二十加冠而言者一則是殷家冠時遂以二十字呼之二則見周家若不死至五十乃加而呼之若二十巳後死雖未滿五十即得呼伯仲知義然者見慶父乃是莊公之弟桓六年莊公生至閔公二年慶父死時莊公未滿五十慶父乃是莊公之弟時未五十慶父死號曰共仲是其死後雖未五十得呼仲叔季故二十冠時則以伯仲叔季當擬之故云唯其所當也注于猶至作父釋曰知甫是丈夫之美稱者以其人之賢愚皆以爲字故隱元年公及邾儀父盟于蔑榖梁傳云儀字也父猶傅也男子之美稱也是也云孔子爲尼甫者哀十六年孔丘卒哀公誄之曰哀哉尼甫因字號謚曰尼甫也云周大夫有嘉甫者桓公十五年天王使嘉甫來求車是也云宋大夫有孔甫是其類者案左氏傳桓二年孔父嘉爲司馬是也鄭引此者證有冠而爲此字之意故云是其類也又甫字或作父者字亦通或尼甫嘉莆孔甫等見爲父字者也屨夏至博寸注屨者至廣也釋曰自此至繐屨論三服之屨不於上與服同陳者一則屨用皮葛冬夏不同二則屨在下不冝與服同列故退在於此此言夏用葛下云冬皮則春冝從夏秋冝從冬故舉冬夏寒暑極時而言詩魏地以葛屨履霜刺褊也云屨者順裳色者禮之通例衣與冠同屨與裳同故云順裳色也云玄端黒屨以玄裳爲正也者以其玄端有玄裳黃裳雜裳經唯云玄端黒屨與玄裳同色不取黃裳雜裳故云以玄裳爲正也云絇之言拘也以爲行戒者以拘者自拘持之言故云以爲行戒也云狀如刀衣鼻在屨頭者此以漢法言之今之屨頭見有下鼻似刀衣鼻故以爲況也云繶縫中紃也者謂牙底相接之縫中有絛紃也云純縁也者謂遶口縁邊也云皆青者以經三者同云青也云博廣也者謂純所施廣一寸也素積至博寸注魁蜃蛤柎注者釋曰以魁蛤灰柎之者取其白耳云魁蜃蛤者魁即蜃蛤一物是以周禮地官掌蜃掌共白盛之蜃鄭司農云謂蜃炭引此士冠白屨以魁柎之玄謂今東萊用蛤謂之义灰云是也云柎注者以蛤灰塗注於上使色白也爵弁至博寸注爵弁至繢次釋曰案此三服見屨不同何者玄端以衣見屨以玄端有黃裳之等裳不得舉裳見屨故舉玄端見屨也皮弁以素積見屨屨裳同色是其正也爵弁旣不舉裳又不舉衣而以爵弁見屨者上陳服已言纁裳裳色自顯以與六冕同玄衣纁裳與冕服之嫌故不以衣裳而以首服見屨也云爵弁屨以黒爲飾爵弁尊其屨飾以繢次者案冬官畫繢之事云青與白相次赤與黒相次玄與黃相次鄭云此言畫繢六色所象及布采之第次繢以爲衣又云青與赤謂之文赤與白謂之章白與黒謂之黼黑與青謂之黻鄭云此言刺繡采所用繡以爲裳此是對方爲繢次比方爲繡次案鄭注屨人云複下曰舄襌下曰屨又注云凡舄之飾如繢之次凡屨之飾如繡之次也者即上黒屨以青爲絇繶純白屨以黒爲絇繶純則白與黑黒與青爲繡次之事也今次爵弁纁屨纁南方之色赤不以西方白爲絇繶純而以北方黒爲絇繶純者取對方繢次爲飾舉舄者尊爵弁是祭服故飾與舄同也冬皮屨可也釋曰冬時寒許用皮故云可也不屨繐屨注繐屨至曰繐釋曰案喪服記云繐衰四升有半繐衰旣是喪服明繐屨亦是喪屨故鄭云喪屨也云縷不灰治曰繐者斬衰冠六升傳云鍜而勿灰則四升半不灰治可知言此者欲見大功末可以冠子恐人以冠子故於屨末因禁之也記冠義釋曰凡言記者皆是記經不備兼記經外逺古之言鄭注燕禮云後丗衰微幽厲尤甚禮樂之書稍稍廢棄蓋自爾之後有記乎又案喪服記子夏爲之作傳不應自造還自解之記當在子夏之前孔子之時未知定誰所録云冠義者記士冠中之義者記時不同故有二記此則在子夏前其周禮考工記六國時所録故遭秦燔滅典籍有韋氏雕氏闕其記則在秦漢之際儒者記之故王制有正聽之棘木之下異時所記故其言亦殊也始冠至可也注大古至是也釋曰此經直言加緇布冠不言有緌無緌又不言加冠之後此緇布冠更著以不故言不緌不更著之事也云大古冠布者謂著白布冠也云齊則緇之者將祭而齊則爲緇者以鬼神尚幽暗也云其緌也孔子曰吾未之聞也者孔子時有緌者故非時人緌之諸侯則得著緌故玉藻云緇布冠繢緌諸侯之冠也鄭云尊者飾也經士冠不得緌也云冠而敝之可也者據士以上冠時用之冠訖則敝去之不復著也若庶人猶著之故詩云彼都人士臺笠緇撮是用緇布冠籠其髮是庶人常服之矣云大古唐虞以上者此記與郊特牲皆陳三代之冠云牟追章甫委貌之等鄭注郊特牲云三代改制齊冠不復用也以白布冠質以爲喪冠也三代旣有此明大古是唐虞巳上可知云未之聞大古質蓋亦無飾者此經據孔子時非其著緌未知大古有緌以不故鄭云大古質無飾也云重古始冠冠其齊冠者以經云始冠緇布之冠即云大古冠布則齊冠一也故鄭云冠其齊冠也云白布冠者今之喪冠是也者以其大古時吉凶同服白布冠未有喪冠三代有牟追之等則以白布冠爲喪冠若然喪服起自夏禹以下也適子至成也注醮夏至人也釋曰此記人說夏殷法可兼于周以其於阼及三加皆同唯醮醴有異故知舉二以見一也冠而至名也姓名者至無之釋曰案内則云子生三月父名之不言母今云受於父母者夫婦一體受父即是受於母故兼言也云冠成人益文者對名是受於父母爲質字者受於賔爲文故君父之前稱名至於他人稱字也是敬其名也委貌至道也釋曰記人歷陳此三代冠者上緇布冠記諸殤故也雖早冠亦行士禮而冠是大夫無冠禮也云二十而冠急成人也五十乃爵重官人也者解試爲大夫二十則其爵命要待五十意也云大夫或時改娶有昬禮者釋經而有其昬禮以其三十而取五十乃命爲大夫則昬時猶爲士何得有大夫昬禮乎五十巳後容改娶故有大夫昬禮也若然案下文古者生無爵鄭云古謂殷此經以古爲周初者下云古者生無爵對周時士生有爵故知古者生無爵據殷也今此云古者以周末時大夫冠對周初時無若以古者爲殷時則周家有大夫冠禮何得言周末始有乎明古者據初而言也公侯至造也注造作至君也釋曰記人言此者欲見夏初巳上雖諸侯之貴未有諸侯冠禮猶依士禮故記之於士冠篇末也云自夏初以上者以經云公侯之有冠禮夏之末造明夏初未有言以上者夏以前唐虞之等亦未有諸侯冠禮也未滿五十者亦服士服行士禮五十乃命也者旣云服士服行士禮亦如上文五十而後爵何公侯冠禮之有以其與大夫同未五十服行士禮也云至其衰末上下相亂至以正君臣也者解經夏之末造公侯冠禮也引坊記者欲見夏末以後制諸侯冠禮以防諸侯相簒弑之事也云同車者謂參乗爲車右及御者也云不同服者案玉藻云君之右虎裘厥左狼裘又云僕右恒朝服君則各以時事服是不同服此謂非在軍時若在軍時君臣同服韋弁服也天子至者也注元子至下升釋曰此記者見天子元子冠時亦依士冠禮故於此兼記之也天子之元子雖四加與十二而冠其行事猶依士禮故云猶士也元子尚不得生而貴則天下之人亦無生而貴者也云無生而貴皆由下升者天子元子冠時行士禮後繼丗爲天子是由下升自餘天下之人從微至著皆由下升也繼丗至賢也釋曰記此者欲見上言天子之子冠行士禮此諸侯之子冠亦行士禮以其士之子恒爲士有繼丗之義諸侯之子亦繼丗象父祖之賢雖繼丗象賢亦無生而貴者行士冠禮故記之於此也云能法先祖之賢者凡諸侯岀封皆由有德若周禮典命云三公八命其卿六命大夫四命及其出封皆加一等出爲五等諸侯即爲始封之君是其賢也於後子孫繼立者皆不毁始祖之廟是象先祖之賢也以官至殺也注殺猶至小官釋曰記人記此者欲見仕者從士至大夫而冠無大夫冠禮者也云以官爵人者以用也謂用官爵命於人也云德之殺也者殺衰也以德大小爲衰殺故鄭云德大者爵以大官德小者爵以小官官者管領爲名爵者位次髙下之稱也死而至無謚注今謂至始也釋曰記人記此者欲見自上所陳冠禮以士爲本者由無生而貴皆從士賤者而升也云死而謚今也者據士生時雖有爵死不合有謚若死而謚之正謂今周衰之時也云古者生無爵死無謚者古謂殷以前夏之時士生無爵死無謚是士賤今古皆不合有謚也鄭云今謂周衰記之時也者以記者自云今也明還據周衰記之時案禮運云孔子曰我觀周道幽厲傷之是周衰也自此已後始有作記故云周衰記之時也云古謂殷者周時士有爵故知古謂殷云殷士生不爲爵死不爲謚者對周士生有爵死猶不謚也云周制以士爲爵死猶不謚耳下大夫也者案周禮掌客職云羣介行人宰史以其爵等爲之牢禮之陳數鄭注云以命數則參差難等略於臣用爵而已羣介行人皆士故知周士有爵雖有爵死猶不謚卿大夫巳上則有謚也云今記之時士死則謚之非也者解經死而謚今也云謚之由魯莊公始也者案禮記檀弓云魯莊公及宋人戰于乗丘縣賁父御卜國爲右馬驚敗績公墜佐車授綏公曰末之卜也縣賁父曰他日不敗績而今敗績是無勇也遂死之圉人浴馬有流矢在白肉公曰非其罪也遂誄之士之有誄自魯莊公始也若然作記前莊公誄士至記時亦行之故此禮云死而謚今也故鄭云今謂周衰之時也案郊特牲云死而謚之今也古者生無爵死無謚鄭注云古謂殷以前也大夫以上乃謂之爵死有謚也以此而言則殷大夫以上死有謚而檀弓云幼名冠字五十伯仲死謚周道也者殷已前皆因生號爲謚若堯舜禹湯之屬是也因生號以謚故不得謚名周禮死則别爲謚故云死謚周道也義禮䟽卷第三
