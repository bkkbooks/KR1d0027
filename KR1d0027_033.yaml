  text: 儀禮疏卷第三十九
  hash: sha256:3568dfb3ad736dcd5013c2649945d40c5a11746a517fb8381ec0c4ae3ce9c7ac
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_033-1a}
body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彥等撰公賵至馬兩注公國至繁乎釋曰自此盡入復位杖論國君賵法之事云公國君也者公及大夫皆有臣臣皆尊其君呼之曰公故左氏傳伯有之臣曰吾公在壑谷今此云公則國君非大夫君也以下云主人釋杖迎于廟門外與喪大記如此迎送者皆據國君也云賵所以助主人送葬也者案兩小傳皆云車馬曰賵施于生及送死者故云助主人送葬者也是以下注云賵奠於死生兩施是也云兩馬士制也者謂士在家常乘之法若出使及征伐則乘駟馬其大夫以上則常乘駟馬故鄭駮異義云天子駕駟尚書康王之誥康王始即位云諸侯皆布乘黃朱詩云駟騵彭彭武王所乘魯頌云六轡耳耳僖公所乘小雅云駟牡騑騑大夫所乘是大夫以上駕駟之文也引春秋者左氏傳哀公二十三年春宋景曹卒注云景曹宋元公夫人小邾女季桓子外祖母又云季康子使冉有弔且送葬曰敝邑有社稷之事使肥與有職競焉是以不得助執紼使求從輿人注云輿衆也又云曰以肥之得備彌甥也注云彌逺也康子父之舅氏故稱彌甥又云有不腆先人之産馬使求薦諸夫人之宰其可以稱旌繁乎注云稱舉也繁馬飾繁纓也引之者證公有賵馬助人之事擯者至人袒注尊君至西面釋曰云尊君命也者謂釋杖迎入是尊君命也故下文賔賵擯者出告須注云不迎則此經皆是尊君命故鄭無所指屬君命故鄭解經不哭又前文袒襲皆據主人此則衆主人亦袒亦是尊君命云衆主人自若西面者以其主人一人迎賔入門門東而右其餘衆主人不迎賔明自若常位柩東西面可知也馬入設注設於庭在重南釋曰以馬是庭實故云設于庭知在重南者以庭實法皆參分庭一在南設之又重北陳明器不得設馬故知在重南也賔奉至致命注賔使至前後釋曰云賔使者案此使者即士也知者士喪禮君使人弔注使人士也禮使人各以其爵故知是士也云輅轅縛所以屬引者謂以木縛於柩車轅上以屬引於上而挽之故名轅縛也云由馬西則亦當前輅之西者以經直云當前輅不言輅之東西及前後鄭以義言之以其馬在重南當門柩車在階閒少南亦當門賔由馬西北行當前輅致命明在輅西可知云於是北面致命得鄉柩與奠者以賔當輅西經云北面致命明當奠柩之南北面是得鄉柩與奠也云柩車在階閒少前參分庭之北者案下記云遂匠納車于階閒是柩車在階閒也云少前者上經祖還車訖云婦人降即位于階閒明柩車少南是少前也云參分庭之北者以其中庭陳明器不得在中庭故知在參分庭之北謂參分庭在北分之北此解賔致命之處云輅有前後者以經云前輅明有後以對前故知輅有前後也主人至服出注棧謂至作輚釋曰主人哭拜者仍於門右北面以賔致命訖遂哭拜也云成踊者三者三凡九踊云棧謂柩車也凡士車制無漆飾者此棧車即柩車以其賔由輅西而致命云奠幣於棧者明此棧車柩車即蜃車四輪迫地無漆飾故言棧也云左服象授人授其右也者案聘禮宰授使者圭時云同面使者在左宰在右而授其右也此車南鄉以東為左尸在車上以東為右故授左服容授尸之右也宰由至以東注柩東至藏之釋曰云柩東主人位者解經由主人之北以幣在車東主人在車東故宰由主人位北而鄉左服上取幣以東藏之於內也但此時主人仍在門東北面此位雖無主人既有定位故宰由位北而取幣不得履主人之位故由主人之北也士受馬以出注此士至可也釋曰云此士謂胥徒之長也有勇力者受馬不得為屬士以其受幣者冝尊受馬者冝卑故知受馬是胥徒之長以其受馬故知有勇力者也若然婚禮記云士受皮注云士謂中士下士不為胥徒者彼主人親受幣明受皮非胥徒是正士也引聘禮者欲見此用皮亦可也主人至位杖釋曰主人既送賔還入廟門車東復位杖也賔賵者將命注賔卿大夫士也釋曰自此盡知生者賻論賔及兄弟賻奠之事云賔卿大夫士也者以其上云君下有兄弟則此賔是國中三卿五大夫二十七士可知言將命者身不來遣使者將命告主人注不迎至某須釋曰案雜記諸侯使卿弔鄰國諸侯主人使擯者告賔云孤某須矣故引之為義注柩車至室同釋曰云既啓之後與在室同者案上篇始死時云庶兄弟襚使人以將命于室主人拜于位此主人亦拜于位俱是不為賔出故云與在室同至于有君命亦出迎也注賔出至有事釋曰云賔出在外請之為其復有事者以其賔既行賵訖出更請之為其復有事若無事賔報事畢送去也若奠注賔致可以奠也釋曰謂賔不辭此釋所致之物或可堪為奠於祭祀者也注士亦至復也釋曰以其受羊與馬同是畜類故知亦胥徒之類但受羊不須勇力故鄭不言也若賻注賻之至曰賻釋曰云貨財曰賻者公羊傳文也注主人至主人釋曰鄭知施於主人者以下經云知生者賻是施於主人也案春秋文五年春王使榮叔歸含且賵傳譏一人兼二事此賔所以兼事者彼譏一人獨行不與介各行故譏若雜記云上客弔即其介各行含襚賵則不譏則卿大夫士禮一人行數事可也注坐委至後位釋曰鄭知反位反主人之後位者以主人在門東西面而云宰由主人之北鄉賔奠幣之處舉幣明宰位在主人之後故得由主人之北西行是以宰位在主人之後也若無至受之注謂對至委地釋曰以堂上授有並受法以其在門外若有器盛之則坐委於地若無器則對面相授受故云捂受之捂即遻也對面相逢受也注如其至告須釋曰謂如上賔賵時擯者出請入告出告須也若就至于陳注就猶至之陳釋曰知贈無常者案下記云凡贈幣無常注云賔之贈也玩好曰贈在所有言玩好者謂生時玩好之具與死者相知皆可以贈死者故此經云若就器則坐奠于陳者就器則是玩好之器也云陳明器之陳者以其廟中所陳者唯明器即陳于車之西以外或言薦或言設無言陳者故指明器而言也凡將至拜送注雖知至人意釋曰云君子不必人意者義取孔子云無必無固之言也兄弟賵奠可也注兄弟至兩施釋曰知兄弟有服親者喪服傳云凡小功以下為兄弟既言兄弟明有服親者也知非大功以上者以大功以上有同財之義無致賵奠之法云可且賵且奠許其厚也者若然此所知許其賵不許其奠兄弟許其二賵兼奠而上經亦賔而有賵有奠有賻三者彼亦不使並行俱見之見三禮之中有則任行其一故揔見之云賵奠於死生兩施者以下經云知死者贈知生者賻注云各主於所知此賵奠不偏言所主明於生死兩施也所知至不奠注所知至不奠釋曰云所知通問相知也者言所知明是朋友通問相知言降於兄弟者許賵不許奠也云奠施於死者為多故不奠者但賵與奠皆生死兩施其奠雖兩施施於死者為多知者以其言奠為死者而行故知所知為疏不許行之也知死至者賻注各主於所知釋曰云各主於所知者以其贈是玩好施於死者故知死者行之賻是補主人不足施於生者故知生者行之是各施於所知也書賵至若五注方版至五行釋曰以賔客所致有賻有賵有贈有奠直云書賵者舉首而言但所送有多少故行數不同書遣於䇿注䇿簡至以下釋曰云䇿簡者編連為䇿不編為簡故春秋左氏傳云南史氏執簡以往上書賵云方此言書遣於䇿不同者聘禮記云百名以上書於䇿不及百名書於方以賔客贈物名字少故書於方則盡遣送死者明器之等并贈死者玩好之物名字多故書之於䇿䇿書明器之物應在上文而於此言之者遣中并有贈物故在賔客贈賄與賵之下特書也乃代哭如初注棺柩至斂時釋曰案喪大記大夫以上官代哭士無官以親疏代哭云初謂既小斂時者案喪大記小斂之後乃代哭初死直主人哭不絶聲士二日小斂小斂主人懈怠容更代而哭也宵為至之右注為哭者為明釋曰燎大燭必於門內之右門東者奠於柩車西鬼神尚幽暗不須明柩車東有主人階閒有婦人故於門右照之為明而哭也厥明至如初注鼎五至奠時釋曰自此盡主人要節而踊論葬曰之明陳大遣奠於廟門外之事知五鼎是羊豕魚臘鮮獸各一鼎者以下經云羊左胖豕亦如之魚臘鮮獸皆如初與少牢禮同故知也云士禮特牲三鼎者特牲饋食禮陳三鼎故知也云盛葬奠加一等用少牢也者以其常祭用特牲今大遣奠與大夫常祭用少牢同是盛此葬奠故加一等用少牢也云如初如大斂奠時者以其上遷祖奠時云如殯謂如大斂明此云如初亦如大斂在廟門外及東方之饌也雖如大斂鼎數仍不同以其大斂三鼎此則五鼎然大小斂時無黍稷朔月則有黍稷此葬奠又無黍稷者大斂前無黍稷者以其初死至朔月乃有之故鄭注云至此乃有黍稷今葬奠更無黍稷者以其始死至殯自啓至葬其禮同故無黍稷亦同也凡牢鼎數或多或少不同若用特豚者或一鼎或三鼎若士冠禮醮子及婚禮盥饋并小斂之奠與朝禰之奠皆一鼎也三鼎者婚禮同牢士喪大斂朔月遷祖及祖奠皆三鼎而以魚臘配之是也其用少牢者或三鼎或五鼎三鼎者則有司徹云陳三鼎如初以其繹祭殺之於正祭故用少牢而鼎三也五鼎者少牢五鼎大夫之常事此葬奠士攝之奠用少牢亦五鼎聘禮致飧衆介皆少牢亦五鼎玉藻諸侯朔月少牢亦五鼎其用大牢者或七或九或十或十二其云七鼎九鼎者公食大夫下大夫大牢鼎七上大夫鼎九是也鼎十與十二者聘禮致飧於賔飪一牢鼎九羞鼎三是十二也又云上介飪一牢鼎七羞鼎三是其十若然案郊特牲云鼎俎竒而籩豆偶以象隂陽鼎有十與十二者以其正鼎與陪鼎各別數則為竒數也其實羊左胖注反吉至骨也釋曰云反吉祭也者以其特牲少牢吉祭皆升右胖此用左胖故云反吉祭也云言左胖者體不殊骨也者既言左胖則左邊共為一段故云體不殊骨雖然下云髀不升則除髀以下膞胳仍升之則與上肩脅脊別升則左胖仍為三段矣而云體不殊骨據脊脅以上膞胳已下共為一亦得為體不殊骨也髀不升注周貴肩賤髀釋曰云髀不升者則膞已上去之取膞胳已下云周貴肩賤髀者案祭統云殷人貴髀周人貴肩故云脾不升腸五胃五注亦盛之也釋曰亦盛之者以其不用特牲而用少牢是盛葬奠案少牢用腸三胃三今加至五亦是盛此奠也離肺注離㨒釋曰此非直升腸胃又升離肺者案少儀云牛羊之肺離而不提心注云提猶絶也􅩿離之不絶中央少者使易絶以祭耳此為食而舉亦名舉肺也豕亦至腸胃注如之至溷腴釋曰云亦如之鄭云如之如羊左胖髀不升離肺也者謂豕與羊同者右胖雖同仍與羊異以其羊則體不殊骨上下共為二段此豕之左胖則為四段矣故別云豚解豚解揔有七段今取左胖仍為四段矣云亦前肩後肫脊脅而巳者鄭欲為四段與羊異也云君子不食溷腴者禮記少儀文彼鄭注云謂犬豕之屬食米穀者也腴有似於人穢引之者證不取腸胃之義也魚臘至如初注鮮新至略之釋曰云士臘用兔者謂此臘是其乾者云鮮新殺者二者皆用兔必知士臘用兔者雖無正文案少牢禮大夫臘用麋鄭云大夫用麋士用兔與以無正文故云與以疑之此亦云士臘用兔雖不云與亦同疑可知但士臘冝小故疑用兔也云加鮮獸而無膚者豕既豚解略之者以葬奠用少牢攝盛則當有膚與少牢同以豕既豚解四段喪事略則無膚者亦略之而加鮮獸也東方至螺醢注脾讀至為蝸釋曰陳鼎既訖又陳東方之饌于主人之南前輅之東其豆有四脾析一蜱醢二葵菹三螺醢四案周禮鄭注醢人云細切為韲全物若䐑為菹又云韲菹之稱菜肉通又經不云菹者類皆是韲則此經云脾析者即韲也云脾讀為雞脾肶之脾者鄭讀之欲見此脾雖與脾腎之脾同正謂百葉名為脾析故讀音從雞脾肶之脾時俗有此語故讀從之也案醢人注云脾析牛百葉也此不云牛者彼天子禮容有牛此用少牢無牛當是羊百葉故不云牛也云蜱蚌也者即蛤也知蜱即蛤者以周禮醢人云蠯醢注云蠯蛤也此注云蜱蚌也以蜱蠯是一物故知蜱蚌即蠯蛤也四籩棗糗栗脯注糗以豆糗粉餌釋曰云糗以豆糗粉餌者案籩人云羞籩之實糗餌粉餈鄭云此二物皆粉稻米黍米所為也合蒸曰餌餅之曰餈糗者搗粉熬大豆為餌餈之粘著以粉之耳餌言糗餈言粉互相足者此本一物餌言糗謂熬之亦粉之餈言粉搗之亦糗之不言互文而云互相足者凡言互文者是二物各舉一邊而省文故云互文此糗與粉唯一物分為二文皆語不足故云互相足也又案籩人羞有二籩糗餌及粉餈此經直言糗則舉糗以見餌而無餈故鄭云糗以豆糗粉餌也醴酒注此東至巾之釋曰鄭知義然者案下記云祝饌祖奠于主人之南當前輅北上巾之注云既祖祝乃饌以此言之祝饌祖奠即是還柩鄉外乃饌之于主人之南自還柩車至此饌葬奠柩車未動則此葬奠東方之饌亦饌于主人之南當與前同處故注云與祖奠同在主人之南但祖奠與大斂奠同二豆二籩此葬奠四豆四籩籩豆雖不同而同處耳云北上者蓋兩甒在北次南饌四豆豆南饌四籩也陳器注明器至藏之釋曰陳饌巳訖又陳明器也本作夜斂適似寫誤云適斂者以其上朝祖之日巳陳明器此復陳之者由朝祖至夜斂藏之至此厥明更陳之也滅燎至北面注照徹與葬奠也釋曰昨日朝祖日至夕云宵為燎于門內之右至此滅燎既滅二人執燭俠輅北面一人在輅東一人在輅西輅西者照祖奠輅東者照葬奠之饌故注云照徹與葬奠也賔入者拜之注明自至出禮釋曰此時有弔葬之賔主人皆不出迎但在位拜之所以不出迎者既啓之後既覩尸柩不可離位以迎賔唯有君命乃出故注云明自啓至此主人無出禮也徹者至人踊注猶阼至西南釋曰云徹者入者謂將設葬奠先徹祖奠故云徹者入入謂祝與執事徹祖奠者亦既盥乃入由重東而主人踊至徹訖設柩車西北則婦人踊也云猶阼階升者謂徹小斂奠者門外盥訖入升自阼階丈夫踊今徹者亦門外盥訖入由重東主人踊故云猶其升也云自重北西面而徹設於柩車西北亦猶序西南者此徹祖奠設于柩車西北亦猶小斂大斂朔月奠設于西南也徹者東注由柩至之饌釋曰以其徹訖當設葬奠故徹者由柩車北東適葬奠之饌取而設于柩車西也知由柩車北而東者以其徹者設于柩車西北而云徹者東若柩車南不得云徹者東故知在柩車北東行也鼎入注舉入至如初釋曰以其徹者既祖當設葬奠故五鼎皆入陳也云陳之也蓋於重東北西面北上如初者以其上篇小斂奠舉鼎入阼階前西面錯大斂奠云舉鼎入西面北上又朔月奠云鼎入皆如初其遷祖奠云陳鼎皆如殯則皆在阼階下西面北上今此但云鼎入不言如初無正文故云蓋以疑之既疑而知在東北西面北上者以其奠祭在室掌設者皆陳鼎於阼階下西面如大小斂故知也乃奠至上綪注籩螺至酒也釋曰云籩螺醢南辟醴酒也者如上所饌則先饌脾析於西南次北蜱醢次東葵菹次南螺醢陳設要方則四籩冝亦設於脾析巳南綪之為次今不於脾析巳南為次而發螺醢巳南為次故知辟醴酒醴酒當設在脾析之南可知也俎二至鮮獸注成猶至為俎釋曰知俎二以併不綪者若綪則冝先設羊於西南次北設豕次東設魚次南設臘今於西南設羊次北豕以魚設于羊東設臘于魚北還從南為始是不綪也其鮮獸在北北無偶故云特也是以鄭云不綪者魚在羊東臘在豕東也醴酒至北上注統於豆也釋曰云統於豆者豆即脾析也以其云北上上謂二甒醴酒繼豆言北上故云統于豆也奠者至而踊注亦以至南東釋曰自上巳來堂下設奠徹奠皆云主人要節而踊注皆云往來為節此主人要節而踊亦以往來為節奠來時由重北而西既奠由重南而東此奠饌在輅之東言由重北者亦是由車前明器之北鄉柩車西設之設訖由柩車南而來者禮之常也甸人至倚之注還重至由此釋曰自此盡徹者出踊如初論將葬重及車馬之等以次出之事云道左倚之者當倚於門東北壁云還重不言甸人者上云二人還重不言甸人至此乃言甸人也云重既虞將埋之者雜記文彼注云就所倚處埋之但天子九虞諸侯七虞大夫五虞士三虞未虞以前以重主其神虞所以安神雖未作主初虞其神即安於寢不假重為神主又士大夫無木主明亦初虞即埋之也云不由闑東西者重不反變於恆出入者恆出入則闑東闑西也云道左主人位者檀弓云重主道注云始死未作主以重主其神也則重主死者故於主人之位埋之也鄭云今時以下者引漢法證重倚道左之事也薦馬至南上注南上至序從釋曰云南上者謂於門外之時南上云便其行也者以其葬於國北在路則南上上者常在前故云便其行也云行者乘車在前道槀序從者案下記云乘車載旜道車載朝服槀車載蓑笠是序從也徹者至下體注苞者至為哀釋曰云苞者象既饗而歸賔俎者也案雜記文而言之云取下體者脛骨象行者以父母將行鄉壙故取前脛後脛下體行者以送之故云象行也云又俎實之終始也者此盛葬奠用少牢其載牲體亦當與少牢同案少牢載俎云肩臂臑膞骼在兩端又云肩在上以此言之則肩臂臑在俎上端為俎實之始膞骼在俎下端為俎實之終今取此兩端脛骨包以歸父母直取脛骨為象行又兩端為俎實之終始也云士苞三個者自上之差案檀弓云國君七個遣車七乘大夫五個遣車五乘注云人臣賜車馬者乃得有遣車遣車之差大夫五諸侯七則天子九諸侯不以命數喪數略也個謂所包遣奠牲體之數也雜記曰遣車視牢具彼注云言車多少各如所包遣奠牲體之數也然則遣車載所包遣奠而藏之者與遣奠天子大牢包九個諸侯亦大牢包七個大夫亦大牢包五個士少牢包三個大夫以上乃有遣車以此而言士無遣車則所包者不載于車直持之而巳士有一包而云包三個鄭又云個謂所包遣奠則士一包之中有三個牲體故云前脛折取臂臑後脛折取骼者若然大夫云遣車五乘包五個則一包之中有五個五五二十五一大牢而為二十五體則亦取下體前脛取臂臑後脛取骼三牲有九體又就九體折分為二十五個五包包各五個諸侯亦大牢而包七個天子亦一大牢又加以馬牲牲别有三體則十二體就十二體中細分為八十一個九包包各九個大夫以上皆不得全體謂若少儀云大牢則以牛左肩臂臑折九個之類亦為不全體也云亦得俎釋三個者羊俎上注云體不殊骨也其髀又不升則骼別為一段在俎今前脛折取臂臑其肩仍著胖為一段後脛折取骼仍有肫一節在俎則羊俎仍有兩段在俎豕則左胖豚解為四段在俎今前脛折取臂臑後脛折取骼仍有四段在俎若然羊俎有二段豕俎有四段相通則二俎俎有三段在故得為俎釋三個案特牲俎釋三個注云為改饌於西北隅遺之則此奠雖不改為饌西北隅留之亦為分禱五祀也引雜記者案彼云曽子謂或人曰吾子不見大饗乎夫大饗既饗卷三牲之俎歸于賔館父母而賔客之所以為哀也注云既饗歸賔俎所以厚之也言父母家之主今賔客之是孝子哀親之去也取此者以證此包牲歸父母亦是賔客父母之事也不以魚臘注非正牲也釋曰云非正牲也者正牲謂上三牲魚臘非正牲故不以魚臘載之故云非正牲行器注目葬至之次釋曰包牲訖明器當行鄉壙故云行器云目葬行明器者即下云茵苞巳下是也故云目葬行也茵包器序從注如其陳之先後釋曰此直云序從者序從即上文器西南上茵包巳下是也故此亦言茵包以其為首故也車從注次器釋曰上陳明器訖次列車以從明器故云次器也徹者出踊如初注於是至柩車釋曰徹者謂包牲訖當徹去所釋者出廟門分禱五祀者徹者出時主人踊云於是廟中當行者唯柩車者以其上文明器及車馬鄉壙者皆出唯有柩車在廟未出故云於是廟中當行者唯柩車也主人至南面注史北至為策釋曰自此盡滅燭出論讀賵讀遣之事經直云史請讀賵鄭知史北面請者以其主人於車東北面所請者請於主人明史北面問之故知史北面也又知在主人之前讀之對面當柩故知在主人之前西鄉柩也請訖乃西面請時及入時書在前算在後則史西面之時算在史南西面今燭在史北近史照書為便若在左則隔算不便也讀書釋算則坐注必釋至其多釋曰讀書者立讀之敬也釋算者坐為釋之便也云必釋算者榮其多者以其所賵之物言之亦得今必釋算顯其數者榮其多故也卒命至逆出釋曰言逆出則入時長在前出時長在後燭言滅不言出者以其燭巳滅不得言燭出其人亦出可知公史至燭出注公史至俠路釋曰知公史是君之典禮書者以其言公史故知君史案周禮大史小史皆掌禮則諸侯史亦掌典禮可知云成其得禮之正以終者以其死葬之以禮是死者得禮之終事故以君史讀而成之也知燭俠輅者上陳設葬奠云執燭夾輅北面故知也商祝至執披注居柩至無以釋曰自此盡杖乃行論柩車在道發行之事云執功布者謂執大功之布粗者也云以御柩執披者葬時乘人故有柩車前引柩者及在傍執披者皆御治之故云御柩執披也云柩車之前若道有低仰傾虧則以布為抑揚左右之節者道有低謂下坂時道有仰謂上坂時傾虧謂道之兩邊在車左右轍有髙下云以布為抑揚左右之節者道有低則抑下其布使知下坂道有仰則揚舉其布使知上坂云左右者謂道傾虧髙下則左右其布使知道之有傾虧也若東轍下則下其布向東西邊執披者持之西轍下則下其布向西東邊執披者持之若然鄭云使引者執披者知之者執披者知其左右引者知其上下也知士執披八人者案下記云執披者旁四人注云前後左右各二人是士執披者八人也主人至無算注袒為至之序釋曰云乃行謂柩車行者經云乃行文承主人袒下嫌主人行故云乃行謂柩車行以行處據柩為主柩車行主人行可知故舉柩車行也云凡從柩者先後左右如遷于祖之序者上遷于祖時注云主人從者丈夫由右婦人由左以服之親疏為先後各從其昭穆男賔在前女賔在後此從柩向壙之序一如遷于祖之序故如之也出宫踊襲注哀次釋曰云哀次者以經云出宫踊襲以出宫有此踊襲以出宫有此踊者止為出宫大門外有賔客次舍之處父母生時接擯之所故主人至此感而哀此次是以有踊踊訖即襲襲訖而行也故檀弓云哀次亦如之注云次他日賔客所受大門外舍也孝子至此而哀是也至于至纁束注邦門至送也釋曰云邦門者案檀弓云葬于北方北首三代之達禮也此邦門者國城北門也贈用玄纁束帛者即是至壙窆訖主人贈死者用玄纁束帛也以其君物所重故用之送終也主人至致命注柩車至柩車釋曰此謂宰夫將致命主人乃去杖不哭由柩車前輅之左右若然在廟柩車南鄉左則在東此出國北門柩車鄉北左則在前輅之西也賔由右致命則在柩車之東矣經直云左右鄭必知據前輅左右者次柩車在廟門時賔在柩車右主人在柩車左故知此亦當前輅左右也云當時止柩車者下記云唯君命止柩于堩其餘則否注云不敢留神明此宰夫致命時柩車止也主人至乃行注升柩至車後釋曰賔既致公贈命訖主人乃哭拜稽顙賔乃升車實幣于棺之蓋中載以之壙上文在廟所贈之幣皆奠于左服此實于蓋中者彼贈幣生死兩施故奠左服此贈專為死者故實于蓋中若親授之然云復位反柩車後者上在廟位在柩車東此行道故在柩車後也儀禮疏卷第三十九
