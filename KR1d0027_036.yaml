  text: 儀禮疏卷第四十二
  hash: sha256:b44b3838fcede4bf3d250f224aa4a684ada6ad7f92f8b673509b0f164de0af3b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_036-1a}
body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彥等撰士虞禮第十四鄭目録云虞安也士既葬父母迎精而反日中祭之於殯宫以安之虞於五禮屬凶大戴第六小戴第十五別録第十四釋曰案此經云側亨于廟門外之右又記云陳牲于廟門外皆云廟目録云祭之殯宫者廟則殯宫也故鄭注士喪禮凡官有鬼神曰廟以其虞卒哭在寢祔乃在廟是以鄭注喪服小記云虞於寢祔於祖廟是也士虞禮特豕饋食注饋猶歸也釋曰自此盡南順論陳鼎鑊祭器几筵等之事案左氏傳云卜日曰牲是以特牲云牲大夫巳上稱牲亦稱牢故云少牢此虞為喪祭又葬日虞因其吉日故略無卜牲之禮故指豕體而言不云牲大夫巳上亦當然雜記云大夫之虞也犆牲又此下記云陳牲於廟門外檀弓云與有司視虞牲皆言牲者記人之言不依常例故也然少牢云司馬刲羊士擊豕不言牲者據殺時須指事而言亦非常例也云饋猶歸者謂以物與神及人皆言饋是以此虞及特牲少牢皆言饋坊記云父母在饋獻不及車馬是生死皆言饋又案周忍一曰離也是日也以虞易奠卒哭曰成事是日也以吉祭易喪祭如是則卒哭即是吉祭而鄭此注云祔為吉祭者卒哭對虞為吉祭卒哭比祔為喪祭故下記云卒哭祭乃餞云尊兩甒於廟門外之右少南洗在尊東南水在洗東篚在西注云在門之左又少南則鼎鑊亦在門左又云明日以其班祔沐浴又云其他如饋食是祔乃與特牲吉祭同以祔為吉祭是以云祔而以吉祭易喪祭也云鬼神所在則曰廟尊言之者對時廟與寢別今雖葬既以其迎魂而反神還在寢故以寢為廟虞於中祭之也魚臘至北上注爨竈釋曰上豕爨在門右東面此魚臘各別鑊言北上則次在豕鼎之北而云爨竈者周公經為爨至孔子時為竈故王孫賈問孔子曰與其媚於奧寧媚於竈是前後異名故鄭舉後決前也饎爨至西面注炊黍至彌吉釋曰以三鑊在西方反吉案特牲云主婦視饎爨于西堂下宗婦主之在西方今在東亦反吉也少牢廩爨在饔爨之北在門外者是大夫主之廩人掌男子之事故與牲爨同在門外東方也知炊黍稷曰饎者案周禮饎人云掌凡祭祀共盛齊盛即黍稷故知也云北上上齊于屋宇者此案特牲記云饎爨在西壁鄭注云西壁堂之西牆下舊說云南北直屋梠稷在南彼此東西皆言壁彼云屋梠此云屋宇故知此亦齊屋也云於虞有亨饎之爨彌吉者以其小斂大斂未有黍稷朔月薦新之等始有黍稷向吉仍未有爨至此始有亨饎之爨故云彌吉設洗至在東注反吉至堂深釋曰如其上文設爨反吉此亦反吉又上下篇吉時設洗皆當東榮南北以堂深今在西階西南亦當西榮南北以堂深可知也尊于至南枋注酒在至葛屬釋曰云酒在東上醴也者醴法上古酒是人所常飲故在東吉禮玄酒在酒上今以喪祭禮無玄酒則醴代玄酒在上故云上醴也云絺布葛屬者絺綌以葛為之布則以麻為之今絺布並言則此麻葛雜故有兩號是以鄭云葛屬也素几至序下注有几始鬼神也釋曰經几席具有注唯云几者以其大斂奠時巳有席至此虞祭乃有几故也然案檀弓云虞而立尸有几筵筵則席虞祭始有者以几筵相將故連言筵其虞有几若天子諸侯始死則几筵具故周禮司几筵云每燾一几據始殯及葬時是始死即几席具也苴刌至坫上注苴猶藉也釋曰此苴而云藉祭故易云藉用白茅無咎饌兩至亞之注醢在至設之釋曰此饌繼西楹言之則以西楹為主向東陳之云一鉶亞之者菹以東也云醢在西南面取之得左取菹右取醢便其設之者以其尸在奧東面設者西面設於尸前菹在南醢在北今於西楹東饌之菹在東醢在西是南面取之得左取菹右取醢至尸前西面又左菹右醢故云便也從獻至北上注豆從至於正釋曰此從獻豆籩雖文承一鉶之下而云亞之下別云北上是不從鉶東為次冝於鉶東北以北為上向南陳之若然文承一鉶下而云亞之者以其次在鉶以東去楹漸逺故云亞不謂亞鉶以東也據此陳之次然則東北菹為首次南醢醢東栗栗北棗棗東棗棗南栗此以東面取之而入北面設之祝前得右菹左醢其籩亦然先陳者先設後陳者後設棗在左亦得其設故鄭云北上菹與棗也云豆從主人獻祝者以其尸前正豆已設訖以為隂厭不名為從此二豆主人先獻祝酒後乃薦豆故言從云籩從主婦獻尸祝者以其四籩二籩從主婦獻尸二籩從主婦獻祝亦是從也云不東陳別於正者以二豆與鉶在尸為獻前為正此皆在獻後為非正故東北別也饌黍至葦席注藉猶至為席釋曰云藉猶薦也者謂先陳席乃陳黍稷於上是所陳席藉薦黍稷也陳三至扃冪注門外至為鉉釋曰此扃雖先云設其設扃在後知者案士喪禮小斂云右人左執匕抽扃豫左手兼執之取冪委于鼎北加扃則扃在冪上故先抽扃後去冪則冪先設可知扃冪雖在三鼎之下揔言其實陳一鼎訖即設之知者案下記云皆設扃冪注云嫌既陳乃設扃冪是也􅎅俎在西孰之西注不饌至南鄉釋曰云不饌於孰上統於鼎也者決下文羞燔俎在內西孰上而在孰上又云賔降反俎于西孰至於主婦亞獻訖直云賔燔從如初明尸受燔訖賔亦反俎于西孰上是互見義也主人至如之注葬服至事也釋曰自此盡北面論將虞祭於位及衣服之事云葬服者既夕曰丈夫髽散帶垂也者此唯謂葬日反日中而虞及三虞時其後卒哭即服其故服是以既夕記注云自卒至殯自啓至葬主人之禮其變同則始虞與葬服同三虞皆同至卒哭卒去無時之哭則依其喪服乃變麻服葛也云賔執事者賔客來執事也者以其虞為喪祭主人未執事故云賔客來執事也案下注云士之屬官為其長弔服加麻即此經賔執事者弔服是也若然此士屬官中有命于其君者是以特牲記賔中有公有司鄭注云公有司亦士之屬命于其君者也案曽子問士則朋友奠不足取於大功以下又云士祭不足則取於兄弟大功以下者鄭云祭謂虞卒哭時以此而言彼朋友則公有司與此執事一物以僚友言之雖屬官亦為朋友也祝免至南上注祝亦至南也釋曰云祝亦執事者謂亦上執事也云免者祭祀之禮祝所親也者案禮記喪服小記云緦麻小功虞卒哭則免注云卒哭緦麻巳上至斬衰皆免今祝是執事屬吏之等皆無免法今與緦巳上同著免嫌其大重故云祭祀之禮祝所親而可以受服也宗人至人哭注臨朝夕哭釋曰朝夕哭祭時門外送賔訖入門男子婦人共哭也主人至哭位注既夕至朝夕釋曰此明賔將與祭主人及兄弟等即位之事云如反哭位鄭引既夕者證主人等面位之事也祝入門左北面注不與至尊也釋曰云不與執事同位接神尊也者執事即上兄弟賔即位于西方如反哭位皆是執事故曽子問喪祭不足則取兄弟故云不與執事同位接神尊也宗人至北面注當詔至之事釋曰此宗人在堂下是主人在堂時若主人在室宗人即升堂是以下記云主人在室則宗人升戶外北面注云當詔主人室事是也祝盥至止哭注縮縱也釋曰自此盡哭出復位論設饌於神杖不入於門之事也案此文隂厭時主人倚杖入祝從在左西面下記云尸入祝從尸注云祝在主人前也嫌如初時主人倚杖入祝從之初時主人之心尚若親存冝自親之今既接神祝當詔侑尸也主人前自西入向東在階下未得倚杖于序今主人在西階將入室故倚杖於西序贊薦至在北注主婦至下者釋曰案特牲主婦盥于房中薦兩豆此主婦不薦故決之既引曽子問士祭不足則取於兄弟大功以下者彼文承奠下故引之下卒哭既取大功以下則齊斬不執事可知此齊斬不執事唯為今時至于尸入之後亦執事兩籩棗栗設於㑹南至於祔祭雖隂厭亦主婦薦主人自執事也知者下記云其他如饋食案特牲云主人在右及佐食舉牲鼎是也若大夫巳上尊不執事故少牢云主人出迎鼎注云道之也是不執事也贊設至東稷注簋實尊黍也釋曰云簋實尊黍也者以經西黍東稷西上故云尊黍也經云敦注言簋者案特牲云佐食分簋鉶注云分簋者分敦黍於㑹為有對也敦有虞氏之器也周制士用之變敦言簋容同姓之士得從周制耳然則此注變敦言簋者亦謂同姓之士得用簋故也注鉶菜羮也釋曰此對泰是湆羮佐食至戶西注饌巳至戶西釋曰佐食出者以無事不可以空立故出立于戶西不從今文無于戶西三字者若無此文不知立之所在故不從也祝酌至復位注㑹合至為開釋曰特牲少牢直言酌奠不言酌醴者以彼直有酒故不言酒是酒可知此酒醴兩有今所奠者醴故須言醴也若然彼單酒此兩有者以其同小斂大斂朔月遷祖祖奠大遣奠等皆酒醴並有故此虞之喪祭亦兩有異於吉祭也祝奠至稽首注復位至之左釋曰云復主人之左者上主人倚杖入祝從在左不見祝更有位故復主人左也祝饗命佐食祭注饗告至是也釋曰下云祝祝卒注云祝祝者釋孝子祭辭又下文迎尸後尸墮祭云祝祝主人拜如初此等三者皆有辭此文饗神引記者是隂厭饗神辭下文迎尸上釋孝子辭者經記無文案少牢迎尸祝孝子辭云孝孫某敢用柔毛剛鬣嘉薦普淖用薦歲事于皇祖伯某以某妃配某氏尚饗此是釋孝子辭此迎尸上釋孝子辭冝與彼同但稱哀為異其迎尸後祝辭者即下記饗辭云哀子某圭為而哀薦之饗鄭注云饗辭勸強尸之辭也凡吉祭饗尸曰孝子是以特牲迎尸後云祝饗注云饗勸強之也其辭取於士虞記則冝云孝孫某圭為孝薦之饗是也下二虞卒哭記皆有辭至彼別釋佐食至稽首注鉤袒至何乎釋曰云鉤袒如今擐衣也者經云鉤袒若漢時人擐衣以露臂故云如今擐衣也云孝子始將納尸以事其親為神疑於其位設苴以定之耳者案上文祝取苴降洗設于几東者至此乃祭于苴下文乃筵尸是孝子迎尸之前用苴以將納尸以事其親為神疑於其位故設苴以定之解預設苴之意也云或曰苴主道也則特牲少牢當有主象而無何乎者解舊有人云苴主道似重為主道然故鄭破之云若是苴為主道特牲少牢吉祭亦當有主象亦冝設苴今而無苴何乎是鄭以苴為藉祭非主道也若然此據文有尸而言將納尸有苴案下記文無尸者亦有苴又特牲少牢吉祭無苴案司巫祭祀則共匰主及蒩館常祀亦有苴者以天子諸侯尊者禮備故吉祭亦有苴凶祭有苴可知祝迎至從尸注尸主至虞尸釋曰自此盡如初設論迎尸入九飯之事鄭知一人衰絰是主人兄弟者以主人哭出復位無從尸之理又云衰絰且非疏逺故知一人衰絰是主人兄弟也引檀弓者證祝隨主人葬先反宿虞尸故得有祝迎尸之事云既封者封當為窆窆下棺也尸入至人踊注踊不至主敬釋曰云踊不同文者有先後也者主人在西序東面衆兄弟西階下亦東面婦人堂上當東序西面故主人與兄弟見尸先踊婦人後見尸故後踊是有先後云尸入主人不降者喪事主哀不主敬者決特牲少牢尸入主人皆降立于阼階東敬尸故此不降為主哀淳尸至授巾注淳沃至者也釋曰此直言盥不言面位案特牲云尸入門左北面盥宗人授巾上陳器時匜水之等在西階之東合在門左則以器就特牲注云侍盥者執其器就之若然特牲設尸盥在門內之右注云尸尊不就洗門內之右象洗在東此虞禮反吉祭故在西階東少牢禮異於士禮故尸盥在西階東與此虞禮同也云沃尸盥者賔執事者也案上文賔與主人皆在執事之中既宗人授巾明沃盥亦賔執事也尸及階祝延尸注延進至以升釋曰案特牲云祝延尸注云延進也在後詔侑曰延又案少牢注云由後詔相之曰延然則延者皆在後也若然記云尸謖祝前鄉尸又曰降階還及門如出户注云降階如升時以此言之降在尸前云如升者直取與尸升同不取後同故禮器詔侑無方是也尸升至如初注言詔至詔之釋曰云言詔踊如初則凡踊宗人詔之者以其上無宗人詔踊之事以此宗人詔踊云如初明前踊并明下文踊皆宗人詔之故鄭云凡也婦人入于房注辟執事者釋曰以其婦人在堂上執事者由堂東故辟之入房也主人至遂坐釋曰案郊特牲注云尸即至尊之坐或時不自安則以拜安之此亦然妥安坐也爾雅文從者至其北注北席北也釋曰此虞禮篚象特牲肵俎肵俎置于席北明此篚亦在席北以擬盛尸之饌也尸取至墮祭注下祭至為墮釋曰云尸取奠左執之者以右手將墮故也云下祭曰墮者以其凡祭皆手舉之向下祭之故云下祭曰墮云墮之猶言墮下者案左傳云子路將墮三都以三都大髙故墮下之取墮為下祭之義故讀從之引周禮守祧職云既祭藏其墮謂此也者謂此墮祭一也引之者證守祧同之耳云今文墮為綏又云特牲少牢或為羞失古正矣者此二字皆非墮下之義故云失古正也云齊魯之閒謂祭為墮者齊南魯北謂祭為墮者由墮下而祭因即謂祭為墮是鄭從墮不從綏與羞之意也案特牲云祝命挼祭注云士虞禮古文曰祝命佐食墮祭周禮曰既祭則藏其墮墮與挼讀同耳今文改挼皆為綏古文此皆為擩祭也又少牢尸將酢主人時上佐食以綏祭鄭注云綏讀為墮此三處經中墮皆不同者此五字或為墮或為挼或為羞或為綏或為擩此五者鄭既以挼綏及羞三者巳從墮復云古文作擩以其特牲及此士虞皆有擩祭故亦兼擩解佐食至奠之注如初至稽首釋曰云如初亦祝祝卒乃再拜稽首者亦如上文迎尸前祝祝卒也佐食至執之注右手至于豆釋曰案特牲祝命爾敦佐食爾黍稷于席上舉肺脊以授尸尸受振祭嚌之彼舉肺脊在爾敦後此舉肺脊在爾敦前者彼吉祭吉凶相變故也云右手將有事也者為下文祭鉶嘗鉶是也云尸食之時亦奠肺脊於豆者解經無奠文知不執以食卒者案下文云尸卒食佐食受肺脊實于篚在尸手當云受肺脊又知在豆者特牲云尸實舉于菹豆是也案特牲尸乃食食舉注云舉言食者明凡解體皆連肉少牢云食舉注云舉牢肺正脊也先飯啖之以為道也此喪祭不言食舉亦食舉可知是以特牲注云肺氣之主也脊正體之貴者先食啖之所以道食通氣也案下文注云尸不受魚臘以喪不備味則亦不食庶羞矣尸祭鉶嘗鉶注右手至羊鉶釋曰知以右手者上經云佐食舉肺脊授尸尸受振祭嚌之左手執之鄭云右手將有事指此嘗鉶用右手也引少牢者證此經嘗祭之時亦用柶案下記云鉶芼用苦若薇有滑夏用葵冬用荁有柶是用柶祭之義泰羮至于左注博異至肉也釋曰云設于鉶南者以泰羮湆未設故繼鉶而言之其實觶北留空處以待泰羮云胾四豆設于左者案特牲四豆設於左南上云左者正豆之左又少牢云上佐食羞胾兩瓦豆有醢設于薦豆之北注云設於薦豆之北以其加也言北亦是左也云博異味者以其有湆有胾故也尸飯播餘于篚注不反至為半釋曰云古者飯用手者案曲禮云無摶飯又云無放飯飯黍無以箸故知古者飯用手言此者證播飯去手為放飯云吉時播餘于㑹者可知故決之三飯至于篚注飯閒至食氣釋曰云飯閒啖肉安食氣者以其胳脅骨體連肉又在三飯之閒故云飯閒啖肉安食氣又三至于篚注尸不至備味釋曰云尸不受魚臘者案經佐食舉魚臘不云尸受嚌之明尸不受魚臘可知云以喪不備味者案特牲三舉魚臘尸皆振祭嚌之此佐食舉魚臘實於篚尸不嚌故云喪不備味又三至如初注後舉至成也釋曰云後舉肩者貴要成也者案禮記祭統云周人貴肩故云貴者要成也要成者據後食即飽也舉魚至三個注釋猶至牲也釋曰此經直舉魚臘俎盛於篚俎釋三個不言盛牲體者案下記云羮飪升左肩臂臑肫骼脊脅七體此上經佐食初舉脊次舉幹又舉胳終舉肩揔舉四體唯有臂臑肫三者佐食即當俎釋三個不復盛牲體故直舉魚臘而巳云遺之者君子不盡人之歡不竭人之忠此上曲禮文案彼注歡謂飲食忠謂衣服於此引之併據飲食者彼注對文此注散文則歡與忠通故揔證牲體也又案特牲釋三個注云謂改饌於西北隅遺之與此注不同者此注亦有改饌之義又兼有此不盡歡忠之禮云今俗或名枚曰個音相近者經中個人下竪牽俗語名枚曰個者人傍著固字雖不同音聲相近同是一個之義云此臘亦七體如其牲也者案下記牲有七體此臘亦不過於牲體故云如其牲言此以對彼案彼特牲吉祭十一體是以特牲記云臘如牲骨乃有十一體與此不同吉禮異故也尸卒至初設注九飯至肵俎釋曰云反黍如初設者案上設黍稷在俎南西黍東稷次上文佐食舉黍錯于席上此尸卒食故反黍於本處如初設云九飯而巳士禮也者少牢十一飯諸侯十三飯天子十五飯故云九飯士禮也云篚猶吉祭之有肵俎者案特牲少牢尸舉牲體振祭嚌之皆加於肵俎此尸舉牲體振祭嚌之皆實於篚故云篚猶吉祭之有肵俎主人至嘗之注爵無至作酌釋曰自此盡升堂復位論主人初獻尸并獻祝及獻佐食之事云爵無足曰廢爵者案下文主婦洗足爵鄭云爵有足輕者飾也則主人喪重爵無足可知凡諸言廢者皆是無足廢敦之類是也云主人北面以酳酢變吉也者案特牲少牢尸拜受主人西面拜送與此面相反故云變吉也案特牲直有主人拜送雖不見主人面位約與少牢同皆西面也云凡異者皆變吉者案特牲云主人拜送此云主人答拜特牲云尸卒角祝受尸角曰送爵此不云送爵特牲嚌肝訖加於菹豆此嚌肝訖加於俎皆是異於吉時故云凡異者皆變吉賔長至右鹽注縮從至併也釋曰云縮從也從實肝炙於俎也喪祭進柢者案下記云載猶進柢柢本也謂肝之本頭進之向尸云右鹽於俎近北便尸取之也者縱執俎一頭向尸據執俎之人左畔有肝右畔有鹽西面向尸尸東面以右手取肝於俎右畔擩鹽於左畔是以鹽於俎之近北便尸取之云縮執俎言右鹽則肝鹽併也者謂俎既縮執則狹肝鹽不容相逺是執俎人右畔有鹽左畔有肝故云併也尸左至復位注取肝至於味釋曰復位者謂賔長也尸既振肝訖復西階前衆兄弟之南東面位云以喪不志於味者決特牲少牢尸嚌肝訖加菹豆以近身此虞禮尸嚌肝訖不加于菹豆而逺加於俎以同牲體者以喪志不在於味故逺身加俎也若然特牲少牢祝不敢與尸同加於菹豆嚌肝訖加于俎與此尸同者祝無不在味之嫌禮窮則同故也筵祝南面注祝接至􅍉席釋曰上文尸用葦席其祝席經記雖不言以尸用在喪故不用萑今祝冝與平常同故用萑也云祝接神尊也者解先得獻之事主人至答拜注獻祝至面位釋曰云獻祝因反西面位者以少牢云主人受酢時主人拜受爵尸答拜主人西面奠爵特牲云主人拜受角雖不言西面彼注云退者進受爵反位則西面也是吉祭時主人西面故上注云北面以酳酢變吉也今至酳酢及獻祝訖明因反西面位可知也薦菹至答拜釋曰此直言薦菹醢設俎者不見薦徹之人案下文云祝薦席徹入于房注云徹薦席者執事者則此設者亦執事可知注篚在至面立釋曰云篚在庭者此雖無文約同薦車設遷奠之等也云不復入事巳也亦因取杖乃東西面立者上文哭時主人升堂西序東面又上文云主人倚杖入今升堂復位不復入室以其事巳因得取杖復東面位也主婦至人儀注爵有至東隅釋曰自此盡入于房論主婦獻尸并獻祝及佐食之事云如主人儀者即上主人酳尸尸拜受爵主人北面答拜之等今主婦亞獻亦然故云如主人儀也云爵有足輕者飾也者主婦主人之婦為舅姑齊衰是輕於主人故爵有足為飾也引昏禮者證經洗爵于房中不言設洗處冝與昏禮同也自反至在西注尚棗棗美釋曰案特牲宗婦執兩籩主婦受設于敦南此主婦自反兩籩不使宗婦者以喪尚縱縱反吉故然上主人獻使贊薦菹醢注云齊斬之服不執事者彼為主人獻故不使主婦薦此亞獻己所有事故自薦可知尸祭至于房注初主人儀釋曰此尸祭籩已下至籩燔從獻佐食皆與主人獻尸賔長以肝從至佐食祭酒卒爵拜主人答拜受爵出實于篚並如主人儀故皆云如初也賔長至初儀注繶爵至彌飾釋曰此一節論賔長終三獻之事云繶爵口足之閒有篆又彌飾者案屨人繶是屨之牙底之閒縫中之飾則此爵云繶者亦是爵口足之閒有飾可知云又彌飾以其主婦有足已是有飾今口足之閒又加飾也婦人復位注復堂至哭踊釋曰自此盡拜稽顙論祭訖送尸及改饌為陽厭之事云復堂上西面位者上云主人即位於門外如朝夕臨位婦人及內兄弟服即位於堂亦如之以下更不見别有婦人位明復位者還此位可知又案士喪禮凡臨位婦人即位于堂南上即面位也云尸將出當哭踊者以哭送此喪祭故踊特牲吉祭不哭踊故亦無此復位之事也祝出至人哭注西面至閒嫌釋曰云西面告告主人也者以處主人東面故祝西面對而告之云不言養禮畢於尸閒嫌者若言養禮畢即於尸中閒有嫌諷去之或本閒作間音以養尸事畢而尸空間嫌諷去之皆哭注丈夫至哭矣釋曰言上云主人哭則主人之外緦麻以上在位者皆哭故鄭揔丈夫婦人於主人哭斯哭矣祝入尸謖注謖起至為休釋曰云祝入而無事尸則知起矣者雖不告尸無事尸亦知無事禮畢而起矣云不告尸者無遣尊者之道也者謂不告尸以禮畢者尸尊若告之則如發遣尊者故云不告尸者無遣尊者之道也祝前至如之注前道至哀同釋曰案上文尸入門丈夫踊婦人踊尸及階祝延尸尸升宗人詔踊如初尸入戶踊如初故此鄭云出如入降如升三者之節悲哀同是以如之得有三者也祝反至用席注改設至幽暗釋曰祝反入謂送尸出門而反入徹神前之饌改設于西北隅也云如其設也者謂設于西北隅次第一如奧中東面設云几在南變古文者上文隂厭時設几席于室中東面右几今云几在南明其同必變文者案少牢大夫禮陽厭時南亦几在右此言右几嫌與大夫同南面而右几故變文云几在南與前在奧同故云明東面也又以特牲云祝筵几于室中東面至於改饌云佐食徹尸薦俎敦設于西北隅几在南是與此同也云不南面漸也者以特牲東面右几今虞為喪祭示向吉有漸故設几與吉祭同厞隱也于厞隱之處從其幽暗者謂以席為障使之隱故云厞隱從其幽暗也祝薦至俎出注徹薦至房來釋曰云徹薦席者執事者但祝之薦席設與徹不言其人知使執事者以其主人之士不言官者皆為之故也云祝薦席則初自房來者以其上文神席在西序下此祝經記俱不言今知自房來者見公食大夫記云筵出自房昏禮與士冠席皆亦在于房故此祝席亦自房來今還于房可知也贊闔牖戶注鬼神至食者釋曰云或者逺人乎者禮記郊特牲文此鄭玄之義非直取鬼神居幽暗或取逺人之意故也知是生人之意云贊佐食者自上以來行事唯有祝與佐食以其云祝自執其俎出故知闔牖戶者是佐食也注門外未入位釋曰知是門外位者以經云出門乃更云皆復位明門外未入位可知宗人至稽顙注送拜至弟也釋曰云送拜者明于大門外也者以其上文云復位是殯門外未出大門此云送拜是大門外送拜可知知徹室中之饌者兄弟也者賔即執事而云賔出則室中無執事之人唯有兄弟故徹室中之饌者兄弟可知也記虞沐浴不櫛注沐浴至沐浴釋曰云唯三年之喪不櫛期以下櫛可也者經云不據三年為主案下文班祔而明期以下虞而沐浴櫛可也陳牲至寢右注言牲至虞牲釋曰知臘在牲中者士虞唯有一豕而云西上明知兼兔臘得云西上也云西上變吉者案少牢二牲東上是吉祭東上今此西上是變吉也云寢右者當升左胖也者若然特牲臘在東置於棜東首牲在西尚右今虞禮反吉故寢右升左胖知臘用棜者案特牲陳鼎於門外北面北上棜在南南順實獸于其上東首是也引檀弓者證虞時有牲之事日中而行事注朝葬至質明釋曰云辰正者謂朝夕日中也以朝有葬事故至日中而行虞事也云再虞三虞皆質明者以朝無葬事故皆質明而行虞事是用朝之辰正也殺于至豚解注主人至無廟釋曰云主人視牲不視殺凡為喪事略也者案特牲饋食禮宗人告濯具賔出主人出皆復外位鄭云為視牲也又曰告事畢賔出主人拜送夙興主人服如初立于門外東方南面視側殺然則特牲吉祭故主人視牲又視殺今虞為喪事故主人視牲不視殺是其略也凡者衆辭但此經與特牲饋食不同者皆為喪事略故云凡以廣之豚解解前後脛脊脅而巳孰乃體解升於鼎也者體解下文七體是也羮飪至上鼎注肉謂至殳聲釋曰肉謂之羮爾雅釋器文飪孰釋言文云脊脅正脊正脅也者案特牲注云不貶正脊不奪正也然則此為喪祭體數雖略亦不奪正故知脊脅正脊正脅也云喪祭略七體耳者案特牲尸俎右肩臂臑肫胳正脊二骨橫脊長脅二骨短脅注云士之正祭禮九體貶於大夫有併骨二亦得十一之名合少牢之體數此所謂放而不致者然則此所升唯七體故云喪祭略七體耳云離肺舉肺也者案特牲注云離猶㨒也小而長午割之亦不提心謂之舉肺是也引少牢饋食禮者證離肺舉肺之異也云膉脰肉也者案少牢云雍人倫膚九實于一鼎注云倫擇也膚脅革肉擇之取美者案下注今以脰肉貶於純吉則此用膉為貶於純吉之事也云古文曰左股上此字從肉殳殳矛之殳聲者鄭注儀禮疊古文從經今文又就古文解之者鄭欲兩從故也但字從肉義可知而以殳與股不是形人之類其理未審升魚至中鼎注差減之釋曰差減之者案特牲魚十有五今為喪祭略而用九故云差減之也升臘至下鼎注臘亦七體牲之類釋曰云臘亦七體牲之類者牲上文升左肩臂臑肫骼脊脅是牲之七體今升臘左胖亦然特牲記云臘如牲骨是也皆設扃冪陳之注嫌既至作密釋曰云嫌既陳乃設扃冪也者經云陳三鼎後言設扃冪有嫌故記人辨之皆先扃冪後陳之也載猶至進鬐注猶猶至為耆釋曰鬐柢二者皆變於吉是以少牢云下利升豕其載如羊皆進下注云變於食也又曰臘一純而俎亦進下又曰魚用鮒十有五而俎縮載右首進腴注云亦變於食生也是皆與此反矣是變於吉也云猶猶士喪既夕言未可以吉也者云與吉反則明與生人同士喪禮小斂云皆覆進柢注云柢本也進本者未異於生也至大斂載魚左首進鬐臘進柢鄭注云亦未異於生也又葬奠云如初皆未異於生故記人以猶之是以鄉飲酒鄉射記皆云右體進腠是也祝俎至敦東注不升至下尸釋曰云不升於鼎賤也者祝對上尸俎羮飪升於鼎為貴者也云統於敦明神惠也者案上文饌黍稷二敦于階閒西上是神之黍稷今陳祝饌于神饌之東統于神物明惠由神也云祭以離肺下尸者以其尸祭用刲肺祝不用刲肺用離肺故云下尸也淳尸至南面注槃以至卑也釋曰上經直云淳尸盥宗人授巾不云執槃與執匜執巾及宗人授巾等面位故記人明之主人至北面注當詔主人室事釋曰上經唯言宗人告有司具及詔主人踊皆堂下之事今主人入室宗人當升戶外詔主人室中之事故升堂也佐食至南面注室中至之依釋曰云戶牖之閒謂之扆此爾雅文謂戶西南面也鉶芼至有柶注苦苦至為芐釋曰案公食記三牲具則牛藿羊苦豕薇各用其一若一牲者容兼用其二是以及特牲一豕皆云鉶芼苦薇是科用其一也知荁堇類者內則云堇荁枌榆同為滑物故知荁堇類也云乾則滑者以其冬用之故知乾則滑于堇也云夏秋用生葵冬春用乾荁者以其秋與夏同有生葵春初未生者故春約與冬同是以經直云冬明舉夏以兼秋舉冬以兼春也豆實至栗擇注棗蒸至藤也釋曰云棗蒸栗擇則菹刌也棗蒸栗擇則豆不楬籩有藤也者此雖無正文案士喪禮大斂云毼豆兩其實葵菹芋螺醢兩籩無藤布巾其實栗不擇脯四脡自大斂後皆云如初則葬奠四豆脾析葵菹亦長矣四籩棗糗栗脯亦不擇也至此乃云棗蒸栗擇則菹亦切矣豆籩有飾可知尸入祝從尸注祝在至尸也釋曰上經隂厭時主人先祝入戶至此迎尸祝在主人前先後有異故記人明之是以鄭云祝在主人前也嫌如初時主人倚杖入祝從之也云今既接神祝當詔侑尸也者尸神象是以云既接神祝當詔侑尸即上祝命佐食爾敦舉黍稷及祝酌授尸及祝出告利成祝入尸謖之等是也尸坐不說屨注侍神至為稅釋曰案鄉飲酒燕禮之等凡坐降說屨乃升坐今尸雖坐不說屨者為侍神不敢燕惰故也儀禮疏卷第四十二
