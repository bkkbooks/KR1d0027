  text: 儀禮疏卷第四十九
  hash: sha256:419a164cd5dc89e5805f83df50033f01c0aae13feca53805c0a117034657e1f9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_043-1a}
body:
  text: 唐朝散大夫行太學博士引文館學士臣賈公彥等撰有司徹第十七釋曰鄭目録云少牢之下篇也大夫既祭儐尸於堂之禮祭畢禮尸於室中天子諸侯之祭明日而繹有司徹於五禮屬吉大戴第九小載第十二別録少牢下篇第十七釋曰言大夫既祭儐尸於堂之禮者謂上大夫室內事尸行三獻禮畢别行儐尸於堂之禮又云祭畢禮尸於室中者據下大夫室內事尸行三獻無别行儐尸於堂之事即於室內為加爵禮尸即下文云若不儐尸以下是也有司徹注徹室至祭也釋曰自此盡如初論徹室內之饋并更整設及溫尸俎之事云徹室中之饋及祝佐食之俎者室內之饋主於尸饌薦俎黍稷皆名饋下大夫不儐尸餕訖云有司官徹饋饌于室中西北隅彼鄭注云官徹饋者司馬司士舉俎宰夫取敦及豆則此饋內兼數物唯無肵俎肵俎上篇佐食徹之先設於堂下也又言及祝佐食之俎者殊其尊卑為文祝亦有薦在室內北墉下佐食之俎在兩楹之閒無薦此等見於上篇今徹祝與佐食并為文者賤者省文之義其實祝薦俎在室內佐食俎在階間此直云有司不言官下大夫不儐尸云官徹者彼為更饌西北隅為陽厭故見官也肵俎亦用儐尸不使有司同時徹者肵俎本為尸故設之徹之皆不與正俎同時而後設先徹案楚茨詩云諸宰君婦廢徹不遲此不言者彼人君禮故不同也云卿大夫既祭而賔尸禮崇也者此對下大夫不儐尸禮不崇也云以此薦俎之陳有祭象而亦足以厭飫神者對下大夫尸出之後改饌西北隅為厭飫神今儐尸者雖不設饌西北隅以此薦俎之陳有祭象亦足以厭飫神亦下大夫也云天子諸侯明日祭於祊而繹者欲見天子諸侯尊別日為之與卿大夫禮異但祊與繹二者俱時為之故郊特牲云繹之於庫門內祊之於東方失之矣鄭注云祊之禮冝於廟門外之西室繹又於其堂神位在西此二者同時而大名曰繹其祭禮簡而事尸禮大引春秋傳者此宣八年左氏傳辛巳有事于大廟仲遂卒于垂卿佐卒輕于正祭不合廢但繹祭禮輕冝廢而不廢故譏之云壬午猶繹引之者證人君別日為繹又見二者雖同時而大名繹故孔子書繹不書祊引爾雅者爾雅釋天文彼云周曰繹商曰肜夏曰復胙復胙者復胙日之胙祭殷曰肜者義取肜肜祭不絶周曰繹者取尋繹前祭之事但祊者禮器云為祊乎外注祊祭明日之繹祭也謂之祊者於廟門之旁因名焉其祭之禮既設祭於室而事尸於堂孝子求神非一處是也此祊是明日又祭故於廟門外若然正祭祊即於廟門內故楚茨詩云祝祭于祊祀事孔明毛傳云祊門內也鄭云孝子不知神之所在故使祝博求之平生門內之旁待賔客之處祀禮於是甚明是正祭祊在門內也郊特牲云索祭祝于祊不知神之所在於彼乎於此乎或諸逺人乎祭于祊尚曰求諸逺者與亦是祭之明日祊故云求諸逺者但此大夫儐尸同用正祭之牲天子諸侯禮大別日又別牲故牛人云享牛求牛鄭云享獻也獻神之牛謂所以祭者也求終也終事之牛謂所以繹者也是其别牲也掃堂注為賔至曰拚釋曰為賔尸新之者正祭於室之時堂亦掃訖今將儐尸又掃之故云為儐尸新之引少儀者若直掃席前止可云拚今云掃不云拚明於堂廟泛掃引之見泛掃為義也司宫攝酒注更洗至為聶釋曰鄭云更洗益整頓之者案士冠禮再醮攝酒注云攝猶整也整酒謂撓之此更添益整頓則此洗當作撓此謂賔尸唯徹室中之饋亦因前正祭之酒更撓攪添益整新之也乃燅尸俎注燅溫至寒也釋曰知溫尸俎於爨者見下文云卒燅乃升牛豕魚三鼎故知先溫於爨之鑊乃後升之於鼎也肵亦溫焉知者案下文載俎所舉在肵肩胳脊脅皆在載於俎明亦溫可知又云獨言溫尸俎則祝與佐食不與賔尸之禮者但正祭時尸祝及佐食皆有俎今獨言溫尸俎欲見賔尸時祝與佐食不與而別立侑也云古文燅皆作尋者論語及左傳與此古文皆作尋論語不破至此疊古文不從者彼不破者或古文通用至此見有今作燅有火義故從今文也云記或作燖者案郊特牲云有虞氏之祭也尚用氣血腥爓祭用氣也注云爓或為燖今此義指彼記或讀之故云記或作燖也引春秋傳者案哀公十二年左傳夏公會吳于橐皋吳子使大宰嚭請尋盟公不欲使子貢對曰盟所以周信也故心以制之玉帛以奉之言以結之明神以要之寡君以為苟有盟焉弗可改也巳若猶可改日盟何益今吾子曰必尋盟若可尋也亦可寒也服注云尋之言重也溫也寒歇也亦可寒而歇之鄭引之者證燅尸俎是重溫之義卒燅至如初注臘為至為密釋曰云臘為庶羞者鄭解不燅臘之義案上燅尸俎則皆在其內今升鼎言無臘下載又不見臘體明從庶羞可知云膚從豕去其鼎知者下載體時膚猶在豕鼎不為庶羞可知但正祭時五鼎今二者皆去其鼎故云賔尸之禮殺於初也乃議至異姓注議猶至作宥釋曰自此盡侑答拜論選侑并迎尸及侑之事云是時主人及賔有司已復內位者下文侑出俟于廟門之外又云主人出迎尸侑言侑即賔之賢者明賔有司主人皆復內位矣若然知賔主不先在內必知出復內位者上篇云四餕者二佐食二賔長餕訖皆出未見入主人送上餕言退皆有出事今議侑在內故云是時賔主人巳復內位也宗人戒侑注戒猶至為侑釋曰知南面告於其位者以賔位在門東北面請以為侑明面鄉其位可知知賔位在門東北面者下文將獻賔時云主人降南面拜衆賔門東三拜衆賔門東北面皆答一拜是也云戒曰請子為侑者案燕禮公曰命某為賔射人傳公命當云請子為賔此處命侑當先云主人曰命某為侑宗人傳主人辭戒曰請子為侑鄭以互文約之故云然也侑出至之外注俟待至心也釋曰云主人興禮事尸極敬心也者正謂立侑以輔尸使出便迎之是極其敬心也注言與至賔客釋曰云尸益卑者以儐尸之禮以尸為賔客當在門西東面北上今執臣道門外北面故云益卑也主人至人擯注賔客至擯贊釋曰案少牢宿尸祝擯此宗人擯者以祝不與儐尸故使宗人為擯也云賔客尸而迎之主人益尊者上篇正祭時主人不迎尸以申尸之尊至此賔客尸而迎之以尸同賔客是主人益尊故也注沒霤至又讓釋曰經直云揖乃讓鄭知沒霤相揖至階又讓者案上篇鄉飲酒之等入門三揖至階又讓故知也注東上統於其席釋曰尸在門外北面西上統於賔客至此升堂亦應西上故決之云東上統於其席以其賔席以東為上故也乃舉注舉舉至殺也釋曰自此盡西枋論門外舉鼎匕俎入陳于廟門之事云舉者不盥殺也者決正祭時皆盥訖乃舉鼎此儐尸禮殺舉者不盥故云殺也注如初至北上釋曰云如初者此如上經正祭時陳鼎之事也注雍正至為蹙釋曰云雍正羣吏掌辨體名肉物者案周禮內饔職云掌割亨煎和之事辨體名肉物注云體名脊脅肩臂臑之屬肉物胾燔之屬此士之雍正所掌亦依之也知四俎據尸侑主人主婦者據下文四者皆有俎知之也云陳之冝具者此四俎當俱陳于鼎之西分二俎陳豕鼎魚鼎之西者欲便三鼎之西並有俎故云陳之冝具也注並併至作併釋曰云其南俎司馬以羞羊匕湆羊肉湆者匕湆謂無肉直汁以其在匕湆也即下文司馬在羊鼎之東二手執桃匕枋以挹湆注于疏匕是也云肉湆者直是肉從湆中來實無汁下文云羊肉湆臑折正脊一正脅一腸一胃一是也案下文次賔羞羊匕湆司馬羞羊肉湆此注并云司馬不云次賔者案上經正祭時云司馬刲羊據此正文沒次賔不言其實羞羊匕湆者是次賔也又云其北俎司士以羞豕匕湆豕肉湆豕脀湆魚者此經陳二俎以為益送之俎南俎巳是司馬所用於羊湆之等則此北俎是司士羞豕湆之等若然案下文亦次賔羞豕匕湆司士羞豕脀此并云司士者亦據上經正文司士擊豕而言實次賔羞豕匕湆也云疏匕匕柄有刻飾者以其言疏是疏通刻飾之名若禮記云疏屏之類故知柄有刻飾亦通柄刻雲氣以飾也注几所至玉爵釋曰引大宰者證宰授主人几之義注位阼至上位釋曰鄭言此者主人位常在阼階上其賔位在戶西及在西階上今恐尸復位在戶西以其未得在戶西故言賔階上位也主人至不坐注左之至几輕釋曰云主人退尸還几縮之者以主人橫執几進授尸時尸二手受於主人手閒時亦橫受之將欲縱設於席故還之使縮以右手執几外廉故鄉北面縮設于席也云左之者異於鬼神者謂若上篇以來設神几皆在右為生人皆左几之等是其生人陽故尚左鬼神隂故尚右也云不坐奠之者几輕者此決下文啐酒坐奠之不言坐是重之此言坐執之故也注侑拜者從於尸釋曰以主人授几止為尸故主人拜送其尸獨答拜今侑亦拜故云從於尸以其立侑以輔尸故侑從尸拜也主人至送爵釋曰自此盡興退論主人主婦獻於尸之事云主人降洗尸侑降尸辭洗者案鄉飲酒主人降洗賔降主人辭降賔對此中亦應主人降洗賔降主人辭降主婦至興退注昌昌至房也釋曰案此上下經主人先獻主婦乃後薦者若正祭則先薦後獻若繹祭則先獻後薦故祭義云君獻尸夫人薦豆鄭注云謂繹日也則此儐尸禮與天子諸侯繹祭同故亦先獻後薦也云昌本巳下等物至此皆朝事之籩䵄蕡白黑形鹽膴鮑魚鱐醢人云朝事之豆韭菹醓醢昌本麋臡菁菹鹿臡茆菹麋臡故鄭注此皆據彼而言又案彼注昌本昌蒲根有骨為臡無骨為醢云蕡熬枲實也者案喪服傳云苴者麻之有蕡者也牡麻者枲麻也若然蕡麻有實枲麻無實鄭云蕡枲實者舉其類耳其實枲是雄麻無實若竹器圎曰簞方曰笥鄭注論語亦云簞笥亦是舉其類也白黑之等無正文鄭以形色而言之云大夫無朝事而用之儐尸亦豐大夫之禮者案禮記坐尸於堂子北面而事之注云天子諸侯之祭朝事延尸於戶外是以有北面事尸之禮是特牲少牢正祭無朝事於堂直有室中之事若然大夫雖用天子諸侯朝事之籩豆以其禮殺故八籩八豆之中各取其四耳其韭菹醢者則無骨之醢昌菹醢者即周禮麋臡臡散文亦名醢又案周禮鄭注云韲菹之稱菜肉通全物若䐑為菹細切為韲彼昌本不言菹是細切為韲此云昌菹則大夫以昌本為菹異於天子諸侯所用也云主婦取籩興者以饌異親之者鄭意以籩豆俱時設而籩不使婦贊者取籩以授主婦者以籩與豆不同所實又別故主婦冝親就房親取之也乃升釋曰自乃升盡于其上論司馬載俎因歷說十一俎之事注言燅至一俎釋曰云言燅尸俎復序體者明所舉肩骼存焉者上篇少牢載牲體十一脊脅皆加並骨二尸食特舉脊肩骼在於肵俎上文直言燅尸俎嫌所舉在肵者不在故復序其體所舉肩骼則存焉所舉未知此正俎為在下羊肉湆以本脊脅皆二骨以並今皆一骨故鄭云明所舉肩胳存焉以肩胳一骨前尸所舉今復序之明在可知脊脅雖舉以其二以並今脊脅載一骨在正俎一骨在湆俎故鄭云亦著脊脅皆一骨也以其前所舉者未知在何俎故直注云著脊脅皆一骨不云存耳云一俎謂司士所設羊鼎西第一俎者此俎在侑俎之南故下文注侑俎云羊鼎西之北俎也鄭君知尸俎在南見羊肉湆俎在豕俎之南羊尊豕卑明尸俎在侑俎之南或解云言第一者最在北故侑俎下注云司士所設羊鼎西之北俎也明北俎在俎之南已下所注俎之次第皆據司士雍人所陳為次義可知也羊肉至南俎注肉湆至為汁釋曰云肉湆肉在汁中者以增俎實為尸加也者以決正祭之鼎直升牲體無湆者以正祭之俎非加今儐尸增俎實為尸加故有湆也凡牲體皆出汁不言湆又下豕脀亦出于汁皆不言湆此特得湆名者特牲少牢正祭升牲體於鼎時皆無匕湆故直云升體於俎設於尸前鼎內亦無匕湆升文今此升牲體於尸前匕湆亦升焉故得湆名以在俎實無汁故進羊肉湆必先進羊匕湆然後進羊肉湆見此湆為肉而有故在羊肉湆前進之使尸嘗之故鄭下注云嚌湆者明湆肉加耳嘗之以其汁尚味是也若然豕亦有匕湆不名肉湆而名豕脀者互見為文言脀者見在俎無汁言肉湆者見在鼎內時有汁也若然羊豕互見為文魚何以不言魚湆而云湆魚者羊先言肉後言湆使肉前進匕湆明是湆從肉來可知魚前無進匕湆故先言湆以明魚在湆可知魚無匕湆者鄭下注云不羞魚匕湆略小􅚕也羊有正俎羞匕湆肉湆豕無正俎魚無匕湆隆汚之殺云必為臑折上所折分者上經退臑在下者以折分故退之今此經云臑折即上經所退臑在下者也左右體之臑而必取右體之臑折分用之貴神俎故也若然脊脅二骨亦分一骨為肉湆者亦是貴神俎故也云此以下十有一俎俟時而載於此歷說之爾者案下文卒升賔長設羊俎於豆南賔降尸升筵唯設此一俎餘十一俎皆未又主人主婦升席時乃設之是其俟時而載今於此巳下雖未載因前俎遂歷陳說之耳十一俎者即尸之羊肉湆一也豕脀俎二也侑之羊俎三也豕俎四也主人羊俎五也羊肉湆俎六也豕脀七也主婦羊俎八也尸侑主人三者皆有魚俎是其十一通尸羊正俎為十二俎其四俎尸侑主人主婦載羊體俎皆為正俎其餘八俎雍人所執二俎益送往還故有八其實止二俎也司士至一俎注臑在至北者釋曰云臑在下者順羊也者以其豕脀不折臑臑亦在下順上文羊臑在下由折分此雖不折順羊故亦在下也豕肉湆所以不折者由豕無正俎皆是肉湆故不順所折也侑俎至一俎注侑俎至尸同釋曰侑俎用左體者案少牢載尸俎皆右體脊脅皆二骨舉肺一切肺三尸主人主婦盡用腸三胃三尸正俎用一湆俎用一唯有一在此是以自侑巳下及主人主婦皆用左體脊脅若然燅尸俎時左體亦同升於鼎上不云者文不具是以前陳俎時皆設於鼎西若不同升鼎則侑主人主婦俎如特牲執事之俎陳在階閒不應在鼎側也若然特牲執事與主人主婦之俎亦不升鼎彼為自異於神小牢祝與佐食俎亦不升鼎亦自異於神此自侑巳下悉與尸同鼎者以儐尸禮益卑唯尸尊禮詳侑巳下禮略故也云其羊俎過三體有肫尊之加也者鼎俎數竒今體數四故云加若禮緯云禮六十巳上籩豆有加是以少牢祝羊豕體各三又下文主人羊肉湆俎體亦三今儐尸之有侑猶正祭之有祝侑四體必知以肫為加者侑豕俎無肫主人羊肉湆俎亦無肫故知有肫為加以立侑以輔尸尊之故以肫為加體也云豕左肩折折分為長兄弟俎也者以下文設薦俎而注云衆兄弟儀禮文薦脀皆不云折唯兄弟云先生之脀折鄭云先生長兄弟折豕左肩之折是以知義然也云無羊湆下尸也者直云無羊湆不云肉者以匕湆肉湆皆無故直云無羊湆以包二者皆無此二湆尸皆有侑皆無故云下尸也云豕又祭肺不嚌肺不備禮者上尸羊俎有祭肺豕俎有嚌肺是備禮侑羊俎豕俎皆切肺故曰不備禮也阼俎至一俎注阼俎至俎同釋曰無體逺下尸者尸用右體主人用左體是其相下之義今主人正俎全無牲體故云逺下尸也云以肺代之肺尊也者尸侑一肺今主人一俎有兩肺故知以肺代體肺者氣之主食所先祭尊於腸胃故以肺代體云加羊肉湆而有體崇尸惠亦尊主人者以俎物雖與尸不同者肉湆與尸同至尸酢主人而設之故曰崇尸惠正俎所以不崇尸惠者逺下尸故無正俎逺下則無肉湆者近下尸故侑無羊肉湆注但云下此非直崇尸惠亦見尊主人者侑無羊匕湆無豕上湆而主人盡有是其尊主人所有者尊見下文受酢致爵時云不言左臂者大夫尊空其文者牲右體貴左體賤侑用左體皆言左肩左肫今主人用左臂直云臂不云左者大夫尊故空其文似若得用右體然必知是左臂者以右臂在尸俎故也云降於侑羊體一而增豕膚三有所屈有所申亦所謂順而托也者案禮器注云謂若君沐梁大夫沐稷士沐粱大夫不沐粱屈於君士則申與君同是亦屈申之義故引為證也云其湆俎與尸俎同豕俎又與尸豕俎同者以其共用益送之俎故知同也主婦至一俎注無豕至西者釋曰云無豕體而有膚以主人無羊體不敢備也者以主人俎無羊體故主婦俎亦無豕體以主人逺下尸主婦亦逺下尸也云無祭肺有嚌肺亦下侑也祭肺尊者言亦者亦主人下侑也侑用肩主人用臂祭肺尊嚌肺卑侑俎皆祭肺主婦皆嚌肺故云下侑也云嚌羊肺者文承膚下嫌也者肺文承膚下有豕肺之嫌故須辨之云嚌羊肺者以別之也云膚在羊肺上則羊豕之體名同相亞也者羊豕雖異脊脅之等體名則同今豕雖直言膚不言體以豕膚在羊肺之上使䋫羊之體故云相亞若然下文主人獻賔之時司士設俎羊骼一腸一胃一切肺一膚一所以膚又在肺下者彼取用之先後故退膚在下司士至其上注橫載至俎同釋曰案上歷說十一俎尸侑主人之下皆次言豕俎魚俎亦是歷說十一俎獨不陳魚俎於豕俎之下而陳并於此者欲見魚水物別於正牲又欲見魚獨副賔長獻三故并於此序之云橫載之者異於牲體彌變於神者以其牲體皆橫載於俎於人為縮鬼進下生人進腠上篇少牢正祭升體時云下利升豕其載如羊無腸胃體其載于俎皆進下鄭注進下變於食生也所以交於神明不敢以食道敬之至也引鄉飲酒禮進腠羊次其體豕言進下互相見明正祭之時牲體皆橫載進下可知至此儐尸事神禮簡儐尸禮隆以尸為賔客故從生人禮牲體皆進腠橫載於俎異於載魚於正祭之時縮載故少牢云司士升魚十有五而俎縮載右首進腴於俎為縮於尸為橫首向右腹腴向尸鄭注云右首進腴亦變於食生也者生人則亦縮載於人為橫首亦向右進鰭脊向人腹腴向外今儐尸之禮載魚冝亦同生人縮載進鰭今橫載於人為縮不與正祭同又與生人異欲見儐尸之禮異於正祭又不得全與生人同鄭云彌變於神者牲體既進腠是巳變於神至於魚載又橫於俎是彌變於神也云膴讀如殷冔之冔者讀從士冠禮郊特牲周辨殷冔冔覆也可以覆首此亦取魚腹反覆於上以擬祭云其俎又與尸豕俎同者謂上司士所設於豕鼎之西者也卒升注卒巳至羊俎釋曰自此盡立于筵末論薦獻於尸之事云卒升者案上有主人酌獻尸主婦薦籩豆又升羊俎進於尸前因歷說十一俎之事今言卒升還計上升羊俎故云卒是以鄭亦云巳載尸羊俎而言之此事從上文獻尸下盡乃卒爵有五節五節者從主人獻酒於尸并主婦設籩豆是其一也賔長設俎二也次賔羞羊燔尸乃卒爵五也賔長至豆祭注賔長上賔釋曰上文載羊俎退卒升於十一俎下者欲就此賔長設羊俎之事故此言賔長設羊俎于豆南賔乃降注云賔長上賔者案下三獻時云上賔洗爵注云上賔長也是以鄭上下文相曉為一人者也注桃謂至為扱釋曰云讀如或舂或枕之枕者讀從詩或舂或枕彼注枕杼臼也云此二匕者皆有淺升狀如飯槮此以漢法況之言淺升者對尋常勺升深此淺耳注肺羊祭肺釋曰知羊祭肺者見上載尸羊正俎而云祭肺一故知此羊俎上祭肺其羊肉湆雖有嚌肺一此下經乃升此時未升故知非嚌肺也次賔至以降注嚌湆至尚味釋曰云嚌湆者明湆肉加耳嘗之以其汁尚味者此匕湆似大羮案特牲大羮不祭不嚌以不為神非盛此嚌之者明湆肉加先進其汁而嘗之尚味故也以湆肉加在鼎有汁在俎無汁故以匕進汁是以上注云肉湆肉在汁中者以增俎實為尸加是也特牲大羮自門入本不在鼎不調之此肉湆在鼎巳調之故云尚味也尸席至答拜注旨美至之東釋曰案上篇少牢尸不啐奠不告㫖大夫之禮尸彌尊至於儐尸啐酒告㫖者異於神奠具尸禮彌儐故也司馬至以降注絶祭至敬也釋曰引周禮者案大祝職辨九祭七曰絶祭注云絶末以祭引之證絶祭與此同也云湆使次賔肉使司馬大夫禮多崇敬也者司馬火官羊又火畜則羊湆與肉皆當司馬載之案上文次賔載湆此經司馬羞肉者以大夫官多各使載其一是以云大夫禮多崇敬也注燔炙釋曰案詩云載燔載烈注云傅火曰燔貫之加于火曰烈烈則炙也彼以燔炙相對則異此云燔炙者燔之傅火亦是炙類故曰燔炙主人至答拜注不洗至專階釋曰自此盡主人答拜論主人獻侑升薦俎從獻之事也此節內從獻有三事主人獻時主婦薦籩豆一也司馬羞羊俎二也次賔羞羊燔三也侑降於尸二等無羊匕湆又無肉湆云不洗者俱獻閒無事也者此則以其獻尸訖即獻侑中閒無別酢酬之事故不洗凡爵行爵從尊者來向卑者俱獻閒無事則不洗爵從卑者來向尊雖獻閒無事亦洗是以此文獻尸訖俱獻侑不洗是爵從尊者來故特牲賔致爵於主人洗爵者鄭云洗乃致爵為異事新之以其承佐食賤雖就獻閒以其爵從卑者來故洗之故不儐尸鄭注云洗致爵者以承佐食賤新之是爵從卑者來故洗也云主人就右者賤不專階者對主人不就尸階者尸尊得專階故也注醢在至統焉釋曰凡設菹常在右便其擩今菹在醢北者以其立侑以輔尸故菹在北統於尸也注答拜至之右釋曰知拜於侑之右者以其前拜爵時尸在侑之右尸受至爵酌注酌者將酢主人釋曰自此盡就筵論主人受尸酢并薦籩豆及俎之事就此事中亦有五節行事尊主人故與尸同者尸酢主人時主婦亦設籩豆一也賔長設羊俎二次賔羞羊匕湆三司馬羞肉湆四也次賔羞羊燔主人乃卒爵五也但特牲少牢主人獻尸尸即酢主人主人乃獻祝及佐食此尸待主人獻侑乃酢主人不同者此尸卑達主人之意欲得先進酒於侑乃自飲彼尸尊不達主人欲自達已意故先酢主人乃使主人獻祝與佐食故不同是以下文賔長獻尸致爵主人尸乃酢之遂賔意亦此類也司宫至于房注設籩至二籩釋曰此乃陳主人受酢設席之位案特牲為士案少牢下大夫皆致爵乃設席此儐尸受酢即設席者以其儐尸尸益卑主人益尊故明一等受酢即設席案上設尸籩云興取籩於房麷蕡注云以饌異親之與此婦贊者執二籩䵄蕡主婦不興受文不同者凡執籩豆之法皆兩雙執之此侑與主人皆二籩故主婦與婦贊者各執其二於事便故主婦不興受設之上尸籩豆各四故主婦興取籩豆於房亦見異饌親之義也云設籩于菹西北亦辟鉶者上設侑籩正當豆此在西北明辟鉶云亦亦尸籩當豆西外列以辟鉶故也注奠爵至復用釋曰云言虛俎者羊湆俎訖於此虛不復用者此俎雍人所執陳奠於羊俎西在南者自此賔羞匕湆司馬羞羊肉湆於尸次賔又羞匕湆於主人同用此俎三降皆不言虛欲見後將更用至於此言虛俎明其不復用此俎又見下次賔羞羊燔於主人則北之豕俎用北之豕俎而得羞羊燔者以其禮殺故也主人至序南注不降至崇酒釋曰直云次賔羞燔者燔即羊燔知者以其主人與尸侑皆用羊體鄉主婦獻尸以後悉用豕體賔長獻尸後悉用魚從是以知主人之燔羊燔也云不降奠爵于篚急崇酒者此下唯有崇酒之文更無餘事故云急崇酒案鄉飲酒介答拜主人卒爵坐奠於西楹南介右再拜崇酒注云奠爵西楹南以當獻衆賔與此不同者彼實有獻衆賔之事故云當獻衆賔亦復見急崇酒兩見之也司宫至主婦注房東至之東釋曰自此盡主婦答拜論主婦亞獻尸并見從獻之事上文主人獻節凡有三爵有主人獻尸獻侑并受酢此主婦獻內凡有四爵即分為四節解之四者主婦獻尸一也獻侑二也致爵於主人三也受尸酢四也下文賔長為三獻爵止故與主婦亞獻同此主婦亞獻尸一節之內從獻有五五者主婦亞獻主婦設兩鉶一也主婦又設糗與修二也次賔羞豕匕湆三也司士羞豕脀四也次賔羞豕燔尸乃卒爵五也尸拜于筵上受注尊南至便也釋曰賔主獻酢無在筵上受法今尸於筵上受者以婦人所獻故尸不與行賔主之禮故不得各就其階若然少牢主人祝拜於席上坐受者注云室內迫狹故拜筵上與此禮異云尊南西面拜由便也者此決下文西面於主人之北拜送爵今酌尊因在尊南西面拜獻尸者便也言便者便其西面授尸故不退主人之北注飲酒至為斷釋曰云無黍稷殺也者決正祭時有黍稷故也酌獻至答拜注酌獻至西面釋曰同有三等降於尸二等無鉶羮與豕匕湆云三等者主婦酌獻侑主婦羞糗修一也司士羞豕脀二也次賔羞燔侑乃卒爵三也主婦至侑興注豕脀至禮殺釋曰案上下文尸與侑及主人主婦但是正俎皆橫執俎以升又橫設於席前若益送之俎皆縮執之又縮於席前今司士所羞豕脀是益送之俎縮執是其常而言縮執者以其文承上主人獻侑時無羊肉湆故主婦獻侑司士羞豕脀不得相如是以經特著縮執俎見異於正俎諸文特云橫執縮執者皆此類受爵至答拜注主婦至併敬釋曰自此盡答拜受爵論主婦致爵于主人之事此科亦有五節行事主婦致爵於主人時主婦設二鉶一也又設糗修二也豕匕湆三也豕脀四也豕燔主人卒爵五也云主婦易位拜於阼階上辟併敬者前主婦獻尸侑拜送於主人北今致爵於主人拜於阼階上者辟併敬主人與尸侑故易位也若然案特牲三獻爵止乃致爵此未三獻巳致爵者以上篇巳有獻於尸故此不待三獻又見儐尸禮殺故早致主婦至不拜注主人至告旨釋曰云主人拜啐酒嘗鉶不拜若然則啐酒有拜嘗鉶無拜案前主婦獻尸尸坐啐酒左執爵嘗上鉶執爵以興坐奠爵拜拜在嘗鉶之下則嘗鉶有拜坐啐酒不拜與此違者彼拜雖在嘗鉶下其拜仍為啐酒拜在嘗鉶下者以因坐啐酒不興即嘗鉶嘗鉶訖執爵興坐奠爵拜拜仍為啐酒是以特牲少牢尸嘗鉶皆不拜或此經啐酒之上無拜文有者衍字也尸降至以降注將酢主婦釋曰自此盡皆就筵論尸酢主婦之事此科內從酢有三三者主婦受酢之時婦贊者設豆籩一也司馬設羊俎二也次賔羞羊燔主婦卒爵三也以其主婦受從與侑同三主人受從與尸同五尊卑差也注設席者主婦尊釋曰以賔長以下皆無設席之文唯主婦與主人同設席故云主婦尊特牲及下大夫主婦設席亦是主婦尊注婦人至少者釋曰案特牲記云宗婦北堂東面北上注云宗婦族人之婦其夫屬于所祭為子孫者是也彼直云宗婦是特牲宗婦一人而巳不言贊或少未可定此大夫禮隆贊非一人而稱贊贊主婦及長婦故云宗婦之少者注出房至子也釋曰云不坐者變於主人也者上主人受酢坐卒爵故云變於主人也執爵拜變於男子者上下經凡男子拜卒爵皆奠爵乃拜故云變於男子也上賔至賔降注上賔至止也釋曰此一經論賔長備三獻獻尸其尸奠於薦左未舉之事尸不舉者以三獻訖正禮終欲使神惠均於庭遍得獻乃舉之故下文主人獻及衆賔以下訖乃作止爵若然特牲及下大夫尸在室內始行三獻未行致爵尸奠爵欲得神惠均於室此儐尸之禮室內巳行三獻至此儐尸夫婦又巳行致爵訖儐尸又在堂故爵止者欲得神惠均於庭與正祭者異云上賔賔長者上文云賔長設羊俎是此與上文長賔互見為一人云謂之上賔以將獻異之者言長賔賔中長尊稱輕若言上賔賔中上尊稱重故以將獻變言上賔云或謂之長賔者或少牢文案彼云長賔洗爵獻于尸此異之稱長上者少牢尸有父尊屈之故但云長賔耳若然不儐尸亦云長賔特牲云賔三獻如初又不言長賔者士賔卑又闕之云奠爵爵止者特牲云賔三獻如初燔從如初爵止不儐尸者亦然是其爵止之事案下經爵止者多非為均神惠之事故此特解之主人至不升注侑不至不從釋曰自此盡皆左之論主人酬尸設羞之事云侑不升尸禮益殺者儐尸之禮殺於初今侑不升又殺故云益殺也尸北至薦左注降洗者主人釋曰此主人酬尸尸奠於薦左者不舉案下經不舉二人舉觶于尸侑侑奠觶于右注云奠于右者不舉也神惠右不舉變於飲酒與此不同者特牲及下不儐尸皆無酬尸之事此特有之由儐尸如與賔客飲酒無故有酬異於神惠神惠右不舉侑奠於右是也侑一名加者少牢無侑尸此乃有故無加稱是以主人酬賔賔奠於左亦是神惠故即舉之特牲及不儐尸皆有酬賔同是神惠故皆奠於左也注二羞至陽也釋曰以二羞是內羞房中之羞以儐尸用之故云盡歡心云房中之羞其籩是周禮籩人職云羞籩之實案彼鄭注云此二物持粉稻米黍米所為也合蒸曰餌餅之曰餈糗者搗粉熬大豆為餌餈之黏著以粉之耳餌言糗餈言粉互相足是也云其豆則酏食糝食者周禮醢人職羞豆之實案彼鄭云酏􅊡也內則曰取稻米舉糔溲之小切狼臅膏以與稻米為􅊡又曰糝取牛羊豕之肉三如一小切之與稻米稻米二肉一合以為餌煎之是也若然案王制云庶羞不踰牲注云祭以羊則不以牛肉為羞依內則羞用三牲者據得用大牢者若大夫已下不用大牢者則無牛矣而此引之者舉其成文以曉人耳云庶羞羊臐豕膮皆有胾知者案公食大夫牲皆臛及炙胾今此鄭直云臐胾不言炙者此儐尸飲酒之禮故主人獻尸皆羊燔從當主婦獻皆豕燔從公食大夫是食禮故庶羞並陳此飲酒之禮故先以燔從酬賔之後乃言司士羞庶羞則知止有羊臐豕膮羊胾豕胾以其燔炙前已從獻訖故知止有臐胾而已云房中之羞內羞也者案下大夫不儐尸云乃羞宰夫羞房中之羞司士羞庶羞于尸祝主人主婦內羞在右庶羞在左是也云內羞在右隂也者以其是穀物故云隂也云庶羞在左陽也者以其是牲物故云陽大宗伯亦云天産作隂德地産作陽德鄭亦云天産六牲之屬地産九榖之屬是其穀物隂牲物陽者也儀禮疏卷第四十九閶門外洞涇西青霞髙吳刻字
