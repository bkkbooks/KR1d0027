  text: 儀禮䟽卷第二十六
  hash: sha256:f4235d09121e87428a4df1c8fb930d5b121ab90c750619185cfd5a405d88e072
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_026-1a}
body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彦等撰明日至稽首注朝謂大門外釋曰自此盡訝聽之論賔拜謝主君之事云朝謂大門外者以其經云拜賜于朝無賔入之文又聘禮以柩造朝亦無喪入之文皆言朝故云朝謂大門外也若然案閔二年左氏傳云季友將生使卜楚丘之父卜之曰男也其名曰友在公之右閒於兩社爲公室輔注兩社周社亳社之閒朝廷執政所在但諸侯左宗廟右社稷在大門之内則諸侯外朝不在大門内者但外朝在大門外兩社之閒遥繫外朝而言執政所在又此食禮拜侑幣聘禮歸饔餼直言拜饔與餼不拜束帛者彼使人致之故不拜此食禮君親賜故拜之訝聽之注受其至士訝釋曰云此下大夫有士訝者此篇是子男使下大夫小聘又案周禮掌訝大夫有士訝故云此下大夫有士訝也上大夫至二俎注記公至無特釋曰云豆加葵菹蝸醢者案周禮醢人朝事之豆云韭菹醓醢昌本麋臡菁菹鹿臡苑菹麇臡案上文下大夫六豆用鹿臡以下仍有苑菹麇臡在今上大夫八豆不取茆菹麇臡而取饋食之豆葵菹蝸醢者鄭以特牲少牢參之彼二篇俱以饋食爲始皆用周禮饋食之豆特牲兩豆用饋食葵菹蝸醢少牢四豆二豆與特牲同兩豆用朝事之豆韭菹醓醢注云韭菹醓醢朝事之豆也而饋食用之豐大夫禮以此觀之故此公食大夫兼用饋食之豆亦是豐大夫禮也云俎加鮮魚鮮腊者上文下大夫七俎牛羊豕魚腊腸胃與膚此云九俎明加鮮魚鮮腊云無特者陳饌要方上七俎者東西兩行爲六俎一俎在特于俎東此九俎爲三行故無特雖無特膚亦爲下魚腸至若九注此以至子男釋曰云此以命數爲差也者案周禮典命公侯伯之卿三命大夫再命士一命子男之卿再命大夫一命士不命則諸侯之臣分爲三等三命再命一命不命與一命同此經魚腸胃倫膚亦分爲三等有十一有九有七則十一當三命九當再命七當一命若然惟有上下二文者以公侯伯之大夫與子男之卿同再命卿爵尊爲上大夫爵卑爲下則上言若九者子男之卿也下言若九者公侯伯大夫也故鄭云卿則曰上大夫則曰下云大國之孤視子男者欲見此經唯見三命以下案周禮典命大國之孤四命又大行人云大國之孤執皮帛以繼子男又云其他皆視小國之君若然孤與子男同十三侯伯十五上公十七差次可知庶羞至四列注謂上至爲無釋曰上文云庶羞旁四列此上大夫饌内言庶羞西東毋過四列則東西橫行上下大夫皆四以爲行下大夫四四十六東西四行南北亦四行上大夫東西四行南北五行矣上大至鶉鴽注鴽無母釋曰云鴽無母者案爾雅釋鳥云鴽鴾母郭氏曰䳺也青州人呼曰鴾母莊子云田䑕化爲鶉淮南子云蝦䗫所化也月令曰田䑕化爲鴽然則鴽鶉一物也若不親食注謂主至它故釋曰自此盡聽命論主君不親食使大夫致禮於賔館之事疾病之外别云他故者君有死喪之事故聘禮云主人畢歸禮賔唯饔餼之受謂畢致饗食但賔不受之豆實至南陳注陳罋至作併釋曰云南北相當以食饌同列耳者案上文正食之時黍稷亦南陳今於楹閒陳筐米亦南陳是正食及此饌陳是同列也云罋北陳者變於食者上文正食之時宰夫自東房薦豆六設於醬東西上陳之今於楹閒二以併北陳故云變於食也云罋數如豆者以菹醢各異物不可同罋故罋數如豆上大夫八豆則八罋下大夫六豆則六罋云醢芥醬從焉者以其三牲不殺牲列於門内醢經百日乃成不由不殺故有醢庶羞之醢同是醬類故使之相從但庶羞之醢更無別種冝同一罋芥醬冝亦一罋知有芥醬者以其有生魚故知有也云筐米四者上文上大夫八簋今乃生致之黍稷冝各一筐稻粱又二筐故云筐米四庶羞陳于碑内注生魚至正饌釋曰云生魚者上文魚膾是魚之中膾者皆是生魚也案鄭注周禮云燕人膾魚方寸切其腴以啗所貴是也此則全生不膾何者本膾在豆與胾炙俱設今胾炙在牲未殺膾全不破可知若然庶羞之内衆羞俱有鄭獨云生魚者以其胾炙在牲不殺於此無矣雖有乾腊雉兔之等以生魚爲主故云生魚也云魚腊從焉者雖無三牲之肉有乾魚腊可知云上大夫加鮮魚鮮腊雉兔鶉鴽者以其下大夫七鼎無鮮魚鮮腊上大夫九鼎加鮮魚鮮腊可知雉兔鶉鴽亦生致之矣云不陳于堂辟正饌者以其庶羞本在堂上正饌之西今在碑内故云辟正饌也若然不陳於碑南者以其本合在堂今冝近堂故在碑北庭實陳于碑外注執乗至近内釋曰執乗皮者不參分庭一在南者以言歸冝近内者庭實正法皆參分庭一在南而陳之故昬禮記云納徴執皮者參分庭一在南今云碑外繼碑而言近北矣彼參分庭一在南陳之者謂在主人之庭參分庭陳之擬與賔向外故近南此陳於客館擬與賔入内故鄭云以言歸故在内也牛羊至東上注爲其至近外釋曰案上庶羞與庭實在碑之内近内陳之此牛羊豕陳於門内繼門言之云爲其踐汙館庭使近外也若然致饔餼牛羊豕亦在此此云使近外者以饔餼有腥有熟故略其生者近門是其常此旣不殺牛羊豕冝近内故決之也賔朝至饔禮注朝服食禮輕也釋曰云朝服食禮輕者以其歸饔餼時卿韋弁賔皮弁受此食禮賔朝服受不皮弁故云食禮輕無擯注以已本冝往釋曰云以已本冝往者明主君無故速賔在廟行食禮而有侑幣賔無儐法主君有故致食禮并有侑幣亦不合有儐故云以已本冝往注賜亦謂食侑幣釋曰云亦者亦上速賔食時拜食與侑幣今亦然故云亦大夫至戒速注記異至召之釋曰自此盡大夫之禮論主國大夫食賔之禮别於主君之事云記異於君者案下文其他皆如公食大夫之禮故知自此巳下皆記異於君法是以此經大夫親戒速決君不親戒速此則異於君也以其下諸文皆異故云記異於君者也云先就告之歸具旣具復自召之者以其戒具兩有皆親爲之故爲此解與郷飲酒郷射同故彼二文皆云戒賔旣歸布筵設尊乃親速賔是也賔止也注主人三降賔不從釋曰云主人三降者案上文鄭注皆者謂受醬受湆受幣皆自阼階降此鄭云主人三降即上三者不數主人降盥者案郷飲酒所言降盥者皆爲洗爵故賔從降此降盥不爲洗爵故鄭不數之案聘禮致饔餼賔降堂受老束錦大夫止注云止不降使之餘尊此賔不降者雖賔主敵以主人降堂不至地故賔止不降也賔執至序端注不敢食於尊處釋曰此兩大夫敵故之西序端上公食大夫大夫降階下臣卑故也受侑至亦然注敵也釋曰案郊特牲云大夫之臣不稽首非尊家臣以辟君也又案左氏傳哀十七年公㑹齊侯盟于蒙孟武伯相齊侯稽首公拜齊人怒武伯曰非天子寡君無所稽首若然臣於君乃稽首平敵相於當頓首今言敵而稽首者以食禮相尊敬雖敵亦稽首與臣拜君同故也其他至之禮釋曰云其他謂豆數俎體陳設皆不異上陳但禮異者謂親戒速君則不親迎賔公不出此大夫出大門公受醬湆幣不降此大夫則降也公食大夫大夫降食於階下此言西序端上公食卷加席公不辭此則辭之皆是異也賔受于堂無擯注與受君禮同釋曰云與受君禮同者聘禮賔受致饔幣云堂中西北面注趨主君之命也堂中西中央之西此雖無儐受幣亦與之同也記不宿戒注食禮至一日釋曰祭祀散齊七日爲戒致齊三日爲宿此則與祭祀異此不宿戒者謂不爲三日之戒又不爲一日之宿故鄭云此所以不宿戒者謂前期三日之戒申戒爲宿謂前期一日者若然必知三日之戒一日之宿者大射前期三日宰夫戒宰及司馬又少牢辟人君有前期一日之宿此雖人君禮以食禮輕故知有三日之戒一日之宿旣無前日之事冝與郷飲酒郷射禮同當日爲之故皆不言日數故下注云食賔之朝宿興戒之賔則從戒而來不復召是也不授几注異於醴也釋曰決禮賔時公親授几也亨于門外東方注必於至主陽釋曰案上經甸人亨人之等亨人是士官不得言大夫之事言大夫之事者解亨在門外之禮也燕禮注云亨於門外臣所掌也言臣亦是大夫事少牢廩爨饔爨皆在門外亦大夫事特牲云主婦視饎爨于西堂下者以其無廩人主之故在内若然郷飲酒雖是大夫之事以其取祖陽氣之始故亦於門内司宫至自末注司宫至爲莞釋曰云司宫太宰之屬掌宫廟者案燕禮云司宮尊于東楹之西注司宫天子曰小宰聽酒人之成要者也注雖不同其義一也但燕禮司宫云設尊故以小宰解之此司宫設几席故以太宰之屬解之案太宰之下有宫人掌宮中除汙穢之事即此司宮彼不言設几席者以天子具宫別有司几筵又有小宰諸侯兼官故司宮兼司几筵及小宰也云丈六尺曰常半常曰尋者此皆無正文案周禮考工記云車有六等之數云軫崇四尺謂之一等又云戈長六尺六寸旣建而迆之崇於軫四尺謂之二等人長八尺崇於戈四尺謂之三等殳長尋有四尺崇于人四尺謂之四等車㦸常崇于殳四尺謂之五等酋矛常有四尺崇于㦸四尺謂之六等自軫至矛皆以四尺爲差以是約之即知常是丈六尺尋是八尺也云萑細葦者以類言之其實全別是以詩云葭菼注云葭蘆菼薍則葦一名蘆一名薍一名萑一名菼此萑又與莞蓆之莞不同彼莞謂蒲也云有以識之者席無異物爲記但織之自有首尾可爲記識耳云必以長筵者以有左右饌者賔在戸牖之閒南面上陳饌之時正饌在左庶羞在右陳饌雖不在席上皆陳於席前當席左右其閒容人故謂長筵也宰夫至東房注筵本至右房釋曰上云司宮具几筵具之在房宰夫敷之而巳天子諸侯左右房以其言東房對西房若大夫士直有東房而巳故直云在房也賔之至面立注賔車至節也釋曰云賔車不入門廣敬也者曲禮云客車不入大門與此同覲禮云偏駕不入王門偏駕謂同姓金路之等乗墨車以朝墨車亦云不入大門與此亦同云凡賔即朝中道而往者内則云男子由右女子由左車從中央故賔乗車中道云而後車還立于西方者案少儀云僕於君子始乗則式君子下行然後還立注云還車而立以俟其去是還立于西方郷外云賔及位而止北面者案玉藻云賔立不當門彼亦謂聘使也云卿大夫之位當車前者案大行人云上公立當軹侯伯立當前疾子男立當衡又云大國之孤朝位當車前者則卿大夫立亦與孤同一節兼云大夫者小聘曰問使下大夫立與孤卿同當車前故連言也云凡朝位賔主之閒各以命數爲逺近之節者案大行人云上公朝位賔主之閒九十步侯伯七十步子男五十步注云朝位謂大門外賔下車及王車出迎所立處又云凡諸侯之卿其禮各下其君二等以下及大夫士皆如之若然如諸侯則依命數臣下其君二等則不得依命數矣而云依命數者依命數據君而言其臣依君命數而降之故鄭揔以命數言之也鉶芼至有滑注藿豆至爲芐釋曰云滑堇荁之屬者案士虞記云鉶芼用苦若薇有滑夏用葵冬用荁鄭注云荁堇類也乾則滑夏秋用生葵冬春用乾荁此經云皆有滑不言所用之物故取士虞記解之云之屬者其中兼有葵也賛者盥從俎升注俎其所有事釋曰直言此者豆亦從下升不言從豆升者賛者不佐祭豆直佐祭俎故云俎其所有事是以上經云三牲之肺不離賛者辯取之壹以授賔若然黍稷亦賛祭不從黍稷升者黍稷設之在後故也黍稷雖後升先祭者以其先食黍稷後食肉故也簠有蓋幂注稻粱至作幕釋曰簠簋相將簋旣有㑹明簠亦有㑹可知但黍稷先設故卻㑹於敦南簠盛稻粱將食乃設故鄭云去㑹于房蓋以幂幂巾也至於陳設幂亦去之經云有蓋幂者據出房未設而言凡炙無醬注巳有鹹和釋曰云凡者欲解儀禮一部之内牛羊豕炙皆無醬配之云巳有鹹和者若今人食炙然上大至夫純注謂三至純也釋曰經云上大夫不辨命數則子男之卿再命其席亦同下大夫鄭言謂三命大夫者欲見公侯伯之卿三命亦與子男下大夫同公之孤四命其席則異鄭據三命而言云孤爲賔則莞筵紛純加繅席畫純者案周禮司几筵云筵國賔于牖前莞筵紛純加繅席畫純云左彤几與此記三命巳下席不同故知彼國賔謂筵孤也無正文故云則也卿擯由下注不升堂也釋曰此謂上擯擯詔賔主升降周還之事故云不升堂上賛下大夫也注上謂至爲名釋曰案上經云賛者告具於公而賛賔食故云上賛使下大夫爲之上大夫至可也注於食至優賔釋曰案上經云上大夫庶羞二十豆此記人復記之者欲見上大夫食加飯之時得兼食庶羞又食㑹飯及庶羞之時宰夫更設酒飲漿飲故鄭云於食庶羞宰夫又設酒漿所以食庶羞可也所以然者優尊故也覲禮第十鄭目録云覲見也諸侯秋見天子之禮春見曰朝夏見曰宗秋見曰覲冬見曰遇朝宗禮備覲遇禮省是以享獻不見焉三時禮亡唯此存爾覲禮於五禮屬賔大戴第十六小戴十七別録第十釋曰鄭云春見曰朝等大宗伯文云朝宗禮備覲遇禮省者案曲禮下云天子當扆而立諸侯北面而見天子曰覲天子當宁而立諸公東面諸侯西面曰朝鄭注諸侯春見曰朝受摯於朝受享於廟生氣文也秋見曰覲一受之於廟殺氣質也朝者位於内朝而序進覲者位於廟門外而序入王南面立於扆宁而受焉夏宗依春冬遇依秋春秋時齊侯唁魯昭公以遇禮相見取易略也覲禮今存朝宗遇禮今亡據此彼而言是朝宗禮備覲遇禮省可知鄭又云是以享獻不見焉者享謂朝覲而行三享獻謂二享後行私覿私覿後即有私獻獻其珍異之物故聘禮記云旣覿賔若私獻奉獻將命注云時有珍異之物或賔奉之所以自序尊敬也猶以君命致之臣聘猶有私獻況諸侯朝覲有私獻可知是以周禮大宰職云大朝覲㑹同賛玉幣玉獻注云幣諸侯享幣玉獻獻國珍異亦執玉以致之大朝覲㑹同旣有私獻則四時常朝有私獻可知案下文有享亦當有獻而云享獻不見者案周禮大行人云上公冕服九章介九人賔主之閒九十步廟中將幣三享侯伯子男亦云鄭云朝先享不言朝者朝正禮不嫌有等彼據春夏朝宗而言不見秋冬者以四時相對朝宗禮備故見之覲遇禮省故略而不言此下文見享者不對春夏故言之鄭云是以享獻不見者據周禮大行人而說也必知鄭據大行人者以其引周禮四時朝見即云是以享獻不見明鄭據周禮大行人而言也有人解享字上讀以獻不見爲義者苟就此文有享無獻不辭之甚也覲禮至再拜注郊謂至旌門釋曰自此盡乃出論侯氏至近郊天子使使者勞侯氏之事云郊謂近郊者案聘禮云至於近郊君使卿勞故知此郊者亦近郊也知近郊去王城五十里者成周與王城相去五十里而君陳序云分正東郊成周鄭云今河南洛陽相去則然是近郊五十里也引小行人職者約近郊勞是大行人以其尊者冝逸小行人旣勞于畿明近郊使大行人也案大行人上公三勞侯伯再勞子男一勞此雖不辨勞數案小行人云凡諸侯入王則逆勞于畿不辨尊卑則五等同有畿勞其子男唯有此一勞而巳侯伯又加逺郊勞上公又加近郊勞則此云近郊據上公而言若然聘禮使臣聘而云近郊勞者臣禮異於君禮君禮冝先逺臣禮冝先近故也若然書傳略說云天子之子十八曰孟侯者於四方諸侯來朝迎於郊孝經注亦云天子使丗子郊迎者皆異代法非周禮也案玉人職云案十有二寸棗栗十有二列諸侯純九大夫純五夫人以勞諸侯注云夫人謂王后勞諸侯皆九勞大夫皆五此文不見者以其聘禮於聘客主國夫人尚有勞以二竹簋方明后亦有略言王勞不言后文不具也云皮弁者天子之朝朝服者司服云眡朝則皮弁故知在朝服皮弁至入廟乃裨冕也云璧無束帛者天子之玉尊者此對諸侯玉卑故聘禮云束帛加璧是諸侯臣所執小行人合六幣云璧以帛琮以錦琥以繡璜以黼是諸侯所執以致享皆有束帛配之諸侯玉卑故也此乃行勞所用以享禮況之耳云不言諸侯言侯氏者明國殊舎異禮不凡之也者言諸侯則凡之揔稱言侯氏則指一身不凡之也而所勞之處或非一國舎處不同故不揔言諸侯而云侯氏也云郊舎狹寡爲帷宫以受勞者周禮十里有廬三十里有宿五十里有市市有館郊關之所各自有舎或來者多館舎狹寡故不在館舎以帷爲宫以受勞禮也云掌舎職曰爲帷宫設旌門者謂爲帷宫則設旌旗以表四門彼天子所舎平地之事引之者證諸侯行亦有帷宮設旌爲門之事也案聘禮使卿勞賔受於門内司儀諸侯之臣相爲國客亦是受勞於館不爲帷宫者彼臣禮卿行旅從徒衆少故在館此諸侯禮君行師從徒衆多故於帷宫襄二十八年左氏傳云子産相鄭伯以如楚舎不爲壇注云至敵國郊除地封土爲壇以受郊勞又外僕言曰先大夫相先君適四國未甞不爲壇今子草舎無乃不可乎子産曰大適小則爲壇小適大苟舎而巳焉用壇彼亦是諸侯相朝當爲壇以帷爲宫受勞之事也使者至受玉注不荅至聽之釋曰云升者升壇者以帷宮無堂可升故知升者升壇也云使者東面致命侯氏東階上西面聽之者知面位如此者並約下文就館賜侯氏車服而知也使者至乃出注左還至重禮釋曰直云使者左還不云拜送玉者凡奉命使皆不拜送若卿歸饔餼不拜送幣亦斯類也若身自致者乃拜送下文儐使者及聘禮私覿私面皆拜送幣是也云左還還南面示將去也者以其東面致命而左還明左還者南面也未降而南面示將去故也云立者見侯氏將有事於己俟之者經云而立即云侯氏還璧故知立者見侯氏將有還玉之事於己故俟之不降云還玉重禮者案聘義圭璋還之璧琮加束帛報之所以輕財重禮彼以璧琮不還則爲輕財者以其璧琮加束帛故爲輕財不還此以天子之璧不加束帛尊之與圭璋同故亦還之爲重禮也侯氏至荅拜注侯氏至席也釋曰自此盡遂從之論侯氏儐使者遂從入朝之事云侯氏先升賔禮統焉者行賔禮是賔客之禮是以賔在館爲主人主人先升使者爲賔賔後升故云禮統焉謂賔統有此堂也云几者安賔所以崇優厚者案太宰云賛玉几注云立而設几優尊也此使者亦不坐而設几故云所以優厚也聘禮卿勞受儐不設几者諸侯之卿卑故不與此同也云上介出止使者則己布席者經不云上介出止使者鄭云上介出止使者案至館皆不敢當皆使上介出請事又見此經云使者乃入始云侯氏與之讓升是侯氏不出故知使上介止使者也云則己布席者以其素不云布席而云設几几不可設於地明有席席之所設唯在此時案聘禮受聘云几筵旣設是几筵相將故云上介出止使者則己布席也侯氏至送幣注儐使至其階釋曰云儐使者所以致尊敬也者案聘禮使卿用束帛勞賔賔不還束帛賔儐卿以束錦此使者以玉勞侯氏侯氏還玉仍亦儐使者是致尊敬天子之使故也知拜各於其階者此賔與使行敵禮若郷飲酒郷射賔主拜各於其階也使者至從之注騑馬至至朝釋曰知左驂設在西者陳四馬與人以西爲上案聘禮禮賔時賔執左馬以出此亦以左驂出故知左驂設在西也又知其餘三馬侯氏之士遂以出授使者之從者于外者亦案聘禮禮賔執左馬以出記云主人之庭實則主人遂以出賔之士訝受之此侯氏在館如主人明主馬亦侯氏之士以出授使者從者可知云從之者遂隨使者以至朝者亦如聘禮云下大夫勞賔使者遂以賔入至於朝其義同故知義然也天子賜舎注以其至作錫釋曰自此盡乗馬論賜侯氏舎館侯氏儐使之事云賜舎猶致館者猶聘禮賔至於朝君使卿致館此不言致館言賜舎者天子尊極故言賜舎也云所使者司空與者聘禮使卿致館此亦冝使卿知是司空非卿者周禮以天地春夏秋冬六卿無致館之事司空主營城郭宮室館亦宮室之事故知所使者司空也但司空亡無正文故云與以疑之知小行人爲承擯者案聘禮致館賔主人各擯介故知此亦陳擯介必知使小行人爲承擯者案小行人云及郊勞眡館將幣爲承而擯是其義也曰伯至父舎注此使者致館辭釋曰此及下經皆云伯父者案下文謂同姓大國舉同姓大國則同姓小國及異姓之國禮不殊也儐之束帛乗馬注王使至於内釋曰云王使人以命致館無禮猶儐之者尊王使也者決聘禮卿無禮致館賔無束帛儐卿此王使亦無禮致館其賔猶儐使者用束帛乗馬故云尊王使也云侯氏受館於外者案聘禮大夫帥至館卿致館而云賔迎再拜卿退賔送再拜則聘禮致館不在外此不見大夫帥至館即云天子賜舎是侯氏受舎于外可知與聘禮異也知旣則儐使者於内者以其旣受館則爲己所有明儐使者在内可知也天子至初事注大夫至作率釋曰自此盡再拜稽首論天子使大夫戒侯氏期日使行覲禮之事知大夫是卿爲訝者以其周禮秋官掌訝職云諸侯有卿訝故知大夫即卿爲訝者云其爲告使順循其事也初猶故者以其四時朝覲自是尋常故使恒循故事之常也諸侯至北上注言諸至同姓釋曰此一經論前朝一日諸侯各遣上介受次於朝之事云言諸侯者明來朝者衆矣者上注云言侯氏者明國殊舎異禮不凡之於此言諸侯凡之者以其諸國同時遣上介故言來朝者衆矣若其行禮自有前後故鄭云顧其入覲不得並耳云受舎於朝受次于文王廟門之外者以其春夏受贄於朝無迎法受享於廟有迎禮秋冬受贄受享皆在廟並無迎法是以大門外無位旣受覲於廟故在大門外受次知在文王廟門外者案聘禮云不腆先君之祧旣拚以俟則諸侯待朝聘之賔皆在大祖之廟以其諸侯者無二祧遷主所藏皆在始祖之廟故以始祖爲祧案天子待覲遇亦當在祧祭法云天子七廟有二祧又案周禮守祧職云掌守先王先公之廟祧鄭注遷主所藏曰祧穆之遷主藏於文王廟昭之遷主藏於武王廟今不在武王廟而在文王廟者父尊而子卑故知在文王廟也若然先公木主藏於后稷廟受覲遇不在后稷廟者后稷生非王故不冝在焉云言舎者尊舎也者此賔以帷爲次非屋舎尊天子之次故以屋舎言之是尊舎也若天子春夏受享諸侯相朝聘迎賔客者皆有外次即聘禮記宗人授次是也有外次於大門外者則無廟門外之内次天子覲遇在廟者有廟門外之内次無大門外之外次此文是也云天子使掌次爲之者案周禮掌次云掌王次舎之法以待張事故知使掌次爲之諸侯兼官無掌次使館人爲之故聘禮云館人布幕于寢門外鄭注云館人掌次舎帷幕者是也云諸侯上介先朝受焉者知使上介者案下文諸侯覲於天子爲宮方三百步上介皆奉其君之旂置于宮明知此亦使上介也云其來之心猶若朝也者案周禮大宗伯云春曰朝秋曰覲鄭注云朝之言朝也欲其來之早覲之言勤欲其勤王事各舉一邊而言其實早來勤王通有也故鄭云其來之心猶若朝故變覲言朝也云分別同姓異姓受之將有先後者案此經同姓西面異姓東面案下曲禮云天子當依而立諸侯北面而見天子曰覲彼此皆是覲禮彼諸侯皆北面不辨同姓異姓與此不同者此謂廟門外爲位時彼謂入見天子時故鄭注云覲者位於廟門外而序入入謂北面見天子時引春秋者案隱十一年經書滕侯薛侯來朝左傳曰爭長薛侯曰我先封滕侯曰我周之卜正也薛庶姓也我不可以後之公使羽父請於薛侯曰君與滕君辱在寡人周諺有之曰山有木工則度之賔有礼主則擇之周之宗盟異姓爲後寡人若朝于薛不敢與諸任齒君若辱貺寡人則願以滕君爲請薛侯許之乃長滕侯也若然彼服注云爭長先登授玉此位在門外引之者以其在先即先登外内同故引以爲證侯氏至于祢注將覲至爲絻釋曰此經明諸侯之在館内將覲於王先釋幣告於行主之礼知將覲質明時者案聘礼賔厥明釋幣于祢故知此亦質明時也云裨之言埤者讀從詩政事一埤益我取裨陪之義云天子六服大裘爲上其餘爲埤者天子吉服有九而言六服者據六冕而言以大裘爲上無埤義衮冕以下皆爲裨故云其餘爲裨云以事尊卑服之者即司服所云王祀昊天上帝則大裘而冕祀五帝亦如之祀先王則衮冕以下至羣小祀則玄冕舉天子而言故云以事尊卑服之云而諸侯亦服焉者亦據司服而言諸侯唯不得有大裘上公則衮冕以下故鄭云此差司服所掌也云上公衮無升龍者案白虎通引礼記曰天子乗龍載大旗象日月升龍傳曰天子升龍諸侯降龍以此言之上得兼下下不得僭上則天子升降俱有諸侯直有降龍而巳若然彼升龍文承大旗之下知不施於旌旗而據衣服者案司常云交龍爲旂又云諸侯建旂注云諸侯畫交龍一象其升朝一象其下復則旌旗升降俱有而白虎通云諸侯降龍者據衣服而言案玉藻諸侯玄冕以祭不得服衮冕以下是以鄭注司服云諸侯自於其家則降若然諸侯自家祭降魯與二王之後皆不得用衮冕鷩冕毳冕則此及孤卿大夫絺冕玄冕者是入君廟及入天子之廟故服也今云諸侯告禰用裨冕者將入天子之廟故服以告禰謂若曽子問云諸侯裨冕以朝鄭注云爲將廟受亦斯之類也云禰謂行主遷主矣者案礼記曽子問云師行必以遷廟主行乎孔子曰天子巡守以遷廟主行載于齊車言必有尊也彼雖據天子其諸侯行亦然以其皆有遷廟木主若然大夫無木主聘礼賔釋幣于祢者大夫雖無木主以幣帛主其神亦爲行主也而云祢親之者以其在外唯有遷主可事故不言遷主而云祢也云其釋幣如聘大夫將受命釋幣于祢之礼者案聘礼將行釋幣于祢此祢無文故約與之同乃受命即出行故云將受命釋幣于祢皆是告將行無祭祀知祧則祝藏其幣歸乃埋之於祧西階之東者此無正文案聘礼祝告祝又入取幣降卷幣實于䈂埋于西階東此亦與彼同云祧者諸侯遷主藏於始祖之廟諸侯旣以始祖之廟爲祧遷主歸還入祧廟故知此幣埋於祧西階之東也乗墨至有繅注墨車至爲璪釋曰自此盡乃出論諸侯發館至天子廟門之外以次行覲禮之事云墨車大夫制也者案周禮巾車職云孤乗夏篆卿乗夏縵大夫乗墨車士乗棧車庶人乗役車故知墨車大夫制也必言墨車大夫制者封玉路金路象路之等天子諸侯之制也云乗之者入天子之國車服不可盡同者巾車云同姓金路異姓象路四衞革路並得與天子同據在本國所乗下記云偏駕不入王門偏駕金路象路等是也旣不入王門舎於客館乗此墨車以朝也云交龍爲旂諸侯之所建者司常職文也云弧所以張縿之弓也者爾雅說旌旗正幅爲縿故以此弧弓張縿之兩幅故云張縿之弓也云弓衣曰韣者案月令云后妃帥九嬪御乃禮天子所御帶以弓韣授以弓矢于髙禖之前言帶以弓韣韣是弓衣可知云瑞玉謂公桓圭之等皆大宗伯典瑞職文云繅所以藉玉至爲六色其義䟽巳見於聘禮記天子至右几注依如至黼純釋曰云依如今綈素屏風也者案爾雅牖戸之閒謂之扆以屏風爲斧文置於依地孔安國顧命傳云扆屏風畫爲斧文置戸牖閒是也言綈素者綈赤也素白也漢時屏風以綈素爲之象古者白黒斧文故鄭以漢法爲況云有繡斧文所以示威也者案周禮繢人云青與赤謂之文赤與白謂之章白與黒謂之黼黒與青謂之黻五色備謂之繡此白黒斧以比方繡次爲之故云有繡斧文所以示威也云斧謂之黼者據繡次言之白與黒謂之黼即爲此黼字也據文體形質言之刄白而銎黒則爲此斧字故二字不同也云几玉几也者案周禮司几筵云左右玉几故知此几是玉几也注左右有几優至尊也亦與此同又案大宰云賛玉几鄭注云玉几王所依也立而設几優尊者但几唯須其一又几坐時所以馮依今左右及立而設之皆是優至尊也兩注相兼乃具云其席莞席以下亦司几筵文案彼云大朝覲大饗射凡封國命諸侯王位設黼依依前南郷設莞席紛純等鄭注云紛純者紛如綬有文而狹繅席者削蒲弱展之編以五采若今合歡矣畫純者謂畫雲氣次席者桃枝蓆有次列成文此次席即顧命所謂篾席也篾謂竹青據竹而言次謂次列據文體而說是以顧命云牖閒南嚮敷重篾席孔傳云桃枝竹義與鄭同天子衮冕負斧依注衮衣至侯見釋曰云負斧依者負謂背之南面也云衮衣者裨之上也者但裨衣者自衮冕至玄冕五者皆裨衣故云裨之上也上文云裨衣者㹅五等諸侯指其衣有三等不得定其衣號故言㹅裨衣此據天子一身故指其衣體言衮冕云繢之繡之爲九章者衣繢而裳繡衣在上爲陽陽主輕浮故對方爲繢次裳在下爲隂隂主沈深故刺之爲繡次是以尚書衣言作繢裳言紩繡爲九章者鄭注司服云冕服九章登龍於山登火於宗彞尊其神明也九章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗彞皆畫以爲繢次六曰藻次七曰粉米次八曰黼次九曰黻皆絺以爲繡則衮之衣五章裳四章凡九也云南郷而立者此文及司几筵雖不云立案下曲禮云天子當宁而立又云當扆而立在朝在廟皆云立故知此南面而立以俟諸侯之見也嗇夫至天子注嗇夫至夫馳釋曰云嗇夫蓋司空之屬也者無正文知司空屬者案五官之内無嗇夫之名故知是司空之屬但司空職亡故言蓋以疑之云末擯承命於侯氏下介傳而上上擯以告於天子者案周禮司儀職兩諸侯相朝皆爲交擯則此諸侯見天子交擯可知此所陳擯介當在廟之外門東陳擯從北郷南門西陳介從南郷北各自爲上下此經先云嗇夫承命告于天子則命先從侯氏出下文天子得命呼之而入命又從天子下至侯氏即令入故下注云君乃許入若然此覲遇之禮略唯有此一辭而巳無三辭之事司儀云交擯三辭者據諸侯自相見於大門外法其天子春夏受享於廟見於大門外亦可交擯三辭矣云天子見公擯者五人以下並大行人文云皆宗伯爲上擯者案大宗伯職云朝覲㑹同則爲上相鄭注云相詔王禮也出接賔曰擯入詔禮曰相若四時常朝則小行人爲承擯故小行人職云將幣爲承而擯此文嗇夫爲末擯若子男三擯此則足矣若侯伯四擯別増一士若上公五擯更别増二士若時㑹殷同則肆師爲承擯故肆師職云大朝覲佐擯鄭注云爲承擯是其義也引春秋傳者案左氏傳昭十七年夏六月朔日有食之叔孫昭子救日食引夏書云辰不集于房瞽奏鼓嗇夫馳庶人走鄭引者欲見嗇夫是卑官得爲末擯之意也天子至受之注言非至作賀釋曰此經直云伯父其入不云迎之禮記郊特牲云覲禮天子不下堂而見諸侯故無迎法若然案夏官齊僕云掌馭金路以賔朝覲宗遇饗食皆乗金路其法儀各以其等爲車送逆之節者覲遇雖無迎法至於饗即與春夏同故連言之侯氏至稽首注入門至不授釋曰云卑者見尊奠摯而不授者案士昬禮云壻執鴈升奠鴈又云若不親迎則婦入三月然後壻見主人出門壻入門奠摯再拜出鄭注云奠摯者壻有子道不敢授也又士相見凡臣見於君奠摯再拜與此奠圭皆是卑者不敢授而奠之擯者謁注謁猶至其升釋曰云其辭所易者曰伯父其升者此又不見謁告之辭鄭注云上擯告以天子前辭者謂擯者謁以上辭云天子曰非他伯父實來予一人嘉之伯父其入予一人將受之是擯者於門外傳王辭告之使入此擯者謁告還用彼辭所改易者唯改入字爲升故云伯父其升也以其喚使升堂親受之也侯氏至乃出注擯者至進也釋曰云侯氏坐取圭則遂左降者以經侯氏得擯者之告坐取圭即言升致命無出門之文明知遂向門左從左堂塗升自西階致命也云從後詔禮曰延延進也者以其賔升堂擯者不升若特牲少牢祝延尸使升尸升祝從升與此文同皆是從後詔禮之事儀禮䟽卷第二十六
