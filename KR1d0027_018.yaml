  text: 儀禮疏卷第十八
  hash: sha256:7beb2eab0ca4f33271daea55f22537ccb3f7c0950fc45b79a435e9d0be404a7d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_018-1a}
body:
  text: 唐朝散大夫行太學博士引文館學士臣賈公彥等撰三耦至堂西注不敢至事畢釋曰自此盡共而俟論第二畨射三耦訖次公卿大夫之事但此賔先降取弓矢即升堂者以其不敢與君並待告故下云司射告射于公小射正取公之決拾并授弓拂弓是君得告乃取弓矢是不敢與君並俟告也云取之以升俟君事畢者案下文云公將射則賔降適堂西袒決遂執弓搢三挾一個升自西階是君事畢君事畢賔降袒決遂乃更升若然賔於此不即袒決遂者去射時逺故不可即袒也諸公至以南注言繼至夫北釋曰言適次者但射位在堂東次在洗東南今諸公卿東南適次前北至三耦之南以次西面立云繼三耦明在大夫北者以其三耦在北大夫在南而言繼三耦明知大夫之北也公將至而俟注君尊若始焉釋曰云君尊若始焉者案上始時司馬命負侯三耦將射司馬命去侯今三耦卒射君將射司馬使更命負侯是君尊若始焉小射至東堂注授弓至去塵釋曰據此經上下或云大射正或云司射或云小射正不同者今行射禮大射正一人為上司射次之或云小射正若然大射正與司射各一人據其行事小射正不止一人而巳此云小射正一人取公之決拾於東坫上下云小射正奉決拾以笥與此一人此又云小射正授弓與取決拾別則小射正二人也云授弓當授大射正者下云大射正執弓以袂以授公明此小射正授弓者當授大射正也公將至面立注不敢至君也釋曰云公將射則賔降者案前文賔降適堂西取弓矢無賔升堂之文但文不具其實即升矣是以此文云賔降云笴矢幹者案周禮矢人矢幹長三尺則此賔立於物北三尺矣注還右至右還釋曰云還右還君之右也者君為下射賔為上射司馬在君之西南揚弓命去侯訖還君之右東而南西向降自西階猶出下射之南還其後也者由如上文初將射時司馬立於物間南揚弓命去侯訖出於下射之南還其後降自西階前後是同故取彼解此云今文曰右還不從右還者若右還則右還於上射不得還君故不從也公就至於物注笥萑至其職釋曰前解大射正與司射別人案此注大射正舍司正親其職則大射正與司正為一人又案上文司射請立司正遂立司射為司正則司射又與大射正為一人與上解似相違者以大射正與射人俱掌射事相當則大射正與司射別若通而言之射人不對大射正射人亦名大射正故此以射人為大射正也注既袒至襦上釋曰案上文設決訖乃云公袒朱襦始云小臣正贊設拾拾當拾斂膚體冝在朱襦之上故鄭云既袒乃設拾拾當以韝襦上鄉射云袒決遂以其無襦故遂與決得俱時設若大夫對士射袒纁襦設遂亦當在袒後大射至揉之注順放至為紐釋曰云順放之也者以袂向下於弓隈順放之云觀其安危也者案考工記弓人云其弓安其弓危者以弓弱者為危其弓強者為安則此云觀安危者謂試弓之強弱公既至乘矢注公下至尊也釋曰案上三耦射者上射射訖乃次下射此公為下射當後射今君射前於賔故鄭云先發不留尊也注階西至降位釋曰案上文賔受獻訖降立於階西東面此云反位於階西東面故云反位也公即至復筵釋曰此公與賔復升即位者公卿以下當繼射公與賔當觀之故升就位也司馬至如初釋曰自此盡就席論射訖取矢委於楅之事注司馬至乘矢釋曰知司馬是司馬正司馬師亦坐乘矢者此經皆言如初案上畨射司馬正與司馬師乘矢故知也注異束至殊之也釋曰公卿皆異束但言大夫者公卿自相對其矢俱束之及其脫之亦拾取但三耦之內大夫以士耦之士矢不束大夫束之故曰尊殊之下注云不言君矢小臣以授矢人於東堂下可知知者以其小臣取矢明取之以授矢人注此言至於楅釋曰云此言其升前小臣委矢於楅者案上文司馬降釋弓如初在小臣委矢之上其司馬降釋弓之時卿大夫即升就席委矢當依司馬命取矢之下不失其次故不即見卿大夫升事是以於此特言司馬降釋弓與卿大夫升為節耳故鄭亦言其次第也司射至去撲釋曰自此盡共而俟論數算之事直言去撲不言去矢矢亦去之是以下文司射執弓挾一個搢撲明此時去矢後更挾之司射命設豐釋曰自此盡徹豐與觶論二畨射訖行射爵之事注弟子至略之釋曰自此以上其疏見於鄉射於此不復言云不授者射爵猶罰爵略之者案詩云兕觥其觩旨酒思柔注云觩陳設貌觥罰爵不手授此飲射爵亦不手授故云猶罰爵也案獻酬之爵皆手授之此不手授故云略之也若然士以下飲罰爵者取於豐大夫巳上皆手授尊之故下注云授爵而不奠豐尊大夫也其三耦之內雖大夫亦取於豐者以其作三耦與衆耦同事故不復殊之注固襲至挾也釋曰云固襲説決拾矣復言之者起勝者也者起勝者射畢之時降堂皆就次襲説決拾矣故云固襲今復言之者以其勝者更袒決遂故復言不勝襲説決拾欲與勝者相起復發故復言之也注不勝之黨無不飲釋曰以其經云三耦及衆射者皆升飲射爵者言升之明知不勝之黨無不飲但大射者所以擇士以助祭今若罰爵在於不勝之黨雖數中亦受罰及其助祭雖飲射爵亦得助祭但在勝黨雖不飲爵若不數中亦不得助祭以其飲罰據一黨而言取其助祭取一身之藝義故不同也注先升至禮然釋曰云亦因相飲之禮然者案鄉飲酒鄉射獻酬之禮獻者在右酬者在左故云亦也注立卒至執弓釋曰案鄉飲酒皆祭坐卒爵拜既爵故此決之受罰不備禮也云右手執觶左手執弓者以其執弛弓不釋於地明知未飲時兩手執弓今受罰爵右手執爵為便左手執弓可知不勝者先降注後升至並行釋曰云後升先降略之不由次也者案上文勝者先升此文不勝者先降故云略之不由次云降而少右復並行者見下文與升飲者相左明降至堂下此二人少右復並行以其辟升者在左故也若賔至不升注此耦至尊也釋曰知此耦謂士者以大夫坐於上士立於下經云耦不升故云此耦謂士也是以鄭解其意云諸公卿或闕士為之耦者不升其諸公卿大夫相為耦者不降席以其大夫在堂上故云不降席云重恥尊也者解士不升大夫巳上不降席意以其卑者對飲尊者是可恥之事不對飲是重恥尊者也注雖尊至夫也釋曰云不可以已尊枉正罰也者正罰謂上文飲者在左勝者在右於西階之上北面跪取豐上之觶飲之是也今雖不取於豐亦於西階北面是不可以已尊枉正罰也若飲至降拜注侍射至禮也釋曰云侍射賔也者以其賔與君對射耦自相飲故知侍射者賔也云飲君則不敢以為罰從致爵之禮也者罰爵如上文罰者飲之而巳今則從燕臣致爵於君之禮下文所謂夾爵者是也但此經云角觶與上文觶皆是三升曰觶觶與角連故謂之角觶或單言角或單言觶是以禮記少儀云侍射則約矢侍投則擁矢勝則洗爵而請不角注云角謂觥罰爵也於尊長與客如獻酬之爵又詩云我姑酌彼兕觥毛傳云兕觥角爵箋云兕觥罰爵是其角觶兕觥皆罰爵此角觶以兕角為之非謂四升曰角者也若然此角觶對下文飲君云象觶故云角觶謂賔酌如兕自飲君即下文賔降洗象觶亦從獻酬之爵不敢用罰爵也注賔復至夾爵釋曰云所謂若飲君燕則夾爵者言所謂鄉射文彼云燕者則此經夾爵也注不祭象射爵釋曰案上文受罰者取爵於豐飲之不祭此飲君爵不祭是以賔飲夾爵亦不祭皆與射同故云象司宫至於篚注為大至五升釋曰自此盡侯而俟論設尊獻服不之事云不於初設之者不敢必君射也君不射則不獻大侯之獲者若然此設大侯之獲者君不射則不設之不豫設者不敢必君射案上張侯先設大侯君射大侯張之必君射者但聖人設法一與一奪以大射者為祭擇士所以助祭人君不可不親故奪其尊使之必射故豫張大侯至此設大侯之尊君射訖乃設之者許其自優暇容有不射之理是以不射則不設射乃設之云散爵名容五升者案韓詩傳云一升曰爵二升曰觚三升曰觶四升曰角五升曰散是其散容五升也司馬至服不注言服至西面釋曰云服不者著其官尊大侯也者自此巳前皆以事名之於此而言服不著其官言尊大侯故也云服不司馬之屬者以其服不在大司馬下六十官之屬者云掌養猛獸而教擾之者猛獸熊羆之屬教之使擾馴人意象王者服不服諸侯使歸服王者云洗酌皆西面者以其設尊設洗皆東面故知洗爵酌酒皆西面向之也若然獻旅食尊後酌者為背君此西面不嫌背君以其南統於侯故也服不至受爵注近其所為獻釋曰云近其所為獻者以其服不得獻由侯所為故不近乏而近侯獻之故云近其所為獻也司馬至反位注不俟至反位釋曰云不俟卒爵略賤也者案上文獻服不訖又案下文卒祭左個之西北三步東靣設薦俎立卒爵若然卒爵禮祭侯訖今司馬反位在未祭俟之前故略賤也云此終言之獻服不之徒乃反位者但大侯尊服不與其徒二人共在獲所獻服不亦兼獻徒此經唯見獻服不不見獻其徒即云司馬反位明獻徒移始反位是以知反位者終言之其實獻徒後乃反位故下注云司馬正皆獻之是也宰夫至折俎注宰夫至脅肺釋曰云宰夫有司宰夫之吏也者諸侯宰夫是士而宰夫有司明是宰夫之吏府史也引鄉射記者此俎實無文故引之為證卒錯至從之注不言至右個釋曰云國君大侯服不負侯其徒居乏待獲變其文容二人也者案上注云天子服不氏下士一人徒四人掌以旌居乏待獲鄭言容二人者欲見服不與徒二人皆得獻故鄭云司馬正皆獻之云適右個由侯內者以其既祭左個次祭右個乃祭於中故云適右個由侯內獲者至祭酒注祭俎至未聞釋曰云祭俎不奠爵不備禮也者言祭俎者謂祭俎上肺但肺有二種此云祭是祭肺也非是離肺知者案鄉射記云獲者之俎折脊脅肺臑又曰釋獲者之俎折脊脅肺皆有祭則此俎祭肺亦離肺若然凡祭祭肺皆不奠爵是其常云此不奠爵不備禮者但祭肺離肺兩有祭肺不奠爵若空有祭肺亦不奠爵今祭俎不奠故云不備禮云天子祝侯曰以下周禮梓人文云諸侯以下祝辭未聞知諸侯不與天子祝辭同而云未聞者以本所射侯天子中之則能服諸侯諸侯中之則得為諸侯若天子云抗而射女諸侯則不得云抗而射女是以知祝辭有異但未聞耳注鄉射至三祭釋曰以其左右及中故三者皆三祭非謂一處有三祭卒祭至東面注此鄉至卒爵釋曰云不北面者嫌為侯卒爵者前服不受獻之時侯西北面者欲歸功於侯故也今卒爵雖同舊處而東面者以其前受獻為已今卒爵還為已卒爵故東面是以云不北面者嫌為侯卒爵也設薦至卒爵注不言至立飲釋曰云不言不拜既爵司馬正巳反位不拜可知也者決鄉射獲者薦右東面立飲不拜既爵此則不言之以其司馬在對司馬不拜既爵司馬巳反位不拜既爵可知故不言引鄉射禮者此不言立位之處當同鄉射薦者東面立司馬至之禮注隸僕至可知釋曰云隸僕人掃侯道者謂君射時初掃之時亦是隸僕人也云巾車張大侯者舉尊者而言其參侯干侯亦張之是以上文司馬遂命量人巾車張三侯此直云大侯舉尊而言也云及參侯干侯之獲者以其上文以獻大侯服不獲者明此經獲者是糝侯犴侯可知云隸僕人巾車於服不之位受之知者以其隸僕人巾車素無其位而經云如大侯之禮明就大侯之位受獻是以鄭云功成於大侯也云不言量人者此自後以及先可知者案上張侯之時先言量人後言巾車君射之時乃有隸僕人掃侯道受獻先言隸僕人後言巾車是自後以及先隸僕尚得獻明量人在巾車之先得獻可知注隸僕至而南釋曰知自服不而南者雖無正文以其受獻於服不之位明繼服不而南可知司射至少南釋曰自此盡反位論獻釋獲者之事注文武不同釋曰言文武不同者以其獻獲者於侯西北面受獻歸功於侯是其武獻釋獲者升堂酌酒東面獻之就釋算之所是其文故云文武不同注俎與至為異釋曰云俎與服不同者以其俱用一俎云唯祭一為異者上祭侯之俎引鄉射獲者俎與薦皆三祭鄭鄉射注云祭侯三處至此獻釋獲者不主祭侯正唯一祭俎耳故云唯祭一為異注祭俎至備禮釋曰上祭侯之時祭俎不奠爵不備禮至此祭俎亦祭肺不奠爵賤亦不備禮注亦辟俎也釋曰以其薦俎相將薦既辟俎亦辟可知司射至反位注為將復射釋曰自此盡于公如初論司射請公為三畨射事注云不升堂賔諸公卿大夫既射矣聞之可知者決前司射升堂請射于公升今不升者諸公卿大夫前巳射聞之矣反搢至取矢注嚮言至言耳釋曰自此盡襲反位論三耦與卿大夫取矢之事云嚮言拾者謂第一射時三耦云拾取矢云是言序者謂序出次時一耦先後互者皆次序出次至庭拾取矢司射先反位注言先至先也釋曰云嚮不言司射先反位三耦未有次外位無所先也者凡言反位者謂前巳有位今乃反之是今禮反於舊位舊位第一畨之時三耦次外舊無位司射雖先有位不得言先反位是以決之三耦至如初注小射至代之釋曰云禮殺代之者決第一畨不言小射正作取矢三耦至三耦注皆進至從初釋曰云凡繼射命耦而巳不作射不作取矢從初者言凡繼射命耦者前三耦卒射後大夫降至三耦之南西面北上司射東面于大夫西比耦大夫與大夫命上射曰某御於子命下射曰子與某子射卒遂比衆耦云云至公即席後賔升階復位還筵而後卿大夫繼射後衆皆繼射釋獲皆如初注云諸公卿言取弓矢衆言釋獲互言也既司射注司射所作唯上耦是此文小射正但作三耦拾取矢公以下亦無作拾文故曰不作取矢從初從三耦法也注説矢至謙也釋曰云自同於三耦謙也者以其三耦是士之束既是大夫若束則異於三耦故云説矢束自同於三耦謙也鄉射坐説矢束注云説矢束者下耦以將拾取彼不言同三耦者彼三耦非大夫故也注大夫至下位釋曰諸公卿大夫自為耦者拾取矢在前大夫與士耦者説矢束拾取矢在後今待大夫反位公卿乃升就席者以其上大夫與下大夫同是大夫爵但上下有異耳故上大夫待下大夫反位乃後升就席注請奏至者乎釋曰云請奏樂以為節也者謂若天子騶虞九節諸侯貍首七節大夫采蘋士采蘩皆五節云始射獲而未釋獲者謂第一畨三耦射中時雖唱獲未釋算云復釋獲者謂第二畨衆耦皆射釋算未作樂云復用樂行之者謂第三畨射非直釋算復用樂焉云射用應樂為難者但禮射其容體比於禮其節比於樂又須中於侯名為應樂節云孔子曰者禮記射義文引之者證射用應樂而為難之意注言君至北面釋曰云樂正在工南北面者此時工在洗東西面樂正在工南北面司射在西階下東面經云命樂正者東面遙命之注不與至下五釋曰引學記者證鼓得與樂為節之事云凡射之鼓節投壷其存者也者射之鼓節多少無文案今禮記投壷篇圖出魯鼓薛鼓云取半以下為投壷節盡用之為射節是其投壷存者云周禮射節天子九以下者是射人樂師皆有此文引之者證射節多少上射至若一注樂正至重節釋曰云貍首逸詩曽孫也者以其貍首是篇名曽孫是章頭知者以其射義上文云其節天子以騶虞諸侯以貍首卿大夫以采蘋士以采繁以類言之騶虞采蘋是篇名貍首篇名可知射義下文諸侯君臣盡志於射又云故詩曰曽孫侯氏四正具舉小大莫處御于君所注云此曽孫之詩諸侯之射節也四正正爵四行也四行者獻賔獻公獻卿獻大夫乃後樂作而射也上云貍首下云曽孫曽孫章頭也是以鄭云曽孫其章頭射義所載曽孫侯氏是也云後丗失之謂之曽孫者以曽孫為篇名是失之云曽孫其章頭也是正丗人也云小大莫處巳下則燕則譽以上皆射義文彼注以燕以射先行燕禮乃射是也云間若一者調其聲之疏數重節者謂九節七節五節中間相去或希疏或密數中間使如一必疏數如一者重此樂故也大師至初儀注不以至其目釋曰此經云如初者皆如上第二畨射法唯作樂為異耳云辟不敏也者若以樂志不與樂節相應則見君不敏今不以樂志遲速從心其發不必應樂是辟不敏也引春秋傳者定八年左氏傳文正月公侵齊門于陽州其時魯人顔息射人中眉退曰我無勇吾志其目也服氏注云志中其目是非其誠詐以自矜引之者證志是意所擬度也注側持至射也釋曰上文皆云挾一個此經云執一個故上注云方持弦矢曰挾以其將射故也此注云側持弦矢曰執謂鏃向上故云兼矢於弦尚鏃將止變於射也案鄉射禮云矢不挾兼諸弦弣不言面鏃此言面鏃不言兼弦弣各舉一邊省文之義言兼弦弣者一矢兼弦三矢兼弣也注諸所至薦俎釋曰云皆俟備君復射者但射巳三畨於後或射或否但臣不敢必君射故備擬於君也云釋獲者亦退其薦俎者前辟薦俎今既退中與算薦俎不可虛留明亦退之可知公又至反位釋曰此一節論射訖為大夫舉旅之事司馬至公許釋曰自此盡反位坐論徹俎升坐安燕之事大夫降復位注門東北面位釋曰云大夫降者大夫雖無俎以賔及公卿皆送俎不可獨立於堂故降復位云門東北面位者謂初小臣納卿大夫門東北面揖位案下文賔諸公卿皆入門東面北上謂在西階下知大夫不復在西階下位者以其言復位者復前位其西階下舊無位故知非西階下若然公卿入西階下鄭云諸公卿不入門而右以將燕亦因從賔者也大夫以公卿未入不可猶居西階故在門東北靣位也羞庶羞注羞進至鶉鴽釋曰知有􅍧肝膋者此大射先行燕禮燕法其牲唯有狗又案內則云肝膋取狗肝一幪之以其膋濡炙之舉燋其膋不蓼注云膋腸間脂故知此羞中有肝膋也又知有狗胾醢者以其公食大夫有牛胾炙半胾炙豕胾炙此燕無三牲故知胾醢亦用狗知有缹鱉膾鯉者案六月詩云吉甫燕喜既多受祉又云飲御諸友炮鱉膾鯉故知有此也公食大夫有王事之勞乃有之故六月詩鄭注以吉甫逺從鎬地來又日月長久今飲之酒使其諸友恩舊者侍之又加其珍美之饌所以極勸之也是有王事之勞乃有之無王事之勞則無故公食大夫不見也又知有雉兔鶉鴽者公食大夫二十豆有此四者此仍引內則上大夫二十豆者不引二十豆盡以其二十豆有三牲之物此狗故唯引此四者大夫祭薦注燕乃至成禮釋曰云燕乃祭薦不敢於盛成禮者此大夫卑不敢與公卿同時於盛成禮也司正至位坐注皆命至序端釋曰云興對必降席者經直云興不言降席鄭知降席者以為反坐故知降席也言敬也者決上文司正命賔與大夫以我安雖未坐不云降而對故以此為敬若然上不降席者彼直云安未盡殷勤故不降此命使醉是盡殷勤故興降加敬也知司正退立西序端者案司正監酒此將獻士事未訖亦如鄉飲酒監旅時立于西序端也主人至拜送注獻士至作觚釋曰自此盡奠于篚論獻士及祝史等之事云獻士用觶士賤也者言獻士用觶對上獻大夫巳上觚觚二升觶三升用大者賤用小者尊故云士賤也注其他至受爵釋曰云其他謂衆士也者長謂士中之長次云士謂長巳下又云其他謂衆士者亦謂二十七士以其下經旅食謂庶人在官故知此非府史以下注司正至其佐釋曰案燕禮薦司正與射人一人司士一人執幂二人此不言其數又不言司士與執幂者以射人是小射正非一人互見執事執事者皆同獻不言其數不言執幂者二人文不具注士既至略賤釋曰云畢獻薦之略賤者案上獻士立飲是畢獻訖乃云乃薦司正與射人于觶南是獻士又獻司正巳下若然薦士當在乃薦司正上至此言之者其實薦士在乃薦司正上今此更言士得獻訖立在東方立畢乃薦不畢獻待司正薦乃薦士也是以薦司正言乃者緩辭明司正巳下薦在士後也注主人至略之釋曰知主人既酌西面士旅食北面受之者以其不可背君南面授故知位之如此若然大史等亦北面則亦西面授酒也其小臣師等案上文位在阼階東南自然北面授賔降至再拜釋曰自此盡旅酌論賔舉爵為士舉旅行酬之事注賔受至再拜釋曰云賔受公賜多矣禮將終冝勸公序厚意也者上文為賔為卿為大夫舉旅皆臣自致爵今此其賔為士舉旅行酬因得為賔致爵於君故鄭云序賔厚意也注反位至為觶釋曰自此巳前賔位在西階下東面無席戶牖之間位則有席此賔升成拜不言降反位明反位者反於戶牖之間席位云此觚當為觶者凡旅酬皆用觶獻士尚用觶故知觚當為鱓下經觚亦當為觶有執爵者注士有至授之釋曰知士有盥升者以其為公卿大夫使行旅不可不潔知是士者案下文云士有執膳爵者有執散爵者故知士有盥升主酌授之注欲令惠均釋曰以堂上公卿大夫旅遍并堂下之士故云欲令惠均也注興酬至異也釋曰云興酬士者決向來堂上相旅皆坐相酬執爵者行之大夫未能受酬者輒興西階上故鄭云士立堂下與上坐者異也注祝史至及焉釋曰鄭知祝史以下皆得旅酬者前得獻祝史與旅皆得獻明此旅酬得之可知士旅酌注旅序至爵者釋曰云無執爵者對上文卿大夫等有執爵者以其坐故也士無執爵者以其賤不坐故以次自酌以相酬無執爵者也注獻庶至無事釋曰獻酬之禮庶子巳下最後得獻若獻庶子之後正禮畢不得更有射事故命復射在獻庶子之前注司射至心也釋曰此乃三畨射後爵行無算直非懈怠復有醉者是以不可恣心所欲注拜君至在上釋曰云不言賔賔從羣臣禮在上者謂初酬賔直言賔再舉旅言若長不專於賔巳是禮殺第三舉旅云唯公所賜若賔若長至此賔士舉旅直云唯公所賜復不言若賔若長賔從羣臣禮在上注其功至中者釋曰上文第二畨第三畨唯公得中三侯皆釋獲至此燕後復射禮殺臣與君同是以鄭云和者益多尚歡樂也云其功一也者謂三侯所中皆是功故云一也云矢揚觸或有參中者卿大夫主射參侯士主射犴侯其中或揚觸容中別侯皆與釋主人至之禮注庶子至西上釋曰云小樂正在頌磬之北右也工在西即北面者工在西謂遷樂於下時大師少師上工立於鼓北也云工遷於東則東面者案上遷樂於東之時直云大師少師上工皆東坫之東不見小樂正從之明留在西縣之北東面向工矣云大樂正在笙磬之北左也工在西則西面者案上文司射東面命樂正單言樂正者謂大樂正既東面命之則大樂正元立於東矣以其工在西階下故知西面向之矣云工遷於東則北面者案上文樂正及位大師既西面明樂正北面可知是以鄉射工遷於東西面北上樂正北面立于其南此亦與彼同北面也云國君無故不釋縣二正君之近官也言此者人君路寢之廷樂縣不釋樂正與僕人正同掌樂事是君之近官也云同獻更洗以時事不聮也者以其雖同獻於阼階上獻有前後故更爵洗之是以云時事不聮也云庶子內小臣位在小臣師之東者案公食堂上夾北有宰夫內宰在東北此射禮堂上夾北無宰位又案執事者堂上又非樂人不得在樂正位以其與小臣師同名小臣故知小臣師之東也又云少退西上者見公食在宰東北少退故知此亦少退知西上者以此位皆西上故也無算爵釋曰自此盡無算樂論爵與樂恣意無數之事注酬之至者來釋曰凡行酬之法轉爵遞飲今膳散兩有冝得即飲猶待公卒爵乃飲猶代飲然明惠從公來嫌得即飲不代故著嫌不卒爵然後飲故曰嫌不代注燕之至意也釋曰云燕之歡在飲酒者諸安燕之歡正在於飲酒故受公爵者更酌反奠於公所擬公更賜爵是其歡燕成之意也注乃猶而也釋曰鄭轉乃為而者乃是緩辭於理不切故為之也注升不至臣禮釋曰於例臣於堂下再拜稽首得小臣以君命辭其拜不成當升成拜今直升不成拜者以其拜於下是臣之正禮故鄭云於將醉正臣禮注卿大至卒之釋曰上文卿大夫酬辨始酬士公命徹幂公卿以下降而爵止是以卿大夫升反席士以下相酬而卒之宵則庶子執燭釋曰自此盡篇終論禮畢容公卿出入之事賔所至遂出釋曰案鄉飲酒鄉射賔出無取脯賜鍾人之事者彼是臣禮此為君法故詳略不同公不送注臣也至禮也釋曰案燕義云使宰夫為獻主臣莫敢與君亢禮嚮來安燕交歡君若送之是臣與君亢禮故君不送賔也故燕禮注云賔禮訖臣禮是也公入驁注驁夏至入也釋曰云驁夏亦樂章也者案周禮鍾師有九夏皆樂章其中有驁夏如陔夏故云亦樂章也云以鍾鼓奏之者案鍾師以鍾鼓奏九夏鄭云先擊鍾次擊鼓故云以鍾鼓奏之云其詩今亡者鄭注鍾師云九夏皆詩篇名頌之族類也此歌之大者載在樂章樂崩亦從而亡是以頌不能具是其今亡云此公出而言入者射宫在郊以將還為入者天子射在虞庠周之小學祖西郊案鄉射記於郊則閭中鄭注云諸侯大學在郊是諸侯大射所故言入者射宫在郊以將還為入也鄭知燕在路寢者燕禮記云燕朝服於寢與羣臣賔客燕不合在燕寢故知從路寢也此篇所解多不具者以其諸侯大夫射先行燕禮大射三畨多依鄉射是以與禮同者於此不復重釋之也儀禮疏卷第十八
