body:
  text: 唐朝散大夫行太學博士引文館學士臣賈公彥等撰饌于至北上釋曰云西北上者則於東壁下南陳西北有韭菹東有醓醢次昌本次南麋臡次西有菁菹次北有鹿臡亦屈錯也上西夾饌六豆直言北上不云西北上此東夾獨云西北上者以其西夾言北上其東醓醢是西北上可知此東夾饌若不言西北上恐東夾饌從東壁南陳以東北為上其西有醓醢與西夾相對陳之故云西北上見雖東夾其陳亦與西夾同是以鄭云亦韭菹其東醓醢也醯醢至在東注夾碑至隂也釋曰案既夕禮云甕三醯醢屑鄭注云甕瓦器其容亦蓋一觳瓬人云簋實一觳又云豆實三而成觳四升曰豆則甕與簋同受斗二升也禮器云五獻之尊門外缶門內壷君尊瓦甒注云壷大一石瓦甒五斗即此壷大一石也云夾碑在鼎之中央也者上陳鼎云西階前陪鼎當內廉東面北上上當碑南陳下腥鼎亦如之此言夾碑自然在鼎之中央可知云醯在東醯榖陽也醢肉隂也者醯是釀榖為之酒之類在人消散故云陽醢是釀肉為之在人沈重故云隂也大宗伯云天産作隂德地産作陽德注云天産六牲之屬地産九榖之屬以六牲為陽九榖為隂與此醯是榖物為陽違者物各有所對六牲動物行蟲也故九榖為隂郊特牲云鼎俎竒而籩豆偶隂陽之義也又以籩豆醯醢等為隂鼎俎肉物揔為陽者亦各有所對以鼎俎之實以骨為主故為陽籩豆榖物故為隂也有司徹注又以庶羞為陽內羞為隂者亦羞中自相對內羞雖有糝食是肉物其中有糗餌粉餈食物故為隂庶羞肉物故為陽也餼二至羊豕注餼生至其左釋曰先言饔後言餼者陳者先以熟為主是以先陳饔饔下即陳孰物繼之故六豆以下相次此餼是生物其下次陳芻薪米禾之等相繼也云牛羊右手牽之者曲禮云效馬效羊者右牽之以不噬齧人用右手便也言右手牽之則人居其左也云豕束之寢右亦居其左者豕束縛其足亦北首寢卧其右亦人居其左案特牲云牲在其西北首東足鄭注云東足者尚右也與此不同者彼祭禮法用右胖故寢左上右士虞記云陳牲于廟門外北首西上寢右鄭注寢右者當升左胖也變吉故與此生人同也米百至四行注庭實至深也釋曰云庭實固當庭中言當中庭者南北之中也者上享時直言庭實入設不言中庭則在東西之中其南北三分庭一在南此更言中庭欲明南北之中也上文公立於中庭宰受幣於中庭皆南北之中也知北上東西為行者以經云北上黍粱稻皆兩行稷四行若南北縱陳止得言東西不得言北上何者以黍粱稻及稷當行皆一種無上下故也明橫陳可知黍兩行在北次粱兩行次稻兩行次南稷四行所以不用稻為上者稻粱是加黍稷是正故黍為上端稷為下端以見上下而稻粱居其間亦相變者亦上䋫屈錯之義云此言中庭則設碑近如堂深也者陳鼎上當其碑南向陳之醯醢夾碑在鼎中央亦南向陳之今米為筥在醯醢之南北之中則碑近北可知言堂深者猶若設洗南北以堂深相似若然碑東當洗矣門外至東陳注大夫至為逾釋曰云大夫之禮米禾皆視死牢者上文飪一牢腥二牢是三牢死故米三十車并下禾三十車亦是視死牢也云秉籔數名也秉有五籔二十四斛也者下記云十斗曰斛十六斗曰籔十籔曰秉若然一秉十六斛又有五籔為八斛揔二十四斛也云籔讀若不數之數者鄭君時以籔為數名數名有數有不數故云不數之數此從音讀其字仍竹下為之得為十六斗為籔故下記注云今江淮之間量名有為籔者是十六斗量器之名注秅數至百秉釋曰下記云四秉曰筥十筥曰稯十棕曰秅四百秉為一秅三四十二為千二百秉也薪芻倍禾注倍禾至焉爾釋曰云薪從米芻從禾者以其薪可以炊爨故從米陳之芻可以食馬故從禾陳之鄭言此者以經云倍禾恐並從禾陳之故也云四者之車皆陳北輈者以其向內為正故也引聘義者欲見主君享禮聘賔外內皆善故引為證也賔皮至答拜注大夫使者卿也釋曰云外門外者謂於主人大門外入大門東行即至廟門也云不答拜者亦以為君使不敢當故也云大夫使者卿也者即上卿韋辨者也揖入至揖入注賔與至夫廟釋曰云使者止執幣者下經始云大夫奉束帛入明此賔揖入時使者止執幣可知云賔俟之于門內謙也者聘時主君揖入立于庭尊卑法此賔與使者幣故賔在門內謙也云門內即寧下故下賔問卿云及廟門大夫揖入鄭注入者省內事也既而俟于寧下是也云古者天子適諸侯必舍于大祖廟者案禮運云天子適諸侯必舍其祖廟下記云卿館於大夫大夫館于士士館于工商鄭注云不館於敵者之廟為大尊也以此差之諸侯無正文鄭注舍于諸公廟者諸公大國之孤云大夫行舍于大夫廟者謂卿舍于大夫也若無孤之國諸侯舍於卿廟也入三揖皆行注皆猶至主人釋曰云使者尊不後主人者主人則賔所在若主人也然君與使者行當後君也至于至一等注讓不至三讓釋曰云讓不言三不成三也凡升者主人讓于客三敵者則客三辭主人乃許升者是三讓三辭成也今賔三讓大夫即升無三辭則不成三也云使者尊主人三讓則許升矣者即此經主人讓大夫先升是也云今使者三讓則是主人四讓也者經雖言讓大夫先升大夫之讓不明故鄭君兩言之但使尊終先升若主人三讓使人亦三讓主人又一讓則主人四讓使者乃升故鄭復言此也案周禮司儀云諸公之臣相為國客大夫郊勞三讓登聽命又云致饔餼如勞之禮即得行三讓之禮此中古文云三讓與彼合鄭不從者周禮統心舉其大率而云三讓此儀禮據屈曲行事觀此經直云讓大夫先升是主人或三讓大夫無三讓故不從古文也云公雖尊亦三讓乃許升不可以不下主人也者此據公為主人亦有三讓故上行聘時云至於階三讓公升二等賔升亦是公先讓先升故成三讓是以聘義云三讓而後升公尊必三讓者不下賔客主人之義故也注大夫至禮也釋曰大夫以束帛同致饔餼五牢及陳豆壷車米之等今賔拜饔三牢及庭實又别拜餼二牢及門外米禾殊拜之者敬主君以重禮故也大夫至升堂注賔先至北面釋曰前大夫奉君命歸饔餼故先升一等今賔私儐使者無君命體敵故賔先升在館如主人之儀故也知皆北面者以其體敵又下始云賔奉幣西面大夫東面明此北面可知注止不至餘尊釋曰凡賔主體敵之法主人降賔亦降今賔降使者不降者使之餘尊雖合降而不降注稽首至辭也釋曰賔主既行敵體之禮當行頓首今大夫稽首於賔為拜君之拜尊君客故也致者賔致幣當有辭對者大夫對亦當有辭所以無辭者文不具故也受幣至面俟注賔北至之使釋曰此賔儐使者是體敵之義經云受幣于楹間南面知賔不南面並授而云賔北面授者凡敵體授之義授由其右受由其左今尊君之使是以大夫南面賔北面故知賔北面授幣注出廟至受之釋曰言亦者上賔受禮時受幣馬云賔降執左馬以出上介受賔幣從者訝受馬此亦從者訝受馬故云亦也賔送至稽首注拜謝至辨服釋曰知拜謝在大門外者以其直言賔拜於朝無入門之文故知在大門外若然諸侯外朝在大門外明矣引周禮者秋官掌訝職云賔客至于國賔入館次于舍門外待事于客及將幣為前驅至于朝詔其位凡賔客之治令訝訝治之引之者欲見賔客發館至朝來往皆掌訝前驅為之導知此拜亦皮辨者以其受時皮辨故知此拜亦皮辨也故公食大夫云若不親食使大夫各以其爵朝服以侑幣致之賔朝服以受明日賔朝服以拜賜于朝彼朝服受還朝服拜則知此皮辨受亦皮辨拜可知上介至鼎三釋曰自此盡兩馬束錦論主君使下大夫歸饔餼於上介之事注飪鼎至異館釋曰云飪鼎七無鮮魚鮮臘也者對上賔九鼎有鮮魚鮮臘也云賔介皆異館者案下記云卿館於大夫大夫館於士士館於工商彼云卿即此賔一也彼云大夫即此上介也彼云士即此衆介也故知賔介各異館必異館者所陳饔餼後無所容故也西夾至上賔注凡所至介也釋曰云如上賔者有束帛故以為略之也云士介西面拜迎者以其士介為主人故西面每上賔與上介米禾皆視死牢具有芻薪米禾此士直有生餼無死牢則無芻薪米禾矣士介至首受注受於至從者釋曰知自牢後適宰夫右受者以其牢東北面拜明在宰夫東南從牢後來適宰夫至宰夫之後受取牛便故也必知在宰夫右受者見前君使士受私覿之馬適其右受知此亦在後受也若然君使士受私覿由前此由牢後與受馬不同者牛畜擾馴與馬有異故得從其後適宰夫右取便也云由前東面授從者於宰夫之後受牛遂由宰夫之前東授從者亦是取便也無擯注既受至於朝釋曰言無擯者決上賔與上介皆有儐士介賤故略之知明日衆介亦各如其受之服從賔拜於朝者案下夫人使下大夫韋辨歸禮賔受如受饔之禮儐之乘馬束錦又歸禮於上介上介受之如賔禮儐之兩馬束錦明日賔拜禮於朝鄭注云於是乃言賔拜明介從拜夫人歸禮介尚從拜則君饔餼介皆從拜可知賔朝服問卿注不皮至三人釋曰自此盡無儐論賔齎聘君之幣問主國卿之事云不皮辨别於主君者對上文行聘享私覿皆皮辨此朝服降一等故鄭注云别於主君云卿每國三人者每國三卿是其常鄭言此者欲見三卿皆以幣問之其主國下大夫曽使向己國者乃得幣問之與卿異卿受于祖廟注重賔至父也釋曰卿受鄰國君所問之禮不辭讓者以其初君送客之時賔請有事於大夫君禮辭許是以卿不敢更辭故下記云大夫不敢辭云祖王父也者大夫三廟有别子者立大祖廟非别子者并立曽祖廟王父即祖廟也今不授於太祖廟及曽祖廟而受於祖廟者以其天子受於文王廟諸侯受於祖廟大夫下君故受於王父廟下大夫擯注無士至見之釋曰行聘享於主國君時主君擯者三人以上并有士擯賔又設介今直云大夫擯無士擯者以其設擯介多者不敢質示行事有漸但賔行聘享於主君之時卿以與賔相接故急見之不須士擯擯者至揖入注入者至寧也釋曰大夫二門入大門東行即至廟門未及廟門而有每門者大夫三廟每廟兩旁皆南北竪牆牆皆閣門假令王父廟在東則有每門每曲之事云入者省內事也者曲禮云請入為席是也云既而俟于寧者寧門屋寧也知俟于寧者下云賔入三揖皆行鄭注云皆猶並也賔與卿並行以卿俟于寧故得並行與卿三揖不俟于庭者下君也案曲禮云客至於寢門則主人請入為席然後出迎客主人肅客而入此卿既入不重出迎客者彼曲禮平常賔客故重出迎客此聘問之賔與平常賔客異上君揖賔不重出此卿亦不重出與彼同但在庭在寧不同矣注亦從至君也釋曰亦者亦君受聘時擯者從君而入几筵既設擯者出請此擯者亦從卿而入省內然後出請注古文曰三讓釋曰不從古文者亦是不成三故賔先升一等大夫從升堂故不從三讓也注不擯賔辟君也釋曰上文賔行聘享訖而君禮賔有束帛乘馬敵者曰擯今卿不擯賔者辟國君也擯者至覿幣注面亦至質也釋曰自此至授老幣論賔行私面於卿之事賔私面於卿其幣多少與私覿於君同故云如覿幣賔私覿之時用束錦乘馬則此私面於卿亦用束錦乘馬可知也云面亦見也其謂之面威儀質也者覿面並文其面為質若散文面亦為覿故鄭司儀注云私面私覿也又左傳云楚公子棄疾以乘馬八匹私面鄭伯是也賔奉幣庭實從注庭實四馬釋曰以其言如覿幣故知庭實四馬也注大夫至迎之釋曰知階下辭者以其授老幣時降故也知迎者下文揖讓如初明迎之可知注見私至西階釋曰云為若降等者主人是大夫客是士降等法士就東階今此賔與卿覿者就門右若士於大夫降等引曲禮者主人辭賔賔遂左就門右西階復正也庭實至如初注大夫至並行釋曰云大夫至庭中旋並行者賔初入門右大夫階下辭賔賔遂門左大夫至庭中迎賔大夫回旋與賔揖而並行北出言如初者大夫不出門唯有庭中一揖至碑又揖再揖而巳注受幣至面授釋曰知賔北面授者以云大夫南面退西面立言退明賔不得南面又見下文賔當楣再拜明北面授因拜可知云受幣楹間敵也者凡授受之義在於兩楹之間者皆是體敵故昏禮云授于楹間南面注云授於楹間明為合好其節同也南面並授也謂賔主俱至楹間南面並而授是以曲禮云鄉與客並然後受注云於堂上則俱南面禮敵者並授此是敵者之常禮也雖是敵者於兩楹之間或有訝受者皆是相尊敬之法則此云大夫南面賔北面授雖是敵禮是尊大夫故訝受又前致饔餼儐使者於楹間賔北面授幣鄭云賔北面授尊君之使自餘不在楹間别相尊敬是以前云公受玉于中堂與東楹之間鄭注云東楹之間亦以君行一臣行二又云公禮賔賔受幣當東楹北面注云亦訝受又賔覿公云振幣進授當東楹北面如此之類不在兩楹之間者皆非敵法就文解之擯者至奉幣注特面至從之釋曰自此盡再拜送幣論上介私面於鄰國卿之事云特面者異於主君者介初覿主君之時不敢自尊别與衆介同執幣而入今私面於鄰國卿不與衆介同而特行禮焉故云特面者異於主君也云士介不從而入者對覿君時衆介從而入故鄭云君尊於衆介始覿不自别也云上賔則衆介皆從之者上介言特面則賔問卿與私面介皆從可知皮二人贊注亦儷皮也釋曰案經云幣如覿則上介私面亦與私覿於君幣同故云亦儷皮也入門至再拜注降等也釋曰言降等者主人是卿上介是大夫故入門右不敢自同賔客擯者反幣注出還于上介也釋曰不言反皮出還於上介皮出可知但文不具注大夫至入設釋曰云亦者亦上賔行私面大夫升一等賔乃升此上介私面亦然故云亦也注亦於至而受釋曰亦者賔行私面大夫受幣於楹間南面故云亦得在楹間為敵法上介是下大夫與卿小異大同明得行敵法在楹間可知擯者至賔辭注賔亦為士介辭釋曰自此至拜辱論士介私面於鄰國卿之事云賔亦為士介辭者亦者亦士介私覿於主國君時故云亦也下大至及之注嘗使至忘舊釋曰自此盡于卿之禮論主國下大夫嘗使至己國者聘君使上介以幣問之事諸侯之國皆有三卿五大夫其三卿不問至己國不至已國皆以幣及之上巳論訖其五大夫者或作介或特行至彼國者乃以幣及之略於三卿故也言君子不忘舊者此大夫嘗與彼國君相接即是故舊也今以幣及之故云君子不忘舊也注上介至禮也釋曰云上介三介下大夫使之禮也者下經云小聘曰問其禮如為介三介是下大夫小聘之禮據此篇大聘使卿五介小聘使大夫三介若大國之卿七介小聘使大夫五介小國之卿三介小聘使大夫一介也曲禮云擬人必於其倫故問下大夫還使上介是各於其爵易以相尊敬者也大夫若不見注有故也釋曰自此盡不拜論主國卿大夫有故不得親受聘君之幣之事言有故者或有病疾或有哀慘不得受其問禮君使至不拜注各以至禮也釋曰云各以其爵主人卿也則使卿大夫也則使大夫者若然經云君使大夫大夫中有卿大夫揔名也云各以其爵亦是易以相尊敬故也云不拜代受之耳不當主人禮也者案周禮宗伯云大賔客則攝而載祼鄭注云宗伯代王為祼拜送則王亦此類拜是致敬之事不可代人之拜故直授之而巳不當主人之禮拜之夕夫至歸禮注夕問至小君釋曰自此盡賔拜禮於朝論主君夫人歸禮於賔與上介之事云夕問卿之夕也者案下記云聘曰致饔明日問大夫夕夫人歸禮是其問卿之夕也云使下大夫下君也者歸饔餼使卿此夫人使下大夫故云下君也云君使之云夫人者以致辭當稱寡小君者案隱二年傳九月紀裂繻來逆女何以不稱使婚禮不稱主人又云紀有母乎曰有有則何以不稱母母不通也何休注云禮婦人無外事明知此使下大夫歸禮者是君使之可知而稱夫人使者以其致辭於賔客時當稱寡小君故稱夫人使下大夫其實君使之也堂上至東陳注籩豆至六豆釋曰言籩豆六東陳者其饌自戶東為首二以並東陳先於北設脯即於脯南設醢又於醢東設脯以次屈而陳之皆如上也云籩豆六者下君禮也者君歸饔餼八豆此六豆故云下君也設於戶東又辟君饌位故也云其設脯其南醢屈六籩六豆者此約君禮設豆法云韭菹其南醯醢屈故知此醢在南屈陳之又知籩豆各六者下文上介四豆四籩降殺以兩明夫人多二六豆六籩可知壷設至兩壷注醙白至設之釋曰其設壷於東序自北向南而陳稻黍粱皆二壷並之而陳也故言醙黍清皆兩壷也云以黍間清白者互相備者醙白也上言白明黍粱皆有白下言清明稻黍亦有清故也於清白中言黍明醙即是稻清即是粱也故言互相備也三酒既有清白二色故言六壷必先言醙者以白酒尊重故先設之也大夫至致之注致夫至君也釋曰案周禮掌客云上公之禮夫人致禮八籩膳大牢致饗大牢侯伯以下亦皆有牢是朝君來時有牢此卿來聘無牢故云下朝君也注四壷無稻酒釋曰知者案上致於賔六壷稻黍粱皆有清白今上介四壷明從上去之無稻米之酒清白俱去之故四壷也注於是至為醴釋曰鄭解若於上文賔下言之則介從拜之事不明故於上介之下乃云明日賔拜禮於朝則介從牢明饗禮亨大牢可知但以食禮無酒饗禮有酒故以飲賔言之引公食饗與食互相先後者此經先言食後言饗則食在饗前公食言設洗如饗禮則饗在食前饗先後出於主君之意故先後不定也燕與至常數注羞謂至作淑釋曰案周禮掌客上公三燕侯伯再燕子男一燕皆有常數此臣無常數者亦是君臣各為一不得相決知羞謂禽羞鴈鶩之屬者案下記云禽羞俶獻故知是禽知成孰煎和者以其言羞鼎臐之類故知成熟煎和者也知禽是鴈鶩之屬者案下記云宰夫歸乘禽日如饔餼之數鄭注乘禽乘行之禽也亦云鴈鶩之屬以無正文故以意解之注饗食至之也釋曰不言從食者公食介雖從入不從食賔食畢介逆出是不得從食矣知從饗者下記云大夫來使無罪饗之過則餼之其介為介注云饗賔有介者賔尊行敵禮也故知介從饗案襄二十七年宋公兼享晉楚之大夫趙孟為客子木與之言弗能對使叔向侍言焉子木亦不能對也叔向為趙孟介而得從饗是其義也云復特饗之即此經是也若不至無儐注君不至作宥釋曰案上文云君使卿歸饔餼於賔館賔儐之今君有故不親食使卿生致其牢禮亦於賔館但無儐為異云謂有疾及他故也者他故之中兼及有哀慘云非必命數也者依典命公侯伯之卿三命大夫再命子男之卿再命大夫一命經云各以其爵故知不依命數云無儐以己本宜往者饔餼之等不宜召賔故君使人致禮賔則儐使者此饗食之禮主君無故合速賔之來就主君入廟賔無儐禮今主君有故生致於賔亦無儐故云本宜往此篇據伯侯之卿來聘是使卿致禮鄭兼云使大夫於大夫者小聘使大夫來使大夫致禮也若然經直言使大夫者大夫中兼有上大夫兼卿也致饗至如之注酬幣至諸侯釋曰云禮幣束帛乘馬亦不是過也者鄭以饗之酬幣無文故約上主君禮賔之時用束帛乘馬此饗賔酬幣亦不過是故云亦不是過引禮器者案彼經云有以少為貴者圭璋特琥璜爵鄭注云圭璋特朝聘以為瑞無幣帛也琥璜爵者天子酬諸侯諸侯相酬以此玉將幣也彼經不云天子諸侯相酬之幣故此注云蓋言酬諸侯者公侯伯用琥於子男用璜引之者證與此酬卿大夫不同之義大夫至侑幣注作使至同之釋曰此一經論主國卿大夫饗食聘賔及上介之事此直言饗食不言燕亦有燕是以鄭詩羔裘云知子之來之雜珮以贈之鄭注云與異國賔客燕時雖無此物猶言之以致其厚意其若有之固將行之士大夫以君命出使主君之臣必以燕禮樂之助君之歡是也又昭二年左傳云韓宣子來聘宴于季氏傳無譏文明鄰國大夫有相燕之法又此大夫相禮饗食有常數雖有燕之亦無常數亦無酬幣矣儀禮疏卷第二十二
