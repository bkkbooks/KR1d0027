  text: 儀禮疏卷第十九
  hash: sha256:443dd10c422b2cee073726fe036aad68d45b147aa6cdf72d692f07342db9f548
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_019-1a}
body:
  text: 唐朝散大夫行太學博士引文館學士臣賈公彥等撰聘禮第八鄭目録云大問曰聘諸侯相於久無事使卿相問之禮小聘使大夫周禮曰凡諸侯之邦交歲相問殷相聘也丗相朝也於五禮屬賔禮大戴第十四小戴第十五別録第八釋曰鄭云大問曰聘者則此篇發首所論是也云久無事者案下記云久無事則聘焉注云事謂盟會之屬若有事事上相見故鄭據久無事而言云小聘使大夫者下經云小聘曰問其禮如為介三介是也周禮曰者大行人文鄭彼注小聘曰問殷中也久無事又於殷朝者及而相聘也父死子立曰丗凡君即位大國朝焉小國聘焉此皆所以習禮考義正刑一德以尊天子也必擇有道之國而就修之然歲相問殷相聘聘義所云比年小聘三年大聘是也大行人云上公九介侯伯七介子男五介又云凡諸侯之卿其禮各下其君二等聘義上公七介侯伯五介子男三介是諸侯之卿介各下其君二等者也若小聘曰問使大夫又下其卿二等此聘禮是侯伯之卿大聘以其經云五介上介奉束錦士介四人皆奉玉錦又云入竟張旜孤卿建旜據侯伯之卿之聘者必見侯伯之卿聘者周公作經互見為義此見侯伯之卿大聘玉人云瑑圭璋八寸璧琮八寸以眺聘上公之臣公食大夫俎實云倫膚七據子男之臣是各舉一邊而言明五等俱有是其互見為義也聘禮至圖事注圖謀至東面釋曰自此盡官具論聘人及用幣之事云謀聘故及可使者謀聘者為久無事須聘故謂有事故或因聘或特行若記云若有故則卒聘束帛加書將命是因聘者也晉侯使韓穿來言汶陽之田之類是特行者也言及可使者謂於三卿之中選可使者即經云遂命使者是也其揔三事皆須謀者也言謀事者必因朝者欲取對衆共詢之意云其位君南面巳下知面位然者此儀禮之內見諸侯三朝燕朝燕禮是也又射朝大射是也不見路門外正朝正朝當與二朝面位同案燕禮大射皆云卿西面大夫北面士東面公降階南面揖之是以知正朝面位然也若天子三朝射人見射朝司士見正朝不見燕朝以諸侯正朝與燕朝同明天子燕朝亦與正朝同也遂命使者注遂猶至使卿釋曰云既謀其人因命之也者謂謀其人人亦在謀事之中故云因命即上注可使者是也云聘使卿者以其經云及竟張旜周禮司常云孤卿建旜故知使卿也若然使者自在謀內審知所聘之國逺近何以下記云使者既受行出遂見宰問幾月之資注云古者君臣謀密草創未知所之逺近問行用多少但所謀之時經云出聘不言其國使者不得審知故更問之是以左氏吳公子季札遂聘齊晉衛鄭之等下文云無行則重賄反幣是亦有歷聘之事也使者至首辭注辭以不敏釋曰云辭以不敏者鄭取孝經曾子曰參不敏之辭為義也君不許乃退注退反至必進釋曰知受命者必進者以其云退故知進乃有退法是受命前進近君也既圖至如之注既巳至於介釋曰既謀事乃命介在謀後别命之謀使者是難謀後命介是易也宰命至不辭注宰上至受也釋曰天子有六卿天地四時之官是諸侯兼官而有三卿立地官司徒兼冡宰立夏官司馬兼春官立冬官司空兼秋官是以左氏杜泄云吾子為司徒叔孫為司馬孟孫為司空故禮記內則云后王命冢宰降德于衆兆民鄭云周禮冢宰掌飲食司徒掌十二教今一云冢宰記者據諸侯也諸侯并六卿為三或兼職焉是其諸侯并六卿為三諸侯以司徒為冢宰義與此同宰上卿二君事諸侯謂司徒為宰者也云士屬司馬引周禮者案司士屬司馬而云作士適四方使為介諸侯之司馬亦然故引以證諸侯司馬戒衆介也云不辭者是其副使之賤者故不敢辭宰書幣注書聘至之用釋曰宰即上命司馬兼官者也云書聘所用幣多少也者謂聘鄰國享君及夫人問卿之等幣周禮司儀云凡諸侯之交各稱其邦而為之幣以其幣為之禮鄭云幣享幣也於大國則豐於小國則殺是也云宰又掌制國之用者案王制云冢宰制國用必於歲之杪是以使之書幣也命宰夫官具注宰夫至冝齎釋曰所命者冢宰司徒命之以宰夫屬司徒周禮宰夫掌百官府之徵令故命諸官云官具者謂使宰夫命諸官各具所行幣幣在官之府其司非一故言衆官幣謂享幣及問大夫問卿揔具之及所冝齎者謂行道所用多少皆是及期夕幣注及猶至聘也釋曰自此盡受書以行論陳幣付使者之事云夕幣先行之日夕知者下云厥明釋幣于禰是行日明此夕是先行之日夕也云視之者正謂賔及衆介視之故下云使者朝服帥衆介夕注云視其事是也管人至門外注管猶至作敷釋曰云館人謂掌次舍帷幕者也者案天官有掌舍掌次幕人等掌次云有邦事則張幕設案掌舍職云為帷宫設旌門又幕人云掌帷幕幄帟綬之事鄭云在旁曰帷在上曰幕幕或在地展陳于上即此布幕是也館人即彼掌舍以諸侯兼官故鄭揔言之也云幕以承幣者即下文官陳幣是也云寢門外朝也者謂路門外即正朝之處也下記云宗人授次次以帷則館人與宗人共掌之若賔客則宗人掌之也官陳至其前注奉所至無則釋曰云官陳幣者即上文官具者也館人布幕於地官陳幣於其上云奉所奉以致命謂束帛及玄纁也者所奉謂後享時奉入以致命故知是以下文享時所致束帛加璧以享君玄纁加琮以享夫人鄭不言璧琮者璧琮不陳厥明乃授之也云馬言則者此享主用皮或時用馬者主用皮謂有皮之國國無皮者乃用馬故下云庭實皮則攝之鄭注皮言則者或用馬也記云皮馬相間可也注間猶代也土物有冝也云馬入則在幕南者以經云馬則北面奠幣于其前也是馬在幕南故下展幣時云馬則幕南北面奠幣于其前也知皮馬皆乘者案下賔覿時云總乘馬又云禮玉束帛乘皮是皆乘也使者至東上注既受至幕南釋曰云既受行同位者對未受命行巳前卿大夫士面位各異是以記云使者既受行日朝同位鄭注云謂前夕幣之間同位者使者北面介立于其左少退別其處臣也是也知在幕南者幣在幕上使者須視幣故在幕南也卿大至北上注大夫至使者釋曰此謂處者大夫常北面今與卿同西面故云辟使者注入告至而告釋曰朝在路門外故知入路門至路寢而告君以其在路寢聽政處故也史讀書展幣注展猶至之也釋曰知史幕東西面者以其君南面使者北面故知幕東西面讀之可知是以鄭云欲君與使者俱見之也知賈人撫幣者以其賈人主幣行者故知賈人撫幣受之其幣謂官具之者非直所奉而巳若然賈人當在幕西東面撫之亦欲使君與賔俱見之也注史展至北面釋曰云史展幣畢以書還授宰者以其宰在幕東西面史居前西面讀書展幣展幣訖明回還授宰宰以書授使者云其受授皆北面者當宰以書授使者之時宰來至使者之東北面授使者使者北面授介三者皆北面向君故也公揖入釋曰以展幣授使者訖禮畢故入於寢也官載至于朝注待旦行也釋曰此云官謂官人從賔行者與前官陳幣者異必知行者以下文入竟又展之又有司展羣幣以告注云有司載幣者自展自告是也云待旦行者下文厥明釋幣遂行是也上介視載者注監其至乃出釋曰經直云上介視載者注云監其安處之畢乃出不言餘人出則上文舍於朝不出待旦則行以其須守幣故也所受書以行注為當復展釋曰書謂前宰授使者此書將行為當復展故也厥明至于彌注告為至如祭釋曰自此盡亦如之論賔與上介將行告禰之事云朝服者卿大夫朝服祭故還服朝服告也云天子諸侯將出告羣廟者案禮記曾子問云孔子曰諸侯適天子必告于祖奠于禰注云皆奠幣以告之是諸侯出告羣廟案彼下文又云孔子曰天子諸侯將出必以幣帛皮圭告于祖禰遂奉以出是天子與諸侯同告羣廟之事云大夫告彌而巳者大夫三廟降天子不得並告故直告彌而巳若父在則告祖知者下記云賜饔唯羮飪筮一尸若昭若穆注云筮尸若昭若穆容父在父在則祭祖父卒則祭禰以此言之明初行時父在釋幣於祖廟可知案昭元年楚公子圍聘於鄭云布几筵於莊共之廟而來服氏云莊謂楚莊王圍之祖共王圍之父是大夫並告羣廟者彼不告聘直告娶故得並告古者大夫得因聘而娶故傳云且娶於公孫假氏是也云凡釋幣設洗盥如祭者案曾子問云凡告用牲幣注云牲當為制則告無牲直用幣而巳但執幣須潔當有洗而盥手其設洗如祭祀之時亦洗當東榮南北以堂深水在洗東篚在洗西必知無祭事者下文還時云乃至于禰筵几于室薦脯醢觴酒陳鄭云行釋幣反釋奠略出謹入是其差也有司至再拜注更云至行也釋曰云更云主人者廟中之稱也者上云賔至此更云主人是廟中之稱故特牲少牢皆稱主人對聘稱賔也釋幣至下出注祝釋至八尺釋曰知祝釋幣者案曾子問君薨而丗子生大祝裨冕執束帛升自西階命無哭告曰某之子生敢告奠幣於殯東則知此亦大祝釋之可知也云凡物十曰束者案昏禮玄纁束則每卷二丈自餘行禮云束者每卷一丈八尺為制幣帛錦十卷者皆名束至於脯十脡亦曰束故云凡物十曰束也云玄纁之率玄居三纁居二者言率皆如是也玄三纁二者象天三覆地二也云朝貢禮云純四只制丈八尺者純謂幅之廣狹制謂舒之長短周禮趙商問只長八寸四八三十二幅廣三尺二寸大廣非其度鄭志答云古積畫誤為四當為三三咫則二尺四寸矣雜記云納幣一束束五兩兩五尋然則每卷二丈若作制幣者每卷丈八尺為制合卷為匹也注少頃至於神釋曰案士虞禮無尸者出戶而聽若食間此無祭事故云有俟於神也又釋幣於行注告將至禮乎釋曰云行者之先其古人之名未聞者此謂平地道路之神云古人名未聞者謂古人教人行道路者其人名字未聞云天子諸侯有常祀在冬者月令祀行是也言此者欲見大夫雖三祀有行無常祀因行使始出有告禮而巳至於出城又有軷祭祭山川之神喻無險難也大夫三祀曰門曰行曰厲者見祭法文云喪禮有毀宗躐行出于大門者檀弓文案彼云掘中霤而浴毀竈以綴足及葬毁宗躐行出于大門殷道也下文周柩入毁宗雖不云躐行亦有行可知所毁者毁廟門西而云躐行明行神在廟門西矣不云埋幣可知者承上宗廟埋之此亦埋可知云今時民春秋祭祀有行神古之餘禮乎者鄭以行神無正文雖約檀弓猶引漢法為況乎者猶疑之矣若然城外祭山川之神有軷壇此禮行神亦當有軷壤是月令冬祭行注云行在廟門外之西為軷壇厚二寸廣五尺輪四尺是也遂受命注賔須至復入釋曰下云上介及衆介俟于使者之門外是其賔須介來乃受命也云自是出不復入者自釋幣於門不復更入若然則待介於門矣上介至門外注俟待至北上釋曰自此盡斂旜為使者與介向君朝受命即行之事知待於門外東面北上者上云賔釋幣訖不復入明介待賔於大門外賔出則向君也言東面北上者依賔客門外之位使者至于朝注旜旌至為膳釋曰云載之者所以表識其事者人見張旜則知是孤卿為使之事是表識其事也云周禮曰者司常文云至於朝門者凡平諸侯三門臯應路路門外有常朝位下文君臣皆朝列位乃使卿進使者使者乃入至朝即此朝門者臯門外矣知北面東上者還依展幣之位也君朝服至使者注進之至使己釋曰此還依展幣之位知大夫與卿同西面避賔下文使者還亦同展幣北面東上位賈人至授宰注賈人至作璪釋曰云賈人在官知物賈者謂若王制云庶人之在官府史胥徒之類以知物賈故名賈云其或拜則奠于其上者故覲禮記云奠圭于繅上是也但繅有二種一者以木為中幹以韋衣之天子五采公侯伯三采子男二采采為再行下記及典瑞皆有其文此為繅也下記云絢組尺及曲禮下文執玉其有藉者則裼鄭亦為之繅若韋版為之者奠玉於上此則無垂繅屈繅之事若絢組為之者所以繫玉於韋版使不失墜此乃有屈垂之法則此經所云者是也案向來所注皆以韋版繅藉解之者鄭意以承玉及繫玉二者所據雖異所用相將又同名為繅是以和合解之故以韋版為之者以解絢組之繅也宰執至使者注屈繅至之義釋曰云自公左贊幣之義者禮記少儀云詔辭自右贊幣自左取地道尊右之法是贊幣之義故於公左也使者至受命注同面至其左釋曰知宰就使者北面者以經言同面不見使者進文使者既先北面故知就使者北面並面授之既授與使者即言受命明知則出命矣云凡授受者授由其右受由其左者據此宰由其右授使者使者受由其左又據鄉飲酒鄉射燕禮獻酢酬皆授由其右受由其左故云凡以廣之若有所因由則有授由左受由右是以使者反命之時宰自公左受玉鄭云亦於使者之東同面並受不右使者由便也又賔授覿時士受馬適右受鄭云適牽者之右而受由便又鄉飲酒云受酬者自介右鄭云尊介使不失故位如此者皆是變例鄭據平常行事而言也既述至上介注述命至失誤釋曰上文授玉訖君出命命辭雖不知何語要知使者既受命使者又重述君命為述命述命者重失誤上介至不從注賈人至北面釋曰云衆介不從者以上介送圭向外與賈人反來故衆介不從以待之云賈人將行者知者經言授賈人使受之則是行人主掌此玉故知將行者對上云賈人出玉者是留者也知在門外北面者以其使者在門外時皆北面此賈人不入明依本北面可知受享至如初注享獻至眺聘釋曰此經中三事上經巳受聘君圭此經受享君束帛加璧又受聘夫人璋又受享夫人琮案上文夕幣時云官陳幣皮北首西上加其奉於左皮上鄭注云奉所奉以致命謂束帛及玄纁也則知所陳直陳束帛及玄纁不陳璧琮是以此經受璧而連言束帛玄纁者以其享時束帛加璧於其上玄纁加琮於其上以相配之物故兼言束帛玄纁若然璧琮右受者以其璧琮與圭璋同類尊之故也云帛今之璧色繒者周禮大宗伯云孤執皮帛鄭注亦然又案宗伯云以蒼璧禮天下云牲幣各放其器之色幣即幣帛禮天之璧用蒼色則幣帛之色亦蒼色是璧色繒於漢時云璧色繒者亦因周法則此束帛亦與璧色同以其相配但未知正用何色耳云聘用璋取其半圭知半曰璋者案周禮典瑞云四圭有邸以祀天兩圭有邸以祀地圭璧以祀日月璋邸射以祀山川以上向下差之以兩圭半四圭圭璧半兩圭璋邸射又半圭璧是半圭曰璋也云圭璋特逹瑞也者聘義云圭璋特逹德也鄭云特達謂以朝聘也言瑞者大宗伯云以玉作六瑞公執桓圭以下皆是瑞故尚書云班瑞於羣后言特逹者不加束帛也云璧琮有加往德也者謂加於束帛之上言往德者郊特牲云束帛加璧往德也謂以束帛加璧致厚往為主君有德故以玉致之君子於玉比德故言往德也往德義出於彼鄭言此者欲見朝置享用玉之意也周禮曰玉人文云瑑圭璋璧琮以眺聘者欲見此篇聘賔不用君之所執圭璋以其公則執桓圭侯執信圭伯執躬圭子執榖璧男執蒲璧臣出聘圭璋璧琮則瑑之而巳無此桓信躬榖蒲之文又所執皆降其君一等故引之為證也遂行舍於郊注於此至於家釋曰言遂行者受命則行不留停故云遂行言於此脫舍衣服乃即道者上文云賔朝服告禰及遂朝君受命至此衣服未改鄭注云吉時道路深衣則此脫舍朝服服深衣而行故云於此所脫舍衣服乃即道也引曲禮者見受君命及君言言別有告請之事遂行舍於郊則彼云不宿于家也斂旜注此行至藏也釋曰云此行道耳未有事也者案下文云及竟張􅎶是有事也故此自郊巳後未有事斂藏也若過至奠幣注至竟至當由釋曰自此盡執策於其後論過他國竟假道之事云諸侯以國為家不敢直徑者案左氏傳僖三十三年秦師襲鄭不假道於晉為晉所敗是其不假道直徑過天子之師行過無假道以其天子以天下為家所在如主人故也天子微弱則有之是以周語定王使單襄公聘於宋遂假道于陳以聘楚服氏注云是時天子微弱故與諸侯相聘同是也下大夫至受幣注言遂至命也釋曰云言遂者明受其幣非為許故也者幣本為行禮非為求許若許受幣當云出許受幣不須言遂今不以許道受幣云遂是以容其辭讓不受此幣不得命遂受之故云遂也餼之至有餼注凡賜至秣馬釋曰此謂主國所致禮云凡賜人以牲生曰餼者言凡者揔解諸文案此下經云主國使卿歸饔餼五牢云飪一牢腥二牢餼二牢陳于門西鄭注云餼生也牛羊右牽之豕東之是牲生曰餼上介及士亦皆牲生為餼論語云告朔之餼羊鄭注亦云牲生曰餼春秋傳云餼臧石牛服氏亦云牲生是凡牲生曰餼春秋僖三十三年鄭皇武子云餼牽竭矣服氏以為腥曰餼以其對牽故以餼為腥詩序云雖有牲牢饔餼鄭云腥曰餼以其對生是活故以餼為腥又不為牲生者鄭望文為義故注不同也餼猶稟也給也者於賔為稟稟受也於主人為給給賔客也云以其禮者尊卑有常差常差者上賔上介牲用大牢經不言上介知與賔同大牢者若上介與羣介同當為介皆少牢是以下文大夫餼賔云上賔上介皆大牢米八筐衆介皆少牢米六筐是上介與賔同之義也云米皆百筥以下盡二十車皆約下文君使卿致饔餼禮若然上介與賔同大牢依大夫餼賔禮米不依大夫餼賔與上介米八筐而依君致饔餼者以此經有芻禾大夫餼賔禮無芻禾故還依主國歸饔餼之禮也案下歸饔餼上賔上介米陳于門內衆介米百筥設於門外鄭不言者略而不辨之也云上賔上介致之以束帛羣介則牽羊者案大夫餼賔禮使老牽牛以致之上介亦如之不依此依歸饔餼者以其彼此皆是國君禮唯牽以行道之間不依歸饔餼之法致之用束帛冝與歸饔餼同也云羣介則牽羊焉者致禮於士無用束帛之法但歸餼則用大牢禮盛宰夫朝服牽牛以致之此衆介皆少牢當與大夫餼賔少牢亦牽羊以致之同也無正文故言則也上賔有禾十車芻二十車亦與下歸饔餼同也若然大牢則上介與上賔同芻禾不同者以經上賔云唯芻禾言唯著異明上介無也但下文設飱時大夫之禮禾視死牢而巳此餼賔用生牢不用死牢得有禾者此過國致禮異於常禮故生致而有芻禾也以芻薪倍禾故禾十車芻二十車也誓于至其後注此使至示罰釋曰此誓當在使次介假道之時止而誓言今在士帥沒其竟之後言之者此文因上設彼國禮法訖乃更却本而言之不謂此士帥沒竟後是以鄭云此使次介假道止而誓也言賔南面專威信者此聘禮雖非軍事亦是梱外之事使專威信故南面若君然也知史於衆介之前北面讀書者以經言衆介北面則言史讀書明亦北面與衆介同北面又賔南面復對之故也云君行師從巳下定四年召陵之會祝他辭引之者此聘使有旅從恐暴掠也未入竟一肄注謂於至失誤釋曰自此盡私事論雖未至主國預習聘享威儀之事此與下文為目所習之禮事在下云謂於所聘之國者鄭解未入境境謂所聘之國境未入也為壝至無宫注壝土至垣也釋曰案覲禮與司儀同為壇三成宫方三百步此則無外宫其壇壝土為之無城又無尺數象之而巳云帷其北冝有所向依者雖不立主人賔介習禮冝有所向故帷其北也云無宫不壝土畫外垣也者不壝土為宫是畫外垣垣牆壝土為外牆土今則不畫宫也朝服至執也注不立至而巳釋曰云不立主人主人尊也者主人則主國君受聘享者不立臣作君故云主人尊也介皆至西上注入門至作豫釋曰此所習之禮不習大門外內及廟門內之禮者以其於外威儀少而易行故略之但習入廟聘享揖讓升降布幣授玉之禮是以直云北面西上之位也云入門左之位者案下文云賔入門左介皆入門右北面西上是也習享士執庭實注士士至之節釋曰享時庭實旅百獻國所有非止於皮知所執是皮者以其金龜竹箭之等皆列之於地不執之所執者唯有皮而巳是以下聘時賔升致命授玉之時執皮者張之以見文是以特言執也是以云皮有攝張之節習夫至私事注公事致命者也釋曰云習夫人之聘享亦如之者以其行聘君訖則行聘夫人行享君訖即行享夫人還君受之一如受君禮故云亦如之也云習公事者謂君聘亨夫人聘享及問大夫皆致君命故鄭云公事致命者是以下文行君聘享及夫人聘享訖擯出請賔告事畢鄭注云公事畢又問卿時云卿大夫升堂北面聽命賔東面致命鄭注云致其君之命皆公事致命者也私事者謂私覿於君私面於卿大夫故下文賔覿入門右注云私事自闑右是又問卿訖賔西面如覿幣入門右大夫辭賔遂左注云見私事賔雖敵謙入門右為若降等然是也若然大夫之幣不在朝付之至郊乃付之避君禮不謂非公事及竟張旜誓注及至至維之釋曰自此盡入境斂旜論賔至主國之境謁關人見威儀之事云張旜明事在此國者以其行道斂旜及境張旜明所聘之事在此國故張旜以表其事也是以鄭云明事在此國也云張旜使人維之者案禮緯稽命徵云大夫杠五刃齊於較較崇八尺人又長八尺人維得手及之者蓋以物接之乃得維持之案節服氏掌祭祀朝覲六人維王之大常諸侯則四人但大常十二旒人有六則一人維持二旒鄭云維之以縷用線維之大夫無文諸侯四人不依命數大夫或一人或二人維持之乃謁關人注謁告至異言釋曰古者境上為關者王城十二門則亦通十二辰辰有一門一關諸侯未知幾關魯廢六關半天子則餘諸侯亦或然也云關譏異言案王制云關幾而不征注亦云幾幾異服異言二注皆無正文案周禮司門云幾出入不物者注云不物衣服視占不與衆同鄭以出入不物幾之則不物中含有此異服異言云衣服視占不與衆同則是異也但周禮司關上士二人中士四人又云每關下士二人但司關為都揔主十二關居在國都每關下士二人者各主一關今所謂關人者謂告每關關人來告司關司關為之告王故司關職云凡四方之賔客叩關則為之告是也關人至幾人注欲知至之具釋曰不問使人而問從者關人卑者不敢輕問尊者故問從者云欲知聘問者問得從者即知使者是大聘亦知使者是小聘知者以君行師從一州之民卿行旅從一黨之人若大夫小聘當一族之人百人也且謂有司當共委積之具者賔客入竟當於廬宿市設少曰委多曰積是為行道之具也以介對注以所至二等釋曰云以所與受命者對謙也者上問從者幾人當為卿行旅從對今不云而以介與受命者對是謙也聘禮上公之使七介至三介皆禮記聘義文而云聘禮者聘義亦得言聘禮也云以其代君交於列國是以貴之貴之者隨國大小節級與之介以副使者是貴之也引周禮者欲見貴之才下其君二等而巳也鄭注周禮二等謂介與朝位賔主之間也君使至入竟注請猶至道之釋曰君得關人告即知為聘來使士迎之故聘義云君使士迎于竟是也而云使士請事君子不必人故知而猶問也云遂以入竟者若然向來賔之問猶停關外君使士請訖乃導以入竟入竟斂旜乃展注復校至始入釋曰自此盡賈人之館論三度展幣之事云重其事者亦恐有脫漏失錯故云重其事不可輕也斂􅎶變於始入者上及竟張旜注云事在此國也此則入竟後乃斂斂之者謂若初出至郊斂旜鄭云行道耳未有事也此亦及竟示有事於此國張之始入張之去國逺更是行道未有事故鄭云變於始入始入時示有事於此國今是行道去之故云變於始入也布幕至拭圭注拭清至開櫝釋曰賔西面者雖不對君由是臣道異於前誓時示威信也知賈人側幕者以其幕所陳皆賈人所主此圭雖不陳亦冝側近於幕以開圭也知賈人坐者下文聘時於廟門外賈人開圭坐授上介故知此亦坐遂執展之注持之而立告在釋曰此經告訖下文乃云上介北面視之則此所告者告賔云在上介乃視之上介至復位注言退至違位釋曰鄭言此者見經直有退文不見其進故云則視圭進也違位之言出於曲禮曲禮云揖人必違其位鄭云禮以變為敬今此進違位亦是敬也退圭注圭璋尊不陳之釋曰尊不陳對下文拭璧加于左皮上陳之為卑故也上不言璋直言圭下乃言夫人之聘享則璋未拭而并言璋者欲見皆不陳故陳皮至之退注會合至北首釋曰璧言合諸幣者享時當合故今亦合而陳之故小行人云合六幣六幣亦是所享之物故也展夫至于賔注展夫至之類釋曰知面位如此者其賈人北面在幕南上介亦北面明賈人既拭夫人聘璋享琮訖乃回身南面告上介上介於是還東面告賔可知也云所謂放而文之類者所謂禮器文案禮器云有放而文也注云謂若天子服日月以至黼黻是天子衣放象日月以下而為文今夫人聘享展訖但上介不視至於賈人南面告上介上介東面告賔放象君禮而為文變是其類也有司至以告注羣幣至自告釋曰云羣幣私覿及大夫者上展君及夫人幣訖此言有司展群幣故知是私覿及大夫者私覿者行君夫人聘亨訖賔以私禮己物見主君云大夫者亦謂賔以己物面主國之卿必知私覿之幣是賔介自將已物者以經記上下唯有君及夫人聘享及問大夫聘之幣付使者之文不見有付賔介私覿之幣又案下文賔將還云遂行舍于郊公使卿贈如覿幣使下大夫贈上介亦如之使士贈衆介如其覿幣還至本國陳幣于朝云上賔之公幣私幣皆陳上介公幣陳他介皆否注云此幣使者及介所得於彼國君卿大夫之贈賜也其禮於君者不陳公幣君之賜也私幣卿大夫之幣也至於賔反命訖君使宰賜使者及介幣以此言之彼國所報私覿之幣還與賔介明知私覿是賔介私齎行可知也夏官校人云凡國之使者皆供其幣馬鄭注使者所用私覿若然彼使者謂天子使卿大夫存眺省問諸侯之事使者得之行私覿私覿之馬校人供之與諸侯禮異也及郊至如初注郊逺至半之釋曰云周制天子畿內千里者周禮大司徒云制其畿方千里據周禮而言其自殷巳上亦畿方千里商頌云邦畿千里唯民所止夏亦千里王制云天子縣內方千里鄭據夏時禹貢方千里曰甸服據唐虞畿內是也云逺郊百里者司馬法文畿方千里王城面五百里以百里為逺郊若公百里中置國城面二百五十里故逺郊五十里自此巳下至子男差之可知云近郊各半之者亦約周天子逺郊百里近郊五十里亦無正文尚書君陳序云命君陳分正東郊成周鄭注周之近郊五十里今河南洛陽相去則然鄭以目驗知之若然天子近郊半逺郊則諸侯近郊各半逺郊可知也及館至如初注館舍至疾也釋曰案周禮遺人職云十里有廬三十里有宿五十里有市市有候館畿內道路皆有候館鄭云逺郊之內有候館者據此候館在逺郊之內指而言之不謂於此獨有也以行道之間停息故云小休止沐浴又得展幣也云展幣不于賔館者為主國之人有勞問己者就焉便疾也者若并在賔館則事煩不疾若展幣於賈人之館其賔館受勞問是以就賈人之館展幣便疾也案大行人諸侯朝天子上公三勞侯伯再勞子男一勞孤不問一勞諸侯自相朝無過如朝天子遣臣相聘無過一勞此下文使卿近郊勞此乃逺郊之內得有此勞問己者謂同姓舅甥之國而加恩厚者別有逺郊之內問勞也賔至至帛勞注請行至朝服釋曰自此盡遂以賔入論主君使大夫及卿行請勞之事入近郊張􅎶者示將有事以自表也知皆朝服者以卿勞禮重尚朝服明以外士大夫輕者朝服可知也故舉後以明前也上介至再拜注出請至彌録釋曰云入北面告賔也者此時賔當在賔館阼階西面故上介北面告賔也云每所及至皆有舍其有來者皆出請入告于此言之者賔彌尊事彌録者道皆有廬宿市來之舍前出請士大夫請行亦當出請入告於此始言之者先士次大夫後卿以是先卑後尊今復見此言故云賔彌尊事彌録也勞者不答拜注凡為至其禮釋曰言凡者非直此卿為君勞賔不敢當其禮不答拜聘賔亦初入大門主君拜賔辟不答拜也如此之類皆然故云凡以該之至後儐勞者與之答拜為己故也賔揖至門內注不受至於堂釋曰知公之臣受勞於堂者案司儀云諸公之臣相為國客及大夫郊勞三辭拜辱三讓登聽命是公之臣受勞於堂之事勞者至致命注東面鄉賔釋曰賔在館如主人當入門西面故勞者東面向之也賔北至者出注北面至降拜釋曰云北面聽命若君南面然云少退象降拜者下文歸饔餼大夫東面致命賔降階西面再拜稽首是此象之也若然此行尊卑禮訝受法歸饔餼時上北面受幣此在庭亦當北面訝受幣勞者南面可知也授老幣注老賔之臣釋曰大夫家臣稱老若趙魏臧氏老之類也出迎勞者注欲儐之釋曰司儀注云上於下曰禮敵者曰儐此言儐者欲見賔以禮禮使者故云欲儐之勞者至皮設注設於至皮也釋曰庭實當三分庭一在南設之今以儐勞者在庭故設於門內也云皮麋鹿皮者鄭於下注云君於臣臣於君麋鹿皮可者以無正文知用麋鹿皮者案郊特牲云虎豹之皮示服猛也彼諸侯朝享天子法用虎豹此臣聘君降於享天子法用麋鹿皮故齊語云齊桓公使諸侯輕其幣用麋鹿皮四張亦一隅也賔用至勞者注言儐至為賔釋曰云言儐者賔在公館如家之義亦以來者為賔者凡言儐者謂報於賔今以賔館故賔若主人故云儐勞者即以勞者為賔故也勞者至首受注稽首尊國賔釋曰周禮大祝辨九拜一曰稽首首至地臣拜君法二曰頓首頭叩地平敵相於法三曰空首首至手君答臣下拜法郊特牲云大夫之臣不稽首非尊家臣以辟君也今此勞者與賔同類不頓首而稽首故云尊國賔也下賔亦稽首送者以是為君使故亦稽首以報之也注受送至階上釋曰知受送拜皆北面象階上者此經面位無文案歸饔餼賔儐大夫時賔楹間北面授幣大夫西面受此賔亦冝與彼同北面授還北面拜送若然云受送拜皆北面者誤當云授送拜皆北面並據賔而言也勞者至再拜注揖皮至而出釋曰知東面揖執皮者以其執皮者在門內當門勞者在執皮之西故知東面揖皮可知揖之若親受之又執皮者是賔之使者執皮者得揖從出勞者從人當訝受之是以公食大夫禮云賔三飯公侑食以束帛庭實設乘皮賔受幣賔出揖庭實出鄭云揖執皮者若親受云上介受賔幣從者訝受皮則此從者亦訝受可知也儀禮疏卷第十九
