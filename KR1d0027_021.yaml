body:
  text: 唐朝散大夫行太學博士引文館學士臣賈公彥等撰擯者出請注不必至有無釋曰自此盡以束帛如享禮論享禮之事庭實至設也注皮虎至可也釋曰知皮是虎豹皮者經云毛在內不欲文之豫見是有文之皮郊特牲云虎豹之皮示服猛也束帛加璧往德也文無所屬則天子諸侯皆得用之此聘使為君行之故知皮是虎豹之皮也齊語云桓公知諸侯歸己令諸侯輕其幣用麋鹿皮非其正也云攝之者右手并執前足左手并執後足者下云皮右首故云右手執前兩足必以一手執兩足者取兩足相向得掩毛在內俱放又得毛向外故鄭云內攝之者兩手相鄉也知入設參分庭一在南者見昏禮記納徵執皮攝之內文兼執足左首隨入西上參分庭一在南故知此亦然但此右首彼左首者昏禮象生故與此異也云則者或以馬也者以其皮馬相閒有皮則用皮無皮則用馬故云則見其不定故也云凡君於臣臣於君麋鹿皮可也者云凡君於臣謂使者歸若使卿贈如覿幣及食饗以侑幣酬幣庭實皆有皮故云凡也臣於君謂私覿庭實設四皮及介用儷皮此皆有麋鹿皮故亦云凡也若然大宗伯云孤執皮帛鄭云天子之孤用虎皮諸侯之孤用豹皮得用虎豹者彼所執以為贄與庭實不同故得用虎豹也賔入至張皮注張者至文也釋曰案昏禮記賔致命釋外足見文主人受幣士受皮注云賔致命主人受幣庭實所用為節此亦然下受皮以授幣為節也公再至右客注自由至而出釋曰云執皮者既授亦自前西而出者此約下私覿時牽馬者自前西向出相類故云亦也賔出至攝之注象受于賔釋曰云坐攝之者向張皮見文今攝之者還如入時執前後足內文也公側至而東注如入至生也釋曰云公側授宰幣者上云公側襲側猶獨也此巳上側亦獨無人贊之也云如入左在前者皮四張三人入門時先者北面在左西頭為上餘取皮向東者亦左在前向東為次第也云皮右首者變于生也者曲禮云執禽者左首士相見摯用雉左頭奉之下大夫執鴈上大夫執羔如執雉皆左首雉雖死以不可生服執之如羔鴈亦從左首象陽今此皮則右首變於生昏禮左首昏禮取象生與此異也若有至享禮注有言至實也釋曰云有言有所告請若有所問也者言有所告即告糴之類是也請即乞師之類是也問即言汶陽之田之類是也鄭據傳而言有此三事皆是有言有言即記云有故一也云有言即有書致之故記云有故則束帛加書以將命也云春秋臧孫辰告糴者事在莊公二十八年也云公子遂如楚乞師者事在僖二十六年也云晉侯使韓穿來言汶陽之田事在成公八年也此三者皆見春秋經引之者證此有言以束帛加書之事也云無庭實也者以經直云束帛如享禮則除束帛之外更無所有故知無庭實也國語云臧孫辰以鬯圭者是告糴之物服注云無庭實也又哀七年左傳云邾茅夷鴻以乘韋束帛自請救于吳求救非法故有乘韋為庭實也賔奉至請覿注覿見至特來釋曰自此盡從者訝受馬論賔將私覿主人不許而行禮賔之事云鄉將公事者聘享是也云是欲交其歡敬也者聘是公禮非是交歡此行私禮為交歡敬也案郊特牲云為人臣者無外交鄭注私覿是外交也者彼謂臣為君介而行私覿是外交若特行聘則得私覿非外交也故彼上經云大夫執圭而使所以申信也注云其君親來其臣不敢私見於主國君也以君命聘則有私見是也云不用羔因使而見非特來者謂因為君聘使而行私見故用束錦非特來若特來則卿用羔也若然案士相見卿初仕見己君及卿皆見以羔見他君得有羔者案尚書有三帛二生二生卿執羔大夫執鴈彼見天子法從朝君而見得有羔若諸侯相朝其臣從君亦得執羔見主君可知其為君聘則不得執羔見主君也故鄭云因使而見非特來案定公八年經書公㑹晉師于瓦左傳云范獻子執羔趙簡子中行文子皆執鴈亦是從君見主君法也擯者入告出辭注客有至待之釋曰云大禮者即上行聘享是也云未有以待之者謂主人未有以待之以禮待之即下禮賔是也故止客私覿即下文行禮賔也宰夫徹几改筵注宰夫至几與釋曰云宰夫又主酒食者也者對上宰夫設飱今又主酒食以禮賔也云賔席東上者對前為神而西上也云公食大夫禮曰蒲筵及萑席此筵上下大夫也者以公食蒲筵萑席二者是為上下大夫法又引周禮者鄭欲推出上下大夫用漆几也案司几筵云諸侯酢席莞筵紛純如繅席畫純筵國賔于牖前亦如之左彤几注云國賔諸侯來朝孤卿大夫來聘後言几者使不蒙如也朝者雕几聘者彤几但司几筵是天子之官几筵又是諸侯之法又鄭云國賔諸侯來朝孤卿大夫來聘是諸侯與朝聘天子法則孤卿大夫是諸侯之臣也以此言之則天子孤卿大夫几筵與諸侯之臣同可知若然公食大夫筵上下大夫禮同用蒲筵莞席與此席不同鄭注此國賔中卿大夫得與孤同者鄭欲廣國賔之義其實此國賔中唯有諸侯與孤無卿大夫也鄭必知卿大夫漆几者司几筵有五几從上向下序之天子玉几諸侯雕几孤彤几卿大夫漆几下有素几喪事所用差次然也無正文故云與以疑之公出至如初注公出至端也釋曰云公出迎者己之禮更端也者前聘享俱是公禮故不出迎此禮賔私禮改更其端序故公出迎也宰夫至以進注內拂至授君釋曰知几自東箱來者案覲禮記云几俟于東箱又此經直云進不言升明不從下來從東箱來可知也公東至西鄉釋曰云中攝之者擬賔用兩手在公手外取之故也賔進至面俟注未設至為梧釋曰未設而俟者待公拜送訖乃設之故也公一拜送注公尊至作一釋曰賔再拜稽首公乃一拜當空首故注云公尊也注不降至左几釋曰云不降以主人禮未成者案鄉飲酒義云啐酒成禮也於席末據此而言則啐酒為成禮此設几主為啐酒今未啐醴故云禮未成也凡云賔左几者對神右几也宰夫至面枋注酌以至授也釋曰宰夫亦洗升實觶者經無宰夫升降之文以理亦之者亦上授几時從下而升東箱取几進以授君今亦從下升東箱酌醴進以授君故亦之不言宰夫升降者賤略之也云以醴自東箱來者下記云醴尊于東箱瓦泰一有豐是也云不面擸不訝授也者公西面向賔宰夫自東箱來在公傍側並授與公是以下云公側受醴不訝受故不面擸也注賔一至為貴釋曰禮器云禮有以少為貴者今賔於上下皆再拜稽首獨此一拜故鄭據大古之醴質無玄酒配之故一拜以少為貴也宰夫至東孰注事未至宰夫釋曰云事未畢擯者不退中庭以有宰夫也者案上文擯者退中庭又云擯者進事未畢在中庭可知此下文亦云擯者進相幣事亦未畢而在東孰故決之若然以有宰夫主飲食之事宰夫所主己雖事未畢猶得負東孰以其閒有事宰夫相己無事故也若無宰夫在中庭矣注庭實乘馬釋曰鄭知乘馬者下文賔覿至稽首注不請至覿也釋曰自此盡公降立論行私覿之事云不請不辭鄉時巳請也者云不請賔不請不辭主君不辭所以不辭者鄉時巳請覿主人辭之以禮賔故今不復請亦不辭之也云覿用束錦辟享幣也者以上文享主君用束帛享夫人用玄纁束帛以今用束錦是辟享幣也云總者至扣馬也者賔總八轡在前牽之二人贊者各居兩馬閒各用左右手手扣一匹故云在馬閒扣馬也云入門而右私事自闑右者玉藻云公事自闑西鄭注云聘享也又云私事自闑東注云覿面也此行覿禮故引之也云奠幣再拜以臣禮見也者謂由闑東介又不從又自牽馬又不升堂入幣皆是以臣禮見也云贊者賈人之屬者既行臣禮不使介從明贊者是賈人之屬從行者云介特覿也者主君辭賔賔入門左則介五人隨入門西北面西上其介五人行覿禮各自特行無介從為特覿也注將還至北面釋曰云贊者有司受馬乃出者賔出之特贊扣馬者未得出待人受馬乃得出所以然者幣可奠之於地其馬不可散放故待人受之乃可以出故云有司受馬乃出也云凡取幣于庭北面者言凡非一此時辭賔更出取幣後門右禮訖又取幣皆北面又衆介奠幣擯者取亦北面故云凡以廣之也牽馬右之入設注庭實至牽之釋曰云庭實先設客禮也者對前入門右時賔奉束帛總乘馬一時入無先後之別是臣禮今此入設下經乃云賔奉幣是先設庭實客禮也云於是牽馬者四人事得申也者知四人者若如前贊者二人則不得云右之既言右之明人牽一匹不須賔牽之事得申人牽一匹賔不總牽是也引曲禮者欲見牽馬在右禮之常彼效馬效羊謂尊者之物使養之今來呈見此取一邊牽之法義不與彼同也注以客至從介釋曰對入門右行臣禮不得從介也公揖至再拜注公再拜至之也釋白臣禮見謂初入門右是以今再拜新之也知此不為拜至者下記云禮不拜至鄭注云以賔不於是始至私覿固非始至而為再拜明為臣禮見新之也賔三至負序注反還至圭同釋曰云反還者不敢與授圭同者上行聘時三退負序不言反還故決之也注不言至之也釋曰此決聘享皆言公受此乃私覿故略之不言其公受也士受至右受注自由至受皮釋曰此庭實之馬四匹在庭北面西上牽馬者亦四人各在馬西以右手執馬而立士受馬者從東方來由馬前各適牽馬者之前還繞其後適牽馬者之東馬西而受之牽馬者自前行而出之云此亦並授者不自前左由便也者鄉飲酒之等於西階之上皆授由其右受由其左今乃受馬者不自左而由其右受者使授馬者授訖右廽其身於出時為便故鄭注云便其巳授而去也云受馬自前變於受皮者上受享庭實之皮受皮者自後右客鄭注云自由也從東方來由客後西居其左受皮也此亦從東而來由馬前者馬是生物恐驚故由前是變於受皮也牽馬至乃出釋曰四馬並北面牽馬者皆在馬西士既受馬其最西頭者便即出門不須由馬之前其次東三匹者皆由西於馬前而出故云牽馬者自前西乃出據三人而言也賔降至君辭注拜送至鄉之釋曰此言賔拜送幣者私覿己物故也前享幣不拜送者致君命非己物故也注君乃至敬也釋曰經上云拜送而云君辭君辭復云拜也是其君乃辭之賔由拜者敬主國君故也注此禮至明說釋曰云此禮固多有辭矣者謂此儀禮之內賔主之辭固多有辭矣但周公作經未有顯著明言之者直云辭耳此及公食皆著其辭此二者是志記之言煥乎可見云未敢明說者據此二者觸類而長之餘辭亦可以意量作但疑事無質未可造次明說故上注每云其辭未聞也賔降至馬出注廟中冝清釋曰云公側授宰幣不言出言馬出者以廟中冝清潔出就廄幣不言出與上皮幣同皆以東入藏之故記云賔之幣唯馬出其餘皆東注云馬出當就廄也餘物皆東藏之內府是幣不出之義也公降至請覿注玉錦至便也釋曰自此盡舉皮以東論上介衆介行私覿之事云玉錦錦之文纎縟者也者案聘義孔子論玉而云縝密以栗知也是玉有密致錦之纎縟似玉之密致者云禮有以少文為貴者禮器直云有以文為貴者有以少為貴者無少文為貴之語但有以少為貴以文為貴明亦有以少文為貴故鄭以義而言之也注上介用皮變於賔釋曰賔用馬今上介用皮故云變於賔也注贊者奠皮出釋曰鄭知贊者奠皮出者下云有司二人舉皮從其幣出無人授之明贊者奠即出可知注此請至而俟釋曰云此請受請于上介也者對前賔此請上介亦不請衆介也知擯者先即西面位請之者以其上介等先立門西東面故擯西面對之云釋辭之時衆執幣者隨也釋曰介初在揖位君在中庭奠皮近西故介發揖位經皮西北出三分一乃東行北向當君乃北行至君所乃授幣故云自皮西進北面授幣也介出至受幣注不側授介禮輕釋曰案賔覿禮云側授宰幣此不云側授故云介禮輕宰自公左受即是側不云側者當有贊者於公受轉授宰故云介禮輕也擯者又納士介注納者出道入也釋曰自此盡序從之論士介行私覿之事云納者出道入也者謂若燕禮大射小臣納卿大夫出道入之也注終不至禮見釋曰上介奠幣訖辭之終以客禮是士介卑奠幣出私覿即了然不敢以客禮見也擯者至固辭注禮請至大夫也釋曰知固衍字當如面大夫者案下士介面大夫時擯者執上幣出禮請受賔辭無固字故知此固衍字當如士介面大夫注擯者至告之釋曰鄭知擯立門中閾外西面者以公在內賔在門外之西東面擯者兩處相之明居閾外西面向賔告之也士三至幣立注俟擯至來也釋曰上文擯者執上幣以出賔辭之上介皆辟之乃云士三人取幣立擯者執上幣始來明士三人立俟之可知也擯者進注就公所也釋曰以公在庭故擯者常引論語者彼雖非聘亦是大夫使人往來法問夫子何為亦是問君之類故云之類也注拜其至亦辟釋曰案爾雅釋言恙憂也言亦者亦初迎賔入門主君拜賔辟故云亦也公勞至不顧注公既至顧矣釋曰云賔不顧據上擯送賔復回謂君云賔不顧矣故引孔子事為證若然此送賔是上擯則卿為上擯孔子為下大夫得為上擯者以孔子有德君命使攝上擯若定十年夾谷之㑹令孔子為相同也賔請至大夫注請問至告之釋曰自此盡亦如之論賔請問大夫訖即館卿大夫勞賔介之事云不言問聘聘亦問也嫌近君也者對文大聘曰聘小聘曰問揔而言之問聘一也不得云問卿若言問近君矣故云有事于大夫也鄭云擯者反命因告之者但從朝以來行聘享行禮賔之事事巳煩矣今日即請未可即行故云反命因告之告之使知而巳是以賔至館行勞賔介及受饔餼終日有事明日乃行問卿之禮也賔所請問卿冝云有事于某子故下記云幣之所及皆勞鄭云所以知及不及者賔請有事固曰某子某子是也賔即館注小休息也釋曰言休息者據此一日之閒其事多矣明旦行問卿暫時止息故云小休息也注以己至辭之釋曰云以己公事未行者其聘享公事巳行仍有問大夫之等公事未行故不敢見云上介以賔辭辭之者以經云賔不見明上介以賔辭辭之可知是以下言上介受明此上介辭也大夫至介受注不言至執羔釋曰云周禮者案周禮秋官掌客云凡諸侯之禮上公五積卿皆見以羔侯伯四積卿皆見以羔是主國之卿見朝君皆執羔引之證主國卿見聘客不得執羔與大夫同用鴈不見朝君故也君使至五牢注變皮至為饋釋曰自此盡無儐論主君使卿歸饔餼於賔介之事云變皮辨服韋辨敬也者案周禮春官司服王之吉服有九祭服之下先云兵事韋辨服後云視朝皮辨服則韋辨尊於皮辨今行聘享之事等皆皮辨至歸饔餼則韋辨故云敬也云韋辨韎韋之辨兵服也者鄭知辨用韎韋者案司服注鄭引春秋傳曰晉郤至衣韎韋之跗注又云今時五伯緹衣古兵服之遺色故知用韎韋也韎即赤色以赤韋為辨也云兵服者司服云凡兵事韋辨服故云兵服也云服之者皮韋同類取相近耳者有毛則曰皮去毛熟治則曰韋本是一物有毛無毛為異故云取相近耳云其服蓋韎布以為衣而素裳者此無正文但正服則鄭注司服云韋辨以韎韋為辨又以為衣裳又晉郤至衣韎韋之跗注鄭志解此跗注以跗為幅以注為屬謂制韋如布帛之幅而連屬為衣及裳今此鄭云以韎布為衣而素裳全與兵服異者鄭以意量之此為賔館於大夫士之廟既為入廟之服不可純如兵服故為韎布為衣而素裳鄭志兵服以其與皮辨同白舄故以素裳解之此言素裳又與鄭志同若然唯變其衣耳以無正文故云蓋以疑之也云殺曰饔生曰餼者周禮有內饔外饔皆掌割亨之事詩云有母之尸饔故知殺曰饔生曰餼者以其對饔是腥飪故知餼是生故下云餼二牢皆活陳之也上介至禮辭注朝服至尊服釋曰鄭知義然者案下云賔皮辨迎大夫是受之用皮辨為尊服明此著朝服朝服卑於皮辨是示不受言示不受終受之也有司入陳注入賔至其積釋曰案上文直云致館及即館不辨廟與正客館之名案下記云卿館於大夫大夫館於士皆是大夫士之廟下文又云揖入及廟鄭據此而言明陳之於廟也曾子問孔子云自卿大夫士之家曰私館即卿大夫士之廟一也孔子又云公館與公所為曰公館鄭注云公館若今縣官宫也彼是正客館彼此兩言之者若朝聘使少則皆於正客館若使多則有在大夫廟多少不定兩言之也案大行人及掌客積與饔餼各別此注以饔餼為陳其積者對文饔餼與積別散文揔是委積故云積也饔注謂飪與腥釋曰知者上揔言饔餼五牢下陳有三處據此饔下云飪一牢腥二牢下又別云餼二牢故知饔別飪腥二者也若然飪與腥共以饔目之者以其同是死列之以鼎故也注陪鼎至用木釋曰案公食大夫庶羞也以非正饌故在正鼎後而言加也云當內廉辟堂塗也者正鼎九雖大判繼階而言其云于階前則階東稍逺故陪鼎猶當內廉也而辟堂塗堂塗之內也云腸胃次臘以其出牛羊也鄭言此者以其膚是豕肉腸胃是腹內之物而在肉前者以其腸胃出於牛羊故在膚前列之也云膚豕肉也唯燖者有膚者君子不食圂腴犬豕曰圂若然牛羊有腸胃而無膚豕則有膚而無腸胃也且豕則有膚豚則無膚故士喪禮豚皆無膚以其皮薄故也縱豕以四解亦無膚故既夕大遣奠少牢無膚以其豚解故也云此饌先陳其位後言其次重大禮詳其事也者先陳其位者南陳巳上是也後言其次者牛羊豕巳下是也案設飱時直云飪一牢在西鼎九羞鼎三腥一牢在東鼎七直言西九東七不言次陳位飱是小禮輕之故也云宫必有碑所以識日景引隂陽也者言宫必有碑者案諸經云三揖者鄭注皆云入門將曲揖既北面揖當碑揖若然士昏及此聘禮是大夫士廟內皆有碑矣鄉飲酒鄉射言三揖則庠序之內亦有碑矣祭義云君牽牲麗于碑則諸侯廟內有碑明矣天子廟及庠序有碑可知但生人寢內不見有碑雖無文兩君相朝燕在寢豈不三揖乎明亦當有碑矣言所以識日景者周禮匠人云為規識日出之景與日入之景者自是正東西南北此識日景唯可觀碑景邪正以知日之早晚也又云引隂陽者又觀碑景南北長短十一月日南至景南北最長隂盛也五月日北至景南北最短陽盛也二至之閒景之盈縮隂陽進退可知云凡碑引物者宗廟則麗牲焉以取毛血者云凡碑引物則識日景引隂陽皆是引物則宗廟之中是引物但廟碑又有麗牲麗繫也案祭義云君牽牲麗于碑以其鸞刀以取血毛毛以告純血以告殺兼為此事也云其材宫廟以石窆用木者此雖無正文以義言之葬碑取縣繩繂暫時之閒往來運載當用木而巳其宫廟之碑取其妙好又須久長用石為之理勝於木故云宫廟以石窆用木也是以檀弓云公室視豐碑三家視桓楹時魯與大夫皆僣言視桓楹桓楹宫廟兩楹之柱是葬用木之驗也腥二至二列注有腥至賔也釋曰云優賔者案下文士四人皆餼大牢無腥是不優之也堂上至醢屈注戶室至為併釋曰云設于戶西西陳皆二以並東上韭菹其南醓醢屈者謂其南東上醓醢醓醢西昌本昌本西麋臡麋臡西菁菹菁菹北鹿臡鹿臡東葵菹葵菹東蝸醢蝸醢東韭菹案周禮天官醢人朝事之豆有八韭菹醓醢昌本麋臡菁菹鹿臡茆菹麏臡饋食之豆葵菹螺醢此經直云韭菹醓醢屈知此昌本巳下八豆者案公食下大夫六豆韭菹醓醢昌本麋臡菁菹鹿臡又云上大夫八豆鄭注云記公食上大夫異於下大夫之數豆加葵菹蝸醢以充八豆若然案朝事八豆菁菹鹿臡下仍有茆菹麏臡不取而取饋食葵菹蝸醢者案少牢正祭用韭菹醓醢葵菹蝸醢朝事饋食之豆兼用之明此賔上大夫亦兼用朝事饋食之豆以充八豆可知云東上者變於親食賔也者案公食大夫公親食賔云宰夫自東房薦豆六設于醬東西上此云東上是變於親食賔也云屈猶錯也者猶下經錯黍此經菹菹不自相當皆交錯陳之故云錯也八簋至稷錯注黍在北釋曰云繼者繼八豆以西陳之云八簋者此陳之次第與八豆同故鄭云屈猶錯也八豆言屈八簋言錯者以八豆之實各別直次第屈陳之則得相變故云屈也八簋唯有黍稷二種雖屈陳之則閒雜錯陳之使當行黍稷閒錯不得並陳設亦相變故鄭下注凡饌屈錯要相變是也六鉶至羊豕注鉶羮器也釋曰此不言䋫屈錯者䋫文自具故不言之也案此文上下䋫屈錯似各別鄭此注屈猶錯士喪禮陳衣於房中南領西上䋫注云䋫猶屈又似不別者云䋫屈二者下手陳之少異屈者句而屈陳之䋫者直屈陳之不為句陳訖則相似故注士喪禮云䋫猶屈言錯者閒雜而陳之與䋫屈同或句屈陳而錯此文是也或䋫陳如錯公食大夫是也故公食大夫云宰夫設黍稷六簋于俎西二以並東北上黍當牛俎其西稷錯以終南陳是其直䋫錯之也注凡饌至相變釋曰凡豆及簋之數皆耦兩自相對而陳之屈錯不相對者欲使陳設者其要殺各得相變不使相當其六鉶䋫者牛及豕二者相變羊豕相當不相變以其大牢牛羊豕不耦故羊豕不得變也八壷至南陳注壷酒至為味釋曰鄭云蓋稻酒粱酒也者以下夫人歸禮醙黍清各兩壷此中若有黍不得各二壷若三者各二壷則止有六壷與夫人歸禮同又不得各三壷若三者各三壷則九壷不合八數止有稻粱無正文故云蓋以疑之鄭知不直有稻黍而為稻粱者稻粱是加相對之物故為稻粱也此陳饔餼堂上及東西夾簋有二十簠六上文設飱時與此堂上及西夾其對則簋十四簠四案掌客設飱公侯伯子男簋同十二公簠十侯伯簠八子男簠六又皆陳饔餼其死牢如飱之陳如何此中飱之簋數及饔餼之簠數皆多於君者彼是君禮自上下為差此乃臣禮或多或少自是一法不可以彼相並又此中致饔餼於賔醯醢百罋米百筥周禮上公罋筥百二十侯伯罋筥百子男罋筥八十子男少於此卿大夫禮禮或損之而益此其類也西夾至東陳釋曰六豆者先設韭菹其東醓醢又其東昌本南麋臡麋臡西菁菹又西鹿臡此陳還取朝事之豆其六簋四鉶兩簠六壷東陳其次可知義復與前同也儀禮疏卷第二十一
