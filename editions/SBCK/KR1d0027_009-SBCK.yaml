  text: 儀禮䟽卷第九
  hash: sha256:23d72b0b1b9b17ad2d11144ffa754a791a3ca68d2ca3133688fe71b134b61aab
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_009-1a}
body:
  text: 唐朝散大學行太學博士􅀪文館學士臣賈公彦等撰賔降洗注將酢主人釋曰自此巳下至西階上荅拜論賔酢主人之事云將酢主人者案爾雅云酢報也前得主人之獻今將酌以報之故降洗而致絜敬故云將酢主人也主人降注降立至西面釋曰知面位如此者案下云主人復阼階東西面故知此當於阼階東西面也賔坐奠爵興辭注西階前也釋曰鄭知西階前者郷射云賔西階前東面坐奠爵興辭降此亦然故也主人至賔禮注祭者至嚌啐釋曰此賔坐取爵適洗南盥坐取爵卒洗以此言之則賔未盥主人辭洗案郷射賔盥訖將洗主人乃辭洗先後不同者彼與郷人習禮輕故盥訖乃辭洗此郷人將賔舉之故未盥先辭洗重之故也􅀂然郷射禮内兼有郷大夫即尊與州長同於盥後辭洗者以其盥後辭洗是禮之常故也但郷射賔坐取爵適洗坐奠爵于篚下主人辭洗之時賔方奠爵于篚下此不奠爵篚下便言奠爵于篚者郷射云賔坐取爵洗之時未得主人之命故得奠於篚下得主人之命乃奠于篚此則賔取爵適洗未奠之時主人即辭故奠于篚也云揖讓如初􅂛者謂前主人卒洗一揖一讓升也云降盥如主人禮者謂如主人降盥禮則此賔降主人亦降賔辭降主人對一與主人降辭巳下同也云祭如賔禮者如上賔祭時坐左執爵右祭脯醢奠爵于薦西興右手取肺郤左手執本坐弗繚右絶末以祭尚左手嚌之興加于俎坐挩手遂祭酒興席末坐啐酒故云祭如賔禮云祭者祭薦俎及酒者薦謂脯醢俎即離肺也云亦嚌啐者直云祭如賔禮嫌祭不嚌啐故鄭明之云亦嚌肺啐酒是以下文云不告旨明亦啐也自席至荅拜注自席至便也釋曰案曲禮云席東郷西郷以南方爲上南郷北郷以西方爲上凡􅂛席必由下降由上今主人當降自南方以啐酒於席末遂因從席北頭降又從北向南北面拜是由便也􅀂降由上之正亦是便故下云主人作相降席自南方不由北方亦由便也主人坐奠爵于序端注東西至充實釋曰奠爵于序端者擬後酬賔訖取此爵以獻介也云東西牆謂之序者爾雅釋宫文但彼云東西廂廂即牆故變言之也主人至東面釋曰自此至復位論主人酬賔之事注不辭至自飲釋曰酬酒先飲乃酬賔故云將自飲􅀂然旣自飲而盥洗者禮法冝絜故也􅀂然經云賔降主人辭應奠爵不言者理在可知故爲文略也卒洗至荅拜注酬勸至爲周釋曰云賔西階上疑立者待主人自飲故也云酬之言周忠信爲周者此解主人將酬賔先自飲之意以其酬賔􅀂不自先飲主人不忠信恐賔不飲示忠信之道故先自飲乃飲賔爲酬也忠信爲周國語文坐祭至拜洗注不拜洗殺於獻釋曰云坐祭遂飲者因坐祭即飲飲卒觶因事曰遂故曰遂云辭如獻禮者主人辭賔降主人爲已洗爵此與獻賔時同故云辭如獻禮禮殺􅂛堂不拜洗與獻時異故别言之使不蒙如也禮殺於獻者獻時拜洗禮初不殺故也賔西至薦西注賔巳至其觶釋曰賔巳拜主人奠其觶者非乆停下文賔取之奠于薦東是也賔辭至復位注酬酒至交也釋曰賔辭不解所拜之事案郷射二人舉觶于賔與大夫進坐奠于薦右賔與大夫辭坐受觶以興注云辭辭其坐奠觶以彼云賔與大夫辭即云坐受觶以興􅀂自手受之以舉觶是禮巳故賔與大夫可以當亢荅之禮得云辭其親奠此禮初賔謙卑不辭其奠故經不云坐受以興然此辭是主人復親酌己故郷射主人酬賔云賔辭鄭注云辭主人復親酌己是也云酬酒不舉君子不盡人之歡不竭人之忠以全交也者並曲禮文案彼歡謂飲食忠謂衣服引之并證飲食者鄭於彼歡與忠相對解之故歡爲飲食忠爲衣服通而言之揔爲飲食於義合也云全交者所有飲食與己己盡之恐人嫌貪而交絶故不盡爲全交酬酒不飲亦是全交故引爲證也此以奠於薦東爲酬酒不舉案燕禮二人媵爵于公奠于薦南彼皆舉爲旅酬而在左者鄭彼注云奠于薦南不敢必君舉也案特牲主人酬賔奠于薦北彼舉旅而在左者鄭彼云行神惠故不與此同也主人至東面注主人至堂上釋曰自此下至主人介右荅拜論主人獻介之事主人至拜洗注介禮殺也釋曰案上主人迎賔之時介與衆賔從入又主人與賔三揖至於階之時介與衆賔亦隨至西階下東面今此文云揖讓􅂛如賔禮則唯於􅂛堂時相讓無庭中三揖之事矣􅂛堂而云拜者謂拜至亦如賔矣云介禮殺也者謂不拜洗是以郷飲酒義云三讓以賔􅂛拜至獻酬辭讓之節繁及介省矣是也注不言疑者省文釋曰此決上獻酬辭賔時賔於西階上疑立此亦當獻酒節而不言疑者省文也主人至少退注主人至北面釋曰云主人介之席前西南面獻介者以介席東面故邪向之􅀂獻賔時於賔席前北面向之也主人拜于介右降尊以就卑也者以主人獻賔時主人自在阼階今於獻介主人來在西階介右是介卑故降主人之尊就西階介之東北面拜也至旅酬皆同階者禮殺故也主人至荅拜注不嚌啐下賔釋曰云主人立于西階東者始獻介之時近西在介右今於設薦之時主人無事稍近東案上獻賔薦設之時主人云疑立此不言者文略也云主人介右荅拜者還近西於前立處荅拜也介降至如初注如賔酢之時釋曰自此至介降立于賔南論介酢主人之事云主人復阼階降辭如初者如賔酢主人之時介辭主人從己降主人辭介爲己洗一皆如之也卒洗主人盥注盥者當爲介酌釋曰此主人自飲而盥者尊介也是以郷射云大夫將酢主人卒洗主人盥注云盥者雖將酌自飲尊大夫不敢褻是其􅀋也介揖至之閒釋曰揖讓􅂛者謂一揖一讓􅂛也云授主人爵于兩楹之閒以爵授主人也注就尊至共之釋曰知兩楹閒是尊南者以上云尊於房戸閒房戸閒當兩楹之北故云就尊南授之也云介不自酌下賔者以其賔親酌以酢主人此不自酌故云下賔也云酒者賔主共之者此鄭解酒賔主共之故賔自酌以酢主人介卑故不敢酌是以郷飲酒義云尊於房戸之閒賔主共之是也介西至荅拜釋曰此主人旣受爵介無事故於西階上立不言疑立可知也亦省文注奠爵至衆賔釋曰知此奠爵爲衆賔者案下文云主人揖􅂛坐取爵于西楹下是也郷射無介故獻衆賔時於東序端取爵獻訖奠爵于篚也主人至賔南釋曰向來主人與介行禮於西階上事訖故復阼階揖讓降介降立于賔南者以將獻衆賔故介無事就賔南也主人至壹拜注三拜至賤也釋曰自此巳下至奠于篚論獻衆賔之事云西南面者以其主人在阼階下衆賔在賔介之南故西南向拜之云三拜壹拜示徧不備禮也者衆賔各得主人一拜主人亦徧得一拜是不備禮故郷射云三拜衆賔衆賔皆荅壹拜彼注云三拜示徧也壹拜不備禮也大夫禮皆然故少牢云主人一拜􅅪者􅅪者皆荅拜鄭云三拜旅之示徧也又有司徹云主人降南面拜衆賔于門東三拜衆賔門東北面皆荅壹拜大夫尊故也士則荅再拜故特牲云主人三拜衆賔衆賔荅再拜鄭云衆賔再拜者士賤旅之得備禮是也云不􅂛拜賤也者此決上主人與賔介行禮皆􅂛堂拜至此三拜賔賤故不􅂛拜至也主人至三人注長者至多矣釋曰云主人揖􅂛者從三人爲首一一揖之而􅂛也云降洗􅂛實爵者以下不更言洗則以下因此不復洗矣云西階上獻衆賔者下別言衆賔之長三人則衆賔之中兼言堂下衆賔故鄭云衆賔多矣自三人巳下於下便以次歷言之矣云拜受者三人則堂下衆賔不拜受矣主人拜送注於衆賔右釋曰知在衆賔右拜送者約上文介右而知也坐祭至復位注旣卒至禮􅂤釋曰云卒爵不拜立飲立授爵賤者禮􅂤者賔賢能以賢者爲賔其次爲介不問長幼其三賔德劣于賔介則數年之長幼故上衆賔之長也賔介則坐祭坐飲又拜旣爵此三賔則坐祭與賔介同不拜旣爵立飲立授則異賤故禮􅂤也衆賔至立飲注次三至彌􅂤釋曰此據堂下衆賔不拜受􅂤於三人故云禮彌􅂤也每一至其席注謂三人也釋曰上巳云獻此以下別言薦云每一人還發三人而言云每一人獻則薦諸其席則一一得獻即薦之以其言席又下別言衆賔則此三是三人故鄭云三人也衆賔辯有脯醢注亦每至作徧釋曰云亦每獻薦於其位者如上三人一一薦之知位在下者以其言堂下立侍不合有席旣不言席故位在下旣不言其數則郷人有學識者皆來觀禮皆入飲酒之内是以郷射云旅酬堂上辯卒受者興以旅在下者明衆賔在堂下也主人至于篚釋曰以此合一獻徧不復用故以主人爵降奠於篚也揖讓至即席注序次至爲揖釋曰自此至舉觶者降論徧獻衆賔訖將以旅酬之事云衆賔序􅂛者謂三賔堂上有席者以年長爲首以次即席也云今文厭皆爲揖不從者以賔相引以手不得爲揖故也一人至于賔注一人至曰舉釋曰此一人舉觶爲旅酬也云發酒端曰舉者從上至下徧飲訖又從上而起是發酒端曰舉也實觶至賔拜注賔拜拜將受觶釋曰云賔席末荅拜者謂於席西南面非謂席上近西爲末以其無席上拜法也巳下賔拜皆然進坐至以興注舉觶至謙也釋曰云舉觶不授下主人也者決上主人獻賔皆親授而奠之今不親授皆席工連言此不言席工文不具爾故此爲工布席下云工入􅂛明此席也引燕禮者欲證此席爲工又取此工席在西階東以其此經云堂廉東上不言階東故取燕禮西階上少東樂正又在工西此下云樂正於西階東據樂正於西階東而立在工西則知工席更在階東北面可知但此言近堂廉亦在階東彼云階東亦近堂廉也工四至手相注四人至之者釋曰云四人大夫制也者此郷大夫飲酒而云四人大射諸侯禮而云六人故知四人者大夫制也燕禮亦諸侯禮而云四人者鄭彼注云工四人者燕禮輕從大夫制也郷射是諸侯之州長士爲之其中兼有郷大夫以三物詢衆庶行射禮法故工亦四人大夫制也􅀂然士當二人天子當八人爲差次也云二瑟二人鼓瑟則二人歌也者旣云工四人二人瑟明二人鼓瑟可知也云相扶工也衆賔之少者爲之者見郷射云樂正適西方命弟子弟子則衆賔之少者也云每工一人者案周禮瞽三百人又此經二人瑟相者二人皆左何瑟又大射僕人正相大師以諸文言之故知每工一人若然此經工四人二人瑟相二人則工二人歌雖不言相亦二人可知以空手無事故不言也云郷射禮曰弟子相工如初入者彼謂將射樂正命弟子相工遷樂於下降時如初入之次第亦瑟先歌後引之證弟子相工之事天子相亦使眡瞭爲之知者見周禮眡瞭職云凡樂事相瞽是也云凡工瞽矇也者鄭司農云無目眹謂之瞽有目联而無見謂之矇有目無眸子謂之瞍故詩大雅云矇瞍奏工是也引論語者證瞽人無目須扶之義也云師即大師之官無目瞽矇之長也云後首者變於君也者案燕禮云小臣左荷瑟面鼓注云燕尚樂可鼓者在前也此郷飲酒亦尚樂而不面鼓是變於君也案大射主於射略於樂郷射亦應主於射略於樂所以面鼓亦是變於君也云挎持也者瑟底有孔越以指深入謂之挎也云其相歌者徒相也者徒空也無可荷空以右手相以經不言故也云内􅁌側擔之者以左於外側擔之使􅁌向内也樂正至階東注正長也釋曰案周禮有大司樂樂師天子之官此樂正者諸侯及大夫士之官當天子大司樂言先􅂛對後􅂛云長樂官之長也工入至乃降注降立至其事釋曰工入􅂛不言歌瑟先後案上文巳云瑟先其歌可知也鄭知降立於西方近其事者郷射云樂正適西方命弟子賛工遷樂故知西方是近其事也工歌至者華注三者至光明釋曰凡歌詩之法皆歌其􅀋此時貢賢能擬爲卿大夫或爲君所燕食以鹿鳴詩也或爲君出聘以皇皇者華詩也或使反爲君勞來以四牡詩也故賔賢能而預歌此三篇使習之也云三者皆小雅篇也者其詩見於小雅之内也云鹿鳴君與臣下及四方之賔燕講道脩政之樂歌也者自此巳下鄭皆先引詩序於上覆引詩經於下以其子夏作序所以序述經意故鄭並引之也案鹿鳴序云鹿鳴燕羣臣嘉賔也然後羣臣嘉賔得盡其心之事還依序而言也云此采其己有旨酒以召嘉賔嘉賔旣來示我以善道至可則傚也者案彼經云我有旨酒以燕樂嘉賔之心又云示我周行德音孔昭視民不恌是則是傚之事四牡序云勞使臣之來也經云王事靡盬我心傷悲豈不懷歸將母來諗皇皇者華序云君遣使臣也經云於彼原隰駪駪征夫每懷靡及周爰諮謀之事故鄭依而引之爲證也卒歌至送爵注一人至之洗釋曰云一人工之長也者謂就四人之内爲首者也云凡工賤不爲之洗者下大師爲之洗是君賜者爲之洗明自外不爲之洗也案此郷飲酒及燕禮同是主歡心尚樂之事故有􅂛歌笙閒合樂及其獻工獻笙後閒合不獻以知二節自前巳得獻故不復重獻郷射主於射略於樂無笙閒唯有合樂笙工並爲至終緫獻之大射亦主於射略於樂但不閒歌不合樂故有􅂛歌鹿鳴三終主人獻工乃後下管新宫不復得獻此君禮異於郷射也若郷射與大射同略於樂大射不略􅂛歌而略笙閒合者二南是郷大夫之正小雅是諸侯之正鄭注郷射云不略合樂者不可略其正諸侯不略鹿鳴之等義亦然也薦脯醢使人相祭注使人至祭薦釋曰知使人相祭者以相者扶工之人每事使之指授故知還使相者爲之知祭酒祭薦者以其云獻薦脯醢即云相祭知相其祭酒祭薦也注坐授之釋曰知坐授之者以經不云興故知坐授之也衆工至不祭注祭飲至爲徧釋曰言獻酒重無不祭也者衆工諸事皆不備尚祭飲則知得獻酒無有不祭故云獻酒重無不祭也其正酬亦祭至於旅酬以下則不祭而巳故下記云凡旅不洗不洗者不祭鄭注云敬禮殺也不甚絜也此衆工亦不洗而祭是以云獻酒重無不祭也大師至辭洗注大夫至則後釋曰天子諸侯有常官則有大師也大夫則無常官若君賜之樂并樂人與之則亦謂之大師主人爲之洗􅀂然工非大師則無洗云賔介降從主人也者案郷射云大師則爲之洗賔降注云大夫不降尊也此旣大夫禮則有大夫亦不降可知也云工大師也者旣言大師則爲之洗而云工不辭洗故知工即大師是以論語云師冕見孔子爲之相鄭云相扶工是工爲樂人之揔稱也云上旣言獻工矣乃言大師者大師或瑟或歌也者以其前工有瑟有歌後別言大師則大師能瑟或在瑟中若大師能歌或在歌中故云大師或瑟或歌也云其獻之瑟則先歌則後者以其序入及􅂛堂皆瑟先歌後其獻法皆先瑟後歌是以知獻之瑟先歌後隨大師所在以次獻之也燕禮云卒歌主人洗􅂛獻工工不興左瑟一人拜受爵注云左瑟便其右一人工之長者也燕禮諸侯禮有常官不言大師以燕禮主爲臣子故工四人從大夫制其大師入工不别言之也大射云主人洗􅂛實爵獻工工不興左瑟注云大師無瑟於是言左瑟者節也􅀂大師在歌亦先得獻與燕異也笙入至華􅁰釋曰此􅂛歌訖得獻乃始入也云磬南北面者磬旣南面其南當有擊磬者在磬南北面而云笙入磬南北面者在磬者之南北面也注笙吹至信也釋曰言小雅篇也者今序仍在魚麗之下是小雅也云今亡其義未聞者案詩魚麗之下見子夏序序此三篇案彼子夏序云南陔孝子相戒以養也白華孝子之㓗白也華􅁰時和歳豐冝黍稷也此巳上是子夏序文則云有其義而亡其辭者此是毛公續序云有其義指子夏序有其義也云而亡其辭者謂詩辭亡矣􅀂然彼亡辭此亡義與此義異也云昔周之興也周公制禮作樂至明矣者欲明周公制此儀禮之時有此三篇之意也云後丗衰微幽厲尤甚者禮運云孔子曰我觀周道幽厲傷之吾舎魯何適是幽厲􅀹甚者也禮樂之書稍稍廢棄者自幽厲巳後稍稍更加廢棄此篇之失也又引孔子以下至其信者欲明孔子以前言亡三篇之意也案南陔注云孔子論詩雅頌各得其所時俱在耳篇第當在於此時遭戰國及秦之丗而亡之其義則與衆篇之義合編故存至毛公爲詁訓傳乃分衆篇之義各置於其篇端彼詩鄭注又與此不同者鄭君注禮之時未見毛傳以爲此篇孔子前亡注詩之時旣見毛傳以爲孔子後失必知戰國及秦之丗者以子夏作序具序三篇之義明其詩見在毛公之時亡其辭故知當戰國及秦之丗也主人至人爵注一人至於下釋曰自此至不祭論獻笙者之事云一人拜者謂在地拜乃盡階不􅂛堂受爵也云一人笙之長者也者笙者四人今言一人受爵明據爲首長者而言也云笙三人和一人凡四人者案郷射記云三笙一和而成聲注三人吹笙一人吹和凡四人爾雅曰笙小者謂之和是也云郷射禮曰笙一人拜于下者即此一人拜者亦在堂下可知但獻工之時拜送在西階東以工在階東故也此主人拜送笙之時在西階上以其笙在階下故不同也衆笙至不祭注亦受至爲徧釋曰衆笙除一人之外二人者不備禮故亦受爵於西階上者與一人同也云薦之皆於其位磬南者依前笙入立于磬南之處是其􅀋也乃閒至由儀釋曰此一經堂下吹笙堂上􅂛歌閒代而作故謂之乃閒也注閒代至未聞釋曰云謂一歌則一吹者謂堂上歌魚麗終堂下笙中吹由庚續之以下皆然此魚麗南有嘉魚南山有臺其詩見在云六者皆小雅篇也者見編在小雅之内故知之見在者鄭君亦先引其序後引其詩案魚麗序云魚麗美萬物盛多也詩云君子有酒㫖且多南有嘉魚序云太平之君子至誠樂與賢者共之也詩云君子有酒嘉賔式燕以樂南山有臺序云樂得賢也得賢則䏻爲􅀖家立太平之基矣詩云樂只君子􅀖家之基又云樂只君子民之父母遐不眉夀是也此其鄭君所言義意云由庚崇丘由儀今亡其義未聞者案詩序云由庚萬物得由其道也崇丘萬物得極其髙大也由儀萬物之生各得其冝也有其義而亡其辭此毛公續序義與南陔白華華􅁰同堂上歌者不亡堂下笙者即亡蓋當時方以􅀋聚笙歌之詩各自一處故存者併存亡者併亡也乃合至采蘋注合樂至未聞釋曰此一經論堂上堂下衆聲俱合之事也云合樂謂歌樂衆聲俱作者謂堂上有歌瑟堂下有笙磬合奏此詩故云衆聲俱作云周南召南國風篇也者案論語注國風之首篇謂十五國風之篇首義可知也云王后國君夫人房中之樂歌也者案燕禮記云有房中之樂注云􅁌歌周南召南之詩而不用鍾磬之節謂之房中者后夫人之所諷誦以事其君子是也既名房中之樂用鍾鼓奏之者諸侯卿大夫燕饗亦得用之故用鍾鼓婦人用之乃不用鍾鼓則謂之房中之樂也云􅀜雎言后妃之徳以下至脩其法度周南三篇即言后妃召南三篇則言夫人不同者此雖同是文王之化召南是文王未受命巳前之事諸侯之禮故稱夫人周南是文王受命稱王之後天子之禮故稱后也云昔大王王季居于岐山之陽者案魯頌云后稷之孫實維大王居岐之陽鄭云大王自􅃎徙居岐陽是大王居於岐陽也兼言王季者王季大王之子繼大王後亦居岐陽至文王始居于豐故兼言王季也云躬行召南之教以興王業者大王得鸑鷟鳴于岐又實始翦商王季又纂我祖考是其以興王業也云及文王而行周南之教以受命者文王徙居豐得赤雀之命故云以受命也鄭注郷射云昔大王王季文王始居岐山之陽彼兼言文王者欲見文王未受命以前亦得召南之化知者案羔羊詩序云召南之國化文王之政摽有梅序云召南之國被文王之化此不兼言文王者㩀文王徙豐受命之後專行周南之教是周南十一篇唯言文王之化不言大王王季也大雅云刑于寡妻者是大雅思齊之詩也引之者證文王施化自近及逺自微至著之意云其始一國耳者謂大王自􅃎遷于岐山周原膴膴過百里之地言此者欲見徙居于豐以後二分天下以此故國分與二公故云文王作邑于豐以故地爲卿士之采地乃分爲二國也云周周公所食召召公所食者此二公身爲三公下兼卿士即上采地一也云此者欲見采地得稱周召之意云於時文王三分天下有其二德化被于南土者欲見周召皆稱南之意也云是以其詩有仁賢之風者属之召南焉者謂文王未受命以前也云有聖人之風者属之周南焉者謂受命以後也故詩序云關雎麟趾之化王者之風故繫之周公鵲巢騶虞之德諸侯之風也先王之所以敎故繫之召公必將二南繫此二公者天子不風文王受命稱王故繫於二公也云夫婦之道生民之本王政之端者欲見合樂之時作此六篇之意也云故國君與其臣下及四方之賔燕用之合樂也者此據燕禮而言之也云郷樂者風也者亦據燕禮而言故燕禮記云遂合郷樂者據此郷飲酒郷大夫所作也云小雅爲諸侯之樂者則􅂛歌鹿鳴之等是也云大雅頌爲天子之樂者肆夏繁遏渠之等是也云郷飲酒􅂛歌小雅禮盛者可以進取也者據此郷飲酒爲饗禮􅂛歌鹿鳴進取諸侯之樂饗禮盛可以進取也云燕合郷樂禮輕者可以逮下也者逮及也以燕禮輕故言可以逮下也鄭君據儀禮上下而言其實饗燕同樂知者穆叔如晉晉侯饗之歌鹿鳴之三是與燕禮同樂也􅀂然小雅云郷或進取燕可以逮下者饗亦逮下也云春秋傳曰者襄公四年左氏傳文彼云穆叔如晉晉侯享之金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子貟問之曰吾子􅃕其大而重拜其細敢問何禮也穆叔對曰三夏天子所以享元侯也使臣弗敢與聞文王兩君相見之樂也臣不敢及鹿鳴所以嘉寡君也敢不拜嘉引之者證肆夏繁遏渠是頌謂天子之樂歌案鍾師杜子春注引吕叔玉云肆夏時邁也繁遏執競也渠思文也鄭君不從以爲詩篇名頌之族􅀋也此歌之大者載在樂章樂崩亦從而亡之是以頌不能具是也云然則諸侯相與燕􅂛歌大雅合小雅天子與次國小國之君燕亦如之與大國之君燕􅂛歌頌合大雅者此約穆叔云肆夏繁遏渠天子所以享元侯肆夏繁遏渠則頌也元侯大國之君也凡合樂者遏取卑者一節故歌頌合大雅也􅀂元侯自相享亦依此案詩譜云天子諸侯燕羣臣及聘問之賔皆歌鹿鳴合郷樂鄭云諸侯相燕天子與國君燕與大國之君燕國語及襄公四年公言饗見之者亦欲饗同也向來所言皆據􅂛歌合樂有此尊卑之差若納賔之樂天子與五等諸侯同用肆夏是以燕禮納賔用肆夏禮記郊特牲云大夫之奏肆夏由趙文子始也是大夫不得用之其諸侯以上同用之也云其笙閒之篇未聞者案郷飲酒禮笙閒之樂前與􅂛歌同在小雅則知元侯及國君相饗燕笙閒亦同􅂛歌矣而云未聞者謂如由庚由儀之等篇名未聞工告至乃降注樂正至北面釋曰鄭知降立西階東北面者以其堂上時在西階之東北面知降堂下亦然在笙磬之西亦得監堂下之樂故知位在此也此郷飲酒及郷射大夫禮卑無大師故工告樂備國君禮備有大師告樂備大射不告樂備者是主於射略於樂故也主人降席自南方注不由北方由便釋曰自此至退立于觶南論立司正之事云不從北方由便者主人之席南上􅂛由下降由上是其常而言不從北方由便者解禮故所以􅂛由下降由上者是由便也側降注賔介不從釋曰側者特也賔介不從故言側上來主人降賔介皆從降此獨不從者以其方燕禮殺故也作相爲司正注作使至其許釋曰上經云一相迎于門外今將燕使爲司正監察賔主之事故使相爲司正也云禮樂之正旣成者謂主人與賔行獻酢之禮是禮成也􅂛歌笙閒合樂三終是樂成也故鄭揔言禮樂之正旣成也主人至辭許注爲賔至西階釋曰此司正􅂛西階適阼階上案郷射云司正升自西階由楹内適阼階上北面彼此同此不言由楹内者省文也云告賔於西階者郷射云司正西階上故知也司正至復席注再拜至就席釋曰凡相拜者當在賔主拜前今相見云在賔拜下者以經云司正告于主人因即拜賔賔即荅拜文理切不得先言相拜故退之在下其實相時在賔主拜前是以郷射云司正告于主人遂立楹閒以相拜主人阼階上再拜賔西階上荅再拜是其相拜在前也云賔主旣拜揖就席者以郷射賔主拜訖即揖就席故也知此亦然也司正至少立注階閒至北面釋曰云階閒北面東西節也者階閒謂兩階之閒東西等是東西節也云其南北當中庭者案郷射云司正實觶降自西階中庭北面坐奠觶此經雖不言中庭冝與彼同故云中庭也云己帥而正孰敢不正者此是論語孔子語季康子之言也彼言子帥指季康子爲子此言己帥指司正爲已欲見司正退也云共拱手也少立自正愼其位也者欲見令賔主亦皆正愼其位也云燕禮曰右還北面者燕禮司正降自西階右還北面取不背其君此亦降自西階亦右還北面取不背大夫也故引以爲證也坐取至觶南注洗觶至察衆釋曰執觶興洗北面者案郷射大射禮皆直云取觶洗南面反奠於其所不云盥此俗本有盥者誤又此文及郷射奠空觶皆位南北面奠之燕禮大射皆南面奠之者以國君禮盛儀多故也儀禮䟽卷第九
