front:
  text: 儀禮䟽卷第十五
  hash: sha256:1d43d7c65dcb49cb5be217537782f4bc40dbcdadb8cd4179e347a23047721ab9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_015-1a}
body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彦等撰司宫至東上注言兼至房來釋曰此經設三卿之席在於賔東言兼卷則每卿異席也者􅀂三卿同席則直云卷重席不須言兼今云兼卷則兼三卿重席皆卷之故知毎卿皆異席也云重席重蒲筵者案公食大夫記云司宮具几與蒲筵常緇布純加萑席㝷玄帛純彼爲異國之賔有蒲筵萑席兩種席故稱加上小臣設公席與公食大夫席及賔皆稱加亦是兩種席兩種而稱加此燕已臣子一種席重設之故不稱加􅀂然案郷飲酒云席于賔東公三重大夫再重公升如賔禮大夫則如介禮有諸公則辭加席郷射亦云大夫辭加席案彼二文雖稱加上文云三重再重則無異席故彼記直云蒲筵彼云加者以上席加於下席故鄭彼云加席上席也故此下注云重席雖非加猶爲其重累去之是其一種席也云卿坐東上統於君也者決郷飲酒郷射諸公大夫席于尊東西上彼遵尊於主人故鄭注云統於尊此爲君尊故統於君而東上也云席自房來者案公食記云宰夫筵出自東房故知也卿􅂛苟敬席于阼階之西以爲敬此􅀌亦席於阼階之西故爲苟敬私昵之坐也小臣至如初釋曰自此至送觶公荅再拜論一人致爵于公之事云二大夫媵爵如初者亦上二人媵爵媵爵者阼階下皆北面再拜稽首公荅再拜媵爵者立于洗南西面北上序進盥洗角觶􅂛自西階序進酌散交于楹北降阼階下皆奠觶再拜稽首執觶興公荅再拜媵爵者皆坐祭遂卒觶興坐奠觶再拜稽首執觶興公荅再拜媵爵者執觶待于洗南相似也故言二大夫媵爵如初也請致至再拜注命長至暇也釋曰上文小臣請媵爵則此請致者亦小臣也云命長致者公或時未能舉自優暇也者脫屨􅂛坐以前公爲賔爲卿爲大夫三舉旅也燕禮之正不得損益而云公或時未能舉自優暇者正謂周公作經以優之非實也故云若命長致言若者不定之辭優君之義故唯命長致不然似言皆致以其三舉旅唯有此三觶故也洗象至再拜注奠于至勸君釋曰云奠于薦南者於公所用酬賔觶之處者案前大夫二人媵觶奠于公薦南北上其上觶巳取爲賔舉旅下觶仍在今大夫又媵一觶而云奠于薦南明知是所用酬賔觶之處云二人俱拜以其共勸君者上云媵爵者二大夫媵爵如初是共勸君酒今始命長致故俱拜以其共勸君故也公又至所酬釋曰自此至奠于篚論爲卿舉旅之事注一爵至酬賔釋曰知一爵是先媵者之下觶者以其前大夫二人媵爵皆奠于薦南以其上觶者巳爲賔舉旅今又行一爵故知先媵者之下觶也其後媵二觶者留之後爲大夫舉旅也云若賔若長則賔禮殺矣者前爲賔舉旅不云若賔若長專爲賔禮盛至此爲卿舉旅不專爲賔舉旅科從其一是賔禮殺也云長公卿之尊者也者有諸公公爲尊若無諸公三卿爲尊長中可以兼此二者云賔則以酬長長則以酬賔者釋經若賔􅀂長言若不定或先或後故兩言之以旅至于篚釋曰言如初者一如上爲賔舉旅之節主人至復位釋曰自此盡皆􅂛就席論獻大夫之節注旣盡至又殺釋曰云不拜之者禮又殺者前卿受獻不酢辟君巳是禮殺今大夫受獻不但不酢主人又不拜旣爵故云禮又殺胥薦至無脀注胥膳至俎實釋曰云胥膳宰之吏也者案周禮有府史胥徒鄭注天官胥讀如諝謂其有才知爲什長是庶人在官者所羞薦者皆膳宰胥是膳宰之吏云主人大夫之下先大夫薦之尊之也者案大射注直云主人大夫不云下此云大夫之下者謂大夫之中位次在下下經云辯獻大夫乃薦此薦文在上是先大夫薦之尊之也云不於上者上無其位也者案此燕禮大夫堂上士在下獨此宰夫言堂上無位者以其主人位在阼階君巳在阼故主人辟之位在下是以大射注云不薦於上辟正主也云脀俎實者脀者􅂛也謂􅂛特牲體於俎故云俎實也辯獻至東上注徧獻至席也釋曰凡大夫􅂛堂受獻得獻訖即降獻徧不待大夫􅂛遂薦於其位大夫始􅂛故言遂也云徧獻之乃薦略賤也者決上卿與賔得獻即薦貴故也云亦獻而後布席也者亦上獻卿之時司宫兼卷重席設於賔左此大夫不言設席眀亦得獻後即布席也􅀂然案大射席小卿賔西東上注云席於賔西射禮辨貴賤也以此言之燕禮主歡不辨貴賤小卿與大卿皆在賔東故此賔西無小卿位席工至其西釋曰自此至降復位論作樂之事此上下作樂之中有四節􅂛歌一笙二閒三合樂四注工瞽至告備釋曰工瞽矇歌諷誦詩者也者案周禮瞽矇掌播鼗諷誦詩鄭云諷誦詩謂闇讀之不依詠也彼不依琴瑟闇讀之即爾雅徒歌曰謡此作樂之時依於瑟即詩注云曲合樂曰歌一也故下云工歌鹿鳴之􅀋是也云凡執技藝者稱工者執技藝文出於王制但能其事者皆稱工是以引少牢饋食祝稱工樂記師乙爲大師樂官亦稱工至於冬官巧作者皆稱工云樂正于天子樂師也知樂正與樂師相當者案周禮樂師職云凡樂成則告備此樂正告樂備故知樂正當天子樂師樂師下大夫四人上士八人下士十有六人樂師大小多矣此諸侯樂正亦有大小之名也故大射云小樂正從之鄭注云小樂正於天子樂師也是其諸侯樂正雖有大小當天子樂師知大樂正不當天子大司樂者以其天子大司樂不告樂備故不得以大樂正當之但大射主於射略於樂故小樂正告樂備此燕主歡心故大樂正告樂備故不同小臣至乃降注工四至同官釋曰工四人者燕禮輕從大夫制也者鄭言此者決大射禮重工六人從諸侯制案公羊傳諸公六諸侯四若然知非大射是諸公制此燕禮是諸俟制者案郷射皆工四人是大夫制則諸侯不得有工四人五等諸侯同六人彼公羊六人四人不同者自是舞人之數不得以彼決此也云面鼓者燕尚樂可鼓者在前也者此決郷飲酒左何瑟後首臣降於君故也引天子大僕二人也者周禮序官文引之者此經小臣相工大射云僕人正徒相大師僕人師相少師僕人士相上工僕人以下同官旣多遞換相工但大射辨尊卑故僕人正等相工此燕禮輕故小臣相工是以别周禮同官人多得相參之意工歌至者華注三者至明也釋曰此經歌詩之􅀋鄭於郷飲酒巳注此注與彼同但此燕禮歌小雅亦合郷樂下就卑也郷飲酒􅂛歌鹿鳴之等饗或上取故彼此詩同注亦不異也卒歌至送爵注工歌至於席釋曰云工歌乃獻之賤者先就事也者歌詩是其事先施功勞乃始獻之是賤者先就事對工以上不就事而得獻也故大射注云工歌而獻之以事報之是也云左瑟便其右者工北面以西爲左空其右受獻便者酒從東楹之西來故以右爲便案大射云獻工工左瑟鄭注云大師無瑟於是言左瑟者節也以其經云僕人正徒相大師無瑟言大師左瑟者爲飲酒之節此與郷飲酒同無所分別大師或瑟或歌是以不得言節之案郷飲酒大師則爲之洗則衆工不洗也此經主人洗􅂛獻工不辨大師與衆工則皆爲之洗爵又案郷飲酒記不洗者不祭此篇與大射羣工與衆笙皆言祭故知皆爲之洗云工拜於席者以經云工興左瑟即云一人拜受爵不見有降席之文明工拜於席可知薦脯醢注輒薦至夫也釋曰案上獻大夫之時云辯獻大夫遂薦之鄭注云徧獻之乃薦略賤也此獻工之長一人即薦脯醢非謂貴工即獻之正是禮尚異變於大夫也使人相祭注使扶至祭酒釋曰上云小臣相工則此扶工相祭是小臣也此據相長一人文承受爵薦脯醢之下故知祭薦脯醢及祭酒二事對下衆工祭酒不祭脯􅊽也公又至如初注言賜至彌卑釋曰此燕尚飲酒故工歌之後笙奏之前而爲大夫舉旅大射雖行燕禮主於射故笙之閒至射乃爲大夫舉旅云言賜者君又彌尊賔長彌卑者案上爲賔舉旅直云公興以酬賔爲卿舉旅而云若賔若長言若不定科酬其一不專爲賔是君禮漸尊賔禮漸殺雖然猶言酬至此言唯公所賜者以上下言之是君又彌尊賔長彌卑也卒注旅畢也釋曰言旅畢者謂爲大夫舉旅酬行於西階之上或從賔或從卿次第盡大夫故云旅畢也笙入至華黍注以笙至信也釋曰此笙奏南陔白華華黍三篇等經注與郷射同亦不復重釋但此云笙入立于縣中以其諸侯軒縣闕南面而巳故得言縣中郷飲酒唯有一磬縣而巳不得言縣中而云磬南注引郷飲酒者欲見此雖軒縣近北面縣之南也主人至主人注一人至于下釋曰引郷射禮者證笙一人拜此與郷飲酒皆直云一人拜不言拜于下故郷飲酒與此注皆引郷射以爲證欲見拜者拜於階下衆笙至不祭釋曰言不拜受爵降者於階下受爵者亦盡階不升堂云辯有脯醢者亦獻訖薦于位之前乃閒至由儀注閒代至未聞釋曰此經注一與郷飲酒同彼巳釋訖不復重解遂歌至采蘋注周南至未聞釋曰云遂歌郷樂者郷飲酒云乃合樂與此文不同者以其二南是大夫士樂大夫士或作郷大夫或作州長故名郷大夫樂飲酒不言郷樂者以其是己之樂不須言郷故直言合樂此燕禮是諸侯禮下歌大夫士樂故以郷樂言之又郷飲酒注云合樂謂歌與衆聲俱作彼經有合樂之字故也此經無合樂之字故闕而不言其實此歌郷樂亦與衆聲俱作是以彼處解合爲歌與衆聲俱作耳此歌而解合明同也自周南以下所注亦與郷飲酒同亦不復重釋大師至歌備注大師至成也釋曰云大師上工也者案春官大師下大夫二人小師上士四人又云上瞽四十人中瞽百人下瞽百有六十人注云凡樂之歌必使瞽矇爲焉命其賢知者以爲大師對小師巳下二百人爲上士也云掌合隂陽之聲敎六詩以六律爲之音者也者並大師職文案彼云掌六律六同以合隂陽之聲注云陽聲黄鍾大蔟姑洗㽔賔夷則無射隂聲大吕應鍾南吕林鍾中吕夾鍾又云皆文之以五聲宫商角徵羽皆播之以八音金石土革􅁝木匏竹又云敎六詩曰風曰賦曰比曰興曰雅曰頌以六德爲之本以六律爲之音云子貢問師乙以下至何歌也並樂記文師乙魯之大師以掌樂事故子貢問焉引之者證大師知樂節故告歌備故鄭云是明其掌而知之也知升歌以下四節皆三終者案禮記郷飲酒義云工入升歌三終主人獻之笙入三終主人獻之閒歌三終合樂三終工告樂備故知皆三終彼與此經閒歌合樂不獻之者但閒歌合樂還是始升歌笙奏之前巳得獻故不復重獻云備亦成也者案周禮樂師職云凡樂成則告備故云亦成也樂正至復位注言由至之北釋曰言由楹内者以其樂正與工俱在堂廉則楹南無過處故由楹内適東楹之東告于公云復位位在東縣之北者案大射略於樂小樂正􅂛堂經有左右正則知亦有大樂正至席工於西階上少東東面時小樂正亦降立於其南北面卒管工向東坫之東南西面北上坐時鄭注云於是時大樂正還北面立於其南臣位尊東明工升堂時小樂正升大樂正東方西面工來東坫之東南西面時大樂正東縣之北北面其小樂正則立於西階下東面此燕禮主於樂故大樂正升堂今降明復於東縣之北北面也射人至司正注君許至事同釋曰自此盡皆反坐論立司正遂行所監之事云君三舉爵者爲賔爲卿爲大夫舉旅云樂備作矣者歌笙閒合四者備作各三終矣案郷飲酒郷射立司正後始行旅酬者彼是士饗禮饗禮之法莫問尊卑徧獻之後乃行旅酬故立司正之後乃行旅酬此燕禮國君燕其臣子雖一獻以辨尊卑故主人獻君而受酬主人卑不敢酬公獻之禮成於酬故使大夫媵觶於公當酬公君行大惠即舉之爲賔賔得觶請旅諸臣徧卿大夫乃成一獻之禮復獻卿大夫皆爲之舉旅行酬皆成其獻但卿大夫皆堂上有位近君不敢失禮故雖舉旅行酬而未立司正作樂後將獻羣士士職卑位在堂下將爲士舉旅恐失禮故未獻之前即立司正監之故不同也司正至不安注洗奠至於賔釋曰云洗奠角觶于中庭明其事以自表威儀多也者此奠觶于中庭威儀多決郷飲酒不奠是以郷飲酒作相爲司正洗觶執以升自西階是不奠威儀少也云君意殷勤欲留賔飲酒命卿大夫以我故安者以主人安客乃安故欲安賔先語卿大夫以我意故須安也云或亦其實不主意於賔者鄭意兩解前解主意爲賔故使卿大夫爲賔安或亦其實不專主爲賔兼羣臣共安也司正至稽首注右還至其位釋曰右還將適觶南先西面也者右還謂奠時南面乃以右手向外而西面乃從觶西南行而右還北面云必從觶西爲君之在東也者􅀂從觶東而左還北面則背君以其君在阼故也云自嚴正愼其位者以司正監察主爲使人嚴正謹愼故先自嚴正謹愼也左還至其所注反奠至位也釋曰必使不空者亦欲使衆人覩知司正嚴正之處升自至以東注膳宰至徹然釋曰云降自阼階以賔親徹若君親徹然者臣之升降當西階今見賔親徹膳宰代君徹不降西階而降自阼階當君降處故云若君親徹降自阼然也卿大至北上注以將至反也釋曰案大射云大夫降復位注云門東北面位不與卿同東面位者彼卿有俎卿取俎以出故大夫不敢獨在西階下故復位復門東北面位此燕卿無俎故大夫與卿同降西階下東面北上位也云以將坐降待賔反者上文賔以俎出當反入升坐故卿大夫待賔反亦升坐也賔反至乃安注凡燕至之心釋曰凡在堂立行禮不說屨安坐則說屨故鄭云凡燕坐必說屨以其屨在足賤不宜在堂陳於尊者之側也云禮者尚敬敬多則不親燕安坐相親之心者左氏傳云饗以訓恭儉設几而不􅀝爵􅄹而不飲燕以示慈惠饗在廟立行禮是敬多則不親者也燕在寢以醉爲度是相親之心者也若然直云賔及卿大夫說屨不云君降說屨則君說屨之在堂上席側是以禮記少儀云排闔說屨於戸内者一人而巳矣彼據尊者坐在室則尊者一人說屨在戸内今此燕在堂上則君尊說屨於席側可知也羞庶羞注謂􅍧至之道釋曰案大射云羞庶羞注云所進衆羞謂􅍧肝膋狗胾醢也或有炮鼈膾鯉雉兎鶉鴽大射先行燕禮明與彼同此注不言炮鼈巳下注文不具鄭知有此物者以經云庶羞不唯二豆而巳案内則爲肝膋取狗肝一蒙之以其膋濡炙之舉燋其膋不蓼注云膋膓閒脂此及大射其牲皆用狗故知有肝膋狗胾知有炮鼈膾鯉者詩云吉甫燕喜飲御諸友炮鼈膾鯉又内則及公食大夫上大夫二十豆有雉兎鶉鴽禮記王制云庶羞不踰牲此燕用狗必可有此物而巳郷飲酒郷射亦有狗但經直云羞不云庶是以鄭注云胾醢明二豆無餘物也云骨體所以致敬也者據未坐以前庶羞所以盡愛據說屨巳後也大夫祭薦注燕乃至禮也釋曰不敢於盛成禮謂未立司正之前立行禮受獻之時不祭脯醢祭先是成禮不敢成禮於盛時司正至反坐注皆命至序端釋曰云起對必降席者經云反坐不云降明起對必降席旣對乃反坐也是以孝經云曽子避席曰參不敏亦是起對也知司正退立西序端者此無降文見郷飲酒云司正升相旅退立于序端東面故知此亦然也主人至送觶注獻士至作觚釋曰自此盡立飲論獻士之事云獻士用觶士賤也者對上大夫巳上獻用觚旅酬乃用觶此獻士即用觶故云士賤也不從今文觚者􅀂從觚與大夫巳上何異故不從士坐至立飲注他謂至不拜釋曰云他謂衆士也者上云士長明此士長之外皆衆士也知亦升受爵者以其士尊於笙之長笙之長尚受爵於階上明士得升堂受爵也言不拜者以其士長得拜明衆士不拜也乃薦至東上注天子至爲上釋曰此等皆士而先薦者以其皆有事故先得薦司士亦先薦者案周禮司士掌羣士爵禄廢置之事士中之尊故亦先得薦也鄭引周禮序官射人司士下大夫二人約出此諸侯則上士者天子官尊諸侯冝降一等以是諸侯射人司士得在士位中云其人數亦如之者案周禮序官射人下大夫二人上士四人下士八人皆名射人則諸侯雖使士爲之人數亦等以其畿外諸侯張三侯與天子同故知射人之數亦同也言此者欲見射時射人有事非一故下文注云大射正射人之長是以大射禮大射正及小射正皆有事也云司正爲上者雖同是士以其爲庭長故設在上先薦之此經三者當官雖多皆取長先薦其餘在於衆位依齒也又士位在西有事者別在觶南北面東上也辯獻至薦士注毎巳至其位釋曰云即位于東方蓋尊之者以其庭中之位卿東方西面大夫北面士西方東面是東方尊今卿大夫得獻升堂位空故士得獻即東方卿位是尊之以無正文故云蓋以疑之也知畢獻薦之者以其經云辯獻士乃薦士故知當畢獻後乃薦也祝史至薦之注次士至東方釋曰云次士獻之巳不變位者對先獻士士即變位郷東方也云位自在東方者案上設位之時祝史在門東小臣在東堂下是先在東方也主人至立飲注北面至復位釋曰云北面酌南郷獻之於尊南者案大射旅食尊在西鑮之南北面則此主人在南亦北面以陳尊向君􅀂東楹之西東向設尊亦是向君爲正彼酌者尊後東面酌此亦尊後北面酌南面獻之於尊南也云不洗者以其賤者此乃庶人在官府史胥徒之輩故云賤略之也云亦畢獻乃薦之者亦上文士此畢獻乃薦可知云主人執虚爵奠于篚復位者此約大射獻旅食訖云執虛爵奠於篚復位故知也􅀂射至之禮注大射至飲酒釋曰此一經論燕末行射之節云大射正爲司射者燕禮輕又不主爲射故射人爲擯又爲司正至射時大射正爲司射大射之時略於燕主於射故大射正爲擯又爲司正至射又親其職故不同爲司射也云冝從之者郷射是卿大夫禮故樂之還從之也云如者如其告弓矢旣具至退中與筭也者經云如郷射之禮明從始至末皆如之案郷射初司射告弓矢旣具至三畨射訖而退中與筭故如之也云納射器而張侯者欲見此與郷射因納射器後即張侯大射納射器之後無張侯之事是以特言此也云告請先於君乃以命賔及卿大夫者此燕禮與大射皆國君之禮此燕禮毎事皆先請於君大射亦先請於君故故大射初司射自阼階前請於公公許乃命賔及卿大夫郷射西階上告賔曰弓矢旣具乃告於主人遂告大夫是先後異也云其爲司正者亦爲司馬者郷射將射云司正爲司馬此亦於將射司正爲司馬故亦之也􅀂然則上文射人告具射人請賔又云射人請立司正公許射人遂爲司正皆一人也必云司正爲司馬者諸侯有常官嫌與郷射異故言此也􅀂士射則司正不爲司馬云君與賔爲耦者欲見郷射賔與主人爲耦此君與賔爲耦亦是異於郷射也引郷射記君射至龍旜亦其異者也者謂旌與中異何者彼因記國君三處射旌與中各不同云君國中射則皮樹中以翿旌獲白羽與朱羽糅言國中則此燕射也又云於郊則閭中以旌獲謂諸侯大射在郊又云於竟則虎中龍􅎶謂諸侯賔射在竟此皆諸侯禮射雖記在郷射皆與郷射異也云薦旅食乃射者是燕射主於飲酒者此獻士旅食後乃射是燕射於飲酒決大射未爲大夫舉旅之前則射是彼大射主於射故也賔降至再拜注此當至誤爾釋曰自此盡賔反位論賔媵爵於公之節云古者觶字或作角旁氏曰此誤爾者案冬官梓人爲飲器勺一􅂛爵一􅂛觚三􅂛獻以爵而酬以觚一獻而三酬則一豆矣鄭引南郡大守馬季長云觚當爲觶豆當爲斗鄭康成云古者觶角傍氏似觚故誤爲觚時人又多聞觚寡聞觗是以誤爲觚此注與彼同也賔坐祭至反位注反位至象觚釋曰知反位是反席者以其堂下無席堂上乃有之而云賔􅂛成拜不云降明上反位者反席可知也公坐至所賜注至此至爲觚釋曰自此盡士旅酌卒論君爲士舉旅之事云唯公所賜者辭與爲大夫舉旅同也云至此又言興者明公崇禮不倦也者以其說屨􅂛坐之後理當倦今言興明不倦矣有執爵者注士有至之者釋曰無筭坐勸酒有執爵行之者今此爲士舉旅亦有執爵行之􅀂無筭爵然後士有盥升主酌授之者􅀂然前三舉旅皆酬者自酌授人也司正至酬士注欲令惠均釋曰此所命者命大夫也以前三舉旅辯大夫則止今此爲士舉旅故及之云欲令惠均者惠均於室及均於庭也士特牲爵止欲得神惠均於室及均於庭此據人君之惠均於庭也大夫至荅拜注興酬至坐位釋曰此即上文司正所命者也云興酬士者士立堂下無坐位者凡禮堂上有席者坐堂下無席者立是以禮記檀弓工尹商陽是士而云朝不坐堂下無坐位者也大夫至上辯注祝史至及焉釋曰知旅食皆及者以士未得獻時旅酬不及得獻之後旅則及之旅食亦次士得獻故知亦酬及之其庶子以下未得獻者至獻後無筭爵及焉卒主至之禮注庶子至薦也釋曰此一經獻庶子以下之節云庶子掌正六牲之體及舞位使國子脩德學道丗子之官也者案周禮諸子職云大祭祀正六牲之體凡樂事正舞位國子存遊倅使之脩德學道彼天子諸子之官屬大子􅀂據諸侯爲丗子之官引之者以天子謂之諸子諸侯謂之庶子掌公卿大夫士之適子掌事是同故取諸子職解此庶子之事云而與膳宰樂正聮事者以掌正六牲之體得與膳宰聮事掌國子脩德學道得與樂正聮事以其樂正亦掌敎國子故也言此者欲見膳宰得獻此庶子亦得獻之意云樂正亦敎國子以舞者欲見庶子掌國子得與樂正聮事云左右正謂樂正僕人正也僕人正以下至北上鄭知義然者見大射禮而知云左右正者據中庭爲左右大射禮工遷於東僕人正亦與樂正同處名曰左正復云右正明是小樂正在西爲一也􅀂小樂正不在西大射之禮不得有左右正之文又兩面俱縣明大小樂正各監一縣又知僕人正以下在小樂正之北北上者以郷射弟子相工皆在西今僕人正以下亦是相工之人故知亦在西方也又工堂上西階之東相工者冝近其事故在西方樂正之北也又知北上者以大射郷射工遷在下之時皆北上統於樂正今相者以工爲主明在堂下則冝北統於堂上矣下又知大樂正在東縣北者約郷射云縣于洗東北至射時遷樂於阼階下之東南堂前三笴西面北上坐樂正北面立于其南是得爲一證也云􅀂射以下至工後者案大射將射之時工遷於下東坫之東南西面北上坐相者以工爲主故知相工陪於東即在工後也云内小臣奄人掌君隂事隂令后夫人之官也者案天官小臣序官云内小臣奄上士四人其職云掌王之隂事隂令鄭注云隂事羣妃御見之事隂令王所求爲於北宮彼后之官兼云夫人者欲見諸侯夫人内小臣亦與后之内小臣職同故􅀟言之云皆獻於阼階上別於外内臣也者臣云外内者案周禮有外内命夫鄭注云外命夫六郷以出案内命夫朝廷卿大夫則諸侯臣在郷遂及采地者爲外臣在朝廷者爲内臣但外内臣皆獻於西階上此獻於阼階故云別於外内臣也云則磬人以下至盡獻可知也者此據周禮天子有此官諸侯並以下士爲之則諸侯亦有此官以其庭中之樂軒縣別有鍾磬鎛鼓故知也兼言僕人者此經直見僕人正不見僕人師僕人士大射見之内小臣奄人之賤者尚得獻明此等皆得獻可知也知凡獻皆薦者以經云如獻士獻士有薦凡此等獻訖明皆有薦也無筭爵注筭數至而止釋曰自此盡無筭樂論酒行樂作無次數之節云爵行無次無數者此對四舉旅以前皆有次有數此則無次數也士也至荅拜注席下至再拜釋曰自旅酬巳前受公爵皆降拜升成拜至此不復降拜者禮殺故也云席下席西也者賔與卿大夫席皆南面統於君皆以東爲上故知席下爲席西也受賜至後飲注不敢至來也釋曰上巳言君命所賜至此經云受賜自然惠從尊者來但先君受爵似惠不由君來故後飲然後授虚爵是由尊者來故後飲之也此執爵者皆酌行之以徧唯卒爵者興以酬士自酌與之是以郷飲酒郷射皆云辯卒受者興以旅在下者注云不使執觶者酌以其將旅不以己尊􅀌人也執膳至奠之注宴歡至其意釋曰云成其意者君意欲得皆醉今執膳者酌反奠於君前望當君心故云宴歡在於飲酒成其意也注乃猶而也釋曰轉乃爲而者乃是緩辭此將勸士士巳􅂛階大夫即飲不可爲乃故從而解之也士不至皆辟注命徹至受也釋曰云士旅酌亦如之者亦如大夫相酌之法云公有命徹幂者此君尊在東楹之西專大惠故待無筭爵乃徹幂郷飲酒尊在房戸之閒賔主共之故賔至則徹之與此異也云小臣辭不􅂛成拜明雖醉正臣禮也者臣之禮當下拜爲正今不言􅂛成拜者於下巳拜是雖無筭爵巳醉而不倦行臣禮禮之正也云不言賔賔彌臣也者經直言卿大夫皆降不別言賔是燕末賔同於臣言彌者上旅酬云􅀂賔􅀂長猶言賔但言賜不言酬巳是賔卑今乃設賔不言賔是賔彌臣故同臣例也云君荅拜於上示不虛受也者案燕義云禮無不荅言上之不虚取於下也彼釋此言也但彼言不虚取於下者揔申此燕禮君荅拜之事不獨爲此言也遂􅂛至如初注卿大至卒之釋曰云卿大夫降而爵止者上文巳云大夫不拜乃飲實爵士不拜受爵是大夫飲訖爵止也云於其反席卒之者謂上士受得大夫爵此經云士終旅於上如初是於大夫反席士卒之也無筭樂注升歌至亦然釋曰此無筭對上􅂛歌笙閒合各依次第而三終有次有數此則任君之情無次無數其詩樂章亦然亦無次無數宵則至門外注宵夜至客出釋曰凡燕法設燭者或射之後終燕則至宵也或冬之日不射亦宵夏之日不射未必至宵也云燭燋也者古者無麻燭而用荆燋故少儀云主人執燭抱燋鄭云未􅋹曰燋但在地曰燎執之曰燭於地廣設之則曰大燭其燎亦名大燭故詩云庭燎之光毛云庭燎大燭也鄭云夜未央而於庭設大燭毛鄭並指此甸人執大燭之文也司烜氏云凡􅀖之大事共墳燭庭燎玄謂墳大也樹於門外曰大燭於門内曰庭燎言樹則大燭亦在地廣設之而巳此閽人爲大燭於門外者亦是大燭在地者案郊特牲云庭燎之百由齊桓公始也注云僭天子也庭燎之差公蓋五十侯伯子男皆三十文出大戴禮也此亦諸侯禮以燕禮輕故不言庭燎設大燭而巳云甸人掌共薪蒸者天官甸師氏職文引之者以其内有燭燋故使之在門爲大燭地云閽人門人也者案天官閽人掌守王中門之禁諸侯亦當然奏陔注陔夏至奏之釋曰云陔陔夏者案鍾師九夏之中有陔夏九夏皆是詩詩爲樂章故知樂章也云賔出奏陔夏以爲行節也者此及郷飲酒皆於賔出奏陔夏明此爲行節戒之使不失禮云凡夏以鍾鼓奏之者案周禮鍾師云以鍾鼔奏九夏鄭注云先奏鍾次擊鼓是凡夏皆以鍾鼔奏之公與客燕注謂四方之使者釋曰自此盡敢拜賜命論與異國臣將燕使卿大夫就館戒客之辭事但燕異國卿大夫與臣子同唯戒賔爲異故於禮末特見之也云謂四方之使者以其云客以寡君對之故知四方使卿大夫來聘主君將燕之也曰寡至以請注君使至無之釋曰云禮使人各以其爵者案公食大夫云使大夫戒各以其爵以其大聘使卿小聘使大夫爵不同故主君亦以其爵戒之也云上介出請入告者亦約公食使者至館門外客使者上介出請事入告賔但彼食禮重故三辭此燕禮輕故再辭爲異耳又彼見賔出拜辱大夫不荅拜此不言者文不具對曰至敢辭注上介至之辭釋曰云敢者怖懼用勢決之辭也者謂若怖懼之事不避危難用勢往決之故云用勢決之辭也注敢拜至辭也釋曰主君使大夫往戒只爲燕事今客從之者來就燕而云拜主君賜燕之命者謙不必有燕事記燕朝服於寢注朝服至異也釋曰凡記皆記經不具者以經不言燕服及燕處故記人言之也云謂冠玄端緇帶素韠白屨者皆士冠禮文案屨人注天子諸侯吉事皆舄諸侯朝服素裳素韠應白舄而云白屨者引士冠禮成文其實諸侯當白舄其臣則白屨也鄭注周禮屨人云複下曰舄襌下曰屨下謂底以此爲異也云燕於路寢相親昵也知燕於寢者以其饗在廟明燕在寢私處可知也引漢法欲見與古異者周時玄冠服則緇布衣今衣皮弁服是其異也亨于門外東方注亨于至掌也釋曰此君禮故云臣所掌案公食記云亨于門外東方注云必於門外者大夫之事也注不同者以其饗食在廟嚴凝冝親監視不得言臣所掌故注云大夫之事也郷飲酒亨狗于堂東北者非君禮是臣於堂東北不在外者冝主人親供又法陽氣之所始故三者注皆不同也若與至讓􅂛注四方至賔也釋曰云自戒至於拜至皆如公食者此燕用狗彼用大牢此戒賔再辭彼三辭至於卿大夫立位皆不同而云如公食者謂除此之外如之􅀂然依公食從首使大夫戒各以其爵上介出請入告巳下至北面再拜稽首皆如之饌具之等不如之也云亦告饌具而後公即席小臣請執幂請羞者乃迎賔也者言此者欲見燕四方賔此等依上文與燕己臣子同亦不如公食以其公食公無席又無入廟之事又公食無請執幂羞膳故別言此也賔爲至爲賔注苟且至燕也釋曰云主國君饗時親進醴于賔者謂行聘享訖禮賔之時君親酌醴進於賔若然前有饗食不言之者饗禮亡無以可言食禮又無酒醴所獻之事故不言而云饗時也云今燕又冝獻焉者案上燕己臣子使宰夫爲主人知此親獻者若不親獻即同己臣子賔何須辭之而爲苟敬故知君當親獻焉云至此􅂛堂而辭讓者若此時􅂛堂不辭即行燕賔之禮故知辭之在初􅂛堂時云欲以臣禮燕爲恭敬也者正謂在阼西北面故云席之如諸公之位也云言苟敬者賔實主國所冝敬也者賔實主國所冝敬但爲辭讓故以命介爲賔不得敬之今雖以介爲賔不可全不敬於是席之於阼階西且敬也故云苟敬也云不嚌啐似若尊者然也者案此燕禮與大射郷射皆不嚌啐是諸公如郷禮今聘卿在諸公之坐亦不嚌不啐是爲似若諸公尊者然也云介門西北面西上者約聘禮而知也云公降迎上介以爲賔揖讓􅂛如初禮者此如上文燕己臣子以大夫爲賔者同故云如初禮也云主人獻賔獻公旣獻苟敬乃媵觚者若上燕己臣子之時獻賔獻公旣即媵觶以酬賔但苟敬之前冝有薦有俎實與君同明知獻公後即獻苟敬乃可酬賔也云羣臣即位如燕者如上燕己臣子同􅀂然羣臣不待迎賔入乃從君入者以其皆蒙獻酬故因其先至寢門故小臣引之即入不待賔入後也無膳尊無膳爵注降尊以就卑釋曰郊特牲云三獻之介君專席而酢焉此降尊以就卑也注云三獻卿大夫來聘主君饗燕之以介爲賔賔爲苟敬則徹重席而受酢也專猶單也彼與此事同故鄭引彼經以證此燕己臣子不見有君親受賔酢􅀂燕異國臣子得有專席受酢者獻卿大夫之後依次各爲此三人舉旅獻士之後賔乃媵觶於公賔取所媵觶爲士舉旅應以爲酢君君專席而受之也與卿至爲賔注不以至無燕釋曰此謂與己臣子燕法若與異國賔燕皆用上介爲賔如上說也云公父文伯巳下是魯語文此三人皆魯大夫自相燕法云此之謂也者此謂不使所爲燕者爲賔之義云君恒以大夫爲賔者大夫卑雖尊之猶逺於君者案禮記燕義云不以公卿爲賔而以大夫爲賔爲疑也明嫌之義也注云公卿尊矣復以爲賔則尊與君大相近是不用公卿爲賔恐逼君用大夫爲賔雖尊之猶逺於君不畏逼君也羞膳至士也注尊君至於士釋曰經直云請執幂與羞膳不辨其人故記人言之云尊君也膳宰卑於士者言膳宰別小膳宰也以其下云羞卿者小膳宰明於君者士也士尊於小膳宰也􅀂然士則膳宰之長者故下注小膳宰云膳宰之佐也􅀂以至樂闋注肆夏至樂焉釋曰自此盡若舞則勺論臣子有王事之勞與之燕之事云若者不定之辭以其常燕已臣子無樂王事之勞或有或無故言􅀂也云肆夏樂章也今亡者鄭注鍾師云九夏皆詩篇名頌之族􅀋也此歌之大者載在樂章樂崩亦從而亡是以頌不能具也云以鍾鑮播之鼔磬應之者鍾師云掌金奏鄭注云擊金以爲奏樂之節金謂鍾及鎛又云凡樂事以鍾鼓奏九夏鄭注云先擊鍾次擊鼓是奏肆夏時有鍾鑮鼓磬彼經注雖不言磬但縣内有此四者故鄭兼言磬也言所謂金奏也者所謂鍾師掌金奏也云記曰者此鄭引二記之文何者云入門而縣興是仲尼之文仲尼燕居云兩君相見揖讓而入門入門而縣興揖讓而􅂛堂升堂而樂闋郊特牲云賔入大門而奏肆夏示易以敬也必引二記文者以燕在寢賔及庭及寢庭與仲尼燕居入門而縣興事相􅀋故引之證賔及庭樂作之義也此肆夏以金奏之故引郊特牲示易以敬證用肆夏之義也不取賔入大門者大門非寢門故也云卿大夫有王事之勞則奏此樂焉知者以發首陳君與臣子常燕及聘使之臣燕次論四方賔燕今此言賔及庭奏肆夏則非㝷常大夫爲賔與宰夫爲主人相對者謂若賔爲苟敬四方賔之􅀋特奏肆夏其事旣重若非有王事之勞何以致此故知是臣有王事之勞者乃奏此樂也􅂛歌至三成注新宫至終也釋曰鹿鳴不言工歌新宫不言笙奏而言升歌下管者欲明笙奏異於常燕常燕即上所陳四節是也今工歌鹿鳴三終與笙奏全別故特言下管新宫乃始笙入三成者止謂笙奏新宫三終申說下管之義云新宫小雅逸篇也知在小雅者以配鹿鳴而言鹿鳴是小雅明新宫小雅可知􅀂舞則勺注勺頌至功也釋曰言若者或爲之舞或不爲之舞在於君意故以不定而言云舞則勺者謂爲之舞則歌勺詩以爲曲云勺頌篇告成大武之樂歌也者勺詩序文云其詩曰於鑠王師遵養時晦者鑠美也言於呼美武王之師遵循也循養晦昧之紂三分天下猶服事於殷又曰實維爾公允師者公事允信也言武王伐紂實維汝武王之事信得用師之道云旣合郷樂者以文承合郷樂之下故知旣合郷樂也云萬舞而奏之者釋經舞時作周萬舞之舞而奏勺詩宣八年公羊傳云壬午猶繹萬入去籥傳曰萬者何干舞也謂秉干舞以奏勺詩也云所以美王侯勸有功也者天子諸侯作之是美王侯亦所以勸有功也唯公與賔有俎注主於至無俎釋曰主於燕其餘可以無俎者對大射辨尊卑公卿皆有俎其牲用狗則同也獻公至聽命注授公至受之釋曰謂􅀂主人獻公賔媵觶於公雖非獻亦釋此辭也凡栗階不過二等注其始至􅂛堂釋曰凡堂及階尊者髙而多卑者庳而少案禮器云天子之堂九尺諸侯七尺大夫五尺士三尺士冠禮降三等受爵弁鄭注云降三等下至地則士三等階以此推之則一尺爲一階大夫五尺五等階諸侯七尺七等階天子九尺九等階可知今云凡栗階不過二等言凡則天子九等巳下至士三等皆有栗階之法栗階不過二等據上等而言故鄭云其始􅂛猶聚足連歩一也故曲禮云渉級聚足連歩以上鄭注云渉等聚足謂前足躡一等後足從之併連歩謂足相隨不相過也此即聚足一也天子巳下皆留上等爲栗階左右足各一發而􅂛堂其下無問多少皆連歩􅄂記云主人之􅂛降散等鄭注云散等栗階則栗階亦名散等凡􅂛階之法有四等連歩一也栗階二也歴階三也歴階謂從下至上皆越等無連歩若禮記檀弓云杜蕢入寢歷階而􅂛是也越階四也越階謂左右足越三等若公羊傳云趙盾避靈公躇階而走是也凡公至侍臣注旣拜至惠也釋曰云旣拜謂自酌􅂛拜時也者此即上賔得君酬酒飲訖自酌降拜􅂛時請旅侍臣云擯者阼階下告于公還西階下告公許旅行者此約大射而知也凡薦至宰也注謂於至亦士釋曰云謂於卿大夫以下者以其執幂與羞膳於君是士則知此凡者於卿大夫也云上特言羞卿者小膳宰者欲絶於賔羞賔者亦士者鄭意於此言凡揔卿大夫於文足矣上文君下特言羞卿者小膳宰者欲見直言君不須言賔以其賔之薦俎與君同明羞膳亦與君同不使小膳宰故云欲絶於賔爲羞賔者亦士也有内羞注謂羞至粉餈釋曰云謂羞豆之實酏食糝食者天官醢人云羞豆之實酏食糝食鄭注云酏􅊡也内則曰取稻米舉糔溲之小切狼臅膏以與稻米爲􅊡又曰糝取牛半豕之􅁏三如一小切之與稻米稻米二􅁏一合以爲餌煎之是也云羞籩之實糗餌粉餈者籩人職云羞籩之實糗餌粉餈鄭注云此二物皆粉稻米黍米所爲也合蒸曰餌餅之曰餈糗者擣粉熬大豆爲之爲餌餈之黏著以粉之耳餌言糗餈言粉互相足是也糗熬之亦粉之其粉擣之亦糗之是互相足也􅀂飲君燕則夾爵釋曰夾爵者將飲君先自飲及君飲訖又自飲爲夾爵注不纁襦厭於君釋曰郷射記大夫對士射袒纁襦此對君􅁏袒故云厭於君也􅀂與至爵者注受賜至惠也釋曰謂公取二大夫所媵觶上者以酬賔是也云賔降洗􅂛媵觶于公者謂上獻士訖賔媵觶于公是荅恩惠也有房中之樂注􅁌歌至君子釋曰云􅁌歌周南召南之詩而不用鍾磬之節者此文承四方之賔燕下而云有明四方之賔而有之知不用鍾磬者以其此二南本后夫人侍御于君子用樂節是本無鍾磬今若改之而用鍾磬當云有房中之奏樂今直云有房中之樂明依本無鍾磬也􅀂然案磬師云敎縵樂燕樂之鍾磬注云燕樂房中之樂所謂隂聲也二樂皆敎其鍾磬房中樂得有鍾磬者彼據敎房中樂待􅀕祀而用之故有鍾磬也房中及燕則無鍾磬也儀禮䟽卷第十五
