body:
  text: 唐朝散大夫行太學博士􅀪文館學士臣賈公彦等撰至于至北上注統于壙釋曰自此盡拜送論至壙陳器及下棺訖送賔之事云統于壙者對廟中南上此則北上故云統于壙也茵先入注當藉至茵焉釋曰云當藉柩也者解茵先入之意以其茵入乃後屬引下棺於其上以須藉柩故茵先入云元士則葬用輁軸加茵焉者元士謂天子之士葬時先以輁軸由羨道入乃加茵於其上乃下棺於中知元士葬用輁軸者檀弓云孺子䵍之喪哀公欲設撥注云撥可撥引輴車所謂紼問於有若有若曰其可也君之三臣猶設之顔柳曰天子龍輴而椁幬諸侯輴而設幬爲榆沈故設撥三臣者廢輴而設撥竊禮之不中者也以此言之天子諸侯殯葬皆用輴朝廟用輴可知大夫雖殯葬不用輴朝廟亦用輴以其士殯葬不用輁軸朝廟得用之明大夫朝廟得用輴故上注云大夫諸侯以上有四周謂之輴以其大夫諸侯以上有四周謂之輴以其大夫朝廟得用輴故言之也諸侯之大夫有三命再命一命殯葬不得用輴天子之元士亦三命再命一命葬得用輁軸者春秋之義王人雖微猶在諸侯之上明天子之士尊謂之爲元元者善之長故得用輁軸不與諸侯大夫同也屬引注於是至爲燭釋曰云於是􅀃載者謂柩車至壙解􅀃去載與披及引之等除飾者解去帷荒池紐之等然後下棺云更屬引於緘耳者案喪大記云君窆以衡大夫士以咸鄭注云衡平也人君之喪又以木橫貫緘耳居旁持而平之今齊人謂棺束爲緘以此而言則棺束君三衽三束大夫士二衽二束束有前後於束末皆爲緘耳以紼貫結之而下棺人君又於橫木之上以屬紼也主人至不哭注俠羨道爲位釋曰主人袒者爲下棺變婦人不言北上亦如男子北上可知不哭者爲下棺冝靜云俠羨道爲位者羨道謂入壙道上無􅀒土爲羨道天子曰隧塗上有負土爲隧僖二十五年晉文公請隧弗許是也乃窆至無筭注窆下棺也釋曰主人哭踊不言處還於壙東西面也云窆下棺者春秋謂之塴皆是下棺之名也襲贈至如初注丈八至五合釋曰云丈八尺曰制者朝貢禮及巡狩禮皆有此文以丈八尺名爲制昏禮幣用二丈取成數凡禮幣皆用制者取以儉爲節聘禮云釋幣制􅀇纁束注云凡物十曰束􅀇纁之率􅀇居二纁居二此注云二制合之束十制五合者則毎一端丈八尺二端爲一匹五匹合爲十制也卒袒至三襲注主婦至反位釋曰卒謂贈卒更袒拜賔云反位者各反羨道東西位其男賔在衆主人之南女賔在衆婦之南賔出則拜送注相問至中焉釋曰鄭知賔是相問之賔也凡弔賔有五此舉中者案雜記云相趨也出宫而退相揖也哀次而退相問也旣封而退相見也反哭而退朋友虞祔而退注云此弔者恩薄厚去遲速之節也相趨謂相聞姓名來㑹喪事也相揖甞㑹於他也相問甞相惠遺也相見甞執摯相見也以此而言此經旣葬而退是相見問遺之賔舉中以見上下五者去即皆拜送可知藏器於旁加見注器用至置翣釋曰云器用器役器也者用器即上弓矢耒耜之等役器即上甲胄干笮之屬此器中亦有樂器不言者省文知有用器役器者以下別云包筲之等則所藏者是此器也云見棺飾也者飾則帷荒以其與棺爲飾是以喪大記云飾棺君龍帷黼荒大夫畫帷畫荒士布帷布荒注云飾棺者以華道路及壙中不欲衆惡其親也此柩入壙還以帷荒加於柩故鄭注云及壙中也云更謂之見者加此則棺柩不復見矣者以其唯見此帷荒故名帷荒爲見是棺柩不復見也云先言藏器乃云加見者器在見内也内之者明君子之於事終不自逸也者以用器役器近身陳之是不自逸也引檀弓者見帷荒在柩外周人名爲牆若牆屋然其外又置翣爲飾也藏包筲於旁注於旁至容甒釋曰云於旁者在見外也者以其加見乃云藏包筲故知見外也云不言罋甒饌相次可知者以其陳器之法後陳者先用罋甒後用包筲包筲藏明罋甒先藏可知故云相次可知云四者兩兩而居者謂包筲居一旁罋甒居一旁故云兩兩而居也引喪大記者欲見椁内棺外所容寛狹得容器物之意也加折至抗木注冝次也釋曰云冝次也者冝謂折上陳之美面郷上今用即美面郷下抗席又覆之又折冝承席席冝承木皆是其冝也次者木則先陳後用席則後陳先用是其次也實土至郷人注謝其勤勞釋曰案雜記云郷人五十者從反哭四十者待盈坎注云非郷人則少長皆反以此而言於時主人未反哭郷人並在故今至實土三徧主人拜謝之謝其勤勞勤勞者謂在道助執紼在壙助下棺及實土也即位踊襲如初注哀親之在斯釋曰謂旣拜郷人乃於羨道東即位踊無筭如初也云哀親之在斯者以親之在斯故哀號甚踊無筭乃反至北上注西階至神位釋曰自此盡門外拜稽顙論主人反哭賔弔之事反哭者拜郷人訖反還家哭于廟入􅂛西階東面哭云西階東面反諸其所作也者案檀弓云反哭􅂛堂反諸其所作也注云親所行禮之處是也云反哭者於其祖廟者謂下士祖禰共廟故下經賔出主人送于門外遂適于殯宫適士二廟者自殯宫先朝禰後朝祖今反哭則先於祖後于禰遂適殯宫也案春秋僖八年經書用致夫人左氏云凡夫人不殯於廟者春秋之丗多行殷法不與禮合也云不於阼階西面西方神位者以特牲少牢主人行事􅂛降皆由阼階今不於阼階故決之以西方神位知者特牲少牢皆布席于奥殯又在西階是西方神位主人非行事直哭而巳故就神位婦人至阼階注辟主人也釋曰反哭之禮主人男子等先入主婦婦人等後入故婦人入丈丈在位者皆踊婦人不􅂛西階者由主人在西階故鄭云辟主人主婦至踊三注入于至更也釋曰案檀弓云主婦入于室反諸其所養也鄭注云親所饋食之處但主人旣在西階親所行禮之處以婦人無外事故於饋食之處哭也云出即位堂上西面也者自小斂奉尸夷于堂巳後主婦等位皆在阼階上西面是以知出即位者阼階上西面也云拾更也者凡成踊而拾皆主人踊主婦人踊賔乃踊故云更也賔弔至稽顙注賔弔至無曰釋曰知賔弔是衆賔之長者以其弔賔皆在堂下今􅂛堂釋詞故知賔中爲首者賔之長也云反而亡焉失之矣於是爲甚者亦檀弓文引之證周人反哭而弔哀之甚也云弔者北面者以經云賔弔者􅂛自西階即云曰如之何不見弔者改面之文明􅂛堂北面可知云主人拜于位者拜于西階上東面位知者以其上經主人􅂛自西階東面故知仍東面位也云不北面拜賔東者以其亦主人位也者郷飲酒郷射主人酬賔皆於賔東主人位特牲少牢助祭之賔主人皆拜送于西階東面故於東面不移以其亦主人位故也賔降至稽顙釋曰此於雜記五賔當相見之賔故鄭上注云舉中焉明五賔皆依節而弔也遂適至踊三注啓位至之位釋曰案士喪禮朝夕哭位云婦人即位于堂南上主人堂下直東序西面啓殯時云主人位如初又云主人入即位則此主啓位婦人亦即位于堂東面主人即位于堂下直東序西面直東序西面即中庭位也兄弟至拜送注兄弟至以歸釋曰丈夫婦人在殯宫拾踊旣訖兄弟入門者出主人拜而送之知兄弟小功以下也者此兄弟等始死之時皆來臨喪殯訖各歸其家朝夕哭則就殯所至葬開殯而來喪所至此反哭亦各歸其家至虞卒祭還來預焉故喪服小記云緦小功虞卒哭則皆免是也云異門大功亦可以歸者大功以上有同財之義爲異門則恩輕故可歸也衆主至就次注次􅀝廬也釋曰云衆主人出門者則主人拜送兄弟因在門外云闔門者􅀑神尚幽闇云次􅀝廬也者以未虞以前仍依於初東壁下􅀝木爲廬齊衰居堊室大功張幃喪服傳云旣虞柱楣前屏此直云􅀝廬據主人斬衰者而言猶朝夕哭不奠注是日至易奠釋曰自啓殯已來常奠今反哭至殯宫猶朝夕哭如前不奠耳檀弓云葬日虞弗忍一日離也是日也以虞易奠故不奠也三虞注虞喪至日離釋曰云虞喪祭名日中而虞不忍一日離皆檀弓文案彼云葬日虞弗忍一日離也又云卒哭曰成事是日也以吉祭易喪祭喪祭則三虞也云虞安也者主人孝子葬之時送形而往迎魂而返恐魂神不安故設三虞以安之云骨肉歸于土精氣無所不之者案檀弓云延陵季子葬其長子於嬴博之閒旣窆左袒右還其封云骨肉歸復于土命也若魂氣則無不之是其骨肉歸于土精氣無所不之之事言此者欲見迎魂而反以虞祭安之是以鄭云孝子爲其彷徨三祭以安之云朝葬日中而虞即檀弓所云葬日虞弗忍一日離又下士虞記亦云日中而行事是也卒哭注卒哭至而巳釋曰云卒哭三虞之後祭名者三虞者再虞用柔日後虞改用剛日又隔柔日卒哭用剛日故云卒哭三虞之後祭名也云始朝夕之閒哀至則哭至此祭止也者始死主人哭不絶聲小斂之後以親代哭亦不絶聲至殯後主人在廬廬中思憶則哭又有朝夕於阼階下哭至此爲卒哭祭唯有朝夕哭而巳言其哀殺也然則喪有三無時哭者始死至殯哭不絶聲一無時旣殯廬中思憶則哭二無時卒哭祭後唯有朝夕哭爲有時至練祭之後又止朝夕哭唯有堊室之中或十日或五日一哭通前爲三無時之哭也是以檀弓云哭無時使必知其反也是據練後哭無時也明日以其班祔注班次至爲胖釋曰云班次也者謂昭穆之次第云祔卒哭之明日祭名者以卒哭用剛日祔用柔日是以下士虞記云卒哭祭即云明日以其班祔故云卒哭之明日祭名云祔猶屬也祭昭穆之次而屬之者以其孫祔於祖孫與祖昭穆同故以孫連屬於祖而就祖而祭之也記釋曰凡記者皆是經不具記之使充經文理備足也士處至墉下注將有至爲於釋曰云將有疾乃寢於適室者以士喪篇首云士死于適室此記云適寢者適室一也故互見其文若不疾則在燕寢將有疾乃寢卧于適室故變室爲寢也云東首者郷生氣之所云墉下者墉謂之牆喪大記謂之北牖下必在北墉下亦取十一月一陽生於北生氣之始故也士喪禮論其死事故不云疾此記人記其不備凡人死皆因疾故記其疾之所在也有疾疾者齊注正情至其室釋曰云有疾者旣有疾當齊戒正情性故也云適寢者不齊不居其室者案郷黨孔子齊居必遷坐又祭義云致齊於内散齊於外皆在適寢但散齊得郷外故云於外耳是其齊居適寢也養者皆齊注憂也釋曰案曲禮云父母有疾冠者不櫛行不翔笑不至矧怒不至詈不飲酒食肉疾止復故男女養疾皆齊戒正情性也徹琴瑟注去樂釋曰君子無大故琴瑟不離其側今以父母有疾憂不在于樂故去之案喪大記云疾病内外皆埽君大夫徹縣士去琴瑟注云凡樂器天子宫縣諸侯軒縣大夫判縣士特縣去琴瑟者不之士亦謂子男之士不命者也疾病外内皆埽注爲有至曰病釋曰云疾甚曰病者則外内皆埽爲賔客來問疾自絜清也徹褻衣加新衣注故衣至惡之釋曰此文承疾病者及養病者則徹褻衣據死者而言則生者亦去故衣服新衣矣徹褻衣謂故􅀇端已有垢汙故來人穢惡是以徹去之加新衣者謂更加新朝服喪大記亦云徹褻衣加新衣鄭注云徹褻衣則所加者新朝服矣互言之也加朝服者明其終於正也互者褻衣是􅀇端新衣是朝服朝服言新則褻衣是故􅀇端言褻朝服是絜不褻矣各舉一邊而言明皆有言也必知褻衣是􅀇端新衣是朝服者案司服士之齊戒服􅀇端則疾者與養疾者皆齊明服􅀇端矣檀弓云始死羔裘􅀇冠者易之而已羔裘􅀇冠則朝服故知臨死所著新衣則朝服也故鄭云終於正也御者至持體注爲不至之人釋曰案喪大記云體一人注云爲其不能自屈伸也若然四體各一人亦爲不能自轉側詩云輾轉反側據身云不能自屈伸據手足二文相兼乃具云御者今時侍從之人者士雖無臣亦有侍御僕從近人終於其手也屬纊以俟絶氣注有其至新絮釋曰案喪大記注云纊今之新緜易動揺置口􅈹之上以爲􅃸亦二注相兼乃具云纊新絮即新緜禹貢豫州貢纎纊明纊新緜也男子至之手注備褻釋曰案喪大記注云君子重終爲其相褻若然疾時使御者持體并死于其手若婦人則内御者持體還死于其手故喪大記云其母之喪則内御者抗衾而浴僖三十三年冬公薨于小寢左氏傳曰即安服注云小寢夫人寢也禮男子不絶于婦人之手今僖公薨于小寢譏其近女室是男子不絶于婦人之手備褻也乃行禱于五祀注盡孝至曰行釋曰云盡孝子之情者死期巳至必不可求生但盡孝子之情故乃行禱五祀望祐助病者使之不死也云五祀博言之士二祀曰門曰行者祭法文今禱五祀是廣博言之望助之者衆其言五祀則與諸侯五祀同則祭法云諸侯五祀是也乃卒注卒終也釋曰自此盡遷尸論上篇始死遷尸於南牖之事曲禮與爾雅皆云大夫曰卒士曰不禄今士不言不禄而云卒者義取君子曰終小人曰死故鄭云卒終也美言之使與大夫同稱也主人啼兄弟哭注哀有至易之釋曰云哀有甚有否者啼即泣也檀弓云皐柴泣血三年注云言泣無聲如血出則啼是哀之甚發聲則氣竭而息之聲不委曲若往而不反對齊衰以下直哭無啼是其否也知於是始去笄纚服深衣者禮記問喪云親始死雞斯徒跣扱上衽注云雞斯當爲笄纚上衽深衣之裳前是其親始死笄纚服深衣也引檀弓者證服深衣易去朝服之事也設牀至設枕注病卒至爲茨釋曰經直云士死于適室憮用斂衾不云此等之事故記人言之也云病卒之閒廢牀至是設之者喪大記云疾病寢東首於北牖下廢牀是其始死亦因在地無牀復而不蘇乃設牀於南牖下有枕席是病卒之閒廢牀於是設之云事相變者謂疾病時去牀旣死設牀是生死事相變也衽卧席者曲禮云請席何郷請衽何趾鄭云坐問郷卧問趾因於隂陽是衽爲卧席昏禮注云衽卧席也遷尸注徙於至斂衾釋曰云徙於牖下者並有之事以其始死卒未有醴則用新酒若然醴酒俱有容有醴則用之不更用酒以其始死不備故也若小斂以後則酒醴具設甒二醴酒是也赴曰至某死注赴走至作訃釋曰云母妻長子則曰君之臣某之某死者上某是士名下某是母妻長子假令長子則云長子某甲母妻則婦人不以名行直云母與妻也云赴走告也者言赴取急疾之意故云赴走告也云今文赴作訃者雜記作訃者義取以言語相道亦一塗也室中至亦坐注別尊卑也釋曰云兄弟有命夫命婦在焉亦坐者若無命夫命婦則皆立可知此士喪禮故鄭云別尊卑也尊謂命夫命婦案大記君之喪主人主婦坐以外皆立若大夫喪主人主婦命夫命婦皆坐以外皆立也士之喪主人父兄主婦姑姊妹皆坐鄭云士賤同宗尊卑皆坐此命夫命婦之外立而不坐者此謂有命夫命婦來兄弟爲士者則立若命夫命婦則同宗皆坐也尸在至不出注不二主釋曰經直云主人唯君命出不言衆主人故記人辨之云衆主人不出在尸東耳云不二主者曽子問云喪有二􅀌廟有二主爲非禮不云不二􅀌而云不二主者彼廟主與喪􅀌相對此􅀌不對廟主􅀌亦是喪主故以主言之也禭者至不坐注牀髙由便釋曰云牀髙由便者曲禮云授立不跪授坐不立此委衣於牀者不坐委之以牀髙亦如授立不坐之義故云由便也其襚至致命注始死時也釋曰云始死時者謂未小斂之前尸在室中戸西故北面致命若小斂之後奉尸夷於堂則中庭北面致命夏祝至盛之注差擇之釋曰經直云祝淅米于堂南面用盆不言夏與盛之故記人言之注内御至冠也釋曰云内御女御者以婦人稱内故以女御爲内御婦女不死男子之手故知内御女御也天子八十一御妻亦曰女御與此別也云無笄猶丈夫之不冠也者喪服小記云男子冠而婦人笄士喪禮男子免不冠此云婦人不笄與男子不冠同故云猶丈夫不冠也設明至中帶注中帶至禪襂釋曰經直云設明衣不辨男子與婦人故此記人云設明衣者男子其婦人則設中帶鄭云中帶若今襌襂者鄭舉目驗而言但男子明衣之狀鄭不明言亦當與中帶相􅀋有不同之處故別雖名中帶亦號明衣取其圭潔也卒洗至左齻注象齒堅釋曰經直云實貝於尸左右及中不言逺近故記人辨之云右齻左齻謂牙兩畔最長者象生時齒堅也夏祝徹餘飯釋曰經不言夏祝徹故記人言之瑱塞耳釋曰經直云瑱用白纊用掩之不云塞耳恐同生人縣于耳旁故記人言之也掘坎至其壤釋曰經直云甸人掘坎于階閒不辨大小故記人明之注塊堛也釋曰云塊堛者爾雅釋言文孫氏云堛土塊也明衣至下膝注幕布至深也釋曰云明衣裳用幕布則衣裳同用幕布云袂屬幅長下膝者唯據衣而言以其下別云裳故也云幕布帷幕之布者周禮幕人云掌帷幕幄帟綬鄭云帷幕皆以布爲之幄帟皆以繒爲之以其帷幕所以張之於外恐不相勝舉故須用布鄭亦取此文用幕布爲義也故此云帷幕之布云􅂛數未聞者以其不云䟽布直云幕布故云未聞也云屬幅不削幅者布幅二尺二寸凡用布皆削去邊幅旁一寸爲二寸計之則此不削幅謂繚使相著還以袂二尺二寸云長下膝者謂爲此衣長至膝下云又有裳於蔽下體深者凡平爲衣以其有裳故不至膝下此又有裳而言膝下故云於蔽下體深也蔽下體解此經衣至膝下也有前至及觳注不辟至被土釋曰云不辟質也者以其凡男子裳不連衣故皆前三幅後四幅辟積其要閒示文今此亦前三後四不辟積者以其一服不動不假上狹下寛也云凡他服短無見膚長無被土者他服謂深衣深衣云短母見膚注云衣取蔽形又云長母被土注云爲汙辱是也此裳及觳至足跗亦是不被土故引爲證也縓綼緆注一染至曰緆釋曰云一染謂之縓者爾雅文謂一入赤汁染之即漢時紅故舉以爲況也云飾裳在幅曰綼者案深衣云純袂縁純邊注云純謂縁之也縁邊衣裳之側廣各寸半則表裏共三寸矣此在幅亦衣裳之側縁法如彼也設握至于􅓲注􅓲掌至結之釋曰手無決者以其經巳云設握麗于􅓲與決連結據右手有決者不言左手無決者故記之云以握繫一端繞􅓲還從上自貫反與其一端結之者案上文握手用􅀇纁裏長尺二寸今裏親膚據從手内置之長尺二寸中掩之手􅂊相對也兩端各有繫先以一端繞􅓲一帀還從上自貫又以一端郷上鉤中􅃌反與繞􅓲者結於掌後節中甸人築坅坎注築實至曰坅釋曰經直云甸人掘坎不云還使甸人築故記人明之還使甸人築之也隷人涅廁注隷人至不用釋曰知隷人罪人者案周禮司厲職云其奴男子入於罪隷則中國罪人對夷隷蠻隷貉隷之等是征四夷所得也故鄭舉漢法今之徒役作者也云爲人復往褻之又亦􅀑神不用者若然古者非直不共偪浴亦不共廁故得云死者不用也旣襲至中庭釋曰士之喪死日而襲經不云中庭設燎故記明之也厥明滅燎陳衣注記節釋曰云記節者爲小斂陳衣當襲之明旦滅燎之時故記節正經不云故記人亦明之也凡絞至朝服注凡凡至爲輪釋曰言凡非一之言以其唯小斂至大斂有絞大斂又有紟故知凡中有大小斂也言􅀋如朝服者雜記云朝服十五􅂛是也儀禮䟽卷第四十
