body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彦等撰少牢饋食禮第十六鄭目録云諸侯之卿大夫祭其祖禰於廟之禮羊豕曰少牢少牢於五禮屬吉禮大戴第八小戴第十一別録第十六釋曰鄭知諸侯之卿大夫者曲禮下云大夫以索牛用大牢是天子卿大夫明此用少牢爲諸侯之卿大夫可知賔尸是卿不賔尸爲下大夫爲異也少牢饋食之禮注禮將至之牲釋曰自此盡如初儀論卿大夫祭前十日先筮日之事云禮將祭祀必先擇牲繫于牢而芻之者案周禮地官充人職云掌繫祭祀之牲牲祀五帝則繫于牢芻之三月享先王亦如之注云牢閑也必有閑者防禽獸觸齧養牛羊曰芻三月一時節氣成案楚語諸侯卿大夫等雖不得三月亦皆有養牲之法故鄭據焉言芻之唯據羊若豕則曰豢故地官槁人職云掌豢祭祀之犬樂記亦云豢豕作酒非以爲禍不言豕曰豢文略也云羊豕曰少牢者對三牲具爲大牢若然豕亦有牢稱故詩公劉云執豕於牢下經云上利􅂛牢心舌注云牢羊豕也是豕亦稱牢也但非一牲即得牢稱一牲即不得牢名故郊特牲與士特牲皆不言牢也日用丁己注内事至乃筮釋曰云内事用柔日曲禮文彼云外事以剛日内事以柔日内事謂冠昏祭祀出郊爲外事謂征伐巡守之等若然甲丙戊庚壬爲剛日乙丁己辛癸爲柔日今直言丁己者鄭云取其令名自丁寕自變改皆爲謹敬之義故也云必先諏此日明日乃筮者以其舉事尚朝旦不可今日謀日即筮是以此文云日用丁己乃云筮旬有一日是別於後日乃筮也筮旬有一日注旬十至之己釋曰知旬十日者此云旬有一日以先月下旬之己筮來月上旬之己者除後己之前通前已爲十日十日爲齊後己日則祭􅀂然筮日即齊乃可故下文筮日即云乃戒官不云厥明也鄭直云下旬己上旬己據用己一日而言若用丁言先月下旬丁筮來月上旬丁若丁己之外辛乙之等皆然鄭必言來月上旬不用中旬下旬者吉事先近日故也筮於至主人注史家至事者釋曰云主人朝服西面于門東者此爲將筮故西面案下文爲期于廟門外主人門東南面注云主人不西面者大夫尊於諸臣有君道也者彼不爲卜筮之事故主人南面也又主人朝服者爲祭而筮還服祭服是以上篇特牲筮亦服祭服玄端以此而言天子諸侯爲祭卜筮亦服祭服案司服云享先王則衮冕祭義云易抱􅀛南面天子衮冕北面雖有明知之心必進斷其志焉是爲祭而卜還服祭服則諸侯爲祭卜筮服祭服可知若爲他事卜筮則異於此孝經注云卜筮冠皮弁衣素積百王同之不改易士冠主人朝服注云尊蓍􅀛之道是也云史家臣主筮事者案雜記大夫士筮亦云史練冠長衣是史主筮事也主人至尚饗注丁未至歆也釋曰云丁未必亥也直舉一日以言之耳者以日有十辰有十二以五剛日配六陽辰以五柔日配六隂辰若云甲子乙丑之等以日配辰丁日不定故云丁未必亥經云丁亥者不能具載直舉一日以丁當亥而言餘或以己當亥或以丁當丑此等皆得用之也云禘于大廟禮曰日用丁亥者大戴禮文引之證祭用丁亥之義也云不得丁亥則己亥辛亥亦用之者鄭云此吉事先近日唯用上旬若上旬之内或不得丁己以配亥或上旬之内無亥以配日則餘隂辰亦用之故春秋宣八年經書辛巳有事於大廟文二年經書八月丁卯大事于大廟昭十五年經書二月癸酉有事于武宫桓十四年乙亥甞此等皆不獨用丁己之日與亥辰也云無則茍有亥焉可也者此即乙亥是也必須亥者案月令云乃擇元辰天子乃耕注云元辰蓋郊後之吉亥也隂陽式法亥爲天倉祭祀所以求福冝稼于田故先取亥上旬無亥乃用餘辰也云伯某且字也者以某在伯下若某在子上者某是伯仲叔季以某且字不得在子上故也云大夫或因字爲謚者謂因二十冠而字爲謚知者以某且字者觀德明功若五十字人人皆有非功德之事故知取二十字爲謚也春秋者案􅀮八年左氏傳云無駭卒羽父請謚與族公問族於衆仲衆仲對曰天子建德因生以賜姓胙之土而命之氏諸侯以字爲謚因以爲族公命以字爲展氏彼無駭之祖公子展以展爲謚在春秋前其孫無駭取以爲族故公命爲展氏若然無駭賜族不賜謚引之者大夫有因字爲謚證伯某某或且字有謚者即某爲謚也此經云伯某是正祭之稱也若時有告請及非常祭祀則去伯直云且字言某甫則聘禮賜饔唯羮飪筮一尸若昭若穆僕爲祝祝曰孝孫某薦嘉禮于皇祖某甫是也若卿大夫無謚正祭與非常祭一皆言五十字在子上與士正祭禮同則云某子故聘禮記云皇考某子是也特牲士禮無謚正祭稱皇考某子若士告請之祭則稱且字故士虞記云適爾皇祖某甫是也史曰至擊筮注將問至而神釋曰云史曰諾西面于門西者謂旣云諾乃之於門西閾外西面述命乃筮也云左執筮及下云擊筮筮者皆是蓍以其用蓍爲筮因名蓍爲筮云兼執韇者上文巳用右手抽上韇此經又用右手抽下韇是二韇兼執之也云易曰蓍之德圎而神者鄭彼注云蓍形圎而可以立變化之數故謂之神也引之者證􅆱有神故擊而動之也遂述至尚饗注述循至占繇釋曰云遂述命者史旣受主人命乃右還向閾外西面遂述上主人之辭謂之述命述命訖乃連言曰假爾大筮有常此是即席西面命筮與述命同爲一辭者對士喪禮􅁲葬日云不述命若述命即與即席西面命􅀛異異者鄭注云述命命􅀛異􅀛重威儀多也對此大夫少牢述命命筮同筮輕威儀少爲文也云常吉凶之占繇者謂應凶告吉應吉告凶則不常此吉凶之占依􅀛之繇辭繇辭則占􅀛之長若易之爻辭以占筮也乃釋韇立筮注卿大至由便釋曰云卿大夫之蓍長五尺者大戴禮三正記皆有此文立筮由便以其蓍長立筮爲便對士之蓍三尺坐筮爲便􅀂然諸侯蓍七尺天子蓍九尺立筮可知卦者至退占注卦者至占之釋曰云卦者史之屬也者以其筮是史故知卦者是史之屬也云書於版者釋經書卦于木木即版也云史受以示主人者以經書卦是畫卦者恐是卦者以示於主人以卦者卑冝還使筮史受以示主人也注從者至之言釋曰以主人之祭本以求吉今以疑而問筮筮而得吉是從主人本心故曰從者是求吉得吉之言也乃官至乃退注官戒至宗廟釋曰云官戒戒諸官也當共祭祀事者使之具其物且齊也滌漑濯祭器埽除宗廟者以其筮祭日得吉當以崇祭事故知官戒戒諸官有此數事此等皆事見於下文故鄭揔而言也若不至如初注及至至後己釋曰云逺日後丁􅀂後己者案上曲禮云喪事先逺日吉事先近日近日即上旬丁巳是也若上旬丁己不吉則至上旬又筮中旬丁已不吉至中旬又筮下旬丁己不吉則止不祭以其􅁲筮不過三也是以鄭云後丁若後己也宿注宿讀至作羞釋曰自此盡改筮尸論筮尸宿尸及宿諸官之事云大夫尊儀益多者其大夫宿戒兩有士有宿而無戒是儀略故云大夫儀多也此直是儀多而云益多者據士尸一宿下文大夫尸再宿是儀益多益多猶云彌多也此云前祭一日又戒以進之使知祭日當來并下文明日朝服筮尸並是前祭一日唯下文前宿一日宿戒尸者是前祭二日以言前宿一日明祭前二日可知也注皆肅至將筮釋曰云皆肅諸官之日者解經宿是肅諸官之日云又先肅尸者揔解經前宿一日宿戒尸謂是肅諸官之日前又先肅尸校一日當祭前二日也云重所用爲尸者肅諸官唯一肅尸有再肅是重所用爲尸者故也云又爲將筮者亦是肅之使知祭日當來故也若然宿與戒前後名不同今合言之者以前有十日之戒後有一日之宿若單言戒嫌同十日若單言宿嫌同一日故宿戒並言明其別也或可此是初戒尸云宿戒尸者故加宿字於戒上也明日至如初注某之至士異釋曰云某之某者字尸父而名尸也者案曲禮云父在不爲尸注云爲其失子道然則尸卜筮無父者若然凡爲人尸者父皆死矣死者當諱其名今對尸故知不稱尸父之名故上某是尸之父字下某爲尸名是生者可稱名是以云字尸父而名尸也云字尸父尊􅀑神也者以不稱名是尊􅀑神也云不前期三日筮尸者大夫下人君者決上篇特牲士禮云前期三日筮尸此祭前一日筮尸吉遂宿尸不同之事但天子諸侯前期十日卜得吉日則戒諸官散齊至前祭三日卜尸得吉又戒宿諸官使之致齊士卑不嫌故得與人君同三日筮尸但下人君不得散齊七日耳大夫尊不敢與人君同直散齊九日前祭一日筮尸并宿諸官致齊也云祭之朝乃視濯與士異者亦是士卑得與人君同祭前一日視濯大夫尊不敢與人君同故與士異也云與士異亦是下人君下人君亦是與士異互換省文爲義也吉則至祝擯注筮吉至神象釋曰云筮吉又遂肅尸重尸也者以其諸官一肅其尸巳宿訖今筮吉又肅再肅者是重尸者也云旣肅尸乃肅諸官及執事者此重解上文宿是此宿尸後事置於上文者彼爲前宿一日宿戒尸之事故云也其實當在此重肅尸之後也云祝爲擯者尸神象者決前筮尸時皆主人出命至此使祝擯以尸是神象故使祝擯也案特牲使宗人擯主人辭又有祝共傳命者士卑不嫌兩有與人君同此大夫尊下人君故闕之唯有祝擯而巳又此尸不言出門面位案特牲主人宿尸時尸如主人服出門左西面鄭注云不敢南面當尊則大夫之尸尊尸出門徑南面故主人與尸皆不在門東門西也注尸不拜者尸尊釋曰凡賔主之禮賔去主人皆拜送今云尸送揖不拜者以大夫尸尊故也注即改至逺日釋曰此決上文筮日不吉筮逺日者以日爲祭祀之本須取丁已之􅀋故須取逺日後旬丁此筮尸不吉不須退至後旬故筮不待逺日也旣宿至之外注爲期至肅之釋曰自此盡曰諾乃退論宗人請祭期之事云爲期肅諸官而皆至者此即上文宿同時之事以其後宿尸及宿諸官與爲期皆於祭前之日也知爲期亦夕時也者案特牲云厥明夕陳鼎于門外又下文同日夕時而云請期曰羮飪是夕時則此大夫禮爲期亦夕時可知也知大夫尊直肅尸餘使人肅之者以經云宿尸反即云爲期明大夫不自肅賔以下可知故云使人肅之也注比次至來也釋曰言比次早晏者一日一夜辰有十二冬日夏夜長短不同是以推量比次日辰之早晏也云主人不西面者大夫尊於諸官有君道也者決特牲主人門外西面士卑於屬吏無君道故也云爲期亦唯尸不來也者言亦特牲爲期時賔及衆賔即位于門西時無尸此大夫禮餘賔之等並來亦唯尸不來是以主人南面亦爲無尸也明日至乃退注刲擊至屬水釋曰自此盡東榮論視殺視濯之事案特牲視牲與視殺别日今少牢不言視牲直言刲擊告備乃退者省此大夫禮視牲告充即刲擊殺之下人君士卑不嫌故異日矣必知人君視殺别日者大宰職云及執事眡滌濯及納亨賛王牲事注云納亨納牲將告殺謂郷祭之晨旣殺以授亨人又云及祀之日賛玉幣爵之事注云日旦明也是其視牲與殺别日案祭義云君牽牲穆荅君卿大夫序從旣入門麗于碑卿大夫袒而毛牛尚耳諸侯禮殺於門内此大夫與特牲士皆殺於門外者辟人君云刲擊皆謂殺之者豕言擊動之使鳴是視牲也羊言刲謂殺之是視殺也大夫視牲視殺同日故互見皆有故鄭云刲擊皆謂殺之又云此實旣省告備乃殺之文互者省也者亦是視牲訖即視殺如郷所解下言告備欲見兼有也云尚書傳曰羊屬火豕屬水者此尚書大傳文引之者解司馬刲羊以其司馬火官還使刲羊羊屬火故也案周禮鄭注司空奉豕司士乃司馬之屬官今不使司空者諸侯猶兼官大夫又職職相兼況士無官僕隸爲司馬司士兼其職可知故司士擊豕也注雍人至告絜釋曰云雍人掌割亨之事者周禮饔人職文云凡摡者皆陳之而後告絜者案特牲視濯時皆陳之視訖告絜此亦當然注廩人至爲烝釋曰云廩人掌米入之藏者周禮地官廩人職文以其穀入倉人米入廩人故也云甗如甑一孔者案冬官陶人職云甗實二鬴厚半寸脣寸甑實二鬴厚半寸脣寸七穿鄭司農云甗無底甑以其無底故以一孔解之云匕所以匕黍稷者也者上雍人云匕者所以匕肉此廩人所掌米故云匕黍稷也司宫至東榮注放猶至器也釋曰案特牲云宗人􅂛自西階視壷濯及豆籩反降東北面告濯具鄭注云不言絜以有几席若然彼几席不摡則几洗篚三者亦不摡而并言之者以其同降于東堂下故繼觚觶連言之其實不摡也云大夫攝官司宫兼掌祭器者下文司宫筵神席於奥此又掌豆籩之等故鄭云攝官案内則鄭注云諸侯兼官者彼對天子天子六卿諸侯三卿兼六卿此則大夫對諸侯諸侯具官大夫攝官也羮定至之西注魚腊至於牲釋曰自此盡簞巾于西階東論鼎及豆籩盤匜等之事云魚腊從羊膚從豕統於牲者案公食大夫云甸人陳鼎鄭注云甸人冢宰之屬兼亨人者此大夫雍人陳鼎者周禮甸人掌供薪烝與亨爨聮職相通是以諸侯無亨人故甸人陳鼎此大夫又無甸人故使雍人與亨人聮職故亨人云職外内饔之爨亨故使饔人也云魚腊從羊膚從豕者上文摡鼎時鄭云羊豕魚腊皆有竈今陳鼎冝各當其鑊此三鼎在羊鑊之西二鼎在豕鑊之西故云魚腊從羊膚從豕也其實羊豕魚腊各有鑊也此直有羊豕言皆有鑊前注何知魚腊皆有竈案士虞禮云側亨於廟門外之右東面魚腊爨在廟門外東南魚腊爨在其南士之魚腊皆有爨則大夫魚腊皆有鑊可知故羊豕魚腊皆有竈也司馬至一鼎注􅂛猶至爲併釋曰上十一體言一者見其體也下言皆二骨以並見一體皆有二骨也云脊從前爲正脅旁中爲正脊先前脅先後屈而反猶器之䋫也云先前者正脊是也先後者即短脅是也故特牲記云尸俎正脊二骨橫脊長脅二骨短脅鄭注云脊無中脅無前貶也明代脅最在前也脊先前脅先後者取䋫屈之義若然脊以前爲正其次名脡卻後名橫者取脡脡然直後言橫者取闊於脡凡名骨皆隨形名之唯言正者以義取稱焉此言䋫者指解脊不取肩胳也若尸舉牲體則脅肩胳爲䋫故鄭注特牲云舉先正脊後肩自上而卻下䋫而前終始之次也故尸舉牲體如䋫也案下注云􅂛之以尊卑此注云猶器之䋫也若䋫則不得見尊卑若以尊卑􅂛復不得見䋫兩注似乖者凡牲體四支爲貴故先序肩臂臑膞胳爲上是尊然後序脊脅於下是卑次應先言正脅而先言短者又取䋫之義也但所序骨體各有冝不可准定也若然旣以尊卑􅂛之而祭肺貴序在下者腸胃及肺在内不得與外體爲尊卑之次當以腸内自爲先後之次也云脊脅骨多六體各取二骨併之以多爲貴者此經肩臂巳下皆言一至十一體之下揔言皆二骨知二骨據脊脅骨多六體各取二骨者案特牲記肩臂臑肫胳不言二骨至序脊脅即言二骨以並故知此言皆二骨亦據脊脅可知也注豕無至溷腴釋曰云君子不食溷腴禮記少儀文彼注云腴有似於人穢故樂記注云以榖食犬豕曰豢是似人也注倫擇至羙者釋曰知脅革肉者下文云膚九而俎亦橫載革順故知膚者是脅革肉也司士至用麋注司士至全也釋曰云司土又􅂛副倅者謂是第三俎其司士與前文司士􅂛豕者别知者以下經云司士三人􅂛魚腊膚則此豕魚腊冝各一人又此􅂛鼎冝俱時明是副倅者非􅂛豕者可知云倅者案諸子職云掌國子之倅鄭云是公卿大夫之副貳則此云倅亦副之別名以其副牲鼎故云副倅也司宫至玄酒注房戸至作幂釋曰云棜無足禁者酒戒也大夫去足改名優尊者若不爲之戒然者此決特牲用棜仍云禁此改名曰棜是優尊者若不爲神戒然郷飲酒雖是大夫禮猶名斯禁者㝷常飲酒異於祭祀也司宫至南肆注枓􅆽至此也釋曰云凡設水用罍沃盥用枓禮在此也者言凡揔儀禮一部内用水者皆須罍盛之沃盥水者皆用枓爲之鄭言禮在此者以士冠禮直言水在洗東士昏禮亦直言水在洗東郷飲酒特牲記亦云然皆不言罍器亦不云有枓其燕禮大射雖云罍水又不言有枓故鄭注揔云凡此等設水用罍沃盥用枓其禮具在此故餘文不具省文之義也改饌至之實注改更至東面釋曰前司宫摡豆籩訖饌豆籩放於西方今欲實之乃更設豆籩於房中南面如饋之禮東面設然者此大夫禮威儀多決特牲士禮視濯時豆籩鉶在東房至實豆籩時直云豆籩鉶陳於房中如初鄭云如初者取而實之旣而反之是其不改豆籩之處因而實之是士禮威儀略也小祝至階東注爲尸將盥釋曰案特牲直云尸盥匜水實于槃中簞巾在門内之右不言其人未聞也知非祝者彼下文始言祝筵几于室中注云至此使祝接神明前非祝也主人至西面注爲將祭也釋曰自此盡革順論祭時將至布設舉鼎匕載之事司宫至右之注布陳至爲右釋曰案特牲云祝筵几鄭云使祝接神此使司宫者此大夫禮異於士故司宫設席祝設几大夫官多故使兩官若共其事亦是接神故祝設几也注道之至不舉釋曰此決特牲主人降及賔盥士禮自舉鼎此大夫尊不舉故不盥也司宫至南柄注二尊至爲枋釋曰云二尊兩甒者即上司官尊兩甒于房户之間是也知二勺兩尊用之者玄酒雖有不酌重古如酌者然也陳鼎至東枋注膚爲至西南釋曰此云膚爲下門外陳鼎時不言至此言之者以膚者豕之實前陳鼎在門外時東有俎據鼎所陳則膚在魚上今將載於俎設之最在後故須分別之也云膚爲下以其加者以羊無别俎而豕有膚俎故謂之加以加爲下也云南于洗西陳于洗西南者洗當東榮近東也其陳鼎鼎當東序則近西也而言南于洗西則鼎陳于洗西稍近南東西不得與洗相當也俎皆至西肆注肵俎至當鼎釋曰云異其設文不當鼎者羊俎在羊鼎西今云肵俎在羊俎北不繼鼎明不當鼎也若繼鼎言者即在鼎西也佐食至爨也注牢羊至爲刌釋曰言皆如初爲之于爨也者經言此者以前膚鼎時不見心舌嫌不在爨故明之云皆如初爲之于爨皆者皆羊豕羊豕皆有心舌也案特牲記云肵俎心舌皆去本末午割之實于牲鼎載心立舌縮俎即是未入鼎時則制此心舌然也旣未入鼎時先制之是以雖出爨亦得爲皆如初爨也云凡割本末食必正也者郷黨孔子云割不正不食故割本末爲食正也云肵之爲言敬也者郊特牲文彼云肵之爲言敬也言所以敬尸也云周禮祭尚肺者禮記明堂位云有虞氏祭首夏后氏祭心殷祭肝周祭肺是周之禮法祭肺而此肵俎不取肺而用心者以其事尸尚心舌心舌知滋味者故特牲記鄭注亦云心舌知食味者欲尸之饗此祭是以進之若然舌之所甞五味乃是心之所知酸苦也故心舌并言之佐食至在上注升之至於此釋曰􅂛羊載右胖者准例實鼎曰􅂛實俎曰載今實俎而言升者以其升者上也是以載俎􅂛載兩言之也但此經所載牲體多少一依上文升鼎不異而重序之者以其載俎之時恐與入鼎時多少有異故重序之舉肺祭肺上巳言今又言之者以其上升鼎時直言舉肺一祭肺三不言長短上所以不言長短者以其入鼎時二者未制故不辯長短至此載俎乃制長短及切之故具辯之也若然上升鼎時不制者若升鼎制之恐二肺雜亂是以升俎乃制之若然心舌未升鼎時巳午割勿没不言至載俎乃言午割者彼二者其體殊異不雜亂故俎乃一辯之而已云肩臂臑膞胳在兩端脊脅肺肩在上者此是在俎之次俎有上下猶牲體有前後故肩臑在上端膞胳在下端脊脅肺在中其載之次序肩臂臑正脊脡脊橫脊代脅長脅短脅肺腸胃膞胳也云升之以尊卑者即上文上利升羊以下序其在鼎也云載之以體次者俎法四體尊於脊脅即經四體在兩端脊脅肺在中者故云各有冝也云拒讀爲介距之距者案左氏傳昭二十五年云季郈之雞闘季氏介其雞服氏云擣芥子播其雞羽鄭氏云介甲爲雞著甲又云郈氏爲之金距注云金距以金踏距今鄭君合取季氏之介又取郈氏之距而云介距之距也引之者彼距在雞足爲距此俎距在俎爲橫也是以云俎距脛中當橫節也案明堂位云俎有虞氏以梡夏后氏以嶡殷以椇周以房俎注云梡斷木爲四足而巳嶡之言蹷也謂中足爲橫距之象周禮謂之距彼注云周禮謂之距即指此俎距而言是距爲俎足中央橫者也此言俎距脛中當橫節者案明堂位夏后氏以嶡謂中足之橫下仍有殷之椇謂橫下仍有曲橈之足下又有周之房俎謂四足下更有跗鄭云上下兩間有似於堂房是橫下更有二事故言脛中當橫節也云凡牲體之數及載備於此者案此經即折前體肩臂臑兩相爲六後體膞胳兩相爲四短脅正脅代脅兩相爲六脊有三揔爲十九體唯不數觳二通之爲二十一體二觳正祭不薦於神尸故不言是牲體之數備於此言及載備於此者上經云升於鼎此經云載於俎是其及載備於此也下利至進下注進下至相見釋曰云進下變於食生也者決公食大夫郷飲酒牲體皆進腠腠是本是食生人之法此言進末末爲終謂骨之終食􅀑神法故云變於食生也云所以交於神明
