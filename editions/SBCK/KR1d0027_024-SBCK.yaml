  text: 儀禮䟽卷第二十四
  hash: sha256:807904911ec6309fd46afc1616aaadc9baf30ad11b8286ba8c97ef7ec6d06362
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_024-1a}
body:
  text: 唐朝散大夫行太學博士􅀪文館學士臣賈公彦等撰賔入至而殯注具謂至當用釋曰自此盡卒殯乃歸論賔介死之事云賔入境而死遂也者若未入境即反來云主人爲之具而殯者謂從始死至殯所當用者主人皆供之鄭云具謂始死至殯所當用直云至殯所當用明不殯於館取其至殯節主人供喪具以其大斂訖即殯故連言殯故下文歸介復命之時柩止門外明斂於棺而巳介攝其命注爲致至聞命釋曰云初時上介接聞命者鄭解介得代賔致命之意以其命出於君初賔受命於君之時賔介同北面上介接聞君命矣以是今賔死得攝其命君弔介爲主人注雖有至尊也釋曰古者賔聘家臣適子皆從行是以延陵季子聘於齊其子死葬於嬴博之閒故鄭云雖有臣子親因猶不爲主人以其介尊故也主人至以用注當中至賔禮釋曰賔旣死主人所歸禮與幣必以當喪者之用云當中奠贈者解經中小斂大斂之用云當中奠贈諸喪具之用者具謂襲與小斂大斂解經幣云不必如賔禮者不必如致飱饔之禮束紡皮帛之􅀋不堪喪者之用故也介受賔禮無辭也注介受至辭之釋曰云介受主國賔己之禮者謂公幣私幣之屬故鄭云當陳之以反命也言無辭者雖無三辭以其賔受饔餼之時禮辭受食三辭明介亦有禮辭云無所辭也者以有賔喪嫌介有三辭故云介受賔禮無辭也不饗食釋曰案上遭君喪受饔餼不受饗食鄭云受正不受加此云不饗食介不就君受饗食明受饔餼正禮也歸介至門外注門外至忠心釋曰知門外是大門外者國君有三門皐應路又有三朝内朝在路寢庭正朝在路門外應門外無朝外朝當在皐門外經直云止於門外無入門之言明知止於大門外外朝之上是以上賔拜賜皆云於門外亦在外朝矣故鄭云必以柩造朝達其忠心也介卒至卒殯注卒殯成節乃去釋曰當介復命之時賔之尸柩在外朝上介卒復命謂復命訖出君大門奉賔之柩送至賔之家屍柩入殯於兩楹之閒君往就弔卒殯者謂殯訖殯是喪之大節故云卒殯成節乃去謂君與大夫盡去若大至如之注不言至士也釋曰云不言上介者小聘上介士也者案經大夫介卒據大聘上介是大夫而言今鄭以經不言上介則大夫介卒中兼有聘使大夫其卒亦如之故鄭云不言上介小聘上介士也欲兼見小聘之法也若小聘上介末介皆士則入下文士介死中以其下文更不見小聘賔介死法故此兼言之也注不具至服也釋曰以其士介卑其禮降於賔與上介非直具棺他衣物亦具之此士介直具棺不具他物也其士介從者自用時服斂之君不弔焉注主國至親往釋曰云主國君使人弔不親往者對上經賔死君弔介爲主人此士云不弔者明不親弔使人弔之可知也若賔至將命注未將至君命釋曰前云賔入境而死謂在路死未至國此經更􅀃賔至朝俟閒之後使大夫致館未行聘享而賔在館死之事故鄭云俟閒之後是以鄭云以柩造朝以其旣至朝志在達君命則知上國外死不以柩造朝可知小聘至郊勞注記貶至覿也釋曰自此盡三介論侯伯行小聘之事云不享者謂不以束帛加璧獻國所有云不禮者聘訖不以齊酒禮賔面不􅂛者謂私覿庭中受之不􅂛堂此對大聘􅂛堂受若然不言私覿而言面者對大聘言覿故辟之而言面也其禮至三介注如爲至上介釋曰云其禮如爲介者謂特問使大夫得主國之禮多少如大聘卿此大夫爲上介之時即上文介之禮飱饔餼之食燕之等三介者大夫降於卿二等故也舉此侯伯之小聘則公之臣子男之臣小聘禮數其義可知也記乆至聘焉注事謂盟㑹之屬釋曰此云乆無事則聘焉者則周禮殷聘也是以周禮大行人云凡諸侯之邦交歳相問也殷相聘也丗相朝也注云小聘曰問殷中也乆無事又於殷朝者及而相聘也云事謂盟㑹之屬者案春秋有事而㑹不協而盟是以春秋有㑹而不盟盟必因㑹若有盟㑹相見故云乆無事則聘焉若有至於方注故謂至板也釋曰云故謂災患及時相告請者此即上經云若有言一也言災患上注引春秋臧孫辰告糴于齊公子遂如楚乞師此云及時事者即上注引春秋晉侯使韓穿來言汶陽之田是也云名書文今謂之字者鄭注論語亦云古者曰名今丗曰字許氏􅀃文亦然言此者欲見經云名名者即今之文字也云䇿􅂤方板也者􅂤謂據一片而言䇿見編連之稱是以左傳云南史氏執􅂤以往是􅂤者未編之稱此經云百名以上書之於䇿是其衆􅂤相連之名鄭作論語序云易詩書禮樂春秋䇿皆尺二寸孝經謙半之論語八寸䇿者三分居一又謙焉是其䇿之長短鄭注尚書三十字一􅂤之文服䖍注左氏云古文􅂐書一􅂤八分字是一􅂤容字多少者云方板者以其百名以下書之於方若今之祝板不假連編之䇿一板書盡故言方板也主人至門外注受其至璽之釋曰云旣聘享賔出而讀之者上經云若有言則以束帛如享禮文承聘享之後故知此讀諸門外故云旣聘享也鄭知人是内史者案内史職云凡四方之事書内史讀之此云使人與客讀諸門外者亦是四方事書故知人是内史也知書必璽之者案襄二十九年左傳云公如楚還及方城季武子取卞使公冶問璽書追而與之故知此書亦璽之也客將至于館注爲書報也釋曰此爲書報上有故之事彼以束帛加書將命此亦以束帛加書反命于館明日君館之注旣報至疾也釋曰爲昨日爲書報之今日君始就館送客者書問之道尚疾故也必須尚疾者以其所報告請多是密事是以鄭云旣報館之書問尚疾也旣受至之資注資行至作齎釋曰使者受命於君但知出聘不知逺近故云古者君臣謀密草創未知所之逺近故問宰行糧多少即知逺近也故知須問之使者至同位注謂前至臣也釋曰云旣受行日者謂巳受命日夕幣之前使者及介朝君之時皆同位北面東上在朝處臣東方西面北上故鄭云同位者北面介立于左少退以別處臣也出祖至其側注祖始至作祓釋曰云旣受聘享之禮行出國門止陳車􅀐釋酒脯之奠於軷者凡道路之神有二在國内釋幣於行者謂平敵道路之神出國門釋奠於軷者謂山行道路之神是以委土爲山象國中不得軷名國外即得軷稱引詩傳曰者證軷祭道路之神也引春秋傳曰者案襄二十八年左氏傳子大叔云軷涉山川蒙犯霜露引之者證軷是山行之名涉者水行之稱故􅅠詩云大夫軷涉我心則憂毛傳云草行曰軷水行曰涉云是以委土爲山者案月令冬祀行鄭注行廟門外之西爲軷壤厚二寸廣五尺輪四尺祀行之禮北面設主於軷上國外祀山行之神爲軷壤大小與之同鄭注夏官大馭云封土爲山象以菩芻􅁄柏爲神主旣祭之以車轢之而去喻無險難也云或伏牲其上者案周禮犬人云掌犬牲凡祭祀供犬牲用牷物伏瘞亦如之鄭注云伏謂伏犬以王車轢之故知有伏牲其上云使者爲軷祭酒脯祈告者也案周禮大馭掌馭玉路以祀及犯軷王自左馭馭下祝登受轡彼天子禮使馭祭此大夫禮故使者自祭犯軷而去云卿大夫處者於是餞之者案詩云飲餞于禰是處者送行人而飲酒名曰餞也云遂行舎于郊者即上經云舎于近郊是也云其有牲犬羊可者犬人職云伏瘞亦如之是用犬也詩云取羝以軷是用羊也是犬羊各用其一未必並用之言可者人君有牲大夫無牲直用酒脯若然此見出行時祭軷案韓奕詩云韓侯出祖出宿于屠顯父餞之清酒百壷是韓侯入覲天子出京城爲祖道又左氏傳鄭忽逆婦嬀于陳先配而後祖陳鍼子曰是不爲夫婦誣其祖矣鄭志以祖謂祭道神是亦將還而後祖道此聘使還亦冝有祖但文不具所以至白倉注圭所至作璪釋曰云圭所執以爲瑞節者案周禮大宗伯云以玉作六瑞以等邦國又云王執鎭圭公執􅁊圭侯執信圭伯執躬圭子執榖璧男執蒲璧是以其圭爲瑞又案周禮掌節有玉節之節即是節與瑞別矣今此云瑞節但連言節者案節不得言瑞瑞亦是節信故連言節也云剡上象天圜地方也者下不剡象地方上剡象天圜案雜記賛大行曰博三寸厚半寸剡上左右各寸半此經直剡上寸半不言左右文不具也凡圭天子鎭圭公􅁊圭侯信圭皆博三寸厚半寸剡上左右各寸半唯長短依命數不同云雜采曰繅者凡言繅者皆象水草之文天子五采公侯伯三采子男二采皆是雜采也云以韋衣木板飾以三色再就者依漢禮器制度而知也但木板大小一如玉制然後以韋衣之大小一如其板經云三采六等注云三色再就者就即等也是一采爲再就三采即六等也是以鄭注典瑞云一帀爲一就典瑞云侯伯三采三就者以一采雖有再帀併爲一就覲禮注云朱白倉爲六色者亦是一采一帀爲二色三采故六色三采據公侯伯子男則二采故典瑞云子男皆二采再就是也所以薦玉重愼者玉者寶而脆今以繅藉薦之是其重愼也問諸至八寸注二采至相備釋曰此諸侯使臣聘繅藉之等云二采再就者上云三采六等此二采不云四就者此臣禮與君禮異此二采雖與子男同子男即一采爲一帀二采爲再而爲四等今臣一采爲一就二采共爲再就是二采當君一采之處是以典瑞云瑑圭璋璧琮繅皆二采一就以覜聘亦是臣二采共當君一采一帀之處云降於天子者案典瑞王執鎭圭繅藉五采五就言五就者據一采爲一等若據一采一帀而言即五采十等此二采二等是降於天子也此亦降於諸侯而言降於天子者此鄭君指上文朝天子而言故言聘諸侯降於朝天子也云於天子曰朝者據上文所以朝天子是也則諸侯自相朝亦同圭與繅九寸侯伯以下亦依命數云於諸侯曰問者諸侯遣臣自問若遣臣問天子圭與繅亦八寸是以云記之於聘文互相備案玉人云瑑圭璋八寸璧琮八寸以覜聘無所依據則於天子諸侯同言八寸者據上公之臣侯伯之臣則六寸子男之臣則四寸各降其君二等若然經言八寸者據上公之臣也皆􅀇至絢組注采成至作約釋曰上文繅藉尊卑不同此之組繫尊卑一等云采成文曰絢鄭注論語文成章曰絢與此語異義同云繫無事則以繫玉因以爲飾者無事謂在櫝之時亦以繫玉因以爲飾此組繫亦名繅藉即上文反命之時使者執圭垂繅上介執璋屈繅又曲禮下云執玉其有藉者則裼無藉者則襲鄭注亦云藉繅也裼襲皆據有繅無繅之時是其因以爲飾云皆用五采組者以其言絢絢是文章之名經又言皆復無尊卑之別故知皆用五采組也云上以􅀇下以絳爲地者以其皆用五采而經直云􅀇纁爲地上加五采上下皆據垂之爲上下必知上􅀇下絳者上􅀇以法天下絳以法地故也經云纁注云絳者爾雅三入赤汁爲纁絳則赤也故本絳以解纁問大夫至皮馬注肆猶至爲肄釋曰知載大夫幣是宰夫者以其初宰衆官具幣故知載幣於郊付使者亦是宰夫可知云幣云肆馬云齎因其冝亦互文也者以其幣是財賄易可陳列故言肆不言齎亦付使者矣馬是難陳之物故直言齎亦付使者亦陳之是因其冝互文也注受命不受辭釋曰受命謂受君命聘於鄰國不受賔主對荅之辭必不受辭者以其口及則言辭無定準以辭無常故不受之也注史謂䇿祝釋曰案周禮大史内史皆掌䇿書尚書金縢云史乃䇿祝是䇿書祝辭故辭多爲文史辭曰至敢辭注辭不至不敢釋曰辭謂賔辭主人荅謂賔荅主人介則在旁曰非禮也敢故易旅卦初六云瑣瑣斯其所取災鄭云瑣瑣猶小小爻互體艮艮小石小小之象三爲聘客初與二其介也介當以篤實之人爲之而用小人瑣瑣然客主人爲言不能辭曰非禮不能對曰非禮毎者不能以禮行之可知釋曰云記此重者沐浴可知者以其食禮輕尚沐浴而食饔餼食重者沐浴而食可知卿大至有訝注卿使至護客釋曰云卿大夫訝者謂大聘使卿主人使大夫迎士訝者小聘使大夫主人使士迎言皆有訝者自介巳下皆迎之云卿使者大夫上介士衆介也者據此篇是侯伯之卿大聘而言其實小聘使大夫亦使士迎之所迎者謂初行聘及饗食燕皆迎之故鄭君無所止定賔即館訝將公命注使已迎待之命釋曰案秋官掌訝職云賔入館次于舎門外待事于客注云次如今宮府門外更衣處待事于客通其所求索彼謂天子有掌訝之官共承客禮此諸侯使無掌訝是以還遣所使大夫士訝將公命有事通傳于君又見之以其摯注又復至執雉釋曰云復以私禮見者訝將舎於賔館之外冝相親也者禮掌訝舎于賔之館門外此大夫士君使爲訝雖非掌訝之官亦爲次舎于賔之館外冝相親故執摯以相見大夫訝者執鴈士訝者執雉案士相見及大宗伯文也賔旣至其摯注旣巳至其訝釋曰云以公事聘享問大夫者此並行君物享主國君及問大夫故云公事也云復報也者有報訝者以摯私見己今還以摯私報之知使者及上介同執鴈不執羔者見上文主國卿大夫勞賔同執鴈則知此使者及上介同執鴈可知各以見其訝者謂使者見大夫之訝者上介見士之訝者士介亦見士訝者凡四至可也注言國至璧琮釋曰案周禮大宗伯云以玉作六瑞王執鎭圭公執􅁊圭以下人執之曰瑞又云以玉作六器以禮天地四方謂禮神曰器此四者人所執不言瑞而言器者對文執之曰瑞禮神曰器散文則通雖執之亦曰器是以尚書云五器卒乃復與此文皆稱器云言四國獨此以爲寶者案周禮天府職凡邦國之玉鎭大寶器藏焉注云玉鎭大寶器玉瑞玉器之美者是其玉稱寶云四器謂圭璋璧琮者是據上經圭璋以行聘璧琮以行享而言此據公侯伯之使者用圭璋璧琮若子男使者聘用璧琮享用琥璜宗人至之次注主國至常處釋曰主國門外以其行朝聘陳賔介皆在大門外故次亦在大門外可知云諸侯及卿大夫之使者次位皆有常處者以其上公九十步侯伯七十步子男五十步使其臣聘使大聘小聘又各降二等其次皆依其步數就西方而置之未行禮之時至於次中至將行禮賔乃出次凡爲次君次在前臣次在後故云少退於君之次故云皆有常處上介至授賔注愼之至不克釋曰此謂當將聘於主君廟門外上介屈繅以授賔賔襲受之節引曲禮者彼器即此玉欲證執玉如重之義也賔入至志趨注皇自至作王釋曰賔入門皇謂未至堂時􅂛堂讓謂􅂛堂東面向主君之時將授志趨謂賔執玉向楹將授玉之時念郷入門在庭時執玉徐趨今亦然若降堂後趨進翼如則疾趨也云讓謂舉手平衡也者謂若曲禮云凡奉者當心下又云執天子之器則上衡注云謂髙於心國君則平衡注云謂與心平則此亦執國君器也故引之爲證引孔子之執圭者郷黨論孔子爲君聘使法彼足蹜蹜如有循謂徐趨據入彼國廟門執玉行步之時以足容重退之在降堂之下與此趨同故爲證也授如至後退注重失至後也釋曰授謂就東楹授玉於主君時如與人爭承取物恐失墜云下如送君還而后退者以上文次言之此下如送者止謂聘享每訖君實不送而賔之敬如君送然故云下如送也君迴還賔則退出廟門更行後事非謂賔出大門也下階至又趨注發氣至如也釋曰云下階發氣怡焉者即論語云出降一等逞顔色怡怡如也云再三舉足自安定乃復趨也者謂降時再三舉足故又趨進翼如也云發氣舎息者以將授玉屏氣似不息今旣授玉降階縱舎其氣怡然和恱也云至此舉足則志趨卷遯而行也者是釋志趨爲徐趨此舉足爲疾趨也及門正焉注容色至威儀釋曰此謂聘訖將更有享而出門時云心變見於威儀者以其貌從心起觀威儀省禍福覩貌可以知心故也執圭至失之注記異􅀃也釋曰亦謂將聘執圭入廟門時云鞠躬焉則鞠躬如也如恐失之者即執輕如不克也云記異􅀃者以上文巳記執圭此又記執圭之儀以同記事而言有差異人記事􅀃有不同也及享至盈容注發舎至容色釋曰云及享發氣焉盈容者即孔子行享禮有容色一也故注引爲證也此發氣即上注云舎息一也衆介北面蹌焉注容貌舒揚釋曰此謂賔行聘衆介從入門左北面曲禮云大夫濟濟士蹌蹌鄭云皆行容止之貌故此注亦云容貌舒揚也但彼大夫云濟濟諸侯云皇皇上文賔入門皇得與諸侯同者以其執君圭璋志在重玉故行容得與君同若尋常行則大夫濟濟也私覿愉愉焉注容貌和敬釋曰上文享時盈容對聘時儀貌戰色顔舒緩此私覿對享時又愉愉和敬舒於盈容也出如舒鴈注威儀至鴈鵞釋曰此出廟門之外行步如鵞又舒緩於愉愉也云舒鴈鵞者爾雅釋鳥文皇且至主愼注復記執玉異􅀃釋曰上巳二度記執玉行步之法今又云皇且行是別有人更記此執玉行法故云復記執玉異􅀃也凡庭至可也注隨入至作干釋曰云左先者以皮馬以四爲禮北面以西頭爲上故左先入陳也云君子不以所無爲禮者案禮器云天不生地不養君子不以爲禮言當國有馬而無虎豹皮則用馬或有虎豹皮并有馬則以皮爲主而用皮也云畜獸同􅀋可以相代者畜謂馬獸謂虎豹爾雅釋云在家曰畜在野曰獸云同􅀋者爾雅又云二足而羽謂之禽四足而毛謂之獸若然則馬畜亦是四足之􅀋故云同􅀋可以相代也賔之至皆東注馬出至内府釋曰云馬出當從廐也者若有皮之國用皮則不出亦從餘物東藏也知東藏之内府者案天官内府職云凡四方之幣獻之金玉齒革兵器凡良貨賄入焉注云諸侯朝聘所獻國珍彼天子禮諸侯亦當有内府諸侯自朝聘其貢獻珍異亦入内府故注依之也多貨則傷于德注貨天至爲德釋曰此經主論聘享所用圭璋璧琮不得過多之事也云貨天地所化生謂玉也者鄭注周禮九職亦云金玉曰貨布帛曰賄故此注云貨天地所化生謂玉也下注云幣人所造成幣則布帛曰賄對金玉是自然之物也云君子於玉比德焉者聘義文云重禮也亦聘義文云多之則是主於貨傷敗其爲德者以玉比德故朝聘用之相厲以德不取重寶珍美之意若多之則是主於貨物不取相厲以德是傷敗其爲德是以圭璧聘享主國君璋琮聘享主國夫人各用一而巳也幣美則没禮注幣人至見也釋曰此主論享時用束帛故享君用束帛享夫人用束錦皆不得過美云幣人所造成以自覆幣謂束帛也者案禮記檀弓伯髙之喪孔氏之使者未至冉子攝束帛乗馬而將之孔子曰異哉徒使我不誠於伯髙鄭注云禮所以副忠信也忠信而無禮何傳乎是知自覆者覆忠信而巳若更美則主意於財美而禮不見故没禮也云愛之斯欲衣食之君子之情也者禮記檀弓云愛之斯録之矣彼據愛父母而作重此亦微取彼文伹此云愛之斯欲衣食之兼言食謂以幣欲之君子之情則忠信賄在聘于賄注賄財至作悔釋曰鄭轉于作爲者欲就司儀之文爲解故也云言主國禮賔者釋經賄是主國禮賔也云當視賔之聘禮者釋經在聘謂在賔聘財多少云而爲之財也者釋經于賄也謂主人視賔多少爲財賄報賔云若苟豐之是又傷財也者凡行禮用財者取不豐不儉取於折中若苟且豐多則傷於貪財引周禮者秋官司儀職文案彼注云幣謂享幣也於大國則豐於小國則殺解經各稱其邦而爲之幣彼又注云主國禮之如其豐殺之禮解經以其幣爲之禮謂賄用束紡禮玉束帛乗皮及贈之屬是也凡執玉無藉者襲注藉謂至藉玉釋曰凡繅藉有二種若以木爲中幹施五采三采者此繅常有不得云無藉今此云無藉者襲據絢組尺繅藉而言若廟門外賈人啓櫝取玉垂繅以授上介上介裼受上介屈繅以授賔賔即襲受即此執玉無藉者是也此文與曲禮同故曲禮云執玉其有藉者則裼無藉者則襲是也禮不拜至注以賔至爲醴釋曰此文承執玉帛之下聘臣事據郷飲酒賔主􅂛堂主人有拜至之禮此賔昨日初至之時主人請賔行禮賔言俟閒此時賔巳至矣故聘時不拜至是以鄭云以賔不於是始至注膱脯至貌焉釋曰此脯禮賔時所用薦脯是也案郷飲酒禮云薦脯五脡故云或謂之脡皆取直貌主人至受之注此謂至從者釋曰此主人之庭實者謂主人禮賔時設乗馬也經云賔執左馬以出三馬在後主人從者牽之遂從賔以出於門外賔之士介迎受之故鄭云此謂餘三馬也知士是士介從者以其經云從者訝受馬此旣云士故知士介從者也旣覿至將命注時有至致之釋曰云猶以君命致之者以經云將命是以知雖是私獻己物與君物同皆云君命致之臣統於君故注送獻至禮輕釋曰云奉物禮輕者謂以奉私獻之則是主於貨傷敗於享覿故不入擯者至請受注東面至客也釋曰擯者東面坐取獻舉以入告者謂擯者從門東適南方西行於賔北舉幣入告於君及出一請於賔而受之故云出禮請受云東面坐取獻者以冝並受也者獻物在門外擯者出受之擯者與賔敵並受故云冝並受也云其取之由賔南而自後右客也者案上受享之時受皮者自後右客鄭注云自由也從東方來由客後西居其左受皮也此賔門西東面奠獻擯者從東由賔南自客後居賔左取獻物故云自後右客也注固亦衍字釋曰知固是衍字者以其上擯者禮請受不云固明知賔不固辭故云固衍字云亦者亦士介私覿時賔固辭鄭注云固衍字當如面大夫也注兄弟至夫人釋曰云兄弟謂同姓者若魯於晉鄭之等同姓也云若昬姻甥舅有親者若魯取齊女以爲舅齊則以魯爲甥是有親者也云非兄弟獻不及夫人者以其經云兄弟之國則問夫人則非兄弟問不及夫人可知若君不見注君有至使者釋曰云他故者病之外或新有哀慘也使大夫受注受聘至卿也釋曰知受聘享者以其在後雖有覿獻之法聘享在前是以據在先者而言云大夫上卿也者以其卿上大夫故以卿爲大夫必知使卿不使下大夫者以其君無故君親受今旣有故明使上卿代君受之注此儀至處耳釋曰案上使大夫還玉於館大夫􅂛自西階鉤楹賔自碑内聽命􅂛自西階自左南面受圭退負右房而立大夫降中庭賔降自碑内東面授上介于阼階東此中與彼還玉皆􅂛自西階此非易處也但還玉時賔自大夫左受之此中大夫於賔左受之其賔主之位皆易處於還玉時故云易處也不禮注辟正主也釋曰案上聘享及私覿訖主君禮賔此大夫代君不禮故云辟正主也幣之至釋服注以與至某子釋曰云不可以不速也者釋經不釋服即往云所不及者下大夫未甞使者以其經云下大夫甞使至者幣及之故知所不及者是下大夫未甞使者也云不勞者以先是賔請有事於己同􅀋旣聞彼爲禮所及則己往有嫌也者此勞賔在後賔請有事於大夫在聘日云先是賔請有事於己同􅀋同􅀋謂幣所及者故鄭云旣聞彼爲禮所及云則己往有嫌者彼國幣及己是以禮加於己今勞賔者是以禮報之若幣不及己若往勞賔則是己有禮於賔是譏賔無禮於己之嫌是以不往勞之故云己往有嫌也云所以知及不及者賔請有事固曰某子某子者當賔請事於大夫之時顯其張子李子之等使受禮者預知爾時不道己姓則知己乃幣所不及賜饔至若穆注羮飪至作腍釋曰古者天子諸侯行載廟木主大夫雖無木主亦以幣帛主其神是以受主國饔餼故筮尸祭然後食之尊神以求福故也昭穆言若者以其昭穆不定故云若也云腥餼不祭則士介不祭也者上致饔餼之時云上介饔餼三牢則飪腥餼三者皆有故云士介四人皆餼大牢無飪可祭故知士介不祭也僕爲至某子注僕爲至官也釋曰經並云孝孫孝子皇祖皇考以其不定故兩言謂上經若昭若穆亦兩言之云僕爲祝者大夫之臣攝官也者若然諸侯不攝官使祝祝䇿矣案定四年祝佗云嘉好之事君行師從卿行旅從則臣無事若君到主國祭饔之時得不攝官乎諸侯不使人攝是以覲禮云侯氏裨冕釋幣于禰注云釋幣于禰之禮旣則祝藏其幣歸乃埋之於祧西階之東大夫使僕攝祝則是本無祝官與諸侯異矣其諸侯禮大祝不行知不使小祝行者以其掌客云羣介行人宰史是諸侯從官不言祝明大小祝俱不行矣如饋食之禮注如少牢至無之釋曰云如少牢饋食之禮者案少牢禮有尊俎籩豆鼎敦之數陳設之儀隂厭陽厭之禮九飯三獻之法上大夫又有正祭於室儐尸於堂此等皆冝有之至於致爵加爵及獻兄弟弟子等固當略之矣假器於大夫注不敢至祭器釋曰案曲禮云大夫士去國大夫寓祭器於大夫士寓祭器於士注云與得用者言􅀉覬己後還若然卑者不得用尊者之器是以此大夫聘使不得將己之祭器而行致饔餼雖是祭器人臣不敢以君之器爲祭器是以聘使是大夫還於主國大夫假祭器而行之朌肉及廋車注朌猶至作紛釋曰此謂祭訖歸胙在下云廋廋人也車巾車也者案周禮天子夏官有廋人職掌養馬春官有巾車職諸侯雖兼官亦當有廋人巾車是故引周禮爲證旣致至之數注稍稟至爲餼釋曰云旣致饔旬而稍者以其賔客之道十日爲正行聘禮旣訖合歸一旬之後或逢凶變或主人留之不得時反即有稍禮故下文云旣將公事賔請歸注云謂巳問大夫事畢請歸不敢自專謙也主國留之饗食燕獻無日數盡殷勤也是主人留之是以周禮漿人亦共賔客之稍禮注云稍禮非飱饔之禮留閒王稍所給賔客者漿人所給亦六飲而巳諸侯相待亦如之是其留閒致稍者也云乗禽乗行之禽也者別言此者欲見此乗非物四曰乗言如其饔餼之數者一牢當一雙故聘義云乗禽日五雙是此饔餼五牢者也云鴈鶩之屬者依爾雅二足而羽若然上介三牢則三雙也士介一牢則一雙也羽謂之禽故以禽爲鴈鶩之屬云其賔與上介也者以其下文别有士介故也凡獻至于面注執一至門外釋曰云上介受以入告之士舉其餘從之者此乗禽而云凡獻冝約私獻私獻擯者取獻以入士舉其餘此若上介受入明其餘士舉從入可知云不辭拜受于庭者以其經無辭文又饔餼云禮辭明此禽禮輕無辭受於庭可知上介執之以相拜于門中乃入授人者此亦約私獻私獻之時擯者取獻以入又云擯者立于閾外以相拜賔辟擯者授宰夫是其約也云上介受亦如之者以其受饔餼之時上介受巳如賔禮故知受乗禽亦如賔也云士介拜受於門外者以其受餼在門外此受乗禽在門外可知禽羞俶獻比注比放至時賜釋曰云禽羞謂成熟有齊和者以其稱羞謂若庶羞内羞之等故稱禽則以鴈鶩等爲之故以成熟解之聘義謂之時賜者案聘義云燕與時賜無數時賜謂四時珍異以賜諸賔客與此俶獻是一物故引以爲證各以其爵朝服注此句至在此釋曰云冝在凡致禮下者以其各以其爵朝服爲致禮而言故知義然士無至無擯注謂歸餼也釋曰案上經直云宰夫朝服以致之是其無饔宰夫退去士介不儐之是也大夫至辭矣注此句至之下釋曰此謂賔問卿之時卿不敢辭者以賔聘享訖出大門請有事於大夫君禮辭許是君初爲之辭故卿不辭也凡致至籩豆注凡致至今亡釋曰云其其賔與上介也者案上經賔壹食壹饗上介若食若饗唯士介不言饗故知其中唯有賔與上介耳云加籩豆謂其實也亦實于罋者案致饔餼醯醢是豆實實于罋明此饗之豆實亦實于罋可知也案昭六年夏季孫宿如晉拜莒田也晉侯享之以加籩武子退使行人告曰小國之事大國也苟免於討不敢求貺得貺不過三獻今豆有加下臣弗堪無乃戾也此中致饗有加籩豆者饗使者無加籩豆是正禮此云加籩豆者殷勤之義也云饗禮今亡者以其食禮在知其豆數饗禮亡無文以知之無饔者無饗禮注士介無饗禮釋曰無饗者無饗禮文承饗下故鄭以無饗禮解之以其賔與上介饔餼俱有故有饗士介唯有餼而巳無饔故無饗禮也凡餼至五斛注謂大至大略釋曰案上經云大夫餼賔大牢米八筐衆介米八筐不辨大小故此記人辨之云筐五斛云器寡而大略者以其君歸饔餼于賔與大夫介筥米小而多者是尊者所致以多器爲榮今大夫致禮於賔介器寡而大是略之於卑者也旣將公事賔請歸注謂巳至勤也釋曰云巳問大夫者請問三卿與下大夫甞使於彼國幣所及皆是君命及以君物行禮者皆是公事事訖故請歸也云主國留之饗食燕獻無日數盡殷勤也者亦謂至旬賔乃將歸主君乃留賔有此饗食燕獻之等故燕禮注云今燕又冝獻焉是也云無日數者謂行此饗食之等相去希數無常日數盡主人殷勤也凡賔至聽之注拜拜至不拜釋曰案上經云賔三拜乗禽於朝訝聽之遂行舎于郊又案司儀云明日客拜禮賜遂行是臨行大小禮皆拜賜則知唯米稟芻薪等不拜也燕則至苟敬注饗食至以上釋曰云饗食君親爲主尊賔也者以其饗食在廟爲賔故君親爲主至後燕禮在寢又以醉爲度崇於恩殺於敬故賔辭而使介爲賔也以苟敬爲小敬者以阼階西近主爲位諸公坐位故云小敬對戸牖南面爲大敬云更降迎其介以爲賔者介在廟門内西北面降至庭迎之云不與亢禮也者略取燕義文解君不親爲獻主而使宰夫之意也云主人所以致敬者自敵以上者謂兩君相見兩大夫兩士以上則主人親獻也無行至反幣注無行至反幣釋曰云重其賄即上賄在聘于賄是也反幣謂上禮玉束帛乗皮是也云秦康公者案文公十二年左氏傳云秦伯使西乞術來聘云云是也此特來非歴聘歴聘則呉公子札聘於上國聘齊聘魯是也曰子至之辱釋曰此及下三經即上經云公館賔賔辟上介聽命聘享夫人之聘享問大夫送賔公皆再拜注云拜此四事彼見其拜此見其賛辭也君以至君拜注此賛至之辱釋曰云言君以社稷故者夫人與君體敵不敢當其惠也者釋經云社稷故以其禮記哀公問孔子云取夫人爲社稷主婦人無外事天地并社稷后夫人雖不與以夫婦一體故夫人亦得云社稷主是其云社稷故者見夫人與君體敵今夫人使致禮來主人不敢當下文云君貺寡君延及二三老是與君不敵敢當之也又拜送注拜送至之下釋曰此即上經君即館拜送賔故鄭云此冝承上君館之下注不致至敬也釋曰若賔敬主冝致主人敬賔冝拜皆是崇敬若致與拜即是崇新敬故不爲若郷飲酒送賔賔不荅禮有終相􅀋也大夫至饗之注樂與嘉賔爲禮釋曰案鹿鳴序燕羣臣嘉賔此無罪饗之亦是樂賔爲禮者也過則餼之注餼之至執之釋曰云過則餼之謂禮有失誤故引聘義使者聘而誤主君云不言罪者罪將執之者春秋之義聘賔有罪皆執之若然上經云無罪饗之有罪非但不饗又執之此過則餼之雖不饗猶生致過輕故也若然上云罪下云過互見其義也其介爲介注饗賔至禮也釋曰謂饗賔於廟之時還以聘之上介爲介若然上經上介主人別行饗則是從賔爲介得介得饗復別饗也云賔尊行敵禮也者若郷飲酒賔主行敵禮而有介然也有大至致之注卑不至齊禮釋曰此據聘禮而言則無君朝之事若然則前有小國之卿大夫來聘將行饗食有大國卿大夫來聘則廢小國饗食之禮以其卑不與尊齊禮並行之唯大聘有几筵注謂受至神位釋曰案上經云几筵旣設擯者出請命者行聘享及私覿禮畢云宰夫徹几改筵是行聘享爲神位今小聘不爲神位屈也四秉曰筥注此秉至斂穧釋曰云此秉謂刈禾盈手之秉也對上文秉爲量名也引詩者證此秉爲盈手穧即此筥亦一即今人謂之一鋪兩鋪也注一車至作緵釋曰云一車之禾三秅即經致饔餼時云禾三十車車三秅也儀禮䟽卷第二十四
