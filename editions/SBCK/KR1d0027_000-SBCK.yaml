body:
  text: 重刻宋本儀禮䟽序儀禮合䟽於經注而并其卷第始自明正德陳鳳梧迨李元陽以下皆因之從事校讎者多言其譌而宋景德官刊賈公彦元分五十卷不合經注之䟽與唐舊新志同者則均未得見也宋槧殘本幸存僅缺去卅二至卅七無恙者計卷尚四十有四嘉慶初入吾郡黃氏於是張古餘太守得其校本别合嚴州經注重編於江省後阮宫保取配十行不足者也唯時段若膺大令亦得此校本謂之單䟽儀禮亦訂正自來用經傳通解轉改之失而單䟽之善旣有聞矣然五十卷之面目仍未有見之者也吾郡宋槧轉歸予藝芸書舎念世閒無二遂命工影寫重彫之以餉學子使數百年來弗克寓目者今乃可家置一部竟如前此馬廷鸞之得諸篋中豈非大愉快哉宋每半葉十五行每行卄七字修者不等各仍其舊缺卷亦然并卷内缺葉十有三翻因他本盡割棄所標經注無由推知也其卷内正誤補脫去衍乙錯數千百處視邇日諸家約略是同究不若此次之行摹款倣尤傳景德之眞矣若夫撰定異同不特出入紛紜恐致詞費抑復管窺專輒曷若闕如悉心尋繹元文自見云爾道光十年歳次庚寅秋九月長洲汪士鐘序
