body:
  text: 唐朝散大夫行太學博士引文館學士臣賈公彦等撰儀禮䟽序竊聞道本沖虚非言無以表其䟽言有微妙非釋無能悟其理是知聖人言曲事資注釋而成至於周禮儀禮發源是一理有終始分爲二部並是周公攝政太平之書周禮爲末儀禮爲本本則難明末便易曉是以周禮注者則有多門儀禮所注後鄭而已其爲章䟽則有二家信都黃慶者齊之盛德李孟悊者隋日碩儒慶則舉大略小經注踈漏猶登山逺望而近不知悊則舉小略大經注稍周似入室近觀而逺不察二家之䟽互有脩短時之所尚李則爲先案士冠三加有緇布冠皮弁爵弁旣冠又著玄冠見於君有此四種之冠故記人下陳緇布冠委貌周弁以釋經之四種經之與記都無天子冠法而李云委貌與弁皆天子始冠之冠李之謬也喪服一篇凶禮之要是以南北二家章䟽甚多時之所以皆資黃氏案鄭注喪服引禮記檀弓云絰之言實也明孝子有忠實之心故爲制此服焉則絰之所作表心明矣而黃氏妄云衰以表心絰以表首以黃氏公違鄭注黃之謬也黃李之訓略言其一餘足見矣今以先儒失路後冝易塗故悉鄙情聊裁此䟽未敢專欲以諸家爲本擇善而從兼増己義仍取四門助敎李玄植詳論可否僉謀巳定庶可施以函丈之儒青衿之俊幸以去瑕取􅅼得無譏焉士冠禮第一鄭目録云童子任職居士位年二十而冠主人玄冠朝服則是於諸侯天子之士朝服皮弁素積古者四民丗事士之子􅁪爲士冠禮於五禮屬嘉禮大小戴及別録此皆第一釋曰鄭云童子任職居士位年二十而冠爲士身加冠知者鄭見下昬禮及士相見皆據士身自昬自相見又大戴禮公冠篇及下諸侯有冠禮夏之末造亦據諸侯身自加冠故鄭據士身自加冠爲目也鄭云四人丗事士之子􅁪爲士者是齊語文彼云􅁊公謂管仲曰成人之士􅀂何管子對曰四人勿雜處也公曰處士農工商􅀂何管子對曰昔聖王之處士就閑燕也處工就官府也處商就市井也處農就田野也少而習焉其心安焉是四人丗事士之子􅁪爲士也引之者證此士身年二十加冠法􅀂士之子則四十彊而仕何得有二十爲士自加冠也二十而冠者鄭據曲禮文二十曰弱冠故云年二十而冠其大夫始仕者二十巳冠訖五十乃爵命爲大夫故大夫無冠禮又案喪服小功章云大夫爲昆弟之長殤鄭云大夫爲昆弟之長殤小功謂爲士者若不仕者也以此知爲大夫無殤服也小記云大夫冠而不爲殤大夫身已加冠降兄殤在小功是身有德行得爲大夫冠不以二十始冠也若諸侯則十二而冠故左傳襄九年晉侯與諸侯伐鄭還公送晉侯以公宴于河上問公年季武子對曰㑹于沙隨之歳寡君以生注云沙隨在成十六年晉侯曰十二年矣是謂一終一星終也國君十五而生子冠而生子禮也君可以冠矣是諸侯十二而冠也若天子亦與諸侯同十二而冠故尚書金縢云王與大夫盡弁時成王年十五云王與大夫盡弁則知天子亦十二而冠矣又大戴禮云文王十三生伯邑考左傳云冠而生子禮也是殷之諸侯亦十二而冠若夏之天子諸侯與殷天子亦十二而冠可知若天子之子則亦二十而冠故禮記祭法云王下祭殤五又禮記檀弓云君之適長殤車三乗是年十九巳下乃爲殤故二十乃冠矣若天子諸侯冠自有天子諸侯冠禮故大戴禮有公冠篇天子自然有冠禮但儀禮之内亡耳士旣三加爲大夫早冠者亦依士禮三加若天子諸侯禮則多矣故大戴禮公冠篇云公冠四加者緇布皮弁爵弁後加玄冕天子亦四加後當加衮冕矣案下文云天子之元子猶士天下無生而貴者則天子之子雖早冠亦用士禮而冠案家語冠頌云王太子之冠擬冠則天子元子亦擬諸侯四加若然諸侯之子不得四加與士同三加可知鄭又云冠於五禮屬嘉禮者鄭據周禮大宗伯所掌五禮吉凶賔軍嘉而言宗伯云以嘉禮親萬民下云以昬冠之禮親成男女是冠禮屬嘉禮者也鄭又云大小戴及別録此皆第一者大戴戴聖與劉向爲別録十七篇次第皆冠禮爲第一昏禮爲第二士相見爲第三自兹已下篇次則異故鄭云大小戴別録即皆第一也其劉向別録即此十七篇之次是也皆尊卑吉凶次第倫叙故鄭用之至於大戴即以士喪爲第四旣夕爲第五士虞爲第六特牲爲第七少牢爲第八有司徹爲第九郷飲酒第十郷射第十一燕禮第十二大射第十三聘禮第十四公食第十五覲禮第十六喪服第十七小戴於郷飲郷射燕禮大射四篇亦依此別録次第而以士虞爲第八喪服爲第九特牲爲第十少牢爲第十一有司徹爲第十二喪爲第十三旣夕爲第十四聘禮爲第十五公食爲第十六覲禮爲第十七皆尊卑吉凶雜亂故鄭玄皆不從之矣儀禮釋曰儀禮者一部之大名士冠者當篇之小號退大名在下者取配注之意故也然周禮言周不言儀儀禮言儀不言周旣同是周公攝政六年所制題號不同者周禮取别夏殷故言周儀禮不言周者欲見兼有異代之法故此篇有醮用酒燕禮云諸公士喪禮云商祝夏祝是兼夏殷故不言周又周禮是統心儀禮是履踐外内相因首尾是一故周禮巳言周儀禮不須言周周可知矣且儀禮亦名曲禮故禮器云經禮三百曲禮三千鄭注云曲猶事也事禮謂今禮也其中事儀三千言儀者見行事有威儀言曲者見行事有屈曲故有二名也鄭氏注釋曰後漢書云鄭玄字康成青州北海郡髙密縣人鄭崇之後也言注者注義於經下若水之注物亦名爲著故鄭叙云凡著三禮七十二篇云著者取著明經義者也孔子之徒言傳者取傳述之意爲意不同故題目有異也但周禮六官六十叙官之法事急者爲先不問官之大小儀禮見其行事之法賤者爲先故以士冠爲先無大夫冠禮諸侯冠次之天子冠又次之其昬禮亦士爲先大夫次之諸侯次之天子爲後諸侯郷飲酒爲先天子郷飲酒次之郷射燕禮巳下皆然又以冠昬士相見爲先後者以二十而冠三十而娶四十彊而仕即有摯見郷大夫見已君及見來朝諸侯之等又爲郷大夫州長行郷飲酒郷射之事巳下先吉後凶盡則行祭祀吉禮次叙之法其義可知略陳儀禮元本至於禮之大義備於禮記䟽士冠至廟門釋曰自此至宗人告事畢一節論將行冠禮先筮取日之事案下文云布席于門中闑西閾外者闑爲門限即是門外故特牲禮筮日主人即位于門外西面此不言門外者閾外之文可參故省文也注筮者至廟神釋曰鄭知筮以蓍者曲禮云􅀛曰卜蓍曰筮故知筮以蓍也云問日吉凶於易也者下云􅀂不吉則筮逺日如初儀又案周禮大卜掌三易一曰連山二曰歸藏三曰周易筮得卦以易辭占吉凶故云問日吉凶於易也不筮月者夏小正云二月綏多士女冠子取妻時也旣有常月故不筮也云冠必筮日於廟門者重以成人之禮成子孫也者案冠義云筮日筮賔所以敬冠事敬冠事所以重禮是筮日爲重禮之事也冠義又云古者重冠重冠故行之於廟行之於廟者所以尊重事尊重事而不敢擅重事不敢擅重事所以自卑而尊先祖也是成人之禮成子孫也此經唯論父子兄弟不言祖孫鄭兼言孫者家事統於尊􅀂祖在則爲冠主故兼孫也云廟謂禰廟者案昬禮行事皆直云廟記云凡行事受諸襧廟此經亦直云廟故知亦於禰廟也然儀禮之内單言廟者皆是禰廟􅀂非禰廟則以廟名別之故聘禮云賔朝服問卿卿受于祖廟又受聘在始祖廟即云不腆先君之祧是不言於廟舉祖祧以别之也士於廟若天子諸侯冠在始祖之廟是以襄九年季武子云以先君之祧處之祧則與聘禮先君之祧謂遷主所藏始祖同也􅀂然服氏注以祧爲曾祖者以其公還及衞冠於衞成公之廟服注成公衛曾祖故以祧爲曾祖廟時不冠於衛之始祖以非已廟故也無大夫冠禮􅀂幼而冠者與士同在禰廟也云不於堂者嫌蓍􅀛之靈由廟神者此據經冠在廟堂此蓍筮在門外不同處故以廟決堂以蓍自有靈知吉凶不假廟神故云嫌蓍􅀛之靈由廟神也案天府職云季冬陳玉以貞來歳之美惡注云問歳之美惡謂問於􅀛凡卜筮者實問於􅀑神􅀛筮能出其卦兆之占耳􅀂然卜筮實問七八九六之􅀑神故以六玉禮耳而􅀛筮直能出其卦兆之占似無靈者各有所對若以􅀛蓍對生數成數之􅀑神則蓍􅀛直能出卦兆不得有神若以卦對生成之􅀑神則蓍􅀛亦自有神是以易繫辭云蓍之德圎而神又云定天下之吉凶成天下之亹亹者莫善於蓍􅀛又郭璞云上有䕃叢蓍下有千齡蔡凡蟲之智莫善於􅀛凡草之靈莫善於蓍􅀛筮自有靈也若蓍自有神不假廟神也不於寢門筮者一取成人之禮成子孫二兼取􅀑神之謀故易繫辭云人謀􅀑謀鄭注云􅀑謀謂謀卜筮於廟門是也主人至西面釋曰此主人將欲謀日之時先服即位於禰廟門外東西面立以待筮事也注主人至入與釋曰經直云主人當是父子加冠之禮知兼有兄者論語云出則事公卿入則事父兄父兄者一家之統父不在則兄爲主可知故兼其兄也又案下文若􅀌子則父兄戒宿冠之日主人紒而迎賔則無親父親兄故彼注云父兄諸父諸兄則知此主人迎賔是親父親兄也云玄冠委貌者此云玄冠下記云委貌彼云委貌見其安正容體此云玄冠見其色實一物也云朝服者十五􅂛布衣者雜記云朝服十五􅂛布也云素裳者雖經不言裳裳與韠同色云素韠者故知裳亦積白素絹爲之也云衣不言色者衣與冠同也者禮之通例衣與冠同色故郊特牲云黃衣黃冠是也裳與韠同色故下爵弁服纁裳韎韐韎韐即纁之􅀋是也經直云朝服不言色與冠同可知也􅀂然鄭不言裳與韠同色者舉衣與冠同裳與韠同亦可知故不言也其衣冠色異經即别言之是以下云爵弁服純衣是也云筮必朝服者尊蓍􅀛之道者此決正冠時主人服玄端爵韠不服此服朝服是尊蓍􅀛之道也若然下又云有司如主人服又宿賔賔如主人服又宿賛冠者及夕爲期皆朝服云尊蓍􅀛者案郷飲酒主人朝服則此有司賔主朝服自是㝷常相見所服非特相尊敬之禮此筮而朝服決正冠時與士之祭禮入廟常服玄端今此筮亦在廟不服玄端故云尊蓍􅀛之道此筮唯有蓍草言􅀛者案周禮小事徒筮而已􅀂大事先筮而後􅁲􅀛筮是相將之物同著朝服故兼言􅀛是以雜記􅁲筮皆朝服也案特牲禮筮日與祭同服玄端少牢筮日與祭同服朝服不特尊􅆱􅀛者彼爲祭事􅀛不可尊於先祖故同服此爲冠事冠事􅀛可尊於子孫故服異也云緇帶黑繒帶者案玉藻云君素帶终裨大夫素帶裨垂士練帶率下裨注云大夫裨其紐及末士裨其末而已又云雜帶君朱緑大夫玄華士緇裨鄭云君裨帶上以朱下以緑终之大夫裨垂外以玄内以華士裨垂之下外内皆以緇是謂緇帶鄭彼云是謂者指此文也􅀂然天子諸侯并繞􅆎及垂者皆裨之大夫則不裨其繞􅆎者直裨垂之三尺屈而重者士則裨其末繞三尺所垂者不裨在者􅀂然大帶所用物大夫巳上用素士練繒爲帶體所裨者用緇則此言緇據裨者而言也云士帶博二寸再繚四寸屈垂三尺者此亦玉藻文大夫巳上大帶博四寸此士卑降於大夫巳上博二寸再繚共爲四寸屈垂三尺則大夫巳上亦屈垂三尺同矣云素韠白韋韠者案玉藻云韠君朱大夫素士爵韋彼以韠爲揔目而云君朱大夫素士爵韋是韠色不同下云韋者是君大夫同用韋也但彼是玄端服之韠此士用素韋爲之故鄭云白韋韠也又云韠長三尺至博二寸亦皆玉藻文鄭彼注云頸五寸亦謂廣也頸中央肩兩角皆上接革帶肩與革帶廣同此韠即黻也祭服謂之黻朝服謂之韠也云天子與其臣玄冕以視朔皮弁以日視朝者此約玉藻而知案彼云天子玄端聽朔於南門之外皮弁以日視朝又云諸侯皮弁以聽朔於太廟朝服以日視朝於内朝彼注云端當爲冕謂天子以玄冕聽朔於南門之外明堂之中彼皆不言臣此鄭兼言臣者欲見在朝君臣同服引之者證此玄冕朝服而筮者是諸侯之士則諸侯與其臣與子加冠同服皮弁以筮日天子與其臣與子加冠同服玄冕以筮日矣知天子服玄冕諸侯服皮弁以筮日者鄭旣取君臣同服明筮時還君臣同服若云天子用玄冕諸侯用皮弁其臣不得上同於君君下就臣同朝服也云凡染黑五入爲緅七入爲緇玄則六入與者案爾雅一染謂之縓再染謂之赬三染謂之纁此三者皆是染赤法周禮鍾氏染鳥羽云三入爲纁五入爲緅七入爲緇此是染黑法故云凡染黑也但爾雅及周禮無四入與六入之文禮有色朱玄之色故注此玄則六入下經注云朱則四入無正文故皆云與以疑之但論語有紺緅連文紺又在緅上則以纁入赤爲朱􅀂以纁入黒則爲紺故淮南子云以涅染緅則黒於涅又以紺入黒汁則爲緅故紺緅連言也若然玄爲六入緇爲七入深淺不同而鄭以衣與冠同以緇與玄同色者大同小異皆是黑色故云同也有司至北上釋曰此論主人有司從主人有事故立位於廟門外西方東面以待事也注有司至是也釋曰士雖無臣皆有屬吏胥徒及僕隷故云有司羣吏有事者也云謂主人之吏所自辟除府史以下者案周禮三百六十官之下皆有府史胥徒不得君命主人自辟除去役賦補置之是也又案周禮皆云府史此云羣吏吏史亦一也故舉漢法爲證又周禮鄭注云官長所自辟除此云主人者以此經云主人故依經而直云主人中亦爲長者也又此注以有司爲羣吏案特牲以有司爲士屬吏不同者言羣吏則謂府史胥徒也言屬吏則謂君命之士是以下文宿賛冠者注云謂賔􅀂他官之屬中士若下士也又主人賛者亦云其屬中士若下士是言屬者尊之義特牲之有司士之屬吏亦親􅀋也特牲有司之上有子姓此文無者彼祭祀事重故子姓皆來此冠事稍輕故容有不至故不言筮與至西塾釋曰下云布席於門中闑西閾外彼據筮此云西塾據陳處注筮所至堂也釋曰筮所以問吉凶謂蓍也者案曲禮云􅀛爲卜䇿爲筮故知問吉凶謂蓍案易筮法用四十九蓍分之爲二以象兩卦一以象三揲之以四以象四時歸竒於扐以象閏十有八變而成卦是也云所卦者所以畫地記爻者筮法依七八九六之爻而記之但古用木畫地今則用錢以三少爲重錢重錢則九也三多爲交錢交錢則六也兩多一少爲單錢單錢則七也兩少一多爲坼錢拆錢則八也案少牢云卦者在左坐卦以木故知古者畫卦以木也云易曰六畫而成卦者􅀃卦文彼云昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫成卦注云三才天地人之道六畫畫六爻引之者證畫地識爻之法云西塾門外西堂也者案爾雅云門側之堂謂之塾即士虞禮云羞燔俎在内西塾上南順是也筮在門外故知此經西塾門外西堂也布席至西面釋曰此所布之席擬􅁲筮之事言在中門者以大分言之云闑西閾外者指陳席處也注闑門至爲蹙釋曰云闑門橛者闑一名橛也云閾閫也者曲禮云外言不入於閫閫門限與閾爲一也云古文闑爲槷閾爲蹙者遭於暴秦燔滅典籍漢興求録遺文之後有古書今文漢書云魯人髙堂生爲漢博士傳儀禮十七篇是今文也至武帝之末魯恭王壞孔子宅得亡儀禮五十六篇其字皆以􅂐書是爲古文也古文十七篇與髙堂生所傳者同而字多不同其餘三十九篇絶無師說祕在於館鄭注禮之時以今古二字並之􅀂從今文不從古文即今文在經闑閾之等是也於注内疊出古文槷蹙之屬是也若從古文不從今文則古文在經注内疊出今文即下文孝友時格鄭注云今文格爲嘏又喪服注今文無冠布纓之等是也此注不從古文槷蹙者以槷蹙非門限之義故從今不從古也儀禮之内或從今或從古皆逐義彊者從之若二字俱合義者則互挽見之即下文云壹揖壹讓􅂛注云古文壹皆作一公食大夫三牲之肺不離賛者辨取之一以授賔注云古文一爲壹是大小注皆疊今古文二者俱合義故兩從之又鄭疊古今之文者皆釋經義盡乃言之􅀂疊今古之文􅀃須別釋餘義者則在後乃言之即下文孝友時格注云今文格爲嘏又云凡醮不祝之􅀋是也􅀂然下記云章甫殷道鄭云章明也殷質言以表明丈夫也甫或爲父今文爲斧事相違故因疊出合文也筮人至主人釋曰此經所陳據筮時之事案少牢云史左執筮右抽上韇兼與筮執之東面受命于主人得主人命訖史曰諾西面于門西抽下韇左執筮右兼執韇以擊筮乃立筮此云筴彼云筮一也但筮法不殊此亦應不異少牢具陳此不言者文不具當與彼同案三正記大夫蓍五尺故立筮士之蓍三尺當坐筮與彼異也注筮人至筮也釋曰案周禮春官筮人掌三易一曰連山二曰歸藏三曰周易注云問蓍曰筮其占易是筮人主三易者也云韇藏筴之器者韇有二其一從下向上承之其一從上向下韜之也云今時藏弓矢者謂之韇丸也者此舉漢法爲況亦欲見韜弓矢者以皮爲之故詩云象弭魚服是以魚皮爲矢服則此韇亦用皮也知自西方而前者上云即位於西方故知前向東方受命也云受命者當知所筮也者謂執之不知以請筮何事宰遂命之也凡卜筮之法案洪範云七稽疑擇建立􅁲筮人三人占從二人之言又案尚書金縢云乃􅁲三􅀛一習吉則天子諸侯􅁲時三􅀛並用於玉瓦原三人各占一兆也筮時連山歸藏周易亦三易並用夏殷以不變爲占周易以變者爲占亦三人各占一易筮皆三占從二三者三吉爲大吉一凶爲小吉三凶爲大凶一吉爲小凶案士喪禮筮宅卒筮執卦以示命筮者命筮者受視反之東面旅占注云旅衆也反與其屬共占之謂掌連山歸藏周易者又􅁲葬日云占者三人在其南注云占者三人掌玉兆瓦兆原兆者也少牢大夫禮亦云三人占鄭旣云反與其屬占之則鄭意大夫􅁲筮同用一􅀛一易三人共占之矣其用一􅀛一易則三代顆用不專一代故春秋緯演孔圖云孔子脩春秋九月而成􅁲之得陽豫之卦宋均注云陽豫夏殷之卦名故今周易無文是孔子用異代之筮則大夫􅁲筮皆不常據一代者也宰自至賛命注宰有至自右釋曰知宰是有司主政敎者士雖無臣以屬吏爲宰􅀂諸侯使司徒兼冢宰以出政敎之􅀋故云主政敎者引少儀者取證賛命在右之義以其地道尊右故賛命皆在右是以士喪禮亦云命筮者在主人之右注云命尊者冝由右出特牲云宰自主人之左賛命不由右者爲神求吉變故也士喪在右不在左者以其始死未忍異於生故在右也少牢宰不賛命大夫尊屈士卑不嫌故使人賛命也筮人至在左釋曰此言筮人於主人受命訖行筮事也但即席坐西面者主人爲筮人而言作坐文冝在西面下今退西面於下者欲西面之文下就畫卦者亦西向故也注即就至爻者釋曰鄭知東面受命者以其上文有司在西方東面主人在門東西面今從門西東而主人之宰命之故東面受命可知也知右還北行就席者以其主人在門外之東南席在門中故知右還北行乃得西面就席坐也云卦者有司主畫地識爻者上云所卦者謂於此云卦者據人以杖畫地記識爻之七八九六者也卒筮至主人釋曰此言所筮六爻俱了卦體得成更以方版畫體示主人之事也注卒巳至之卦釋曰云書卦者筮人者下文云筮人還東面旅占明此書卦是筮人也不使他人書卦者筮人尊卦亦是尊􅆱􅀛之道也案特牲云卒筮寫卦筮者執以示主人注云卦者主畫地識爻六爻備乃以方版寫之則彼寫卦亦是卦者故鄭云卦者畫爻者彼爲祭禮吉事尚提提故卦者寫卦筮人執卦以示主人士喪禮注云卦者寫卦示主人經無寫卦之文是卦者自畫示主人以其喪禮遽於事故卦者自畫自示主人也此冠禮筮者自寫自示主人冠禮異於祭禮喪禮故也主人受眡反之釋曰此筮訖寫所得卦示主人主人受得省視雖未辨吉凶主人尊先受視以知卦體而已主人旣知卦體反還與筮人使人知共占吉凶也筮人至告吉釋曰此言筮人旣於主人受得卦體還於門西東面旅共占之是吉卦乃進向門東東面告主人云吉也􅀂不至初儀釋曰曲禮吉事先近日此冠禮是吉事故先筮近日不吉乃更筮逺日是上旬不吉乃更筮中旬又不吉乃更筮下旬云如初儀者自筮於廟門巳下至告吉是也注逺日旬之外釋曰曲禮云旬之内曰近某日旬之外曰逺某日彼據吉禮而言旬之内曰近某日據士禮旬内筮故云近某日是以特牲旬内筮日是也旬之外曰逺某日者據大夫以上禮旬外筮故言逺某日是以少牢筮旬有一日是也案少牢云若不吉則及逺日又筮日如初鄭注云及至也逺日後丁若後已言至逺日又筮日如初明不并筮則前月卜來月之上旬上旬不吉至上旬又筮中旬中旬不吉至中旬又筮下旬下旬不吉則止不祭祀也若然特牲不言及則可上旬之内筮不吉則預筮中旬中旬不吉又預筮下旬又不吉則止若此冠禮亦先近日士冠禮亦於上旬之内預筮三旬不吉則更筮後月之上旬以其祭祀用孟月不容入他月若冠子則年巳二十不可止然須冠故容入後月也􅀂然大夫巳上筮旬外士筮旬内此士禮而注云逺日旬之外者此逺日旬之外自是當月上旬之内筮不吉更筮中旬云逺日非謂曲禮文大夫巳上前月預筮來月上旬爲逺某日者彼自有逺日與此別也徹筮席注徹去也斂也釋曰據席則徹去之筮則斂藏之故兩訓之也宗人告事畢注宗人至禮者釋曰士雖無臣亦有宗人掌禮比於宗伯故云有司主禮者主人至辭許釋曰自此巳下至賔拜送一節論主人筮日訖三日之前廣戒僚友使來觀禮之事也云主人戒賔者謂主人親至賔大門外之西東面賔岀大門外之東西面戒之云賔禮辭許者即下云戒賔曰某有子某將加布於其首願吾子之敎之也賔對曰某不敏恐不能共事以病吾子敢辭主人曰某猶願吾子之终敎之也賔對曰吾子重有命某敢不從是一度辭後乃許之是賔禮辭許者也注戒警至許也釋曰同官爲僚同志爲友此賔與主人同是官與爲同志故以僚友解之此謂上中下士甞執摯相見者也􅀂未甞相見則不必戒故鄭以僚友言之是也云古者有吉事則樂與賢者歡成之者則此經戒賔使來者是也云有凶事則欲與賢者哀戚之者則士喪禮始死命赴者使告君及同僚之等是也云禮辭一辭而許者即此文是也云再辭而許曰固辭者則士相見云某也願見無由達某子以命命某見主人對曰某子命某見吾子有辱請吾子之就家也某將走見賔對曰某不足以辱命請終賜見主人對曰某不敢爲儀固請吾子之就家也某將走見賔對曰某不敢爲儀固以請主人對曰某也固辭不得命將走見是其再辭而許名爲固辭之義也云三辭曰終辭不許也者又士相見云士見於大夫終辭其摯是三辭不許爲終辭之義也若一辭不許後辭上許則爲禮辭許若再辭不許後三辭上許則爲再辭而許之曰固辭􅀂不許至於三辭又不許則爲三辭曰終辭不許也又三辭而許則曰三辭若三辭不許乃曰終辭是以公食大夫戒賔上介出請入告三辭又司儀云諸公相爲賔主君郊勞交擯三辭車逆拜辱三揖三辭注云先辭辭其以禮來於外後辭辭􅂛堂皆是三辭而許稱三辭􅀂然此戒賔賔禮辭許不固辭案郷飲酒主人請賔賔禮辭許注云不固辭者素所有志是賔習道藝本望賔舉是素所有志故不固辭此亦素有志樂與主人歡成冠禮故不固辭諸經云禮辭許者是素有志之􅀋也案郷飲酒主人戒賔賔拜辱主人荅拜乃請賔賔禮辭許主人再拜賔荅拜主人退賔拜辱郷射亦然皆與此文不同此經文不具當依彼文爲正但此不言拜辱者亦是不爲賔已故也前期至之儀釋曰此文下盡宿賛冠者亦如之論筮賔􅀂賛冠者之節云前期三日者加日爲期期前三日也筮賔者謂於僚友衆士之中筮取吉者爲加冠之賔也云如求日之儀者亦於廟門外下至告事畢唯命筮別其餘威儀並同故云如求日之儀也命筮雖無文宰賛蓋云主人某爲適子某加冠筮某爲賔庶幾從之若庶子則改適爲一庶字異餘亦同此經不云命筮并上筮日亦不云命筮者皆文不具也注前期至國本釋曰云前期三日空二日也者謂正加冠日是期日冠日之前空二日外爲前期三日故云空二日也二日之中雖有宿賔宿賛冠者及夕爲期但非加冠之事故云空也云筮賔筮其可使冠子者即下文三加皆賔親加冠於首者是也云賢者􅁪吉者解經先戒後筮之意凡取人之法先筮後戒今以此賔是賢者必知吉故先戒賔賔巳許方始筮之以其賢􅁪自吉故先戒後筮之也􅀂賢􅁪吉必筮之者取其審愼重冠禮之事故鄭引冠義爲證也云重禮所以爲國本者詩云人而無禮胡不遄死禮運云治國不以禮猶無耜而耕也故云重禮所以爲國本也然冠旣筮賔特牲少牢不筮賔者彼以祭祀之事主人自爲獻主羣臣助祭而已天子諸侯之祭祭前巳射於射宫擇取可預祭者故不筮之也乃宿至荅拜釋曰此經謂宿賔擯者傳主人辭入内告賔賔如主人服出門與主人相見之儀也注宿進至朝服釋曰鄭訓宿爲進者謂進之使知冠日當來故下文宿曰某將加布於某之首吾子將莅之敢宿賔對曰某敢不夙興是宿之使進之義也云宿者必先戒者謂若賔及賛冠同在上戒賔之内巳戒之矣今又宿是宿者必先戒也云戒不必宿者即上文戒賔之中除正賔及賛冠者但是僚友欲觀禮者皆戒之使知而已後更不宿是戒不必宿者也云不宿者爲衆賔或悉來或否者此決賔與賛冠者戒而又宿不得不來衆賔主來觀禮非要須來容有不來者故直戒不宿也云主人朝服者見上文筮日時朝服至此無改服之文則知皆朝服凡有戒無宿者非止於此案郷飲酒郷射主人戒賔及公食大夫各以其爵皆是當日之戒理無宿也又大射宰戒百官有事於射者射人戒諸公卿大夫射司士戒士射與賛者前射三日宰夫戒宰及司馬皆有戒而無宿是也射人宿視滌此言宿者謂將射之前於宿預視滌濯非戒宿之意也若然特牲禮云前期三日宿尸前無戒而直有宿者特牲文不具其實亦有戒也又禮記祭統云先期旬有一日宫宰宿夫人夫人亦散齊七日致齊三日注云宿讀爲肅肅猶戒也戒輕肅重也者彼以夫人尊故不得言戒而變言宿讀爲肅者肅亦戒之義彼以宿當戒處非謂祭前三日之宿也大宰云祀五帝則掌百官之誓戒者謂戒百官使之散齊至祭前三日當致齊也凡宿賔之法案特牲云前期三日筮尸乃宿尸厥明夕陳鼎則前期二日宿之也少牢筮吉下云宿鄭注云大夫尊儀益多筮月旣戒諸官以齊戒矣至前祭一日又戒以進之使知祭日當來又云前宿一日宿戒尸注云先宿尸者重所用爲尸者又爲將筮吉則乃遂宿尸是前祭二日筮尸訖宿尸至前祭一日又宿尸天子諸侯祭前三日宿之使致齊也乃宿至拜送釋曰上據擯者傳辭賔出與主人相見此經據主人自致時故再舉宿賔之文也宿賛至如之注賛冠至明日釋曰案下文冠子之時賛者坐櫛設纚卒紘之􅀋是賛冠者佐賔爲冠事者以其佐賔爲輕故不筮也云謂賔若他官之屬者此所取本由主人之意或取賔之屬或取他官之屬故鄭兩言之案周禮三百六十官毎官之下皆有屬官假令上士爲官首其下有中士下士爲之屬􅀂中士爲官首其下即有下士爲之屬也云中士􅀂下士也者此據主人是上士而言之賛冠者皆降一等假令主人是上士賔亦是上士則取中士爲之賛假令主人是下士賔亦是下士則亦取下士爲之賛禮窮則同故也云宿之以筮賔之明日者以下有厥明夕爲期是冠前一日宿賔宿賛在厥明之上則去冠前二日矣筮賔是前期三日則知宿賔賛冠者是筮賔之明日可知不在宿賔下而在宿賛冠之下言之者欲取爲厥明相近故也厥明至北上釋曰自此至賔之家論冠前一日之夕爲明日加冠之期告賔之事也云厥明夕爲期者謂宿賔與賛冠明日向暮爲加冠之期必於廟門者以冠在廟知亦在廟爲期也主人之􅀋在門東賔之􅀋在門西者各依賔主之位夾處東西也注厥其至朝服釋曰知宿服朝服者以其宿服如筮日之服筮日朝服轉相如故知是朝服也擯者至行事釋曰上經布位巳訖故此經見爲期之事言請期者謂請主人加冠之期言告日者即是宰賛命告之也注擯者至冠事釋曰上云有司此言擯者故知擯者是有司佐主人行冠禮者也云在主人曰擯在客曰介者案聘禮及大行人皆以在主人曰擯在客稱介亦曰相司儀云毎門止一相是也云旦日正明行冠事者案特牲請期曰羹飪鄭注云肉謂之羮飪熟也謂明日質明時而曰肉熟重豫勞賔此無羹飪故云質明少牢云旦明行事故此注取彼而言旦日正明行冠事也告兄弟及有司注擯者告也釋曰上文陳兄弟及有司位次此告訖下乃云告事畢則兄弟及有司亦廟門之外矣必告之者禮取審慎之義故也必知擯者告者上擯者請期此即云告明還是擯者告可知告事畢注宗人告也釋曰知宗人告者亦約上文筮日時宗人告事得知也擯者至之家釋曰有司是家之屬吏者則告期皆得在位賔是同僚之等爲期時不在故就家告之於夕爲期當暮即得告之者以其共仕於君其家必在城郭之内相近故得告也夙興至洗東釋曰自此至賔􅂛則東面論將冠子豫陳設冠與服器物之事也注夙早至小異釋曰云洗承盥洗者棄水器也者謂盥手洗爵之時恐水􅁾地以洗承盥洗水而棄之故云棄水器也云士用鐵者案漢禮器制度洗之所用士用鐵大夫用銅諸侯用白銀天子用黃金也云榮屋翼也者即今之博風云榮者與屋爲榮飾言翼者與屋爲翅翼也云周制自卿大夫以下其室爲夏屋者言周制者夏殷卿大夫以下屋無文故此經是周法即以周制而言也案此經是士禮而云榮郷飲酒卿大夫禮郷射喪大記大夫士禮皆云榮又案匠人云夏后氏丗室堂脩二七廣四脩一五室此謂宗廟路寢同制則路寢亦然雖不云兩下爲之彼下文云殷人重屋四阿鄭云四阿四注屋重屋謂路寢殷之路寢四阿則夏之路寢不四阿矣當兩下爲之是以檀弓孔子云見􅀂覆夏屋者矣鄭注云夏屋今之門廡漢時門廡也兩下爲之故舉漢法以況夏屋兩下爲之或名兩下屋爲夏屋夏后氏之屋亦爲夏屋鄭云卿大夫以下其室爲夏屋兩下而周之天子諸侯皆四注故喪大記云􅂛自屋東榮鄭以爲卿大夫士其天子諸侯當言東霤也周天子路寢制似明堂五室十二堂上圎下方明四注也諸侯亦然故燕禮云洗當東霤鄭云人君爲殿屋也云水器尊卑皆用金罍及大小異者此亦案漢禮器制度尊卑皆用金罍及其大小異此篇與昬禮郷飲酒郷射特牲皆直言水不言罍大射雖云罍水不云枓少牢云司宫設罍水於洗東有枓鄭注云設水用罍沃盥用枓禮在此也欲見罍枓俱有餘文無者不具之意也儀禮之内設洗與設尊或先或後不同者􅀂先設洗則兼餘事此士冠賔與賛共洗昬禮有夫婦與御媵之等少牢特牲兼舉鼎不專爲酒以是皆先設洗郷飲酒郷射先設尊者以其專爲酒燕禮大射自相對大射辨尊卑故先設尊燕禮不辨尊卑故先設洗又儀禮之内或有尊無洗或尊洗皆有文不言設之者是不具也儀禮䟽卷第一
