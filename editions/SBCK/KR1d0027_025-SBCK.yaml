body:
  text: 唐朝散大夫行太學博士􅀪文館學士臣賈公彦等撰公食大夫禮第九鄭目録云主國君以禮食小聘大夫之禮於五禮屬嘉禮大戴第十五小戴第十六别録第九釋曰鄭知是小聘大夫者案下文云宰夫自東房薦豆六於醬東設黍稷六簋又設庶羞十六豆此等皆是下大夫小聘之禮下乃别云上大夫八豆八簋又云上大夫庶羞二十豆是食上大夫之法故知此篇據小聘大夫也若然聘禮據侯伯之大聘此篇據小聘大夫者周公設經互見爲義案篇末云魚腸胃倫膚若九若十有一下大夫則若七若九鄭注云此以命數爲差九謂再命者十一謂三命者七謂一命者九或上或下者再命謂小國之卿次國之大夫也卿則曰上大夫則曰下大國之􅀌視子男以此言之魚腸胃倫膚皆七者謂子男小聘之大夫此公食序在聘禮之下是因聘而食之不言食賔與上介直云大夫者若云食賔與上介則小聘使下大夫上介乃是士是以直云大夫兼得大夫聘賔與上介亦兼小聘之賔若然聘禮據大聘因見小聘此公食先見小聘後言大聘者欲見大聘小聘或先或後不常之義公食至其爵注戒猶至親敬釋曰自此盡如聘論主君使大夫就館戒聘客使來行食禮之事云各以其爵者此篇雖據子男大夫爲正兼見五等諸侯大聘使卿之事故云各以其爵也上介出請入告注問所以來事釋曰據大夫就賔館之門外賔使上介出請大夫所爲來之事三辭注爲旣至敢當釋曰旣先受賜者謂聘日致饔受賜大禮故今辭食不敢當之但受饔之時禮辭而已至於饗食皆當三辭賔不至從之注不拜至終事釋曰案郷飲酒主人拜送賔不荅拜云禮有終此賔不拜送爲從之不終事故賔不拜送也若然郷飲酒郷射戒賔遂從之而云拜辱拜送者以其主人先反不相隨故得拜辱拜送覲禮使者勞賔於門外侯氏再拜遂送之使者旣不先反猶拜送者尊天子使故也賔朝至如聘注於是至次俟釋曰云大門外如聘者則賔主設擯介以相待如聘時云於是朝服則初時􅀇端者初時謂賔發館時服􅀇端若郷射主人朝服乃速賔鄭注云射賔輕也戒時􅀇端以此言之亦賔在館拜所戒大夫即􅀇端賔遂從大夫至君大門外入次乃去􅀇端著朝服出次即位也云如聘亦入於次俟者案聘禮賔皮弁聘至于朝賔入于次注云入于次者俟辦則此入次亦俟主人辦也若然聘禮重賔發館即皮弁此食禮輕及大門乃朝服即位具注主人至之外釋曰云擯者俟君於大門外者解即位之事云卿大夫士序及宰夫具其饌物皆於廟門之外者以其君迎賔入始言卿大夫以下廟内之位則知此具饌物時皆在廟門外也故鄭下文注云自卿大夫至此不先即位從君而入者明助君饗食賔自無事故不在大門内是其義也羹定注肉謂至爲節釋曰云肉謂之羹者爾雅文云著之者下以爲節者羹定與下文陳鼎之節爲目也甸人至若編注七鼎至作密釋曰云七鼎一大牢也者案聘禮致飱與饔餼皆九鼎此亦一大牢而七鼎者此食禮輕無鮮魚鮮腊與聘禮腥一牢鼎七同也云甸人冢宰之屬兼亨人者案天官有甸師氏兼有亨人皆屬冢宰彼天子禮諸侯比天子爲兼官故甸人兼亨人也必使甸人陳鼎兼亨人者案亨人職云掌共鼎鑊又案甸師職云掌帥其徒以薪蒸役外内饔之事故使甸人兼亨人陳鼎若然案少牢羹定饔人陳鼎者以其無甸人官故饔人陳鼎也旣夕士禮云甸人抗重又云甸人築坅坎以士無臣使屬吏攝甸人之事非謂置此官也云凡鼎鼏蓋以茅爲之者諸文多言鼎鼏皆不言所用之物此經雖言若束若編亦不指所用之體故鄭云蓋以疑之然必知用茅者詩云白茅苞之尚書孔傳云苴以白茅茅是絜白之物故疑用茅也設洗如饗注必如至作郷釋曰云必如饗者先饗後食如其近者也鄭據此文行食禮而云如饗明先饗設洗訖乃後食故郷前如之是先饗後食也案聘禮云公於賔壹食再饗則食在饗前矣不言如燕禮者饗食在廟燕在寢則是饗食重先行之故二者自相先後是以不得用燕禮決之也引燕禮者欲見設洗之法燕與饗食同故無饗禮引燕禮而言也小臣至堂下注爲公至服位釋曰知此爲公盥者按特牲尸尊不就洗盥用槃匜故知此所設槃匜亦爲公盥不就洗也云小臣於小賔客饗食掌正君位者按夏官小臣職云小祭祀賔客饗食如大僕之法此諸侯之聘客饗食故亦小臣掌之也宰夫至席几注設筵至略此釋曰云設筵於戸西南面而左几者以其賔在戸牖之閒南面又生人左几異於神右几故也云公不賔至授几者親設湆醬可以略此者決聘禮禮賔時公親授几者以無設湆醬之事故也故下記云不授几鄭云異於醴也飲酒至東房注飲酒至飲也釋曰云飲酒清酒也者按周禮酒正注先鄭云清酒祭祀之酒後鄭從之則此賔客用之者優賔故也云漿飲酨漿也者酨之言載以其汁滓相載故云酨漢法有此名故也云其俟奠於豐上也者下云飲酒實於觶加于豐是也此云奠即彼加也云飲酒先言飲明非獻酬之酒也者以其郷飲酒燕禮等獻酬之酒皆不言飲飲之可知此擬酳口故言飲是異於獻酬酒故也是以酒人云共賔客之禮酒飲酒鄭注云禮酒饗燕之酒不言飲食之酒云飲亦是其義也云漿飲先言漿别於六飲也者按漿人云共王六飲水漿醴涼醫酏彼先云六飲後云水漿與此先云漿不同故云先云漿别於六飲必别於六飲者彼六飲爲渴而飲此漿爲酳口不爲渴故異之凡宰至東房注凡非至在堂釋曰云酒漿不在凡中者雖無尊猶嫌在堂者以其酒漿常在堂若不待言之則凡中不含之言謂酒漿仍在堂故上特言之公如至門内注不出至國君釋曰自此盡階上北面再拜稽首論主君迎賔入拜至之事云不出大門降於國君者按周禮司儀云將幣交擯三辭車逆拜辱賔車進荅拜又云致饔餼饗食皆如將幣之儀是國君來則出迎也及廟門公揖入注廟禰廟也釋曰儀禮之内單言廟者皆據禰廟是以昏禮納采云至于廟記云凡行事必用昏昕受諸禰廟以此而言則言廟皆禰廟也若非禰廟則言廟祧若聘禮云不腆先君之祧問卿云受于祖廟之􅀋是也但受聘在祖廟食饗在禰燕輕於食饗又在寢是其差次也至于階三讓釋曰按曲禮云客若降等則就主人之階主人固辭然後客復就西階此亦降等初即就西階者此君與客食禮禮之正彼謂大夫士以小小燕食之禮故與此不同也公􅂛二等賔􅂛注逺下人君釋曰言逺下人君者亦取君行一臣行二之義也大夫至北上注東夾至於堂釋曰此謂主國卿大夫立位云取節於夾明東於堂者序巳西爲正堂序東有夾室今大夫立于夾室之南是東於堂也士立至西上注統於至在此釋曰按燕禮大射士在西方東面北上不統於門又在門東北面冝東統於君今在門東西上統於門者以賔在門西辟賔在此非正位故也小臣至南上注宰宰至南上釋曰云宰東夾北西面南上者謂在北堂之南與夾室相當故云夾北也云宰宰夫之屬也者以經云南上則非止一人但宰官之内有宰夫之等是以下有宰夫之官皆於此立可知故云之屬也若然宰尊官在小臣之下者以其小臣位在北堂南故先見之非謂尊卑先後爲次也内官至南上注夫人至無事釋曰云夫人之官内宰之屬也者經云内官按周禮天官内宰下大夫掌王后巳下彼天子内官諸侯未必有内宰以其言内官之士以士爲之明當天子内宰故舉内宰況之也云自卿大夫至此不先即位從君而入者明助君饗食賔自無事者按前聘時君迎客于大門内時卿大夫巳下入廟即位者受聘事重非饗食之事故先入廟即位此巳下雖有宰及宰夫者皆有事及大夫二牲士庶羞之等皆助君食賔非己之事故後入也介門至西上注西上至東上釋曰云然則承擯以下立于士西少進東上者以其介統於賔而西上則擯統於君而東上可知承擯以下旣是有事之人承擯是大夫又尊於士故知少進東上不言上擯者上擯有事其位不定故不言公當至再拜注楣謂至降矣釋曰自此盡稽首論公拜至賔荅拜之事云公再拜賔降矣者釋經賔降在至再拜下公再拜上以其至再拜者公巳一拜賔即降下公再拜者賔降後又一拜雖一拜本當再拜故皆以再拜言之猶下侑幣之時公一拜賔降公再拜注云賔不敢俟成拜也若然鄭云公再拜賔降矣者解經至再拜者賔降也賔西至荅拜釋曰自此盡稽首論賔降荅拜之事此云荅拜下云拜也並據公未降之前賔爲一拜以其賔始一拜之閒公降一等故閒在一辭之中是以鄭云賔降再拜釋經北面荅拜及拜也云公降擯者釋辭矣者解經辭曰寡君從子雖將拜興也鄭注云賔猶降終其再拜稽首者按下文賔栗階􅂛不拜􅂛旣不拜略於下雖辭賔猶終降再拜稽首也若然擯者辭拜於下之時其位在下故下記云卿擯由下注云不􅂛堂是也按下文云擯者退負東塾而立注云無事又云擯者進相幣然則擯者有事則進無事則退故負東塾也賔栗階􅂛不拜注自以至曰辵釋曰云自以巳拜也者於堂下終爲再拜稽首故於堂上不拜也云栗寔栗也者謂疾之意也云不拾級連步者曲禮云拾級聚足連步以上鄭注云拾當爲涉聲之誤也級等也涉等聚足謂前足躡一等後足從之併此涉級也連步鄭云重蹉跌也連步謂足相隨不相過也其連步據足而言涉級據階而􅀃其實一也此等尋常􅂛法此栗階據趍君命而上按燕禮記云凡君所辭皆栗階注云栗蹙也謂越等急趍君命也又曰凡栗階不過二等注云其始􅂛猶聚足連步越二等左右足各一發而升堂是栗階之法也云不拾級而下曰辵者凡􅂛降有四種云辵者君臣急諫諍則越三等爲辵階越一等爲歴階又有連步又有栗階爲四等也義巳具於燕禮記䟽也命之至稽首注賔降至不成釋曰按論語孔子云拜下禮也今拜乎上泰也是以上文主君雖辭賔猶終拜於下盡臣之禮爲成拜主君之意猶以爲不成故命之升成拜賔遂主君之意故升更拜也士舉至待載注入由至爲持釋曰自此盡逆退復位論鼎入巳載之事云去幂於外次入者次入謂序入也故少牢云序入去幂於外者以其入當載於俎故去之也士喪士虞皆入乃去幂者喪禮變于吉故也雍人至鼎退注旅人至多也釋曰云旅人雍人之屬者即燕禮云尊士旅食于門西兩圜壷鄭云士旅食者所謂庶人在官者也引王制解之者是也云雍人言入旅人言退文互相備也者雍人言入亦退旅人言退亦入皆入而退去故云文互相備也云毎器一人諸侯官多也者按少牢云鼎序入雍正執一匕以從雍府執四匕以從司士合執二俎以從司士賛者二人皆合執二俎以相從是大夫官少故毎人兼執也􅀂然特牲云賛者執俎及匕從鼎入士虞亦云匕俎從士昏禮亦云匕俎從設彼注云執匕者執俎者從鼎而入設之不言并合者士官彌少并合可知不言者文不具或可士禮又異於大夫執鼎人兼執匕俎故士喪禮小斂大斂奠舉鼎者兼執俎也若依前釋則士喪禮略威儀故也大夫至面匕注長以至洗南釋曰云進盥退者與進者交于前鄭云前謂洗南但言前不云北郷飲酒郷射賔盥北面則此大夫亦皆北面可知云長以長幼也者若燕禮云命長之􅀋皆據長幼爲長不謂衆中之長者也載者西面注載者至載之釋曰前云左人待載其時鼎東南面今大夫鼎北面南匕之左人當載故序自鼎東西面於其前矣俎正當鼎南則載者在鼎南稍東也魚腊飪注飪孰至冝孰釋曰上文直云羮定肉謂之羮恐魚腊不在羮定之中故此特著魚腊飪也以食禮尚孰故皆飪也注饗有腥者釋曰樂記云大饗而俎腥魚鄭注云以腥魚爲俎實不臑孰之是饗禮有腥也又宣公十六年冬晉侯使士㑹平王室定王享之原襄公相禮殽烝武子私問其故王聞之召武子曰季氏而弗聞乎王享有體薦宴有折俎公當享卿當宴王室之禮也又國語云禘郊之事則有全烝王公立飫則有房烝親戚宴饗則有殽烝以此觀之明饗有腥以饗禮用體薦體薦則腥矣故禮記云腥其俎謂豚解而腥之豚解者皆腥也載體近奏注體謂至七个釋曰三牲與腊皆載體直言體不辨體形及數以下魚腸胃倫膚皆言七則此亦七體故鄭云下大夫體七个若然七个此不言體形按士虞記云􅂛左肩臂臑肫骼脊脅七體彼喪禮用左又按郷飲酒郷射記皆云右胖進腠則此亦用右胖肩臑臂肫胳脊脅可知旣用右胖則左胖爲庶羞其庶羞者此下大夫十六豆上大夫二十豆是也若致飱及歸饔餼腥鼎皆無庶羞郷飲酒郷射燕禮大射雖同用狗一牲以其亨亨亦皆有庶羞也云奏謂皮膚之理進其理本在前者此謂生人食法故進本本謂近上者若祭祀則進末故少牢云進下鄭云變於食生是也魚七縮俎寢右注右首至骨鯁釋曰云縮俎者於人爲橫縮縱也魚在俎爲縱於人亦横云寢右鄭云右首也寢右進鬐也賔在戸牖之閒南面俎則東西陳之魚在俎首在右腹􅃾郷南鬐脊也進脊在北郷賔必以脊郷賔者鄭云乾魚近􅃾多骨鯁故不欲以􅃾郷賔取脊少骨鯁者郷賔優賔故也若祭祀則進􅃾以􅀑神尚氣􅃾者氣之所聚故少牢進􅃾是也腸胃七同俎注以其至十八釋曰云以其同􅀋也者釋經同俎以其牛羊同是畜􅀋也云不異其牛羊􅃾賤也者以牲體則異俎及此腸胃即同俎以其腹􅃾賤故略之同俎也云此俎實二十八者牛羊各有腸胃腸胃各七四七二十八也但此腸胃與牲或同鼎同俎或别鼎别俎何者據此下文七鼎腸胃與牲别鼎别俎是其正法取其鼎俎竒也少牢五俎腸胃與牲同鼎者以其有鮮獸若腸胃别鼎則六不得竒故并腸胃與牲同鼎有司徹亦然此腸胃七者以其與牲體别鼎故取數於牲亦七少牢并腸胃於牲鼎故云腸三胃三取數於脊脅各三也賔尸禮殺於正祭故腸胃各一旣夕盛葬奠故腸胃五也倫膚七釋曰倫膚謂豕之皮革爲之但此公食大者謂以西爲上君設當席中故東遷之辟君設處側近也近其故處公立至西郷注不立至親饌釋曰云不立阼階上示親饌者以其君之行事皆在阼階上今近阼北者以其設饌在戸西近北今君亦近北是亦親監饌故也宰夫至鹿臡注醓醢至作麋釋曰云醓醢醢有醓者按周禮醢人云朝事之豆韭菹醓醢巳下依此爲次彼注云醓肉汁也則此醓醢是肉之汁昌本者彼注云昌蒲根又按彼注韲菹之稱菜肉通又云細切爲韲全物若䐑爲菹又按彼經爲菹者經言菹不言韲菹者即是韲也彼言昌本亦即韲也此注云菹者韲菹麤細爲異通而言之韲亦得爲菹故云菹也云醢有骨者謂之臡案爾雅釋器云肉爲之醢有骨者謂之臡又鄭司農云有骨爲臡無骨爲醢也云菁蓂菁菹也者即今之蔓菁也士設俎至亞之注亞次至俎尊釋曰云不言䋫錯俎尊者上設豆䋫陳之下設黍稷錯陳之此設俎不䋫不錯者但尊故也膚以爲特注直豕至牲賤釋曰云出下牲賤者以豕在牛羊之下賤膚豕之所出故云出下牲賤特之於俎東也旅人至其所釋曰前旅人以匕入加於鼎退出今還使之取匕前士舉鼎入今不使士舉鼎出者以其士載訖遂設俎於賔前事未畢故甸人舉鼎而出也大羮至反位注大羮至無􅂛釋曰云以蓋降出入反位者宰位在東夾北西面南上今以蓋降出送於門外乃更入門反於東夾北位也云大羹湆煑肉汁也大古之羹者謂是大古五帝之羮云不和無塩菜也大古質故不和以塩菜對鉶羹調之以塩菜者也云瓦豆謂之鐙詩云于豆于登毛亦云木曰豆瓦曰登云宰謂大宰宰夫之長者以單言宰諸侯三卿無大宰以司徒兼大宰大宰之下有宰夫故云宰夫之長也公設至遷之注亦東遷所釋曰言亦者亦前醬東遷所以醬旣東遷所今於醬西遷之明亦東遷所移之故醬處也宰夫至東牛注鉶菜和羮之器釋曰云鉶菜和羹之器者下記云牛藿羊苦豕薇是菜和羮以鉶盛此羮故云之器也據羮在鉶言之謂之鉶羮據器言之謂之鉶鼎正鼎之後設之謂之陪鼎據入庶羞言之謂之羞鼎其實一也宰夫至豆東注食有至於左釋曰云食有酒者優賔也者按下文宰夫執漿飲賔興受唯用漿酳口不用酒今主人猶設之是優賔引燕禮者彼據酒主人奠於薦左賔不飲取奠於薦右此酒不用故亦奠於豆東酒義雖異不舉是同故引爲證也按燕禮無此文郷飲酒郷射記皆云凡奠者於左舉者於右不同之而引燕禮記者此必轉寫者誤鄭本引郷飲酒郷射之等也注㑹簋至之西釋曰云亦一一合卻之者卻者仰也簋蓋有六兩兩皆相重而仰之謂之卻合故云一一卻合之各當其簋之西爲兩處亦者亦少牢故少牢云佐食啓㑹蓋二以重設于敦南也賛者至于公注負東至賔也釋曰自此盡醬湆不祭論賔所祭饌之事經直云負東房鄭知負房戸而立者以公在東序内賔在戸西雖告具于公且欲使賔聞之故知於房近西是以鄭云得郷公與賔也賛者東面至祭之注取授至不坐釋曰此所授者皆謂逺賔者故菹醢及鉶皆不授以其近賔取之易故不言按曲禮云殽之序辯祭之故知雖不授亦祭可知也經直云祭知祭之於豆祭者按少牢云尸取韭菹辯㨎于三豆祭于豆閒故知於豆祭也云獨云賛興優賔者欲見賔坐而不興是優賔其實俱興也引少儀者欲見賛興賔亦興之義以其賔坐賛亦坐故也三牲至授賔注肺不至作一釋曰云肺不離者刌之也者按少儀云牛羊之肺離而不提心鄭云提猶絶也刲之不絶中央少者此即爲食而舉肺也少牢云舉肺一長終肺祭肺三皆切之是祭肺切舉肺不切云不言刌刌則祭肺也者是與祭肺同其實舉肺云祭離肺者絶肺祭也者此鄭解舉肺將祭之時絶末而祭之與祭肺異也凡舉肺有二名一名離肺亦名舉肺祭肺亦名刌肺也挩手至閒祭注扱以至以巾釋曰此云上鉶之閒祭者著其異於餘者餘祭於上豆之閒此鉶别自祭鉶閒云挩拭也拭以巾者案内則左佩紛帨帨即佩巾而云挩拭拭手以巾似帨不名巾者本名帨者以拭手爲名其實名巾故鄭舉其實稱也此有四鉶而云扱上鉶辯擩則唯有一柶優賔故用一柶而巳少牢二鉶祭神故冝各有柶也祭飲至不祭注不祭至盛者釋曰此不祭者以正在饌之内以其有三牲之體魚腊湆醬非盛者故不祭也若入庶羞則祭之故下文云士羞庶羞皆有大又云辯取庶羞之大興一以授賔賔受兼壹祭之少儀云祭膴膴詁爲大魚肉之臠是亦祭之宰夫至遷之注旣告至上也釋曰自此盡降出論設加饌􅆝與庶羞之事云遷之遷而西之以其東上也知􅆝東上者下文宰夫膳稻于􅆝西是以􅆝在東爲上也公與􅆝右執湆以降公辭升反奠于其所是賔往來也旁四列西北上注不統至中别釋曰云所謂羹胾中别者按曲禮云左殽右胾彼云殽骨體也此肉謂之羹亦一也殽爲正饌胾謂切肉則庶羞云左殽右胾則曰此正饌在東庶羞在西閒容人同故謂所謂羹胾中别也注先設醢䋫之以次也釋曰此云先設醢䋫之次而特牲注云以有醢不得䋫也與此先設醢䋫之以次違者大汎醢配胾是其正而醢卑于胾今牛羊豕胾皆在醢下者直是䋫之次非尊卑之列特牲以一有醢􅀂䋫之當醢在胾上不成錯故不得䋫少牢四豆羊胾醢故得䋫而錯與此同也賛者至于公釋曰自此盡兼壹祭之論賛告饌具賔祭之事賛􅂛賔注以公命命賔􅂛席釋曰前設饌訖賛者告具于公公再拜揖食此使賛􅂛賔者以其禮殺故也是以上文正饌公先拜賔荅拜此賔先拜公公荅拜爲異也注即就至於加釋曰云祭稻􅆝不於豆祭祭加冝於加者按下文云賔三飯以湆醬注云每飯歠湆以肴擩醬食正饌也三飯而止又云不以湆醬注云不復用正饌也則此湆醬是正饌而云加者但湆醬與􅆝皆是加故公親設之下文爲正饌而此云加者爲湆醬雖是加以在正饌之上得與正饌爲本故名正饌其實是正饌之加故公親設之也賛者至祭之注壹壹至饌也釋曰壹壹受之而兼一祭之庶羞輕也者決上三牲之脯祭之今此祭庶羞并之故云輕也云自祭之於膷臐之閒以異饌也者不云於豆祭而云於膷臐之閒以祭冝於加故也賔降拜注拜庶羞釋曰自此盡魚腊不與論賔正食受侑幣至於食終之事注奠而至之事釋曰云成其意者謂成其食降階下之意故奠乃對此決下文大夫相食賔執􅆝與湆之西序端主人辭賔反之而不奠也注箱東至之處釋曰按爾雅有東西廂曰廟其夾皆在序外故也知是俟事之處者正以此文公揖退于廂而俟賔食即待事之處也賔坐至不辭注賛者優賔釋曰知云賛者以告公公聽之者公旣在序外賔食在戸西若不告公公何以知之明知賛者告公也云重來優賔者若公來則勞賔不來則賔不勞故難重來而不來則優饒賔也賔三飯以湆醬注每飯至優賔釋曰云毎飯歠湆以殽擩醬者按曲禮三飯主人延客食胾然後辯殽鄭注云先食胾後食殽殽尊此先食殽者彼鄭云大夫士與客燕食之法其禮食冝放公食大夫禮云若然此爲禮食故先食殽大夫士與客燕食則先食胾故不同又按昏禮同牢云賛爾黍授肺脊皆食以湆醬皆祭舉食舉也注云皆食黍也以用也用者謂歠湆􅖾醬而不食殽者此公食賔禮解體折節明食殽可知彼豚解者皆不食故彼不食殽也是以彼又云三飯卒食注同牢示親不主爲食起三飯而成禮也故不食殽也但湆言啜淡故也醬言擩鹹故也云三飯而止君子食不求飽者解三飯而止故下宰夫進漿是不求飽故引論語學者食不求飽爲證也云不言其殽優賔者案特牲少牢尸食時舉殽皆言次第此不言者任賔取之是優賔也宰夫至稻西注酒在至右漿釋曰云酒在東漿在西者案上飲酒實于觶宰夫設于豆東是酒在東也云漿在西者即此經設於稻西是也云是所謂左酒右漿者按曲禮云酒漿處右鄭云此言若酒若漿耳兩有之則左酒右漿云兩有者據此公食而言左酒右漿也公受至郷立注束帛至序端釋曰云西郷立序内位也者按上文公設醬公立于序内西郷此經亦云西郷立故知亦在序内位也云受束帛于序端者按大射禮公凡受於序端故毎云公之所受者皆約之受於序端賔降筵北面注以君至階上釋曰云以君將有命者謂有束帛侑食之命故賔降筵北面於西階上以待主君之命賔降至聽命注降辭至許辭釋曰云主國君又命之􅂛知者約聘禮禮賔賔降辭幣公降一等辭栗階􅂛聽命是也退西楹西東面立注俟主至將降釋曰按聘禮賔三退負序注云三退三逡遁也不言辟者以執圭將進授之彼皆當楣再拜故賔退負序此亦爲公拜送幣但在楹西耳故賔在階西不負序以將降故也注從者至梧受釋曰云從者府史之屬知非士介者此子男小聘使大夫士介一人而巳介巳受賔幣故知訝受者非士介是府史之屬也賔入至稽首注便退至此退釋曰云便退則食禮未卒不退則嫌者此鄭探解賔意食禮自有常法三飯之後當受侑幣更入以終食禮故送庭實而後入是以鄭云便退則食禮未卒解經賔入之意云不退則嫌者謂有貪食之嫌解再拜稽首將辭之意是以更入行拜若欲從此退者待公設辭留賔之意也注賔揖介入復位釋曰上文云介逆出下更云介逆出明知中閒介復入可知但復入之節當此賔入之時也注卒巳也至稻􅆝釋曰知㑹飯是黍稷者見上文云宰夫東面坐啓簋㑹各卻於其西此云食㑹飯故知㑹飯者是黍稷也前賔三飯不云㑹以其簠盛稻􅆝以其稻􅆝無㑹故鄭云此食黍稷則初時食稻􅆝矣不以醬湆注不復至後用釋曰云初時食加飯用正饌此食正飯用庶羞互相成也者按上文賔三飯以湆醬注云毎飯歠湆以殽擩醬是正饌稻􅆝是其加此云卒食㑹飯三飲不以醬湆鄭意以庶羞黍稷是其正庶羞是其加互相成而巳言相成者旣非互文直取饌食互相成而巳云後言湆者湆或時後用者前文賔三飯以湆醬先言湆後言醬是先用湆此後言湆或容前三飯後用湆也故作文有先後也注示親至侑幣釋曰云不以出者非所當得又以巳得侑幣者云不以出者決士昏禮賔取脯出以授從者彼是已所當得此非直巳得侑幣下文有司卷三牲之俎歸于賔館是己所當得鄭不言三牲而言侑幣者據巳得者而言之東面再拜稽首注卒食至於辭釋曰云卒食拜也不北面者按上文賔受侑幣出入門左没􅋼北面再拜稽首其時辭欲退公留之卒食故決之以其待公留故北面此卒食禮終故東面爲意有異故面位不同是以鄭云不北面者異於辭也介逆至不顧注初來至還也釋曰云擯者以賔不顧告公公乃還也者知擯者告公者按經公送于大門内公不見賔矣而云賔不顧明知擯者告公公還入宴寢也此擯者告賔不顧即論語云賔退必復命曰賔不顧矣但彼據聘享訖此據食禮訖事雖不同復命云賔不顧矣即不異有司至賔館注卷猶至釋故釋曰云歸俎者實于篚者此食禮無肵俎而言卷三牲之俎不言用俎惟云實于篚按士虞禮亦無肵俎尸舉牲體皆盛於篚吉凶雖不同無肵俎是一故知同用篚也云它時有所釋故者解三牲之俎言卷案特牲及士虞尸卒食取俎歸於尸三个是有所釋此無所釋故稱卷也彼注云釋猶遺也遺者君子不盡人之歡不竭人之忠也儀禮䟽卷第二十五
