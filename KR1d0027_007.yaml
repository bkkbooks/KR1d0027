body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彥等撰士相見禮第三鄭目録云士以職位相親始承摯相見禮雜記會葬禮曰相見也反哭而退朋友虞祔而退士相見於五禮屬賔禮大小戴及別録皆第三釋曰鄭云士以職位相親始承摯相見者釋經亦有大夫及庶人見君之禮亦士見大夫之法獨以士相見為名者以其兩士職位不殊同類昵近故以士相見為首云雜記相見也反哭而退朋友虞祔而退者以送葬之禮恩厚者退遲恩薄者退疾引之者證有執摯相見之義也云士相見於五禮屬賔禮者案周禮大宗伯五禮賔禮之別有八春朝夏宗秋覲冬遇時會殷同此六者是五等諸侯見天子兼有自相朝覲之禮彼又云時聘曰問殷眺曰視二者是諸侯使臣出聘天子及自相聘之禮並執玉帛而行無執禽摯之法此屬直新升為士大夫之等同國執禽摯相見及見君之禮雖非出聘亦是賔主相見之法故屬賔禮也且士卑唯得作介從君與卿大夫出向他國無身自聘問之事案周禮行夫是士官其有美惡無禮特行無介始得出向他邦亦非聘問之法也然昏冠及喪祭尊卑各自有禮及執摯相見唯有此士相見其篇內含卿大夫相見以其新升為士或士自相見或士往見卿大夫或卿大夫下見士或見已國君或士大夫見他國君來朝者新出仕從微至著以士為先後更有功乃升為大夫巳上故以士為惣號也又天子之孤卿大夫士與諸侯之孤卿大夫士執摯既同相見之禮亦無別也士相見至某見釋曰自此至送于門外再拜論士與士相見之事也云某也願見無由逹者謂新升為士欲見舊為士者謂久無紹介中間之人達彼此之意雖願見無由得與主人通達相見也云某子以命命某見者某子是紹介中間之人姓名以主人之命命某是賔之名命某來見主人也案少儀始見君子者辭曰某固願聞名於將命者謂以卑見尊法彼又云敵者曰某固願見於將命者此兩士相見亦是敵者不言願見於將命者者此既言願見無由達見敵者始欲相見案下文及還摯者皆云於將命者明此亦有願見於將命者不言者文不具也注摯所至為脰釋曰云摯所執以至者摯得訓為至升為士者彼人相見欲相尊敬必執禽鳥始得至故云摯所執以至者也云士摯用雉者對大夫巳上所執羔鴈不同也云取其耿介交有時別有倫也者倫類也交接有時至於別後則雄雌不雜謂春交秋別也士之義亦然義取耿介不犯於上也云雉必用死者為其不可生服也者經直云冬用雉知用死雉者尚書云三帛二牲一死摯則雉義取耿介為君致死也云夏用腒備腐臭也者案周禮庖人云春行羔豚夏行腒鱐鄭云腒乾雉鱐乾魚腒鱐暵熱而乾乾則不腐臭故此取不腐臭也冬時雖死形體不異故存本名稱曰雉夏為乾腒形體異故變本名稱曰腒也云左頭頭陽也者曲禮云執禽者左首雉與羔鴈同是合生執之物以不可生服故殺之雖死猶尚左以從陽也云某子今所因緣之姓名也者謂紹介之姓名云以命者稱述主人之意者言紹介之人稱述主人之辭意傳來賔也云今文頭為脰者鄭不從今文者以其脰項也項不得為頭故不從也但此云某子以命命某見謂舊未相見今始來見主人故須某子傳通孺悲欲見孔子不由紹介故孔子辭以疾且經云某子鄭云某子今所因緣之姓名案鄉飲酒云某子受酬注云某者衆賔姓又鄉射云某酬某子注云某子者氏也與此注某子為姓名不同者彼旅酬下為上尊敬在上以公羊傳名不若字字不若子故下者稱姓以配子彼對面語故不言名此非對面之言於彼遙稱紹介之意若不言名直稱姓是何人故鄭以姓名解之也若然特牲云皇祖某子注為伯子仲子者以孫不冝云父祖姓故以伯子仲子言之望經為義故注有殊若然注冝有名無者誤也主人至走見釋曰云某子命某見者某子則是紹介姓名以某子是中間之人故賔主共稱之也此上下皆言請不言辭辭而不受須相見故言請而巳注有又至無走釋曰鄭轉有為又者以言某子以命命某往就彼見吾子又自辱來於義為便故從又不從有也云走猶往也者以言走直取急往相見之意非走驟之義故釋從往也云今文無走字者無走於文義不足故不從今文從古文也注不敢至以請釋曰固如故也者固為堅固堅固則如故以再請如前故云固如故也云今文不為非者云非敢於義不便故不從今文非也云古文云固以請者固請於文從便若有以字於文賖緩故不從古文固以請也注不得至走見釋曰云走猶出也者亦如上之走往彼據向賔家故走為往此據出門故云走出也云辭其摯為其大崇也者凡賔主相見唯此新升為士有摯又初不相識故有摯為重對重相見則無摯為輕是以始相見辭之為大崇故也云古文曰某將走見者上再畨皆云某將走見今此三者亦云某將走見與前同此疊古文不從者以上第一畨請賔主皆無不敢為儀第二畨賔及主人皆云不敢為儀文句既異若不云某於文不便故須云某也此三畨於上巳云某也固辭不得命於下不須云某於文便古文更云某將走見文疊故不從也注見於至大簡釋曰此士相見唯是平敵相伉案曲禮云主人敬客則先拜客客敬主人則先拜主人並不問爵之大小唯以相尊敬為先後故雖兩士亦得云相尊敬不敢空手須以摯相見若無摯相見是則大簡略也注言不至見已釋曰案上經賔云某不以摯不敢見是賔以崇禮來見主人今主人不敢當其崇禮來見已故變文言不足以習禮故鄭云言不足習禮者不敢當其崇禮來見已也注言依至卑也釋曰凡相見之禮以卑見尊必依摯禮記檀弓云魯人有周豐也者哀公執摯請見之者是下賢非正法今士相見云不依於摯不敢見謙自卑也注右就至文無釋曰凡門出則以西為右以東為左入門則以東為右以西為左依賔西主東之位也知受摯於庭者以其入門左右不言揖讓而升之事故知在庭也云既拜送則出矣者欲見賔拜送摯訖而言出則去還家無意得待主人留已也云不受摯於堂下人君也者聘禮賔升堂致命授玉又下云君在堂升見無方階亦是升堂見君法故云不於堂下人君也主人請見至再拜注請見至而出釋曰鄭解主人留賔之意云請見者為賔崇禮來相接則執摯來是也云以矜莊歡心未交也者正謂入門拜受拜送時賔主俱矜莊相敬歡心未交也云賔反見則燕矣者上士冠禮賔士昏納采之等禮記皆有禮賔饗賔之事明此行禮主人留必不虛冝有歡燕故云則燕矣以摯相見非聘問之禮燕既在寢明前相見亦在寢之庭矣若諸文有留賔者多是禮賔之事知此不行禮賔而云燕者彼諸文皆是為餘事相見以其事重故為禮賔此直當身相見其事輕故直有燕矣是以諸文禮賔此燕賔故直云請見也云凡燕見於君至反見之燕義者凡燕見或反見或本來侍坐非反見下注云此請特見圖事非立賔主之燕是也侍坐於君子之下乃有侍坐問夜膳羞賜食爵之等不引證燕見者彼直是侍坐法非燕見之禮故也云臣初見於君再拜奠摯而出者鄭欲見自燕見于君下至凡侍坐於君子皆反見燕法其中仍有臣見于君法臣始事見于君法禮卑奠摯而出君亦當遣人留之燕也若然下有他邦之人則還摯雖不見反燕臣尚燕他邦有燕可知但文不具也主人至命者釋曰自此至賔退送再拜論主人還于賔之事注復見至相者釋曰云復見之者禮尚往來也者鄭解主人還摯之意云禮尚往來曲禮文五等諸侯身自出朝及遣臣出聘以其圭璋重不可遙復朝聘訖即還之璧琮財輕故不還彼朝聘用玉自為一禮有不還之義其在國之臣自執摯相見雖禽摯皆還之臣見於君則不還義與朝聘異不可相決也云將猶傳也傳命者謂擯相者者謂出接賔曰擯入詔禮曰相一也故聘禮與冠義皆云每一門止一相是謂擯介為相也主人至敢辭釋曰上言主人此亦言主人者上言主人者據前為主人而言此云主人者謂前賔今在己家而説也注言不至當也釋曰云嫌褻主人不敢當也者嚮者主人見己今即來見主人賔主頻見是褻也今云非敢求見嫌褻主人不敢更相見也故不敢當相見之法直云還摯而巳注言不敢至敢當釋曰上云非敢求見巳是不敢當此云不敢以聞耳聞疏於目見故云又益不敢當也注異日至則否釋曰下云賔奉摯入不言主人出迎又不言厥明是與前相見同日知異日出迎者鄉飲酒禮云明日乃息司正主人出迎之司正猶迎之況同僚乎是知異日出迎也若然聘禮公迎于大門內至禮賔又出迎者彼初是公迎彼初之命不為迎賔身故至醴賔身雖同日亦出迎之故鄭注云公出迎者己之禮更端是也昏禮賔為男家使初時出迎至醴賔身雖同日亦出迎也有司徹前為尸後為賔所為異故云雖同日亦出迎此二者亦是更端之義也案鄉飲酒及公食大夫皆於戒賔之時未行賔主之禮是以賔至乃迎之故雖同日亦迎賔非更端之義也士見於大夫至再拜注終辭至尊賔釋曰云以將不親答也者事未至謂之將如上士相見賔來見士後將親答就士家則辭而受其摯此則以將不親答終不受也若然經直云終辭其摯不言一辭再辭亦有可知但略而不言也又少儀云始見君子曰願聞名此不言願聞亦文不具也云凡不答而受其摯唯君於臣耳者見下文他邦之人則使擯者還其摯見已君不言還摯又文有三辭初辭中辭終辭初辭之時則云使某中辭云命某以辭在中者傳言而巳故云命某然使某者是尊君卑臣之義其心重若云命某者尊君卑臣稍淺漸輕之義故鄭云或言命某傳言耳必知有此義者案僖九年左傳曰天子有事於文武使孔賜伯舅胙以伯舅耊老加勞賜一級無下拜是尊君稱使傳言云命有輕重之義也注受其摯而去之釋曰云受其摯而去者以其嘗為臣為輕既不受其摯又相見無饗燕之禮故鄭云而去以絶之也下大夫至執雉釋曰言下大夫者國皆有三卿五大夫言上大夫據三卿則此下是五大夫也二十七士與五大夫轉相副二則三卿冝有六大夫而五者何休云司馬事省闕一大夫注鴈取至其足釋曰云鴈取知時者以其木落南翔冰泮北徂隨陽南北義取大夫能從君政教而施之云飛翔有行列也者義取大夫能依其位次尊卑有敘也上士執雉左頭奉之此云如執雉明執鴈者亦左頭奉之也案曲禮云飾羔鴈者以繢彼天子卿大夫非直以布上又畫之此諸侯卿大夫執摯雖與天子之臣同飾羔鴈者直用布為飾無繢彼不言士則天子之士與諸侯之士同亦無飾士賤故無别也上大夫至執之注上大至為脰釋曰云上大夫卿也者即三卿也云羔取其從帥者凡羔羊羣皆有引帥若卿之從君之命者也云羣而不黨也者羊羔羣而不黨義取三卿亦皆正直雖羣居不阿黨也云繫聮四足交出背上於胸前結之者謂先以繩雙繫前兩足復以繩繫後兩足乃以雙繩於左右從腹下向背上交過於胸前結之也云如麛執之者秋獻麛有成禮如之者案周禮獸人云冬獻狼夏獻麋春秋獻獸物鹿豕羣獸及狐貍可也麛是鹿子與鹿同時獻之又庖人云秋行犢麛則獻當在秋時故云秋獻麛也又案禮器曲禮三千鄭云曲猶事也事禮謂今禮也其中事儀三千則禮未亡之時三千條內有此獻麛之法是有成禮可依故此經得如之也云或曰麛孤之摯也者案大宗伯及大行人與聘禮皆云孤執皮帛謂天子之孤與諸侯之孤執皮帛今此執麛者謂新升為孤見已君法至餘事則皆皮帛也云其禮蓋謂左執前足右執後足者案經云左頭則與雉鴈同是以曲禮云執禽者左首此鄭又云執之蓋謂左執前足右執後足者西階釋曰上文據君所在隨便升階無常之事亦謂反燕及圖事之法若立賔主君升自阼階賔及主人升自西階燕禮所云是也凡言至傳言注凡言至為綏釋曰此據臣與君言之法也云凡言謂己為君言事也者謂臣有圖為君言也禮記少儀云量而後入不入而後量是臣有事將入見君須量已所言亦當量君安坐乃可得入而後傳出已言向君道之云妥安坐也者爾雅釋詁文與君至忠信釋曰上文據與君言此文則總説尊卑言語之別云與君言言使臣與大人言言事君者但君臣相對有事即言不必與君言恆言使臣與臣言恆言事君今唯言使臣事君者下供上命禮法當然故君以使臣為主臣以事君為正無妨更言餘事巳下皆隨事為主可也云與老者言言使弟子者謂七十致仕之人依書傳大夫致仕為父師士致仕為少師教鄉閭子弟雷次宗云學生事師雖無服有父兄之恩故稱弟子也云與幼者言言孝弟於父兄者幼既與老者相對此幼即弟子之類孝弟二父兄之名是人行之本故云言孝弟于父兄與衆言言忠信慈祥者此文承老幼之下亦非朝庭之臣但是鄉閭長幼共聚之處使之行忠信慈善之事也云與居官者言言忠信者此與在朝之士言以忠信為主也注博陳至以下釋曰云博陳燕見言語之儀也者據巳上博陳與君燕見舉動言語知此博陳也云言使臣者使臣之禮也者并事君以服並是論語孔子對定公之文云大人卿大夫也者此云言事君明非天子諸侯又非士是卿大夫可知又案下文云凡與大人言始視面中視抱卒視面並是臣視君之法則大人據君也又禮運云大人丗及以為禮鄭解為諸侯者以彼上文云天下為家以據天子明下云大人是諸侯可知易革卦云君子豹變據諸侯則大人虎變是天子可知又案論語云狎大人注為天子諸侯為政教者彼據小人不在朝庭故以大人為天子諸侯政教解之鄭皆望文為義故解大人不同云居官謂士以下者以上大人云事君巳據居官卿大夫其居官之內唯有二十七士并府史胥徒故云士以下也凡與至若是注始視至為終釋曰云中視抱容其思之且為敬者案曲禮天子視不上於夾夾交領也不下於帶上於夾則敖下於帶則憂視大夫得視面此視君得視面者彼據尋常視君法此據與君言時故不同也云且為敬者此言抱即面相夾不視夾是敬君之常禮故云且為敬也云為嫌解惰不虛心也者禮記云虛中以治之鄭注云虛中言不兼念餘事是虛心之意也云衆謂諸卿大夫同在此者言於君視之髙下如此其卿大夫視君之儀與言者無異也云古文母作無不從者説文云母蓋亦禁辭故不從有無之無也云今文衆為終不從者以上巳有卒卒為終故從古為衆也若父至於帶注子於至作無釋曰案曲禮大夫之臣視大夫得視面不得遊目士之臣視士得旁遊目今子視父應與視君同不上於夾與士大夫同者以子於父主孝不主敬所視廣者因視安否何如也若不至視膝注不言至而巳釋曰巳上皆據臣子與君父言語之時此據不言之時鄭言伺其行起者行解經立行由立始故以行解立是以論語云立不中門鄭云立行不當棖闑之中央是亦以行解立也一又以起解坐以其起由坐始故也凡侍至可也注君子至作蚤釋曰此陳侍坐於君子之法鄭云君子卿大夫者禮之通例大夫得稱君子亦得稱貴人而士賤不得也知及國中賢者者鄉射禮云徵唯所欲以告於鄉先生君子可也鄭云鄉先生鄉大夫致仕者君子有大德行不仕者則曲禮云博文強識而讓敦善行而不怠謂之君子是也云志倦則欠體倦則伸鄭注曲禮亦然云古文申作信早作蚤者此二字古通用故大宗伯云侯執身圭為信字詩云一之日其蚤獻羔祭韭為蚤字既通用疊古文者據字體非直從今為正亦得通用之義也夜侍至可也注問夜至作薰釋曰云問夜問其時數也者謂若鍾鼓漏刻之數也云古文葷作薰者玉藻云膳於君有葷桃茢作此葷鄭注論語作焄義亦通若作薰則春秋一薰一蕕薰香草也非葷辛之字故疊古文不從也若君至後食注君祭至嘗膳釋曰此經及下經論臣侍君坐得賜食之法鄭云先飯示為君嘗食也者凡君將食心有膳宰進食則膳宰嘗君前之食備火齊不得下文是也今此文謂膳宰不在則侍食者自嘗自己前食既不嘗君前食則不正嘗食故云示為君嘗食也云此謂君與之禮食者謂君與臣小小禮食法仍非正禮食正禮食則公食大夫是也彼君前無食此君臣俱有食故知小小禮食此即玉藻云若賜之食而君客之則命之祭然後祭彼云客之則此注禮食亦不得祭故一也但此文不云客之命之祭然後祭文不具也若尋常食不得云禮食亦不得祭故鄭注玉藻云侍食則正不祭是也若有至後食注將食至乃食釋曰云膳宰進食則臣不嘗食者臣為君嘗食本為膳宰不在今膳宰既在明臣不嘗食也是以玉藻云若有嘗羞者則俟君之食然後食飯飲而俟注云不祭待食不敢備禮也不嘗羞膳宰存也是也云膳夫者天子膳夫則諸侯之膳宰引之者證經將食之人是膳宰因將膳與君品嘗食凡君食臣有侍食之時唯子不侍食是以文王丗子云命膳宰曰末有原應曰諾然後退是大子不侍食若卿大夫巳下則有侍食法故內則云父沒母存冢子御食羣子婦佐餕是也若君至虛爵法受爵至君也釋曰云受爵者於尊所者曲禮亦是賜爵法而云酒進則起拜受於尊所是也云至於授爵坐授人耳者見曲禮與玉藻并此文並無立授之文故知坐授也云必俟君卒爵者若欲其釂然也者此經文與玉藻文同皆燕而君客之賜爵法故臣先飲以酒是甘味欲美君之味故先飲必待君卒爵而後授虛爵者臣意若欲君盡爵然也案曲禮云侍飲於長者酒進則起拜受於尊所長者辭少者反席而飲長者舉未釂少者不敢飲彼是大燕飲禮故鄭注引燕禮曰公卒爵而後飲案燕禮當無算爵後得君賜爵待君卒爵乃飲是也退坐至遂出注謂君至當也釋曰云謂君若食之飲之而退也者以上云若君賜之食若君賜之爵下而云退者明為此二者而退也云隱辟俯而逡巡者案曲禮云鄉長者而屨此亦當然云不敢辭其降者謂君降送時明有不降法故曲禮云就屨跪而舉之屏於側注云謂獨退也云若者不定之辭也大夫至三辭釋曰云大夫則辭退下者對上不敢辭是士士卑不敢辭降大夫之內兼三卿五大夫臣中尊者故得辭降也若先至見之注先生至拜賔釋曰此先生即鄉飲酒云就先生而謀賔介亦一也故彼注與此注皆云致仕者也云異爵謂卿大夫也者此士相見本文是士故以卿大夫為異爵也訓走為出者亦謂士見異爵取急意而言走其實非走直出也引曲禮者欲見言敬客先拜也彼云客此云賔者對文賔客異散文賔客通故變文云賔也非以至之老注謂擯至之老釋曰云非以君命使則不稱寡者此則玉藻云大夫私事使私人擯則稱名以其非聘問之禮則為私事使私人擯也聘禮云若有言則以束帛如享禮引春秋晉侯使韓穿來言汶陽之田歸於齊玉藻注亦引之是也鄭云謂擯贊者辭也者以玉藻自諸侯之於天子以下至大夫皆云擯者曰故知不自稱是擯贊之辭也云其使則皆曰寡君之某者釋經大夫士則曰寡君之老為公事使者也此則玉藻云公士擯則曰寡大夫君之老大夫有所往必與公士為賔亦一也彼注云謂聘也大聘使上大夫小聘使下大夫則曰寡君之某故鄭揔云某也若然經直云大夫鄭兼云士者經本文是士則云非以君命使可以兼士也但士無特聘問或作介往他國亦有稱謂而云寡君之士某也云檀弓曰仕而未有祿者謂試為大夫士直有試功之祿未有正祿云君有饋焉曰獻者謂有饋物于君亦與正祿者同稱獻云使焉云寡君之老者於他國君邊自稱寡君之某此文亦兼士大夫引之者證公事使稱寡君之某也凡執至為儀釋曰案小行人合六幣玉馬皮圭璧帛皆稱幣下文別云執玉則此幣謂皮馬享幣及禽摯皆是注不趨至無容釋曰凡趨有二種有疾趨行而張足曰趨是也有徐趨則下文舒武舉前曳踵是也今此經云不趨者不為疾趨故云主愼也既不云疾趨又不為下文徐趨但徐疾之間為之故以進而益恭為威儀也執玉至曳踵釋曰此篇直見在國以禽摯相見之禮無執玉朝聘鄰國之事而云執玉者因執摯相見故兼見朝聘執玉之禮也案玉藻記徐趨之節云圈豚行又與此不同者文有詳略俱是徐趨也注唯舒至作抴釋曰云唯舒者重玉器尤愼也者案玉藻云執龜玉不趨不趨者不為疾趨又曲禮云凡執主器執輕如不克皆為重玉器尤愼也云備􅠶跲也者􅠶跲則顚倒恐損玉故徐趨也凡自至外臣釋曰云凡自稱於君士大夫則曰下臣者此與君言之時案玉藻云上大夫曰下臣與此同也注宅者至作苗釋曰此亦自稱於君以其致仕不在故指宅而言故云宅者謂致仕者也云或在國中或在野者案爾雅郊外曰野則自郊至畿五百里內皆名野又案鄉大夫職國中七尺野自六尺此亦云在國在野相對其言國外則云野則云宅在野者城外畿內皆是也云載師之職者彼鄭注云宅田致仕者之家所受田也引之證彼言宅田據地此言宅據所居一也云刺猶剗除也者案詩有其鎛斯趙注云趙刺也故以刺為剗除草木者也儀禮疏卷第七
