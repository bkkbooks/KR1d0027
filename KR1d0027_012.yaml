  text: 儀禮疏卷第十二
  hash: sha256:6af682526908e7a99315765738d3b923d274caafe45595f6ea4350d80c658c2e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_012-1a}
body:
  text: 唐朝散大夫行太學博士引文館學士臣賈公彥等撰司射至矢拾注猶有至更也釋曰自此盡取撲搢之以反位論司射誘射教三耦射法之事大射有次三耦取弓矢於次注云取弓矢不拾者次中隱蔽處則此無次取弓矢拾者拾更也遞取弓矢見威儀故也云猶有故之辭者前巳云司射兼挾乘矢此云猶是有故之辭云此者欲見司射恆執弓矢未改之意三耦至授弓注有司至俟事釋曰前有司請射解為司馬此有司為弟子者以有事者皆有司故鄭注解上有司請射與大射為政請射同故解為司馬此經以納射器使弟子不見出文則弟子執射器入者即使守之以授用者故知有司還是弟子是以鄭云凡納射器者皆執以俟事遂授矢注受於至授之釋曰此授矢者則上文有司授弓者以其弟子執弓矢故授弓訖復授矢是以鄭云受於納矢而授之三耦至一個注未違至帶右釋曰上云三耦俟于堂西又云遂以比三耦於堂西此云三耦皆執弓搢三而挾一個前後皆因前位去未違俟處下文乃云三耦皆進由司射之西立于其西南東面北上是移本位者也云搢插也插於帶右者以其左手執弓右手抽矢而射故知插於帶右故詩云左旋右抽是也司射至一箇注為當至時還釋曰云固東面矣復言之者明卻時還者司射先在中西南東面今三耦立定司射卻來向三耦之北東面明司射卻時右還西南東面也揖進至面揖注鉤楹至非也釋曰凡行射禮耦耦各相對揖故司射誘射發東面位揖進當西階北面揖及階揖升堂揖訖東行向兩楹間物須過西楹是以豫則鉤楹內北過以記云序則物當棟物近北故過由楹北也堂則由楹外過而東行以記云堂則物當楣物近南故過由楹南也云當左物者以南面為正東為左物北面又揖也云鉤楹繞楹而東也者北而東也云序無室可以深也者據州立序而言云周立四代之學於國者案王制云有虞氏上庠下庠夏后氏東序西序殷人左學右學周人東膠虞庠周立四代者通己為四代但質家貴右故虞殷大學在西郊小學在國中文家貴左故夏周大學在國中王宫之東小學在西郊周所立前代學者立虞夏殷三代大學若然則虞氏上庠則周之小學為有虞氏之庠制在西郊也立殷之右學則瞽宗周立之亦在西郊立夏后氏之東序則周之東膠立在王宫之東以其改東序為東膠東膠二代名故云周立四代學文王丗子亦論四代學中學樂之事云而又以有虞氏之庠為鄉學者與周立虞庠同制故引鄉飲酒義為證鄉立庠之義也云庠之制有堂有室也者則此篇云堂則由楹外又記云堂則物當楣是也論語云由也升堂矣未入於室室堂相將有室必有堂言此者見庠則室堂俱有對榭則有堂無室也云今言豫者謂州學也者周禮地官州長職云春秋以禮會民而射于序是也云讀如成周宣榭災之榭者案宣公十六年經書成周宣榭火彼雖不據學以其無室與爾雅無室曰榭同故引以為證也云周禮作序者據州長職文云凡屋無室曰榭宜從榭者鄭廣解榭名爾雅云闍謂之臺有木者謂之榭及成周宣謝及此州立謝皆是無室故云凡以該之不得從豫及序故云宜從榭也云州立榭者下鄉也者以其鄉之庠有室有堂州謝則有堂無室故云下鄉也云今文豫為序序乃夏后氏之學亦非也不從今文者以其虞庠夏序皆是有室州之序則無室故云非言亦者古文為豫巳非今文作夏后氏之序亦非若然禮記學記及州長職并下記皆作序鄭不破之者以鄉立虞庠依虞有室州立夏序去室猶取序名是以鄭注州長云序州黨之學也故不破之也及物至正足注方猶至其足釋曰云志在於射者解足未正先視侯中之意言左足至者解左足履物云右足還併足則是立也者解經不方足還及正足之言若然云還時兼視侯中也此不言畫物早晚案大射納射器之下而言工人士與梓人升自北階兩楹間疏數容弓若丹若墨度尺而午此不言者卑者文略亦當在納射器後即畫之也不去旌注以其不獲釋曰以其旌擬唱獲今以三耦誘射不唱獲故不去旌也將乘矢注將行至四方釋曰云象有事於四方者詩云四矢反兮以御亂兮是四矢有事於四方執弓至執弦注不挾矢盡釋曰案上文司射將射時云搢三而挾一個又云將乘矢故知矢盡空執弦也南面至挾之釋曰云出于其位南適堂西者上文司射位設于所設中之西南東面今乃適位南而北回適堂西者取教衆耦威儀之法故也云改取一個挾之者此不在西階而在堂西故適堂西即云改取一個也遂適至反位注撲所至教刑釋曰引書者舜典文也彼謂教學之刑此為教射法教雖不同用撲是一故引為證也司馬至負侯注欲令至於中釋曰自此盡搢撲論三耦為第一畨射法云欲令射者見侯與旌深有志於中者凡射主欲中侯使獲者舉旌唱獲以是豫使見之望深有志於中也獲者至而俟釋曰俟待也而待者謂待司馬命去侯司射至耦射注還左還也釋曰知左還者經云還當上耦上耦位在司射之西南東面司射還欲西面與上耦相當故知左還回身當之取便可知也司射至中等釋曰云司射反位者反中西南東面位也上射至並行注併東行釋曰知併行併東行者以其既言升乃言併行故知併東行向物也云少左者言上射先升少左避下射升階也皆當至執弓注不決至不備釋曰皆左足履物者謂先以左足履物東頭合足而俟司馬命去侯云因不射不備此決司射誘射行事袒即決遂執弓挾矢今司馬不射故不備直袒而巳也若然大射司馬正不射而袒又復決遂者彼大射志於射故司馬正雖不射袒復決遂以其不為射仍不挾矢也出于至去侯注鉤楹至舉也釋曰鉤楹者於西楹西而北東行過由上射之後乃西南面立于物間者欲取南揚弓向侯便故也右執簫者不可一手揚弓故引大射曰左手執弣左當郤手則右執簫者右當覆手也獲者至而俟注聲不至仆也釋曰云而俟者待射者發矢當坐故下云獲者坐而獲也云鄉射威儀省者決大射云負侯皆許諾以宫趨直西及乏南又諾以商至乏聲止是其唱諾為宫商是其威儀多此不者威儀省故也司馬至之南注圍下至去侯釋曰司馬由上射之後立於物間命去侯訖物間南行西向適階降是其順矣今命去侯訖乃圍下射之後繞下射之東南行而適西階去若出物間西行則似直為上射命去侯是以并下射圍繞之明為二人命去侯也司射至反位注射獲至從傍釋曰云交于階前相左者既云司射與司馬交于階前相左乃云由堂下西階繞東北面則相左之時在西階之西司馬由北而西行司射由南而東行各以左相迎故云相左也司射既不升堂不得云司射向北司馬向南而相左也云射獲謂矢中人也者人謂獲者亦以事名云獵矢從傍者謂從乏傍也乃射至乘矢注古文至從后釋曰引孝經説取孝經緯援神契文彼説孝經云然後能保其社稷之等皆作后后孝經也故不從古文後是以云當從后獲者坐而獲注射者至獲也釋曰此未釋算故下經云獲而未釋獲鄭云但大言獲未釋其算是也云獲得也射講武田之類是以中為獲也者詩云舍拔則獲謂射諸禽獸為獲獲則得也戰伐得囚俘亦曰獲射著正鵠亦曰獲但舉旌以宫大言獲也偃旌以商小言獲也注宫為至相生釋曰宫為君商為臣禮記樂記文宫數八十一數最濁故為君配中央土商數七十二次君故為臣配西方金云聲和律吕相生者以其以黃鍾之初九下生林鍾之初六林鍾又上生大蔟之九二初九與九二雖非以次相生大蔟亦由黃鍾所生故云聲和由律吕相生故舉旌以宫偃旌以商不取其餘律吕也上射至於左釋曰此上射下射升與降皆上射為先又上射升降皆在左與升至卒射注去撲至之側釋曰云不敢佩刑器即尊者之側者此司射將升堂即賔前故去撲於階西乃升是不敢佩刑器即於尊者之側也大射司射去撲倚于階西適阼階下北面告于公曰三耦卒射不升堂亦去撲者國君尊雖堂下亦去撲也賔揖注以揖然之釋曰大射司射告公三耦卒射不見公揖然之者公尊故也司馬適堂西釋曰自此盡加于楅論三耦射訖取矢之事注揖推之也釋曰推手曰揖引手曰厭故周禮司士天揖時揖土揖鄭注皆以推手解之是以推手為揖但揖弓者向侯而推之以其命取矢故也揚弓者向乏而揚之以其命去侯故也注俟弟至教之釋曰此即下文弟子取矢委于楅是也司馬至設楅注楅猶至矢者釋曰云楅猶幅也訓楅為幅者義取若布帛有邊幅整齊之意故云所以承笴齊矢即下云委于楅北括又大射云既拾取矢梱之注云梱齊等之是其承笴也乃設至東肆注東肆統於賔釋曰此弟子設楅之時司馬教之故大射云小臣師設楅司馬正東面以弓為畢鄭注云畢所以教助執事者明此亦然云東肆統於賔者然則楅有首尾故下記云楅長如笴博三寸厚寸有半龍首鄭注云兩端為龍首若然則有首無尾而言西上者應有刻飾記之為首尾也司馬至乘之注撫拊至乃袒釋曰云司射之南退釋弓者司馬往堂西釋弓還依三耦所行之處亦取威儀進止之事故曰司射之南也云委矢于楅北括者順射時矢南行故也云撫拊之也者言撫者撫拍之義言拊者取拊近之理故轉從拊也云就委矢左右手撫而四四數分之也者謂司馬北面就所委矢之南北面以右手撫四矢於東以左手撫四矢於西是四四數而分之也云上既言襲矣復言之者嫌有事即袒也者案上文命弟子設楅退時巳襲今復言襲進者嫌有事則袒故重言之也云凡事升堂乃袒者堂下雖有事亦不袒若司射不問堂上堂下有事即袒司馬與司射遞行事恐同故明之也注增故至相明釋曰上言獲者執旌許諾故曰嚮獲者許諾至此弟子曰諾以其事同互相明也言互者獲者執旌許諾不言弟子許諾則弟子亦許諾此直言弟子自西方應曰諾不言獲者應諾則獲者亦應諾可知以其事同省文故互相明之司射至為耦注言若至賔射釋曰自此盡比衆耦辨論次畨將射比衆耦之事但射禮三而止第一畨直司射與三耦誘射不釋算第二畨三耦與衆耦俱射釋算第三畨兼有作樂為射節云言若者或射或否者以若是不定之辭故知或射或否射者繹已之志者禮記射義文繹謂陳已之志意也云大夫遵者也者上云大夫有遵者是也故與賔主同在任情之限云告賔曰主人御于子告主人曰子與賔射此約下大夫與士射之辭以賔比大夫以主人比士尊賔之義也遂告至於子注大夫至鄉里釋曰云大夫為下射而云御於子尊大夫也者上命三耦云命上射曰某御於子命下射曰子與某子射今命大夫云某御于子與上射同者尊大夫也大夫雖為下射其辭不與下射同也云士謂衆賔之在下者言衆賔則與賔俱來者也下記云大夫與則公士為賔鄭注云公士在官之士則衆賔之內亦有士矣與賔俱至則得主人之所命者也其將射而至者非主人之所命直來觀禮者也但是一命巳下莫問先後而至皆齒于堂下故鄭揔云士謂衆賔之在下者及羣士來觀禮者也云禮一命以下齒于鄉里者周禮黨正禮十月行正齒位之禮云一命齒于鄉里再命齒于父族三命不齒案鄉飲酒注云此篇無正齒位之禮則鄉射先行鄉飲酒之禮亦無正齒位之法而云一命以下齒于鄉里者鄉飲酒鄉射雖無正齒位之禮士立于下是以一命者在下與鄉里齒是其常法諸侯之士無再命以上若為公卿大夫自在尊東為遵也言士謂衆賔之在下者則堂上三賔不與大夫為耦矣亦皆射故下文云衆賔與射者皆降是也司射至衆耦注衆耦至三耦釋曰云衆耦大夫耦及衆賔也者言大夫之耦唯謂堂下之士言衆賔則兼堂上三賔故下云衆賔皆降云命大夫之耦曰子與某子射此即上文命下射之辭也云其命衆耦如三耦者上命三耦云命上射曰某御於子命下射曰子與某子射是也以其俱是士故命辭同衆賔至北上注言若至數也釋曰言由司馬之南適堂西者上文司馬位在司射之南東面是也云多無數也者以其言若亦是不定之辭故無常數也衆賔若少以南面為正若多不受則西邊東面北上若然大夫來在尊東為遵而此言之者鄭揔解來觀禮之意不謂大夫輒在此位也賔主至未降注言未至在射釋曰言未降後有降階之理故下云三耦卒射賔主人大夫揖皆由其階降與耦俱升射也言志在射者以其射在於堂上故也司射至耦辨注衆賔至乃遍釋曰云衆賔射者降比之耦乃遍者以上文司射降比衆耦下文乃云衆賔將與射者皆降鄭恐衆賔堂上後降者不比故兼堂上後降亦比乃遍也遂命至反位注反位至遂來釋曰自此盡為上論拾取矢并衆耦皆就射位之事云反位者俟其袒決遂來者下文云三耦拾取矢進立于司馬之西南是也此司射反位不言先下將欲為下畨射司射堂西命三耦及衆賔皆袒決遂執弓就位司射先反位鄭注云言先三耦及衆賔嚮不言先三耦未有拾取矢位無所先以此言之明言先反者對未反位之辭俱有位得言先若一有一無不得言先即此文是以下文注決此也若俱無亦得言先故上云司射比三耦於堂西云司射先立於所設中之西南東面三耦皆進由司射之西立于其西南東面北上而俟是其皆未有位亦得言先三耦至西南注必袒至射事釋曰立于司馬之西南者案上司射位在中西南司馬位在司射南今立于司馬之西南亦東面北上也云必袒決遂者明將有射事者始取未有射事而袒決遂者以其取矢即訖有射故豫著之故云將有射事也司射至取矢注作之至作射釋曰案上文司射作射之時左還當上耦西面作上耦射今作取矢亦如之故云還當上耦如作射司射至楅揖注當楅至東西釋曰此上耦發位東行時一南一北並行及將至楅南下耦在南稍進當前楅南俱北面揖其時上射稍西下射稍東東西相當故云當楅楅正南之東西也上射至面揖注橫弓至可也釋曰言順羽且興者謂以右手順羽之時則興故云且興也言左還者以左手向外而西回東面揖者揖下射使取矢也云橫弓者南踣弓也者覆左手以執弓卻右手以取矢便故知不北踣弓也云以左手在弓表者表弓背也覆手以執背故云左手在弓表云右手從裏取之便也者覆手在表執弓一手卻在裏取矢故云便也云不言母周在阼非君周可也者案大射云左旋母周反面揖鄭注云左還反其位母周右還而反東面也君在阼還周則下射將背之此直云左還反位不言母周明還周可也鄭云下射將背之則上射背左還母周也下射至上射注覆手至亦便釋曰云以左手在弓裏右手從表取之亦便者上射在西云南踣弓此不云踣弓則亦南踣弓知者以其亦用左手執弓覆右手取矢則執弓卻左手可知既仰左手向上執弓而南踣故用右手弓上向下取矢亦便也既拾至一個注楅南至之位釋曰云楅南鄉當楅之位者上云進當楅北面揖今至此位皆還北面也揖皆至於右注上射至西面釋曰云上射轉居右便其反位也者此決射時升降上射皆居左彼自堂西不復庭位故也此復庭位故上射轉在右是以鄭云便其反位也云下射左還少南行乃西面者以其初北面時東西相當今西行冝並故下射少南行乃西面取並行故也與進至反位注相左至之北釋曰云由進者之北者以其進取矢者東行此則西行由進者之北則得相左也三耦至反位注取誘至之後釋曰云三耦拾取矢亦如之者上云三耦之中上耦外而言之云取誘射之矢挾五個者以其前拾取矢皆搢三挾一個乃反位此則先取四矢亦搢三挾一個乃并取誘射四矢兼挾之故五個也云弟子逆受於東面位之後者弟子即納射器者因留主授受於堂西西方今見下耦將司射矢來向位仍西面弟子即往逆受之訖下射乃反東面故云授有司于西方而后反位謂反向東面位是以鄭亦云弟子逆受於東面位之後也衆賔至為上注未猶至禮也釋曰云未猶不也者若言未謂此第一畨初時未有拾取矢禮以其第一畨唯有三耦射無賔射法不得云未是以轉為不以其全不拾取矢也云言此者嫌衆賔三耦同倫初時還北面受算反東面實之者以其所納射器皆在堂西執中與算皆從堂西來向西序之南南面執中者既東面坐設訖興還向北面受算回向東面實之也司射至不釋注貫猶至作關釋曰言不貫者以其以布為侯故中者貫穿布侯故以中為貫也是以鄭云貫猶中也中則貫也上射至而俟注執所取算釋曰八算者人四矢一耦八矢雖不知中否要須一矢則一算改實八算擬後來者用之乃射至委之注委餘至中西釋曰云上射於右下射於左者以釋算者東面為正依投壷禮賔黨於右主黨於左是以上射於右賔黨也下射於左主黨也云委餘算禮尚異也者手中餘算未知有幾不可盡中所有餘亦得於後釋要委餘於地别取中內八算者禮尚異故不用餘者云委之合於中西者算法多少視射人多少不定要橫委其餘於中西手中餘者與之合也又取至就席注或言至堂西釋曰上云榭則鉤楹內謂射於榭者也堂則由楹外謂射於庠者也此當有鄉大夫射於庠亦有州長射於序故互見其義互言者今袒決遂則言堂東西見在庠在榭亦然釋弓説決拾則言序東序西序則榭也在庠亦然故言互言之周公省文欲兩見之也云大夫止於堂西者上賔主人大夫俱降無堂西之文下云大夫袒決遂就其耦故知此時止於堂西故下記大夫降立于堂西以俟射也大夫至就席注耦於至得申釋曰言在堂如上射之儀者謂耦先升是如上射身先升法以其近射事故得申也衆賔至上耦注於是至及賔釋曰云於是言唯上耦者嫌賔主人射亦作之鄭言此者若二耦射下即言所作唯上耦則賔主人射作之未可知故於衆賔射訖乃言此明賔主射不作可知故於此乃言所作唯上耦明除賔主矣故鄭云於是言唯上耦嫌賔主射亦作之引大射者公尊公與賔射不作直請記云賔主人射則司射擯升降是雖不作猶為擯相之但不請也卒射至而俟注司射至數也釋曰云冝終之也者決前畨射司射告卒射此二畨射不告卒使獲者告是冝終之也云餘獲餘算者一耦不必盡中故有餘算也云無餘算則空手耳者或賔主八矢盡中釋八算故空手告也司馬至握焉注兼束至作尚釋曰自此盡司馬乘矢論取矢之事云束于握上則兼取之順羽便也者握上則兼取之順持之處今束於握之上取持於中央握之向下順羽便故乘矢揔束之也云不束主人矢不可以殊於賔也者主人鄉大夫則是大夫官當束之不敢殊别於賔若主人是州長則士自然不束也肅愼氏者國語文引之者證矢有題識以有題識故束者得知是大夫之矢也司射至視算注釋弓至事巳釋曰凡言遂者因上事司射於上無事而言遂適者以司射與司馬遞行事今以司馬進乘矢司射遂適西階西釋弓去撲也云射事巳此始再畨射未巳而言巳者前畨不釋獲今據第二釋獲之功成則為巳是以下記云司射釋弓矢視算與獻釋獲者釋弓矢注云唯此二事休武主文休武者射訖數算主文者洗爵獻釋獲者是也釋獲至右獲注固東至右獲釋曰釋獲者在中西東面釋算之時賔黨於右主黨於左今將數算冝就之是以少南就右獲更東面也二算為純注純猶至隂陽釋曰云耦隂陽者隂陽對合故二算為耦隂陽也注縮從至為蹙釋曰凡言從橫者南北為從東西為橫今釋算者東面而言從橫則據數算東為正是以東西者為從南北者為橫故鄭云於數者東西為從也有餘至於下釋曰此則以南北為橫也注少北至鄉之釋曰云少北於故故則右算也又移至左算之後東面鄉之是以云少北於故注變於右釋曰云變於右者右則一一取之於地實于左手此則揔斂於左手二取之於左手委於地是變也必變之者禮以變為敬也司射至于賔注賢獲至其餘釋曰云齊之而取其餘者解經取賢獲以算為獲以其唱獲則釋算故名算為獲左右數齊有餘則賢獲故以告也若右至曰竒注賢猶至干竒釋曰若干者數不定之辭凡數法一二巳上得稱若干竒則一也一外無若干鄭亦言若干者因純有若干竒亦言若干竒言若干者衍字也若左至而俟釋曰此將為第三畨射故豫設之或實或委一如前法也司射至設豐注將飲至而卑釋曰自此盡徹豐與觶論罰爵之事云設豐所以承其爵也者案燕禮君尊有豐此云承爵豐則兩用之燕禮注豐形似豆卑而大此不言大彼以承尊故言大此承爵不言大或小耳弟子至反位注勝者至有事釋曰知弟子是少者以其執弟子禮使令故知少者也云執弓反射位不待其黨已酌有事者以此弟子由堂西固在射賔中矣黨即衆賔是也案下文三耦及衆射者皆與其耦進立于射位今酌者不待其黨與俱進而先反射位者由己酌酒有事訖其黨未得司射命又無事不得共酌者同就射位故酌者不得反射位也司射至張弓注執張至卒射釋曰云右手執絃如卒射者上文卒射執弓不挾右執弦矢盡故也此非卒射亦執張弓為無矢亦右執弦也故注云如卒射注固襲至執弦釋曰云固襲説決拾矣者謂前降堂時既襲説決拾矣云起勝者也者謂至此復言不勝者謂以此襲説決拾以不能用也起發勝者袒決遂能用也云兩手執弣又不得執弦者上勝者言執張弓如卒射則左手執弓右手執弦此則云執弣明仰弓於左手之上執弣橫之而不得執弦則冝右手共執弓弣故云兩手執弣又不得執弦也司射先反位注居前俟所命來釋曰云居前俟所命來者以衆射者皆止於堂西未向射位而司射先反位於下文衆耦等乃來就位射是得命即來故云俟所命來也來訖司射乃作之也三耦至少右注先升至之位釋曰云少右辟飲者也者以其豐在西楹之西正當西階飲者升少西又當辟豐上之爵故云少右辟飲者也云亦相飲之位者以其相飲者皆北面於西階授者在東飲者在西故云亦相飲之位注右手至執弓釋曰此無正文以祭禮皆左手執爵用右手以祭故知此亦用左手執弓右手執觶可知也注後升至由次釋曰此對射時升降皆有上射在先今後升先降故云略之不由次第也注俟復射釋曰待復射者謂待第三畨射也有執爵者注主人至序端釋曰以初使勝黨第子酌酒於豐上以發首故使弟子今云有執爵者明主人使贊者代弟子酌於豐上以次至終也贊者謂主人之賤不射者此則鄉飲酒云主人之贊者之類也云於既升飲而升自西階立于序端者謂於上耦既飲訖贊者乃升自西階酌訖奠於豐上如下文贊者即立于序端立于序端文出于大射也執爵至如初注每者至於遍釋曰云執爵者坐取觶實之者謂初飲訖反奠於豐上贊者取此觶實之反奠于豐上云升飲者如初巳下皆如初故鄭云每者輒酌以至於遍也司馬至于侯注鄉人至獻也釋曰自此盡負侯而俟論司馬獻獲者之節云鄉人獲者賤明其主以侯為功得獻也者案大射云司馬正洗散遂實爵獻服不服不侯西北三步北面拜受爵注云近其所為獻彼國君禮使服不士官唱獲故就其所為唱獲獻之此鄉人獲者賤故獻於侯明以侯為功得獻也薦脯至三祭注皆三至處也釋曰三處者下文右與左中是也獲者至送爵注負侯至受爵釋曰知負侯中者以下云適右個又適左個後言中明先居中可知云拜送爵不同面者辟正主也者案上文正主獻賔獻衆賔皆北面與受獻者同面今此與受獻不同面故云辟正主也云其設薦俎西面錯以南為上者獲者據之東面而云西面錯據設人而言以南為上者特牲少牢東面籩豆皆以南方為上故知此亦然云受爵於侯薦之於位者此云負侯北面拜受爵是受爵于侯云薦之於位者下云左個之西北三步東面設薦是薦之於位也若然不薦亦在侯者以其酒在人手可得就侯獻獲者薦乃設之於地若與酒俱在侯所則正祭侯何名獻獲也若大射則獻與薦俱在乏乃適侯祭之君禮與此異也獲者至薦俎注獲者至新之釋曰此將祭侯也云獲者以侯為功是以獻焉者以獲者卑賤因侯有功乃得獻今還以得獻之酒獻侯故云是以獻也云人謂主人贊者以其前使為獲者設薦俎是主人之贊者今還使之設薦俎故知人是主人贊者知籩在東豆在西俎當其北也者以其侯以北面為正依特牲少牢皆籩在右故知籩在東右廂豆在西左廂可知也云言使設新之者鄭意嫌更使人設之其實薦此者仍前人而云使人設薦俎示新之而巳故云言使設也獲者至祭酒注為侯至大射釋曰此正祭侯故獲者南面鄉侯祭故鄭云為侯祭也云亦二手祭酒反注如大射者案大射云獲者左執爵右祭薦俎二手祭酒鄭注云二手祭酒者南面於俎之北當為侯祭於豆間爵反注為一手不能正也此薦爼之設如於北面人焉此祭亦然故云如大射也左個至既爵注不就至北面釋曰云不就乏者明其享侯之餘也者若就之則已所當得今不就乏近侯者明享侯之餘云立飲于薦右近司馬者解在薦右之意也知於是司馬北面者此約獻釋獲者司射之位案下文司射獻釋獲者釋獲者薦右東面拜受爵司射北面拜送爵故知此時司馬亦北面也若然釋獲者在司射之西北面立飲此獲者不北面飲者案大射注此嚮受獻之位也不北面者嫌為侯卒爵此亦然故不北面也司馬至乏南注遷設至之前釋曰云遷設薦俎就乏明已所得禮也者前設近侯見享侯之餘此近乏者乏者己所有事之處遷近乏是明其己所得禮故也云設于南右之也者以右取之便也云凡他薦俎皆當其位之前者言凡見廣解薦處謂凡燕及食并祭祀之薦俎皆當其位之前唯此與大射獲者與釋獲者薦俎辟設不當前也獲者負侯而俟釋曰獲者既受獻負侯而俟第三畨射也司射至有祭注不當其位辟中釋曰自此盡反位論司射獻釋獲之事此薦脯醢及折俎有肺祭一與獻獲者同但彼三祭此一祭為異也一祭者亦薦有祭肺俎有祭肺以為將食而祭故言有祭也云不當其位辟中者以釋獲者位在中西故獻之於其位少南所以辟中也釋獲至反位注辟薦至辟俎釋曰云亦辟俎者上獻獲者訖獲者執其薦使人執俎從之設于乏南此釋獲者受獻訖釋獲者少西辟薦不云辟俎亦辟俎與獲者同可知故云亦辟俎也司射至反位注為將復射釋曰自此盡反位論將為下畨射作之使拾取矢之事司射至就位注位射至取矢釋曰云位射位者知是射者下云各以其耦反於射位故知此是射位在司射之西南東面者也云不言射位者以當序取矢者以此當次序拾取矢射故不言射位也司射先反位注言先至所先釋曰言先三耦及衆賔也者此下有三耦及衆賔故知先三耦及衆賔也云嚮不言先三耦未有拾取矢位無所先者案前第二畨將射命三耦拾取矢司射反位不言先未有位無所先故決之第二畨無位者以司射之西南有三耦射位至再畨司射反於故位三耦將移於司馬之西南拾取矢之位未往之時末有故位三耦既無故位故司射不得言先故以此決之也凡射大射與鄉射各有三位此鄉射無次有堂西取弓矢袒決遂及比耦之位又有三耦射位在司射位西南又有拾取矢及再畨射位是三位大射有次次內有袒決遂取弓矢之位又有堂東次比耦之位又有射位并拾取矢之位是亦有三位但君臣禮異故位事不同也三耦至射位注以猶與也釋曰訓以為與者春秋之義能東西之曰以若存以字謂言尊卑不同任意以之故轉為與則平敵之義也司射至前揖注南面至行也釋曰言南面者謂賔主各於堂東西南面立相待言揖行者謂各於堂上北面相見而揖揖訖行向楅也及楅至三耦注及楅至便也釋曰云及楅當楅東西也者賔主出堂東西相見揖訖東西行至楅所也云不北面揖由便也者決三耦及衆賔皆於楅南北面揖及楅揖此則無楅南北面揖賔主各由東西便故也卒北至一個注亦於三耦為之位釋曰經云搢三挾一個與上三耦取矢訖搢三挾一個同又同處故云亦於三耦為之位也揖退注皆巳至反位釋曰云皆巳揖左還各由其塗反位者謂賔主北面揖退之時賔主皆左還相背各向堂塗反堂東西之位知左還者約上三耦也賔堂至就席注將袒至賔也釋曰袒是盡敬之事襲是修容之禮故上經將袒先言主人此經襲則先言賔是尊賔故也大夫至其耦注降袒至取矢釋曰知於堂西者上文賔主人大矢降賔堂西袒決遂又上文大夫射時堂西袒決遂故知也揖皆至矢束注説矢至拾取釋曰大夫西面者為下射故也興反至位揖注兼取至接也釋曰此大夫與耦取矢踣弓覆手仰手一如上三耦法其揖退之儀亦如上左還而西也司射至如初注進前至升射釋曰自此盡退中與算而俟論第三畨用樂射之事云嚮言還當上耦西面是言進終始互相明也者上畨將射時云司射還當上耦西靣作上耦射不言進明還當上耦時者進近上耦乃作之此直進作射不言還當上耦明進時亦還當上耦而作之故言終始互相明也司馬至賔許注東面至在堂釋曰知在西階之前不就樂正命之者以經云司射降搢撲即言東靣命樂正無行進之事故知西階之前遙命之也云樂正亦許諾知者案大射云司射東面命樂正曰命用樂樂正曰諾是樂正許諾之事此不言者文不具故言之云猶北面不還以賔在堂者此亦無文樂正位東階東南北面大師位東北西面賔在堂南面樂正猶北面不還西面是以下文特云東面命大師明此時不西面受命矣大射鄭注彼云樂正西面受命左還東面命大師與此禮異者雖無正文鄭以義言君在阼故也司射至不釋注不與至聽也釋曰云鄉射之鼓五節者以卿大夫士用五節是以射人云王以騶虞九節諸侯以貍首七節卿大夫以采蘋五節士以采蘩五節是卿大夫士同五節云歌五終所以將八矢者下記云歌騶虞若采蘋皆五終是也云一節之間當拾發四節四拾其一節先以聽也者尊卑樂節雖多少不同四節以盡乘矢則同其餘外皆以聽以知樂終始長短也王九節者五節先以聽諸侯七節者三節先以聽卿大夫士五節者一節先以聽皆四節拾將乘矢但尊者先以聽則多卑者先以聽則少優至尊先知審政也此節亦取侯道之數故鄭注射人云九節七節五節者奏樂以為射節之差言節者容侯道之數也凡射皆與臣下共為若與尊者同耦自然與尊者同節若不與尊者同耦則各自用其節樂當與射義同上射至若一注東面至重節釋曰云東面者進還鄉大師也者以其大師西面樂正北面明知進身鄉大師乃命之云此天子之射節也者周禮射人而知云取其冝也者騶虞喻得賢者多此鄉射亦樂賢故云取其冝也云其他賔客鄉大夫則歌采蘋者采蘋是鄉大夫樂節其他謂賔射與燕射若州長他賔客自奏采蘩若然此篇有鄉大夫州長射法則同用騶虞以其同有樂賢之志也云間若一者重節者間若一謂五節之間長短希數皆如一則是重樂節也大師至射降注皆應至衆賔釋曰云樂正退反位者反工南北面位也云降者衆賔者次畨射時賔與主人大夫卒射皆升堂此降者衆賔也釋獲至如初注側持至射也釋曰言猶袒者亦是有故之辭以其常袒恐不袒故言猶以連之也云側持弦矢曰執者對方持弦矢曰挾并矢於弦尚其鏃將止變於射也者亦是對將射挾矢而言司射至堂西注不挾至禮畢釋曰云不挾亦謂執之如司射也者執之如司射兼諸弦弣則與司射異以其司射直執一個無三矢兼於弣三耦以下則執一個并於弦又以三矢并於弣所以異也辨拾至就席注謂賔至留下釋曰知相俟于堂西者以經言辨拾取矢訖乃言揖皆升就席則知先取矢者皆相待堂西其主人則在堂東遍取矢訖乃揖而升堂就席也云主人以賔揖升大夫及衆賔從升立時少退于大夫三耦及弟子自若留下者衆賔則三賔也皆依上文獻後升及留在下之法司射至反位釋曰司射之撲在階西今來去撲於堂西之等以其不復射故也司馬至釋之注説解至束之釋曰上初張侯時云乃張侯下綱不及地武不繫左下綱中掩束之鄭云事未至也又至將射時司馬命張侯弟子説束遂繫左下綱鄭注云事至今言司馬命弟子説侯之左下綱而釋之直言説侯之左下綱而釋之明未全去備復射故鄭下注云諸所退皆俟於堂西備復射也故知此釋之為三畨射畢不復射若有射則行燕射旅酬以後乃為之故於此時中掩左下綱如初張時也命獲至而俟注請所至薦俎釋曰獲者釋獲者亦退薦俎者上獻時皆有薦俎辟之於右今獲者以旌退釋獲者退中故知亦退薦俎也司馬至而立注當監旅酬釋曰自此盡司正降復位論射訖行旅酬之事故司馬反為司正鄭云當監旅酬也樂正至反坐注贊工至北面釋曰前為將射遷工于東方西面樂正北面今將旅酬作樂故遷升於堂上也云降時如初入者以經直云如其降也降時威儀不見故取上文降時如初入初入則上工四人巳下是也云樂正反自西階東北面者上初升於西階之東樂正立于其西合樂訖工告樂正曰正歌備樂正告于賔乃降立于西階東北面又將射時樂正命弟子贊工遷樂于下弟子相工如初入降自西階東北面近其事知不升者以正樂畢上無告請於賔之事冝與正歌備巳後同也賔北至南面注所不至立飲釋曰賔北面坐取俎西之觶者謂上一人舉觶于賔賔奠于薦西者也云賔立飲者鄉飲酒當此賔酬主人時云賔不祭立飲是也注旅酬至殺也釋曰對獻酬之時賔主各於其階故云同階禮殺也賔揖至之禮注其既至所酬釋曰云主人以觶適西階上酬大夫者旅酬恆執此觶以相酬故言以知義然者上文命獲者以旌退鄭注云旌言以者旌恆執也是也云其既實鱓進西南面立嚮所酬知者以上賔酬主人阼階上實觶進南面則知此主人酬大夫西階上實觶而亦進西面可知也主人至如之釋曰云若無大夫者鄉人為公卿大夫來觀禮者為遵或有或無不定故云若有大夫先酬之無大夫則酬長以鄉射無介直有三賔以長幼之次受酬此言酬衆賔則三賔也司正至某子注某者至為主釋曰云旅酬下為上尊之也者以旅酬者少長以齒逮下之道前人雖卑其司正命之飲酒呼之稱謂尊於酬者故受酬者為某子酬他為某也云春秋傳曰者案莊十年秋九月經書荆敗蔡師于莘以蔡侯獻舞歸公羊傳曰荆者何州名也州不若國國不若氏氏不若人人不若名名不若字字不若子何休云爵最尊也鄭引之者證旅酬下為上之義酬者稱字受酬者稱子子是尊稱云此言某酬某子者射禮略於飲酒飲酒言某子受酬以飲酒為主者此鄉射主於射略於飲酒故稱酬他
