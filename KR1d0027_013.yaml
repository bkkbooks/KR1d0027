  text: 儀禮疏卷第十三
  hash: sha256:5f234f2a7afc0b21ede34c5c3d2096306f0d38276b3e54860d335e46f37c97bf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_013-1a}
body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彥等撰司正降復位釋曰自此盡唯賔論舉觶於賔與大夫為無算爵之事云司正降復位者司正當監旅酬訖故降使二人舉觶于賔與大夫為無算始也舉觶至薦右注坐奠之不敢授釋曰賔與大夫皆席末答拜者皆席西南面答拜云皆進坐奠于薦右者以其將飲者於右故也云坐奠之不敢授者對獻酬時親授主人之贊者卑不敢親授觶也賔與至以興注辭辭其坐奠觶釋曰必辭者贊者不敢親授賔與大夫不可自尊故辭之不言取而言受者亦是若親受之然舉觶至所興注不舉至反坐釋曰崇重也凡飲酒禮成於酬前巳旅酬所盛禮巳重今主人復舉觶為無算爵盡歡情客不盡主人歡故且奠之未舉之故不奠薦左若無大夫則唯賔注長一至之為釋曰嚮二人舉觶為賔與大夫今若無大夫當闕一人故云則唯賔也云長一人舉觶如燕禮媵爵之為者燕禮初二大夫媵觶至旅酬復使二人君命長媵一爵於君與此同故云如燕禮之為彼旅酬此為無算爵不同但一人是同故引為證也司正至于賔注請坐至倦焉釋曰自此盡少退北上論請坐徹俎之事云酒清肴乾強有力者猶倦焉者此禮記聘義文案彼云故強有力者將以行禮也酒清人渴而不敢飲也肉乾人飢而不敢食也日莫人倦引之者證此賔須坐之義賔辭以俎注俎者至貴肴釋曰俎所盛骨體骨體是肴之貴者故辭之也反命至徹俎注弟子至備耳釋曰知弟子是賔黨者以其司正降自西階階前命之明賔黨弟子在西階東面也必使賔黨弟子者徹俎是賔請之故鄭云俎者主人贊者設之今賔辭之使其黨俟徹順賔意也云上言請坐于賔此言主人曰互相備耳者凡辭皆司正請于主人主人有命司正乃傳告賔今上文云司正請坐于賔直見司正傳主人辭不見主人曰請坐于賔之辭此經直見主人曰請徹俎不見司正傳主人以告賔是互相備也不言互文而云互相備者凡言互文者各舉一事一事自周是互文此據一邊理一邊理不備文相續乃備故云互相備若云糗餌粉餈鄭注云餌言糗餈言粉互相足之類也司正至南面注俟弟子升受俎釋曰云俟弟子升受俎者下云司正以俎出授從者注云授賔家從來者也所以厚禮之則此弟子升受俎者案下文據大夫與主人而言若賔俎授司正非弟子也注授賔至禮之釋曰云古者與人飲食必歸其盛者所以厚禮之者鄉飲酒燕禮大射賔客皆有俎徹歸客之左右俎是肴之貴是歸其盛者公食大夫既食有司卷三牲之俎歸于賔館故揔云古者與人飲食必歸其盛者所以厚禮之也主人至面立注以東至侍者釋曰云以東授主人侍者弟子是賔黨非主人之贊者故知徹主人俎還授主人侍者歸入於內也注從降亦為將燕釋曰賔主人大夫有俎從俎而降此三賔無俎亦從大夫而降亦如賔主人大夫將燕故同降同升也主人至升坐注説屨至被地釋曰自此盡門外再拜論升坐行無算爵賔醉送出之事云説屨則摳衣為其被地者曲禮云摳衣趨隅彼謂升席時引之證説屨低身亦然若不摳衣恐衣被地履之但對文上曰衣下曰裳散文衣裳通此衣即裳也案少儀云排闔説屨於戶內一人而巳矣鄭注云雖衆敵猶有所尊也彼尊卑在室則尊者説屨在戶內自餘説屨於戶外若尊卑在堂則亦尊者一人説屨在堂自餘説屨於堂下是以燕禮大射臣皆説屨於階下公不見説屨之文明公舄在堂矣此乃鄉飲酒臣禮賔主人行敵禮故皆説屨於堂下也乃羞注羞進至案酒釋曰云所進者狗胾醢也者以其牲用狗故知狗胾醢醢未必狗以其醢豫造乃成非臨時之物故知非狗連言之也無算至不拜注二人至復崇釋曰經賔上有于字者誤以此二觶仍是前二人所舉者今以二人升者舉發使行無算爵非新觶以鄭注可知故誤有也若然舉觶上屬賔下屬為句也云卒觶者固不拜矣著之者嫌坐卒爵者拜既爵者上正旅酬時賔酬主人賔不祭卒觶不拜不洗今此二人舉觶禮彌殺故云卒觶者固不拜矣嫌坐卒爵者拜既爵者以正獻酬時皆坐卒爵拜既爵嫌此無算爵飲卒觶亦有拜義故明之云坐于席禮既殺不復崇者此決正行獻酬時在於階下有拜既爵此説屨就席禮既殺不復崇重故無拜爵也注錯者至殺也釋曰云其或多者迭飲於坐而巳者衆賔之長在賔西者三人大夫則席於賔東若大夫亦三人則與衆賔等得交錯相酬言其或多者若有一大夫則衆賔二人無所酬直二人迭飲而巳若大夫四人巳上多於三賔自三人之外亦無所酬則亦自相酬迭飲而巳云皆不拜受禮殺也者上二人舉觶於賔與大夫皆拜受及飲卒不拜是其殺今衆賔與大夫不拜受觶故言禮又殺也辨卒至階上注衆賔至復位釋曰經云辨謂堂上衆賔巳上皆飲訖云卒受者謂最末後飲者云衆賔之末飲而酬主人之贊者大夫之末飲而酬賔黨亦錯焉者此亦若堂上交錯也云不使執觶者酌謂不使二人執觶者酌云以其將旅酬不以己尊孤人也者其堂上皆坐行酒至此立階上旅在下解經興以旅在下者云其末若皆衆賔則先酬主人之贊者謂大夫或少或無則衆賔為末飲也云若皆大夫者謂大夫多衆賔遍後二觶並酬大夫則大夫為末飲也云執觶者酌在上辨降復位者謂二人舉觶酌堂上衆賔巳上辨其堂下自酌相旅二人無事故降復于東階前西面北上位也故鄉飲酒記云主人之贊者西面北上不與無算爵然後與必知復位者下經云執觶者皆與旅是也長受至實之注言酬至不拜釋曰謂堂下或賔黨之長或主人贊者之長受堂上酬酬者不拜鄭云酬者不拜者嫌酬堂下異位當拜也者嫌堂下異位堂上則堂下當拜故明之也受酬者不拜受注禮殺至不拜釋曰堂下卑者受堂上尊者酒當拜由禮殺雖尊者之酬猶不拜也辨旅皆不拜注主人至有拜釋曰以鄉飲酒記云主人之贊者不與無算爵然後與故鄭偏言主人之贊者於此始旅嫌有拜故明之也執觶者皆與旅注嫌巳至旅也釋曰此即上文二人舉觶者於西階上巳卒觶故鄭云嫌巳飲不復飲也卒受至大夫注復奠至為之釋曰今文此經云執觶者無此執觶又今文無執觶及賔觶大夫之觶皆為爵不從者以其皆在無算爵之科明不為爵云實觶觶為之者亦不從也無算樂注合鄉樂無次數釋曰知合鄉樂二南者約上正歌時不略其正巳歌鄉樂但上有次第先歌關雎次歌葛覃卷耳次歌鵲巢采蘋采蘩皆三終有次數今無次數任賔主所好也賔興至奏陔注陔陔至而巳釋曰此賔興即命奏下文賔降乃作樂也云陔陔夏其詩亡者九夏皆詩篇鄭注鍾師云歌之大者載在樂章樂崩亦從而亡云周禮者鍾師云陔夏杜子春云客醉而出奏陔夏雖非正文亦據周禮而言云陔夏者天子諸侯以鍾鼓知者鍾師云以鍾鼓奏九夏是天子法襄公四年穆叔如晉晉侯饗之金奏肆夏之三不拜則陔夏奏用鍾矣大夫士尚有鼓明諸侯亦有鼓故揔云天子諸侯以鍾鼓知大夫士用鼓者此鄉射鄉飲酒皆有鼓故知以鼓奏陔而巳也賔降至再拜注拜送至有終釋曰知拜送賔于門東西面者此約迎賔時於此拜也云不答拜禮有終者以行禮有終故不答也明日至門外釋曰自此盡經末論息勞司正之事主人至乃退注不見至屈辱釋曰不見不褻禮者禮不欲數數則瀆今主人不見恐相褻故不見也主人至司正注釋服至息之釋曰上文主人如賔服則主人亦朝服矣今言釋服謂釋去朝服朝服之下衣則次玄端故知釋服説朝服服玄端也玄端即朝服之下易其裳為異也月令者彼是十月農功畢勞農以休息之為息田夫之臘祭引之者證息勞來休息之義也無介注勞禮至異者釋曰云勞禮略貶於飲酒也者謂貶於鄉飲酒鄉飲酒禮有介此上司正飲酒及此勞禮皆無介是貶於鄉飲酒也云此以下皆記禮之異者謂息司正之禮與上飲酒禮異之事也不殺注無俎故也釋曰下文云無俎無俎故不殺殺即有俎也使人速注速召賔釋曰若公食使人召之還司正為擯也迎于至算爵注言遂至算爵釋曰云言遂者明其間闕也者間闕謂間一人舉觶下言工升歌立司正旅酬及二人舉觶及徹俎之事以其闕此數事故云遂無算爵也云賔坐奠觶于其所擯者遂受命于主人請坐于賔賔降説屨升坐矣此並依正飲酒禮不言遂請坐者請坐主於無算爵者以其請坐主於無算爵今言無算爵自然請坐可知故不須言請坐於賔也無司正注使擯至立之釋曰不立司正亦是與飲酒禮異賔不與注昨日至作豫釋曰賔者主人所尊敬不可復召之復召之亦是褻瀆也徵唯所欲注徵召至請呼釋曰須止則止須召則召在主人之意故云所欲請呼也以告至可也注告請至仕者釋曰云鄉大夫致仕者也者此即鄉飲酒注云先生謂老人教學者云君子有大德行不仕者大德行謂六德六行可貢而不仕者此即居士縞帶亦曰處士羞唯所有注用時見物釋曰謂昨日所有之餘見物鄉樂唯欲注不歌至所好釋曰此即與上無算樂同而云不歌雅頌者以其上飲酒主於射略於樂不用小雅此非鄉射而亦不歌雅頌者亦不可過于正飲酒禮故云周召之詩在所好也記大至為賔注不敢至處士釋曰據此鄉射使處士無爵命者為賔故有大夫來不以鄉人加尊於大夫故易去之使公士為賔若然鄉飲酒貢士法賢者為賔其次為介又其次為衆賔有大夫來不易去之以其賔擬貢故也云鄉賔主用處士即君子者也使能不宿戒注能者至習之釋曰解上賔用處士云能者敏於事者孝經云參不敏鄭云敏猶達也則此通逹於事其牲狗也注狗取擇人釋曰鄉飲酒鄉射義取擇賢士為賔天子巳下燕亦用狗亦取擇人可與燕者亨于堂東北注鄉飲至發也釋曰陽氣起於東北而盛於南方亨狗于東北飲酒是陽故法之尊綌幂賔至徹之注以綌至堅潔釋曰凡幂者皆為塵埃加故設之但用幂不用幂不同者凡用醴皆不見用幂質故也即士冠禮子昏禮禮賔贊禮婦聘禮禮賔此等用醴皆無幂是也醮用酒亦無幂者從禮子質也或以尊厭卑亦無幂燕禮君尊有幂方圜壺則無幂昏禮尊於室內有幂尊於房戶外為媵御賤故無幂鄉飲酒鄉射有幂者無所厭故也若祭祀之幂幂人云以疏布幂八尊鄭云天地之神尚質以畫布幂六彛鄭云宗廟可以文凡王巾皆黼注云周尚武其用文德則黻可諸侯無文或與王同其喪中之幂皆用疏布士喪禮小斂用功布大斂亦同士虞用絺幂與吉同大夫亦當然也云賔至徹之者巾幂必布執幂賔未至恐塵加賔至徹去不復用以其鄉射飲酒不見更用之文故也燕禮君命徹幂則未命之前重用之者君尊久設恐塵故重覆之蒲筵緇布純注筵席也純緣釋曰鄉大夫州長與鄉人習禮雖有公鄉之尊無加席唯一種故記人記之云筵席者鄭注周禮序官云鋪陳曰筵藉之曰席然其言之筵席通但在地者為筵取鋪陳之義在上曰席取相承藉之義耳西序之席北上注衆賔統於賔釋曰衆賔之席繼賔巳西南面東上今云西序之席北上者謂衆賔有東面者則北上此東面非常故記之也若然此鄉射上設席雖不言衆賔之數上文云三拜衆賔鄭云三拜示遍也則衆賔亦三人矣而復有東面者若公卿大夫多尊東不受則於尊西賔近於西則三賔東面北上統於賔也薦脯至二寸注脯用至作植釋曰云豆冝濡物也者案王制云一為乾豆鄭云謂臘之以為祭祀豆實與此違者以其豆實則醢也鄭注周醢人云作醢及臡者必先膊乾其肉乃後細莝之雜以粱麴及鹽漬以美酒塗置甀中百日則成矣是乾以為豆實醢是也云膱猶脡也為記者異耳者鄉飲酒記云脯五脡此云五膱膱與脡不同非訓之是記者異名不同非别有義故鄭云膱猶脡也云於人為縮者脯法於人為縮者鄉飲酒記引曲禮云以脯修置者左朐右末鄭注曲禮云屈中曰朐取左手案之右手擘之便故於人為縮橫祭半膱橫上於脯為橫於人則為縱也俎由至階升注狗既至東方釋曰云狗既亨載于東方者上云亨于堂東北今云俎由東壁者亨在東北實俎曰載載則於東方東方則東壁故云俎由東壁也云自西階升者既由東壁恐如祭饌由東階升故記人明之若祭饌則東階升特牲少牢是也尊神故由阼階升賔俎至進腠注以骨至體也釋曰云以骨名肉者骨為本有名肉為末無名所食即肉故以骨名肉必知骨有肉者特牲乃食舉注云舉言食者明凡解體皆連肉是有肉也云賔俎用肩主人用臂尊賔也者此據前三體而言以其體有肩臂臑禮記祭統云周人貴肩為其顯故賔用肩尊賔也云離猶刲也者案禮記少儀云牛羊之肺離而不提心鄭云提猶絶也􅩿離之不絶中央少者中央少者即是心也此將食舉肺也云進理謂前其本者此與公食同生人食法少牢進下者是鬼神食法云右體周所貴也者對左殷所貴云若有尊者則俎其餘體也者前有三肩臂臑以次用之賔主巳用肩臂有一大夫則用臑二大夫則取後體用膞若有三大夫巳上則用胳其脊脅與賔主同故下文云獲者之俎折脊脅肺臑注云臑若膞胳觳折之以為大夫之餘體是也注謂獻至有薦釋曰知此三人者以其言三作故知唯此三人而巳凡奠者於左釋曰謂若酬賔奠於右賔奠之於左將舉者於右釋曰謂若酬一人二人舉奠之於薦右後舉之者也衆賔至賔禮注尊之於其黨釋曰此獻三賔之時主人唯為長者一人洗爵如經文恐巳後更洗故記人明之也三笙至成聲注三人至之和釋曰云爾雅曰笙小者謂之和者案爾雅釋樂云大笙謂之巢孫氏注云巢髙大又云小者謂之和注云和小笙是也獻工至階上注奠爵至與笙釋曰云奠爵于下篚不復用也者謂堂上不復用無妨堂下更入用之知者獻獲及釋獲者皆取而獻之是也大射獻服不氏用散不用爵者彼君禮與此異也立者東面北上注賔黨釋曰此謂一命及不命來觀禮者與堂下衆賔齒東面北上而立司正至其位注薦於觶南釋曰知薦於觶南不薦於觶北者以司正觶南北面立若薦觶北與觶相隔非位前故知觶南位北也三耦至戒之注弟子至戒之釋曰云使弟子司射前戒之者謂請射之前戒之以其經云三耦俟於堂西故鄭云前戒謂先射請戒之也司射至之西注便其事也釋曰此矢謂挾一個者初司射適堂西袒決遂取弓矢于階西兼挾乘矢則誘射之弓矢亦在階西矣若然誘射訖適堂西改取一個挾之遂適階西取撲此一個實在堂西至視算之時於西階西釋弓矢去撲獻釋獲者此亦在西階西故鄭云便其事也司射至倚旌注著並至倚旌釋曰云著並行者謂司射與司馬有不並行事時案上文將射適堂西袒決遂取弓矢於西階上北面告賔曰弓矢既具有司請射其時司馬即階前令倚旌此皆同時故鄭云著並行事如上經納射器及比三耦以前司射獨行事後及司正為司馬與司射並行事故記人記之也凡侯至鹿豕注此所至物之釋曰云此所謂獸侯也者周禮梓人云張獸侯以息燕注云息者休農息老物也燕謂勞使臣若與羣臣飲酒而射是也云燕射則張之者燕禮大射正為司射如鄉射之禮是諸侯燕用鄉射之禮故云燕射則張之也天子雖無文據記天子燕射記明天子燕射亦用鄉射之法也云鄉射及賔射當張采侯二正者案周禮射人掌賔射大夫士同二正是賔射二正鄉射無文知亦采侯二正者周禮賔射與賔客為射此鄉射雖與鄉人習禮亦如賔主行射禮又非私相燕勞故約與賔射同也言采侯者梓人云張五采之侯則逺國屬是賔射之侯故云采侯也云而記此者天子諸侯之燕射各以其鄉射之禮者以天子自用鄉射之禮諸侯自用鄉射之禮大夫士亦各隨其君用鄉射之禮也用鄉射之禮謂張侯道五十步及三耦一與鄉射同云張此侯則經獸侯是也云由是云焉者謂由是用鄉射法故云獸侯於此鄉記也云白質赤質皆謂采其地者案周禮掌蜃云共白盛之蜃則此以蜃灰塗之使白為地赤質者亦以赤塗之使赤為地云不采者白布也者謂大夫士直云布侯者也云熊麋虎豹鹿豕皆正面畫其頭者知皆畫首者以其言貍首者射不來者之首明此獸侯等亦正面畫其頭也云象於正鵠之處耳者案梓人云參分其廣而鵠居一焉據大射之侯若賔射之侯則三分其侯正居一焉若燕射之侯則獸居一焉故云象其正鵠之處耳云君畫一臣畫二陽竒隂耦之數也者禮記郊特牲云君之南鄉答陽之義也臣之北面答君也是君陽臣隂又天一生水地二生火是一二隂陽之數故云君一臣二陽竒隂耦之數也云燕射射熊虎豹不忘上下相犯者三者皆猛獸不苟相下若君臣之道亦獻可者替否者不苟相從輒當犯顔而諌似獸等故用之云射麋鹿豕志在君臣相養也者案內則云麋鹿豕皆有軒並是可食之物故云相養也云其畫之皆毛物之者此無正文但畫五正三正之侯各以其色明畫獸侯亦以毛物畫之可知也凡畫者丹質注賔射至於赤釋曰云賔射之侯燕射之侯者此鄉射以采侯二正是賔射之侯也此獸侯也又是燕射之侯故鄭並言之云皆畫雲氣於側以為飾者鄭解經凡言畫者皆畫雲氣故以雲氣解之也蓋象雲色若賔射之侯天子九十步侯朱白蒼黃玄五正者還畫此五色雲氣於其側七十步侯朱白蒼三正者還畫此三色雲氣於其側五十步侯朱緑二正者還畫此二色雲氣於其側以為飾也云必先以丹采其地者欲畫此五色三色雲氣時必先用丹采此地乃於其上畫雲氣也天子侯九十步之內更有七十五十步侯畿內諸侯七十步侯內更有五十步侯畿外諸侯者之九十步侯之內更有七十五十步侯其畫之采皆如其數也以侯數非一尊卑又不同故云凡以廣之言凡畫雲氣以丹為質地者也云丹淺於赤者案月令云乘朱路駕赤駵載赤旗衣朱衣朱與赤互言之即為一物又案冬官鍾氏云以朱湛丹秫四入為朱色深而湛丹秫故知丹淺於赤鄭言此者欲見以丹為地丹上得見赤色雲之義故言此也射自至長武注自楹至二寸釋曰云自楹間者謂射於庠也知者以其言楹間則是庠則物當楣故知非射於序者也云楹間中央東西節也者以其楹間南北無限東楹西楹相當故知東西之節也云長如笴者謂從畫之長短也者其下有距隨為橫此言物長又是從迹之稱故知南北之長短也云笴矢幹也長三尺者以矢人職得知也云與跬相應者禮記祭義云故君子跬步而弗忘孝也一舉足謂之跬再舉足謂之步步射者履物不過一跬故知以三尺為限也云距隨者物橫畫也始前足至東頭為距後足來合而南面為隨者謂上射下射並足處皆然言長武武迹也中人之迹尺二寸謂橫尺二寸也序則至當楣注是制至曰庪釋曰云是制五架之屋也者庠序皆然但有室無室為異命負至其位釋曰其位者正據司馬自在已位遙命之遙命者由負侯者賤略之故也對司射比耦則就其位經無司馬命負侯之位故記之也旌各以其物注旌揔至於謝釋曰云旌揔名也者以周禮司常云九旗對文通帛為旜雜帛為物全羽為旞析羽為旌各别今名物為旌者散文通故云旌揔名也云雜帛為物大夫士之所建也者司常文通帛者通體並是絳帛周所尚赤也雜帛者中絳緣邊白也白殷之正色故鄭彼注云言先王正道佐職也云各者鄉射或於庠或於謝者諸侯鄉大夫是大夫詢衆庶射於庠射于謝于序是諸侯州長是士春秋習射于謝大夫士同建物而云各者雖同建物仞則大夫五仞士三仞不同故云各也無物至二尋注無物至為翿釋曰云無物者謂小國之州長也者案典命子男之卿再命大夫一命士不命大夫一命得建物士不命則無物是以不得與上各以其物同别為此旌云此翿旌也者據下文士鹿中翿旌也下云君國中射則皮樹中以翿旌獲此不命士與國君同者士卑不嫌命士以上尊卑自異也云翿亦所以進退衆者此非直用之於獲案喪大記君葬時執翿居前詔傾虧亦所以進退衆人也云七尺曰仞者無正文鄭案書傳云雉長三丈髙一丈則牆髙一丈禮記祭義云築宫仞有三尺牆髙一丈云仞有三尺除三尺之外只有七尺故知七尺曰仞也王肅則依小爾雅四尺曰仞孔君則八尺曰仞所見不同也云鴻鳥之長脰者也者脰則項也云八尺曰尋者亦無正文冬官云車有六等之數云殳長尋有四尺長丈二而云尋有四尺除四尺則尋長八尺矣凡挾至橫之注二指至挾之釋曰云二指謂左右手之第二指知左右手皆挾之者以云二指之間橫之則知左右手也云此以食指將指挾之者以左擘指拓弓右擘指鉤弦故知挾矢以第二第三指間第二指為食指左傳云子公之食指動是也第三指為將指左傳云吳王闔閭傷於將指是也故云食指將指之間挾之知不在無名指間者以無名指短與將指不相應故知不是也司射在司馬之北釋曰經不明言司射與司馬南北相當故明之也始射至行之釋曰始射獲而未釋獲據三耦射時云復釋獲者據第二畨射時復用樂行之據第三畨射時楅長至韋當注博廣至於當釋曰云蛇龍君子之類也者易云龍戰于野其血玄黃鄭注云聖人喻龍君子喻蛇是蛇龍揔為君子之類也云直心背之衣曰當者直通身之言其楅兩頭為龍首於背上通身著當言當心中央也知丹韋為之者周尚赤上云凡畫者丹質又周禮九旗之帛皆用絳故知此當亦以丹韋為之云司馬左右撫矢而乘之分委於當者若未分時揔在於當今則四四在一邊不謂分訖乃置於兩當也楅髤至當洗注髤赤黑􅃮也釋曰云南面坐而奠之者取向弟子持矢北面故南面奠之云南北當洗者恐南北不知逺近故記言南北當洗南北節也射者至撻之注過謂至教刑釋曰云是以輕之以撲撻於中庭而巳引書者謂尚書堯典之文彼據教學故彼注云不勤道業則撻之引之者於射時司射搢撲亦是教射法故引證撻犯禮之過者是以尚書亦云侯以明之撻以記之是也衆賔至不降注不以至為云言不勝者降不復升射也者據主皮射者也禮射二畨不勝仍待三畨復升射也尚書傳者濟南伏生為尚書作傳云巳祭取餘獲陳於澤然後卿大夫相與射也者此則周禮山虞田訖虞人植旗於中屬禽焉每禽擇取三十餘將向國以祭謂若大司馬云仲春祭社仲夏享礿仲秋祀方仲冬享蒸巳祭乃以餘獲陳於澤宫中卿大夫士共以主皮之禮射取之云雖不中雖中者據內田時也云非所於禮者云云揖讓取即是行禮而云非所於行禮者揖讓雖是禮對大射之等其體比於禮其節比於樂為非所行禮也云此主皮之射與者書傳不言主皮以義約同故云與以疑之也云天子大射巳下者案梓人云張皮侯而棲以鵠則春以功即此鄭云天子大射張皮侯一也梓人又云張五采之侯逺國屬即此鄭云賔射張五采之侯也梓人又云張獸侯以息燕即此鄭云燕射張獸侯也鄭言此者證此是禮射與主皮異也若然天子有澤宮又有射宫二處皆行射禮者澤宫之內有班餘獲射又有試弓習武之射若西郊學中射者行大射之禮張皮侯者是也澤宫中射將欲向射宫先向澤宫中試弓習武之射此習武之射無侯直射甲革椹質故司弓矢職云王弓弧弓以授射甲革椹質而注引圉人職曰射則充椹質是也主人至階上注就射至辭罰釋曰此謂主人在不勝之黨受罰爵之時也云就射爵而飲也者謂西楹西豐上射爵也云己無俊才不可以辭罰者以主人尊恐不受罰爵故言此也獲者至肺臑注臑若至餘體釋曰上賔主人巳用肩臂唯有臑及膞胳觳若脊脅骨多尊卑皆有自臑巳下各得其一今鄭具言之欲見科取其一不定以其若無大夫獲者得臑即經所云者故臑在肺下欲見無大夫已合得若大夫一人大夫得臑獲者得膞若大夫二人獲者即得胳若大夫三人獲者即得觳若大夫公卿更多則折之不得整體或更取餘體也故鄭又云折以大夫之餘體也東方謂之右個注侯以鄉堂為面也釋曰以其經直云左右個不辨東西故記人明之也釋獲至有祭注皆皆至祭肺釋曰云以言肺謂刌肺不離者即經中脊脅肺是切肺與祭肺同也云嫌無祭肺者此明記人之意見上巳有刌肺不離者即經中脊脅肺是刌肺與祭肺同嫌更不别有祭肺故言皆有祭肺言皆皆獲者欲見釋獲者與主獲者二者皆别有祭肺故云皆也若然上肺即舉肺案公食大夫有切肺與祭肺者優賔使賔祭此二者亦以舉肺為祭肺者略賤者之義是以有司徹侑羊俎切肺一侑豕俎亦切肺一鄭云豕又祭肺不嚌肺不備禮則是略賤之類也歌騶至無算注謂衆至終也釋曰上用騶虞以化民下用采蘋大夫之樂節亦可皆五終者大夫士皆五節一節一終故云五終也鄭言衆賔無數者謂堂下衆賔繼射者故無數若堂上衆賔則三人也注士入齒於鄉人釋曰以其士立于下故齒於鄉人也大夫後出注不干其賔主之禮釋曰賔主及衆賔出後乃出故云不干其賔主之禮主人至再拜注拜送至拜之釋曰上文大夫後出是大夫意不干賔主之禮此經主人意故鄭云拜送大夫尊之也知主人送賔還入門揖大夫乃出送拜之者以其上經云賔出主人送于門外再拜此記又云大夫後出主人送于門外再拜故知主人送賔還入門揖大夫乃出送再拜之也鄉侯上個五尋注上個至四丈釋曰以五尋尋八尺五八四十故四丈也中十尺注方者至中也釋曰云方者也者謂侯中正方十尺云用布五丈今官布幅廣二尺二寸旁削一寸者鄭意此言十尺用布五幅幅廣二尺二寸兩畔各削一寸為縫幅各二尺在故五幅為一丈也漢法幅二尺二寸亦古制存焉故舉以為況若然周禮鄭志純三只只八寸二尺四寸者據繒幅也士喪禮云亡則以緇長半幅注云半幅一尺終幅二尺亦謂繒而幅二尺者幅有二種喪禮略用其狹者故周禮鄭云凡為神之衣物必沽而小是也引梓人者彼揔據三侯侯中皆廣與崇方引之證經十尺是方也侯道至侯中注言侯至肱也釋曰云言侯中所取數也者謂侯中大小取數于侯道云量侯道以貍步者大射文故彼云以貍步張三侯是用步耳而云弓者六尺為步弓之下制六尺與步相應而云弓者侯之所取數冝於射器也故此經云弓也云正二寸者骹中之博也者案周禮弓人云骹解中有變焉謂弓弣把中側骨之處博二寸故於此處取數焉倍中以為躬注躬身至二丈釋曰身謂中上中下各接一幅布者故鄭云中之上下幅用布各二丈也倍躬以為左右舌注謂上至之舌釋曰言謂上個者對下個不得倍躬故謂上個也云兩旁謂之個在躬之兩傍則謂之個云左右出謂之舌謂躬外兩相各出一丈若人舒舌故下云下舌半上舌據出者而言也注半者至六丈釋曰半者半其出於躬者也者以其言舌故知半其出者也云用布三丈者上舌兩相各一丈今下舌兩相各五尺通躬二丈故云用布三丈也云侯人之形類也者人形上廣下狹故也云五八四十據上個四丈五六三十據下個三丈以此上下為衰差也云凡鄉侯用布十六丈數起侯道五十弓以計者用布十六丈者中五幅幅一丈用布五丈上下躬各二丈揔四丈上個四丈下個三丈是揔十六丈也云道七十弓之侯用布二十五丈二尺者道七十弓弓取二寸二七十四侯中丈四尺七幅幅有丈四尺中用布九丈八尺上下躬各用布二丈八尺上下揔用布五丈六尺上個倍躬為五丈六尺下舌半上舌上舌出者兩相各出丈四尺下舌半之兩相各出七尺下舌用布一丈四尺通躬二丈八尺揔計用布四丈二尺也通計用布二十五丈二尺云道九十弓之侯用布三十六丈者弓取二寸九十弓侯中丈八尺侯中用布九幅幅别丈八尺中用布十六丈二尺倍中以為躬上下躬各用布三丈六尺上下揔七丈二尺倍躬以為左右舌上舌用布亦七丈二尺下舌亦半上舌上舌出者丈八尺下舌半之則下舌揔用布五丈四尺以此計之揔用布三十六丈也箭籌八十注箭篠至從賔釋曰云箭篠也者謂以箭為籌射之耦隨賔多少今言八十舉成數以十耦為文但一者數之始十者數之終以十耦為成數也長尺有握握素注握本至一膚釋曰云長尺復云有握則握在一尺之外則此籌尺四寸矣云刋本一膚者公羊傳僖三十一年云觸石而出膚寸而合不崇朝而遍雨乎天下者唯泰山爾何休云側手為膚又投壷云室中五扶注云鋪四指曰扶一指案寸皆謂布四指一指一寸四指則四寸引之者證握膚為一謂刋四寸也以翿旌獲注國中至無以釋曰知城中是燕射者以其下有賔射大射不在國故國中是燕射以其燕在寢故也云以翿旌獲尚文德也者以其燕主歡心故旌從不命之士亦取尚文德之義必知取尚文德者以其以文德者舞文舞羽舞也以武德者舞武舞干舞也此既用羽知取尚文德也於郊至旌獲注於郊至為旌釋曰知於郊謂大射也者案大射云公入驁從外來入此既言於郊故知大射在郊也云大射於大學者據諸侯而言也天子大射在虞庠小學以其天子大學在國中小學在郊諸侯不得立大學在國立大學在郊故鄭引王制小學在公宫之左大學在郊是殷法諸侯用焉故引為證必知諸侯立大學在郊者見詩魯頌有泮宫禮記云故魯人將有事於上帝必先有事於類宫鄭云頖宫郊之學也則詩泮宫此郊學是也云閭獸名如驢一角或曰如驢歧蹄周書曰北唐以閭者歧蹄巳上山海經文周書見於國語也於竟則虎中龍旜注於竟至為旜釋曰與鄰國君射則賔射也以其君有送賔之事因送則射云尚文章也者亦若翿旌也云通帛為􅎶司常文鄭注云凡九旗之帛皆用絳則通帛者正幅為絳長尋曰旐繫旐曰斾通體皆用絳帛為之名旜大夫至物獲注兕獸名似牛一角釋曰下有士則此專據大夫為文而云各以其物者公侯伯大夫再命子男之大夫一命為卿大夫刃數雖同旒依命數不同故云各又下云士翿旌以獲唯小國之州長不命者則公侯之州長一命有旌亦入物中則各內兼之矣故云各兕似牛一角案爾雅及山海經知之唯君至餘否注臣不至餘否釋曰天子諸侯皆燕射在國又天子賔射在朝亦在國大夫士燕射賔射不在國大夫又得行大射雖無郊學亦不得在國是以孔子為鄉射射於矍相之圃是其一隅若然此鄉射亦不在國射亦冝在國外故記人於此見之也君在至肉袒注不袒至於君釋曰上云大夫與士射袒纁襦今與君射為厭與士同故肉袒也儀禮疏卷第十三
