body:
  text: 唐朝散大夫行太學博士引文館學士臣賈公彥等撰嗣舉至稽首注嗣主至諸侯釋曰自此盡出復位論嗣子飲奠酌獻之事云嗣主人將為後者不言適而言將為後者欲見無長適立庶子及同宗為後皆是故泛言將為後也云舉猶飲也者非謂訓舉為飲直是嗣子舉而飲之耳云將傳重纍之者謂將使為嗣牽纍崇敬承重祭祀之事是以使飲之而獻也云大夫之嗣子不舉奠辟諸侯者案文王世子云其登餕獻受爵則以上嗣注云上嗣君之適長子以特牲饋食禮言之受爵謂上嗣舉奠也獻謂舉奠洗爵酌入也餕謂宗人遣舉奠盥祝命之餕也大夫之嗣無此禮辟君也今案少牢無嗣子舉奠之事故此注云辟諸侯士卑不嫌得與人君同故有嗣子舉奠之事也奠者即上文祝酌奠奠於鉶南是也郊特牲云舉斝角詔妥尸鄭注云始入舉奠斝若奠角將祭之祝則詔主人拜安之使之坐尸即至尊之坐或時不自安則以拜安之天子奠斝諸侯奠角彼鄭注意亦引此特牲祝酌奠于鉶南也尸執至拜焉注食肝至為復釋曰直言受肝明有􅐭是以下記云嗣舉奠佐食設豆􅐭是也云食肝受尊者賜不敢餘也者食之當盡以其食若不盡直云嚌之而巳此經云食肝明不敢餘也舉奠至復位注啐之至西階釋曰云啐之者答其欲酢已也者鄉飲酒鄉射主人獻賔賔皆啐酒洗爵即酢主人此嗣子獻賔賔啐之亦欲酢己故啐之其實無酢也云嗣齒於子姓者姓之言生子之所生謂孫行者今嗣亦孫之流故齒之也云凡非主人升降自西階者案曲禮云為人子者升降不由阼階是以雖嗣子亦冝升降自西階適子孫不升阼階故於此揔言凡也兄弟至賔儀注弟子後生釋曰自此盡乃羞論弟子舉觶將行旅酬之事云如主人酬賔儀者謂如上文主人酬賔就其階同北面並拜乃飲卒爵拜洗酌乃西面賔北面拜位故言如此亦然弟子洗觶酌於東方之尊阼階前東面獻長兄弟長兄弟北面拜受弟于奠于薦南長兄弟坐取觶還西面拜弟子北面答拜長兄弟奠於薦北揖復位若有司徹云兄弟之後生者舉觶於其長長在左弟子自飲訖升酌降長拜受於其位舉爵者東面答拜鄭注云拜受答拜不北面者儐尸禮殺此不儐尸則拜送皆北面可知也弟子後生者此即有司徹云兄弟之後生者是也注脀俎至可知釋曰云告祭脀者謂告衆賔之等知無長賔者以其初得獻時即祭肺於階上此獻時乃設薦俎于其位故此無長賔也上又下長兄弟如賔儀則亦獻時祭可知故知宗人所告告衆賔衆兄弟內賔也云獻時設薦俎於其位者得獻時乃薦于堂下及房內之位云至此禮又殺告之祭使成禮也者案上文加爵致爵不及佐食無從殺也此告之祭使成禮是再殺故云又殺也云其祭皆離肺者巳於記文解之也云不言祭豆可知者以衆賔言薦俎從設言薦即豆也故云不言祭豆可知乃羞注羞庶至內羞釋曰知羞非薦羞者上文受獻時皆設薦俎於其位故知此羞乃是庶羞非薦也云下尸胾醢豆而巳者上為尸佐食羞庶羞四豆設於左鄭注四豆膮炙胾醢此祝以下薦羞降于尸當去膮炙故云胾醢豆而巳云此所羞者自祝主人至於內賔者言自祝下及內賔及衆賔兄弟皆在可知又下記云公有司獻次衆賔私臣獻次兄弟則內賔亦及之是以少牢下篇云乃羞庶羞于賔兄弟內賔及私人不儐尸亦云乃羞于賔兄弟內賔及私人辨是也若然少牢與有司徹儐尸與不儐尸庶羞與房中羞皆與尸佐食及祝主人主婦皆同時羞之者彼上下大夫禮尊故得與尸同時羞此士禮卑故不得與尸同也云內羞者以其尸尊尚無內羞況祝卑故無內羞也賔坐至在右注薦南奠觶釋曰自此盡實觶于篚論行旅酬之間作止爵之事但此特牲之禮堂下行旅酬無算爵並有室中者不與旅酬之事上大夫儐尸與旅酬不與無算爵之事故別使二人舉觶於尸侑尸侑得舉為旅酬遍及堂下尸與旅酬者以其儐尸在堂禮殺故也若下大夫不儐尸者堂下無旅酬直行無算爵於堂下而巳尸則不與之所以下大夫無旅酬直有無算爵者以其禮尸於室中辟國君堂下不設尊故無旅酬直行無算爵而巳以其堂上與神靈共尊不得與尸行旅酬故屈之此特牲堂下得旅酬無算爵並行者以其堂下與神靈别尊故為加爵禮尸於室中酌上尊堂下旅酬行神惠酌下尊故上大夫及士之祭禮旅酬行無算爵或行或不皆參差不等也賔酬長兄弟長兄弟在右下文長兄弟酬衆賔長自左受旅如初是賔主相酬主人常在東其同在賔中則受酬者在左若鄉飲酒賔酬主人主人立於賔東主人酬介介立於主人之西其衆賔受介酬者自介右鄭注云尊介使不失故位衆受酬者受自左異其義也賔主相酬各守其位不以尊卑變同類之中受者于左尊右也注其尊至北面釋曰以其旅酬無算爵以飲者酌已尊酬人之時酌彼尊是各自其酒故無算爵賔弟子及兄弟弟子舉觶於其長各酌于其尊也云此受酬者拜亦北面者以經長兄弟拜受觶不言面位故鄭云受酌者拜亦北面言亦者亦賔北面也為加至之儀注於旅至並作釋曰前衆賔之長為加爵如初爵止今還使為加爵者作止爵也故云如長兄弟之儀云於旅酬之閒言作止爵明禮殺並作者此決上文賔三獻爵止鄭注云三獻禮成欲神惠之均于室中是以奠而待之故有室中主人主婦致爵訖乃三獻作止爵此衆賔長為加爵如初爵止鄭注云尸爵止者欲神惠之均于在庭而堂下庭中行旅酬未訖為加爵者作止爵故鄭注云禮殺並作也注長兄至文省釋曰云長兄弟酬賔亦坐取其奠觶者亦謂亦上賔坐取薦南奠觶此長兄弟所舉奠觶者即上弟子舉觶於其長是也云明其相報禮終於此其文省者以其賔舉奠觶於長兄弟行旅酬盡皆遍長兄弟舉觶於賔行旅酬亦皆遍故云相報禮終言明者嫌其不終所以嫌者嫌其不終所以嫌者賔之酬不言卒受者此不言交錯以辨嫌其不卒不辨其實賔之酬亦卒受者實觶于篚此亦交錯以辨故鄭云文省賔弟至薦右注奠觶至薦右釋曰自此盡爵無算論二觶並行無算爵之事云奠觶進奠之於薦右非神惠也者案上尊兩壷于阼階東加勺南柄西方亦如之鄭注云為酬賔及兄弟行神惠至此云非神惠者彼三獻止爵欲得神惠均于室中衆賔長為加爵止爵者欲神惠均于在庭故止爵行旅酬雖以尸而奠爵待之亦得為神惠至此別為無算爵在下自相勸故得為非神惠故奠於薦右同於生人飲酒舉者奠於薦右也長皆至其位注復其至北面釋曰云復其位者東西面位者上既言皆復位答拜此復重云復位則上文復位復在庭初舉北面位此重言復位者當復東西面位可知云凡堂下拜亦皆北面者前主人酬賔弟子舉於其長行旅酬及無算爵兄弟弟子賔弟子舉觶皆北面則知凡堂下雖不見面位者皆北面拜可知云凡賔以下至於私人拜受送皆北面故云凡也利洗至于篚注利佐至殺也釋曰自此盡西序下論佐食獻尸祭祀畢之事云利佐食也言利以今進酒也者利與佐食乃有二名者以上文設俎啓會爾敦之時以黍稷為食故名佐食今進以酒酒所以供養故名利利即養也故鄭云以今進酒也若然少牢名佐食上利執羊俎下利執豕俎者大夫禮文故即兩見其名云更言獻者以利待尸禮將終冝一進酒嫌於加酒亦當三也者此決兄弟長及衆賔長為加爵於尸不言獻今進酒更言獻不言加爵故鄭君解其義意以利事尸禮將終冝一進酒不似長兄弟助宗子祭祀為加爵衆賔之長助主人祭祀設為加爵嫌此佐食同彼二者為加爵故變言獻是以鄭云嫌亦當三也亦者亦上主人獻主婦獻賔長為三獻也長兄弟為加爵衆賔長為加爵通洗散獻尸亦三都井尸飲六士祭事尸禮畢也云不致爵禮又殺也者上文云長兄弟洗觚為加爵如初儀不及佐食洗致如初無從注云不及佐食無從殺也此又不致故云又殺也祝東面告利成注利猶至之嫌釋曰少牢云主人出立于阼階上南面祝出立于西階上東面祝告曰利成此户外告利成彼階上告利成以尊者稍逺於尸若天子諸侯禮畢於堂下告利成故詩楚茨云禮儀既備鍾鼓既戒孝孫徂位工祝致告鄭注云鍾鼓既戒戒諸在廟中者以祭禮畢孝孫往位堂下西面位也祝於是致孝孫之意告尸以利成是尊者告利成逺於尸也云不言禮畢於尸閒之嫌者閒閒暇無事若然禮畢則於尸閒暇無事有發遣尸之嫌故直言利成而巳也尸謖至人降注謖起至備矣釋曰引少牢者證大夫禮生人立位與士不同又證前尸出廟之事云前尸之儀士虞禮備矣者彼有室中出户降階出廟前尸之事故云備矣注俎所至歸之釋曰引少牢者是少牢下篇有司徹下大夫不賔尸之禮彼云佐食徹尸俎佐食乃出尸俎于廟門外有司受歸之此士禮不儐尸與下大夫同故引以相證也徹庶至序下注為將至于房釋曰知非神饌而云為尸者以其尸三飯後始薦庶羞故徹之乃餕也凡餕者尸餕鬼神之餘祭者餕尸之餘義取鬼神之惠遍廟中庶羞非鬼神惠故不用也引尚書傳巳下者是彼康誥傳文大宗巳侍於賔奠者或有作𧃊或有作暮者皆誤以奠為正也引之者證徹庶羞不入于房而設於西序下以擬燕故也必知祭有燕者案楚茨詩云鼓鍾送尸下云備言燕私鄭注云祭祀畢歸賔客之俎同姓則留與之燕所以尊賔客親骨肉也其上大夫當日儐尸安有燕故有司徹上大夫云主人退注云反於寢也是無燕私若下大夫不儐尸與此士禮同亦當有燕也云與者以經直言設于序下不言燕疑之引書傳為證有燕故言與以疑之也云然則自尸祝以下知義如此者以兄弟受獻於堂上主婦內賔受獻於房中尸出之後堂房無事故知燕時男子在堂婦人在房可也筵對至簋鉶注為將至政矣釋曰自此盡戶外西面論嗣子共長兄弟對餕之事云敦有虞氏之器者禮記明堂位云有虞氏之兩敦上文黍稷之敦是周制士用之云言簋容同姓之士得從周制耳者大夫異姓既用異代之器故少牢特牲皆用敦則同姓之士當同周制用簋故經言分簋是以文王世子鄭注亦云同姓之士緦衰異姓之士疑衰亦同姓與異姓別也引祭統者證餕是鬼神之惠遍廟中若國君之惠遍境內是可以觀政之事也注命告至作餕釋曰此決下篇少牢二佐食及二賔長餕明惠大及異姓不止族親而巳注以讀至席南釋曰云以讀如何其久也必有以也之以者此辭在詩邶風旄丘篇必有以從之者以此經云有以也者以先祖有功德子孫當嗣之而廟食先祖有德亦合享此祭故讀從之也是以彼注亦云我君何以久留於二佐必以衛有功德故也云其坐𧃊其餘亦當以之也者亦謂亦似其先祖巳上皆為以為似者誤也云少牢饋食禮不戒者非親昵也者謂二佐食與二賔長是非親昵也引舊說者以經直言主人西面拜不見其處故引舊說以明下𧃊席南面注食乃祭鉶禮殺釋曰前正祭之時尸祭鉶嘗之告㫖訖佐食爾黍於席上尸始食今餕食乃祭鉶故決之云禮殺故也注少牢至𧃊爵釋曰引少牢者欲見此禮主人亦受於戶內以授次𧃊引舊說以此經云酳下𧃊主人面位無文當北面也注主人至化之釋曰云讀如諸侯以禮相與之與者案禮運云諸侯以禮相與者諸侯會同聘問一德以尊天子言此者戒嗣子與長兄弟及衆兄弟相教化相與以尊先祖之德也注既授至就坐釋曰以其主人位在戶內下餕席南西面故知上餕授爵於戶內乃就坐祝命至序下注命命至燕也釋曰自此盡畢出論徹薦俎改設饌於西北隅為陽厭之事云祝命徹阼俎者是佐食徹之當徹阼俎之時堂下賔兄弟俎畢出故下文云佐食徹阼俎堂下俎畢出是也者然祝命徹阼俎時堂下俎畢出又退在下者欲見先徹室內俎乃徹堂下是以祝命佐食徹阼俎及豆籩又祝自執俎以出又宗婦徹祝豆籩入於房即佐食改饌西北隅是以作經并說室內行事乃到本云上佐食徹阼俎時堂下俎畢出也云命命佐食者此命命使徹阼俎下文云佐食徹俎故知祝命者命佐食也云宗婦不徹豆籩徹禮略各有為而巳者以豆籩宗婦贊設之佐食設俎理應佐食還自徹俎宗婦徹豆籩以徹禮略各自有為而巳故宗婦豆籩今佐食并徹之故云徹禮略也各有為而巳者謂宗婦徹祝俎豆籩佐食徹阼俎豆籩是各自有為何必依前所設之時也注俟告至以出釋曰案有司徹下大夫不儐尸改饌于西北隅訖主人出立于阼階上西面祝執其俎以出立于西階上東面司宫闔牖戶祝告利成乃執俎以出于廟門外有司受歸之彼不儐尸之禮亦與此特牲禮同故引為證也宗婦至薦俎注宗婦至于房釋曰宗婦不徹主人豆籩而徹祝豆籩入房者為主婦將用之為燕祝兩豆籩而主婦用之者祝接神尸之類主婦燕姑姊妹及宗女冝行神惠故主人以薦羞井及祝庶羞燕宗人於堂主婦以祝籩豆用之燕內賔於房是其事也云宗婦既並徹徹其卑者以宗婦不徹主人籩豆而徹祝與主婦是徹其卑者故得並徹引士虞禮者以經自有入房之文注更引士虞禮者有嫌也嫌者以主婦薦俎先在房嫌經入房又為徹注厞隱至厭也釋曰云不知神之所在或諸逺人乎禮記郊特牲之文彼論正祭與繹祭之事此為陽厭引之者欲見孝子求神非一處故前為隂厭後為陽厭之事也引少牢者見彼大夫禮陽厭南面此士禮東面雖面位不同當室之白則同案曽子問庶殤為陽厭之事故彼云凡殤與無後者祭於宗子之家當室之白尊於東房是謂陽厭鄭注云當室之白謂西北隅得戶之明者也凡言厭者謂無尸直厭飫神故鄭云則尸未入之前為隂厭矣謂祭于奧中不得戶明故名隂厭對尸謖之後改饌於西北隅為陽厭以向戶明故為陽厭也引曽子問云殤不備祭何謂隂厭陽厭者彼上文孔子云有隂厭有陽厭謂宗子有隂厭無陽厭凡殤有陽厭無隂厭曽子言謂殤死隂厭陽厭並有故問孔子孔子引宗子一有隂厭凡殤一有陽厭引之證成人隂厭陽厭並有之義也注拜送至答拜釋曰云凡去者不答拜者云凡揔解諸文主人拜送賔皆不答拜鄭注鄉飲酒云禮有終是也若賔更答拜是更崇新敬禮故不答也注記俎至賔者釋曰云唯賔俎有司徹歸尸侑之俎不賔尸歸尸俎皆不見歸賔俎鄭所以知歸賔俎者正見賔出主人送於門外再拜明賔不目徹俎主人使歸之若助君祭必自徹其俎鄭注曲禮大夫以下或使人歸之是以孔子丗家云魯郊不致燔俎于大夫孔子不恱冕而行士大夫家尊賔則使歸之自餘亦自徹而去也記特牲至緇韠注於祭至玄端釋曰此退玄冠在朝服下者欲令近緇色士冠在朝服上從而正也云皆者謂賔及兄弟筮日筮尸視濯亦玄端者見上經云筮日主人冠玄端子姓兄弟如主人之服有司羣執事如兄弟服筮尸云如求日之儀至於視濯又不見異服故知皆玄端至祭日夙興云主人服如初初即玄端明其餘不如初是朝服可知是以此注云皆者謂賔及兄弟也云朝服者諸侯之臣與其君日視朝之服大夫以祭者案玉藻云諸侯朝服以日視朝下少牢云主人朝服是也緇韠者下大夫之臣者士冠禮云主人玄冠朝服緇帶素韠韠與裳同色此朝服緇韠大夫之臣朝服素韠此緇韠故云下大夫之臣云夙興主人服如初則固玄端引上經者直言皆朝服恐主人亦在其中故引證主人服玄端與兄弟異也注與主至下士釋曰周禮士之齊服有玄端素端司服文引之者欲見士之齊服有一玄端而裳則異故鄭云然則玄裳以下見玄端一而裳有三也彼注云素端者亦謂札荒有所禱請服之於此經無所當而連引之耳若然士冠亦有玄端三等裳而引司服者以此特牲祭祀時彼據齊時四命已上齊祭異冠大夫齊祭同冠故就此祭祀引齊時冠服為證也注順從至五升釋曰云二爵者為賔獻爵止主婦當致也者以一爵獻尸尸奠之未舉又一爵主婦當致者案經主婦致爵於主人婦人不見就堂下洗當於內洗則主婦致爵於主人時不取堂下爵而云主婦當致者謂主婦當受致之時用此爵也云四觶一酌奠其三長兄弟酬賔卒受者與賔弟子兄弟弟子舉觶於其長禮殺事相接者酌奠于鉶南是嗣子雖飲還復神之奠觶也餘有三在主人洗一觶酬賔奠於薦北賔舉奠於薦南此未舉也下篚有二觶在又長兄弟洗觚為加爵衆賔長爨之事也注賔從至去之釋曰云士之助祭終其事也者謂送尸為終其事既送尸為終其事則更無儐尸之禮若上大夫有儐尸者尸出賔不送以其事終於儐尸故也注尸俎至神俎釋曰云亦得十一之名合少牢之體數者謂少牢正體之數十一若牢並骨并數則十七鄭云此所謂放而不致者致至也所謂禮器彼鄭注云謂若諸侯自山龍以下皆有放象諸侯山龍以下至日月星辰卿大夫又不山龍此士併骨二數乃得十一除此唯九而巳亦是放而不至也云凡俎實之數竒者有九有七有五是竒數以其鼎俎竒故實數亦竒而相稱也二脊無中脅無前貶於尊者不貶正脊不奪正也者以少牢大夫禮三脊脅具有此但有二體貶於大夫大夫即尊者也等貶牲體不貶正脊者不奪其正長脅亦不貶者義與正脊同云正脊二骨長脅二骨者將舉於尸尸食未飽不欲空神俎者此脊與脅二骨本為饌厭飫所設也又次尸既舉脊脅而猶有脊脅在既不空神俎義得兩施離肺一注離猶至舉肺釋曰云亦不提心者言亦謂亦少儀云牛羊之肺離而不提心鄭注云提猶絶也㨒離之不絶中央少許者是也注魚水至等也釋曰云魚水物以頭枚數者對三牲與臘以體數也云取數於月十有五日而盈者案禮運云月三五而盈三五而闕文出於彼也云此所謂經而等者亦所謂禮器彼鄭注云謂若天子以下至士庶人為父母三年是也引之者謂魚數亦尊卑同也注不但至骨者釋曰云不但言體以有一骨二骨者若但言體體有九有十一則不兼二骨者若言牲骨則一骨二骨兼在其中故直言如牲骨也祝俎至二骨注凡接至三體釋曰云祝俎直云脅二骨謂代脅也知者以尸俎無脡脊祝則有之尸俎無代脅祝俎有代脅可知云凡接於神及尸者俎不過牲三體以特牲約加其可併者二亦得竒名者言凡者凡祝佐食賔長長兄弟宗人之等是也接神者謂祝與佐食佐食尸未入為神設俎卻㑹祝酌奠於鉶南故曰接神也接尸者賔為三獻長兄弟為加爵尸盥宗人授巾皆是與尸相接也知皆三體者下佐食俎觳折脊脅也賔骼長兄弟及宗人折其餘如佐食俎故知皆三體也衆賔之長亦有加爵接於尸亦應三體下文但言兄弟及宗人而衆賔長亦在焉可知故下文直云衆賔及衆兄弟皆殽脀注云不備三者賤也則衆賔長為加爵不在賤限以特牲約加其可併者二骨者是尊祝也佐食也巳下卑無加故下注云三體卑者從正是也云少牢饋食禮羊豕各三體者以少牢二牲故祝俎無加者直三體引之以證此特牲約三體之外加其併骨也若然俎實其數二牲各三體共六體不竒者通臘髀為七則亦竒數也以其臘既兩髀屬于尻不殊故為一體也膚一至短脅注主人至體臂釋曰云臂左體臂者以其尸用右不云折明全升主人又云臂明左臂可知脅骨多不嫌得與尸同用右體猶脊然也注觳後至作穀釋曰云觳後足者案既夕記云明衣裳長及觳鄭注云觳足跗也是觳後足也云分後右足以為佐食俎者經不云後右足鄭知者以少牢主婦用左臑此士妻辟之不用左臑用後右足不用後左足左足大卑故知用後右足故知用後右足故鄭云辟大夫妻也佐食至脊脅注三體卑者從正釋曰直云脊脅不定體名欲見得便用之少牢佐食俎設于兩階之閒其俎折一膚鄭注云折者擇取牢正體餘骨折分用之有脀而無薦亦逺下尸是無定體也注骼左至略之釋曰知骼是左骼者以其尸用右骼故知賔所用骼是左骼可知也云長兄弟及宗人折不言所分略之者此決上文主婦俎觳折佐食俎亦名觳折此不言所分故知略之也注又略至除者釋曰云又略者上文長兄弟及宗人直言折不言所折骨體巳是略此又不言折而言殽脀是又略也言此所折骨值有餘體即破之可也云祭禮接神者貴者謂長兄弟及宗人巳上俎皆三皆有嚌肺以接神及尸貴故三體不止接神尸神象所接尸者亦貴可知自衆賔以下折體而巳不接尸神賤無獻故也宗人雖不獻執巾以授尸亦名接尸也引祭統者見貴賤皆有骨示均之義云己所辟除者則府史之等不命於君者也注獻在至與旅釋曰公有司獻在衆賔後私臣獻在兄弟後故云獻在後者賤也云祭祀有上事者貴之者謂衆賔兄弟次賔之卑得獻衆賔擇取公有司可執事者謂前舉鼎已載羞從獻衆賔擇取公有司酬爵之屬如此者門外在有司羣執事中入門列在東面為衆賔餘者在門西位也兄弟雖無上事亦皆在西面位族親故也私臣獻在兄弟後者職賤公有司在衆賔後不執事賤於執事者故曰有上事者貴之宗人獻與旅齒於衆賔則公有司為之佐食於旅齒於兄弟則私臣之中擇為賔使為佐食也是以前文佐食北面立于中庭注云佐食賔佐尸食者是也案前賔得獻薦脯醢設折俎注云公有司設之及獻兄弟薦脀注云私人為之與二者皆使執事云非執事者以受獻者不得自設俎暫使二者設之非本執事之人然則公有司私臣薦俎皆使徒隸為之與云皆與旅者上宗人獻旅云齒於衆賔佐食旅齒於兄弟是但言獻次不言旅以宗人佐食約之與旅者亦此二人也若天子諸侯祭祀其位無文此公有司在門西北面東上私臣在門東北面西上天子諸侯祭祀可依此位矣同姓無爵者在阼階前西面北上卿西階前東面北上大夫在門東北面士門西北面旅食在其後少牢下篇云衆賔位在門東北面既獻在西階西南衆賔繼上賔而南天子諸侯之賔其位或依此與案祭統云凡賜爵昭為一穆為一昭與昭齒穆與穆齒凡羣有司皆以齒此之謂長幼有序此不見昭穆位者主人衆兄弟非昭穆乎故彼注昭穆猶特牲少牢饋食之禮主人之衆兄弟也羣有司猶衆賔下及執事者君賜之爵謂若酬之是也若其有爵者則以爵序之何故然也案文王丗子其在外朝則以官其在宗廟之中則如外朝之位宗人授事以爵以官是不以姓其獻之亦以官故祭統云尸飲五君洗玉爵獻卿尸飲七以瑶爵獻大夫尸飲九以散爵獻士及羣有司皆以齒明尊卑之等是也其酬蓋因此位而昭穆得獻蓋依少牢下篇主人洗升酌獻兄弟阼階上注云兄弟長幼立飲賤不别大夫之賔尊於兄弟又曰辨受爵其位在洗東西面北上升受爵其薦脀設于其位注云先著其位於上乃後云薦脀設於其位明位初在是也此中皆無爵者以此二者差之知無爵者從昭穆有爵者則以官矣鄉釋執事者貴即衆賔無事者公有司私臣注祭統云羣有司猶衆賔下及執事者似衆賔不執事言下及殊卑者指謂公有司私臣是亦得名為執事言衆賔据尊言謂之不執事者或衆賔中容有不執事者也儀禮疏卷第四十六
