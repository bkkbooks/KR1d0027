  text: 儀禮疏卷第四十三
  hash: sha256:a22aef87cadbf2a1e68280a8d846125c452d60a92492d96de8428f96f0fb023c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_037-1a}
body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彥等撰尸謖祝前鄉尸注前道至之節釋曰此記尸謖之時祝前尸之儀也云必先鄉之為之節者言必先面鄉尸者為之節度也還出至鄉尸注過主至之敬釋曰過主人則西階上不言及階明主人見尸有踧踖之敬者以其經出戶降階及門皆指物而言主人者欲見階上不言西階而言主人者欲見主人見尸有踧踖之敬故沒去階名而云主人也降階至出戶注及至至在此釋曰言還至門明其間無節也者以經自階已前皆不言及從階到門言及者以其自階到門其中道逺故特言及以殊之是以鄭云言還至門明其間無節謂無還鄉尸之節也云降階如升時將出門如出戶時皆還鄉尸也經直云及門如出戶雖不言降階如升時以將出門如出戶明降階如升時故鄭約出門以明降階也云皆還鄉尸者欲見經還者皆還鄉尸也謂鄉尸乃前道也云每將還必有辟退之容者辟退即逡巡謙讓之容貌也云凡前尸之禮儀在此者以儀禮一部所云前尸之禮儀在此經為具悉者尸出至詔降釋曰尸出祝反入門左北面復位者謂祝既送尸出反入門復位復上文祝入門左北面位故云復位也云然後宗人詔降者謂祝復位宗人乃詔告主人降以其無事故也尸服卒者之上服注上服至衣耳釋曰上經直見主人服不見尸服故記人明之云上服對深衣在下玄端者案特牲經筮日云主人冠玄端至祭日夙興主人服如初是士之正祭服玄端即是卒者生時所著之祭服故尸還服之云不以爵辨服為上者祭於君之服非所以自配鬼神者案曽子問孔子曰尸辨冕而出卿大夫士皆下之注云為君尸或辨者先祖或有為大夫士者彼君之先祖為士尸服爵辨不服玄端者子孫為諸侯先祖尸在中故先祖為士者尸還服助祭於君之服也云士之妻則宵衣耳者以其經直云尸不辨男女士虞既男女別尸明經云尸可以兼男女故鄭并云士之妻也案特牲正祭主婦著纚笄宵衣明女尸亦宵衣可知男男至賤者注異姓至適也釋曰虞卒哭之祭男女別尸故男女別言之也云異姓婦也者以男無異姓之禮故也知經云必使異姓者據與婦為尸者也不使同姓與婦為尸者尸須得孫列者孫與祖為尸孫婦還與夫之祖姑為尸故不得使同姓女為尸也云賤者謂庶孫之妾也尸配尊者必使適也者男尸先使適孫無適孫乃使庶孫女尸先使適孫妻無適孫妻使適孫妾又無妾乃使庶孫妻即不得使庶孫妾以庶孫之妾是賤之極者若然庶孫妻亦容用之而鄭云必使適也者據經不使賤有適孫妻則先用適而言其實容用庶孫妻法也必知無容用庶孫者以曽子問孔子曰祭成喪者必有尸尸必以孫孫幼使人抱之無孫則取於同姓可也彼不言適是容無適而用庶此經男女別尸據虞祭而言至卒哭巳後自禫巳前喪中之祭皆男女別尸知者案司几筵云每敦一几鄭注云雖合葬及同時在殯皆異几體實不同祭於廟同几精氣合少牢吉祭云某妃配是男女共尸篇末云是月也吉祭猶未配注云是月是禫月也當四時之祭月則祭猶未以某妃配某氏哀未忘也則引少牢吉祭妃配之事為證明禫月不當四時祭月則不云某妃配配則共尸可知無尸至如初注無尸至升降釋曰自此盡詔降如初論喪祭無尸之事云無尸謂無孫列可使者知謂無孫列者禮記云無孫則取同姓之適則大夫士祭先取孫無孫取同姓之適是有孫列可使復無同姓之適是無孫列可使者也云殤亦是也者禮記曽子問云祭成喪者必有尸明殤死無尸可知曽子問又云宗子直有隂厭庶殤直有陽厭是無尸也云禮謂衣服即位升降者雖無尸主人亦如葬所服即位於西序及升降與有尸相似既饗祭于苴釋曰云既饗者正謂祝釋饗神辭告之使令祔之安之釋饗訖佐食取黍稷祭于苴祝祝卒注記異者之節釋曰云記異者謂記無尸者異於有尸何者有尸祝釋孝子辭釋辭訖為祝祝卒別有迎尸巳後之事今無尸者祝祝卒饗神訖無迎尸巳後之事故下文云不綏祭之等是記異者之節也不綏至從獻注不綏至為墮釋曰此四事皆為尸是以上文有尸者云迎尸而入祝命佐食綏祭又泰羮湆自門入設于鉶南胾四豆設于左又尸食之後主人獻之後賔長以肝從主婦亞獻賔長以燔從賔長獻後亦如之無尸闕此四事自羮巳下三事皆蒙無字解之也云不綏言獻記終始也者以見經無尸具陳四事凡祭禮以獻為終舉終以見始亦得為義今不但言獻記其終始具言四事者欲明始於綏祭終於從獻故鄭即云事尸之禮始于綏祭終於從獻者故具言之云綏當為墮者周禮守祧職云既祭藏其墮字為正取減為義主人哭出復位注於祝祝卒釋曰謂祝祝卒無尸可迎既無上四事主人遂即哭出復戶外東面位也祝闔至門西注門西北面位也釋曰鄭此及下注皆云復位者門西北面位者據上文尸出祝反入門左北面復位也男女拾踊三注拾更也三更踊釋曰凡言更踊者主人踊主婦踊賔乃踊三者三為拾也如食間注隱之至須也釋曰隱之者謂闔牖戶也九飯之頃時節也祝升至啓戶注聲者至為開釋曰云聲者噫歆也者若曲禮云將上堂聲必揚故云將啓戶警覺神也主人入注親之釋曰云親之者啓牖鄉是親之事主人無事而入者是主人親至神所恭敬之事也注牖先至在左釋曰云牖先闔後啓扇在內也者見上文闔牖戶闔時牖先言此經上云主人入祝從乃言啓牖是戶先開乃啓牖故須解之扇在內也云鄉牖一名也者案詩云塞鄉墐戶注云鄉北出牖也與此注不同者語異義同北牖名鄉鄉亦是牖故云牖一名也云如初者主人入祝從入在左者鄭以經如初之文在牖鄉之下恐人以為啓牖鄉如初上既無啓牖鄉之事明據主人與祝位如初也主人哭出復位注堂上位也釋曰案下文云宗人詔降如初注云詔主人降之乃降堂明此復位者復堂上東面位也注祝復至褻也釋曰鄭知祝與佐食位如此者見上經云主人即位于堂衆主人及兄弟賔即位于西方佐食即賔也故知佐食言復位復西方可知知祝復位復門西北面位者上經祝入門左北面注不與執事同位接神尊也明此祝復位復門西北面位可知云不復設西北隅者重閉牖戶褻也者上經有尸者有隂厭有陽厭無闔牖戶之事今無尸者隂厭時闔牖戶今更設饌於西北隅復更闔牖戶為褻瀆故不為也宗人詔降如初注初贊至降之釋曰此降謂禮畢降堂也上經云贊闔牖戶主人降賔出注云宗人詔主人降彼謂降堂故鄭知此云如初亦如上經詔降也始虞用柔日注葬之至其靜釋曰自此下盡哀薦成事論初虞二虞三虞卒哭明三者之祭饗神辭及用日不同之事云葬之日日中者上文云日中行事是也葬用丁亥是柔日葬始虞用日中故云始虞用柔日也注敢昧至剛鬣釋曰敢昧冒之辭者凡言敢者皆是以卑觸尊不自明之意故云昧冒之辭云豕曰剛鬣者下曲禮文香合注黍也至薦上釋曰案下曲禮云黍曰香合粱曰香萁稷曰明粢是也云大夫士於黍稷之號合言普淖而巳此言香合蓋記者誤耳者曲禮所云黍稷別號者是人君法特牲少牢黍稷合言普淖此別號黍為香合下特號稷為普淖故知記誤也云辭次黍又不得在薦上者依設薦法先設菹醢次設俎後設黍稷今黍在嘉薦之上此亦記者之誤故鄭非之也若然俎在後今潔牲在黍上者祭以牲為主故先言非設時在前也嘉薦普淖注嘉薦至號云釋曰言故以為號云者鄭以意解之無正文故言云以疑之明齊溲酒注明齊至為醙釋曰云言以新水溲釀此酒也者鄭以溲水邊為之與縮字義異謂以新水漬麴乃溲釀此酒又引郊特牲明水涗齊貴新也者彼注云涗猶清也五齊濁泲之使清謂之涗齊及取明水皆貴新也據彼注明水則周禮司烜氏所取月中之水與此明齊新水別鄭引之者彼此雖異引之直取新義是同故引為證非謂為一物也言或曰當為明視謂兔臘也者士祭有兔臘是故或有人作如此説云今文曰明粢粢稷也皆非其次者若以明齊當為明視作兔臘解者應在上與牲為次何因退在下今文又為稷解者上巳云普淖兼黍稷何用又見稷也故知二者皆非其次也若然特牲少牢無臘號以小物略之哀薦祫事注始虞至古事釋曰始虞謂之祫事者主欲其祫先祖也者案公羊傳文二年云大祫者何合祭也合先君之主於大廟故此鄭亦以祫為合而言但三虞卒哭後乃有祔祭始合先祖始虞而巳言祫者鄭云以與先祖合為安故下文云適爾皇祖某甫是始虞預言祫之意也注丁日至言耳釋曰己日再虞者以其後虞用剛日初虞再虞皆用柔日始虞用丁日隔戊日故知再虞用己日云祝辭異者一言耳者一言或有一句為一言若論語云一言以蔽之曰思無邪是也今此一言則一字為一言謂數一虞云祫再虞云虞三虞云成是也三虞至成事注當祔至為它釋曰鄭云當祔於祖廟為神安於此者却解初虞再虞稱祫稱虞之意今三虞改用剛日將祔於祖取其動義故也云士則庚日三虞壬日卒哭者以其已日為再虞後改用剛日故次取庚日為三虞也卒哭亦用剛日故庚後降辛日取壬日為卒哭云祝辭異者亦一言耳者改虞為成是一言也云他謂不及時而葬者謂有故及家貧不及三月因三日殯日即葬於國北引喪服小記者彼鄭注云報讀為赴疾之赴謂不待三月因殯日虞所以安神以送形而往迎魂而反而須安之故疾虞三月而後卒哭者謂卒去無時之哭鄭云卒哭待哀殺故至三月待尋常葬後乃為卒哭祭云然則虞卒哭之間有祭事者亦用剛日者以虞卒哭巳是剛日他祭在後故亦用剛日也云其祭無名謂之他者謂虞卒哭祔祥皆有名此則無名故謂之他云文不在卒哭上者此他祭在卒哭上今退在卒哭下者以其非常又非祭故也引檀弓者證卒哭辭稱成事之義但卒哭為吉祭者喪中自相對若據二十八月後吉祭而言禫祭已前揔為喪祭也若然此經云三虞與卒哭哀薦成事明文而鄭注檀弓云卒哭而祭其辭蓋曰哀薦成事言蓋疑之者以鄭君以前有人解云三虞與卒哭同為一事解之者鄭故疑卒哭之辭而云蓋也是以雜記云上大夫之虞也少牢卒哭成事祔皆大牢鄭注云卒哭成事祔言皆則卒哭成事祔與虞異矣是微破前人三虞與卒哭同解者也獻畢未徹乃餞注卒哭至為踐釋曰自此盡不脫帶論卒哭之祭未徹餞尸於寢門外之事鄭云卒哭之祭者案上文直云獻畢未徹乃餞不言卒哭鄭知是卒哭之祭者以其三虞無餞尸之事明旦祔於祖入廟乃有餞尸之禮故鄭據卒哭而言若然三虞不餞尸者以其三虞與卒哭同在寢祔則在廟以明旦當入廟以其易處鄉尊所故特有餞送尸之禮也引詩者彼生人餞行人之禮為行始此祭祀餞尸之禮亦鄉祖廟為行始事雖異餞送飲酒是同故引為證也知旦將始祔於皇祖者下云明日以其班祔鄭云卒哭之明日也是明日之旦也注少南至廡也釋曰云少南將有事於北者正謂下文云尸出門右南面巳下是也云有玄酒即吉也者以其虞祭用醴酒無玄酒至卒哭云如初則與虞祭同今至餞尸用玄酒酒則尋常祭祀之酒非醴酒故云即吉也云此在西尚凶也者以其吉祭祭尊在房戶之間至於虞祭尊在室是凶今卒哭餞尸尊在門西不在門東是尚凶故變於吉也注乾肉至為蹙釋曰云涼州烏翅者經云乾肉折俎則漢時乾脯似之故鄭以今曉古也尸出至席從注祝入至事也釋曰云祝入亦告利成入前尸尸乃出者雖餞行飲酒尸將起之時祝亦如虞祭告云利成尸乃興以前尸也知几席素几葦席也者上經初虞云素几葦席在西序至及再虞三虞及卒哭皆如初不見更設几席之文明同初虞用素几葦席今卒哭祭未餞尸於門外明是卒哭之几席故知是素几葦席也尸出門右南面注俟設席也釋曰知俟設席者尸在門右南面在坐北立下即云席設之事明俟設席也注婦人出者重餞尸釋曰婦人有事自堂及房而巳今出寢門之外故云重餞尸也尸即至在南注朐至於吉釋曰云主人拜送者案上祭云主人其拜特牲亦云拜送則拜時吉凶同也云屈者在南變於吉者案曲禮云以脯修置者左朐右未鄭云屈中曰朐則吉時屈者在左今尸東面而云朐在南則是凶禮屈者在右末頭在左故云變於吉也注反之至有終釋曰鄭知反之反於佐食者經云佐食授嚌尸受振祭嚌嚌訖而云反之明反與佐食佐食乃反於俎可知也云尸奠爵禮有終者上經云三獻尸皆有酢今餞尸三獻皆不酢而奠之是為禮有終謂若主人拜送賔不答拜亦是禮有終也注男女至作休釋曰鄭知男女從尸男由左女由右者約上文男子在南婦人在北南為左北為右因從此位便故知男子由左婦人由右也云從尸不出大門者由廟門外無事尸之禮也者在廟以廟為限在寢門外以大門為限正祭在廟廟門外無事尸之禮今餞尸在寢門外則大門外無事尸之禮故鄭舉正祭況之從尸不出大門外取正祭比之故注云由廟門外無事尸之禮也尸出門哭者上注以餞至廟門釋曰鄭意所以尸出大門哭者便止者正以餞於寢門以大門為限似事尸在廟門為限故鄭云大門猶廟門也賔出至稽顙注送賔至門外釋曰上從尸不出大門者有事尸限故不出大門送之送賔於大門外自是常禮故云送賔拜于大門外但禮有終賔無答拜之禮也主婦亦拜賔注女賔至掖門釋曰上主人送男賔故知此主婦拜女賔也云不言出拜送之於闈門之內者決上文男主拜男賔言出送此明主婦送女賔于門之內以其婦人送迎不出門見兄弟不踰閾故也云闈門如今東西掖門者案爾雅釋宫云宫中之門謂之闈則闈門在宫內漢時宫中掖門在東西若人左右掖故舉以為況也丈夫至門外注既卒至為稅釋曰云既卒哭當變麻受之以葛也者喪服鄭注云大夫以上虞而受服士卒哭而受服士亦約此文而言也云夕日則服葛者為祔期者今日為卒哭祭明旦為祔前日之夕為祔祭之期變麻服葛是變重從輕明旦亦得變不要夕期之時變之夕時言變麻服葛者鄭云為祔期是因祔期即變之使賔知變節故也入徹主人不與注入徹至為豫釋曰鄭知入徹是大功以下者見曽子問云士祭不足則取於兄弟大功以下者經云入徹主人不與明取大功小功緦麻之等入徹也云言主人不與則知丈夫婦人在其中者上文直言丈夫説絰不辨親疏下文婦人脫首絰不辨齊斬婦人此云入徹據大功以下則此文入徹主人不與之中丈夫婦人兼有可知以其平常祭時諸宰君婦廢徹不遲則凶祭丈夫婦人亦在但齊斬不與徹耳婦人至説帶注不脫至葛帶釋曰知齊斬婦人帶不變也者案喪服小記云齊衰帶惡笄以終喪鄭云有除無變舉齊衰則斬衰帶不變可知齊斬帶不變則大功巳下變可知云婦人少變者以其男子既葬首絰腰帶俱變男子陽多變婦人既葬直變首絰不變帶故云少變也云而重帶帶下體之上也者對男子陽重首在上體婦人隂重腰腰是下體以重下體故帶不變也云大功小功者葛帶者案大功章云布衰裳牡麻絰纓布帶三月受以小功衰即葛九月者又案小功章云布衰裳澡麻帶絰五月者二者章內皆男女俱陳明大功小功婦人皆葛帶可知云時亦不説者未可以輕文變於主婦之質者變是文不變是質不可以大功以下輕服之文變主婦重服之質故經直見主婦不見大功以下也云至祔葛帶以即位者此鄭解大功以下雖夕時未變麻服葛至祔日亦當葛帶即位也知大功以下夕時未變麻服葛者以其與主婦同在廟門外主婦不變大功以下亦不變若然夕時不變夕後入室可以變故至祔旦以葛帶即位也引檀弓者亦證齊衰婦人不葛帶之事無尸至踊三注以餞至為筵釋曰自此至賔出論卒哭祭無尸可餞之事云几席設如初者雖無尸送神不異故云如初故鄭云餞尸者本為送神也云丈夫婦人亦從几席而出者以其云出几席設如初即云拾踊三明在門外有尸行禮之處即知丈夫婦人從几席出可知言亦者亦餞尸之時也死三至卒哭注謂士至或殊釋曰自此盡他辭一也論記人所記其義或殊是以更有此文也云遂卒哭不言三虞者是記人略言之注云謂士也者以其此篇是士虞故知三日三月據士而説引雜記者見大夫巳上與士異者以其王制大夫士同有三日而殯三月而葬之文雜記云大夫亦同三月而葬卒哭則士云三月大夫五月卒哭之月不同者曲禮云生與來日死與往日鄭云與猶數也生數來日謂成服杖以死來日數也死數往日謂殯斂以死日數也大夫以上皆以來日數若然士云三日殯三月葬皆通死日死月數大夫以上殯葬皆除死日死月數是以士之卒哭得葬之三月內大夫三月葬除死月通死月則四月大夫有五虞卒哭在五月諸侯巳上以義可知云此記更從死起異人之間其義或殊者上巳論虞卒哭此記更從始死記之明非上記人是異人之間其辭或殊更見記之事其實義亦不異前記也將旦而祔則薦注薦謂卒哭之祭釋曰謂卒哭之祭日將旦而祔則薦薦謂卒哭之祭云祔則薦者記人見卒哭之祭為祔而設故連文云將旦而祔則為此卒哭而祭也卒辭至尚饗注卒辭至為齊釋曰云卒辭卒哭之祝辭者謂迎尸之前祝釋孝子辭云爾云不稱饌明主為告祔也者但卒哭之祭實有牲饌而不稱者以其卒哭祭主為告神將祔於祖而設牲饌故不言也女子至某氏注女孫祔於祖母釋曰此女子謂女未嫁而死或出而歸或未廟見而死歸葬女氏之家既葬祔于祖母也注不言至某氏釋曰此對上文孫祔于祖而云祔于爾皇祖某甫此則不曰爾而變曰孫婦婦差疏故不云爾也若然上女子亦不云爾者文承孫下云爾可知直言其皇祖妣異者耳其他辭一也注來日至尚饗釋曰他辭一者正謂來日某隮祔尚饗女子及孫婦皆有此辭故云其他辭一也其祔女子云來日某隮祔爾于爾皇祖妣某氏尚饗其孫婦云來日某隮祔孫婦於皇祖姑某氏尚饗饗辭至之饗注饗辭至孝子釋曰饗辭勸強神之辭也者案特牲禮迎尸入室尸即席坐主人拜妥尸尸答拜執奠祝饗鄭云勸強之也其辭引此士虞記則冝云孝孫某圭為孝薦之饗當此時為之凡吉祭饗尸曰孝子者此一辭説三虞卒哭勸尸辭若祔及練祥吉祭其辭亦用此但改哀為孝耳故鄭云凡以該之也明日以其班祔注卒哭至為胖釋曰引喪服小記者彼解中猶間也一以上祖又祖孫祔祖為正若無祖則祔于髙祖以其祔必以昭穆孫與祖昭穆同故間新死者於廟故用卣也若然唯祔祭與練祭祭在廟祭訖主反於寢其大祥與禫祭其主自然在寢祭之案下文禫月逢四時吉祭之月即得在廟祭但未配而巳又玄鳥詩鄭注云君喪三年既畢歸於其廟而後祫祭于大祖明年春禘于羣廟若如此言則三年喪畢更有特禘者鄭意除練時特禘三年喪畢更有此特禘之禮也沐浴櫛搔翦注彌自至為鬋釋曰云彌自飾也者上文虞沐浴不櫛注云自潔清不櫛未在於飾鄭雖不言不在於飾沐浴少飾今祔時櫛是彌自飾也用專至脰膉注專猶至嗌也釋曰云折俎謂主婦以下俎者鄭知折俎是主婦以下俎者特牲記云主婦俎觳折佐食俎觳折少牢云主婦俎臑折是也其他如饋食注如特至明矣釋曰云如特牲饋食之事者知不如士虞饋食禮者虞不致爵則夫婦無俎矣上文有俎則祔時夫婦致爵以祔時變麻服葛其辭稱孝夫婦致爵與特牲同故云如特牲饋食之事也或云以左胖虞右胖祔者當鄭君時有人解者云虞祭與祔祭共用一牲各用一胖以左胖為虞祭右胖為祔祭不是故鄭破之云今此經云如饋食謂如特牲饋食之禮尸俎用右胖解之主人俎左臂左胖之臂以為虞祭主人豈得復取虞時左胖之臂而用之乎明不然矣用嗣尸注虞祔至筮尸釋曰言用嗣尸則從虞以至祔祭唯用一尸而巳云虞祔尚質未暇筮尸者以其哀未殺故云尚質未暇筮尸若然練祥則筮尸矣故喪服小記云練筮日筮尸大祥筮尸可知是以鄭上文注云餞尸旦將始祔于皇祖是用一尸也注稱孝者吉祭釋曰對虞時稱哀案檀弓虞為喪祭卒哭為吉祭卒哭既為吉祭祔在卒哭後亦是吉祭故鄭以吉祭言之也用尹祭注尹祭至誤矣釋曰鄭知尹祭是脯者下曲禮云脯曰尹祭故知也但曲禮所云是天子諸侯禮用脯號案特牲少牢無云用脯者故云大夫士祭無云脯者唯上餞尸有脯此非餞尸今不言牲號而云尹祭亦記者誤也以其上文初虞云敢用潔牲剛鬣今不言牲號而云尹祭是記人誤云亦者亦上文香合也注普薦至為醙釋曰知普薦是鉶羮者案上文虞禮及特牲皆云祝酌奠于鉶南則鉶在酒前而設此亦普薦在酒上故知也但虞禮一鉶此云饋食則與特牲同二鉶故云普薦也云不稱牲記其異者對與初虞之等稱牲但記其異雖不説牲之號有號可知也若然云記其異者所以嘉薦普淖普薦溲酒與前不異記之以其普薦與前異將言設薦在普淖後溲酒前故并言其次耳適爾至尚饗注欲其至之乎釋曰云欲其祔合兩告之者欲使死者祔於皇祖又使皇祖與死者合食故須兩告之是以告死者曰適爾皇祖某甫謂皇祖曰隮祔爾孫某甫二者俱饗是其兩告也引曽子問者案彼鄭注象有凶事者聚也云卒哭成事而後主各反其廟者至祔須得祖之木主以孫祔祭故也天子諸侯有木主可言聚與反廟之事大夫無木主聚而反之故云無主則反廟之禮未聞云以其幣告之乎者曽子問云無遷主將行以幣帛為主命此大夫士或用幣以依神而告使聚之無正文故云乎以疑之期而小祥注小祥至作基釋曰自祔以後至十三月小祥故云期而小祥引檀弓者彼謂顔回之喪饋祥肉於孔子而言彼云饋此云歸者饋即歸也故變文言之引之者證小祥是祭故有肉也曰薦此常事注祝辭之異者謂小祥辭與虞祔之辭有異異者以虞祔之祭非常一期天氣變易孝子思之而祭是其常事故祝辭異也云期而祭禮也者喪服小記文案彼云期而祭禮也期而除喪道也祭不為除喪也注云此謂練祭也禮正月存親親亡至今而期期則冝祭期天道一變哀惻之情益衰衰則冝除不相為也是以謂小祥祭為常事也又期至祥事注又復也釋曰此謂二十五月大祥祭故云復期也變言祥事亦是常事也中月而禫注中猶至為導釋曰知與大祥間一月二十七月禫徙月樂二十八月復平常正作樂也云禫之言淡淡然平安意也者禫月得無所不佩又於禫月將鄉吉祭又得樂懸故云平安意也但至後月乃是即吉之正也是月至未配注是月至尚饗釋曰謂是禫月禫祭仍在寢此月當四時吉祭之月則于廟行四時之祭於羣廟而猶未得以某妃配哀未忘若喪中然也言猶者如祥祭以前不以妃配也案禮記云吉事先近日喪事先逺日則大祥之祭仍從喪事先用逺日下旬為之故檀弓云孔子既祥五日彈琴而不成聲十日而成笙歌注踰月且異旬也祥亦凶事先逺日案此禫言淡然平安得行四時之祭則可從吉事先近日用上旬為之若然二十七月上旬行禫祭於寢當祭月即從四時祭於廟亦用上旬為之引少牢禮者證禫月吉祭未配後月吉如少牢配可知也儀禮疏卷第四十三
