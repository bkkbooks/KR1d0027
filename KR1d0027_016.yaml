  text: 儀禮疏卷第十六
  hash: sha256:06d486e30917ce924a0e05395f4ed8fd68083492c5613eb9c0fe68fc48f0bf7c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_016-1a}
body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彥等撰大射第七鄭目録云名曰大射者諸侯將有祭祀之事與其群臣射以觀其禮數中者得與於祭不數中者不得與於祭射義於五禮屬嘉禮大戴此第十三小戴及別録皆第七釋曰云諸侯將有祭祀之事以下文出於射義大射至戒射注將有至尊者釋曰自此盡西紘論射前預戒諸官及張侯設樂懸之事不言禮言儀者以射禮盛威儀多故以儀言之是以射義云孔子曰射者何以射何以聽循聲而發發不失正鵠者其唯賢者乎若夫不肖之人則彼將安能以中是其射容難故稱儀也云將有祭祀之事當射者按射義云天子將祭必先習射於澤澤者所以擇士也巳射於澤而后射於射宫射中者得與於祭不中者不得與於祭是其將祭必射也云宰告於君君乃命之者鄭意不云宰戒百官者宰先告君君之使戒乃戒即云戒百官是也云言君有命政教宜由尊者其經云戒射此戒亦政教之類故以政教言之也宰戒至射者注宰於至百官釋曰按周禮大宰職云掌百官之誓戒此言宰戒百官其事同故鄭以天子冢宰言之也其實諸侯兼官無冢宰立地官司徒以兼之故聘禮云宰命司馬注云宰上卿二君事者也諸侯謂司徒為宰是諸侯立司徒兼冢宰之事也言大事則掌以君命戒於百官者周禮大宰職云作大事則戒于百官贊王命是鄭之所引以證宰戒之事也射人至贊者注射人至射者釋曰上文宰官尊揔戒此射人司士色別重戒之謂若天官冢宰戒百官宗伯大司寇之等重戒也云射人掌以射法治射儀者夏官射人文云司士掌國中之士治凡其戒令者此司士職文云國中之士彼士揔公卿大夫士而言此射人巳戒公卿大夫則司士戒士贊者唯有士不兼大夫巳上不同者斷章取義故與本職不同也云皆司馬之屬也者射人司士皆屬司馬故云司馬屬也此上下文所云戒者皆謂祭前旬有一日知者祭統云先期旬有一日宫宰宿夫人夫人亦散齊七日致齊三日若然卜及戒皆在旬有一日是大宰云前期十日帥執事而卜日遂戒注云前期前所諏之日也十日容散齊七日致齊三日其天子又有天地及山川社稷宗廟諸侯直有境內山川社稷宗廟卜日及戒皆同也按郊特牲云卜郊受命于祖廟作龜于禰宫卜之日王立于澤親聽誓命又云獻命庫門之內戒百官也大廟之命戒百姓也注云王自澤宫而還以誓命重相申勑也王自此還齊路寢之室若然卜日在澤宫又至射宮皆同在旬有一日空十日故後日乃齊也前射至視滌注宰夫至射宫釋曰此宰夫戒是再戒之宿不云宿者辟下宿視滌何者宰夫戒是申戒下宿是夕宿是以宗伯云凡祀大神享大鬼祭大示帥執事而卜日宿視滌濯注云宿申戒也此前有射人戒是七日前期此宰夫戒是申戒又知宿是夕宿者以戒宿同文明不同日以其上云前射三日戒明此非三日是前一日矣云宰夫冢宰之屬者按大宰云小宰中大夫二人宰夫下大夫四人屬冢宰故云冢宰之屬云掌百官之徵令者宰夫職文云司馬於天子政官之卿者小宰職云四曰司馬其屬六十掌邦政是也云凡大射則合其六耦者大司馬職云若大射合諸侯之六耦是將祭而射故使諸侯為耦若其餘射則卿大夫以下為耦也云滌謂溉器掃除者以其諸侯射先行燕禮不視滌器明滌器是射器及掃除射宫也司馬至北十注量人至不射釋曰云量人司馬天子卿大夫用麋侯諸侯卿大夫亦用麋侯並據已家用之若助祭亦射君之第二侯明君之第二侯用麋飾其側侯以飾得名又畿內諸侯第二侯用豹為鵠故知畿外諸侯亦以豹皮為鵠可知云干讀為犴犴侯者犴鵠犴飾也者亦取捷黠意大夫將祭於己射麋侯者司裘云卿大夫共麋侯是天子卿大夫以孝經云大夫有爭臣三人以有臣故將祭得大射擇士鄭言此者以己射用麋侯又見助君祭亦射君之麋侯云士無臣祭不射者孝經云士有爭友不言臣以僕隸為友司裘卿大夫下不言士故祭不言士大射若然士有賔射燕射不得大射雖不得大射得與君賔射故射人注不言士者此與諸侯之賔射士不與也若然諸侯之士亦然也遂命至用革注巾車至志焉釋曰上文直命量人量侯道及乏逺近之處此經論張侯髙下之法也云設乏西十北十者鄉射云乏參侯道居侯黨之一西五步注云此乏去侯北十丈西三丈云西十北十則西與北皆六丈不得為三分居侯黨之一者以其三侯入堂深故也若然此三侯之下揔云西十北十則三侯之乏皆西十北十矣西亦六丈者以三侯恐矢揚傷人與一侯亦異也云巾車半寸者即三分寸一也言大半寸者即三分寸二也故知糝侯下綱去地一丈五寸少半寸也大侯中文八尺中之上下各四尺即八尺矣中方文八尺更加八尺二丈六尺也糝侯去地丈五寸少半寸本上綱下綱相去二丈二尺其舉也上綱去地三丈二尺五寸少半寸也大侯鵠下畔與糝侯上綱齊所謂見鵠於糝也侯中丈八尺三分之則鵠下亦有六尺下躬身四尺一丈矣則大侯自鵠以下掩糝侯一丈也自一丈以下猶有二丈二尺五寸少半寸在是大侯下綱去地亦然故注依此數也云前射二日張侯設乏知三日者前文云前射三日下云樂人宿縣下云厥明自前射三日以後論事不著異日故知張侯與設乏同是射前三日矣樂人至南陳注笙猶至為節釋曰云東為陽中萬物以生者陽氣起於子盛於午故東方為陽中也萬物以生以其正月三陽生大蔟用事故萬物生焉云春秋傳者是外傳伶州鳩對周景王辭引之者證鍾磬為笙之事大蔟者寅上候氣之管度律均鍾金即鍾也故奏之所以贊陽出滯云姑洗所以修潔百物考神納賔者亦據度律均鍾姑洗在辰三月百物修潔而出考神納賔謂祭祀而有助祭之磬而巳或於階閒或於東方又天子宫縣四面皆有諸侯軒縣闕南面面皆有鍾磬鑮及鼓具有也卿大夫士皆無鑮者若有鑮則諸侯臣半天子臣不得具是以闕之云鑮如鍾而大者特牲注亦云鑮如鍾而大並據國語而注之以言鑮形如鍾而復大以大故特一縣不編之也云奏樂以鼓鑮為節者按周禮鑮師云掌金奏之鼓注云謂主擊晉鼓以奏其鍾鑮也以此言之則先擊鼓後擊鍾鑮皆是與樂為節故鄭注以鼓鑮為節不言鍾磬巳注解故不言也建鼓至南鼓注建猶至君也釋曰下西面北面建鼓皆言一此建鼓不言一者彼在本方故須言一見無他鼓此鼓本東方以為君故移來在北方故異其文不言一也云建猶樹也以木貫而載之樹之跗也者按明堂位云殷楹鼓周縣鼓注云楹為之柱貫中上出也縣縣之於簨虡也此云以木貫而載之則為之柱貫中上出一也周人縣鼓今言建鼓則殷法也若醮用酒之類主於射略於樂故用先代鼓云鼓不在東縣南為君者決下一建鼓在其南東鼓者為賔復不在東縣北者取順君面故也西階至其北注言成至為庸釋曰言春秋傳者亦是外傳文云詠歌九則者謂六府三事九功之德是也以此九則平民使無差慝云無射所以宣布哲人之令德者哲人謂后稷后稷以稼穡之功成於季秋先王之業以農為本故云示民軌義謂軌法義理也云先擊西鼙樂為賔所由來也者解先擊朔􅎏之意賔向外來位在西其樂主為樂賔故先擊朔鼙應鼙應之也云鍾不言頌􅎏不言東鼓義同省文也者決上東方言笙鍾應􅎏言南鼓此當言頌鍾東鼓義與上文同亦合有而不言者省文也云古文頌為庸者此雖疊古文不從亦通義是尚書云笙庸以閒笙東方鍾磬西方是庸亦功也亦有成功之義也一建至南面注言面至軒縣釋曰云言面者國君於其群臣備三面爾者言國君合有三面為辟射位又與群臣射闕北面無鍾磬鎛直有一建鼓而巳故不言南鼓而言南面也云其為諸侯則軒縣者若與諸侯饗燕之類則依諸侯軒縣三面皆有鼓與鍾磬鎛簜在建鼓之閒注簜竹至於堂釋曰按禹貢云篠簜既敷注云簜竹故知此簜亦竹也其器則管也是以下云乃管新宫注云管謂吹簜故知竹管也按小師職注云管如􅐟而小併兩而吹之今大豫樂官有焉爾雅云大笙謂之巢小者謂之和簫大者二十三管長尺四寸小者十六管長尺二寸大笙十九簧小者十三簧若然笙簫與管器異以其皆用竹故云笙簫之屬也云倚於堂者管擬吹之不倚在兩建鼓閒者以不得倚于鼓故知倚於堂也鼗倚至西紘注鼗如至將之釋曰知鼗如鼓而小者按那詩云猗與那與置我鼗鼓傳云猗歎辭那多也鄭讀置為植植鼗鼓者為楹貫而樹之美湯受命伐桀定天下而作護樂故歎之多其改夏之制乃始植我殷家之樂鼗與鼓也鼗雖不植貫而搖之亦植之類以其殷人植鼓以木貫之而下有拊鼗亦以木為柄而貫之但手執而不植為異故云亦植之類鼗與鼓同文是鼗如鼓而小也知有柄賔至搖之以奏樂者按視瞭職云掌凡樂事播鼗擊頌磬笙磬磬言擊鼗言播播為搖之可知鼗所以節樂賔至乃樂作故至賔至搖之以奏樂也云紘編磬繩也者紘若天子諸侯冕而朱紘用組之類磬又編縣之用紘故知紘編磬繩也知設鼗於磬西倚於紘者以其鍾磬皆靣向東人居其前西靣故知鼗在磬西倚之於紘也引王制者證鼗以節樂之器柷狀如漆筒中有椎所以節樂鼗亦節樂柷大於鼗故賜公侯樂則以柷將命賜伯子男樂則以鼗將命自餘樂器陳於外也厥明至在北注膳尊至作晉釋曰自此盡羮定論豫設尊洗具饌之事按禮記燕義諸侯射先行燕禮此以下至東陳皆陳設器物與燕禮同但文有詳略耳云說者以為若井鹿盧者鹿盧之形即葬下棺碑閒重鹿盧之輩今見井上豎柱夾之以索繞而挽之是也云其為字從豆􅞱聲者此謂上聲下形之字年和穀豆多有故從豆為形也豐者承尊之器象形也是以豐年之字􅞱下著豆今諸經皆以承尊爵之􅞱不用本字之􅞱而用豐年之豐故鄭還依豐字解之故云其為字從豆為形以􅞱為聲也云近似豆大而卑矣者既用豆為形還近似籩豆之豆舉漢法而知但豆口徑尺柄亦長尺口徑小而又髙此承尊之物口足徑各冝差寬中央亦大共髙尺比常豆而下故云近自豆而卑但斫一大木為之取其安穩此豐若在宗廟或兩君燕亦謂之坫致爵在於上故論語云邦君為兩君之好有反坫鄭注云反坫反爵之坫是也必用豐年之豐為坫者以其時和年豐萬物成孰粢盛豐備以共郊廟神歆其祀祝嘏其福至鄉飲酒鄉射燕禮大射或君與臣下及四方之賔燕家冨民足人情優暇旨酒嘉肴盈尊滿俎於以講道論政既獻酬侑酢至無算爵行禮交樂和上下相歡勸飲為樂故也云錫細布也者喪服記曰錫者十五升抽其半無事其縷有事其布曰錫故知錫是細布也謂之錫者治其布使之滑易也云唯君面尊者玉藻文注云面嚮也彼謂人君燕臣子專其恩惠此大射亦謂人君燕臣下與彼是同專惠之道故皆尊鼻嚮君云言專惠者決鄉飲酒尊于房户之閒賔主夾之不得專惠故也尊士至圜壷注旅衆至玄酒釋曰前設縣時鑮南更有一建鼓今設尊不應在鼓北而云鑮南者其實在鼓南門西北面與燕禮同而云鑮南者遙繼鑮而言必繼鑮者樂以縣為主故也又尊至獻酒注為隸至東面釋曰知為隸僕人巾車糝侯犴侯之獲者以其此人皆有功又下文以此尊獻之故知也知沙酒濁者以五齊從下向上差之醍沈清於泛醴鬯鬱又在五齊之上故知沙酒濁也云特泲之必摩沙者也者此解名沙酒之意云郊特牲曰汁獻涗于盞酒者此以五齊中取盞酒盎齊泲鬱鬯之事獻沙也洓鬱鬯之時和盎齊以手摩沙出其香汁涗清也泲之使清也此為隸僕以下卑賤之人而獻鬱鬯者此所得獻皆因祭侯謂侯之神故用鬱鬯也云服不之尊俟時而陳於南統於侯皆東面知此不為大侯服不設者按下文云服不之尊東面南上故鄭云俟時而陳於南統於侯皆東面也設洗至西面注或言至文也釋曰云異其文也者洗篚言南陳亦西面膳篚言西面亦南陳其實所從言異尊君故也又設至東陳注亦統至其南釋曰云亦統於侯也者前設尊兩獻酒亦云服不之尊俟時而陳於南統於侯今此設篚在南後設服不之洗在南亦統於侯小臣至東上注唯賔至公矣釋曰知賔及公席布之其餘樹之於位後者下文更有孤卿大夫席文故知也此實未布而言布之者欲辨尊卑故先言也孤尊而後言之者言若是有無不定故後言也云小卿命於其君者也者按王制云大國三卿皆命於天子次國三卿二卿命於天子一卿命於其君小國亦三卿一卿命於天子二卿命於其君若言小卿據次國巳下有之云射禮辨貴賤也者決燕禮大小卿皆在尊東西無小卿位彼主於燕不辨貴賤故也云與君論道亦不典職如公矣者成王周官云立大師大傅大保兹惟三公論道經邦燮理隂陽是三公論道無職此大國立孤一人論道與公同亦無職故云不典職如公也縱鄭不見周官於周禮三公亦無職考工記云或坐而論道亦通及三公矣官饌釋曰燕禮宰饌此不言宰而言官者欲見非獨宰故鄭云百官各饌射人至西上注大史至大命釋曰自此盡少進論群臣立位之事云大史在干侯東北士旅食者在士南為有侯入庭深也者決燕禮士旅食者立于門西東上此不繼門而在士南繼士者為有侯故入庭深也云小臣師正之佐也者下有小臣正正長也故以師為佐云正相君出入君之大命者小臣正小臣中尊如天子大僕故引大僕職解之也注詔告至衍耳釋曰燕禮言爾以其近門去君逺而言爾爾近也移也揖之使移近此入庭深故不言爾而言揖揖之而巳不須移近之也云上言大夫誤衍者以其大夫與公卿面有異故下別言大夫少進明上有大夫誤衍大夫大夫四字也大射正擯注大射正射人之長釋曰自此盡門外北面論請立賔之事大射正對射人為長若小臣正對小臣師亦為長公揖至膳者注請士至無幂釋曰自此盡公卿者論卿大夫定位及請執幂之事云請士可使者鄭知請士者據燕禮而知云方圜壷獻無幂者方圜壷臣尊獻獲者尊皆無幂乃命至東上注命者至略之釋曰知命之在西階前者以其小臣位在東堂下於阼階請公命乃就西階請執幂者以其執幂者士位在西故也云羞膳者從而東者巳於燕禮釋訖云不升堂者但不由南方升略之升自北堂是亦升堂矣膳宰至卿者釋曰不言命者對君言命於臣略之擯者至賔辟注及至至當盛釋曰自此盡賔答再拜論主人迎賔拜至及獻賔之事云公降一等揖賔不言請賔至位就席者亦是以賔與主人為禮禮不參故不請也此言賔辟燕禮不言文略也奏肆夏注肆夏至肆夏釋曰云肆夏樂章名今亡者按周禮鍾師云以鍾鼓奏九夏杜子春引吕叔玉以為肆夏時邁也繁遏執傹也渠思文也後鄭云以文王鹿鳴言之則九夏皆詩篇名頌之族類也此歌之大者載在樂章樂崩亦從而亡是以頌不能具鄭彼注破吕叔玉此注亦云肆夏樂章名今亡與彼注亦同今此又引吕叔玉於下者以無正文叔玉或為一義故鄭於此兩解之也云祭山川之樂歌者以其時邁序云巡守告祭柴望也謂巡守祭當方山川則王制及尚書云望秩於山川是也云明昭有周者美武王有明明於周云式序在位者式用也任賢用能序之使在官位云我求懿德者懿美也我求取美德之人也云肆于時夏肆遂也夏大也能如此遂於王道之大云奏此以延賔其著宣王德勸賢與者今國君歌此詩延賔入者其欲著明諸侯宣布王之德以勸賢人使有德言與者鄭以義解之無正文故云與以疑之也云周禮曰賔出入奏肆夏者按大司樂云王出入則令奏王夏尸出入則令奏肆夏牲出入則令奏昭夏下云大饗不入牲其他皆如祭祀鄭注云大饗饗賔客也彼賔客謂諸侯來朝者也不入牲牲不入亦不奏昭夏也其他謂王出入賔客出入亦奏王夏肆夏以此言之王用肆夏以饗諸侯來朝今引之者證燕時納賔亦奏之按燕禮記云若以樂納賔則賔及庭奏肆夏鄭云卿大夫有王事之勞則奏此樂焉此亦同彼注也若臣無王事之勞則如常燕無以樂納賔法也又此納賔樂故諸侯亦得用若升歌則不可若賔醉而出奏陔夏與此異也主人至北面注賔將至正主釋曰自此至虛爵降論主人獻賔之事也云不於洗北辟正主者按鄉飲酒鄉射主人降洗洗北南面是正主此宰夫代君為主故不於洗北南面也注賔既至復位釋曰云賔既拜於筵前受爵者鄭恐讀者以拜下讀為句注宰胥至於燕釋曰云不使膳宰薦者不主飲酒變於燕者決燕禮使膳宰薦主於飲酒故也樂闋注闋止至上也釋曰此上經云奠爵拜告旨下經云賔卒爵則此經者是賔啐酒節即樂闋燕禮記亦云賔及庭奏肆夏賔拜酒主人答拜而樂闋亦據啐酒時按郊特牲賔入大門而奏肆夏又曰卒爵而樂闋與此啐酒樂闋不同者彼注謂朝聘者故卒爵而樂闋此燕己臣子法故啐酒而樂闋也云尊賔之禮盛於上也者賔及庭奏肆夏乃至升堂飲酒乃樂止是尊賔之禮盛於堂上者也儀禮疏卷第十六
