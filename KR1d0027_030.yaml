  text: 儀禮䟽卷第三十
  hash: sha256:7fb1fc1881e3c48d31026350c0f92a8c9c81b38b7d5f027af499862108ff0bbe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_030-1a}
body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彦等撰䟽衰至年者注䟽猶麤也釋曰此齊衰三年章以輕於斬故次斬後䟽猶麤也麤衰者案上斬衰章中爲君三升半麤衰鄭注雜記云微細焉則屬於麤則三升正服斬不得麤名三升半成布三升微細則得麤稱麤衰爲在三升斬内以斬爲正故没義服之麤至此四升始見麤也若然爲父哀極直見深痛之斬不没人功之麤至於義服斬衰之等乃見麤稱至於大功小功更見人功之顯緦麻極輕又表細密之事皆爲哀有深淺故作文不同也斬衰先言斬者一則見先斬其布乃作衰裳二則見爲父極哀先表斬之深重此齊衰稍輕直見造衣之法衰裳旣就乃始緝之是以斬衰斬在上齊衰齊在下牡麻絰者斬衰絰不言麻此齊衰絰見麻者彼有杖杖亦苴故不得言麻此絰文孤不兼杖故得言麻也云冠布纓者案斬衰冠繩纓退在絞帶下使不蒙苴齊冠布纓無此義故進之使與絰同處此布纓亦如上繩纓以一條爲武垂下爲纓也云削杖布帶者並不取蒙苴之義故在常處但杖實是桐不言桐者以斬衰杖不言竹使蒙苴故闕竹字此旣不取蒙苴亦不言桐者欲見母比父削殺之義故亦没桐文也布帶者亦象革帶以七升布爲之此即下章帶縁各視其冠是也齊斬不言布此纓帶言布者以對斬衰纓帶用繩故此須言用布之事也䟽屨者䟽取用草之義即爾雅云䟽不熟之䟽若然注云䟽猶麤者直釋經䟽衰而巳不釋䟽屨之䟽若然斬衰章言菅屨見草體者以其重故見草體舉其惡貌此言䟽以其稍輕故舉草之揔稱自此以下各舉差降之冝故不杖章言麻屨齊衰三月與大功同繩屨小功緦麻輕又没其屨號言三年者以其爲母稍輕故表其年月若然父在爲厭降至期今旣父卒直申三年之衰猶不申斬者以天無二日家無二尊也是以父雖卒後仍以餘尊所厭直申三年不得申斬也云者者亦如斬衰章文明者爲下出也傳曰至菲也注沽猶至異數釋曰緝則今人謂之爲緶也上章傳先云斬者何不緝也此章言齊對斬故亦先言齊者何緝也云牡麻者枲麻也者此枲對上章苴苴是惡色則枲是好色故閒傳云斬衰貌若苴齊衰貌若枲也云牡麻絰右本在上者上章爲父左本在下者陽統於内則此爲母隂統於外故右本在上也云䟽屨者藨蒯之菲也者藨是草名案玉藻云履蒯席則蒯亦草類云冠尊加其麤麤功大功也者此鄭雖據齊衰三年而言冠尊加服皆同是以衰裳升數恒少冠之升數恒多冠在首尊旣冠從首尊故加飾而升數恒多也斬冠六升不言功者六升雖是齊之末未得沽稱故不見人功此三年齊冠七升初入大功之境故言沽功始見人功沽麤之義故云麤功見人功麤大不精者也云齊衰不書受月者亦天子諸侯卿大夫士虞卒哭異數者其義說與斬章同故云亦也父卒則爲母注尊得伸也釋曰此章專爲母三年重於期故在前也直云父卒爲母足矣而云則者欲見父卒三年之内而母卒仍服期要父服除後而母死乃得伸三年故云則以差其義也必知義如此者案内則云女子十有五而笄二十而嫁有故二十三年而嫁注云故謂父母之喪言二十三而嫁不止一喪而巳故鄭并云父母喪也若前遭母喪後遭父喪自然爲母期爲父三年二十三而嫁可知若前遭父服未闋即得爲母三年則是有故二十四而嫁不止二十三也知者假令女年二十二月嫁娶之月將嫁正月而遭父喪并後年正月爲十三月小祥又至後年正月大祥女年二十二欲以二月將嫁又遭母喪至後年正月十三月大祥女年二十三將嫁此是父服將除遭母喪猶不得爲申三年況遭父喪在小祥之前何得即申三年也是父服未除不得爲母三年之驗一也又服問注曰爲母旣葬衰八升亦據父卒爲母與父在爲母同五升衰裳八升冠旣葬以其冠爲之受衰八升是父卒爲母未得伸三年之驗二也閒傳云爲母旣虞卒哭衰七升者乃是父服除後乃爲母申三年初死衰四升冠七升旣葬以其冠爲之受衰七升與此經同是父服除後爲母乃申三年之驗是三也諸解者全不得思此義妄解則文說義多塗皆爲謬也云尊得伸者得伸三年猶未伸斬繼母如母釋曰繼母本非骨肉故次親母後謂己母早卒或被出之後繼續已母喪之如親母故云如母但父卒之後如母明父在如母可知下期章不言者舉父没後明父在如母可知慈母之義亦然皆省文也故皆舉後以明前也若然直言繼母載在三年章内自然如母可知而言如母者欲見生事死事一皆如己母傳曰至殊也釋曰傳發問者以繼母本是路人今來配父輒如己母故發斯問荅云繼母配父即是片合之義旣與己母無別故孝子不敢殊異之也慈母如母釋曰慈母非父片合故次後也云如母者亦生禮死事皆如已母傳曰至命也釋曰傳別舉傳者是子夏引舊傳證成已義故也欲見慈母之義舊巳如此故須重之如己母也云妾之無子者謂舊有子今無者失子之妾有恩慈深則能養他子以爲己子者也若未經有子恩慈淺則不得立後而養他不云君命妾曰而云父者對子而言父故言父也必先命母者容子小未有所識乃命之或養子是然故先命母也云若是則生養之終其身者案内則云孝子之身終終身也者非終父母之身終其身也彼終其身爲終孝子之身此終其身下乃云如母死則喪之三年則以慈母輕於繼母言終其身唯據終慈母之身而巳明三年之後不復如是以小記云慈母不丗祭亦見輕之義也云如母貴父之命也者一非骨血之屬二非配父之尊但唯貴父之命故也傳所引唯言妾之子與妾相事者案喪服小記云爲慈母後者爲庶母可也爲祖庶母可也鄭云縁爲慈母後之義父之妾無子者亦可命己庶子爲後又云即庶子爲後此皆子也傳重而巳不先命之與適妻使爲母子也若然此父命妾之文兼有庶母祖庶母但不命女君與妾子爲母子而巳注此主至伸也釋曰鄭知此主謂大夫士之妾妾子之無母父命爲母子者知非天子諸侯之妾與妾子者案下記云公子爲其母練冠麻衣縓縁旣葬除之父没乃大功明天子庶子亦然何有命爲母子爲之三年乎故知主謂大夫士之妾與妾子也云其使養之不命爲母子則亦服庶母慈己之服可也者小功章云君子子爲庶母之慈己者注云君子子者大夫及公子之適妻子彼謂適妻子備三母有師母慈母保母慈居中服之則師母保母服可知是庶母爲慈母服小功下云其不慈己則緦可也是大夫之適妻子不命爲母子慈己加服小功若妾子爲父之妾慈己加服小功可知若不慈己則緦麻矣士爲庶母緦麻章云士爲庶母傳曰以名服也故此云不命爲母子則亦服庶母慈己者之服可也云大夫之妾子父在爲其母大功者大功章云大夫之庶子爲其母是大功也云士之妾子爲其母期矣者期章云父在爲母不可言士之妾子爲其母鄭知者推究其理大夫妾子厭降爲母大功士無厭降明如衆人服期也云父卒則皆得伸也者士父在巳伸矣但大夫妾子父在大功者父卒則與士皆得伸三年也母爲長子釋曰長子卑故在母下但父爲長子在斬章母爲長子在齊衰以子爲母服齊衰母爲之不得過於子爲己故亦齊衰也若然長子與衆子爲母父在期若夫在爲長子豈亦不得過於子爲己服期乎然者子爲母有降屈之義父母爲長子本爲先祖之正體無厭降之義故不得以父在屈至期明母爲長子不問夫之在否也傳曰至降也釋曰云何以三年者此亦問比例父母爲衆子期等是子此何以獨三年云父之所不降母亦不敢降也者斬章又云何以三年荅云正體於上將所傳重不降故於母亦云不敢降故荅云父之所不降母亦不敢降若然夫不敢降妻亦不敢降而云父母者以其父母各自爲子故父母各云何以三年而問之是以荅各據父母爲子而言不據夫妻也注不敢至正體釋曰云不敢以己尊降祖禰之正體者上傳於父巳荅云正體於上是以鄭解母不降亦與父同以夫婦一體故下降之義亦等䟽衰至期者釋曰案下章不言䟽衰巳下者還依此經所陳唯言不杖及麻屨異於上者此章䟽衰巳下與前章不殊唯期一字與前三年有異今不直言其異而還具列之者以其此一期與前三年懸絶恐服制亦多不同故須重列七服者也但此章雖止一期而禫杖具有案下雜記云期之喪十一月而練十三月而祥十五月而禫注云此謂父在爲母即是此章者也母之與父恩愛本同爲父所厭屈而至期是以雖屈猶申禫杖也爲妻亦申妻雖義合妻乃天夫爲夫斬衰爲妻報以禫杖但以夫尊妻卑故齊斬有異傳曰至其冠釋曰云問者曰何冠也者此還子夏之問荅而言問者曰者子夏欲起發前人使之開悟故假他問荅己之言也云曰齊衰大功冠其受也者降服齊衰四升冠七升旣葬以其冠爲受衰七升冠八升正服齊衰五升冠八升旣葬以其冠爲受衰八升冠九升義服齊衰六升冠九升旣葬以其冠爲受受服衰九升冠十升降服大功衰七升冠十升旣葬以其冠爲受受衰十升冠十一升正服大功衰八升冠十升旣葬以其冠爲受受衰十升冠十一升義服大功衰九升冠十一升旣葬以其冠爲受受衰十一升冠十二升以其初死冠升皆與旣葬衰升數同故云冠其受也大功亦然云緦麻小功冠其衰也者以其降服小功衰十升正服小功衰十一升義服小功衰十二升緦麻十五升抽其半七升半冠皆與衰升數同故云冠其衰也義䟽備於下記也云帶縁各視其冠者帶謂布帶象革帶者縁謂喪服之内中衣縁用布縁之二者之布升數多少視猶比也各比擬其冠也然本問齊衰之冠因荅大功與緦麻小功并荅帶縁者子夏欲因問博陳其義是以假問荅異常例也注問之至布纓釋曰云問之者見斬衰有二其冠同皆下記云斬衰三升三升有半冠六升是其冠同也云今齊衰有四章不知其冠之異同爾者下記云齊衰四升其冠七升旣葬以其冠爲受受衰七升冠八升唯見此降服齊衰不見正服義服及三月齊衰一章不見以不知其冠之異同故致此問也云縁如深衣之縁者案深衣目録云深衣連衣裳而純之以采素純曰長衣有表則謂之中衣此旣在喪服之内則是中衣矣而云深衣以其中衣與深衣同是連衣裳其制大同故就深衣有篇目者而言之案玉藻云其爲長中繼揜尺注云其爲長衣中衣則繼袂揜一尺若今褎矣深衣則縁而巳若然中衣與長衣袂皆手外長一尺案檀弓云練時鹿裘衡長袪注云袪謂褎縁袂口也練而爲裘橫廣之又長之又爲袪則先時狹短無袪可知若然此初喪之中衣縁亦狹短不得如玉藻中衣繼袂揜一尺者也但吉時麛裘即凶時鹿裘吉時中衣深衣目録云大夫以上用素士中衣不用布縁皆用采況喪中縁用布明中衣亦用布也其中衣用布雖無明文亦當視冠若然直言縁視冠不言中衣縁用采故特言縁用布何妨喪時中衣亦用布乎云今文無冠布纓者鄭注儀禮從經今文者注内疊出古文不從古文若從經古文者注内疊出今文不從今文此注旣疊出今文明不從今文從經古文有冠布纓爲正也父在爲母釋曰斬章直言父即知子爲之可知今此言母亦知子爲之而言父在爲母者欲明父母恩愛等爲母期者由父在厭故爲母屈至期故須言父在爲母也傳曰至之志也釋曰上章巳論斬衰不同訖故傳直言何以期而不三年決之也屈也者荅辭以家無二尊故於母屈而爲期是以云至尊在不敢伸其私尊也解父在母屈之意也言不敢伸其私尊明子於父母本尊若然不直言尊而言私尊者其父非直於子爲至尊妻於夫亦至尊母則於子爲尊夫不尊之直據子而言故言私尊也若然夫妻敵體而言屈公子爲母練冠在五服之外不言屈者舉尊以見卑屈可知大夫妾子爲母大功亦斯類也云父必三年然後娶達子之志也者子於母屈而期心喪猶三年故父雖爲妻期而除三年乃娶者通達子之心喪之志故也不云心而言志者心者萬慮之揔喜怒喪樂好惡六情皆是情則爲志母雖一期哀猶未絶是六情之中而哀偏在故云志也不云心也左氏傳晉叔向云一歳王有三年之喪二據大子與穆后天子爲后亦期而云三年喪者據達子之志而言三年也妻傳曰至親也釋曰妻卑於母故次之夫爲妻年月禫杖亦與母同故同章也以其出嫁天夫爲夫斬故夫爲之亦與父在爲母同傳曰何以期也者傳意以妻擬母母是血屬得期恠妻義合亦期故發此之傳也此問異於常例上問母直云何以期今云爲妻乃云何以期者雷氏云妻卑以擬同於母故問深於常也云妻至親也荅以妻至親故同於母言妻至親者妻旣移天齊體與己同奉宗廟爲萬丗之主故云至親也注適子至庶子釋曰云適子父在則爲妻不杖以父爲之主也者不杖章之文也又引服問者鄭彼注云言妻見大夫巳下亦爲此三人爲喪主也若士卑爲此三人爲喪主可知若然至此經爲妻非直是庶子爲妻欲見兼有適子父没爲妻在其中云父在子爲妻以杖即位謂庶子者案喪服小記云父在子爲妻以杖即位可是也引之者證經云是天子巳下至士庶人父皆不爲庶子之妻爲喪主故夫皆爲妻杖得伸也出妻之子爲母釋曰此謂母犯七出去謂去夫氏或適他族或之本家子從而爲服者也七出者無子一也淫泆二也不事舅姑三也口舌四也盜竊五也妬忌六也惡疾七也天子諸侯之妻無子不出唯有六出耳雷氏云子無出母之義故繼夫而言出妻之子也傳曰至私親也釋曰云出妻之子爲母期則爲外祖父母無服者傳意似言出妻即是絶族故於外祖可以無服恐人疑爲之服故傳明言之也又云傳曰者子夏引他舊傳證成己義云絶族者嫁來承奉宗廟與族相連綴今出則與族絶故云絶族也無施服者傍及爲施以母爲族絶即無傍及之服也云親者屬者舊傳解母被出猶爲之服也云出妻之子爲父後者則爲出母無服者舊傳釋爲父後者謂父没適子承重不合爲出母服意云傳曰者子夏釋舊傳意云與尊者爲一體者不言與父爲體而言與尊者上斬衰章巳者彼亦是異於上不言者以下文更有公士大夫之衆臣爲其君布帶繩屨亦是異於上同是斬衰而有二文皆異故不得言異於上直注云此妻妾女子子異於男子而巳此則雖是別章唯此二事異於上故得言之也此不杖章輕於上禫杖故次之又云此章與上章雖杖與不杖不同其正服齊衰裳皆同五升而冠八升則不異也必知父在爲母不衰四升冠七升與上三年齊衰同者見鄭注雜記云士以臣從君服之齊衰爲其母與兄弟是父在爲母與兄弟同正服五升八升之驗也又鄭注服問云爲母旣葬衰八升是初死衰五升冠八升旣葬以其冠爲受受衰八升冠九升是亦爲母同正服衰五升之驗也又案此章云不杖麻屨鄭云言其異於上則上章下䟽衰之等亦同又是爲母同正服五升之驗也案下記云齊衰四升冠七升及閒傳云爲母旣虞受衰七升者唯據上章父卒爲母齊衰三年者也祖父母釋曰孫爲之服喪服條例皆親而尊者在先故斬章先父三年齊衰先母此不杖期先祖亦是其次若然此章有降有正有義服之本制若爲父期祖合大功爲父母加隆至三年祖亦加隆至期是以祖在於章首得其冝也傳者謂子與父骨血是同爲體因其父與祖亦爲一體又見丗叔與祖亦爲一體也云夫妻一體也者亦見丗叔母與丗叔父爲一體也云昆弟一體也者又見丗叔與父亦爲一體也故馬云言一體者還是至親因父加於丗叔故云昆弟一體因丗叔加於丗叔母故以夫妻一體也因上丗叔是旁尊故以下廣明尊有正有旁之義也人身首足爲上下父子亦是尊卑之上下故父子比於首足因父子兼見祖孫故馬云首足者父尊若首加祖在期子卑若足曽孫在緦也云夫婦牉合也者郊特牲云天地合而后萬物興焉是夫婦半合子胤生焉是半合爲一體也云昆弟四體也者四體謂二手二足在身之旁昆弟亦在父之旁故云四體也云故昆弟之義無分者此傳兄弟有合離之義以手足四體本在一身不可分別若昆弟共成父身亦不可分別是昆弟之義不合分也云然而有分者則辟子之私也者昆弟理不合分然而分者則辟子之私也使昆弟之子各自私朝其父故須分也云子不私其父則不成爲子者内則云子事父母雞初鳴咸盥漱櫛纚笄緫朝事父母若兄弟同在一宮則尊崇諸父之長者第二巳下其子不得私其父不成爲人人之子之法也云故有東宮有西宮云云案内則云命士以上父子異宮不命之士父子同宮縱同宮亦有隔別亦爲四方之官也云丗母叔母何以亦期也以名服也者二母是路人以來配丗叔父則生母名旣有母名則當隨丗叔而服之故云以名服也注宗者至如之釋曰案喪服小記云繼別爲大宗繼禰爲小宗大宗繼別子之後百丗不遷之宗在五服之内者族人爲之月筭如邦人如爲齊衰齊衰三月章宗子是也小宗有四皆據五服之内依常著服五丗別髙祖則別事親者今宗子在期章之内明非大宗子是丗父爲小宗典宗事者也云爲姑姊妹在室亦如之者大功章云爲姑嫁大功明未嫁在此期章若然不見姑者雷云不見姑者欲見時早出之義大夫之適子爲妻釋曰云大夫之適子爲妻在此不杖章則上杖章爲妻者是庶子爲妻父没後適子亦爲妻杖亦在彼章也傳曰至不杖釋曰恠所以期發比例而問者大夫衆子爲妻皆大功今令適子爲妻期故發問也云父之所不降子亦不敢降也者大功章有適婦注云適子之妻是父不降適婦也云子亦不敢降者謂不敢降至大功與庶子同也云何以不杖也者旣不降恠不杖故發問也父在爲妻不杖者父爲適子之婦爲喪主故適子不敢伸而杖也服問云君所主夫人妻大子適婦是大夫爲適婦爲喪主也故子不杖也若然此適子爲妻通貴賤今不云長子通上下而云適子唯據大夫者以五十始爵爲降服之始嫌降適婦其子亦降其妻故明舉大夫不降天子諸侯雖尊不降可知注大夫至出降釋曰云大夫不以尊降適婦者重適也者此解經文所不降適子之婦對大夫爲庶子之婦小功是尊降也云凡不降者謂如其親服服之者謂依五服常法服之云降有四品者鄭因傳有降不降之文遂揔解喪服上下降服之義云君大夫以尊降者天子諸侯爲正統之親后夫人與長子長子之妻等不降餘親則絶天子諸侯絶者大夫降一等即大夫爲衆子大功之等是也云公子大夫之子以厭降者此非身自尊受父之厭屈以降無尊之妻下記云公子爲其母練冠麻麻衣縓縁爲其妻縓冠葛絰帶麻衣父卒乃大功是也大夫之子即小功章云大夫之子爲從父昆弟在小功皆是也云公之昆弟以旁尊降者此亦非己尊旁及昆弟故亦降其諸親即小功章云公之昆弟爲從父母昆弟是也案大功章云公之庶昆弟爲母妻昆弟傳曰先君餘尊之所厭不得過大功若然公之昆弟有兩義旣以旁尊又爲餘尊厭也云爲人後者女子子嫁者以出降者謂若下文云爲人後者爲其父母報又下文云女子適人者爲其父母昆弟爲父後者比二者是出也凡大夫之服例在正服後今在昆弟上者以其妻本在杖期直以父爲主故降入不杖章是以進之在昆弟上也昆弟注昆兄至如之釋曰昆弟卑於丗叔故次之此亦至親以期斷云昆兄也者昆明也以其次長故以明爲稱弟弟也以其小故以次弟爲名云爲姊妹在室亦如之者義同於上姑在室也爲衆子注衆子至其首釋曰衆子卑於昆弟故次之注兼云女子之義如上姑姊妹但上注鄭云在室此不云在室可知故略不言也昆弟衆子及下昆弟之子者皆不發傳者以其同是一體故無異問姊妹女子子在室不見者亦如上姑不見雷氏云欲見出當及時又大功章見姑姊妹女子子嫁大功明此在室可知故略之也云士謂之衆子未能逺別也者經不云士鄭云士者喪服平文是士故言士可知也云大夫則謂之庶子降之爲大功者下文大夫之子皆云庶子降一等故大功云天子國君不服之者以其絶旁親故知不服若然經所云唯據士也引内則者案彼云子生三月之末擇日翦髮爲鬌以見於父若冢子生則見於正寢其日夫妻共食具視朔食天子則大牢諸侯則少牢大夫特牲士特豚冢子未食而見必執其右手咳而名之執右明授之室事退入夫之燕寢乃食下云其非冢子皆降一等云適子庶子巳食而見必循其首者不授室事故也而鄭注未食巳食急正緩庶之義言冢子猶言長子通於下也彼言適子謂適妻所生第二巳下庶子謂妾子也引之者證言庶子是別於適長者也昆弟之子注檀弓至進之釋曰昆弟子䟽於親子故次之丗叔父爲之此兩相爲服不言報者引同己子與親子同故不言報是以檀弓爲證言進者進同己子故也大夫至昆弟注兩言至爲弟釋曰此大夫之妾子故言庶若適妻所生第二巳下當直云昆弟不言庶也云兩言之者以其適妻所生適子或長於妾子或小於妾子故云兩言之適子或爲兄或爲弟是以經昆弟並言之傳曰至降也釋曰云父之所不降者即斬章父爲長子是也云子亦不敢降者於此服期是也發何以傳者餘兄弟相爲皆大功獨爲適服期故發問比例之傳也注大夫至爲之釋曰云大夫雖尊不敢降其適重之也者釋傳父之所不降云適子爲庶昆弟巳下鄭廣明大夫與適子所降者以大夫適子得行大夫禮故父子俱降庶庶又自相降也如大夫爲之皆大功也適孫釋曰孫卑於昆弟故次之此謂適子死其適孫承重者祖爲之期傳曰至如之釋曰傳云何以問比例者亦爲衆孫大功此獨期故發問也云有適子者無適孫者謂適子在不得立適孫爲後也云孫婦亦如之亦謂不立之故云亦如之也注周之至期也釋曰云周之道適子死則立適孫是適孫將上爲祖後者也者此釋祖爲孫服重之義言周之道對殷道則不然以其殷道適子死弟乃當先立故言周之道也云長子在則爲庶孫耳者旣適子在不得立孫明同庶孫之例云凡父於將爲後者非長子皆期也者案喪服小記云適婦不爲舅後者則姑爲之小功注云謂夫有廢疾他故若死而無子不受重者小功庶婦之服也凡父母於子舅姑於婦將不傳重於適及將傳重者非適服之皆如衆子庶婦也是以鄭云凡父母於子舅姑於婦非長子皆期明非長子婦及於非適孫傳重同於庶孫大功可知也若然長子爲父斬父亦爲斬適孫承重爲祖斬祖爲之期不報之斬者父子一體本有三年之情故特爲祖斬祖爲孫本非一體但以報期故期不得斬也爲人後者爲其父母報釋曰此謂其子後人反來爲父母在者欲其厚於所後薄於本親抑之故次在孫後也若然旣爲本生不降斬至禫杖章者亦是深抑厚於大宗也言報者旣深抑之使同本䟽往來相報之法故也傳曰至大宗釋曰問者本生父母應斬及三年今乃不杖期故問比例也云不貳斬者荅辭又不貳斬者持重於大宗者降其小宗此解不貳斬之意也此問荅雖兼母專據父故荅以斬而言案喪服小記云別子爲祖繼別爲大宗謂若魯桓公適夫人文姜生大子名同後爲君次子慶父叔牙季友此三子謂之別子別子者皆以臣道事君無兄弟相宗之法與大子有别又與後丗爲始故稱別子也大宗有一小宗有四大宗一者别子之子適者爲諸弟來宗之即謂之大宗自此以下適適相承謂之百丗不遷之宗五服之内親者月筭如邦人五服之外皆來宗之爲之齊衰齊衰三月章爲宗子之母妻是也小宗有四者謂大宗之後生之謂别子之弟小記注云別子之丗長子兄弟宗之第二巳下長者親弟來宗之爲繼禰小宗更一丗長者非直親兄弟又從父昆弟亦來宗之爲繼祖小宗更一丗長者非直親昆弟從父昆弟又有從祖昆弟來宗之爲繼曽祖小宗更一丗長者非直有親昆弟從父昆弟從祖昆弟來宗之又有從曽祖昆弟來宗之爲繼髙祖小宗也更一丗絶服不復來事以彼自事五服内繼髙祖巳下者也四者皆是小宗則家家皆有兄弟相事長者之小宗雖家家盡有小宗仍丗事繼髙祖巳下之小宗也是以上傳云有餘歸之宗亦謂當家之長爲小宗者也云爲人後者孰後後大宗也者此問小宗大宗二者與何者爲後後大宗也案何休云小宗無後當絶與此義同也又云後大宗者降其小宗此則繼爲人後爲父母父母尚降明餘皆降也故大功章云爲人後者爲其昆弟是降小宗之類也云曷爲後大宗大宗者尊之統者此問必後大宗何意也明宗子尊統領是以書傳云宗子燕族人於堂宗婦燕族人於房序之以昭穆旣有族食族燕齒序族人之事是以須後不可絶也故云尊之統也云禽獸巳下者因上尊宗子遂廣申尊祖宗子之事也云禽獸知母不知父者爾雅云兩足而羽謂之禽四足而毛謂之獸彼對文而言之也若散文言之獸亦名禽禽獸所生唯知隨母不知隨父是知母不知父云野人曰父母何算焉者野人謂若論語鄭注云野人粗略與都邑之士相對亦謂國外爲野人野人稍逺政化都邑之士爲近政化周禮云野自六尺之類者不知分別父母尊卑也云都邑之士則知尊禰者士下對野人上對大夫則此士所謂在朝之士并在城郭士民知義理者揔謂之爲士也云大夫及學士則知尊祖者此學謂郷庠序及國之大學小學之學士文王之丗子亦云學士雖未有官爵以其習知四術閑知六藝知祖義父仁之禮故敬父遂尊祖得與大夫之貴同也諸侯及其大祖天子及其始祖皆是爵尊者其德所及逺之義也云大宗收族巳下謂論大宗立後之意也云適子不得後大宗者以其自當主家事并承重祭祀之事故也注都邑至道然也釋曰都邑之士者對天子諸侯曰國采地大夫曰都邑故周禮載師有家邑小都大都春秋左氏諸侯下大夫采地亦云邑曰築都曰城散文天子巳下皆名都邑都邑之内者其民近政化若然天子諸侯施政化民無以逺近爲異但近者易化逺者難感故民近政化者識深則知尊父逺政化者識淺不知父母有尊卑之别也大祖始封之君者案周禮典命云三公八命卿六命大夫四命其爵皆加一等加一等者八命爲上公九命爲牧八命爲侯伯七命爲子男五命此皆爲大祖後丗不毀其廟若魯之周公齊之大公衛之康叔鄭之桓公之類皆是大祖者也云始祖感神靈而生若后稷契也自由也及始祖所由出謂祭天者謂祭所感帝還以始祖配之案大傳云王者禘其祖之所自出以其祖配之是后稷感東方青帝靈威仰所生契感北方黒帝汁光紀所生易緯云三王之郊一用夏正郊特牲云兆日於南郊就陽位則王者建寅之月祀所感帝於南郊還以感生祖配祭周以后稷殷以契配之故鄭云謂祖配祭天也又鄭注大傳云王者之先祖皆感大微五帝之精以生則不止后稷與契而巳但后稷感青帝所生即生民詩云履帝武敏歆據鄭義帝嚳後丗妃姜原履青帝大人跡而生后稷殷之先母有娀氏之女簡狄吞燕卵而生契此二者文著故鄭據而言之其實帝王皆有所感而生也云上猶逺也下猶近者天子始祖諸侯及大祖並於親廟外祭之是尊統逺大夫三廟適士二廟中下士一廟是卑者尊統近也若然此論大宗子而言天子諸侯大夫士之等者欲見大宗子統領百丗而不遷又上祭別祖子大祖而不易亦是尊統逺小宗子唯統五服之内是尊統近故傳言尊統逺近而云大宗者尊之統也又云大宗者收族是大宗統逺之事也引大傳者案彼稱姓謂正姓若殷子周姬之類綴之以食者以食禮相連綴使不相䟽若宗子與族人行族食族燕者也云百丗婚姻不通周道然者對殷道則不然謂殷家不繫之以正姓但五丗絶服以後庶姓別於上而戚單於下下婚姻通也引之者證周之大宗子統領族人序以昭穆百丗不亂之事也女子子至父後者釋曰女子卑於男子故次男子後傳曰至服期也釋曰經兼言父母傳特問父不問母者家無二尊故父在爲母期今出嫁仍期但不杖禫而巳未多懸絶故不問女子子在室斬衰三年今出嫁與母同在不杖麻屨懸絶故問云爲父何以期也婦人不貳斬也荅辭云婦人不貳斬者何更問不貳斬之意也云婦人有三從之義巳下荅辭前斬章云爲人後不云丈夫不貳斬至此女子子云婦人不貳斬者則丈夫容有二斬故有爲長子皆斬又喪服四制云門内之治恩揜義門外之治義斷恩至於君父別時而喪仍得爲父申斬則丈夫有二斬至於女子子在家爲父出嫁爲夫唯一無二故特言婦人是異於男子故也若然案雜記云與諸侯爲兄弟者服斬是婦人爲夫并爲君得二斬者然則此婦人不貳斬者在家爲父斬出嫁爲夫斬爲父期此其常事彼爲君不可以輕服服君非常之事不得決此也言婦人有三從之義者欲言不貳斬之意婦人從人所從即爲之斬若然夫死從子不爲子斬者子爲母齊衰母爲子不得過齊衰故亦不斬也云婦人不能二尊者欲見不二斬之意云曰小宗故服期者欲見大宗子百丗不遷婦人所歸雖不歸大宗宗内丈夫婦人爲之齊衰三月小宗宗内兄弟父之適長者爲之婦人之所歸宗者歸此小宗遂之期與大宗別傳恐人疑爲大宗故辨之曰小宗故服期也注從者至大宗釋曰歸宗者父雖卒猶自歸宗知義然者若父母在嫁女自當歸寕父母何須歸宗子傳言婦人雖在外必歸宗明是據父母卒者故鄭據父母卒而言若然天子諸侯夫人父母卒不得歸宗以其人君絶宗故許穆夫人衛侯之女父死不得歸賦載馳詩是也云小宗者言是乃小宗也者鄭解傳意言曰小宗者傳重釋歸宗是乃小宗也云明非一者欲見家家皆有也云小宗有四者巳於上釋云丈夫婦人爲小宗各如其親之服者謂各如五服尊卑服之無所加減云避大宗者大宗則齊衰三月云丈夫婦人五服外皆齊衰三月五服内月筭如邦人亦皆齊衰無大功小功緦麻故云避大宗也儀禮䟽卷第三十
