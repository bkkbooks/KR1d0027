  text: 儀禮疏卷第三十
  hash: sha256:40f5754a1e59195351509898c4e925447ede3cd68998063a2053528d7417a4e3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_030-1a}
body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彥等撰疏衰至年者注疏猶粗也釋曰此齊衰三年章以輕於斬故次斬後疏猶粗也粗衰者案上斬衰章中為君三升半粗衰鄭注雜記云微細焉則屬於粗則三升正服斬不得粗名三升半成布三升微細則得粗稱粗衰為在三升斬內以斬為正故沒義服之粗至此四升始見粗也若然為父哀極直見深痛之斬不沒人功之粗至於義服斬衰之等乃見粗稱至於大功小功更見人功之顯緦麻極輕又表細密之事皆為哀有深淺故作文不同也斬衰先言斬者一則見先斬其布乃作衰裳二則見為父極哀先表斬之深重此齊衰稍輕直見造衣之法衰裳既就乃始緝之是以斬衰斬在上齊衰齊在下牡麻絰者斬衰絰不言麻此齊衰絰見麻者彼有杖杖亦苴故不得言麻此絰文孤不兼杖故得言麻也云冠布纓者案斬衰冠繩纓退在絞帶下使不蒙苴齊冠布纓無此義故進之使與絰同處此布纓亦如上繩纓以一條為武垂下為纓也云削杖布帶者並不取蒙苴之義故在常處但杖實是桐不言桐者以斬衰杖不言竹使蒙苴故闕竹字此既不取蒙苴亦不言桐者欲見母比父削殺之義故亦沒桐文也布帶者亦象革帶以七升布為之此即下章帶緣各視其冠是也齊斬不言布此纓帶言布者以對斬衰纓帶用繩故此須言用布之事也疏屨者疏取用草之義即爾雅云疏不熟之疏若然注云疏猶粗者直釋經疏衰而巳不釋疏屨之疏若然斬衰章言菅屨見草體者以其重故見草體舉其惡貌此言疏以其稍輕故舉草之揔稱自此以下各舉差降之冝故不杖章言麻屨齊衰三月與大功同繩屨小功緦麻輕又沒其屨號言三年者以其為母稍輕故表其年月若然父在為厭降至期今既父卒直申三年之衰猶不申斬者以天無二日家無二尊也是以父雖卒後仍以餘尊所厭直申三年不得申斬也云者者亦如斬衰章文明者為下出也傳曰至菲也注沽猶至異數釋曰緝則今人謂之為緶也上章傳先云斬者何不緝也此章言齊對斬故亦先言齊者何緝也云牡麻者枲麻也者此枲對上章苴苴是惡色則枲是好色故閒傳云斬衰貌若苴齊衰貌若枲也云牡麻絰右本在上者上章為父左本在下者陽統於內則此為母隂統於外故右本在上也云疏屨者藨蒯之菲也者藨是草名案玉藻云履蒯席則蒯亦草類云冠尊加其粗粗功大功也者此鄭雖據齊衰三年而言冠尊加服皆同是以衰裳升數恆少冠之升數恆多冠在首尊既冠從首尊故加飾而升數恆多也斬冠六升不言功者六升雖是齊之末未得沽稱故不見人功此三年齊冠七升初入大功之境故言沽功始見人功沽粗之義故云粗功見人功粗大不精者也云齊衰不書受月者亦天子諸侯卿大夫士虞卒哭異數者其義說與斬章同故云亦也父卒則為母注尊得伸也釋曰此章專為母三年重於期故在前也直云父卒為母足矣而云則者欲見父卒三年之內而母卒仍服期要父服除後而母死乃得伸三年故云則以差其義也必知義如此者案內則云女子十有五而笄二十而嫁有故二十三年而嫁注云故謂父母之喪言二十三而嫁不止一喪而巳故鄭并云父母喪也若前遭母喪後遭父喪自然為母期為父三年二十三而嫁可知若前遭父服未闋即得為母三年則是有故二十四而嫁不止二十三也知者假令女年二十二月嫁娶之月將嫁正月而遭父喪并後年正月為十三月小祥又至後年正月大祥女年二十二欲以二月將嫁又遭母喪至後年正月十三月大祥女年二十三將嫁此是父服將除遭母喪猶不得為申三年況遭父喪在小祥之前何得即申三年也是父服未除不得為母三年之驗一也又服問注曰為母既葬衰八升亦據父卒為母與父在為母同五升衰裳八升冠既葬以其冠為之受衰八升是父卒為母未得伸三年之驗二也閒傳云為母既虞卒哭衰七升者乃是父服除後乃為母申三年初死衰四升冠七升既葬以其冠為之受衰七升與此經同是父服除後為母乃申三年之驗是三也諸解者全不得思此義妄解則文說義多塗皆為謬也云尊得伸者得伸三年猶未伸斬繼母如母釋曰繼母本非骨肉故次親母後謂己母早卒或被出之後繼續已母喪之如親母故云如母但父卒之後如母明父在如母可知下期章不言者舉父沒後明父在如母可知慈母之義亦然皆省文也故皆舉後以明前也若然直言繼母載在三年章內自然如母可知而言如母者欲見生事死事一皆如己母傳曰至殊也釋曰傳發問者以繼母本是路人今來配父輒如己母故發斯問答云繼母配父即是片合之義既與己母無別故孝子不敢殊異之也慈母如母釋曰慈母非父片合故次後也云如母者亦生禮死事皆如已母傳曰至命也釋曰傳別舉傳者是子夏引舊傳證成已義故也欲見慈母之義舊巳如此故須重之如己母也云妾之無子者謂舊有子今無者失子之妾有恩慈深則能養他子以為己子者也若未經有子恩慈淺則不得立後而養他不云君命妾曰而云父者對子而言父故言父也必先命母者容子小未有所識乃命之或養子是然故先命母也云若是則生養之終其身者案內則云孝子之身終終身也者非終父母之身終其身也彼終其身為終孝子之身此終其身下乃云如母死則喪之三年則以慈母輕於繼母言終其身唯據終慈母之身而巳明三年之後不復如是以小記云慈母不丗祭亦見輕之義也云如母貴父之命也者一非骨血之屬二非配父之尊但唯貴父之命故也傳所引唯言妾之子與妾相事者案喪服小記云為慈母後者為庶母可也為祖庶母可也鄭云緣為慈母後之義父之妾無子者亦可命己庶子為後又云即庶子為後此皆子也傳重而巳不先命之與適妻使為母子也若然此父命妾之文兼有庶母祖庶母但不命女君與妾子為母子而巳注此主至伸也釋曰鄭知此主謂大夫士之妾妾子之無母父命為母子者知非天子諸侯之妾與妾子者案下記云公子為其母練冠麻衣縓緣既葬除之父沒乃大功明天子庶子亦然何有命為母子為之三年乎故知主謂大夫士之妾與妾子也云其使養之不命為母子則亦服庶母慈己之服可也者小功章云君子子為庶母之慈己者注云君子子者大夫及公子之適妻子彼謂適妻子備三母有師母慈母保母慈居中服之則師母保母服可知是庶母為慈母服小功下云其不慈己則緦可也是大夫之適妻子不命為母子慈己加服小功若妾子為父之妾慈己加服小功可知若不慈己則緦麻矣士為庶母緦麻章云士為庶母傳曰以名服也故此云不命為母子則亦服庶母慈己者之服可也云大夫之妾子父在為其母大功者大功章云大夫之庶子為其母是大功也云士之妾子為其母期矣者期章云父在為母不可言士之妾子為其母鄭知者推究其理大夫妾子厭降為母大功士無厭降明如衆人服期也云父卒則皆得伸也者士父在巳伸矣但大夫妾子父在大功者父卒則與士皆得伸三年也母為長子釋曰長子卑故在母下但父為長子在斬章母為長子在齊衰以子為母服齊衰母為之不得過於子為己故亦齊衰也若然長子與衆子為母父在期若夫在為長子豈亦不得過於子為己服期乎然者子為母有降屈之義父母為長子本為先祖之正體無厭降之義故不得以父在屈至期明母為長子不問夫之在否也傳曰至降也釋曰云何以三年者此亦問比例父母為衆子期等是子此何以獨三年云父之所不降母亦不敢降也者斬章又云何以三年答云正體於上將所傳重不降故於母亦云不敢降故答云父之所不降母亦不敢降若然夫不敢降妻亦不敢降而云父母者以其父母各自為子故父母各云何以三年而問之是以答各據父母為子而言不據夫妻也注不敢至正體釋曰云不敢以己尊降祖禰之正體者上傳於父巳答云正體於上是以鄭解母不降亦與父同以夫婦一體故下降之義亦等疏衰至期者釋曰案下章不言疏衰巳下者還依此經所陳唯言不杖及麻屨異於上者此章疏衰巳下與前章不殊唯期一字與前三年有異今不直言其異而還具列之者以其此一期與前三年懸絶恐服制亦多不同故須重列七服者也但此章雖止一期而禫杖具有案下雜記云期之喪十一月而練十三月而祥十五月而禫注云此謂父在為母即是此章者也母之與父恩愛本同為父所厭屈而至期是以雖屈猶申禫杖也為妻亦申妻雖義合妻乃天夫為夫斬衰為妻報以禫杖但以夫尊妻卑故齊斬有異傳曰至其冠釋曰云問者曰何冠也者此還子夏之問答而言問者曰者子夏欲起發前人使之開悟故假他問答己之言也云曰齊衰大功冠其受也者降服齊衰四升冠七升既葬以其冠為受衰七升冠八升正服齊衰五升冠八升既葬以其冠為受衰八升冠九升義服齊衰六升冠九升既葬以其冠為受受服衰九升冠十升降服大功衰七升冠十升既葬以其冠為受受衰十升冠十一升正服大功衰八升冠十升既葬以其冠為受受衰十升冠十一升義服大功衰九升冠十一升既葬以其冠為受受衰十一升冠十二升以其初死冠升皆與既葬衰升數同故云冠其受也大功亦然云緦麻小功冠其衰也者以其降服小功衰十升正服小功衰十一升義服小功衰十二升緦麻十五升抽其半七升半冠皆與衰升數同故云冠其衰也義疏備於下記也云帶緣各視其冠者帶謂布帶象革帶者緣謂喪服之內中衣緣用布緣之二者之布升數多少視猶比也各比擬其冠也然本問齊衰之冠因答大功與緦麻小功并答帶緣者子夏欲因問博陳其義是以假問答異常例也注問之至布纓釋曰云問之者見斬衰有二其冠同皆下記云斬衰三升三升有半冠六升是其冠同也云今齊衰有四章不知其冠之異同爾者下記云齊衰四升其冠七升既葬以其冠為受受衰七升冠八升唯見此降服齊衰不見正服義服及三月齊衰一章不見以不知其冠之異同故致此問也云緣如深衣之緣者案深衣目録云深衣連衣裳而純之以采素純曰長衣有表則謂之中衣此既在喪服之內則是中衣矣而云深衣以其中衣與深衣同是連衣裳其制大同故就深衣有篇目者而言之案玉藻云其為長中繼掩尺注云其為長衣中衣則繼袂掩一尺若今褎矣深衣則緣而巳若然中衣與長衣袂皆手外長一尺案檀弓云練時鹿裘衡長袪注云袪謂褎緣袂口也練而為裘橫廣之又長之又為袪則先時狹短無袪可知若然此初喪之中衣緣亦狹短不得如玉藻中衣繼袂掩一尺者也但吉時麛裘即凶時鹿裘吉時中衣深衣目録云大夫以上用素士中衣不用布緣皆用采況喪中緣用布明中衣亦用布也其中衣用布雖無明文亦當視冠若然直言緣視冠不言中衣緣用采故特言緣用布何妨喪時中衣亦用布乎云今文無冠布纓者鄭注儀禮從經今文者注內疊出古文不從古文若從經古文者注內疊出今文不從今文此注既疊出今文明不從今文從經古文有冠布纓為正也父在為母釋曰斬章直言父即知子為之可知今此言母亦知子為之而言父在為母者欲明父母恩愛等為母期者由父在厭故為母屈至期故須言父在為母也傳曰至之志也釋曰上章巳論斬衰不同訖故傳直言何以期而不三年決之也屈也者答辭以家無二尊故於母屈而為期是以云至尊在不敢伸其私尊也解父在母屈之意也言不敢伸其私尊明子於父母本尊若然不直言尊而言私尊者其父非直於子為至尊妻於夫亦至尊母則於子為尊夫不尊之直據子而言故言私尊也若然夫妻敵體而言屈公子為母練冠在五服之外不言屈者舉尊以見卑屈可知大夫妾子為母大功亦斯類也云父必三年然後娶達子之志也者子於母屈而期心喪猶三年故父雖為妻期而除三年乃娶者通達子之心喪之志故也不云心而言志者心者萬慮之揔喜怒喪樂好惡六情皆是情則為志母雖一期哀猶未絶是六情之中而哀偏在故云志也不云心也左氏傳晉叔向云一歲王有三年之喪二據大子與穆后天子為后亦期而云三年喪者據達子之志而言三年也妻傳曰至親也釋曰妻卑於母故次之夫為妻年月禫杖亦與母同故同章也以其出嫁天夫為夫斬故夫為之亦與父在為母同傳曰何以期也者傳意以妻擬母母是血屬得期怪妻義合亦期故發此之傳也此問異於常例上問母直云何以期今云為妻乃云何以期者雷氏云妻卑以擬同於母故問深於常也云妻至親也答以妻至親故同於母言妻至親者妻既移天齊體與己同奉宗廟為萬丗之主故云至親也注適子至庶子釋曰云適子父在則為妻不杖以父為之主也者不杖章之文也又引服問者鄭彼注云言妻見大夫巳下亦為此三人為喪主也若士卑為此三人為喪主可知若然至此經為妻非直是庶子為妻欲見兼有適子父沒為妻在其中云父在子為妻以杖即位謂庶子者案喪服小記云父在子為妻以杖即位可是也引之者證經云是天子巳下至士庶人父皆不為庶子之妻為喪主故夫皆為妻杖得伸也出妻之子為母釋曰此謂母犯七出去謂去夫氏或適他族或之本家子從而為服者也七出者無子一也淫泆二也不事舅姑三也口舌四也盜竊五也妬忌六也惡疾七也天子諸侯之妻無子不出唯有六出耳雷氏云子無出母之義故繼夫而言出妻之子也傳曰至私親也釋曰云出妻之子為母期則為外祖父母無服者傳意似言出妻即是絶族故於外祖可以無服恐人疑為之服故傳明言之也又云傳曰者子夏引他舊傳證成己義云絶族者嫁來承奉宗廟與族相連綴今出則與族絶故云絶族也無施服者傍及為施以母為族絶即無傍及之服也云親者屬者舊傳解母被出猶為之服也云出妻之子為父後者則為出母無服者舊傳釋為父後者謂父沒適子承重不合為出母服意云傳曰者子夏釋舊傳意云與尊者為一體者不言與父為體而言與尊者上斬衰章巳者彼亦是異於上不言者以下文更有公士大夫之衆臣為其君布帶繩屨亦是異於上同是斬衰而有二文皆異故不得言異於上直注云此妻妾女子子異於男子而巳此則雖是別章唯此二事異於上故得言之也此不杖章輕於上禫杖故次之又云此章與上章雖杖與不杖不同其正服齊衰裳皆同五升而冠八升則不異也必知父在為母不衰四升冠七升與上三年齊衰同者見鄭注雜記云士以臣從君服之齊衰為其母與兄弟是父在為母與兄弟同正服五升八升之驗也又鄭注服問云為母既葬衰八升是初死衰五升冠八升既葬以其冠為受受衰八升冠九升是亦為母同正服衰五升之驗也又案此章云不杖麻屨鄭云言其異於上則上章下疏衰之等亦同又是為母同正服五升之驗也案下記云齊衰四升冠七升及閒傳云為母既虞受衰七升者唯據上章父卒為母齊衰三年者也祖父母釋曰孫為之服喪服條例皆親而尊者在先故斬章先父三年齊衰先母此不杖期先祖亦是其次若然此章有降有正有義服之本制若為父期祖合大功為父母加隆至三年祖亦加隆至期是以祖在於章首得其冝也傳者謂子與父骨血是同為體因其父與祖亦為一體又見丗叔與祖亦為一體也云夫妻一體也者亦見丗叔母與丗叔父為一體也云昆弟一體也者又見丗叔與父亦為一體也故馬云言一體者還是至親因父加於丗叔故云昆弟一體因丗叔加於丗叔母故以夫妻一體也因上丗叔是旁尊故以下廣明尊有正有旁之義也人身首足為上下父子亦是尊卑之上下故父子比於首足因父子兼見祖孫故馬云首足者父尊若首加祖在期子卑若足曽孫在緦也云夫婦牉合也者郊特牲云天地合而后萬物興焉是夫婦半合子胤生焉是半合為一體也云昆弟四體也者四體謂二手二足在身之旁昆弟亦在父之旁故云四體也云故昆弟之義無分者此傳兄弟有合離之義以手足四體本在一身不可分別若昆弟共成父身亦不可分別是昆弟之義不合分也云然而有分者則辟子之私也者昆弟理不合分然而分者則辟子之私也使昆弟之子各自私朝其父故須分也云子不私其父則不成為子者內則云子事父母雞初鳴咸盥漱櫛纚笄總朝事父母若兄弟同在一宮則尊崇諸父之長者第二巳下其子不得私其父不成為人人之子之法也云故有東宮有西宮云云案內則云命士以上父子異宮不命之士父子同宮縱同宮亦有隔別亦為四方之官也云丗母叔母何以亦期也以名服也者二母是路人以來配丗叔父則生母名既有母名則當隨丗叔而服之故云以名服也注宗者至如之釋曰案喪服小記云繼別為大宗繼禰為小宗大宗繼別子之後百丗不遷之宗在五服之內者族人為之月算如邦人如為齊衰齊衰三月章宗子是也小宗有四皆據五服之內依常著服五丗別髙祖則別事親者今宗子在期章之內明非大宗子是丗父為小宗典宗事者也云為姑姊妹在室亦如之者大功章云為姑嫁大功明未嫁在此期章若然不見姑者雷云不見姑者欲見時早出之義大夫之適子為妻釋曰云大夫之適子為妻在此不杖章則上杖章為妻者是庶子為妻父沒後適子亦為妻杖亦在彼章也傳曰至不杖釋曰怪所以期發比例而問者大夫衆子為妻皆大功今令適子為妻期故發問也云父之所不降子亦不敢降也者大功章有適婦注云適子之妻是父不降適婦也云子亦不敢降者謂不敢降至大功與庶子同也云何以不杖也者既不降怪不杖故發問也父在為妻不杖者父為適子之婦為喪主故適子不敢伸而杖也服問云君所主夫人妻大子適婦是大夫為適婦為喪主也故子不杖也若然此適子為妻通貴賤今不云長子通上下而云適子唯據大夫者以五十始爵為降服之始嫌降適婦其子亦降其妻故明舉大夫不降天子諸侯雖尊不降可知注大夫至出降釋曰云大夫不以尊降適婦者重適也者此解經文所不降適子之婦對大夫為庶子之婦小功是尊降也云凡不降者謂如其親服服之者謂依五服常法服之云降有四品者鄭因傳有降不降之文遂揔解喪服上下降服之義云君大夫以尊降者天子諸侯為正統之親后夫人與長子長子之妻等不降餘親則絶天子諸侯絶者大夫降一等即大夫為衆子大功之等是也云公子大夫之子以厭降者此非身自尊受父之厭屈以降無尊之妻下記云公子為其母練冠麻麻衣縓緣為其妻縓冠葛絰帶麻衣父卒乃大功是也大夫之子即小功章云大夫之子為從父昆弟在小功皆是也云公之昆弟以旁尊降者此亦非己尊旁及昆弟故亦降其諸親即小功章云公之昆弟為從父母昆弟是也案大功章云公之庶昆弟為母妻昆弟傳曰先君餘尊之所厭不得過大功若然公之昆弟有兩義既以旁尊又為餘尊厭也云為人後者女子子嫁者以出降者謂若下文云為人後者為其父母報又下文云女子適人者為其父母昆弟為父後者比二者是出也凡大夫之服例在正服後今在昆弟上者以其妻本在杖期直以父為主故降入不杖章是以進之在昆弟上也昆弟注昆兄至如之釋曰昆弟卑於丗叔故次之此亦至親以期斷云昆兄也者昆明也以其次長故以明為稱弟弟也以其小故以次弟為名云為姊妹在室亦如之者義同於上姑在室也為衆子注衆子至其首釋曰衆子卑於昆弟故次之注兼云女子之義如上姑姊妹但上注鄭云在室此不云在室可知故略不言也昆弟衆子及下昆弟之子者皆不發傳者以其同是一體故無異問姊妹女子子在室不見者亦如上姑不見雷氏云欲見出當及時又大功章見姑姊妹女子子嫁大功明此在室可知故略之也云士謂之衆子未能逺別也者經不云士鄭云士者喪服平文是士故言士可知也云大夫則謂之庶子降之為大功者下文大夫之子皆云庶子降一等故大功云天子國君不服之者以其絶旁親故知不服若然經所云唯據士也引內則者案彼云子生三月之末擇日翦髮為鬌以見於父若冢子生則見於正寢其日夫妻共食具視朔食天子則大牢諸侯則少牢大夫特牲士特豚冢子未食而見必執其右手咳而名之執右明授之室事退入夫之燕寢乃食下云其非冢子皆降一等云適子庶子巳食而見必循其首者不授室事故也而鄭注未食巳食急正緩庶之義言冢子猶言長子通於下也彼言適子謂適妻所生第二巳下庶子謂妾子也引之者證言庶子是別於適長者也昆弟之子注檀弓至進之釋曰昆弟子疏於親子故次之丗叔父為之此兩相為服不言報者引同己子與親子同故不言報是以檀弓為證言進者進同己子故也大夫至昆弟注兩言至為弟釋曰此大夫之妾子故言庶若適妻所生第二巳下當直云昆弟不言庶也云兩言之者以其適妻所生適子或長於妾子或小於妾子故云兩言之適子或為兄或為弟是以經昆弟並言之傳曰至降也釋曰云父之所不降者即斬章父為長子是也云子亦不敢降者於此服期是也發何以傳者餘兄弟相為皆大功獨為適服期故發問比例之傳也注大夫至為之釋曰云大夫雖尊不敢降其適重之也者釋傳父之所不降云適子為庶昆弟巳下鄭廣明大夫與適子所降者以大夫適子得行大夫禮故父子俱降庶庶又自相降也如大夫為之皆大功也適孫釋曰孫卑於昆弟故次之此謂適子死其適孫承重者祖為之期傳曰至如之釋曰傳云何以問比例者亦為衆孫大功此獨期故發問也云有適子者無適孫者謂適子在不得立適孫為後也云孫婦亦如之亦謂不立之故云亦如之也注周之至期也釋曰云周之道適子死則立適孫是適孫將上為祖後者也者此釋祖為孫服重之義言周之道對殷道則不然以其殷道適子死弟乃當先立故言周之道也云長子在則為庶孫耳者既適子在不得立孫明同庶孫之例云凡父於將為後者非長子皆期也者案喪服小記云適婦不為舅後者則姑為之小功注云謂夫有廢疾他故若死而無子不受重者小功庶婦之服也凡父母於子舅姑於婦將不傳重於適及將傳重者非適服之皆如衆子庶婦也是以鄭云凡父母於子舅姑於婦非長子皆期明非長子婦及於非適孫傳重同於庶孫大功可知也若然長子為父斬父亦為斬適孫承重為祖斬祖為之期不報之斬者父子一體本有三年之情故特為祖斬祖為孫本非一體但以報期故期不得斬也為人後者為其父母報釋曰此謂其子後人反來為父母在者欲其厚於所後薄於本親抑之故次在孫後也若然既為本生不降斬至禫杖章者亦是深抑厚於大宗也言報者既深抑之使同本疏往來相報之法故也傳曰至大宗釋曰問者本生父母應斬及三年今乃不杖期故問比例也云不二斬者答辭又不二斬者持重於大宗者降其小宗此解不二斬之意也此問答雖兼母專據父故答以斬而言案喪服小記云別子為祖繼別為大宗謂若魯桓公適夫人文姜生大子名同後為君次子慶父叔牙季友此三子謂之別子別子者皆以臣道事君無兄弟相宗之法與大子有别又與後丗為始故稱別子也大宗有一小宗有四大宗一者别子之子適者為諸弟來宗之即謂之大宗自此以下適適相承謂之百丗不遷之宗五服之內親者月算如邦人五服之外皆來宗之為之齊衰齊衰三月章為宗子之母妻是也小宗有四者謂大宗之後生之謂别子之弟小記注云別子之丗長子兄弟宗之第二巳下長者親弟來宗之為繼禰小宗更一丗長者非直親兄弟又從父昆弟亦來宗之為繼祖小宗更一丗長者非直親昆弟從父昆弟又有從祖昆弟來宗之為繼曽祖小宗更一丗長者非直有親昆弟從父昆弟從祖昆弟來宗之又有從曽祖昆弟來宗之為繼髙祖小宗也更一丗絶服不復來事以彼自事五服內繼髙祖巳下者也四者皆是小宗則家家皆有兄弟相事長者之小宗雖家家盡有小宗仍丗事繼髙祖巳下之小宗也是以上傳云有餘歸之宗亦謂當家之長為小宗者也云為人後者孰後後大宗也者此問小宗大宗二者與何者為後後大宗也案何休云小宗無後當絶與此義同也又云後大宗者降其小宗此則繼為人後為父母父母尚降明餘皆降也故大功章云為人後者為其昆弟是降小宗之類也云曷為後大宗大宗者尊之統者此問必後大宗何意也明宗子尊統領是以書傳云宗子燕族人於堂宗婦燕族人於房序之以昭穆既有族食族燕齒序族人之事是以須後不可絶也故云尊之統也云禽獸巳下者因上尊宗子遂廣申尊祖宗子之事也云禽獸知母不知父者爾雅云兩足而羽謂之禽四足而毛謂之獸彼對文而言之也若散文言之獸亦名禽禽獸所生唯知隨母不知隨父是知母不知父云野人曰父母何算焉者野人謂若論語鄭注云野人粗略與都邑之士相對亦謂國外為野人野人稍逺政化都邑之士為近政化周禮云野自六尺之類者不知分別父母尊卑也云都邑之士則知尊禰者士下對野人上對大夫則此士所謂在朝之士并在城郭士民知義理者揔謂之為士也云大夫及學士則知尊祖者此學謂鄉庠序及國之大學小學之學士文王之丗子亦云學士雖未有官爵以其習知四術間知六藝知祖義父仁之禮故敬父遂尊祖得與大夫之貴同也諸侯及其大祖天子及其始祖皆是爵尊者其德所及逺之義也云大宗收族巳下謂論大宗立後之意也云適子不得後大宗者以其自當主家事并承重祭祀之事故也注都邑至道然也釋曰都邑之士者對天子諸侯曰國采地大夫曰都邑故周禮載師有家邑小都大都春秋左氏諸侯下大夫采地亦云邑曰築都曰城散文天子巳下皆名都邑都邑之內者其民近政化若然天子諸侯施政化民無以逺近為異但近者易化逺者難感故民近政化者識深則知尊父逺政化者識淺不知父母有尊卑之别也大祖始封之君者案周禮典命云三公八命卿六命大夫四命其爵皆加一等加一等者八命為上公九命為牧八命為侯伯七命為子男五命此皆為大祖後丗不毀其廟若魯之周公齊之大公衛之康叔鄭之桓公之類皆是大祖者也云始祖感神靈而生若后稷契也自由也及始祖所由出謂祭天者謂祭所感帝還以始祖配之案大傳云王者禘其祖之所自出以其祖配之是后稷感東方青帝靈威仰所生契感北方黑帝汁光紀所生易緯云三王之郊一用夏正郊特牲云兆日於南郊就陽位則王者建寅之月祀所感帝於南郊還以感生祖配祭周以后稷殷以契配之故鄭云謂祖配祭天也又鄭注大傳云王者之先祖皆感大微五帝之精以生則不止后稷與契而巳但后稷感青帝所生即生民詩云履帝武敏歆據鄭義帝嚳後丗妃姜原履青帝大人跡而生后稷殷之先母有娀氏之女簡狄吞燕卵而生契此二者文著故鄭據而言之其實帝王皆有所感而生也云上猶逺也下猶近者天子始祖諸侯及大祖並於親廟外祭之是尊統逺大夫三廟適士二廟中下士一廟是卑者尊統近也若然此論大宗子而言天子諸侯大夫士之等者欲見大宗子統領百丗而不遷又上祭別祖子大祖而不易亦是尊統逺小宗子唯統五服之內是尊統近故傳言尊統逺近而云大宗者尊之統也又云大宗者收族是大宗統逺之事也引大傳者案彼稱姓謂正姓若殷子周姬之類綴之以食者以食禮相連綴使不相疏若宗子與族人行族食族燕者也云百丗婚姻不通周道然者對殷道則不然謂殷家不繫之以正姓但五丗絶服以後庶姓別於上而戚單於下下婚姻通也引之者證周之大宗子統領族人序以昭穆百丗不亂之事也女子子至父後者釋曰女子卑於男子故次男子後傳曰至服期也釋曰經兼言父母傳特問父不問母者家無二尊故父在為母期今出嫁仍期但不杖禫而巳未多懸絶故不問女子子在室斬衰三年今出嫁與母同在不杖麻屨懸絶故問云為父何以期也婦人不二斬也答辭云婦人不二斬者何更問不二斬之意也云婦人有三從之義巳下答辭前斬章云為人後不云丈夫不二斬至此女子子云婦人不二斬者則丈夫容有二斬故有為長子皆斬又喪服四制云門內之治恩掩義門外之治義斷恩至於君父別時而喪仍得為父申斬則丈夫有二斬至於女子子在家為父出嫁為夫唯一無二故特言婦人是異於男子故也若然案雜記云與諸侯為兄弟者服斬是婦人為夫并為君得二斬者然則此婦人不二斬者在家為父斬出嫁為夫斬為父期此其常事彼為君不可以輕服服君非常之事不得決此也言婦人有三從之義者欲言不二斬之意婦人從人所從即為之斬若然夫死從子不為子斬者子為母齊衰母為子不得過齊衰故亦不斬也云婦人不能二尊者欲見不二斬之意云曰小宗故服期者欲見大宗子百丗不遷婦人所歸雖不歸大宗宗內丈夫婦人為之齊衰三月小宗宗內兄弟父之適長者為之婦人之所歸宗者歸此小宗遂之期與大宗別傳恐人疑為大宗故辨之曰小宗故服期也注從者至大宗釋曰歸宗者父雖卒猶自歸宗知義然者若父母在嫁女自當歸寧父母何須歸宗子傳言婦人雖在外必歸宗明是據父母卒者故鄭據父母卒而言若然天子諸侯夫人父母卒不得歸宗以其人君絶宗故許穆夫人衛侯之女父死不得歸賦載馳詩是也云小宗者言是乃小宗也者鄭解傳意言曰小宗者傳重釋歸宗是乃小宗也云明非一者欲見家家皆有也云小宗有四者巳於上釋云丈夫婦人為小宗各如其親之服者謂各如五服尊卑服之無所加減云避大宗者大宗則齊衰三月云丈夫婦人五服外皆齊衰三月五服內月算如邦人亦皆齊衰無大功小功緦麻故云避大宗也儀禮疏卷第三十
