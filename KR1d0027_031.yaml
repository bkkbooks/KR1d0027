  text: 儀禮疏卷第三十一
  hash: sha256:50d6fbcc8b290d0c35988df145eff2f01310cf0225d9d8bd880e212a6b79f4be
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_031-1a}
body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彥等撰繼父同居者釋曰繼父本非骨肉故次在女子子之下案郊特牲云夫死不嫁終身不改詩恭薑自誓不許再歸此得有婦人將子嫁而有繼父者彼不嫁者自是貞女守志而有嫁者雖不如不嫁聖人許之故齊衰三年章有繼母此又有繼父之文也傳曰至異居釋曰何以期也者以本非骨肉故致問也傳曰巳下並是引舊傳為問答自此至齊衰期謂子家無大功之內親繼父家亦無大功之內親繼父以財貨為此子築宮廟使此子四時祭祀不絶三者皆具即為同居子為之期以繼父恩深故也言妻不言母者巳適他族與己絶故言妻欲見與他為妻不合祭己之父故也云異居則服齊衰三月必嘗同居然後為異居者此一節論異居繼父言異者昔同今異謂上三者若闕一事則為異居假令前三者仍是具後或繼父有子即是繼父有大功之內親亦為異居矣如此父死為之齊衰三月入下文齊衰三月章繼父是也云必嘗同居然後為異居者欲見前時三者具為同居後三者一事闕即為異居之意云未嘗同居則不為異居謂子初與母往繼父家時或繼父有大功內親或己有大功內親或繼父不為己築宮廟三者一事闕雖同在繼父家亦名不同居繼父全不服之矣注妻稚至服之釋曰鄭知妻稚謂年未滿五十者案內則妾年五十閉房不復御何得更嫁故未滿五十也云子幼謂年十五巳下者案論語云可以託六尺之孤鄭亦云十五巳下知者見周禮鄉大夫職云國中自七尺以及六十野自六尺以及六十有五皆征之七尺謂年二十六尺謂年十五十五則受征役何得隨母則知子幼十五巳下言巳下則不通十五以其十五受征明據十四至年一歲巳上也云大功之親謂同財者下記云小功以下為兄弟則小功巳下疏故得兄弟之稱則大功之親容同財共活可知云為之築宮廟於家門之外者以其中門外有己宗廟則知此在大門外築之也必在大門外築之者神不歆非族故也若在門內於鬼神為非族恐不歆之是以大門外為之隨母嫁得有廟者非必正廟但是鬼神所居曰廟若祭法云庶人祭於寢也神不歆非族大戴禮文云夫不可二者據傳云妻明據繼父而言以其與繼父為妻不可更於前夫為妻而祭故云夫不可二也云此以恩服爾者并解為繼父期與三月云未嘗同居則不服之者以其同居與異居有服明未嘗同居不服可知為夫之君傳曰至從服也釋曰此以從服故次繼父下但臣之妻皆稟命於君之夫人不從服小君者欲明夫人命亦由君來故臣妻於夫人無服也不直言夫之君而言為者以夫之君而言為者以夫之君從服輕故特言為夫之君也傳曰何以期者問比例者怪人疏而同親者故發問云從服也以夫為君斬故妻從服期也姑姊至姊妹報釋曰此等親出適巳降在大功雖矜之服期不絶於夫氏故次義服之下女子子間在上不言報者女子子出適大功反為父母自然猶期不須言報故不言也姑對姪姊妹對兄弟出適反為姪與兄弟大功姪與兄弟為之降至大功今還相為期故須言報也傳曰至主者也釋曰云無主者謂其無祭主者無主有二謂喪主祭主傳不言喪主者喪有無後無無主者若當家無喪主或取五服之內親又無五服親則取東西家若無則里尹主之今無主者謂無祭主也故可哀憐而不降也注無主至降之釋曰云人之所哀憐者謂行路之人見此無夫復無子而不嫁猶生哀慜況姪與兄弟及父母故不忍降之也若然除此之外餘人為之服者仍依出降之服而不復加以其餘人恩疏故也不言嫁而云適人者若言適人即謂士也若言嫁之嫁之乃嫁於大夫於本親又以尊降不得言報故云適人不言嫁為君之父母妻長子祖父母釋曰此亦從服輕於夫之君及姑姊妹女子子無主故次之言為者亦如為夫之君也傳曰至者服斬釋曰云父母長子君服斬者欲見臣從君服期若然君之母當在齊衰與君父同在斬者以母亦有三年之服故并言之云妻則小君也者欲見臣為小君期是常非從服之例云父卒然後為祖後者服斬者傳解經臣為君之祖父母服期若君在則為君祖父母從服期注此為至曽祖釋曰云此為君矣而有父若祖之喪者謂始封之君也者若周禮典命三公八命其卿六命大夫四命出封皆加一等是五等諸侯為始封之君非繼體容有祖父不為君而死君為之斬臣亦從服期也云若是繼體則其父若祖有廢疾不立者此祖與父合立為廢疾不立己當立是受國於曽祖若然此二者自是不立今君立不關父祖又云父卒者父為君之孫冝嗣位而早卒今君受國於曽祖者此解傳之父卒耳鄭意以父祖有廢疾必以今君受國於曽祖不取受國於祖者若今君受國於祖祖薨則羣臣為之斬何得從服期故鄭以新君受國於曽祖若然曽祖為君薨羣臣自當服斬若君之祖薨君為之服斬臣從服期也若然父卒者父為君之孫冝嗣位而早卒則君之祖亦是廢疾或早死不立是以君之父受國於祖復早卒今君乃受國于曽祖也趙商問己為諸侯父有廢疾不任國政不任喪事而為其祖服制度之冝年月之斷云何答云父卒為祖後者三年斬何疑趙商又問父卒為祖後者三年巳聞命矣所問者父在為祖如何欲言三年則父在欲言期復無主斬杖之冝主喪之制未知所定答曰天子諸侯之喪皆斬衰無期彼志與此注相兼乃具也妾為女君釋曰妾事女君使與臣事君同故次之也以其妻既與夫體敵妾不得體夫故名妾妾接也接事適妻故妾稱適妻為女君也傳曰至姑等釋曰傳意謂妾或是妻之姪娣同事一人忽為之重服故發問也答曰妾之事女君與婦之事舅姑等者婦之事舅姑亦期故云等但並后匹適傾覆之階故抑之雖或姪娣使如子之妻與婦事舅姑同也注女君至則嫌釋曰云女君於妾無服者諸經傳無女君服妾之文故云無服必無服者鄭解其不服之意是以云報之則重還報以期無尊卑降殺大重也云降之則嫌者若降之大功小功則似舅姑為適婦庶婦之嫌故使女君為妾無服也婦為舅姑釋曰文在此者既欲抑妾事女君使如事舅姑故婦事舅姑在下欲使妾情先於婦故婦文在後也傳曰至從服也釋曰問之者本是路人與子判合則為重服服夫之父母故問也云從服也者答辭既得體其子為親故重服為其舅姑也夫之昆弟之子注男女皆是釋曰檀弓云兄弟之子猶子也蓋引而進之進同己子故二母為之亦如己子服期也云男女皆是者據女在室與出嫁與二母相為服同期與大功故子中兼男女但以義服情輕同婦事舅姑故次在下也傳曰何以期也報之也釋曰報之者二母與子本是路人為配二父而有母名為之服期故二母報子還服期若然上丗叔之下不言報至此言之者二父本是父之一體又引同已子不得言報至此本疏故言報也公妾大夫之妾為其子釋曰二妾為其子應降而不降重出此文故次之傳曰至遂也釋曰傳嫌二妾承尊應降今不降故發問答云妾不得體君為其子得遂也者諸侯絶旁期為衆子無服大夫降一等為衆子大功其妻體君皆從夫而降之至於二妾賤皆不得體君君不厭妾故自為其子得伸遂為服期也注此言至同也釋曰云唯為長子三年更云其餘謂已所生第二巳下以尊降與妾子同諸侯夫人無服大夫妻為之大功也女子子為祖父母釋曰章首巳言為祖父母兼男女彼女據成人之女此言女子子謂十五許嫁者亦以重出其文故次在此也傳曰至祖也釋曰祖父母正期也巳嫁之女可降旁親祖父母正期故不降也故云不敢降其祖也注經似至不降釋曰知經似在室者以其直云女子子無嫁文故云似在室云傳似巳嫁者以其言不敢則有敢者敢謂出嫁降旁親是巳嫁之文此言不敢是雖嫁而不敢降祖故云傳似巳嫁也經傳互言之欲見在室出嫁同不降故鄭云明雖有出道猶不降也云出道者女子子雖十五許嫁始行納采問名納吉納徴四禮即著笄為成人得降旁親要至二十乃行謂請期親迎之禮以其笄而未出故云明雖有出道猶不降不直言出而言道者實未出故云出道猶如鄭注論語云雖不得祿亦得祿之道是亦未得祿而云之道亦此類也大夫之子至於室矣釋曰此言大夫之子為此六大夫六命婦服期不降之事其中雖有子女重出其文其餘並是應降而不降故次在女子為祖下但大夫尊降旁親一等此男女皆合降至大功為作大夫與己尊同故不降還服期若姑姊妹女子子若出嫁大功適士又降至小功今嫁大夫雖降至大功為無祭主哀憐之不忍降還服期也傳云無主者命婦之無祭主者也者鄭兼言命婦欲見既為命婦不降又無祭主更不降服期之意也傳云何以言唯子不報也鄭云子中兼男女傳唯據女子子鄭不從也云何以期也父之所不降子亦不敢降也者欲見此經云大夫之子得行大夫禮降與不降一與父同故傳據父為大夫為本以子亦之也云大夫曷為不降命婦也巳下欲見大夫是尊同大夫妻是婦人非尊同亦不降者傳解妻亦與夫同尊卑之意是以云夫尊於朝妻貴於室以其大夫以上貴士以下賤此中無士與士妻故以貴言之也注命者至夫爵也釋曰云命者加爵服之名者見公羊傳云錫者何賜也命者何加我服也又案覲禮諸公奉篋服加命書於其上以命侯氏是命者加爵服之名也云自士至上公凡九等者不據爵皆據命而言故大宗伯云以九儀之命正邦國之位一命受爵再命受服三命受位四命受器五命賜則六命賜官七命賜國八命作牧九命作伯伯則分陜上公者是九等者也以其典命上公九命侯伯七命子男五命大國孤四命公侯伯卿三命大夫再命士一命子男卿二命大夫一命士不命天子三公八命其卿六命大夫四命上士三命中士二命下士一命此經雖無士鄭揔解天子諸侯命臣后夫人命妻之事故兼言士也云君命其夫者君中揔天子諸侯云后夫人亦命其妻矣者案禮記云夫人不命於天子自魯昭公始也由昭公娶同姓不告天子天子亦不命明臣妻皆得后夫人命也鄭言此者經云命夫命婦不辨天子諸侯之臣則天子諸侯下但是大夫大夫妻皆是命夫命婦也云此所為者凡六大夫六命婦者六命夫謂丗父一也叔父二也子三也昆四也弟五也昆弟之子六也六命婦者丗母一也叔母二也姑三也姊四也妹五也女子子六也云無主者命婦之無祭主謂姑姊妹女子子也鄭言此者經六命婦中有丗母叔母故鄭辨之以其丗母叔母無主有主皆為之期故知唯據此四人而言也云其有祭主者如衆人者自為大功矣云唯子不報男女同不報爾者以其男女俱為父母三年父母唯為長子斬其餘降何得言報故知子中兼男女是知傳唯據女子子失之矣云大夫曷為不降命婦者據大夫於姑姊妹女子子既以出降其適士者又以尊降在小功也者此亦六命婦中有二母故鄭辨之也云夫尊於朝巳下鄭亦解姑姊妹女子子之夫貴與已同之義若然案曲禮云四十強而仕五十艾服官政為大夫何得大夫子又為大夫又何得為弟之子為大夫者五十命為大夫自是常法大夫之子有德行茂盛者豈待五十乃命之乎是以殤小功有大夫為其昆弟之長殤大夫既為兄弟殤明是幼為大夫舉此一隅不得以常法相難也大夫至為士者釋曰祖與孫為士卑故次在此也注不敢至親也釋曰大夫以尊降其旁親雖有差約不顯著故於此更明之經云不降祖與適明於餘親降可知大夫降旁親明矣公妾至父母釋曰以出嫁為其父母亦重出其文故次在此云公謂五等諸侯皆有八妾士謂一妻一妾中間猶有孤猶有卿大夫妾不言之者舉其極尊卑其中有妾為父母可知傳曰至遂也釋曰傳曰何以期也問者以公子為君厭為己母不在五服又為己母黨無服公妾既不得體君君不厭故妾為父母得伸遂而服期也注然則至明之釋曰鄭欲破傳義故據傳云妾不得體君得為其父母遂也然則女君體君者有以尊降其父母者與言與猶不正執之辭也云春秋之義者案桓九年左傳云紀季薑歸于京師杜云季薑桓王后也季字薑紀姓也書字者伸父母之尊是王后猶不得降父母是子尊不加父母傳何云妾不得體君乎豈可女君降其父母是以云傳似誤矣言似亦是不正執故云似其實誤也云禮妾從女君而服其黨服者雜記文也云是嫌不自服其父母故以明之者鄭既以傳為誤故自解之鄭必不從傳者一則以女君不可降父母二則經文兼有卿大夫士何得專據公子以決父母乎是以傳為誤也疏衰至受者釋曰此齊衰三月章以其義服日月又少故在不杖章下上皆言冠帶此及下傳大功皆不言冠帶者以其輕故略之至正大功言冠見其正猶不言帶緦麻又直言緦麻餘又略之若然禮記云齊衰居堊室者據期故譙周亦云齊衰三月不居堊室注無受至繩屨釋曰云無受者服是服而除不以輕服受之者凡變除皆因葬練祥乃行但此服至葬即除無變服之理故云服是服而除若大功巳上至葬後以輕服受之若斬衰三升冠六升葬後受衰六升是更以輕服受之也云不著月數者天子諸侯葬異月也者大夫士三月葬此章皆三月葬後除之故以三月為主三月者法一時天氣變可以除之但此經中有寄公為所寓又有舊君舊君中兼天子諸侯又有庶人為國君鄭云天子畿內之民服天子亦如之也但天子七月葬諸侯五月葬為之齊衰者皆三月藏其服至葬更服之葬後乃除是以不得言少以包多亦不得言多以包少是以不著月數者天子諸侯葬異月故也云小記者彼記人見此喪服齊衰三月與大功皆不言屨故解此二章同繩屨是以鄭還引之證此章著繩屨也寄公為所寓注寓亦至君服釋曰此章論義服故以疏者為首故寄公在前言寓亦寄者詩式微云黎侯寓於衛寓即寄其義同故云寓亦寄也作文之勢不可重言寄公為所寄故云寓也傳曰至同也釋曰傳依上例執所不知稱者何問比例者等是諸侯各有國土而寄在他國故發問也失地之君也答辭也失地君者謂若禮記射義貢士不得其人數有讓數有讓黜爵削地削地盡君則寄在他國詩式微黎侯寓於衛彼為狄人所迫逐寄在衛黎之臣子勸以歸是失地之君為衛侯服齊衰三月藏其服至葬更服葬訖乃除也云言與民同也者以客在主國得主君之恩故報主君與民同則民亦服之三月藏其服至葬又反服之既葬訖乃除也注諸侯至除之釋曰上以釋變除要待葬後諸侯五月葬而言三月故知三月藏服至葬更服葬後乃除可知不於章首言之欲就三月之下解之故也丈夫至母妻釋曰此與大宗同宗親如寄公為所寓故次在此言丈夫婦人者謂同宗男子女子皆為大宗子并宗子母妻齊衰三月也注婦人至大宗也釋曰此經為宗子謂與大宗別髙祖之人皆服三月也案斬章女子子在室及女反在父室者又不杖章中歸宗婦人為當家小宗親者期為大宗疏者三月也云宗子繼別之後者案喪服小記及大傳云繼別為大宗又云有五丗則遷之宗小宗有四是也有百丗不遷之宗繼別為大宗是也云所謂大宗也者即上文大宗者尊之統是也傳曰至妻服也釋曰傳以丈夫婦人與宗子服絶而越大功小功與曽祖同怪其大重故問比例何以服齊衰三月云尊祖也至之義也答辭也祖謂別子為祖百丗不遷之祖當祭之日同宗皆來陪位及助祭故云尊祖也云尊祖故敬宗者是百丗不遷之宗大宗者尊之統故同宗敬之云敬宗者尊祖之義也者以宗子奉事別子之祖是尊祖之義也宗子之母在則不為宗子之妻服也者謂宗子父巳卒宗子主其祭王制云八十齊喪之事不與則母七十亦不與今宗子母在未年七十母自與祭母死宗人為之服宗子母七十巳上則宗子妻得與祭宗人乃為宗子妻服故云然也必為宗子母妻服者以宗子燕食族人於堂其母妻亦燕食族人之婦於房皆序以昭穆故族人為之服也為舊君君之母妻釋曰舊君舊蒙恩深以對於父今雖退歸田野不忘舊德故次在宗子之下也但為舊君有二一則致仕二則待放未去此則致仕者也不云舊臣而云舊君者若云舊臣言謂舊君為之非喪服體例故云舊君若斬章云父君者則臣子為之此不復言臣法如君也傳曰至小君也釋曰云為舊君者孰謂也者此經上下臣為舊君有二故發問云孰謂也云仕焉而巳者也者答辭也傳意以下為舊君是待放之臣以此為致仕之臣也云何以服齊衰三月者怪其舊服斬衰今服三月也云言與民同也者以本義合且今義巳斷故抑之使與民同也云君之母妻則小君也者雖前後不得同時皆是小君故齊衰三月恩深於人故也注仕焉至於民釋曰云仕焉而巳者謂老若有廢疾而致仕者也者此解仕焉而巳有仕巳老者曲禮云大夫七十而致仕云有廢疾者謂未七十而有廢疾亦致仕是致仕之中有二也云為小君服者恩深於民也者下文庶人為國君無小君是恩淺此為小君是恩深於民也庶人為國君注不言至如之釋曰案論語云民可使由之不可使知之注云民者冥也其見人道逺案王制云庶人在官者其祿以是為差也庶人謂府史胥徒經不言民而言庶人庶人或有在官者據在官者而言之檀弓云君之喪諸達官之長杖謂士大夫為君杖則庶人不為君杖斬則下同於民三月也云天子畿內之民亦如之者以其畿外上公五百里侯四百里巳下其民皆服君三月則畿內千里是專屬天子故知為天子亦如諸侯之境內也大夫至國君注在外待放巳去者釋曰此大夫在外不言為本君服與不服者案雜記云違諸侯之大夫不反服違大夫之諸侯不反服以其尊卑不敵若然其君尊卑敵乃反服舊君服則此大夫巳去他國不言服者是其君尊卑不敵不反服者也是以直言其妻長子為舊國君注云在外待放巳去者知是待放巳去者對上下文而知以其上傳以為仕焉而巳下傳云而猶未絶此傳云長子言未去明身是巳去他國與本國絶者故鄭云待放巳去者也傳曰至未去也釋曰并服而問者怪其重何者妻本從夫服君今夫巳絶妻不合服而服之長子本為君斬者亦大夫之子得行大夫禮從父而服之今父巳絶於君亦當不服矣而皆服衰三月故發問也注妻雖至無服釋曰云妻雖從夫而出古者大夫不外娶者鄭欲解傳云妻言與民同之意以古者不外娶是當國娶婦婦是當國之女今身與妻俱出他國大夫雖絶而妻歸宗往來猶是本國之民其歸者則期章云為昆弟之為父後者曰小宗者是也云春秋者案春秋公羊傳莊二十七年莒慶來逆叔姬傳曰大夫越竟逆婦非禮彼云婦此云女鄭以義言之以其未至夫家故云女引之者證古者大夫不外娶之事云君臣有合離之義者謂諫爭從臣是有義則合三諫不從是無義則離子既隨父故去可以無服矣繼父不同居者注嘗同居今不同釋曰此則期章云必嘗同居然後為異居者也但章皆有傳維庶人為國君及此繼父不傳者以其庶人巳於寄公與上下舊君釋訖繼父巳於期章釋了是以皆不言也曽祖父母釋曰曽髙本合小功加至齊衰故次繼父之下此經直云曽祖不言髙祖案下緦麻章鄭注云族祖父者亦髙祖之孫則髙祖有服明矣是以此注亦兼曽髙而説也若然此曽祖之內合有髙祖可知不言者見其同服故也傳曰至尊也釋曰云何以齊衰三月也者問者怪其三月大輕齊衰又重故發問也云小功者兄弟之服也案下記傳云凡小功巳下為兄弟是以云小功者兄弟之服也云不敢以兄弟之服服至尊也者傳釋服齊衰之意也注正言至恩殺也釋曰云正言小功者服之數盡於五者自斬至緦是也云則髙祖冝緦麻曽祖冝小功也據為父期而言故三年問云何以至期也曰至親以期斷是何也曰天地則巳易矣四時則巳變矣其在天地之中莫不更始焉以是象之也彼又云然則何以三年也曰加隆焉爾也焉使倍之故再期也是本為父母加隆至三年故以父為本而上殺下殺也是故言為髙祖緦麻者謂為父期為祖冝大功曽祖冝小功髙祖冝緦麻又云據祖期是為父加隆三年為祖冝期曽祖冝大功髙祖冝小功故鄭云髙祖曽祖皆有小功之差此鄭揔釋傳云小功者兄弟之服其中含有曽髙二祖而言之也又云則曽孫玄孫為之服同也者曽祖中既兼有髙祖是以云曽孫玄孫各為之齊衰三月也云重其衰麻尊尊也者既不以兄弟之服服至尊故云重其衰麻謂以義服六升衰九升冠尊此尊者也云減其日月恩殺也者謂減五月為三月者因曽髙於己非一體恩殺故也大夫為宗子釋曰大夫尊降旁親皆一等尊祖故敬宗是以大夫雖尊不降宗子為之三月宗子既不降母妻不降可知傳曰至其宗也釋曰以大夫於餘親皆降獨不降宗子故并服而問答云不敢降其宗也者於餘親則降也舊君注大夫待放未去者釋曰此舊君以重出故次在此也鄭知此舊君是待放未去之大夫者鄭據傳而言也案上下四經皆為舊君不言國庶人為國君言國其妻長子為舊國君言國此舊君又不言國者據繼在土地而為之服正如為舊君止是不敢進同臣例故服之三月非為土地故不言國庶人本繼土地故言國也其妻長子本為繼土地故言國此待放未去本為君掃其宗廟為服不繼土地故不言國也傳曰至絶也釋曰此為舊君服對前巳去不服舊君此雖未去巳在境而為服故怪其重所以并服而問也又餘皆不并人問直云何以齊衰唯此與寄公并人而問者所怪深重者并人而言至如寄公本是體敵一朝重服故并言寄公此待放之臣巳在國境可以不服而服之故并言大夫也注以道至若民也釋曰云以道去君謂三諫不從待放者此以道去君據三諫不從在境待放得環則還得玦則去如此者謂之以道去君有罪放逐若晉放胥甲父於衛之等為非道去君云未絶者言爵祿有列於朝出入有詔於國者下曲禮文爵祿有列謂待放大夫舊位仍在出入有詔於國者謂兄弟宗族猶存吉凶之事書信往來相告不絶引之者證大夫去君掃其宗廟詔使宗族祭祀為此大夫雖去猶為舊君服若然君不使掃宗廟爵祿巳絶則是得玦而去則亦不服矣云妻子自若民也者此鄭還約上大夫在外其妻長子為舊國君也上下舊君皆不言士者上仕焉者有士可知是以傳亦不言大夫次云大夫在外言大夫者以其士妻亦歸宗與大夫同其大夫長子父在朝長子得行大夫禮未去為君服斬若士之長子與衆子同父去子雖未去即無服矣與大夫長子異故特言大夫也此不言士者此主為待放未絶大夫有此法士雖有三諫不從出國之時案曲禮踰竟素服乘髦馬不蚤鬋不御婦人三月而後即向他國無待放之法是出國即不服舊君矣是以此舊君唯有大夫也若然不言公卿及孤者詩云三事大夫則三公亦號大夫則大夫中揔兼之矣曽祖父母為士者如衆人傳曰至其祖也釋曰問者以大夫尊皆降旁親今怪其服故發問經不言大夫傳為大夫解之者以其言曽祖為士者故知對大夫下為之服明知曽孫是大夫女子子至未嫁釋曰此亦重出故次在男子曽孫下也但未嫁者同於前為曽祖父母今并言者女子子有嫁逆降之理故因巳嫁并言未嫁注言嫁至所降釋曰言嫁於大夫者明雖尊猶不降者以舉尊以見卑欲明適士者以不降可知也云成人謂年二十巳笄醴者也者以其云成人明據二十巳笄以醴禮之若十五許嫁亦笄為成人亦得降與出嫁同但鄭據二十不許嫁者而言之案上章為祖父母本無降理不須言不敢又女子子為祖父母傳亦不敢言降其祖父母傳不言不敢降其祖者至此乃言者謂曽祖輕尚不降況祖父母重者不降可知是舉輕以見重也云此著不降明有所降者案大功章女子子嫁者未嫁者為丗叔父母如此類是有所降也餘者皆不次大功至受者釋曰章次此者以其本服齊衰斬為殤死降在大功故在正大功之上義齊衰之下也不云月數者下文有纓絰無纓絰須言七月九月彼巳見月故於此略之且此經與前不同前期章具文於前杖章下不杖章直言其異者此殤大功章首為文略於正具文者欲見殤不成人故故前略後具亦見相參取義云無受者以傳云殤文不縟不以輕服受之注大功至沽之釋曰云大功布者其煆治之功粗沽之者斬粗皆不言布與功以其哀痛極未可言布體與人功至此輕可以見之言大功者斬衰章傳云冠六升不加灰則此七升言煆治可以加灰矣但粗沽而巳若然言大功者用功粗大故沽踈其言小者對大功是用功細小子女子子之長殤中殤注殤者至殤也釋曰子女子子在章首者以其父母於子哀痛情深故在前云殤者男女未冠笄者案禮記喪服小記云男子冠而不為殤女子笄而不為殤故知男女未冠笄而死可哀殤者女子子許嫁不為殤者女子笄與男子冠同明許嫁笄雖未出亦為成人不為殤可知兄弟之子亦同此而不別言者以其兄弟之子猶子明同於子故不言且中殤或從上或從下是則殤有三等制服唯有二等者欲使大功下殤有服故也若服亦三等則大功下殤無服故聖人之意然也傳曰至不哭也釋曰云何以大功也問者以成人皆期今乃大功故發問也云未成人也者答辭以其未成人故降至大功云何以無受也問者以其成人至葬後皆以輕服受之今喪未成人即無受故發問也云喪成人者其文縟巳下答辭遂因廣解四等之殤年數之別并哭與不哭具列其文但此殤次成人是以從長以及下與無服之殤又三等殤皆以四年為差取法四時榖物變易故也又以八歲巳上為有服七歲巳下為無服者案家語本命云男子八月生齒八歲齓齒女子七月生齒七歲齓齒今傳據男子而言故八歲巳上為有服之殤也傳必以三月造名始哭之者以其三月一時天氣變有所識䀎人所加憐故據名為限也云未名則不哭也者不止依以日易月而哭初死亦當有哭而巳注縟猶至庶也釋曰云其文數者謂變除之節也者成人之喪既葬以輕服受之又變麻服葛緦麻者除之至小祥又以輕服受之男子除於首婦人除於帶是有變除之數也今於殤人喪象物不成則無此變除之節數月滿則除之又云不樛垂者不絞帶之垂者凡喪至小斂皆服未成服之麻麻絰麻帶大功以上散帶之垂者至成服乃絞之小功巳下初而絞之今殤大功亦於小斂服麻散垂至成服後亦散不絞以示未成人故與成人異亦無受之類故傳云蓋不成也引雜記者證此殤大功有散帶要至成服則與成人異也云以日易月謂生一月者哭之一日也若至七歲歲有十二月則八十四日哭之此既於子女子子下發傳則唯據父母於子不關餘親云殤而無服哭之而巳者此鄭揔解無服之殤以日易月哭之事也云昆弟之子女子子亦如之者以其成人同是期與衆子同今經傳不言者以其亦猶子故也云凡言子者可以兼男女者謂若期章云子又云昆弟之子是子中兼男女也又云女子子者殊之以子關適庶關通也為子中通有長之適若然成人為之斬衰三年今殤死與衆子同者以其殤不成人與榖物未熟故同入殤大功也故別言子見斯義也王肅馬融以為日易月者以哭之日易服之月殤之期親則以旬有三日哭緦麻之親者則以三日為制若然哭緦麻三月喪與七歲同又此傳承父母子之下而哭緦麻孩子踈失之甚也叔父至中殤釋曰自此盡大夫庶子為適昆弟之長殤中殤皆是成人齊衰期長殤中殤殤降一等在功故於此揔見之又皆尊卑為前後次第作文也云公為適子大夫為適子皆是正統成人斬衰今為殤死不得著代故入大功特言適子者天子諸侯於庶子則絶而無服大夫於庶子降一等故於此不言唯言適子也若然二適在下者亦為重出其文故也注公君至如之釋曰云公君也者直言公恐是公士之公及三公與孤皆號公故訓為君見是五等之君故言諸侯言天子亦如之者以其天子與諸侯同絶宗故也其長殤至纓絰注絰有至無纓也釋曰絰之有纓所以固絰猶如冠之有纓以固冠亦結於頥下也五服之正無七月之服唯此大功中殤有之故禮記云九月七月之喪三時是也云絰有纓者為其重也者以經云九月纓絰七月不纓絰故知絰有纓為其情重故也自大功巳上絰有纓此鄭廣解五服有纓無纓之事但諸文唯有冠纓不見絰有纓之文鄭撿此經長殤有纓法則知成人大功巳上絰有纓明矣鄭知一條繩為之者見斬衰冠繩纓通屈一條繩屈之武垂下為故知此絰之纓亦通屈一條屬之絰垂下為纓可知小功巳下絰無纓也者亦以此經中殤七月絰無纓明小功五月巳下絰無纓可知大功至月者注受猶承也釋曰此成人大功章輕於前殤章既略於此具言傳曰至十一升注此受之至禮也釋曰云大功布九升小功布十一升者此章有降有正有義降則衰七升冠十升正則衰八升冠亦十升義則衰九升冠十一升十升者降小功十一升者正小功傳以受服不言降大功與正大功直言義大功之受者鄭云此受之下正據受之下發傳者明受盡於此義服大功以其大功至葬唯有變麻服葛因故衰無受服之法故傳據義大功而言也云又受麻絰以葛絰者言受衰麻俱受而傳唯發衰不言受麻以葛故鄭解之云又受麻以葛絰引間傳者證經大功既葬其麻絰受以小功葛者以其大功既葬變麻為葛五分去一大小與小功初死同即間傳云大功之葛小功之麻同一也故引之為證耳云凡天子諸侯卿大夫既虞士卒哭而受服者以於斬章釋訖言此者欲見天子七月而葬諸侯五月而葬虞而受服若然經正三月者以其天子諸侯絶旁期無此大功喪以此而言經言三月者主於大夫士三月葬者若然大夫除死月數亦得為三月也云此雖有君為姑姊妹女子子嫁於國君者非內喪也者彼國自以五月葬後服此諸侯為之自以三月受服同於大夫士故云主於大夫士也姑姊至人者釋曰此等並是本期出降大功故次在此傳曰至出也釋曰問之者以本期今大功故發問也注出必至之者釋曰案檀弓云姑姊妹之薄也蓋有受我而厚之者也鄭取以為説若然女子子出降亦同受我而厚之皆是於彼厚夫自為之禫杖期故於此薄為之大功從父昆弟注丗父至如之釋曰昆弟親為之期此從父昆弟降一等故次姑姊妹之下云其姊妹在室亦如之者義當然也謂之從父昆弟丗叔父與祖為一體又與己父為一體緣親以致服故云從也降於親兄第一等是其常故不傳問為人至昆弟釋曰在此者以其小宗之後大宗欲使厚於大宗之親故抑之在從父昆弟之下傳曰至昆弟也釋曰案下記云為人後者於兄弟降一等者故大功也若然於本宗餘親皆降一等也庶孫注男女至婦人同釋曰卑於昆弟故次之庶孫從父而服祖期故祖從子而服孫大功降一等亦是其常故傳亦不問也云男女皆是者女孫在室與男孫同其義然也引殤小功者欲見彼殤既男女同證此成人同不異也儀禮疏卷第三十一
