  text: 儀禮疏卷第二十九
  hash: sha256:54bca5b15c4ab87355ffd3fa07ab83c97cd1468f83fde913164c0c1e7e9782bf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_029-1a}
body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彥等撰父釋曰周公設經上陳其服下列其人即此文父巳下是為其人服上之服者也先陳父者此章恩義並設忠臣出孝子之門義由恩出故先言父也又下文諸侯為天子妻為夫妾為君之等皆兼舉著服之人於上乃言所為之人於下若然此父與君直單舉所為之人者餘者若直言天子臣皆為天子故舉諸侯也若直言夫則妾於君體敵亦有夫義妾為君若直言君與前臣為君文不殊巳外亦皆嫌疑故兼舉著服之人子為父臣為君二者無嫌疑故單舉所為之人而巳云傳曰為父何以斬衰也父至尊也者言何以者問比例以父母恩愛等母則在齊衰父則入於斬比並不例故問何以斬不齊衰答云父至尊者天無二日家無二尊父是一家之尊尊中至極故為之斬也諸侯為天子釋曰此文在父下君上者以下文君中雖言天子兼有諸侯及大夫此天子不兼餘君君中最尊上故特著文於上也傳曰天子至尊也釋曰不發問而直答之者義可知故直答而云天子至尊同於父也君釋曰臣為之服此君內兼有諸侯及大夫故文在天子下鄭注曲禮云臣無君猶無天則君者臣之天故亦同之於父為至尊但義故還著義服也注天子至曰君釋曰卿大夫承天子諸侯則天子諸侯之下卿大夫有地者皆曰君案周禮載師云家邑任稍地小都任縣地大都任疆地是天子卿大夫有地者若魯國季孫氏有費邑叔孫氏有郈邑孟孫氏有郕邑晉國三家亦皆有韓趙魏之邑是諸侯之卿大夫有地者皆曰君以其有地則有臣故也天子不言公與孤諸侯大國亦有孤鄭不言者詩云三事大夫謂三公則大夫中含之也但士無臣雖有地不得君稱故僕隸等為其長弔服加麻不服斬也父為長子釋曰君父尊外次長子之重故其文在此注不言至以長釋曰言長子通上下則適子之號唯據大夫士不通天子諸侯若言大子亦不通上下案服問云君所主夫人妻大子適婦鄭注云言妻見大夫巳下亦為此三人為喪主也則大子下及大夫之子不通士若言丗子亦不通上下唯據天子諸侯之子是以鄭云不言適子通上下非直長子得通上下冢子亦通上下故內則云冢子則大牢注云冢子猶言長子通於下也是冢子亦通上下也云亦言立適以長者欲見適妻所生皆名適子第一子死也則取適妻所生第二長者立之亦名長子若言適子唯據第一者若云長子通立適以長故也傳曰何至祖也釋曰云何以者亦是問比例以其俱是子不杖章父為衆子期此章長子則為之三年故發何以之傳也不問斬而問三年者斬重而三年輕長子非尊極故舉輕以問之輕者尚問明重者可知故舉輕以明重也云正體於上又乃將所傳重也者此是答辭也以其父祖適適相承為上己又是適承之於後故云正體於上云又乃將所傳重者為宗廟主是有此二事乃得三年云庶子不得為長子三年不繼祖也者此明適適相承故須繼祖乃得為長子三年也注此言至共廟釋曰云此言為父後者然後為長子三年者經云繼祖即是為祖後乃得為長子三年鄭云為父後者然後為長子三年不同者周之道有適子無適孫適孫猶同庶孫之例要適子死後乃立適孫乃得為長子三年是為父後者然後為長子三年也云重其當先祖之正體者解經正體於上又云又以其將代己為宗廟主也者釋經傳重也云庶子者為父後者之弟也者謂兄得為父後者是適子其弟則是庶子是為父後者之弟不得為長子三年此鄭據初而言其實繼父祖身三丗長子四丗乃得三年也云言庶者逺別之也者庶子妾子之號適妻所生第二者是衆子今同名庶子逺別於長子故與妾子同號也云小記曰不繼祖與禰此但言祖不言禰容祖禰共廟者案祭法云適士二廟官師一廟鄭注云官師中下之士祖禰共廟則此容祖禰共廟據官師而言若然小記所云祖禰并言者是適士二廟者也祖禰共廟不言禰直言祖舉尊而言也鄭注小記云言不繼祖禰則長子不必五丗者鄭前有馬融之等解為長子五丗鄭以義推之己身繼祖與禰通已三丗即得為長子斬長子唯四丗不待五丗也此微破先師馬融之義也以融是先師故不正言而云不必而巳也若然雖承重不得三年有四種一則正體不得傳重謂適子有廢疾不堪主宗廟也二則傳重非正體庶孫為後是也三則體而不正立庶子為後是也四則正而不體立適孫為後是也案喪服小記云適婦不為舅後者則姑為之小功鄭注云謂夫有廢疾他故若死而無子不受重者婦既小功不大功則夫死亦不三年期可知也為人後者釋曰此出後大宗其情本疏故設文次在長子之下也案喪服小記云繼別為大宗繼禰為小宗大宗即下文為宗子齊衰三月彼云後大宗者則此所後亦後大宗者也傳曰至若子釋曰云何以三年者以生己父母三年彼不生己亦為之三年故發問比例之傳也云受重者必以尊服服之者答辭也雷氏云此文當云為人後者為所後之父闕此五字者以其所後之父或早卒今所後其人不定或後祖父或後曽髙祖故闕之見所後不定故也云何如而可為之後問辭同宗則可為之後答辭此問亦問比類以其取後取何人為之答以同宗則可為之後以其大宗子當收聚族人非同宗則不可謂同承別子之後一宗之內若別宗同姓亦不可以其收族故也又云何如而可以為人後問辭云支子可也答辭以其他家適子當家自為小宗小宗當收斂五服之內亦不可闕則適子不得後他故取支子支子則第二巳下庶子也不言庶子云支子者若言庶子妾子之稱言謂妾子得後人適妻第二巳下子不得後人是以變庶言支支者取支條之義不限妾子而巳若然適子不得後人無後亦當有立後之義也云為所後者之祖父母巳下之親至若子謂如死者之親子則死者祖父母則當己曽祖父母齊衰三月也妻謂死者之妻即後人之母也妻之父母昆弟昆弟之子並據死者妻之父母妻之昆弟妻之昆弟之子於後人為外祖父母及舅與內兄弟皆如親子為之著服也若然上經直言為人後不言為父此經直言為所後者之祖父母及妻及死者外親之等不言死者緦麻小功大功及期之骨肉親者子夏作傳舉疏以見親言外以包內骨肉親者如親子可知妻為夫傳曰夫至尊也釋曰自此巳下論婦人服也婦人卑於男子故次之案曲禮云天子曰后諸侯曰夫人大夫曰孺人士曰婦人庶人曰妻后以下皆以義稱士庶人得其揔名妻者齊也婦人無爵從夫之爵坐以夫之齒是言妻之尊卑與夫齊者也若然此經云妻為夫者上從天子下至庶人皆同為夫斬衰也傳言夫至尊者雖是體敵齊等夫者猶是妻之尊敬以其在家天父出則天夫又婦人有三從之義在家從父出嫁從夫夫死從子是其男尊女卑之義故云夫至尊同之於君父也妾為君傳曰君至尊也釋曰妾賤於妻故次妻後案內則云聘則為妻奔則為妾鄭注云妾之言接聞彼有禮走而往焉以得接見於君子是名妾之義但其並后匹適則國亡家絶之本故深抑之別名為妾也既名為妾故不得名壻為夫故加其尊名名之為君也亦得接於夫又有尊事之稱故亦服斬衰也云君至尊也者既名夫為君故同於人君之至尊也注妾謂至亦然釋曰言不得體之加尊之也者以妻得體之得名為夫妾雖接見於夫不得體敵故加尊之而名夫為君是以服斬也云雖士亦然者案孝經士言爭友則屬隸不得為臣則士身不合名君至於妾之尊夫與臣為異是以雖士妾得稱夫為君故云雖士亦然也女子至為父注女子至許嫁釋曰自此盡為父三年論女子子為父出及在室之事制服又與男子不同云女子子者子女也別於男子也者男子女子各單稱子是對父母生稱今於女子別加一字故雙言二子以別於男一子者云言在室者關巳許嫁者鄭意經直云女子子為父得矣而別加在室者關巳許嫁關通也通巳許嫁內則女子十年不出又云十有五年而笄女子子十五許嫁而笄謂女子子年十五笄四德巳備許嫁與人即加笄與丈夫二十而冠同死而不殤則同成人矣身既成人亦得為父服斬也雖許嫁為成人及嫁要至二十乃嫁於夫家也布總至三年注此妻至無衽釋曰上文不言布不言三年至此言之者上以哀極故沒其布名與年月至此須言之故也以其笄既用箭則總不可不言用布又上文絰至練有除者此經三者既與男子有殊並終三年乃始除之矣案喪服小記云婦人帶惡笄以終喪彼謂婦人期服者帶與笄終喪此斬衰帶亦練而除笄亦終三年矣故以三年言之云此妻妾女子子喪服之異於男子者鄭據經上下婦人服斬者而言若然周公作經越妻妾而在女子子之下言之者雷氏云服者本為至情故在女子之下為文也若然經之體例皆上陳服下陳人此服之異在下言之者欲見與男子同者如前與男子異者如後故設文與常不例也以上陳服下陳人則上服之中亦有女子子今更言女子子是言其異者若然上文列服之中冠繩纓非女子所服此布總笄髽等亦非男子所服是以為文以易之也云謂之總者既束其本又總其末者鄭解此經云布總者只為出紒後垂為飾者而言以其布總六升與男子冠六升相對故知據出見者而言是以鄭云謂之總者既束其本又總其末也云箭笄篠竹也者案尚書禹貢云篠簜既敷孔云篠竹箭是箭篠為一也又云髽露紒也猶男子之括髮者髽有二種案士喪禮曰婦人髽于室注云始死婦人將斬衰者去笄而纚將齊衰者骨笄而纚今言髽者亦去笄纚而紒也齊衰以上至笄猶髽髽之異於括髮者既去纚而以髮為大紒如今婦人露紒其象也其用麻布亦如著幓頭然是婦人髽之制也二種者一是未成服之髽即士喪禮所云者是也將斬衰者用麻將齊衰者用布二者成服之後露紒之髽即此經注是也云斬衰括髮以麻則髽亦用麻者案喪服小記云斬衰括髮以麻免而以布男子髻髮與免用布有文婦人髽用麻布無文鄭以男子髻髮婦人髽同在小斂之節明用物與制度亦應不殊但男子陽以外物為名名為括髮婦人隂以內物為稱稱為髽為異耳鄭引漢法幓頭況者古之括髮其髽之狀亦如此故鄭注士喪禮云其用麻布亦如著幓頭也引喪服小記者彼男子冠婦人笄相對有二時一者男子二十而冠婦人許嫁而笄吉時相對也一者成服後男子喪冠婦人箭笄喪中相對也今此小記所云參上下文是據喪中冠笄相對而言引之者證經箭笄是與男冠相對之物也云男子免而婦人髽者亦小記之文此免既齊衰以下用布為免則髽是齊衰以下亦同用布為髽相對而言也但男子陽多變斬衰名括髮齊衰以下名免耳婦人隂少變故齊斬婦人同名髽案士喪禮鄭注云衆主人免者齊衰將袒以免代冠免之制未聞舊説以為如冠狀廣一寸亦引小記括髮及漢幓頭為説則括髮及免與髽三者雖用麻布不同皆如著幓頭不別若然成服以後斬衰至緦麻皆冠如著幓頭婦人皆露紒而髽也云凡服上曰衰下曰裳此但言衰不言裳婦人不殊裳者以其男子殊衣裳是以衰綴於衣衣統名為衰故衰裳並見案周禮內司服王后六服皆單言衣不言裳以連衣裳不別見裳則此喪服亦連裳於衣衰亦綴於衣而名衰故直名衰無裳之別稱也云衰如男子衰者婦人衰亦如下記所云凡衰外削幅以下之制如男子衰也云下如深衣者如深衣六幅破為十二闊頭鄉下狹頭鄉上縫齊倍要也云深衣則衰無帶下者案下記云衣帶下尺注云衣帶下尺者要也廣尺足以掩裳上際也今此裳既縫著衣不見裏衣故不須要以掩裳上際故知無要也云又無衽者又案下記云衽二尺有三寸注云衽所以掩裳際也彼據男子陽多變故衣裳別制裳又前三幅後四幅開兩邊露裏衣是以須衽屬衣兩旁垂之以掩交際之處此既下如深衣縫之以合前後兩邊不開故不須衽以掩之也案深衣云續衽鉤邊注云續猶屬也衽在裳旁者也屬連之不殊裳前後也鉤邊如今曲裾也彼吉服深衣須有曲裾之衽此婦人凶服之衰下連裳雖如深衣不得盡如深衣并有衽故鄭揔云下無衽則非直無喪服之衽亦無吉服深衣之衽也傳曰總至二寸釋曰云箭笄長尺吉笄尺二寸者此斬之笄用箭下記云女子子適人為父母婦為舅姑用惡笄鄭以為榛木為笄則檀弓南宮縚之妻之姑之喪云蓋榛以為笄是也吉時大夫士與妻用象天子諸侯之后夫人用玉為笄今於喪中唯有此箭笄及榛二者若言寸數亦不過此二等以其斬衰尺吉笄尺二寸檀弓南宮縚之妻為姑榛以為笄亦云一尺則大功以下不得更容差降鄭注小記云笄所以卷髮既直同卷髮故五服略為一節皆用一尺而巳是以女子子為父母既用榛笄卒哭之後折吉笄之首歸於夫家以榛笄之外無可差降故用吉笄也若然總不言吉而笄言之者以其喪中有用吉笄之法故小記無折笄之法當記文故小記折吉笄之首是也注總六至飾也釋曰云總六升者首飾象冠數也上云男子冠六升此女子子總用布當男子冠用布之處故同六升以同首飾故也十五升首飾尊故吉服之冕三十升亦倍於朝服十五升也云長六寸謂出紒後所垂為飾也鄭知者若據其束本入所不見何寸數之有乎故鄭以六寸據垂之者此斬衰六寸南宮縚妻為姑總八寸以下雖無文大功當與齊同八寸緦麻小功同一尺吉總當尺二寸與笄同也子嫁至三年釋曰不言女子子直云子嫁者上文巳云女子子別於男子此承上故不須具言直云子嫁是女子子可知直云反為父足矣而云反在父之室者以其出時父巳死初服齊衰不與在室同既服齊衰後反被出更服斬衰即與在室同故須言在室也言三年者亦有事須言以其初死服期服死後被出向父家更服斬衰三年與上在室者同故須言三年也注謂遭喪至適人釋曰鄭知遭喪後被出者若父未死被出自然是在室與上文同何須設此經明是遭喪後被七出者云始服齊衰者以其遭父喪時未出即不杖期麻屨章云女子子嫁為父母是也云出而虞則受以三年之喪受者若不被出則虞後以其冠為受嫁女在室為父五升衰裳八升總今未虞而出是出而乃虞虞後受服與在家兄弟同受斬衰斬衰初死三升衰裳六升冠既葬以其冠為受受衰六升冠七升此被出之女亦受衰裳六升總七升與在室之女同故云受以三年之喪受也云既虞而出則小祥亦如之者未虞巳前未被出至受後受以出嫁之受以八升衰裳九升總今既虞後乃被出至家又與在室女同至小祥練祭在室之女受衰七升總八升此被出之女與之同故云既虞而出小祥亦如之云既除喪而出則巳者此謂既小祥而出者以其嫁女為父母期至小祥巳除矣除服後乃被出不復為父更著服故云既除而出則巳也云凡女行於大夫巳上曰嫁行於士庶人者曰適人案齊衰三月章云女子子嫁者未嫁者為曽祖父母傳曰嫁者嫁於大夫未嫁者成人而未嫁者是行於大夫曰嫁不杖章云女子子適人者為其父母昆弟之為父後者傳雖不解喪服本文是士故知行於士庶人曰適人庶人謂庶人在官者府史胥徒名曰庶人至於民庶亦同行士禮以禮窮則同之行大夫以上曰嫁若天子之女嫁於諸侯諸侯之女嫁於大夫出嫁為夫斬仍為父母不降知者以其外宗內宗及與諸侯為兄弟者為君皆斬明知女雖出嫁反為君不降若然下傳云婦人不二斬猶曰不二天今若為夫斬又為父斬則是二天與傳違者彼不二天者以婦人有三從之義無自專之道欲使一心於其天此乃尊君冝斬不可以輕服服之不得以彼決此若然外宗內宗與諸侯為兄弟服斬者豈不為夫服斬乎明為君斬為夫亦斬矣公士至繩屨注士卿至其正釋曰云士卿士也者以其在公之下大夫之上尊卑當卿之位故知是卿士也不言公卿言士者欲見公無正職大夫又承副於卿士之言事卿有職事之重故變言士見斯義也云公卿大夫厭於天子諸侯故降其衆臣布帶繩屨者鄭解公卿大夫天子諸侯並言之者欲見天子諸侯下皆有公卿大夫公卿大夫下皆有貴臣衆臣若然天子諸侯下公卿大夫周禮典命及大宰具有其文此諸侯下公卿典命大國立孤一人是也以其諸侯無公故以孤為公卿燕禮云若有諸公則先卿獻之鄭注云諸公者大國之孤也孤一人言諸者容牧有三監是以其孤為公言厭於天子諸侯故除其衆臣布帶繩屨二事其餘服杖冠絰則如常也其布帶則與齊衰同其繩屨則與大功等也云貴臣得伸不奪其正者下傳云室老士貴臣故云貴臣得伸得伸者依上文絞帶菅屨故云不奪其正也傳曰公至菲也釋曰云室老士貴臣其餘皆衆臣也者傳以經直云衆臣不分別上下貴賤故云室老士二者是貴臣其餘皆衆臣也云有地者衆臣杖不以即位欲見公卿大夫或有地或無地衆臣為之皆有杖但無地公卿大夫其君卑衆臣為之皆得以杖與嗣君同即阼階下朝夕哭位若有地公卿大夫其君尊衆臣雖杖不得與嗣君同即阼階下朝夕哭位下君故也注室老至借也釋曰云室老家相也者左氏傳云臧氏老論語云趙魏老是家臣稱老云家相者案曲禮云大夫不名家相長妾以大夫稱家是室老相家事者也云士邑宰也者雜記云大夫居廬士居堊室鄭注云士居堊室亦謂邑宰也與此同皆謂邑宰為士也若然孤卿大夫有菜邑者其邑既有邑宰又有家相若魯三卿公山弗擾為季氏費宰子羔為孟氏之郕宰之類皆為邑宰也陽貨冉有子路之等為季氏家相亦名家宰若無地卿大夫則無邑宰直有家宰則孔子為魯大夫而原思為之宰是直有家相者也此等諸侯之臣而有貴臣衆臣之事案周禮載師云家邑任稍地小都任縣地大都任疆地是天子公卿大夫有菜地者也案鄭志答云天子之卿其地見賜乃有何由諸侯之臣正有此地則天子下有無地者也有菜地者有邑宰復有家相無地者直有家相可知云近臣閽寺之屬者周禮天子宮有閽人寺人閽人掌守中門之禁晨夜開閉墨者使守門者也寺人掌外內之通令奄人使守后之宫門者也是皆近君之小臣又與衆臣不同無所降其服又得與貴臣等不嫌相逼通也是以喪服小記云近臣君服斯服矣其餘從而服不從而稅彼亦是近君小臣與大臣異也云君嗣君也者釋傳云君服但其君以死矣更有君為死君之服故知是嗣君若然案王制畿內諸侯不丗爵而丗祿彼則天子公卿大夫未爵命得有嗣君者以丗祿降未得爵亦得為嗣君況其中兼畿外諸侯下卿大夫也且詩云維周之士不顯亦丗左氏傳云官有丗功則有官族皆是臣有丗功子孫得襲爵故雖畿內公卿大夫有嗣君也云繩菲今時不借也者周時人謂之屨子夏時人謂之菲漢時謂之不借者此凶荼屨不得從人借亦不得借人皆是異時而別名也儀禮疏卷第二十九
