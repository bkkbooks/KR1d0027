  text: 儀禮䟽卷第二十
  hash: sha256:e3cb87fbf17e4a3944b63b15c6133a22332a6f7abc49080216e6309da752be24
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_020-1a}
body:
  text: 唐朝散大夫行太學博士引文館學士臣賈公彦等撰夫人至有蓋注竹簋至方耳釋曰自此盡以賔入論夫人勞賔之事夫人勞使下大夫者降于君故不使卿凡簋皆用木而圎受斗二升此則用竹而方故云如簋而方受斗二升則同如今寒具筥者寒具若籩人先鄭云朝事謂清朝未食先進寒具口實之籩實以冬食故謂之寒具筥圎此方者方圎不同爲異也案玉人云案十有二棗栗十有二列諸侯純九大夫純五夫人以勞諸侯彼有玉案者謂王后法有玉案并有竹簋以盛棗栗故彼引此爲證此諸侯夫人勞卿大夫故無案直有竹簋以盛棗栗其實至以進注兼猶至執栗釋曰云兼猶兩者謂一人執兩事知右手執棗左手執栗者見下文云賔受棗大夫二手授栗則大夫先度右手乃以左手共授栗便也明知右手執棗可知必用右手執棗先度之者鄭注士虞禮云棗美故用右手執棗也注受授至之也釋曰初兩手俱用旣受棗不共授栗游暇一手不愼也今右手授棗訖即共授栗不游手爲謹愼也儐之至賔入注出以至不拜釋曰云出以束錦授從者因東面釋辭請導之者儐下大夫如前有束錦則此大夫亦受得束錦經言遂以賔入明知有辭請導之雖無文鄭以意言之大夫在西明出時授束錦與己從者乃得因東面釋請導之辭也云然則賔送不拜者以其云遂以賔入即從之明賔送不拜謂若公食大夫使人戒賔不拜送遂從之其類也案上君使士請遂以賔入鄭云因導之鄭不言賔送不拜者士請事空手無幣賔亦不儐請導賔賔從入無再拜送之理故鄭不言賔送不拜此大夫勞儐與卿同有拜送之理故云賔送不拜也覲禮大夫勞侯氏侯氏即從大夫入拜送大夫天子使尊故雖從亦拜送與此異至于至俟矣釋曰自此盡俟閒論賔初至主君請行聘禮賔又請俟閒之事云至于朝者鄭云賔至外門者外門即諸侯之外朝故下云以柩造朝亦謂大門外爲外朝也云下大夫入告出釋此辭者此下大夫即夫人勞賔導賔入者也云明至欲受之不敢稽賔案覲禮云侯氏遂從之天子賜舎鄭云且使即安不即言欲受之者彼天子以諸侯爲臣故使且安此鄰國聘賔不臣人之臣故言不敢稽賔也云遷主所在曰祧者此揔解天子諸侯稱祧也云周禮天子七廟文武爲祧者案周禮大宗伯序官守祧職云奄八人鄭注云逺廟曰祧又守祧職云掌守先王先公之廟祧鄭注云廟謂大祖之廟及三昭三穆遷主所藏曰祧先公之遷主藏于后稷之廟先王之遷主藏于文武之廟云奄八人廟有一奄周立七廟通姜嫄廟爲八故奄八人祭法鄭注云祧之言超也超上去意也不毀之也云遷主所藏曰祧天子有二祧以藏遷主諸侯無二祧遷主藏于大祖廟故此名大祖廟爲祧也云旣拚者少儀云埽席前曰拚拚者埽除之名云諸侯五廟王制與祭法文云則祧始祖是亦廟也言祧者祧尊而廟親侍賔客者上尊者下文迎賔於大門揖入及廟門受賔聘享皆在廟此云先君之祧明下云廟是大祖廟可知是以於大祖廟受聘享尊之若饗食則於禰廟燕又在寢彌相親也此鄭義若孔君王肅則以髙祖之父及祖爲二祧非鄭義也賔曰俟閒注賔之至聞命釋曰此鄭以意解之上文以意解主君不欲稽留於賔此經解賔意不欲奄卒主人故云俟閒必知有齊戒沐浴者案玉藻云將適公所宿齊戒沐浴彼謂臣見己君入廟必須齊戒沭浴此有齊戒沐浴可知也云未敢聞命者謂不腆先君之祧旣拚以俟之命不敢聞之也大夫至致館注致至至之也釋曰自此盡送再拜論主君遣卿致館之事云賔至此館主人以上卿禮致之者案覲禮云侯氏遂從之天子賜舍辭曰賜伯父舎侯氏再拜稽首受儐之束帛乗馬注云王使人以命致館無禮猶儐之者尊王使也無禮謂無束帛此云以上卿禮明有束帛致亦可知若然有禮則稱致覲禮不稱致無禮故也案司儀云諸公相爲賔主君郊勞云三辭拜受拜受謂拜受幣又云致館亦如之鄭云使大夫授之君又以禮親致焉亦是有幣可知又云諸侯諸伯諸子諸男之相爲賔也各以其禮相待也如諸公之儀是五等相待致館同有幣矣天子待諸侯無幣則其臣來無幣可知據此文侯伯之卿聘郊勞致館有幣則五等待臣皆同有幣也司儀諸侯之臣相爲國客亦皆有幣與此同若諸侯遣大夫小聘曰問下云小聘曰問不享有獻不及夫人不筵几不禮面不升不郊勞注云記貶於大聘所以爲小也獻私獻也面猶覿也雖不言不致館略之耳亦不致也又諸臣朝覲天子天子無禮以致猶儐尊王使又五等自相朝主國皆有禮皆有儐故司儀云賔繼主君皆如主國之禮鄭玄謂繼主君者儐主君也儐之者主君郊勞致館饔餼還圭贈郊送之時也此等皆主君親致館又云致館亦如之亦如郊勞時亦有儐矣以此言諸臣致者皆有儐也若諸侯遣卿大夫聘王國有用幣致館無儐也故司儀云諸公之臣相爲國客致館如初之儀鄭注云如郊勞也不儐耳是也賔迎至再拜注卿不至禮也釋曰云賔迎再拜者賔在館如主人故先拜也卿不言荅拜荅拜可知但文略耳雖不言入言迎則入門可知言卿致命者亦東面致君命也云卿不俟設飱之畢以不用束帛致故也者下直云宰夫朝服設飱不言致則此卿致館兼致飱矣致館有束帛致飱空以辭致君命無束帛者案下記云飱不致鄭注云不以束帛致命草次饌飱具輕若然卿以空拜致飱旣即退不待宰夫設畢也以不用束帛致故也云非大禮也者對下聘日致饔鄭云急歸大禮也若然此侯伯之卿禮其公之臣亦以幣帛致案司儀云諸公之臣相爲國客致館如初之儀鄭注云不言致飱者君於聘大夫不致飱也聘禮曰飱不致賔不拜是也其子男之臣不致可知又案司儀云君親致館至於致飱如致積之禮鄭注云俱使大夫禮同也以此言之致館致飱似別人者但致積在道致飱在館所致別人若致館與致飱同時致館者兼致飱無嫌也言俱使大夫者言積與飱同使大夫決君不親之義何妨致館與致飱一人也其臣致飱無幣其五等諸侯致飱則有幣案司儀諸侯相於致飱如致積致積有幣知致飱亦有幣也宰夫朝服設飱注食不至謂是釋曰云食不備禮曰飱者對饔餼也生與腥飪俱有餘物又多此飱唯有腥飪而無生餘物又少故云不備禮也引詩傳者案詩云彼君子兮不素飱兮毛云熟食曰飱鄭云讀如魚飱之飱則詩飱與傳魚飱同是直食魚與飯爲飱彼少牢小禮中不備此則兩大牢大禮中不備不備是同故引證一邊不備其實禮有異也春秋傳曰方食魚飱者案宣六年經書晉趙盾衞孫免侵陳公羊傳曰趙盾弑君此其復見何親弑君者趙穿也親弑君者趙穿則曷爲加之趙盾不討賊也復國不討賊此非弑君如何趙盾之復國奈何靈公爲無道靈公使膳宰以熊膰不熟公殺之盾入諫公見盾再拜盾拜稽首歸公使勇士某者往殺之勇士入門不見人闚其户方食魚飱勇士曰嘻子誠仁人也是子之儉也吾不忍殺子也雖然吾不可復見吾君矣遂刎頸而死是魚飱之事飪一至鼎七注中庭至曰陪釋曰云中庭之饌也者對下文是堂上及門外之饌也云象春秋也者腥之言生象春物生飪熟也象秋物有成熟故云象春秋也云鼎西九東七者九謂正鼎九牛羊豕魚腊腸胃膚鮮魚鮮腊東七者腥鼎無鮮魚鮮腊故七云凡其鼎實與其陳如陳饔餼者如其死牢故掌客云諸侯之禮饔餼九牢七牢五牢其死牢如飱之陳凡介行人皆有飱饔餼此則如介禮也是飱之死牢與饔餼死牢實與飱陳同亦於東階西階也云羞鼎則陪鼎也知是一物者此云羞鼎下饔餼言陪鼎故知一也陪鼎三則下云膷臐膮是也堂上至夾六注八六至饔餼釋曰堂上與西夾所陳六八非一知六八是豆者凡設饌皆先設豆乃設餘饌故鄭云凡饌以豆爲本無妨六八之内兼有餘饌故鄭言簋鈃之等也凡鄭所云皆約饔餼故云亦如饔餼也鄭必約與陳饔餼同者以其陳鼎饔餼同故知餘亦同也門外至十車注禾槀至門西釋曰諸侯之禮車米視生牢禾視死牢牢皆十車者案掌客云上公之禮飱五牢饔餼九牢其死牢如飱之陳牽四牢車米死生牢牢十車車秉有五籔車禾視死牢牢十車侯伯飱四牢饔餼七牢其死牢如飱之陳牽三牢子男飱三牢饔餼五牢其死牢如飱之陳牽二牢皆米視生牢牢十車禾視死牢牢十車是其義也云大夫之禮皆視死牢而巳雖有生牢不取數焉者知然者見下歸饔餼五牢饔三牢餼二牢饔三牢死牢也門外米禾皆三十車與死三牢同不取餼二牢生之數故知義然也云米陳門東禾陳門西者此亦約下歸饔餼知之上皆云陳如饔餼此不云如饔餼者至下經與薪芻并云凡此之陳亦如饔餼是也上介至倍禾注西鼎至鮮腊釋曰六者與賔西夾數同但言堂則西夾無矣云西鼎七無鮮魚鮮腊者此亦約饔餼時賔飪鼎數故下文賔腥鼎七無鮮魚鮮腊此亦鼎七故知無鮮魚鮮腊也衆介皆少牢注亦飪至無簠釋曰知亦飪者依上介知然知鼎五者以賔九上介七衆介當五降殺以兩又約少牢五鼎此亦少牢故知亦五鼎也知鼎實有羊豕魚腊與腸胃者以上介無鮮魚鮮腊此又無牛故從羊豕以下數之得五案少牢有膚此無者生人食與祭異故玉藻朔月少牢五俎亦云羊豕魚腊腸胃不數膚也案上注皆不言新至尚熟於此言之者上文賔與上介皆言飪一牢在西下歸饔餼亦言飪一牢在西此衆介直言少牢不言飪下文歸饔餼亦直言餼一牢無飪恐衆介飱饔前後皆無飪故特言之新至尚熟對後無饔直有餼不尚熟也必知少牢是飪者承上介一牢飪知此亦飪云堂上之饌四豆四簋兩鈃四壷無簠知數如此者以賔與上介降殺以兩故然也知無簠者以賔簠有二曲禮云歳凶大夫不食粱非歳凶大夫食粱粱大夫常食大夫禮多與賔同簠盛稻粱則上介亦二簠與賔同士非直不合食粱差降亦無簠也厥明至于館注此訝至皮弁釋曰自此盡毎曲揖論將行聘禮主君迎賔向廟之事云此訝下大夫也者案周禮有掌訝中士八人爲之此訝下大夫非彼掌訝也案下記云卿大夫訝大夫士訝士皆有訝又周禮掌訝云凡賔客諸侯有卿訝卿有大夫訝大夫有士訝士皆有訝此大聘是卿故使下大夫訝也天子諸侯雖有掌訝之官朝聘之賔不使掌訝爲訝直以尊卑節級爲訝故云此訝下大夫也言以君命迎者凡舉事皆以承君命故知迎賔待君命也云亦皮弁者下文君及賔皮弁明此大夫亦皮弁服也賔皮至于次注服皮至爲之釋曰云服皮弁者朝聘主相尊敬也者周禮大行人諸侯朝天子各服冕服廟中將幣三享覲禮亦云侯氏裨冕在廟覲天子此諸侯待四方朝聘皆皮弁者入天子廟得申其上服入己廟不可以冕服又不可服常朝之服故服天子之朝服諸侯以爲視朔之服在廟待朝聘之賔是相尊敬故也知此皮弁是諸侯視朔服者以其玉藻云諸侯皮弁以聽朔於大廟是也云次在大門外之西以帷爲之者下記云宗人授次次以帷少退于君之次以賔位在西故知也乃陳幣注有司至而俟釋曰有司入于主國廟門外者案下文行聘時幣在主國廟門外知在此也知有幕者以言陳幣如展幣明亦布幕陳幣也云圭璋賈人執櫝而俟者案下文云賈人東面坐啓櫝取圭鄭注賈人郷入陳幣東面俟於此言之就有其事也是也卿爲至請事注擯謂至無擯釋曰此擯陳在主國大門外主君之擯與賔之介東西相對南北陳之云其位相承繼而出也者從門向南陳爲繼而出云主君公也則擯者五人侯伯也則擯者四人子男也則擯者三人者案周禮大行人天子待諸侯云上公之禮擯者五人侯伯之禮擯者四人子男則擯者三人今以諸侯待聘賔用天子待己之擯數者以諸侯自相待無文鄭以意解之但天子尊得分辨諸侯尊卑以待之諸侯卑降天子不敢分辨前人故據己國大小而爲擯數且春秋又有大國朝焉小國聘焉又有卿出並聘之事則小國有朝大國法無大國下朝小國之禮若相聘問大小皆得若然待其臣據此文與待君等天子待諸侯之臣亦冝與君同也又案周禮大宗伯爲上擯小行人爲承擯覲禮嗇夫爲末擯若待子男三人足矣若侯伯少一人待上公少二人一人二人皆以士充數也引聘義者案彼鄭注質謂正自相當故設擯介通情乃相見是敬之至引之者證須擯介之意也云旣知其所爲來之事者在道巳遣士請事大夫問行郊勞致館之等是足知來事矣云復請之者賔來當與主君爲禮爲其謙不敢斥尊者啓發以進之者亦解所以立擯介通情及進相見之義也云於是時賔出次直闑西北面者案玉藻云君入門介拂闑大夫中棖與闑之閒士介拂棖此謂朝君又云賔入不中門此謂聘賔云不中門則此闑西北面者若然聘賔入門還依作介入時同亦拂闑也云上擯在闑東閾外西面者主位在東故賔在闑西上擯在闑東以擯位並門東西面故上擯亦西面向君也云其相去也公之使者七十歩侯伯之使者五十歩子男之使者三十歩者此依大行人云諸侯之卿其禮各下其君二等鄭注云所下者介與賔主之閒是以歩數與介數亦降二等也云此旅擯耳者案司儀云三問旅擯鄭云旅陳陳擯介不傳辭故鄭此云不傳命也若然上注下注皆引聘義云介紹而傳命者若交擯傳命則是賔介傳命此旅擯傳命者直是賔來至末介下對上擯傳本君之命也其介相紹繼則交擯旅擯同唯傳命不傳辭有異矣是以司儀云及將幣交擯鄭注亦引聘義介紹而傳命爲證以其皆是相連繼於位也云上介在賔西北東面承擯在上擯東南西面此謂賔直闑西北面主君在門内南面列位時云西北東南者據賔西北望上介介仍向正北陳之矣上擯東南望承擯等仍向正南陳之矣不謂介西北邪陳擯東南向邪陳也云各自次序而下者賔之介或七或五或三從南向北次序上次下至末介主人之擯或五或四或三從承擯向南上次下至末擯也東西相去三丈六尺云上擯之請事進南面揖賔俱前者謂上擯入向公前北面受命出門南面遥揖賔使前擯者漸南行賔至末介北東面上擯至末擯南西面東西相去亦三丈六尺云止揖而請事者二人俱立定乃揖而請所爲來之事云還入告于公者賔對訖上擯入告公公乃有命納賔也云天子諸侯朝覲乃命介紹傳命耳者此引聘義文自此以下論天子諸侯交擯法云紹者亦謂使介相紹繼以傳命傳命即擯介相傳賔主之命也此交擯謂在大門外初未迎賔時案曲禮注春夏受摯於朝受享於廟秋冬一受之於廟覲禮天子不下堂而見諸侯則秋冬受贄受享皆無迎法無迎法則無此交擯之義若春夏受贄於朝無迎法受享於廟則迎之故大行人云廟中將幣三享鄭注朝先享不言朝者朝正禮不嫌有等也是正朝無迎法若然覲禮無迎法此云朝覲彼言覲者覲雖無迎法饗食則有迎法故齊僕云朝覲宗遇饗食皆乗金路其法儀各以其等爲車送逆之節故連覲也云其儀各郷本受命反面傳而下者雖言各郷本受命非一時之事先上擯入受命出傳與承擯承擯傳與末擯此是上擯郷本受命反面傳而下末介向末擯邊受命傳與次介次介傳與上介上介傳與賔是及其末則郷受之反面傳而上也云又受命傳而下亦如之者此乃發賔傳向主君一如前發主君傳而向下故云亦如之如此三迴爲交擯三辭此則司儀云諸公相爲賔交擯三辭者也諸侯伯子男相爲賔如諸公之儀其交擯則同也云此三丈六尺者此則却計前云相去三丈六尺云門容二徹參个者冬官匠人云天子五門匠人直計應門直舉應門則臯庫雉亦同云二徹參个者轍廣八尺參个三八二十四門容二丈四云傍加各一歩也者此無正文但人之進退周旋不過再舉足一歩故門傍各空一歩丈二添二丈四尺爲三丈六尺注公不至皆裼釋曰云降于待其君也者案司儀諸公相爲賔公皮弁交擯車迎拜辱出大門此於門内是降於待其君也云從大夫揔無所別也者春秋之義卿稱大夫王制云上大夫卿是揔無別也云於是賔主人皆裼者案玉藻云不文飾也不裼又云執龜玉襲下文行聘時執玉賔主人皆襲此時未執玉正是文飾之時明賔主人皆裼也賔入門左注由賔至相君釋曰知衆介隨入北面西上少退者約下文入廟行聘享時衆介入廟隨賔入門左相北面西上少退不敢與賔齊也知擯者亦入門而右北面東上者亦約衆介統於賔北面西上明擯者北面東上亦約朝君揖位亦北面東上而知之也知上擯進相君者郷黨云君召使擯鄭云有賔客使迎之彼據初迎賔時至於入門之後毎事皆上擯相君也公再拜注南面拜迎釋曰知君南面者經雖不見君面位主君尊於外國臣猶南面故郊特牲云君之南郷荅陽之義故知君南面也注不敢當其禮釋曰云不敢當其禮者以卿奉君命使不敢賔辟當相酬亢之禮故不荅拜直逡遁而巳公揖至曲揖注每門至之擯釋曰諸侯三門臯應路則應門爲中門左宗廟右社稷入大門東行即至廟門其閒得有毎門者諸侯有五廟大祖之廟居中二昭居東二穆居西廟皆別門門外兩邊皆有南北隔牆隔牆中夾通門若然祖廟巳西隔牆有三則閤門亦有三東行經三門乃至大祖廟門中則相逼入門則相逺是以每門皆有曲有曲即相揖故毎曲揖也是以司儀亦云每門止一相亦據閤門而言也云以相人偶者以人意相存偶也云凡君與賔入門賔必後君者以賔主不敵是以玉藻云於異國之君稱外臣某故知聘賔後於主國君也言凡者非直聘享向祖廟若饗食向禰廟燕禮向路寢皆當後於主君故言凡以廣之云介及擯者隨之並前而鴈行者言並上擯與上介並次擯與次介並末擯與末介並各自鴈行於後也云旣入則或左或右者東行賔介於左君擯於右也云相去如初者初謂大門外相去三丈六尺也玉藻曰君入門介拂闑大夫中棖與闑之閒士介拂棖鄭注云此謂兩君相見也君入必中門上介夾闑大夫介士介鴈行於後示不相㳂也君若迎聘客擯者亦然又云賔入不中門不履閾鄭注云辟尊者所從也此經謂聘客鄭君并引朝君欲見卿大夫聘來還與從君爲介時入門同故并引之也云君入門介拂闑又云門中門之正又云卑不踰尊者之迹若然聊爲一闑言之君最近闑亦拂之而過上介則隨君而行拂闑而過所以與君同行者臣自爲一列主君旣出迎賔主君與賔並入主君於東闑之内賔於西闑之内並行而入上介於西闑之外上擯於東闑之外皆拂闑次介次擯皆大夫中棖與闑之閒末介末擯皆士各自拂棖如是得君入中門之正上擯上介俱得拂闑又得不踰尊者之迹矣又云賔入不中門者此謂聘賔大聘大夫故鄭卿大夫並言入門之時還依與君爲介來入相似賔入還拂闑故上注賔自闑西擬入時拂闑西故也云門中門之正也者謂兩闑之閒云卑不踰尊者之迹者士以大夫爲尊大夫以上介爲尊上介以君爲尊也云賔之介猶主人之擯者欲見擯介鴈行不別也及廟至中庭注公揖至俟之釋曰自此盡公裼降立論行聘之事云公揖先入省内事也者曲禮云請入爲席彼卿大夫士禮是以鄭注云雖君亦然省内事即請入爲席之類也云如此得君行一臣行二於禮可矣者言得君行一臣行二者案下文三揖言之初揖注云將曲揖謂在内霤之閒住主君先立無過近於内霤閒若然去門旣近去階又逺也以此不得君行一臣行二下文受玉于東楹之閒彼得爲君行一臣行二矣下文又云公升二等賔升君階七等君升二等賔升一等巳上仍有五階亦不得爲君行一臣行二與此同欲見君行近臣行逺之義皆據大判而言不可細分之矣言於禮可者以其尊者冝逸卑者冝勞故言於禮可也云公迎賔於大門内卿大夫以下入廟門即位而俟之者上初命拜迎賔于館之時卿大夫士固在朝矣及賔來大門外陳介之時主君之擯亦在大門外之位君在大門内時其卿大夫不以無事亂有事當於廟中在位矣必知義然當見行事之時公授宰玉又云士受皮又云宰夫授公几皆是於外無事在廟始有事更不見此官等命入廟之文明君未入廟時此官巳在位而俟公食大夫以其官各具饌物皆有事不預入廟故公迎賔入後乃見卿大夫以下之位與此異也賔立接西塾注接猶至於士釋曰云門側之堂謂之塾者爾雅釋宫文云立近塾者己與主君交禮將有出命俟之於此者對在大門外時未與主君交禮直使擯傳命故去門七十歩五十歩三十歩此將與君交禮故近門也云於此介在幣南北面西上者以上文入竟展幣時布幕賔西面介北面東上統於賔今此陳幣賔在門西北面明介北面西上統於賔也云上擯隨公入門東東上少進於士者案下几筵旣設擯者出請命更不見上擯別入之文明隨公入可知也知門東有士者案公食云士立于門東北面西上鄭云統於門者非其正位也故知此亦然以擯者是卿又相君故知進於士在士前也几筵至請命注有几至彫几釋曰云有几筵者以其廟受冝依神也者此對不在廟受不几筵故下云聘遭喪入竟則遂也不郊勞不几筵注云致命不於廟就尸柩於殯宫又不神之下小聘不几筵注云記貶於聘是以記云唯大聘有几筵覲禮不云几筵文不具也又案曲禮注春夏受摯於朝受享於廟秋冬一受之於廟諸侯無此法四時皆在於廟亦無四時朝覲之別名同皆曰朝也云賔至廟門司宫乃于依前設之神尊不豫事也者此對公食宰夫設筵加席几而後迎賔彼食禮與此異也知在扆前者案司几筵云大朝覲大饗射王位依前南郷設筵几覲禮亦云依前諸侯亦然爾雅釋宫云牖户之閒謂之扆但天子以屏風設於扆諸侯無屏風爲異席亦不同也云至此言命事彌至言彌信也者上入竟士請事近郊下大夫請行皆是謙問不敢以必來之己國不正言之至此事益至言則信矣故正問之而言請命是其事至言信矣云周禮至彫几者周禮司几筵文彼諸侯祭祀席三重上更有加莞筵紛純不引之者文略可知引之者證此所設者設常祭祀之席也賈人至上介注賈人至繫也釋曰賈人郷入陳幣東面俟於此言之就有事也者上云賔入次乃陳幣在門外不言者彼賈人未有事今此有事故就此言面位以此東面明初亦東面矣故舉此明前東面也云授圭不起賤不與爲禮也者以賈人是庶人在官者故云賤不與爲禮爲禮當起而授也云不言裼襲者賤不裼也者若不賤以垂繅當裼以賤故不裼也云繅有組繫也知有組者下記云所以朝天子圭與繅皆九寸問諸侯朱緑繅八寸皆玄纁繫長尺絢組是也上介至授賔注上介至則襲釋曰上介裼於賈人處垂繅受得圭而不襲者鄭云以盛禮不在於己故也以賔執圭升堂致命爲盛禮在己者也云上介北面受圭進西面授賔者以上介本位北面故北面受圭賔東面故上介西面授賔引曲禮者彼記人據此絢組尺爲繅藉不據韋皮衣木版畫以五采之繅藉也云執玉其有藉者則裼據此賈人垂繅以授上介上介不襲受之時也云其無藉者則襲者據此上介屈繅以授賔賔襲受之時也記人直記裼襲之義不論盛禮在己之意故各舉一邊而言也賔襲執圭注執圭至襲也釋曰云執圭盛禮者玉藻云執玉龜襲注重寶瑞也若然云盛禮者以其圭瑞以行禮故爲盛禮也云又盡飾爲其相蔽敬也者玉藻又云君在則裼盡飾也注云臣於君所今聘賔於主君亦是臣於君所合裼以盡飾今旣執圭以瑞爲敬若又盡飾而裼則掩蔽玉之敬故不得裼也云服之襲也充美也者彼注云充猶覆也是故尸襲者爲尸尊故去飾也不裼云執玉龜襲也者彼注云重寶瑞也以龜玉爲寶瑞若裼則盡飾爲蔽敬故引之證不裼也擯者至辭王注擯者至尊讓釋曰知擯是上擯者案上相禮者皆上擯故知此亦據上擯云圭贄之重者大宗伯云以玉作六瑞君之所執又云以禽作六贄臣之所執揔而言之皆是贄故左氏傳云男贄不過玉帛禽鳥但君之所執爲贄之重者也云辭之亦所以致尊讓也致尊讓郷飲酒義文彼爲賔主三辭三讓是致尊讓此辭玉亦是致尊讓之事故引之爲證也案文公十二年左氏傳云秦伯使西乞術來聘襄仲辭玉賔對曰不腆敝器不足辭也彼主人無三辭者文不具亦當三辭也納賔賔入門左注公事自闑西釋曰案玉藻云公事自闑西注云聘享也又云私事自闑東注云覿面也故鄭引之以證此入門左是聘享賔入自闑西入門左也介皆至西上注隨賔至無門釋曰案司儀云諸公之臣相爲國客及將幣毎門止一相及廟唯君相入注云唯君相入客臣也相不入矣此介皆入不同者彼云每門止一相鄭云絶行在後耳非是全不入廟又云唯君相入者謂前相君禮須入故言之臣相不前相禮故不言入其實皆入與此同也三揖注君與至碑揖釋曰前云公揖入立于中庭三分庭一在南賔後獨入得云入門將曲揖者謂公先在庭南面賔旣入門至碑曲揖賔旣曲北面賔又揖主君揖主君二者皆向賔揖之再揖訖亦主君東面向堂塗北行當碑乃得賔主相向而揖是以得君行一臣行二非謂賔入門時主君更向内霤相近而揖若然何得云君行一臣行二也公升二等注先賔至行二釋曰諸侯階有七等公升二等在上仍有五等而得云君行一臣行二者但君行少臣行多大判而言非謂即君行一臣行二此文出齊語晏子辭擯者退中庭注郷公至相也釋曰上文公揖入立于中庭今公與賔升堂云擯者退中庭此文與君立中庭同故云郷公所立處公左還北郷注當拜釋曰言左還北郷者公升受賔致命時西郷以左手郷外迴身北面乃拜故云當拜擯者進注進阼至拜也釋曰知阼階西者以其擯者在中庭公立處直言進則進至阼階西不得更向阼階前亦不可更進西階故知進阼階西釋辭於賔復得相公拜也公當楣再拜注拜貺至賜也釋曰拜貺之言文出聘義彼云北面拜貺拜君命之辱是也賔三退負序注三退至授之釋曰案上文賔入門公再拜賔辟不荅拜又下文云賔訝受几於筵前公一拜送賔以几辟皆言辟此不言辟故決之也案司儀云諸公之臣相爲國客及將幣客登拜客三辟授幣注云客三辟三退負序也者彼諸公之臣相聘之禮與侯伯之卿聘於鄰國之禮少異故也公側至之閒注側猶至行二釋曰云佗日公有事必有賛爲之者案大射云公卒射小臣正賛襲是其賛爲之也云凡襲於隱者案士喪禮小斂主人袒于戸内襲于序東喪禮遽於事尚襲於序東況吉事乎明知襲於隱者也云公序坫之閒可也者士喪襲于序東謂於堂東地上此則公在堂上堂東南角爲坫鄭以意斟酌隱處無過於序東坫北可也無正文故云可也云中堂南北之中也入堂深尊賔事也者凡廟之室堂皆五架棟南北皆有兩架棟北一架下有壁開戸棟南一架謂之楣則楣北有二架楣南有一架今於當楣北面拜訖乃更前北侵半架於南北之中乃受玉故云南北之中乃入堂深尊賔事故也云東楹之閒亦以君行一臣行二者兩楹之閒爲賔主處中今乃於東楹之閒更侵東半閒故云君行一臣行二也公側授宰玉注使藏至序端釋曰鄭知授於序端者凡公授受皆於序端是以下云公升側受几于序端故知此亦授于序端也裼降立注裼者至作賜釋曰云裼者免上衣見裼衣者案玉藻云君衣狐白裘錦衣以裼之注云君衣狐白毛之裘則以素錦爲衣覆之使可裼也袒而有衣曰裼必覆之者裘䙝也詩云衣錦絅衣裳錦絅裳然則錦衣復有上衣明矣天子狐白之上衣皮弁服與凡裼衣象裘色也若然凡服四時不同假令冬有裘儭身褌衫又有襦袴襦袴之上有裘裘上有裼衣裼衣之上又有上服皮弁祭服之等若夏則以絺綌絺綌之上則有中衣中衣之上復有上服皮弁祭服之等若春秋二時則衣袷褶袷褶之上加以中衣中衣之上加以上服也言見裼衣者謂袒衿前上服見裼衣也故玉藻云裘之裼也見美也襲者奄之故玉藻云襲充美是也云凡當盛禮者以充美爲敬非盛禮者以見美爲敬禮尚相變也者玉藻云執龜玉襲是禮之盛者充美爲敬玉藻又云君在則裼盡飾也是非盛禮者以見美爲敬據此二者是禮尚有相變也引玉藻者證禮不盛者以裼見美也又曰麛裘青豻褎絞衣以裼之引論語素衣麛裘又云皮弁時或素衣其裘同可知也鄭并引二文者欲見諸侯與其臣視朔與行聘禮皆服麛裘但君則麛裘還用麛褎臣則不敢純如君麛裘則青豻褎裼衣君臣亦有異時若在國視朔君臣同素衣爲裼故郷黨云素衣麛裘彼一篇是孔子行事鄭兼見君臣視朔之服是其君臣同用素裼可知若聘禮亦君臣同用麛裘但主君則用素衣爲裼使臣則用絞衣爲裼是以鄭揔云皮弁時或素衣其裘同可知也言或素衣者在國則君臣同素衣聘時主君亦素衣唯臣用絞衣爲裼也依雜記云朝服十五升布皮弁亦天子朝服與諸侯朝服同用十五升布亦同素積以爲裳白舄臣用白屨也云裘者爲温表之爲䙝者案月令云孟冬天子始裘是裘爲温云表之者則裼衣是也裼衣象裘色復與上服色同也云凡襢裼者左者吉凶皆袒左是也是以士喪禮主人左袒檀弓云呉季札左袓右還其封大射亦左袒若受刑則袒右故覲禮侯氏袒右受刑是也知降立俟享也者下文賔行享是也儀禮䟽卷第二十
