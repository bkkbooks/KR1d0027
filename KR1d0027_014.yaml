  text: 儀禮疏卷第十四
  hash: sha256:04c5ad8812a7895bfdddf49b319500091592a5dfaddf39d84da646905ea31824
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0027_SBCK_014-1a}
body:
  text: 唐朝散大夫行太學博士弘文館學士臣賈公彥等撰燕禮第六鄭目録云諸侯無事若卿大夫有勤勞之功與羣臣燕飲以樂之燕禮於五禮屬嘉大戴第十二小載及别録皆第六釋曰案上下經注燕有四等目録云諸侯無事而燕一也卿大夫有王事之勞二也卿大夫又有聘而來還與之燕三也四方聘客與之燕四也若然目録云卿大夫有勤勞之功聘使之勞兼王事之勞二者也知臣子俯聘還與之燕者四牡勞使臣是也知有王事之勞燕者下記云若以樂納賔則賔及庭奏肆夏鄭注云卿大夫有王事之勞則奏此樂焉是也知君臣無事有燕者案魯頌云夙夜在公在公明明振振鷺鷺于下鼓咽咽醉言舞于胥樂兮鄭箋云君臣無事則相與明義明德而巳潔白之士羣集於君之朝君以禮樂與之飲酒燕樂以盡其歡是其無事而燕也又知賔及庭奏肆夏是己之臣子有王事之勞者案郊特牲云賔入大門而奏肆夏鄭注云賔朝聘者是異國聘賔入大門奏肆夏故知記云賔及庭奏肆夏者是已之臣子也又知異國聘賔有燕者聘禮所云燕與時賜者是也燕禮小臣戒與者釋曰自此巳下盡射人告具論告戒羣臣及陳饌之事必使小臣戒與者以其燕為聘使者為主兼與舊在者歡樂之故今戒可與之人使依期而至注小臣至歡也釋曰云小臣相君燕飲之法者案周禮大僕職云王燕飲則相其法又案小臣職云凡大事佐大僕則王燕飲大僕相小臣佐之此諸侯禮降於天子故冝使小臣相是以下云小臣師一人在東堂下注云師長也小臣之長一人猶天子大僕正君之服位者也是諸侯小臣當大僕之事戒與者謂留羣臣也者謂羣臣留在國不行者也云君以燕禮勞使臣若臣有功者此即目録卿大夫有勤勞之功勞使臣即四牡勞使臣也若臣有功即王事之勞也故鄭揔云卿大夫勤勞之功若然鄭不言與羣臣無事燕者以其經云戒與者功勞之外與及之為有事之臣燕不得云無事燕者故不言之案大射云君有命戒射者以其大射辨尊卑故云君有命明政教由尊者出燕禮主歡心不辨尊卑故不言君有命膳宰至寢東注膳宰至路寢釋曰以其燕在寢故膳宰具官饌于寢東擬燕時設之云膳宰天子曰膳夫掌君飲食膳羞者也者以其天子有宰夫兼有膳夫掌君飲食諸侯亦有宰夫復有膳宰掌君飲食與天子膳夫同故引天子膳夫並之云具官饌具官之所饌者謂卿大夫士之饌揔饌之大射亦用燕禮直云官饌不言膳宰與此同不言者文不具云謂酒也牲也脯醢也知者案下所設亦有此三者牲即其牲狗也云寢路寢者以其饗在廟服朝服下記云燕朝服於寢正處在路寢不在燕寢可知故云路寢也案公食大夫云凡宰夫之具饌于東房不使膳宰者彼食異國之大夫敬之故使宰夫具饌此燕已臣子故使膳宰卑者具饌必知膳宰卑於宰夫者案天子宰夫下大夫膳夫上士天子膳夫卑於宰夫則知諸侯膳宰亦卑於宰夫者也樂人縣注縣鍾至新之釋曰案大射樂人宿縣在射前一日又具辨樂縣之位者以其大射在學宫學宫不常縣樂射乃設之故射前一日縣之又辨樂縣之位此燕在路寢有常縣之樂今言樂人縣者為燕新之而巳故不在燕前一日又不辨樂縣之處又直云樂人未知樂人意是何官案周禮春官大司樂云凡樂事宿縣又案樂師云凡樂成則告備是天子有大司樂并有樂師之官案序官樂師下大夫四人上士八人下士十有六人以此知天子有大司樂樂師諸侯無大司樂直有大樂正小樂正以其諸侯兼官此二者皆當天子樂師大夫及士則諸侯樂師不用大夫大樂正當上士小樂正當下士為之故鄭下注云樂正于天子樂師也大射注亦云小樂正於天子樂師若然縣樂之法案周禮視瞭職云掌大師之縣鄭注云大師當縣則為之案下僕人相大師則諸侯無視瞭則使僕人縣樂大師以聲展之樂師又監之云縣鍾磬也者案小胥天子宫縣諸侯軒縣面皆鍾磬鎛各一虡大夫判縣士特縣不得有鎛故云鍾磬案下唯有磬而無鍾而云鍾磬者鄭泛解樂縣法故兼言鍾其實諸侯之士特縣磬而巳云國君無故不徹縣者案曲禮唯有大夫無故不徹縣士無故不去琴瑟不言國君但大夫無故不徹縣則國君無故亦不徹縣可知鄭以燕禮為國君法故以義約之也云言縣者為燕新之者更整理樂縣之法為新之也設洗至西面注設此至其文釋曰云設此不言其官賤也者決膳宰具官饌樂人縣司宫設尊皆言其官獨此不言官故知賤也案少牢司宫設罍水大夫兼官此國君禮或可别人為之但無文故鄭不細辨云當東霤者人君為殿屋也者漢時殿屋四向流水故舉漢以況周言東霤明亦有西霤對大夫士言東榮兩下屋故也云亦南北以堂深者亦士冠禮鄉飲酒等也云膳篚者君象觚所饌也者案下文洗象觚升實之東北面獻于公是也但君尊不可與臣同篚故别釋之也云亦南陳者亦臣之南肆者也言西面尊之異其文者欲見膳篚西面南肆者亦西面此不可言南肆而言西面是尊君之篚故異其文也司宫至圜壷注司宫至為緆釋曰云司宫天子曰小宰聽酒人之成要者也者案天官小宰職掌建邦之宫刑以治王宫之政令是小宰掌宫事此諸侯無小宰有司宫明司宫亦當掌宫刑治宫之政令可知是司宫掌宫事與小宰同又案酒正云酒正之出日入其成月入其要小宰聽之此司宫亦設酒尊當掌酒事與小宰同是以知此諸侯司宫當天子小宰者也若然案酒正云酒正之出日入其成月入其要小宰聽之案彼文則是小宰聽酒正之成要此注云聽酒人成要者案彼注云出謂授酒材及用酒之多少也受用酒者日言其計於酒正酒正月盡言於小宰云日言其計於酒正者是酒人也酒正月盡揔言於小宰則是小宰所聽者並是酒人所言故鄭之此注據酒人而言也云尊方壷為卿大夫士也者以其燕揔有卿大夫士又别有公尊瓦大兩故知方尊為此人也云於東楹之西豫君專此酒也者此決鄉飲酒鄉射皆於房戶之閒賔主共之此於東楹之西向君設之人君尊專大惠故云豫君專此酒也引玉藻者欲見尊面向君順君面非賔主共之意案少儀云尊壷者面其鼻鄭注云鼻在面中言鄉人也鄉人者據此燕禮尊面向君而言少儀又云尊者以酌者之左為上尊鄉飲酒云尊兩壷于房戶之閒玄酒在西又鄉射云尊於賔席之東兩壷斯禁左玄酒鄭注云設尊者北面西曰左此等皆據酌者北面而言玄酒在左若據設尊之人及尊面而言即南面以右為尊此燕禮尊面向君據君面以左為尊玄酒在南若據酌者不得背君而西面當尊西東面則酌者之右為上尊是以下文媵爵于公者交於東楹北也云瓦大有虞氏之尊也者明堂位文引禮器君尊瓦甒大射亦云膳尊兩甒不引大射而引禮器者鄭欲同此三者之文皆是一物故也云豐形似豆卑而大者據漢法而知但豆徑尺柄亦是尺此承尊之物不可同於常豆故知卑而大取其安穩也云幂夏綌冬錫冬夏異也者夏冝用綌冬冝用錫葛之粗者曰綌案喪服傳云錫者何也麻之有錫者也錫者十五升抽其半無事其縷有事其布曰錫鄭注云治其布使之滑易是也云在尊南在方壷之南也者其幂本為瓦大設今未用陳在方壷之南者不可在方壷瓦大之閒相雜故也瓦大不言玄酒者以其言瓦大兩又言南上有玄酒在南可知凡無玄酒者直陳之而巳不言上下是以此尊士旅食直云兩圜壷大射亦云兩圜壷特牲尊兩圜壷於阼階西方亦如之皆是無玄酒不言上下也又凡用醴者無玄酒士冠禮醴子昏禮醴婦聘禮醴賔醴皆無玄酒質故也昏禮房外之尊無玄酒鄭云略之此及大射尊士旅食無玄酒鄭云賤也特牲少牢陽厭納一尊無玄酒鄭注云禮殺也士喪既夕士虞皆有酒醴無玄酒者以凶變於吉故也特牲東西階兩壷無玄酒者注云優之云士衆食謂未得正祿者以其士大夫巳上得正祿王制云下士九人祿中士倍下士上士倍中士下大夫倍上士卿四大夫祿皆正祿此則未得正祿云所謂庶人在官者也者所謂王制文故王制云庶人在官者其祿以是為差謂府史胥徙謂府八人祿史七人祿胥六人徒五人皆非正祿號為士旅食者也司宫至席也注筵席至筵也釋曰云筵席也者案周禮序官司几筵鄭注云鋪陳曰筵藉之曰席然其言之筵席通若然鋪陳曰筵者先鋪一席在地者藉之曰席據重巳上相承藉者筵席一也故鄭云筵席通云席用蒲筵緇布純者案公食大夫記云蒲筵常緇布純加萑席尋玄帛純彼有加席故有萑在上此無加席故言席用蒲云無加席燕私禮臣屈也者對公食大夫禮異國之賔有加席禮得申云諸侯之官無司几筵也者對天子有司几筵布席諸侯兼官使司宫設尊并設席射人告具注告事至射也釋曰云射人主此禮以其或射也者案公食大夫禮贊者負東房告具以其無射故使贊者此乃射人告具與大射同案下文若射則不獻庶子言若者或射或不故此鄭注云以其或射言或亦是不定之義案大射告具之上有羮定此不言羮定者文不具也小臣至西鄉注周禮至後也釋曰自此下盡諸公卿者論君臣位次及命羞者之事注引周禮者司几筵之丈也彼諸侯祭祀神席及受酢之席此乃燕飲之席引之者欲見燕飲與受酢席同若饗諸侯來朝則郊特牲云大饗君三重席而酢焉是也燕他國之臣即郊特牲云三獻之介君專席而酢焉此降尊以就卑也故君單席受酢也云後設公席者凡禮卑者先即事尊者後也者此燕私禮故賤者先即事大射辨尊卑故先設公席後設賔席也小臣至東上注納者至闑西釋曰云卿大夫皆入門右北面東上者此是擬君揖位故下經君始爾之就庭位云士立於西方東面北上者此是士之定位士賤故不待君揖入門即就定位云祝史立於門東北面東上者案大射大史在犴侯之東北北面不言祝此言祝史不言大史者大射及下文云大史俟於所設中之西東面以聽政嫌其位初在此不在犴侯之東北故著大史以明之其餘祝史彼不言者以其大射先行燕禮此燕禮有祝史故於彼不言省文也云納者以公命引而入也者雖無正文進止由君故知以公命者也云自士以下從而入即位耳者對大夫以上小臣引之就門東揖位未就庭位自士巳下不須引從大夫而入徑即庭位云師長也小臣之長一人猶天子大僕正君之服位者也者案夏官大僕職云掌正王之服位出入王之大命彼下文有小臣之官上士四人其職云掌王之小命詔相王之小法儀諸侯兼官無大僕唯有小臣出入君之教命正君之服位但諸侯小臣之官有上下是以大射云小臣師從者在東堂下南面西上又云小臣正贊袒若然諸侯小臣正次有小臣師大射禮小臣正相君小臣師佐之常在君左右不在堂下之位故唯云小臣師從者在堂下南面此燕輕冝有小臣師及從者相君燕飲小臣正一人無事得在堂下此言小臣師即大僕小臣正一也故鄭以為當天子大僕云凡入門而右由闑東左則由闑西者鄭云凡入門者廣解賔主人入門之義案曲禮云大夫士出入君門由闑右又玉藻云公事自闑西私事自闑東言私事即大夫士出入君門一也又與此經卿大夫士入君門亦由闑右同公事自闑西者即聘禮聘賔入由闑西是也若然此注云入門而右由闑東者是臣朝君之法也左即由闑西者是聘賔入門之法公降至少進注爾近至少前釋曰曲禮云揖人必違其位是以公將揖卿大夫降立於阼階之東南南面揖之變揖言爾者爾訓近也移也卿大夫得揖移近中庭也是以鄭云揖而移之近之也云大夫猶北面少前者三卿五大夫初入門右同北面三卿得揖東相西面五大夫得揖中庭少進北面不改故云大夫猶北面少前射人請賔注命當由君出也釋曰案大射云大射正擯擯者請賔此直云射人請賔不云為擯者但射人有大小大者為大射正其次為射正又其次為司正悉監射事見於大射禮大辨尊卑故云大射正為擯此燕禮或因燕而射以其禮輕或大射正為擯或小射正為擯此二者皆是射人故直云射人請賔不定尊卑也既當請君不辨射人面位者以其君南面射人北面可知故不言公曰命某為賔注某大夫也釋曰知大夫非卿者以其賔主相對宰夫為主人是大夫明賔亦是大夫燕義云不以公卿為賔而以大夫為賔為疑也故知是大夫射人至禮辭注命賔至敏也釋曰鄭知命賔者東面南顧者少儀云詔辭自右明知在君之右東面者向君南顧者向賔便也知禮辭辭不敏者取孝經曽子云參不敏為義賔出至東面注當更以賔禮入釋曰前卿大夫從臣禮相從而入故出更以賔禮入是以下經賔入及庭公降一等揖之公揖至就席注揖之人之也釋曰言人之者公將及升堂故以人意相存偶是以揖之乃升小臣至膳者注執幂至庶羞釋曰云執幂者執瓦大之幂也方圜壷無幂鄭知者以其上文幂用綌文承瓦大之下方圜壷不言幂故知義然云羞於公謂庶羞者知羞於公者以其言羞膳據君而言又與執幂者連文幂據君明羞膳據公可知又知是庶羞者以其脯醢稱薦明羞是庶羞乃命至東上注以公至略之也釋曰鄭知西階前命之者案下記云羞膳者與執幂者皆士也士位在西方東靣故知西階前以君命命之云東上玄酒之幂為上也者以其唯瓦大兩有幂玄酒尊於正酒經云東上故知玄酒之幂為上羞膳者以下盡略之鄭知義然者以經直云執幂者升自西階羞膳者無升文又且東面階西面階婦人之階非男子之所升則羞者升自北階知由堂東者以羞在房又大射云工人士與梓人升自北階知房中西面南上者約士冠禮脯醢在房中服北贊者盥于洗西升立于房中西面南上下注云近其事也言略之者解不由前堂升執幂與羞膳臨時請者以其諸侯兼官有常職先定亦有臨時命之者是以經與記直云士不言其官不請羞賔者下記約與君同亦用士也膳宰至卿者注小臣至為敬釋曰言彌略者上請賔使射人請執幂使小臣巳是其略今羞諸公卿乃使膳宰膳宰畢於小臣故云彌略也知膳宰卑於士者周禮膳夫是上士此諸侯膳宰明非上士且禮之大例薦羞者尊於設俎者公士為薦羞膳宰設俎故知膳宰卑也射人納賔注射人至擯者釋曰自此至賔以虛爵降論賔升堂主人獻賔之事案大射大射正擯此云射人為擯與上射人請賔義同還是小射正也賔入至揖之注及至至面時釋曰鄭知至庭謂既入而左北面時者以其云賔入及庭賔入謂入門時及庭謂賔入門而出堂塗北面是其當公降揖之節故知北面時也公升就席注以其至之也釋曰鄭知將與主人為禮不參之者下經云賔升主人亦升是其賔與主人為禮不得相參之也賔升至再拜注主人至獻主釋曰知主人是宰夫者案禮記燕義云使宰夫為獻主是也云宰夫大宰之屬者案天官云大宰卿一人小宰中大夫二人宰夫下大夫四人宰夫屬大宰故云大宰之屬云掌賔客之獻飲食者也者案宰夫職云凡朝覲㑹同賔客掌其牢禮委積膳獻飲食引之者證宰夫為主人之義云其位在洗北西面者案下文獻大夫下胥薦主人于洗北西面是也云君於其臣雖為賔不親獻以其尊莫敢伉禮也者此略取燕義文設賔主飲酒之禮使宰夫為獻主臣莫敢與君伉禮也不以公卿為賔而以大夫為賔為疑明嫌之義也是君不親為主人之事也云天子膳夫為獻主者案膳夫職云王燕飲酒則為獻主是也案燕義注云天子使膳宰為主人則是膳宰膳夫一人也上文注云膳宰天子曰膳夫者欲見天子諸侯之臣名異其實同也主人至北面釋曰此宰夫代君為獻主升降不由阼階與賔同由西階升降故降自西階當洗南北面今西北面者鄭云賔將從降鄉之當辭賔降故也案鄉飲酒鄉射主人降洗爵在階下辭賔降者彼賔主異階故在階下不在洗南也主人至反位注賔少至為觶釋曰賔少進者又辭冝違其位也者言又辭對前主人辭降今又賔辭洗言少進者前賔降賔在階下曲禮云揖人必違其位以其賔又辭洗冝違本位也云獻不以爵避正主也者此宰夫為主人非正主故用觚對鄉飲酒鄉射是正主皆用爵主人至乃升注賔每先升尊也釋曰每先升者前賔初升時先云賔升自西階後云主人亦升自西階此賔揖乃升下云主人升故云賔每先升賔先升者尊賔故也主人至降盥注主人至塵也釋曰言復盥者前盥為洗爵此盥為汙手注君物至賔也釋曰言君物曰膳膳之言善也者言君物揔衆物之名上云設膳篚設膳尊膳之言善所以別於臣子之尊篚也云酌君尊者尊賔也者大夫為賔賔亦臣子而酌膳尊尊賔故也必尊之者立賔以對君故也膳宰至折俎注折俎至肩肺釋曰引鄉飲酒記者燕禮不言賔之牲體之數此燕禮既與鄉飲酒同用狗則與此賔之牲體數同故引以為證也賔坐至答拜注降席至美也釋曰云降席坐奠爵拜鄭云降席席西不言面案前體例降席席西拜者皆南面拜訖則告旨賔西至答拜注遂拜拜既爵也釋曰經云坐卒爵又云興坐奠爵遂拜遂拜之文隔坐奠爵嫌遂拜不為拜既爵故鄭明之云遂拜拜既爵也賔以虛爵降注將酢主人釋曰自此巳下盡序內東面論賔酢主人之事鄭知將酢主人者下經論酢主人之事故知也主人至面對注上既至為爵釋曰云上既言爵矣復言觚者嫌易之也者上文主人洗觚獻賔云賔以虛爵降此經又云坐奠觚中閒言爵者欲見對文一升曰爵二升曰觚散文即通觚亦稱爵以此言之此觚即前爵周公作經嫌易之故復言觚也引大射禮者此經直有主人降又云主人東面對不辨主人立處又無少進之文大射先行燕禮與此同故引以為證賔坐至送爵注賔既至之左釋曰鄭云賔既南面授爵乃之左鄭知南面授爵與主人者以經言主人北面拜受爵明賔於東楹之西東面酌膳訖向西階南面授主人可知授爵訖乃之主人之左北面拜送爵故鄭云南面授爵乃之左也主人坐祭不卒酒注辟正至臣也釋曰案鄉飲酒鄉射皆是正主經直云祭如賔禮亦不見有啐酒之事未知正主有啐不此云不啐辟正主者案文可知以燕禮大射啐酒告旨並不為者經云不啐酒不告旨並言不鄉飲酒鄉射直云不告旨不言不啐酒明主人啐矣有司徹儐尸之禮尸酢主人云席末坐啐酒特牲少牢尸酢主人主人皆有啐酒是其雖不告旨唯有啐酒之事云未薦者臣也者對賔禮獻訖則薦脯醢此主人是臣故獻訖不薦至獻大夫下胥薦主人于洗北是也不拜酒不告旨注主人之義釋曰拜酒主人為告旨但告旨者賔拜訖主人告酒美鄉飲酒鄉射正主人不拜酒不告旨主人無自告美故此主人代君為主不得直云主人故云主人之義射人至東面注東西至升賔釋曰東西牆謂之序者爾雅文引大射禮者證此經云射人升賔之時亦得君命主人至于公注象觚至東面釋曰自此下盡奠于膳篚論主人獻公之事云取象觚者東面者以膳篚南有臣之篚不得北面取又不得南面背君取從西階來不得篚東西面取以是知取象觚者東面也公拜至西階注薦進至左房釋曰凡此篇內公應先拜者皆後拜之尊公故也是以下舉旅行酬皆受酬者先拜公乃答拜此公先拜受爵者受獻禮重故也是以下云主人受公酬得酌膳燕上歡故也大射主人受公酢者辨尊卑故也云士薦脯醢膳宰設折俎者案前獻賔薦脯醢及設折俎皆使膳宰者賔卑故也今於公士薦脯醢膳宰設折俎異人以其士尊於膳宰君尊故使士薦必知士尊於膳宰者以其諸侯膳宰當天子膳夫上士二人諸侯降等膳宰則卑故下記云羞膳者與執幂者皆士也鄭注云尊君也膳宰卑於士是其士尊也大射主於射略於飲酒故公及賔同使宰胥薦脯醢庶子設折俎此燕禮燕私主於羞故賔之薦俎庶羞同使膳宰君之脯醢庶羞同使士尊官為之大射必使庶子設折俎者案周禮庶子下大夫大射序尊卑變於燕禮故尊官為之引大射禮者證此經脯醢從左房而來天子諸侯有左右房故得言左房大夫士燕右房故言東房而巳公祭至爵興注凡異至賔也釋曰云凡異者君尊變於賔也者云凡非一謂膳宰贊授肺立卒爵又上文士薦脯醢皆是異於賔故言凡以廣之更爵至再拜釋曰自此巳下盡主人奠爵于篚論主人受公酢之事主人受公酢而自酌者不敢煩公尊君之義注更爵至為受釋曰獻君自酢同用觚必更之者襲因也不敢因君之爵喪服傳云君至尊也故以君為至尊也主人至答拜釋曰自此盡東南面立論主人酬賔之事案前受獻訖立于序內以來未有升筵之事案鄉飲酒大射酬時皆主人西階上坐奠爵拜賔西階上北面答拜酬前賔皆無逆在席者又以下文賔奠于薦東賔降筵西東南面立以此約之則此無升筵之事或言降筵者蓋誤注媵送至作騰釋曰云媵送也讀或為揚揚舉也者案禮記檀弓下云知悼子卒未葬平公飲酒師曠李調侍鼓鍾杜蕢自外來升酌曰曠飲斯又酌曰調飲斯注云皆罰平公曰寡人亦有過焉酌而飲寡人杜蕢洗而揚觶注云舉爵於君也禮揚作騰揚舉也媵送也揚近得之若然此注今文媵作騰騰與媵皆是送義讀從檀弓杜蕢揚觶之揚揚訓為舉義勝於媵送故讀從之也主人至答拜注辭者至酬也釋曰案鄉飲酒鄉射主人酬賔皆坐卒觶此主人酬賔亦坐飲賔辭之者上文獻君君立卒爵此主人代君酬賔亦冝立飲今主人坐祭遂飲故鄭云辭者辭其代君行酒不立飲云此降於正主酬也者正主謂鄉射飲酒正主酬處主人酌膳釋曰自此至薦東此為酬賔若然案鄉飲酒鄉射主人酬賔皆主人實觶席前北面賔始西階上拜此及大射主人始酌膳時賔巳西階上拜者以其燕禮大射皆是主人代君勸酒其賔是臣急承君勸不敢安暇故先拜也主人又不坐奠於薦西賔祭訖遂南面奠於薦東不北面奠也主人至面正注賔不至類與釋曰云賔不立于序內位彌尊也位彌尊者其禮彌卑者案上𥘉賔得獻降升之時序內立是不敢近賔席是禮尊而賔卑至此酬訖立於席西是賔位彌尊禮漸殺故云彌卑也云記所謂一張一弛者禮記雜記文案彼孔子謂子貢黨正飲酒百日之蠟一日之澤以弓弩喻是一張一弛之法此獻時為盛是一張也酬時為殺是一弛也無正文故云是之類與言與以疑之小臣至命長注命長至使者釋曰自此盡公答再拜論使下大夫媵爵於公之事此旅酬從公而起故須大夫之中長幼可使者知非卿大夫最長而云長幼可使者案下文大夫長升受旅是長幼次第非專最長則此命長非最長是長幼之中可使者也小臣至媵爵注作使至其尊釋曰案王制上大夫卿是卿為上大夫云不使之者為其尊者謂若主人與賔使下大夫不使卿之類也媵爵至再拜釋曰西面北上者是未盥相待之位序進盥則北面向洗注序次至為上釋曰云楹北西楹之北也者二大夫盥手洗爵訖先者升西階由西楹之北向東楹之西東面酌酒訖右還由西楹北向西階上北面後者升西階亦由西楹之北向東楹之西酌酒訖亦由西楹之北西階上北面相待乃次第而降故云交而相待於西階之上既酌右還而反往來以右為上云以右為上者謂在洗南西面及階上北面時先者在右地道尊右故也媵爵至洗南注待君命也釋曰云執觶待于洗南待君命者以其君尊臣卑雖自飲訖故執觶待于洗南以侍君命也小臣請致者注請使至君也釋曰案下二人俱致禮法當然是以不敢必君舉也故云一人與二人與取君進止是優君也若君至再拜注序進至反位釋曰云序進進往來由尊北交于東楹之北者前二人酌酒降自西階故交于西楹之北此酌酒奠于君所故交于東楹之北交于東楹北者以其酒尊所陳在東楹之西西向而陳其尊有四并執幂者在南不得南頭以之君所又唯君面尊尊東西面酌酒以背君故先酌者東面酌訖由尊北又楹北往君所奠訖右還而反後酌者亦於尊北又於楹北與反者而交先者於南西過後者於北東行奠訖亦右還而反相隨降自西階云奠于薦南不敢必君舉也者案鄉射皆云奠者於左將舉者於右是鄉飲酒一人舉觶及二人舉觶皆奠于薦右今言媵爵於公是將舉旅當奠於薦右而奠於薦左故云不敢必君舉也引大射禮者此經二人階下再拜稽首送觶無反位之文故引大射媵爵者皆退反門右北面位公坐至成拜注興以至成然釋曰自此至奠于篚論公為賔舉旅之節公坐取大夫所媵觶者取上楹北觶云興以酬賔就其階而酬之也者經但云興以酬賔鄭知公就西階者以其賔降拜不於阼階下而言西階下故知公在賔西階上也不言西階者以公尊空其文也云升成拜復再拜稽首也先時君辭之於禮若未成然者凡臣於君雖為賔與君相酬受爵不敢拜於堂上首拜於堂下若君辭之聞命即升若堂下拜訖君辭之即升堂復再拜稽首所以然者以堂下再拜而君辭之若未成然故復升堂再拜稽首以成之升則不云再拜稽首直云成拜以堂下既有再拜稽首則此文是也若堂下未拜之閒聞命則升升乃再拜稽首則不得言升成拜以其堂下未拜即下經云小臣辭賔升再拜稽首鄭注不言成拜者為拜故下實未拜是也凡臣拜於君有三等初受獻拜於堂下或親辭或遣小臣辭成與不成如上說至於酬酒雖下堂拜未即拜待君辭即此下經云公坐奠觶答再拜執觶興立卒觶賔下拜小臣辭賔升再拜稽首注云不言成拜者為拜故下實未拜也下不輒拜禮殺也此篇末無算爵受公賜爵者皆下席堂上拜稽首不堂下拜者禮末又輕於酬時公坐至稽首注不言至於君釋曰云此賔拜于君之左不言之者不敢敵偶于君者上云公酬賔于西階上則此賔升再拜者拜于君之左可知經不言拜于君之左者若言再拜于君之左則臣與君敵偶故鄭云不言之者不敢敵偶于君闕其文也公坐至觶洗注君尊至文也釋曰云君尊不酌故也者以其君酬賔當親酌以授賔今賔爵自酌者君尊不酌與臣故也云凡爵不相襲者也於尊者言更自敵以下言易者於尊者言更謂受尊者之爵及與尊者爵皆言更上文主人獻公訖受爵以降奠于膳篚更爵洗酌膳以自酢是受尊者之爵言更也下文云賔酬卿若膳觶也則降更觶鄭注云言更觶卿尊也是與尊者之爵言更云自敵以下言易者謂與卑者之爵及受卑者之爵皆云易此文公酬賔云賔進受虛爵降奠于篚易觶洗言易者賔尊以公舉觶酬賔是與卑者故言易也上文大夫二人媵爵于公者卒觶執觶待于洗南小臣請致者若君命皆致則序進奠觶于篚阼階下再拜稽首媵爵者洗象觶升實之序進坐奠于薦南是受卑者之爵合言易而不言者理自明若不言易者奠散觶洗象觶隔再拜稽首故不復言易也若然主人受公酢賔受公酬二者之爵皆從尊者來所以受酢為受尊者之爵言更受酬為與卑者之爵言易者以其主人受酢由己獻公公報己己所當得是以為受尊者之爵言更也賔受公酬以公舉媵觶就西階上以酬賔特為賔舉旅故以為尊者與卑者之爵言易案下士舉旅公坐取賔所媵觶唯公所賜受者如初受酬之禮降更爵洗升酌膳彼亦是尊者與卑者之爵不言易而言更者旅酬下為上尊前人故不言易而言更也云更作新者欲見此爵前人巳用今不復用更新用一爵故云更作新也云易有故之辭者言此爵我先嘗用今由前人後用已不用亦以為爵故云易有故之辭也案特牲賔長致爵于主人主婦言更爵酢者欲得嘉賔美客以事其先故言更少牢不儐尸云致爵于主人主婦賔易爵酢者大夫禮尊于賔有君道故言易若然又案少牢不儐尸主婦致爵于主人主婦更爵酢注云更猶易也若然更與易似不别者但更易不殊以尊卑不同設文有異云不言公酬賔於西階及公反位者亦尊君空其文也者以其公就西階是降尊就卑敬公不言降尊故空文不言公有至稽首注下拜至成拜釋曰云凡下未拜有二或禮殺或君親辭云禮殺者謂若酬時下為拜實未拜辭之即升再拜稽首是也云或君親辭者謂若公食大夫云公拜至賔降西階東北面答拜公降一等辭賔不拜直言階上北面再拜稽首是階下未拜不得言升成拜直言再拜稽首而巳注拜於至侍臣釋曰云於是賔請旅侍臣者案下記云凡公所酬既拜請旅侍臣鄭注云既拜謂自酌升拜時也擯者阼階下告於公還西階下告公許旅行也請行酒於羣臣必請者不專君惠也大射於此時賔請旅於諸臣此不言者文不具故記人辨之賔以至階上注旅序至飲酒釋曰此經論旅酬先尊後卑之法仍未行旅下經射人作大夫長乃始旅酬射人至受旅注言作至卑後釋曰遣人作大夫者燕或射故使之云言作大夫則卿存矣者以其卿稱上大夫言大夫長故知卿亦存在作中矣云長者尊先而卑後者賔則旅三卿三卿遍次第至五大夫大夫遍不及士賔大至答拜注賔在至之位釋曰言賔在右者賔在西階上酬卿賔與卿並北面賔在東卿在西是賔在大夫之右賔位合在西今在東故云賔在右者相飲之位也賔坐至不拜注酬而禮殺釋曰此對酢之時坐卒爵拜既爵是禮盛也今旅酬立卒觶不拜既爵故云禮殺也若膳至拜送注言更觶卿尊也釋曰案上文體例與卑者之爵稱易與尊者之爵稱更雖立為賔仍是大夫為之是賔卑於卿故言更觶者卿尊也大夫至于篚注卒猶至作遍釋曰言不祭亦是酬禮殺也引大射禮者此經云降奠于篚不言反位故引大射奠爵於篚訖當復門右北面位主人至階上釋曰自此盡無加席論主人獻孤卿之節注酬而至酬也釋曰此酬非謂尋常獻酬乃是君為賔舉旅行酬以其主人獻君君酢主人主人不敢酬君故使二大夫媵爵于公以當酬處所以覆獻也但君恩既大為賔舉旅飲酒之禮成於酬故酬辨乃獻卿以君尊卿卑是以君禮成卿乃得獻故云别尊卑也儀禮疏卷第十四
